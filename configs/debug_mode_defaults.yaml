# =============================================================================
# RECORD TYPE DEFINITIONS
# =============================================================================

record_types:
  full:
    description: "Complete debug record with all fields"
    required_fields:
      - record_id
      - skill_or_agent
      - version
      - timestamp_start
      - timestamp_end
      - duration_ms
      - inputs
      - tool_calls
      - bskg_queries
      - outputs
      - metadata

  query_focused:
    description: "Focus on BSKG/VQL queries, minimal tool tracking"
    required_fields:
      - record_id
      - skill_or_agent
      - timestamp_start
      - timestamp_end
      - bskg_queries
      - outputs

  tool_focused:
    description: "Focus on external tool invocations"
    required_fields:
      - record_id
      - skill_or_agent
      - timestamp_start
      - timestamp_end
      - tool_calls
      - outputs

  pattern_focused:
    description: "Focus on pattern matching and verification"
    required_fields:
      - record_id
      - skill_or_agent
      - timestamp_start
      - timestamp_end
      - bskg_queries
      - outputs
      - patterns_verified

  coverage_focused:
    description: "Focus on coverage analysis"
    required_fields:
      - record_id
      - skill_or_agent
      - timestamp_start
      - timestamp_end
      - outputs
      - coverage_gaps

# =============================================================================
# E2E VALIDATION REQUIREMENTS
# =============================================================================

e2e_validation:
  # Debug mode MUST be enabled for E2E validation
  require_debug_mode: true

  # All skills and agents listed above MUST produce debug records
  require_all_skills: true
  require_all_agents: true

  # Index must be present and valid
  require_valid_index: true

  # All records must pass validation
  require_all_records_valid: true

  # Evidence pack manifest must reference debug records
  require_manifest_reference: true
