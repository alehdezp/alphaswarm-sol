# Debug Mode Defaults Configuration
#
# This file defines default debug settings per skill and global on/off toggles.
# Debug mode is MANDATORY for all E2E validation. Runs without debug artifacts are invalid.
#
# Schema: Based on debug-mode-spec.md
# Updated: 2026-01-30

version: "1.0"

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================

global:
  # Master switch for debug mode (can be overridden by ALPHASWARM_DEBUG_MODE env var)
  enabled: false

  # Default output directory for debug artifacts
  output_dir: "evidence/debug"

  # Maximum characters to capture in result summaries
  max_result_chars: 500

  # Whether to redact secrets from debug outputs
  redact_secrets: true

  # Performance targets (overhead thresholds)
  performance:
    max_overhead_per_tool_call_ms: 5
    max_overhead_per_query_ms: 10
    max_serialization_ms: 50
    max_total_overhead_percent: 5

  # Validation rules (all must pass for record to be "success")
  validation:
    require_record_id: true
    require_valid_timestamps: true
    require_positive_duration: true
    require_prompt: true
    require_tool_calls_array: true
    require_bskg_queries_array: true
    require_output: true

# =============================================================================
# SKILL-SPECIFIC SETTINGS
# =============================================================================

skills:
  # Primary audit entry point
  "/vrs-audit":
    enabled: true
    record_type: full
    capture:
      prompts: true
      tool_calls: true
      bskg_queries: true
      intermediate_artifacts: true
      outputs: true
    token_budget: 8000
    extra_fields: []

