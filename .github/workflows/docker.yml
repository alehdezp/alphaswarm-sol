# AlphaSwarm.sol Docker Build and Push Workflow
# Builds and pushes both CLI and Agent images to GitHub Container Registry
#
# Triggers:
#   - Version tags (v*.*.*) for releases
#   - Manual dispatch for testing
#
# Images:
#   - ghcr.io/alphaswarm/alphaswarm-sol:latest (CLI)
#   - ghcr.io/alphaswarm/alphaswarm-sol:0.5.0 (CLI with version)
#   - ghcr.io/alphaswarm/alphaswarm-sol:agent (Agent)
#   - ghcr.io/alphaswarm/alphaswarm-sol:0.5.0-agent (Agent with version)

name: Docker Build and Push

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: true
        default: 'false'
        type: boolean
      tag_override:
        description: 'Override version tag (e.g., 0.5.0-beta)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alphaswarm/alphaswarm-sol

jobs:
  build-cli:
    name: Build CLI Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event.inputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag_override }}" ]; then
            VERSION="${{ github.event.inputs.tag_override }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Test CLI image
        run: |
          docker build -t alphaswarm-sol:test --target runtime .
          docker run --rm alphaswarm-sol:test --version
          echo "CLI image test passed"

      - name: Check image size
        run: |
          SIZE=$(docker images alphaswarm-sol:test --format "{{.Size}}")
          echo "Image size: $SIZE"
          # Extract numeric value (assuming format like "450MB" or "1.2GB")
          SIZE_MB=$(docker images alphaswarm-sol:test --format "{{.Size}}" | sed 's/[^0-9.]//g')
          echo "Size (numeric): $SIZE_MB"

  build-agent:
    name: Build Agent Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event.inputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag_override }}" ]; then
            VERSION="${{ github.event.inputs.tag_override }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-agent,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=agent,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}-agent

      - name: Build Agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent
          target: agent
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Test Agent image
        run: |
          docker build -f Dockerfile.agent -t alphaswarm-sol:test-agent --target agent .
          docker run --rm alphaswarm-sol:test-agent --version
          echo "Agent image test passed"

      - name: Verify agent environment variables
        run: |
          echo "Checking agent environment variables..."
          docker run --rm alphaswarm-sol:test-agent env | grep -E "ALPHASWARM_|NO_COLOR" || true

          # Verify ALPHASWARM_OUTPUT_FORMAT=json is set
          FORMAT=$(docker run --rm alphaswarm-sol:test-agent printenv ALPHASWARM_OUTPUT_FORMAT)
          if [ "$FORMAT" != "json" ]; then
            echo "ERROR: ALPHASWARM_OUTPUT_FORMAT should be 'json', got '$FORMAT'"
            exit 1
          fi
          echo "Agent environment variables verified"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-cli, build-agent]
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CLI image for scanning
        run: docker build -t alphaswarm-sol:scan --target runtime .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'alphaswarm-sol:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
