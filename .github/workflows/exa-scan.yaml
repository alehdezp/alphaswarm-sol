name: Weekly Exa Vulnerability Scan

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to look back for discoveries'
        required: false
        default: '7'
        type: string
      category:
        description: 'Category filter (optional)'
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  scan:
    name: Scan for Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run Exa scan
        id: scan
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: |
          # Determine days to look back
          DAYS="${{ github.event.inputs.days_back || '7' }}"
          CATEGORY="${{ github.event.inputs.category || '' }}"

          echo "Scanning Exa for last $DAYS days..."

          # Build command
          CMD="uv run alphaswarm vulndocs scan-exa --days $DAYS --verbose"
          if [ -n "$CATEGORY" ]; then
            CMD="$CMD --category $CATEGORY"
          fi

          # Run scan
          $CMD 2>&1 | tee scan_output.txt

          # Extract discovery count from output
          DISCOVERIES=$(grep -oP 'Found \K\d+' scan_output.txt || echo "0")
          echo "discoveries=$DISCOVERIES" >> $GITHUB_OUTPUT

          # Check queue file
          if [ -f ".true_vkg/discovery/exa_queue.yaml" ]; then
            PENDING=$(grep -c "pending_review:" .true_vkg/discovery/exa_queue.yaml 2>/dev/null || echo "0")
            echo "pending=$PENDING" >> $GITHUB_OUTPUT
          else
            echo "pending=0" >> $GITHUB_OUTPUT
          fi

      - name: Check for new discoveries
        id: check
        run: |
          DISCOVERIES="${{ steps.scan.outputs.discoveries }}"

          if [ "$DISCOVERIES" -gt "0" ]; then
            echo "has_discoveries=true" >> $GITHUB_OUTPUT
            echo "Found $DISCOVERIES new discoveries"
          else
            echo "has_discoveries=false" >> $GITHUB_OUTPUT
            echo "No new discoveries found"
          fi

      - name: Create issue if discoveries found
        if: steps.check.outputs.has_discoveries == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const discoveries = '${{ steps.scan.outputs.discoveries }}';
            const date = new Date().toISOString().split('T')[0];

            const body = `## Weekly Exa Vulnerability Scan - ${date}

            **New discoveries found:** ${discoveries}

            ### Action Required

            Review the pending discoveries in the queue:

            \`\`\`bash
            uv run alphaswarm vulndocs review-queue --source exa
            \`\`\`

            Or use interactive mode:

            \`\`\`bash
            uv run alphaswarm vulndocs review-queue --source exa --interactive
            \`\`\`

            ### Queue Location

            \`.true_vkg/discovery/exa_queue.yaml\`

            ---

            *Generated by [Weekly Exa Vulnerability Scan](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[VulnDocs] Weekly Exa Scan: ${discoveries} new discoveries (${date})`,
              body: body,
              labels: ['vulndocs', 'automated', 'needs-review']
            });

      - name: Commit queue updates
        if: steps.check.outputs.has_discoveries == 'true'
        run: |
          # Check if .true_vkg is gitignored
          if git check-ignore -q .true_vkg 2>/dev/null; then
            echo "Skipping commit: .true_vkg is gitignored"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add discovery files
          git add .true_vkg/discovery/ || true

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "chore(vulndocs): weekly Exa scan results ($DATE)

            - Found ${{ steps.scan.outputs.discoveries }} new discoveries
            - Queue updated for human review

            [skip ci]"
            git push
          fi

      - name: Summary
        run: |
          echo "## Exa Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Discoveries found:** ${{ steps.scan.outputs.discoveries }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Pending in queue:** ${{ steps.scan.outputs.pending }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check.outputs.has_discoveries }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "An issue has been created for review." >> $GITHUB_STEP_SUMMARY
          fi
