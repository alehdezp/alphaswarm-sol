workflow_id: agent-vrs-secure-reviewer
category: agent
grader_type: hybrid
rule_refs:
- GRAPH-FIRST
- EVIDENCE-QUALITY
- EXEC-INTEGRITY
reasoning_dimensions:
- graph_utilization
- evidence_quality
- reasoning_depth
- review_thoroughness
- creative_adversarial_thinking
evaluation_config:
  run_gvs: true
  run_reasoning: true
  debrief: true
  depth: deep
capability_checks:
- id: bskg_query_issued
  description: Reviewer issued BSKG queries
  expected_behavior: Tool sequence contains Bash with alphaswarm query
  grader_type: code
- id: graph_first_compliance
  description: BSKG queries precede manual code reading
  expected_behavior: First Bash(alphaswarm) call occurs before first Read call
  grader_type: code
- id: evidence_cited
  description: Review findings cite specific evidence
  expected_behavior: Response references code locations and graph data
  grader_type: model
- id: session_completed
  description: Review session completed with structured output
  expected_behavior: session_completed is true and response contains structured assessment
  grader_type: code
evidence_requirements:
- type: graph_nodes
  description: Graph evidence for security findings
- type: code_locations
  description: Source code references
hooks:
- SessionStart
- Stop
- PreCompact
- TeammateIdle
- TaskCompleted
- SessionEnd
status: active
coverage_axes: []
metadata:
  tier: core
  model_tier: sonnet
ground_truth_rubric: Agent queries BSKG for multiple vulnerability categories before
  reading source code. Agent systematically covers access control, reentrancy, value
  handling, and state management patterns through graph queries. Agent evaluates each
  potential issue with both attack and defense perspectives. Agent cites specific
  graph nodes and code locations for each observation. Agent performs self-critique
  by questioning whether identified patterns truly represent exploitable conditions
  versus safe implementations.
active_dimensions:
- graph_utilization
- evidence_quality
- reasoning_depth
- review_thoroughness
- creative_adversarial_thinking
- conclusion_support
- investigation_depth
- rubric_coverage
- completeness
