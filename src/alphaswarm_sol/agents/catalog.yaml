    output_contract:
      format: structured
      schema_ref: null  # Embedded in agent prompt
      required_fields:
        - attack_preconditions
        - attack_steps
        - exploitability
        - impact
    allowed_tools:
      - Read
      - Grep
      - Glob
      - Bash(alphaswarm*)
