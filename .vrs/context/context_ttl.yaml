# Context TTL Decay Log (Phase 7.2 Innovation I5)
#
# Tracks TTL and decay for economic context fields.
#
# Rules:
# - Every economic-context field gets a 30-day TTL
# - If expired: status decays to "unknown", NEVER to "safe"
# - TTL enforcement applies in validation/ingestion pipeline, not detection
#
# IMPORTANT: Expired fields decay to "unknown", NEVER to "safe"
# This prevents false negatives - stale context cannot declare something safe.

