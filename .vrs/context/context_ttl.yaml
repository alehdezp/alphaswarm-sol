  generated_at: "2026-01-29T13:40:46Z"
  summary:
    total_fields: 0
    active_fields: 0
    expired_fields: 0
    decay_events: 0
    default_ttl_days: 30
  note: "Expired fields decay to 'unknown', NEVER to 'safe'"
  entries: {}
  decay_log: []
