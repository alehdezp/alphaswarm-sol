# Internal Annotated Contract: NoAccessGate
# Phase: 07.3.1.6 IMP-B1 / IMP-K2
# Purpose: Ground truth for internal test contracts

contract:
  id: "no-access-gate"
  name: "NoAccessGate"
  source_path: "tests/contracts/NoAccessGate.sol"
  solidity_version: "^0.8.20"

metadata:
  annotation_date: "2026-02-04"
  annotator: "AlphaSwarm.sol team"
  trust_level: "medium"  # Internal annotation, not external audit
  purpose: "Controlled test case for missing access control detection"

contract_summary:
  description: |
    Simple vulnerable contract with unprotected owner modification.
    The setOwner function lacks any access control, allowing anyone
    to become the owner.

  lines_of_code: 14
  functions:
    - name: "constructor"
      visibility: "public"
      state_mutability: "nonpayable"
      vulnerable: false

    - name: "setOwner"
      visibility: "external"
      state_mutability: "nonpayable"
      vulnerable: true

findings:
  - id: "INT-NAG-001"
    title: "Missing access control on setOwner function"
    severity: "critical"
    vulnerability_class: "access_control"
    swc_id: "SWC-105"
    cwe_id: "CWE-284"
    ground_truth_verdict: "confirmed"

    affected_functions:
      - "setOwner"

    vulnerable_code:
      file: "tests/contracts/NoAccessGate.sol"
      line_start: 11
      line_end: 13
      snippet: |
        function setOwner(address newOwner) external {
            owner = newOwner;
        }

    vulnerability_pattern:
      description: "State-modifying function without access gate"
      operations_sequence:
        - op: "MODIFIES_OWNER"
          location: "line 12"
        - op_missing: "CHECKS_PERMISSION"
          expected_before: "MODIFIES_OWNER"

    exploit_scenario:
      preconditions:
        - "Contract is deployed with original owner"
        - "Owner has some privileged functionality"
      steps:
        - "Attacker calls setOwner(attacker_address)"
        - "Attacker becomes owner"
        - "Attacker executes privileged operations"
      postconditions:
        - "owner = attacker_address"
        - "Original owner loses control"

    fix_recommendation: |
      Add access control:
      1. require(msg.sender == owner, "not owner")
      2. Or use onlyOwner modifier

    detection_expectations:
      tier_a_detectable: true   # Graph can identify missing gate
      tier_b_detectable: true   # LLM can verify pattern
      tier_c_detectable: true   # Economic analysis shows takeover value

  - id: "INT-NAG-002"
    title: "Single point of failure in ownership model"
    severity: "medium"
    vulnerability_class: "access_control"
    swc_id: "SWC-105"
    cwe_id: "CWE-306"
    ground_truth_verdict: "confirmed"

    affected_functions:
      - "setOwner"

    description: |
      Single owner can be permanently lost if:
      - Owner loses private key
      - Owner accidentally sets wrong address
      No recovery mechanism exists.

    vulnerability_pattern:
      description: "Single point of failure with no recovery"
      operations_sequence:
        - op: "MODIFIES_OWNER"
          location: "line 12"
        - op_missing: "TWO_STEP_TRANSFER"

    fix_recommendation: |
      Implement two-step ownership transfer:
      1. pendingOwner receives nomination
      2. pendingOwner must accept
      Or use OpenZeppelin Ownable2Step

    detection_expectations:
      tier_a_detectable: false  # Requires semantic analysis
      tier_b_detectable: true   # LLM can identify pattern
      tier_c_detectable: true   # Economic analysis shows risk

statistics:
  total_findings: 2
  by_severity:
    critical: 1
    high: 0
    medium: 1
    low: 0
  by_class:
    access_control: 2
