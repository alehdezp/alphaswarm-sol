description: |
  Ground Truth Corpus for E2E Validation (IMP-B1 / IMP-K2)

  PURPOSE: External ground truth for validating AlphaSwarm.sol vulnerability detection.
  Ground truth MUST come from sources OUTSIDE our framework to prevent circular validation.

  USAGE:
  1. Run AlphaSwarm.sol detection on target contracts
  2. Compare findings against ground truth
  3. Compute precision/recall metrics
  4. NEVER adjust ground truth based on tool output

minimum_viable_requirements:
  code4rena_contracts: 5      # Target: >=5 contests
  smartbugs_contracts: 3      # Target: >=3 categories
  internal_annotated: 2       # Target: >=2 contracts
  total_findings: 30          # Target: >=30 findings
  current_status:
    code4rena_contests: 10    # EXCEEDS (10 contests, 5 with detailed findings.yaml)
    code4rena_detailed: 5     # MEETS (5 contests with findings.yaml + source.md)
    smartbugs_contracts: 143  # EXCEEDS
    internal_annotated: 4     # EXCEEDS (4 contracts annotated)
    total_findings: 448       # EXCEEDS (443 original + 5 internal)
  imp_k2_compliance:
    status: COMPLETE
    code4rena_with_findings_yaml: 5
    total_code4rena_findings: 19  # From detailed findings.yaml files
    smartbugs_manifest_present: true
    internal_annotations_present: true
    findings_per_code4rena_contest: ">=3 each"

sources:
- name: SmartBugs-curated
  type: academic_benchmark
  trust_level: high
  url: https://github.com/smartbugs/smartbugs-curated
  commit: 230e649123477eff332742a59a1c7cc6dc286cab
  imported: '2026-01-30T12:05:55.920842+00:00'
  contracts: 143
  findings: 207
  manifest_path: ".vrs/corpus/ground-truth/smartbugs/manifest.yaml"
  citation: 'SmartBugs: A Framework to Analyze Solidity Smart Contracts (ACM ESEC/FSE 2020)'
  vulnerability_categories:
    - reentrancy
    - access_control
    - arithmetic
    - unchecked_low_level_calls
    - denial_of_service
    - bad_randomness
    - front_running
    - time_manipulation
    - short_addresses
  annotation_format: |
    Each contract contains:
    - @source: original source URL
    - @author: annotator
    - @vulnerable_at_lines: comma-separated line numbers
    - Inline: // <yes> <report> CATEGORY

