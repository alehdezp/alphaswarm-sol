- id: ext-001
  name: Spot Price Manipulation
  description: Spot price from a single pool without TWAP or multi-source validation.
  scope: Function
  lens:
    - ExternalInfluence
  severity: critical
  match:
    all:
      - property: reads_pool_reserves
        op: eq
        value: true
      - property: price_input_flows_to_value
        op: eq
        value: true
      - property: has_twap_validation
        op: eq
        value: false
      - property: has_multi_source_oracle
        op: eq
        value: false

- id: ext-002
  name: Stale Oracle Data
  description: Oracle reads without freshness or staleness validation.
  scope: Function
  lens:
    - ExternalInfluence
  severity: high
  match:
    all:
      - property: reads_oracle_price
        op: eq
        value: true
    any:
      - property: has_staleness_check
        op: eq
        value: false

- id: ext-003
  name: Chainlink Incomplete Validation
  description: latestRoundData used without full round/answer validation or error handling.
  scope: Function
  lens:
    - ExternalInfluence
  severity: high
  match:
    all:
      - property: calls_chainlink_latest_round_data
        op: eq
        value: true
    any:
      - property: validates_answer_positive
        op: eq
        value: false
      - property: validates_updated_at_recent
        op: eq
        value: false
      - property: validates_answered_in_round_matches_round_id
        op: eq
        value: false
      - property: handles_oracle_revert
        op: eq
        value: false

- id: ext-004
  name: Flash Loan Price Attack
  description: Balance or reserve based pricing without flash loan or snapshot protection.
  scope: Function
  lens:
    - ExternalInfluence
  severity: critical
  match:
    all:
      - property: reads_pool_reserves
        op: eq
        value: true
      - property: balance_used_for_pricing_or_voting
        op: eq
        value: true
    none:
      - property: flash_loan_guard
        op: eq
        value: true
      - property: uses_historical_snapshot
        op: eq
        value: true

