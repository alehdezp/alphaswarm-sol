- id: price-sensitive-frontrun
  name: Price-Sensitive Front-Running
  description: Price-sensitive swaps or trades missing slippage/min-output protections.
  scope: Function
  lens:
    - Ordering
  severity: high
  match:
    all:
      - property: performs_swap_or_trade
        op: eq
        value: true
      - property: affects_price
        op: eq
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - property: writes_state
        op: eq
        value: true
    any:
      - property: risk_missing_slippage_parameter
        op: eq
        value: true
      - property: risk_missing_slippage_check
        op: eq
        value: true

- id: amm-sandwich-vulnerability
  name: AMM Sandwich Vulnerability
  description: AMM interactions missing slippage or deadline protections.
  scope: Function
  lens:
    - Ordering
  severity: high
  match:
    all:
      - property: swap_like
        op: eq
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - property: writes_state
        op: eq
        value: true
    any:
      - property: risk_missing_slippage_parameter
        op: eq
        value: true
      - property: risk_missing_slippage_check
        op: eq
        value: true
      - property: risk_missing_deadline_parameter
        op: eq
        value: true
      - property: risk_missing_deadline_check
        op: eq
        value: true

- id: missing-slippage-protection
  name: Missing Slippage Protection
  description: Swap-like functions without a minimum output/slippage parameter.
  scope: Function
  lens:
    - Ordering
  severity: high
  match:
    all:
      - property: risk_missing_slippage_parameter
        op: eq
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - property: writes_state
        op: eq
        value: true

- id: unprotected-initializer
  name: Unprotected Initializer
  description: |
    **DEPRECATED**: This pattern uses name-based detection (regex on function names).

    **Migration**: Use semantic pattern `upgrade-005-unprotected-initializer` instead.

    Location: `patterns/semantic/upgradeability/upgrade-005-unprotected-initializer.yaml`

    The semantic pattern uses `is_initializer_function` property for name-agnostic detection.

    ---

    Original description: Initializer functions without modifier or initialized-flag guard.
  scope: Function
  lens:
    - Upgradeability
  severity: critical
  status: deprecated
  deprecated_in_favor_of: upgrade-005-unprotected-initializer
  match:
    all:
      - property: label
        op: regex
        value: '(?i)^(initialize|init|setup|__init__)'
      - property: visibility
        op: in
        value: [public, external]
      - property: contract_is_upgradeable
        op: eq
        value: true
      - property: has_initializer_modifier
        op: eq
        value: false
      - property: checks_initialized_flag
        op: eq
        value: false

- id: storage-collision
  name: Storage Layout Collision
  description: Upgradeable contracts with storage layout change risk.
  scope: Contract
  lens:
    - Upgradeability
  severity: critical
  match:
    all:
      - property: semgrep_like_rules
        op: contains_any
        value: ["proxy-storage-collision"]
      - property: upgradeable_without_storage_gap
        op: eq
        value: true

- id: uups-upgrade-authorization
  name: UUPS Upgrade Authorization Missing
  description: UUPS upgrade functions missing access control checks.
  scope: Function
  lens:
    - Upgradeability
  severity: high
  match:
    all:
      - property: is_upgrade_function
        op: eq
        value: true
      - property: contract_is_uups_proxy
        op: eq
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - property: has_access_control
        op: eq
        value: false

- id: uups-upgrade-missing-onlyproxy
  name: UUPS Upgrade Missing onlyProxy
  description: UUPS upgrade functions missing onlyProxy modifier but otherwise access-controlled.
  scope: Function
  lens:
    - Upgradeability
  severity: info
  match:
    all:
      - property: is_upgrade_function
        op: eq
        value: true
      - property: contract_is_uups_proxy
        op: eq
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - property: has_access_control
        op: eq
        value: true
      - property: has_only_proxy_modifier
        op: eq
        value: false

