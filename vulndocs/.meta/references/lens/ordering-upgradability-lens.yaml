        op: eq
        value: false

- id: upg-002
  name: Implementation Not Disabled
  description: Implementation contract missing initializer disable lock.
  scope: Contract
  lens:
    - Upgradeability
  severity: high
  match:
    all:
      - property: is_implementation_contract
        op: eq
        value: true
      - property: initializers_disabled
        op: eq
        value: false

- id: upg-003
