- id: upg-004
  name: Missing Storage Gaps
  description: Upgradeable contracts missing storage gaps.
  scope: Contract
  lens:
    - Upgradeability
  severity: medium
  match:
    all:
      - property: is_upgradeable
        op: eq
        value: true
      - property: upgradeable_without_storage_gap
        op: eq
        value: true
      - property: state_var_count
        op: gt
        value: 0

- id: upg-005
  name: Function Selector Clash
  description: Transparent proxy selector clash risk.
  scope: Contract
  lens:
    - Upgradeability
  severity: medium
  match:
    all:
      - property: proxy_type
        op: eq
        value: transparent

