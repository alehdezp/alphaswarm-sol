  description: Upgradeable storage layout collision risk.
  scope: Contract
  lens:
    - Upgradeability
  severity: critical
  match:
    all:
      - property: semgrep_like_rules
        op: contains_any
        value: ["proxy-storage-collision"]
      - property: upgradeable_without_storage_gap
