- id: value-movement-classic-reentrancy
  name: Classic Reentrancy - State After External Call
  description: External call before state update without reentrancy guard.
  scope: Function
  lens:
    - ValueMovement
    - ExternalInfluence
  severity: critical
  match:
    all:
      - property: visibility
        op: in
        value: [public, external]
      - property: has_external_calls
        op: eq
        value: true
      - property: has_untrusted_external_call
        op: eq
        value: true
      - property: writes_state
        op: eq
        value: true
      - property: state_write_after_external_call
        op: eq
        value: true
    none:
      - property: has_reentrancy_guard
        op: eq
        value: true

- id: value-movement-eth-transfer-reentrancy
  name: ETH Transfer Reentrancy
  description: ETH transfer followed by state updates without a guard.
  scope: Function
  lens:
    - ValueMovement
    - ExternalInfluence
  severity: critical
  match:
    all:
      - property: transfers_eth
        op: eq
        value: true
      - property: state_write_after_external_call
        op: eq
        value: true
    none:
      - property: has_reentrancy_guard
        op: eq
        value: true

- id: value-movement-balance-update-after-transfer
  name: Balance Update After Transfer
  description: Balance or share state updated after external interaction.
  scope: Function
  lens:
    - ValueMovement
  severity: high
  match:
    all:
      - property: state_write_after_external_call
        op: eq
        value: true
      - property: state_write_targets
        op: contains_any
        value: [balance, shares, stake, collateral, debt, liquidity, reserve, pool, vault, position, claimable, pending, reward, asset]

- id: value-movement-loop-reentrancy
  name: Loop Reentrancy Surface
  description: External calls inside loops without protection.
  scope: Function
  lens:
    - ValueMovement
    - ExternalInfluence
  severity: high
  match:
    all:
      - property: external_calls_in_loop
        op: eq
        value: true
      - property: writes_state
        op: eq
        value: true
    none:
      - property: has_reentrancy_guard
        op: eq
        value: true

