- id: auth-120
  name: Unprotected Fallback/Receive
  description: Fallback or receive entrypoints without access control.
  scope: Function
  lens:
    - Authority
  severity: high
  match:
    all:
      - property: has_access_gate
        op: eq
        value: false
    none:
      - property: contract_is_upgradeable
        op: eq
        value: true
    any:
      - property: is_fallback
        op: eq
        value: true
      - property: is_receive
        op: eq
        value: true

- id: auth-042
  name: Weak Authentication Source
  description: Access control based on weak or manipulable sources.
  scope: Function
  lens:
    - Authority
  severity: medium
  match:
    all:
      - property: access_control_weak_source
        op: eq
        value: true
      - property: has_access_gate
        op: eq
        value: true

- id: auth-043
  name: Time-Based Access Control
  description: Access control uses block.timestamp checks.
  scope: Function
  lens:
    - Authority
  severity: medium
  match:
    all:
      - property: time_based_access_control
        op: eq
        value: true

- id: auth-044
  name: Governance Without Timelock
  description: Governance operations without timelock protection.
  scope: Contract
  lens:
    - Authority
  severity: high
  match:
    all:
      - property: has_governance
        op: eq
        value: true
      - property: has_timelock
        op: eq
        value: false
