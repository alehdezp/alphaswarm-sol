- id: auth-001
  name: Unprotected State Writer
  description: Public/external state changes without access control.
  scope: Function
  lens:
    - Authority
  severity: critical
  match:
    all:
      - property: visibility
        op: in
        value: [public, external]
      - property: writes_state
        op: eq
        value: true
      - property: has_access_gate
        op: eq
        value: false
      - property: has_access_modifier
        op: eq
        value: false
      - property: has_require_msg_sender
        op: eq
        value: false
      - property: has_only_owner
        op: eq
        value: false
      - property: has_only_role
        op: eq
        value: false

- id: auth-002
  name: tx.origin Authentication
  description: Access control relying on tx.origin checks.
  scope: Function
  lens:
    - Authority
  severity: high
  match:
    all:
      - property: uses_tx_origin
        op: eq
        value: true
      - property: tx_origin_in_require
        op: eq
        value: true

- id: auth-003
  name: Missing Signature Validation
  description: ecrecover without full validation (zero address, domain, nonce, deadline, v/s).
  scope: Function
  lens:
    - Authority
  severity: high
  match:
    all:
      - property: uses_ecrecover
        op: eq
        value: true
    any:
      - property: checks_zero_address
        op: eq
        value: false
      - property: has_deadline_check
        op: eq
        value: false
      - property: has_nonce_parameter
        op: eq
        value: false
      - property: uses_domain_separator
        op: eq
        value: false
      - property: checks_sig_v
        op: eq
        value: false
      - property: checks_sig_s
        op: eq
        value: false

- id: auth-004
  name: Signature Replay Vulnerability
  description: Signature verification missing nonce tracking.
  scope: Function
  lens:
    - Authority
  severity: high
  match:
    all:
      - property: uses_ecrecover
        op: eq
        value: true
    any:
      - property: has_nonce_parameter
        op: eq
        value: false
      - property: writes_nonce_state
        op: eq
        value: false

- id: auth-005
  name: Centralization Single Point of Failure
  description: Privileged operations without timelock or multisig.
  scope: Contract
  lens:
    - Authority
  severity: high
  match:
    all:
      - property: has_privileged_operations
        op: eq
        value: true
      - property: owner_is_single_address
        op: eq
        value: true
      - property: has_timelock
        op: eq
        value: false
      - property: has_multisig
        op: eq
        value: false

- id: auth-006
  name: Unprotected Initializer
  description: Public initializer without initializer modifier or init guard.
  scope: Function
  lens:
    - Authority
  severity: critical
  match:
    all:
      - property: is_initializer_function
        op: eq
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - property: has_initializer_modifier
        op: eq
        value: false
      - property: checks_initialized_flag
        op: eq
        value: false

- id: auth-007
  name: Privilege Escalation Path
  description: Role changes with self-modification and no access gate.
  scope: Function
  lens:
