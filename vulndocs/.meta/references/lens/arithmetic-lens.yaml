- id: arith-001
  name: Unchecked Arithmetic
  description: Unchecked arithmetic with user input or balance impact.
  scope: Function
  lens:
    - Arithmetic
  severity: high
  cwe: [190, 191]
  match:
    all:
      - property: has_unchecked_block
        op: eq
        value: true
      - property: unchecked_contains_arithmetic
        op: eq
        value: true
    any:
      - property: unchecked_operand_from_user
        op: eq
        value: true
      - property: unchecked_affects_balance
        op: eq
        value: true

- id: arith-002
  name: Division Before Multiplication
  description: Division ordered before multiplication in financial contexts.
  scope: Function
  lens:
    - Arithmetic
  severity: medium
  cwe: [682]
  match:
    all:
      - property: has_division
        op: eq
        value: true
      - property: has_multiplication
        op: eq
        value: true
      - property: division_before_multiplication
        op: eq
        value: true
      - property: in_financial_context
        op: eq
        value: true

- id: arith-003
  name: Unsafe Narrowing Cast
  description: Narrowing casts without bounds validation.
  scope: Function
  lens:
    - Arithmetic
  severity: medium
  cwe: [681]
  match:
    all:
      - property: has_explicit_cast
        op: eq
        value: true
      - property: cast_is_narrowing
        op: eq
        value: true
    none:
      - property: has_bounds_check_before_cast
        op: eq
        value: true

- id: arith-004
