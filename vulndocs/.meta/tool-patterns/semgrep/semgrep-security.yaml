- id: semgrep-security-accessible-selfdestruct
  name: accessible-selfdestruct
  description: Contract can be destructed by anyone in $FUNC
  scope: Function
  lens:
  - Semgrep
  - Security
  severity: high
  match:
    all:
    - property: semgrep_like_rules
      op: contains_any
      value:
      - accessible-selfdestruct
