# =============================================================================
# PATTERN: crypto-001-insecure-signature-validation
# =============================================================================

id: crypto-001
vulndoc: crypto/signature
name: Insecure Signature Validation
description: |
  ## What This Detects
  Functions using ecrecover for signature verification that are missing critical security checks.
  Complete signature validation requires multiple defenses against different attack vectors:

  1. **Zero Address Check**: ecrecover returns address(0) on invalid signatures
  2. **S-Value Malleability Check**: Same message can have two valid ECDSA signatures
  3. **V-Value Validation**: V must be 27 or 28 for valid Ethereum signatures
  4. **Replay Protection**: Nonce or consumed flag prevents signature reuse
  5. **Expiration**: Deadline parameter limits signature validity window
  6. **Chain ID**: Prevents cross-chain replay attacks

  Missing ANY of these checks creates exploitable vulnerabilities.

  ## Why It's Dangerous
  Signature validation flaws enable multiple attack vectors:

  - **Zero Address Attack**: Invalid signature returns address(0), bypassing authorization if owner == address(0)
  - **Malleability Attack**: Attacker generates alternate valid signature, bypassing nonce-based replay protection
  - **Replay Attack**: Same signature reused infinitely or across chains/contracts
  - **Stale Signature Attack**: Old authorized signature used after privileges should have expired

  Real-world impact includes wallet compromises, unauthorized fund transfers, privilege escalation,
  and cross-chain exploits (millions in losses).

  ## Detection Logic
  This pattern triggers when a function:

  1. Uses ecrecover for signature verification (uses_ecrecover = true)
  2. Is externally callable (visibility = public/external)
  3. Missing ANY critical check:
     - checks_zero_address = false (no address(0) validation)
     - checks_sig_s = false (no s-value malleability protection)
     - checks_sig_v = false (no v-value validation)
     - reads_nonce_state OR writes_nonce_state = false (no replay protection)
     - has_deadline_parameter = false (no expiration)
     - uses_chainid = false (no chain ID in signature hash)

  Functions are excluded (safe) if:
  - has_signature_validity_checks = true (comprehensive validation present)
  - is_view OR is_pure = true (read-only, no state changes)

  ## Real-World Examples

  - **OpenZeppelin ECDSA Advisory (GHSA-4h98-2769-gh6h)**: Signature malleability in ECDSA library
  - **Vyper CVE-2023-37902**: ecrecover returning undefined data on invalid signatures
  - **Multiple Wallet Hacks**: Missing zero address checks leading to unauthorized access
  - **Cross-Chain Replay Attacks**: Missing chain ID validation enabling multi-chain exploits
  - **DeFi Protocol Vulnerabilities**: Missing deadline checks allowing stale permit signatures

  Common audit finding severity: **High to Critical** depending on context

scope: Function

lens:
  - Crypto

severity: high

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    - property: uses_ecrecover
      op: eq
      value: true
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE vulnerability must be present (OR logic)
  any:
    # Missing zero address check (SWC-117, critical)
    - property: checks_zero_address
      op: eq
      value: false

    # Missing s-value malleability check (SWC-117, medium-high)
    - property: checks_sig_s
      op: eq
      value: false

    # Missing v-value validation (best practice)
    - property: checks_sig_v
      op: eq
      value: false

    # Missing replay protection (SWC-121, high)
    - property: reads_nonce_state
      op: eq
      value: false

    # Missing replay protection (alternative check)
    - property: writes_nonce_state
      op: eq
      value: false

    # Missing deadline/expiration (medium)
    - property: has_deadline_parameter
      op: eq
      value: false

    # Missing chain ID (cross-chain replay, medium)
    - property: uses_chainid
      op: eq
      value: false

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # OpenZeppelin ECDSA library or equivalent (has all checks)
    - property: has_signature_validity_checks
      op: eq
      value: true

    # Read-only functions (no state changes, lower risk)
    - property: is_view
      op: eq
      value: true

    - property: is_pure
      op: eq
      value: true

