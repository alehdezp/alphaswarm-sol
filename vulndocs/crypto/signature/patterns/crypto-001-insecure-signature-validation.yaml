# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: Zero Address Authorization Bypass
    description: Attacker submits invalid signature that causes ecrecover to return address(0)
    preconditions:
      - Function uses ecrecover without checking for address(0)
      - Authorization check compares recovered address to owner/authorized address
      - Owner/authorized address could theoretically be address(0) (edge case)
    steps:
      - Attacker crafts invalid signature (wrong v, r, s values)
      - Calls function with invalid signature
      - ecrecover returns address(0) instead of reverting
      - If owner is uninitialized or check is flawed, authorization passes
      - Attacker executes privileged action
    impact: Complete authorization bypass, privilege escalation, fund theft

  - name: Signature Malleability Attack
    description: Attacker generates alternate valid signature to bypass nonce-based replay protection
    preconditions:
      - Function uses ecrecover without s-value check
      - Nonce-based replay protection is implemented
      - Same nonce used for both original and flipped signature
    steps:
      - User signs valid transaction with signature (v, r, s)
      - Attacker observes signature in mempool or on-chain
      - Attacker calculates flipped signature (v', r, s') where s' = secp256k1_order - s
      - Both signatures are valid for same message hash
      - If original signature consumed nonce, flipped signature bypasses nonce check
      - Attacker executes unauthorized action with flipped signature
    impact: Replay attack bypassing nonce protection, double-spending, unauthorized transfers

  - name: Infinite Replay Attack
    description: Valid signature can be replayed infinitely due to missing nonce/deadline checks
    preconditions:
      - Function uses ecrecover without nonce tracking
      - No deadline/expiration parameter
      - No consumed signature tracking (mapping)
    steps:
      - User signs valid authorization once
      - Attacker captures signature (from transaction, API, etc.)
      - Attacker replays same signature multiple times
      - Each replay succeeds because no nonce prevents reuse
      - Attacker drains funds or repeatedly executes privileged action
    impact: Unlimited replay of authorized actions, fund drainage, privilege abuse

  - name: Cross-Chain Replay Attack
    description: Signature valid on one chain is replayed on another chain
    preconditions:
      - Function uses ecrecover without chain ID in signature hash
      - Same contract deployed on multiple chains (mainnet, L2s, testnets)
      - User signs transaction on one chain
    steps:
      - User signs valid transaction on Chain A
      - Attacker observes signature
      - Attacker replays exact same signature on Chain B
      - Signature is valid because chain ID not part of hash
      - Attacker executes unauthorized action on Chain B
    impact: Cross-chain fund theft, unauthorized actions on multiple chains

  - name: Stale Signature Attack
    description: Old authorized signature used after authorization should have expired
    preconditions:
      - Function uses ecrecover without deadline parameter
      - User's authorization status changes (revoked, expired, etc.)
      - Old signature still valid
    steps:
      - User signs transaction with valid authorization
      - User's privileges are later revoked (owner change, role removal)
      - Attacker uses old signature after revocation
      - Signature is still valid because no expiration
      - Attacker executes now-unauthorized action
    impact: Privilege escalation using stale authorization, post-revocation access

# How to further verify this is not a false positive
verification_steps:
  - "Verify function actually uses signature for authorization/authentication (not just logging)"
  - "Check if OpenZeppelin ECDSA library is used (includes all checks)"
  - "Confirm missing checks are not implemented elsewhere in codebase"
  - "Verify signature is used for privileged operations (not just informational)"
  - "Check if function modifies critical state or transfers value"
  - "Assess impact if authorization were bypassed"
  - "Review signature construction to ensure no hidden validations"
  - "Check for external validation (EIP-712 domain separator, etc.)"

# Recommended fixes
fix_recommendations:
  - name: Use OpenZeppelin ECDSA Library
    description: Industry-standard library with all signature checks built-in
    example: |
      // RECOMMENDED: Use OpenZeppelin ECDSA library
      import "@openzeppelin/contracts/utils/cryptography/ECDSA.sol";

      function executeWithSignature(
          address target,
          bytes memory data,
          uint256 deadline,
          bytes memory signature
      ) external {
          require(block.timestamp <= deadline, "Expired");

          bytes32 hash = keccak256(abi.encodePacked(
              target,
              data,
              nonces[msg.sender]++,
              block.chainid
          )).toEthSignedMessageHash();

          // OpenZeppelin ECDSA handles all checks:
          // - Zero address check
          // - S-value malleability check
          // - V-value validation
          address signer = ECDSA.recover(hash, signature);

          require(signer == owner, "Not owner");
          (bool success,) = target.call(data);
          require(success);
      }

  - name: Manual Comprehensive Validation
    description: If not using library, implement all checks manually
    example: |
      // Manual validation (if OpenZeppelin not available)
      function verifySignature(
          bytes32 hash,
          uint8 v,
          bytes32 r,
          bytes32 s
      ) internal pure returns (address) {
          // 1. V-value check
          require(v == 27 || v == 28, "Invalid v");

          // 2. S-value malleability check
          require(
              uint256(s) <= 0x7FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF5D576E7357A4501DDFE92F46681B20A0,
              "Invalid s"
          );

          // 3. Recover signer
          address signer = ecrecover(hash, v, r, s);

          // 4. Zero address check
          require(signer != address(0), "Invalid signature");

          return signer;
      }

      mapping(address => uint256) public nonces;

      function executeWithSignature(
          address target,
          bytes memory data,
          uint256 deadline,
          uint8 v,
          bytes32 r,
          bytes32 s
      ) external {
          // 5. Deadline check
          require(block.timestamp <= deadline, "Expired");

          // 6. Include chain ID in hash
          bytes32 hash = keccak256(abi.encodePacked(
              target,
              data,
              nonces[msg.sender]++, // 7. Nonce for replay protection
              block.chainid
          ));

          address signer = verifySignature(hash, v, r, s);
          require(signer == owner, "Not owner");

          (bool success,) = target.call(data);
          require(success);
      }

  - name: EIP-712 Structured Data Hashing
    description: Use EIP-712 for type-safe signature construction
    example: |
      // EIP-712 implementation
      bytes32 public constant DOMAIN_TYPEHASH = keccak256(
          "EIP712Domain(string name,string version,uint256 chainId,address verifyingContract)"
      );

      bytes32 public constant PERMIT_TYPEHASH = keccak256(
          "Permit(address owner,address spender,uint256 value,uint256 nonce,uint256 deadline)"
      );

      bytes32 public immutable DOMAIN_SEPARATOR;

      constructor() {
          DOMAIN_SEPARATOR = keccak256(abi.encode(
              DOMAIN_TYPEHASH,
              keccak256(bytes("MyToken")),
              keccak256(bytes("1")),
              block.chainid,
              address(this)
          ));
      }

      function permit(
          address owner,
          address spender,
          uint256 value,
          uint256 deadline,
          uint8 v,
          bytes32 r,
          bytes32 s
      ) external {
          require(block.timestamp <= deadline, "Expired");

          bytes32 structHash = keccak256(abi.encode(
              PERMIT_TYPEHASH,
              owner,
              spender,
              value,
              nonces[owner]++,
              deadline
          ));

          bytes32 hash = keccak256(abi.encodePacked(
              "\x19\x01",
              DOMAIN_SEPARATOR,
              structHash
          ));

          address signer = ECDSA.recover(hash, v, r, s);
          require(signer == owner, "Invalid signature");

          // Execute permit logic
      }

  - name: Add Signature Consumed Tracking
    description: Track used signatures in mapping to prevent replay
    example: |
      mapping(bytes32 => bool) public consumedSignatures;

      function executeWithSignature(
          bytes32 hash,
          bytes memory signature
      ) external {
          bytes32 sigHash = keccak256(signature);
          require(!consumedSignatures[sigHash], "Signature already used");

          address signer = ECDSA.recover(hash, signature);
          require(signer != address(0) && signer == owner, "Invalid");

          consumedSignatures[sigHash] = true;

          // Execute action
      }

