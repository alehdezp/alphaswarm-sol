# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: Stale Signature Attack (Missing Deadline)
    description: |
      Attacker uses old permit signature after user's intention has changed or
      authorization should have expired
    preconditions:
      - Permit function accepts deadline parameter but doesn't validate it
      - User signed permit with future deadline
      - User's authorization status changed (revoked approval, changed mind, etc.)
    steps:
      - "User signs permit signature with deadline far in future"
      - "User later revokes approval or changes mind about authorization"
      - "Attacker observes original signature (from mempool, logs, API)"
      - "Attacker submits permit() with old signature and original deadline"
      - "Permit succeeds because deadline not checked (require(block.timestamp <= deadline) missing)"
      - "Attacker gains approval and transfers user's tokens without permission"
    impact: |
      Unauthorized token approvals using expired signatures, token theft, loss of user control

  - name: Infinite Replay Attack (Missing Nonce)
    description: |
      Attacker replays the same permit signature multiple times because nonce is not
      incremented, allowing unlimited approvals
    preconditions:
      - Permit function doesn't increment nonce mapping
      - Permit function uses hardcoded nonce (0) or doesn't include nonce in hash
      - User signs valid permit once
    steps:
      - "User signs valid permit signature for one-time approval"
      - "Attacker captures signature from transaction or API"
      - "Attacker submits permit() with original signature"
      - "First permit succeeds and grants approval"
      - "Attacker submits same permit() again with identical signature"
      - "Second permit succeeds because nonce not incremented (nonces[owner]++ missing)"
      - "Attacker repeats infinitely, gaining approvals each time"
      - "Attacker drains user's tokens by repeatedly refreshing approval"
    impact: |
      Unlimited replay of single signature, infinite approvals, complete token drainage

  - name: Cross-Contract Replay (Missing Domain Separator)
    description: |
      Signature intended for Token A can be replayed on Token B because domain
      separator not used to bind signature to specific contract
    preconditions:
      - Permit function doesn't use EIP-712 domain separator
      - Multiple tokens with same permit interface deployed
      - User signs permit for Token A
    steps:
      - "User signs permit for Token A to approve Spender X"
      - "Attacker observes signature"
      - "Attacker submits same signature to Token B's permit() function"
      - "Token B validates signature without domain separator (no contract address in hash)"
      - "Signature is valid because not bound to Token A's contract address"
      - "Attacker gains approval on Token B using signature meant for Token A"
      - "Attacker transfers user's Token B balance without authorization"
    impact: |
      Cross-contract signature replay, unauthorized approvals on unintended tokens

  - name: Cross-Chain Replay (Missing Chain ID)
    description: |
      Signature valid on mainnet replayed on L2/sidechain because chain ID not
      included in domain separator
    preconditions:
      - Domain separator doesn't include block.chainid
      - Token deployed on multiple chains (mainnet, Arbitrum, Optimism, Polygon, etc.)
      - User signs permit on one chain
    steps:
      - "User signs permit on Ethereum mainnet"
      - "Token also deployed on Arbitrum with identical code"
      - "Attacker observes mainnet signature"
      - "Attacker replays same signature on Arbitrum's token contract"
      - "Signature validates because chain ID not in domain separator"
      - "Attacker gains approval on Arbitrum using mainnet signature"
      - "Attacker drains user's Arbitrum token balance"
    impact: |
      Cross-chain signature replay, multi-chain token theft, user loses funds on all chains

  - name: Authorization Bypass (Missing Signature Verification)
    description: |
      Permit function missing ecrecover entirely or not using recovered address
      for authorization check
    preconditions:
      - Permit function doesn't use ecrecover
      - Permit function doesn't validate signature authenticity
      - Anyone can call permit with arbitrary parameters
    steps:
      - "Attacker calls permit() with target owner address"
      - "Attacker provides arbitrary v, r, s values (or function doesn't require them)"
      - "Function doesn't verify signature with ecrecover"
      - "Permit succeeds without cryptographic proof of authorization"
      - "Attacker gains approval on victim's behalf"
      - "Attacker transfers victim's tokens"
    impact: |
      Complete authorization bypass, anyone can approve on behalf of anyone, critical vulnerability

# How to further verify this is not a false positive
verification_steps:
  - "Verify function name contains 'permit' and accepts EIP-2612 parameters (owner, spender, value, deadline, v, r, s)"
  - "Check if OpenZeppelin ERC20Permit extension is inherited (includes all checks)"
  - "Manually review function body to confirm which checks are missing:"
  - "  - Deadline: Look for 'require(block.timestamp <= deadline)' or similar"
  - "  - Nonce: Look for 'nonces[owner]++' or 'nonces[owner] += 1'"
  - "  - Domain separator: Look for DOMAIN_SEPARATOR constant/immutable and its usage in hash"
  - "  - Signature: Look for 'ecrecover' call and comparison to owner"
  - "Verify this is not a wrapper/proxy that delegates to safe implementation"
  - "Check if missing checks are implemented in inherited contracts"
  - "Assess exploitability based on token value and deployment chains"
  - "Review if token is deployed on multiple chains (higher cross-chain replay risk)"

# Recommended fixes
fix_recommendations:
  - name: Use OpenZeppelin ERC20Permit Extension (RECOMMENDED)
    description: |
      Inherit from OpenZeppelin's ERC20Permit which provides a complete, audited
      EIP-2612 implementation with all security checks
    example: |
      // RECOMMENDED: Use OpenZeppelin ERC20Permit
      import "@openzeppelin/contracts/token/ERC20/extensions/ERC20Permit.sol";

      contract MyToken is ERC20, ERC20Permit {
          constructor()
              ERC20("MyToken", "MTK")
              ERC20Permit("MyToken")
          {}

          // ✓ OpenZeppelin ERC20Permit includes:
          // - Deadline check: require(block.timestamp <= deadline, "Expired")
          // - Nonce management: nonces[owner]++ with public nonces mapping
          // - Domain separator: EIP-712 domain with name, version, chainId, address
          // - Signature validation: ecrecover with zero address check
          // - EIP-2612 compliant PERMIT_TYPEHASH
          // - Full compliance with EIP-2612 standard
      }

  - name: Manual Complete EIP-2612 Implementation
    description: |
      If not using OpenZeppelin, implement ALL required components per EIP-2612 standard
    example: |
      // Manual EIP-2612 implementation (only if OpenZeppelin not available)
      import "@openzeppelin/contracts/utils/cryptography/ECDSA.sol";

      contract MyToken is ERC20 {
          // 1. DOMAIN SEPARATOR with chain ID
          bytes32 public constant DOMAIN_TYPEHASH = keccak256(
              "EIP712Domain(string name,string version,uint256 chainId,address verifyingContract)"
          );

          bytes32 public constant PERMIT_TYPEHASH = keccak256(
              "Permit(address owner,address spender,uint256 value,uint256 nonce,uint256 deadline)"
          );

          bytes32 public immutable DOMAIN_SEPARATOR;

          // 2. NONCE MAPPING for replay protection
          mapping(address => uint256) public nonces;

          constructor() {
              DOMAIN_SEPARATOR = keccak256(abi.encode(
                  DOMAIN_TYPEHASH,
                  keccak256(bytes("MyToken")),
                  keccak256(bytes("1")),        // version
                  block.chainid,                // ✓ Chain ID for cross-chain protection
                  address(this)                 // ✓ Contract address for cross-contract protection
              ));
          }

          function permit(
              address owner,
              address spender,
              uint256 value,
              uint256 deadline,
              uint8 v,
              bytes32 r,
              bytes32 s
          ) external {
              // 3. DEADLINE CHECK - prevent stale signatures
              require(block.timestamp <= deadline, "ERC20Permit: expired deadline");

              // 4. Construct EIP-712 hash with domain separator and nonce
              bytes32 structHash = keccak256(abi.encode(
                  PERMIT_TYPEHASH,
                  owner,
                  spender,
                  value,
                  nonces[owner]++,              // ✓ Nonce increment for replay protection
                  deadline
              ));

              bytes32 hash = keccak256(abi.encodePacked(
                  "\x19\x01",
                  DOMAIN_SEPARATOR,             // ✓ Domain separator for cross-contract/chain protection
                  structHash
              ));

              // 5. SIGNATURE VALIDATION with all checks
              address signer = ECDSA.recover(hash, v, r, s);  // ✓ Includes zero address check, s-value check
              require(signer == owner, "ERC20Permit: invalid signature");

              // 6. Grant approval
              _approve(owner, spender, value);
          }
      }

  - name: Add Missing Deadline Check
    description: |
      If only deadline check is missing, add validation at function start
    example: |
      function permit(
          address owner,
          address spender,
          uint256 value,
          uint256 deadline,
          uint8 v,
          bytes32 r,
          bytes32 s
      ) external {
          // ✓ ADD THIS: Deadline check to prevent stale signatures
          require(block.timestamp <= deadline, "ERC20Permit: expired deadline");

          // ... rest of permit logic
      }

  - name: Add Missing Nonce Management
    description: |
      If only nonce management is missing, add nonce mapping and increment
    example: |
      // ✓ ADD THIS: Nonce mapping for replay protection
      mapping(address => uint256) public nonces;

      function permit(
          address owner,
          address spender,
          uint256 value,
          uint256 deadline,
          uint8 v,
          bytes32 r,
          bytes32 s
      ) external {
          require(block.timestamp <= deadline, "Expired");

          bytes32 structHash = keccak256(abi.encode(
              PERMIT_TYPEHASH,
              owner,
              spender,
              value,
              nonces[owner]++,        // ✓ ADD THIS: Increment nonce to prevent replay
              deadline
          ));

          // ... rest of permit logic
      }

  - name: Add Missing Domain Separator
    description: |
      If only domain separator is missing, add EIP-712 domain with chain ID
    example: |
      // ✓ ADD THIS: Domain separator with chain ID
      bytes32 public constant DOMAIN_TYPEHASH = keccak256(
          "EIP712Domain(string name,string version,uint256 chainId,address verifyingContract)"
      );

      bytes32 public immutable DOMAIN_SEPARATOR;

      constructor() {
          DOMAIN_SEPARATOR = keccak256(abi.encode(
              DOMAIN_TYPEHASH,
              keccak256(bytes("MyToken")),
              keccak256(bytes("1")),
              block.chainid,          // ✓ Chain ID prevents cross-chain replay
              address(this)           // ✓ Contract address prevents cross-contract replay
          ));
      }

      function permit(...) external {
          // ...
          bytes32 hash = keccak256(abi.encodePacked(
              "\x19\x01",
              DOMAIN_SEPARATOR,       // ✓ USE DOMAIN_SEPARATOR in hash
              structHash
          ));
          // ...
      }

