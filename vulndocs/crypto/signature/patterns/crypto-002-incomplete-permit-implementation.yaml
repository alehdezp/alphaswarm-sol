  last_tested: "2025-12-31"
  notes: |
    READY pattern - Reliable detection with acceptable accuracy.

    **Strengths:**
    - Detects 15 different incomplete permit implementations
    - Correctly identifies missing deadline, nonce, domain separator, signature checks
    - Handles different parameter orders and signature formats (v,r,s vs bytes)
    - Correctly excludes view, internal, and private functions
    - Works with DAI-style permit variations (holder/expiry naming)

    **Limitations (False Positives - 3):**
    - Builder limitation: ECDSAHelper.recover() not detected as having signature_validity_checks
    - PermitSafeManual, PermitSafeWithTryCatch, PermitVariation4_DaiStyleSafe flagged despite being safe
    - Functions using library-based ECDSA recovery are not recognized as having comprehensive checks

    **Limitations (False Negatives - 2):**
    - Requires "permit" in function name (is_permit_like property limitation)
    - grantApprovalWithSignature and approveViaSignature not detected
    - Pattern misses permit-like functions with non-standard naming conventions

    **Variations Tested:**
    - Different parameter ordering
    - Bytes signature format vs v,r,s
    - DAI-style naming (holder/expiry vs owner/deadline)
    - Inherited implementations
    - 4/6 variations handled correctly (66.67%)

    **Production Readiness:**
    - Suitable for production audits with human review
    - False positives require manual verification of ECDSA library usage
    - Consider supplementing with manual checks for non-standard permit naming
    - Precision (83.33%) and recall (88.24%) acceptable for HIGH severity pattern

