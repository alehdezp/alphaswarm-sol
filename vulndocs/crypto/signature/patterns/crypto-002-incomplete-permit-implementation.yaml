# =============================================================================
# PATTERN: crypto-002-incomplete-permit-implementation
# =============================================================================

id: crypto-002
vulndoc: crypto/signature
name: Incomplete EIP-2612 Permit Implementation

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Incomplete or insecure implementations of EIP-2612 permit functions that allow gasless
  token approvals via signatures. A complete permit implementation requires multiple
  security components:

  1. **Deadline Check**: Validates signature expiration (prevents stale signature attacks)
  2. **Nonce Management**: Increments nonce mapping (prevents signature replay attacks)
  3. **Domain Separator**: Uses EIP-712 domain separation (prevents cross-contract/cross-chain replay)
  4. **Signature Validation**: Uses ecrecover with proper checks (prevents unauthorized approvals)

  Missing ANY of these components creates critical vulnerabilities that enable various
  attack vectors including replay attacks, cross-chain exploits, and stale signature abuse.

  ## Why It's Dangerous
  Permit functions are high-value targets because they grant token approvals without gas costs,
  making them attractive attack vectors:

  - **Stale Signature Attack**: Without deadline checks, old signatures remain valid forever,
    allowing attackers to use expired authorizations
  - **Infinite Replay Attack**: Without nonce management, the same signature can be replayed
    repeatedly to drain user funds
  - **Cross-Contract Replay**: Without domain separator, signatures intended for one contract
    can be replayed on another contract with identical permit interface
  - **Cross-Chain Replay**: Without chain ID in domain separator, signatures valid on one chain
    (mainnet) can be replayed on L2s/sidechains
  - **Authorization Bypass**: Without proper signature validation, attackers can forge approvals

  EIP-2612 is a powerful feature but MUST be implemented correctly per the standard. Incomplete
  implementations are a common high/critical severity finding in security audits.

  ## Detection Logic
  This pattern triggers when a function:

  **MUST have (core permit detection):**
  1. `is_permit_like = true` (function is semantically a permit implementation)
  2. `visibility in [public, external]` (externally callable)

  **AND missing ANY critical component (vulnerability present):**
  3. `has_deadline_check = false` (missing deadline validation)
  4. `writes_nonce_state = false` (missing nonce increment)
  5. `uses_domain_separator = false` (missing EIP-712 domain separator)
  6. `uses_ecrecover = false` (missing signature verification entirely)

  **EXCLUDE (safe patterns):**
  - `is_view = true` OR `is_pure = true` (read-only functions)
  - `has_signature_validity_checks = true` (comprehensive validation present)

  ## Real-World Examples
  - Multiple DeFi protocols with permit replay vulnerabilities (medium-high severity findings)
  - Cross-chain permit replay attacks on multi-chain token deployments
  - Stolen approvals via incomplete permit implementations
  - Common audit finding: Missing deadline check, missing nonce, missing domain separator
  - Several tokens with broken permit() that don't follow EIP-2612 standard

  EIP-2612 permit vulnerabilities are frequently discovered in audits by Trail of Bits,
  OpenZeppelin, Consensys Diligence, and other top firms.

scope: Function

lens:
  - Crypto

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Core permit detection - function is permit-like
    - property: is_permit_like
      op: eq
      value: true

    # Must be externally callable to be exploitable
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE vulnerability must be present (OR logic)
  any:
    # Missing deadline check - allows stale signature attacks
    - property: has_deadline_check
      op: eq
      value: false

    # Missing nonce management - allows infinite replay attacks
    - property: writes_nonce_state
      op: eq
      value: false

    # Missing domain separator - allows cross-contract/cross-chain replay
    - property: uses_domain_separator
      op: eq
      value: false

    # Missing signature verification entirely - critical vulnerability
    - property: uses_ecrecover
      op: eq
      value: false

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Complete signature validation includes deadline + ecrecover + zero address check
    - property: has_signature_validity_checks
      op: eq
      value: true

    # Read-only functions (no state changes, lower risk)
    - property: is_view
      op: eq
      value: true

    - property: is_pure
      op: eq
      value: true

