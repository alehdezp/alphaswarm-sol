# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Complete Airdrop Takeover"
    description: |
      Attacker calls unprotected setMerkleRoot with their own tree containing only
      their address as a valid claimant, then claims all airdrop tokens allocated
      to thousands of legitimate users.
    preconditions:
      - "Merkle root update function is public/external"
      - "No access control on root update"
      - "Airdrop contract uses Merkle proofs for claim validation"
    steps:
      - "Generate malicious Merkle tree with only attacker address eligible for max claims"
      - "Calculate root hash of malicious tree"
      - "Call unprotected setMerkleRoot(maliciousRoot)"
      - "Generate Merkle proof for attacker address from malicious tree"
      - "Call claim() with proof, draining entire airdrop allocation"
    impact: "Complete theft of all airdrop tokens (potentially millions in value)"

  - name: "Whitelist Bypass and Unlimited Minting"
    description: |
      Attacker replaces whitelist Merkle root with their own tree, granting
      themselves unlimited mint allowance or bypassing mint restrictions entirely.
    preconditions:
      - "NFT/token mint uses Merkle proof for whitelist validation"
      - "Merkle root can be updated without access control"
    steps:
      - "Generate Merkle tree with attacker address whitelisted for unlimited mints"
      - "Call unprotected updateWhitelistRoot(maliciousRoot)"
      - "Generate proof for attacker with max mint allowance"
      - "Mint unlimited tokens/NFTs using fraudulent proof"
      - "Sell minted assets or drain protocol value"
    impact: "Bypass mint limits, steal whitelist spots, unlimited token creation"

  - name: "Cross-Chain Bridge Exploitation (Nomad-Style)"
    description: |
      Attacker manipulates bridge Merkle root to validate fraudulent cross-chain
      messages, withdrawing assets that were never legitimately bridged.
    preconditions:
      - "Bridge uses Merkle proofs to validate cross-chain messages"
      - "Trusted root can be modified without authorization"
      - "Bridge holds significant locked assets"
    steps:
      - "Set Merkle root to 0x00 or attacker-controlled value"
      - "Craft fraudulent cross-chain withdrawal messages"
      - "Submit messages with fake proofs (any proof passes with 0x00 root)"
      - "Withdraw assets from bridge that were never deposited"
      - "Repeat until bridge is fully drained"
    impact: "Complete bridge drainage ($190M in Nomad Bridge case)"

  - name: "Dividend/Reward Claim Manipulation"
    description: |
      Attacker replaces reward distribution Merkle root to claim all allocated
      rewards for themselves, denying legitimate stakeholders.
    preconditions:
      - "Reward/dividend distribution uses Merkle tree for eligibility"
      - "Root can be updated without governance approval"
    steps:
      - "Wait for reward period with high token allocation"
      - "Generate Merkle tree where attacker receives all rewards"
      - "Call unprotected setRewardRoot(maliciousRoot)"
      - "Claim all rewards using proof from malicious tree"
      - "Legitimate users cannot claim (proofs invalid against new root)"
    impact: "Theft of all reward/dividend allocations, denial of service to legitimate claimants"

  - name: "MEV Frontrunning of Merkle Root Updates"
    description: |
      Even if updates are protected, MEV bots can frontrun legitimate root updates
      with malicious ones if the protection is weak (e.g., only time-based).
    preconditions:
      - "Root update has weak temporal protection (cooldown period)"
      - "No cryptographic commitment to legitimate root"
    steps:
      - "Monitor mempool for legitimate setMerkleRoot transactions"
      - "Frontrun with higher gas to set malicious root first"
      - "Execute malicious claims before legitimate root can be set"
      - "Protocol team forced to deploy emergency pause or new contract"
    impact: "Race condition exploitation, temporary fund theft, protocol disruption"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm the function is public/external (not internal helper)"
  - "Verify the state variable being modified contains 'merkle', 'root', 'proof', or similar cryptographic commitment tokens"
  - "Check if variable is used in claim/verify/validate functions with Merkle proof verification"
  - "Ensure there is NO access control in modifiers or function body (no onlyOwner, onlyAdmin, require(msg.sender == X))"
  - "Verify this is NOT a constructor or initializer (one-time setup is acceptable)"
  - "Look for missing multi-sig, timelock, or governance requirements"
  - "Check if the contract uses OpenZeppelin MerkleProof.verify or similar libraries"
  - "Examine claim/mint functions to understand the impact of a malicious root"
  - "Review if there are multiple Merkle roots for different purposes (airdrop vs whitelist)"

# Recommended fixes
fix_recommendations:
  - name: "Add onlyOwner/onlyAdmin Modifier"
    description: "Restrict Merkle root updates to contract owner or admin only"
    example: |
      // VULNERABLE
      function setMerkleRoot(bytes32 newRoot) external {
          merkleRoot = newRoot;
      }

      // SAFE - Owner-only access
      function setMerkleRoot(bytes32 newRoot) external onlyOwner {
          merkleRoot = newRoot;
      }

  - name: "Require Multi-Sig or Governance Approval"
    description: "Use multi-signature wallet or DAO governance for critical root updates"
    example: |
      // SAFE - Multi-sig required
      address public immutable multiSig;

      function setMerkleRoot(bytes32 newRoot) external {
          require(msg.sender == multiSig, "Only multisig can update root");
          merkleRoot = newRoot;
          emit MerkleRootUpdated(newRoot, block.timestamp);
      }

      // SAFE - Governance vote required
      function setMerkleRoot(bytes32 newRoot) external onlyGovernance {
          require(governanceApproved[newRoot], "Root not approved by governance");
          merkleRoot = newRoot;
      }

  - name: "Implement Two-Step Update with Timelock"
    description: "Require proposal + execution delay for root changes to allow community review"
    example: |
      // SAFE - Two-step process with delay
      struct PendingRootUpdate {
          bytes32 newRoot;
          uint256 executionTime;
          bool executed;
      }

      PendingRootUpdate public pendingUpdate;
      uint256 public constant UPDATE_DELAY = 2 days;

      function proposeRootUpdate(bytes32 newRoot) external onlyOwner {
          pendingUpdate = PendingRootUpdate({
              newRoot: newRoot,
              executionTime: block.timestamp + UPDATE_DELAY,
              executed: false
          });
          emit RootUpdateProposed(newRoot, block.timestamp + UPDATE_DELAY);
      }

      function executeRootUpdate() external {
          require(pendingUpdate.executionTime > 0, "No pending update");
          require(block.timestamp >= pendingUpdate.executionTime, "Delay not elapsed");
          require(!pendingUpdate.executed, "Already executed");

          merkleRoot = pendingUpdate.newRoot;
          pendingUpdate.executed = true;
          emit MerkleRootUpdated(merkleRoot, block.timestamp);
      }

      function cancelRootUpdate() external onlyOwner {
          delete pendingUpdate;
          emit RootUpdateCancelled(block.timestamp);
      }

  - name: "Make Merkle Root Immutable After Initialization"
    description: "Set root once during deployment/initialization, then make it immutable"
    example: |
      // SAFE - Immutable root (best for airdrops with predetermined eligibility)
      bytes32 public immutable merkleRoot;

      constructor(bytes32 _merkleRoot) {
          merkleRoot = _merkleRoot;
      }

      // Or with initializer for proxy patterns
      bytes32 public merkleRoot;
      bool private rootInitialized;

      function initialize(bytes32 _merkleRoot) external {
          require(!rootInitialized, "Already initialized");
          merkleRoot = _merkleRoot;
          rootInitialized = true;
      }

  - name: "Add Versioning and Historical Root Tracking"
    description: "Track root history to detect unauthorized changes and enable rollback"
    example: |
      // SAFE - With versioning and event trail
      struct RootVersion {
          bytes32 root;
          uint256 timestamp;
          address updatedBy;
      }

      RootVersion[] public rootHistory;
      uint256 public currentRootVersion;

      function setMerkleRoot(bytes32 newRoot) external onlyOwner {
          require(newRoot != bytes32(0), "Invalid root");
          require(newRoot != getCurrentRoot(), "Root unchanged");

          rootHistory.push(RootVersion({
              root: newRoot,
              timestamp: block.timestamp,
              updatedBy: msg.sender
          }));

          currentRootVersion = rootHistory.length - 1;
          emit MerkleRootUpdated(newRoot, currentRootVersion, msg.sender);
      }

      function getCurrentRoot() public view returns (bytes32) {
          require(rootHistory.length > 0, "No root set");
          return rootHistory[currentRootVersion].root;
      }

  - name: "Add Emergency Pause with Guardian Veto"
    description: "Allow trusted guardian to pause claims if malicious root detected"
    example: |
      // SAFE - With emergency controls
      address public guardian;
      bool public paused;
      bytes32 public merkleRoot;

      function setMerkleRoot(bytes32 newRoot) external onlyOwner {
          require(!paused, "Contract paused");
          merkleRoot = newRoot;
          emit MerkleRootUpdated(newRoot);
      }

      function emergencyPause() external {
          require(msg.sender == guardian || msg.sender == owner(), "Unauthorized");
          paused = true;
          emit EmergencyPause(msg.sender);
      }

      function claim(bytes32[] calldata proof, uint256 amount) external {
          require(!paused, "Claims paused");
          require(MerkleProof.verify(proof, merkleRoot,
                  keccak256(abi.encodePacked(msg.sender, amount))),
                  "Invalid proof");
          // ... claim logic
      }

  - name: "Bind Merkle Root to Additional Metadata"
    description: "Cryptographically bind root to expected claim total, version, or IPFS hash"
    example: |
      // SAFE - With integrity checks
      struct MerkleDistribution {
          bytes32 root;
          uint256 totalClaimable;
          string ipfsHash;  // Points to full tree data
          uint256 version;
      }

      MerkleDistribution public distribution;

      function setMerkleRoot(
          bytes32 newRoot,
          uint256 totalClaimable,
          string calldata ipfsHash
      ) external onlyOwner {
          require(newRoot != bytes32(0), "Invalid root");
          require(totalClaimable > 0, "Invalid total");
          require(bytes(ipfsHash).length > 0, "Missing IPFS hash");

          distribution = MerkleDistribution({
              root: newRoot,
              totalClaimable: totalClaimable,
              ipfsHash: ipfsHash,
              version: distribution.version + 1
          });

          emit MerkleRootUpdated(newRoot, totalClaimable, ipfsHash, distribution.version);
      }

