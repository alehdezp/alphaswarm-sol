# =============================================================================
# PATTERN: merkle-001
# =============================================================================

id: merkle-001
vulndoc: crypto/merkle
name: "Unprotected Merkle Root Update"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Public/external functions that modify Merkle root state variables (used for airdrops,
  whitelists, claim verification, cross-chain bridges) without proper access control,
  allowing any caller to replace the cryptographic commitment and bypass security checks.

  ## Why It's Dangerous
  Merkle roots are cryptographic commitments that serve as the foundation for:
  - **Airdrop eligibility**: Who can claim tokens and how much
  - **Whitelist validation**: Who can participate in sales/mints
  - **Cross-chain message verification**: Bridge security (Nomad Bridge $190M exploit)
  - **Claim proofs**: Dividend distributions, rewards, vesting schedules

  Unprotected modification allows attackers to:
  - Replace the Merkle root with their own tree containing only their address
  - Claim all airdrop tokens allocated to thousands of legitimate users
  - Bypass whitelist restrictions to mint unlimited NFTs/tokens
  - Manipulate cross-chain bridge messages to steal locked assets
  - Drain treasury/reward pools by creating fraudulent claim proofs

  ## Detection Logic
  This pattern uses SEMANTIC detection (name-agnostic) based on VKG's heuristics:

  1. **Function is externally callable** (`visibility: [public, external]`)
  2. **Function writes sensitive config state** (`writes_sensitive_config: true`)
     - Heuristics.py tags variables with "config" when they contain tokens like:
       config, settings, params, parameter, **merkle** (line 64-65)
     - "config" tag triggers `writes_sensitive_config` property (builder.py line 597-609)
  3. **Function modifies state** (`writes_state: true`)
  4. **NO access control present** (`has_access_gate: false`)
  5. **NOT a constructor** (constructors legitimately set initial Merkle roots)

  This detection is COMPLETELY IMPLEMENTATION-AGNOSTIC - it works regardless of:
  - Variable naming (merkleRoot, _root, MERKLE_ROOT, claimRoot, whitelistRoot, proofRoot)
  - Function naming (setRoot, updateRoot, changeMerkleRoot, setMerkleRoot, updateProof)
  - Modifier naming (onlyOwner, onlyAdmin, onlyGovernance, restricted, authorized)

  ## Real-World Examples
  - **Nomad Bridge ($190M, August 2022)**: Merkle root initialized to 0x00 during upgrade,
    allowing anyone to submit fraudulent proofs and drain the bridge
  - **Wayfinder PROMPT Airdrop ($200K, 2024)**: MEV bot exploited lack of msg.sender
    binding in Merkle proofs to frontrun claims and steal airdrop tokens
  - **Merkle Tree Collision Attacks**: 64-byte leaf values can collide with intermediate
    nodes, allowing unauthorized claims (Footium audit finding, Sherlock 2023)
  - **Generic Airdrop Exploits**: Unprotected setMerkleRoot functions found in multiple
    audit reports allow complete takeover of token distributions

scope: Function

lens:
  - Cryptography
  - Authority

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
# Updated 2026-01-02: Documented as EXCELLENT in mega-task (~100%/~100%/~100%)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable to be exploitable
    - property: visibility
      op: in
      value: [public, external]

    # SEMANTIC DETECTION: Writes to config-tagged state variables
    # This is the CORE SIGNAL - completely name-agnostic
    # Heuristics.py tags variables containing: config, settings, params, parameter, merkle
    # Merkle roots are classified as "config" state (line 64-65)
    - property: writes_sensitive_config
      op: eq
      value: true

    # Must actually modify state (not just read)
    - property: writes_state
      op: eq
      value: true

  # At least ONE must match (OR logic) - use for alternatives
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Exclude functions with ANY access control
    - property: has_access_gate
      op: eq
      value: true

    # Exclude constructors (they legitimately set initial Merkle roots)
    - property: is_constructor
      op: eq
      value: true

    # Exclude functions with access modifiers (onlyOwner, onlyRole, etc.)
    - property: has_access_modifier
      op: eq
      value: true

