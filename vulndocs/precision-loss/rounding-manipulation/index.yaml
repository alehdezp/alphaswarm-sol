name: Rounding Direction Manipulation
category: precision-loss
subcategory: rounding-manipulation
severity: critical
prevalence: medium

description: |
  Vulnerabilities arising from inconsistent rounding directions in scaling operations.
  When upscaling and downscaling use different rounding modes (down vs up), repeated
  operations can compound errors, allowing attackers to manipulate invariants and
  extract value through precision loss exploitation.

impact:
  - Protocol invariant manipulation
  - Token price deflation
  - Unauthorized value extraction
  - Pool reserve imbalance
  - Cross-chain amplification (single bug affects multiple chains)

root_cause:
  - Inconsistent rounding directions in scaling operations
  - Violation of "always favor protocol" principle
  - Compounding errors through repeated operations
  - Deferred settlement allowing temporary manipulation

affected_components:
  - Automated Market Makers (AMMs)
  - Stable pools with scaling factors
  - Composable pools (BPT as tradeable token)
  - Multi-token pools with different decimals

detection_difficulty: high
exploit_difficulty: high

