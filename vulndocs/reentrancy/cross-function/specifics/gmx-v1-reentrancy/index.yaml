# =============================================================================
# HISTORICAL CONTEXT
# =============================================================================

historical_context:
  prior_vulnerability_2022: |
    In 2022, GMX had a bug bounty for issues with non-atomic updates of global
    short size and average global short price ($1M bounty paid). The fix for that
    vulnerability introduced THIS new vulnerability, which went unaudited.
    This is a critical lesson: fixes must be security-audited.

  why_it_existed: |
    The vulnerability persisted because:
    1. nonReentrant modifier was assumed to be sufficient (wrong for cross-function)
    2. Circular dependencies between order execution, position tracking, and pricing weren't documented
    3. The refund mechanism wasn't designed to resist malicious callbacks
    4. The fix for the 2022 issue wasn't audited for new attack vectors

  lessons_learned:
    - "Global reentrancy guards are needed for protocols with complex order-book accounting"
    - "Refunds should go to trusted addresses, not arbitrary parameters"
    - "Atomic state updates are critical when interdependent logic exists"
    - "Fixing one vulnerability can introduce another (audit the fix)"
    - "Cross-contract reentrancy is harder to reason about than same-function reentrancy"

# =============================================================================
# VKGJKGRAPH DETECTION SPECIFICS
# =============================================================================

vkg_detection:
  trigger_conditions:
    - |
      FUNCTION properties:
      - visibility = public OR external
      - state_write_after_external_call = true
      - shared_state_variables > 1
      - has_reentrancy_guard = false
      - calls_external_with_value = true

    - |
      OPERATION SEQUENCES:
      - TRANSFERS_VALUE_OUT (via call{value:})
      - Followed by callback opportunity
      - Followed by READS_SHARED_STATE (attacker's re-entrant call)
      - MODIFIES_CRITICAL_STATE observed in attacker's callback

  high_confidence_signals:
    - "state_write_after_external_call AND shared_state_variables > 1 AND NOT has_reentrancy_guard"
    - "calls_external_with_value to dynamic address"
    - "Cross-function shared state accessed in callbacks"

  lower_confidence_signals:
    - "nonReentrant present but only on some functions (false confidence)"
    - "Global lock present but not on all state-modifying functions"

