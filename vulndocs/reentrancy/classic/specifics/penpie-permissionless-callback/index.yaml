# Remediation Guidance
fixes:
  root_cause:
    description: |
      Two contributing factors:
      1. Missing reentrancy guard on batchHarvestMarketRewards()
      2. Trust assumption that permissionlessly-registered markets are benign

      The function was originally admin-only (safe scope) but was changed
      to permissionless without security re-evaluation.

  recommended:
    - fix_id: "add-reentrancy-guard"
      name: "Add nonReentrant Modifier"
      priority: critical
      description: |
        Apply OpenZeppelin's ReentrancyGuard to all functions that make
        external calls before state updates.
      code_pattern: |
        // VULNERABLE
        function batchHarvestMarketRewards(address[] calldata markets) external {
            // ... external calls without guard
        }

        // SAFE
        function batchHarvestMarketRewards(address[] calldata markets)
            external
            nonReentrant
        {
            // ... protected
        }
      effectiveness: "Very High - Prevents reentrancy completely"

    - fix_id: "validate-market-whitelist"
      name: "Whitelist Market Contracts"
      priority: critical
      description: |
        Validate that market addresses are from approved/audited sources.
        Do not trust permissionlessly-created contracts for security-sensitive
        operations.
      code_pattern: |
        // VULNERABLE - trusts any registered market
        for (uint i = 0; i < markets.length; i++) {
            markets[i].redeemRewards();  // Calls arbitrary contract
        }

        // SAFE - validate against whitelist
        for (uint i = 0; i < markets.length; i++) {
            require(isApprovedMarket[markets[i]], "Market not whitelisted");
            markets[i].redeemRewards();
        }
      effectiveness: "High - Prevents malicious contract registration"

    - fix_id: "cei-pattern"
      name: "Follow Checks-Effects-Interactions Pattern"
      priority: high
      description: |
        Calculate all state changes before external calls. Update state,
        then make external calls. This prevents reentrancy from affecting
        state calculations.
      code_pattern: |
        // VULNERABLE - reads state after external call
        amountsBefore = token.balanceOf(this);
        market.redeemRewards();  // EXTERNAL CALL - can reenter!
        amountsAfter = token.balanceOf(this);
        rewards = amountsAfter - amountsBefore;

        // SAFE - use pull pattern or validate expected amounts
        uint expectedReward = market.pendingRewards(address(this));
        market.redeemRewards();
        uint actualReward = token.balanceOf(this) - amountsBefore;
        require(actualReward <= expectedReward * 101 / 100, "Unexpected reward");
      effectiveness: "High - Prevents inflation attacks"

    - fix_id: "scope-change-reaudit"
      name: "Re-audit After Scope Changes"
      priority: high
      description: |
        When changing function access from admin-only to permissionless,
        conduct a full security review. Trust assumptions change when
        anyone can interact with the function.
      effectiveness: "Process - Prevents introduction of vulnerabilities"

