# Penpie Permissionless Callback Reentrancy - Specific Vulnerability
# Discovered via Task 17.3a: Solodit/Exploit DB Crawl (2024-2026)

id: penpie-permissionless-callback
name: Penpie Reentrancy via Permissionless Market Registration
parent_category: reentrancy
parent_subcategory: classic

description: |
  Reentrancy vulnerability in PendleStaking contract where an attacker exploited
  the permissionless market registration feature to register a malicious Pendle
  market with a crafted SY (Standardized Yield) contract. During the reward
  harvesting process in batchHarvestMarketRewards(), the attacker reentered via
  the redeemRewards() callback to deposit additional tokens, inflating reward
  calculations.

  Key insight: The function lacked reentrancy protection AND assumed all
  registered markets were benign (trust assumption on permissionless input).

severity: critical
exploit_severity: critical
confidence_score: 0.97

# Related VKG Properties for Detection
detection:
  graph_signals:
    - property: state_write_after_external_call
      expected: true
      critical: true
      description: "Reward balance updated after external call to market contract"
      confidence: 0.95

    - property: has_reentrancy_guard
      expected: false
      critical: true
      description: "No nonReentrant modifier on batchHarvestMarketRewards"
      confidence: 0.98

    - property: external_call_sites
      expected: ">0"
      critical: true
      description: "Calls to user-controlled/registered contract addresses"
      confidence: 0.95

    - property: visibility
      expected:
        - public
        - external
      critical: true
      description: "Function publicly callable"
      confidence: 0.95

    - property: accepts_external_address_input
      expected: true
      critical: true
      description: "Function accepts market addresses that can be user-registered"
      confidence: 0.90

    - property: iterates_over_external_contracts
      expected: true
      critical: false
      description: "Loops over array of external contract addresses"
      confidence: 0.85

  semantic_operations:
    - CALLS_UNTRUSTED
    - READS_USER_BALANCE
    - WRITES_USER_BALANCE
    - TRANSFERS_VALUE_OUT
    - LOOPS_OVER_ARRAY

  behavioral_signatures:
    - vulnerable: "R:bal[before]->X:untrusted{callback}->W:bal[after]"
      description: "Read balance, call untrusted contract (reenters), write balance"

    - vulnerable: "L:markets->X:market.redeem->W:reward"
      description: "Loop over markets, call redeem (callback), write reward state"

  operation_sequences:
    vulnerable:
      - "R:amountsBefore[j] -> X:market.redeemRewards() -> CALLBACK:depositMarket() -> W:amountsAfter[j]"
      - "ITERATE:markets -> X:untrusted -> W:state (no guard)"

    safe:
      - "G:nonReentrant -> R:amountsBefore -> X:market.redeemRewards() -> W:amountsAfter"
      - "V:isValidMarket(market) -> X:market.redeemRewards() -> W:state"

  false_positive_indicators:
    - "nonReentrant modifier on function"
    - "ReentrancyGuard inherited"
    - "Whitelist validation before external call"
    - "Only admin-registered contracts called (not permissionless)"
    - "CEI pattern: state updates before external calls"

# Attack Mechanism Details
attack_mechanism:
  preconditions:
    - "Ability to register custom Pendle markets (permissionless)"
    - "Access to create malicious SY (Standardized Yield) contract"
    - "Flash loan access for initial liquidity"
    - "Understanding of reward calculation: amountsAfter[j] - amountsBefore[j]"

  attack_steps:
    - step: 1
      phase: "Setup - Deploy Malicious Contracts"
      description: |
        Deploy a malicious SY contract that serves as attack vector.
        Create a fake Pendle market using PendleMarketFactoryV3.
        Register fake market with Penpie via registerPenpiePool().
      operations:
        - "Deploy MaliciousSY contract with reentrant callback"
        - "Create fake Pendle market via factory"
        - "Register market: registerPenpiePool(fakeMarket)"
        - "Obtain fake PRT tokens representing staked position"

    - step: 2
      phase: "Prepare Flash Loan Liquidity"
      description: |
        Obtain flash loans from Balancer and other sources.
        Deposit into malicious SY contract to have tokens for reentrant deposit.
      operations:
        - "Flash loan wstETH, rETH, other assets from Balancer"
        - "Deposit assets into MaliciousSY contract"
        - "Mint fake PT/YT tokens via controlled SY"

    - step: 3
      phase: "Trigger Reentrancy"
      description: |
        Call batchHarvestMarketRewards() which iterates over markets.
        When redeemRewards() is called on fake market, the MaliciousSY
        contract calls back into depositMarket(), adding tokens BEFORE
        amountsAfter is calculated.
      operations:
        - "Call: batchHarvestMarketRewards([fakeMarket])"
        - "Function reads: amountsBefore[j] = token.balanceOf(this)"
        - "Function calls: market.redeemRewards() -> MaliciousSY.callback()"
        - "REENTER: MaliciousSY calls depositMarket(fakeMarket, tokens)"
        - "Deposited tokens inflate balance"
        - "Function reads: amountsAfter[j] = token.balanceOf(this)"
        - "Reward calculation: amountsAfter - amountsBefore = INFLATED"

    - step: 4
      phase: "Extract Inflated Rewards"
      description: |
        Withdraw inflated rewards based on fake balance difference.
        Repay flash loan and extract profit.
      operations:
        - "Receive inflated reward tokens"
        - "Swap reward tokens to ETH"
        - "Repay flash loan"
        - "Keep profit (~$27M across Ethereum + Arbitrum)"

  exploitation_difficulty: "medium-high"
  exploitation_notes: |
    The attack required:
    1. Understanding Penpie's permissionless market registration
    2. Creating compatible malicious SY contract with callback
    3. Knowledge of reward calculation timing vulnerability
    4. Flash loan orchestration across multiple protocols

    The vulnerability existed due to a scope change: batchHarvestMarketRewards
    was originally admin-only but was made permissionless without re-audit.

