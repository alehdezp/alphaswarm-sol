# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Classic Reentrancy Drain"
    description: |
      Attacker exploits CEI violation to recursively drain contract funds
    preconditions:
      - "Contract sends value/tokens before updating balance state"
      - "No reentrancy guard (nonReentrant) present"
      - "External call allows callback (ETH transfer, ERC777 hooks, ERC721 safeTransfer)"
    steps:
      - "Attacker calls vulnerable function (e.g., withdraw(amount))"
      - "Contract calculates withdrawal amount based on stored balance"
      - "Contract sends ETH/tokens to attacker (TRANSFERS_VALUE_OUT)"
      - "Attacker's receive()/fallback()/onERC721Received() callback re-enters"
      - "Balance not yet updated, so check passes again"
      - "Repeat until contract balance is zero"
    impact: "Complete fund drainage - attacker steals all contract holdings"

  - name: "Cross-Function Reentrancy"
    description: |
      Attacker re-enters different function that shares same state
    preconditions:
      - "Function A transfers value before updating state"
      - "Function B reads same state variable"
      - "No reentrancy guard on both functions"
    steps:
      - "Attacker calls Function A (e.g., withdraw)"
      - "Function A sends ETH but hasn't updated balance yet"
      - "Attacker's callback calls Function B (e.g., transfer)"
      - "Function B reads stale balance value"
      - "Both functions operate on inconsistent state"
    impact: "Incorrect state reads, potential fund loss or privilege escalation"

  - name: "Read-Only Reentrancy"
    description: |
      View function is called during reentrancy window, returns stale data
    preconditions:
      - "View function reads balance state"
      - "State-changing function updates balance AFTER external call"
      - "Dependent contract relies on view function for critical logic"
    steps:
      - "Attacker triggers state-changing function"
      - "External call happens before state update"
      - "Attacker's callback calls view function"
      - "View function returns stale/incorrect balance"
      - "Dependent contract (oracle, vault) makes decision on bad data"
    impact: "Oracle manipulation, incorrect price feeds, vault share miscalculation"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function is externally callable (public/external, not internal/private)"
  - "Verify TRANSFERS_VALUE_OUT occurs in CFG BEFORE WRITES_USER_BALANCE"
  - "Check if reentrancy guard is truly absent (not just missing from detection)"
  - "Identify the state variable being written - is it balance/shares/debt?"
  - "Trace call graph: can attacker control callback execution?"
  - "Check for ERC777 (has hooks), ERC721 safeTransfer, or custom callbacks"
  - "Validate this is not intentional initialization pattern"
  - "Consider cross-function reentrancy: do other functions share same state?"

# Recommended fixes
fix_recommendations:
  - name: "Apply CEI (Checks-Effects-Interactions) Pattern"
    description: |
      Update all state variables BEFORE making external calls.
      This is the most reliable fix.
    example: |
      // VULNERABLE CODE
      function withdraw(uint amount) external {
          require(balances[msg.sender] >= amount, "Insufficient balance");
          payable(msg.sender).transfer(amount);  // EXTERNAL CALL FIRST (WRONG!)
          balances[msg.sender] -= amount;        // STATE UPDATE AFTER (WRONG!)
      }

      // FIXED CODE - CEI Pattern
      function withdraw(uint amount) external {
          require(balances[msg.sender] >= amount, "Insufficient balance");
          balances[msg.sender] -= amount;        // STATE UPDATE FIRST
          payable(msg.sender).transfer(amount);  // EXTERNAL CALL AFTER
      }

  - name: "Use ReentrancyGuard"
    description: |
      Add OpenZeppelin's ReentrancyGuard with nonReentrant modifier.
      Provides defense-in-depth even if CEI is violated.
    example: |
      import "@openzeppelin/contracts/security/ReentrancyGuard.sol";

      contract MyContract is ReentrancyGuard {
          mapping(address => uint) public balances;

          function withdraw(uint amount) external nonReentrant {
              require(balances[msg.sender] >= amount);
              // Safe even with wrong ordering - nonReentrant prevents re-entry
              payable(msg.sender).transfer(amount);
              balances[msg.sender] -= amount;
          }
      }

  - name: "Use Pull Payment Pattern"
    description: |
      Instead of pushing funds to users, let them withdraw (pull).
      Eliminates external calls during critical operations.
    example: |
      contract PullPayment {
          mapping(address => uint) public withdrawable;

          function recordPayment(address user, uint amount) internal {
              withdrawable[user] += amount;  // No external call
          }

          function withdraw() external nonReentrant {
              uint amount = withdrawable[msg.sender];
              require(amount > 0, "Nothing to withdraw");
              withdrawable[msg.sender] = 0;  // State update first
              payable(msg.sender).transfer(amount);  // Then transfer
          }
      }

  - name: "Use Safe Transfer Libraries"
    description: |
      When working with tokens, use SafeERC20 to avoid callback hooks
    example: |
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

      contract TokenVault {
          using SafeERC20 for IERC20;

          function withdraw(IERC20 token, uint amount) external {
              balances[msg.sender] -= amount;  // State first
              token.safeTransfer(msg.sender, amount);  // Transfer after
          }
      }

