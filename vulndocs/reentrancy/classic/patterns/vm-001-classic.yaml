# =============================================================================
# PATTERN: vm-001-classic
# Classic Reentrancy via CEI Violation
# =============================================================================

id: vm-001-classic
vulndoc: reentrancy/classic
name: "Classic Reentrancy (CEI Violation)"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  External calls or value transfers occurring BEFORE balance state updates,
  allowing attacker callbacks to re-enter and drain funds. This is the classic
  reentrancy vulnerability pattern that enabled the DAO hack ($60M) and Cream
  Finance exploit ($18M).

  ## Why It's Dangerous

  The attack sequence:
  1. Attacker calls vulnerable function (e.g., withdraw)
  2. Contract sends ETH/tokens BEFORE updating balance state
  3. Attacker's receive()/fallback() callback re-enters the function
  4. Balance check still passes (not yet updated)
  5. Repeat until contract drained

  This violates the Checks-Effects-Interactions (CEI) pattern, which requires
  state updates to occur BEFORE external calls.

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function performs BOTH operations:
     - TRANSFERS_VALUE_OUT (sends ETH/tokens)
     - WRITES_USER_BALANCE (modifies balance state)
  3. CEI violation: TRANSFER occurs BEFORE WRITE in CFG order
  4. NO reentrancy guard protection
  5. NOT a view/pure/constructor/initializer function

  **Implementation-Agnostic**: Detects reentrancy regardless of function names,
  variable names, or coding style. Uses semantic operations and CFG ordering.

  ## Real-World Examples

  - **The DAO Hack (2016)**: $60M stolen via recursive reentrancy
  - **Cream Finance (2021)**: $18M stolen via AMP token callback reentrancy
  - **Lendf.Me (2020)**: $25M stolen via ERC777 hook reentrancy

scope: Function

lens:
  - ValueMovement
  - ExternalInfluence

severity: critical

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Core vulnerability signal: Both operations must exist
      - has_all_operations:
          - TRANSFERS_VALUE_OUT
          - WRITES_USER_BALANCE

      # CEI Violation: Transfer happens BEFORE balance write
      - sequence_order:
          before: TRANSFERS_VALUE_OUT
          after: WRITES_USER_BALANCE

    # At least ONE must match (OR logic) - not used
    any: []

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Safe pattern: Has reentrancy guard (nonReentrant modifier)
      - property: has_reentrancy_guard
        op: eq
        value: true

      # Not applicable to view/pure functions
      - property: state_mutability
        op: in
        value: [view, pure]

      # Constructors are initialization-only
      - property: is_constructor
        op: eq
        value: true

      # Initializers are one-time setup
      - property: is_initializer_function
        op: eq
        value: true

# =============================================================================
# ADVANCED MATCHING (Optional)
# =============================================================================

# Alternative detection via behavioral signature
# Signature format: R:bal→X:out→W:bal (Read balance, Transfer out, Write balance)
behavioral_signature:
  pattern: "R:bal.*X:out.*W:bal"
  matches_exploits: [dao-hack-2016, cream-finance-2021, lendf-me-2020]

