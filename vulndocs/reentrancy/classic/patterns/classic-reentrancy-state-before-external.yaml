id: classic-reentrancy-state-before-external
vulndoc: reentrancy/classic
name: Classic Reentrancy - State Before External
description: External call before state update without a reentrancy guard.
scope: Function
lens:
- ValueMovement
severity: critical
match:
  all:
  - property: visibility
    op: in
    value:
    - public
    - external
  - property: has_external_calls
    op: eq
    value: true
  - property: has_untrusted_external_call
    op: eq
    value: true
  - property: writes_state
    op: eq
    value: true
  - property: state_write_after_external_call
    op: eq
    value: true
  none:
  - property: has_reentrancy_guard
    op: eq
    value: true
