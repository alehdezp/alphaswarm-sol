id: erc777-hook-reentrancy
vulndoc: reentrancy/classic
name: ERC777 Hook Reentrancy
description: ERC777 hooks with post-call state writes.
scope: Function
lens:
- ValueMovement
severity: high
match:
  all:
  - property: state_write_after_external_call
    op: eq
    value: true
  any:
  - property: uses_erc777_send
    op: eq
    value: true
  - property: uses_erc777_operator_send
    op: eq
    value: true
  none:
  - property: has_reentrancy_guard
    op: eq
    value: true
