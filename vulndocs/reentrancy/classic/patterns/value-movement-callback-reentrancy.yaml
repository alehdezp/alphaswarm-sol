id: value-movement-callback-reentrancy
vulndoc: reentrancy/classic
name: Callback Reentrancy Surface
description: Callback-style functions that write state without a reentrancy guard.
scope: Function
lens:
- ValueMovement
- ExternalInfluence
severity: high
match:
  all:
  - property: is_callback
    op: eq
    value: true
  - property: writes_state
    op: eq
    value: true
  none:
  - property: has_reentrancy_guard
    op: eq
    value: true
