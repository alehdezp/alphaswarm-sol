id: value-movement-cross-contract-reentrancy
vulndoc: reentrancy/classic
name: Cross-Contract Reentrancy Surface
description: User-controlled external call before state write.
scope: Function
lens:
- ValueMovement
- ExternalInfluence
severity: high
match:
  all:
  - property: state_write_after_external_call
    op: eq
    value: true
  - property: call_target_user_controlled
    op: eq
    value: true
  none:
  - property: has_reentrancy_guard
    op: eq
    value: true
