id: op-reentrancy-external-before-write
vulndoc: reentrancy/classic
name: External Call Before State Write (Operation-Based)
description: 'Any external call followed by user balance modification without guard.

  Broader than classic reentrancy - catches variants.

  '
scope: Function
lens:
- ValueMovement
- ExternalInfluence
severity: high
match:
  tier_a:
    all:
    - property: visibility
      op: in
      value:
      - public
      - external
    - has_all_operations:
      - CALLS_EXTERNAL
      - WRITES_USER_BALANCE
    - sequence_order:
        before: CALLS_EXTERNAL
        after: WRITES_USER_BALANCE
    none:
    - property: has_reentrancy_guard
      value: true
aggregation:
  mode: tier_a_only
