# =============================================================================
# PATTERN: reentrancy-002-gmx-cross-function
# GMX v1 Cross-Function Reentrancy via Circular Accounting Dependencies
# =============================================================================
# Detects GMX v1-style cross-function reentrancy where external calls trigger
# callbacks that re-enter different functions sharing critical state variables,
# exploiting non-atomic updates and circular dependencies in accounting logic.
#
# Source: GMX v1 Exploit Analysis (July 9, 2025) - $42M loss
# VulnDocs Reference: knowledge/vulndocs/categories/reentrancy/subcategories/cross-function/specifics/gmx-v1-reentrancy/
# =============================================================================

id: reentrancy-002
vulndoc: reentrancy/classic
name: "Cross-Function Reentrancy via Circular Accounting Dependencies"

description: |
  ## What This Detects

  Cross-function reentrancy where external calls (e.g., refunds, callbacks) trigger
  attacker callbacks that re-enter DIFFERENT functions sharing critical state,
  exploiting circular dependencies in accounting logic. Unlike classic reentrancy
  (same function re-entry), this pattern involves:

  1. Function A updates shared state (position list) and makes external call with value
  2. External call triggers attacker callback during execution window
  3. Attacker callback re-enters Function B (different function) that reads same state
  4. Function B observes stale/inconsistent state (position updated but price not)
  5. Circular dependency: stale price feeds into AUM → inflates token valuation
  6. Attacker exploits the gap between interdependent state updates

  ## Why It's Dangerous

  This vulnerability is MORE SUBTLE than classic reentrancy because:
  - The reentrancy guard on Function A doesn't prevent re-entry into Function B
  - Interdependent state (position list ↔ global average price ↔ AUM ↔ token value)
    is updated non-atomically, creating temporal windows
  - The attack exploits these windows to manipulate price feeds and token valuation
  - Multiple functions must be protected, not just the one with the external call

  Real-World Impact: GMX v1 (July 2025) - $42M stolen through orchestrated
  re-entries exploiting circular dependencies between position tracking, price
  feeds, and GLP token valuation.

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function has state_write_after_external_call = true (external call before state update)
  3. Multiple shared state variables accessed across functions (shared_state_variables > 1)
  4. External call with value transfer (calls_external_with_value = true)
  5. NO reentrancy guard protection (has_reentrancy_guard = false)
  6. Function reads/writes to critical state (positions, balances, prices, AUM)
  7. NOT view/pure/constructor/initializer function

  **Key Differentiator from Classic Reentrancy**: Cross-function shared state and
  circular accounting dependencies. Vulnerable to re-entry into OTHER functions,
  not just same function re-entry.

scope: Function
lens:
  - ValueMovement
  - ExternalInfluence
  - CrossContractState

severity: critical

# =============================================================================
# VULNDOCS REFERENCE
# =============================================================================

vulndocs_reference:
  category: reentrancy
  subcategory: cross-function
  specific_exploit: gmx-v1-reentrancy
  file_path: knowledge/vulndocs/categories/reentrancy/subcategories/cross-function/specifics/gmx-v1-reentrancy/index.yaml

# =============================================================================
# MATCH CONDITIONS - SEMANTIC PROPERTIES ONLY
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Core vulnerability signal: State written after external call
      - property: state_write_after_external_call
        op: eq
        value: true

      # Critical signal: Multiple shared state variables across functions
      - property: shared_state_variables
        op: gt
        value: 1

      # External call with value transfer (the callback trigger mechanism)
      - property: has_call_with_value
        op: eq
        value: true

      # Core semantic operations present
      - has_all_operations:
          - TRANSFERS_VALUE_OUT
          - WRITES_SHARED_STATE
          - MODIFIES_CRITICAL_STATE

    # At least ONE must match (OR logic)
    any:
      # Could be position management function
      - property: modifies_position_state
        op: eq
        value: true

      # Or order execution function
      - property: modifies_order_state
        op: eq
        value: true

      # Or any function with circular dependency involvement
      - property: reads_oracle_price
        op: eq
        value: true

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Safe pattern: Has reentrancy guard
      - property: has_reentrancy_guard
        op: eq
        value: true

      # Safe pattern: Has global reentrancy guard across all affected functions
      - property: has_global_reentrancy_guard
        op: eq
        value: true

      # Not applicable to view/pure functions
      - property: state_mutability
        op: in
        value: [view, pure]

      # Constructors are initialization-only
      - property: is_constructor
        op: eq
        value: true

      # Initializers are one-time setup
      - property: is_initializer_function
        op: eq
        value: true

      # Safe if refunds go to trusted addresses only (not arbitrary parameters)
      - property: refund_to_trusted_address
        op: eq
        value: true

      # Safe if all related state updates are atomic
      - property: atomic_state_updates
        op: eq
        value: true

# =============================================================================
# SEMANTIC OPERATIONS FOR BEHAVIORAL DETECTION
# =============================================================================

semantic_ops:
  # Operations that characterize cross-function reentrancy
  has_all_operations:
    - TRANSFERS_VALUE_OUT          # External call with value (callback trigger)
    - CALLS_EXTERNAL               # Untrusted callback execution
    - WRITES_SHARED_STATE          # Updates to cross-function state
    - MODIFIES_CRITICAL_STATE      # Position/price/AUM updates
    - READS_SHARED_STATE           # Re-entrant calls read stale state

  sequence_order:
    # The vulnerable pattern: External call BEFORE state updates
    before: TRANSFERS_VALUE_OUT
    after: WRITES_SHARED_STATE

  # Alternative detection via price oracle manipulation
  or_operations:
    - READS_ORACLE_PRICE           # Reads price during reentrancy window
    - MODIFIES_TOKEN_VALUATION     # AUM/token value depends on price

# =============================================================================
# BEHAVIORAL SIGNATURES - CROSS-FUNCTION ATTACK SEQUENCES
# =============================================================================

behavioral_signature:
  # Cross-function reentrancy signature: F1 transfers, callback enters F2, F2 reads stale price
  primary_pattern: "X:call->F:callback->R:stale_price->M:state"
  description: |
    External call triggers callback that enters different function reading stale state.
    This is more subtle than classic "R:bal→X:out→W:bal" because the reentrancy
    happens in a DIFFERENT function (cross-function).

  # Circular dependency signature: position update → price gap → AUM → token value
  circular_dependency: "F1:W:poslist->X:call->(gap)->F2:R:price(stale)->F3:M:aum->F4:M:glpvalue"
  description: |
    F1 updates position list, external call creates window, callback re-enters F2 which
    reads global price (not yet updated), F3 uses stale price for AUM, F4 inflates
    token valuation. The gap between W:poslist and R:price is the vulnerability.

  # GMX-specific pattern
  gmx_exploit_pattern: "M:shortpositions->X:refund(call)->R:globalprice(stale)->M:aum"
  description: |
    Short position list modified, ETH refund triggers callback, callback reads stale
    global short price, stale price used in AUM calculation to inflate GLP value.

