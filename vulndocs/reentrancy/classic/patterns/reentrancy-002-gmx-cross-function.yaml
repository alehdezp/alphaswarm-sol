  - name: "GMX v1 Arbitrum Reentrancy Exploit"
    date: "2025-07-09"
    loss_usd: 42000000
    chain: "Arbitrum"
    protocol: "GMX v1"
    recovery: 37500000
    description: |
      Attacker exploited cross-function reentrancy in GMX v1's position management
      system by:

      1. Calling executeDecreaseOrder() with malicious contract as _account
      2. Function updates short position list and calls {value:} for refund
      3. Attacker's receive() callback re-enters position management functions
      4. Callback observes stale global short price (position updated but price not)
      5. Attacker manipulates positions while price is stale
      6. Stale price feeds into AUM, inflating GLP token valuation
      7. Attacker redeems overvalued GLP for $42M

      Root cause: Non-atomic state updates (position → price → AUM) with external
      call creating reentrancy window. nonReentrant on executeDecreaseOrder only
      guarded same-function reentrancy, not cross-function reentrancy.

    attack_flow:
      - "Call executeDecreaseOrder with malicious contract"
      - "Receive reentrancy window during ETH refund (call{value:})"
      - "Within callback, re-enter other position management functions"
      - "Read stale global short price"
      - "Manipulate positions while price outdated"
      - "Circular dependency: low price → high AUM → high GLP value"
      - "Redeem overvalued GLP for $42M"

    vulnerable_functions:
      - "executeDecreaseOrder()"
      - "Position management functions (reentrant-callable)"
      - "GLP valuation and redemption functions"

