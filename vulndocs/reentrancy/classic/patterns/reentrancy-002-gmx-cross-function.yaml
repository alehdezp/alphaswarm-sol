# ATTACK SCENARIOS
# =============================================================================

attack_scenarios:
  - name: "Cross-Function Reentrancy via Position Management"
    description: |
      Attacker exploits reentrancy window in order execution to manipulate position
      tracking, creating stale price feeds that inflate token valuation.
    preconditions:
      - "Function A (executeDecreaseOrder) updates position list and makes call{value:}"
      - "Function B (other position functions) reads global position price (shared state)"
      - "Position list and global average price are NOT updated atomically"
      - "No global reentrancy guard across all position-affecting functions"
      - "No protection against arbitrary _account parameter in refund mechanism"
      - "Circular dependency: AUM calculation depends on global position price"
    steps:
      - "Attacker crafts malicious contract with receive() fallback"
      - "Attacker calls executeDecreaseOrder(account=attacker_contract, ...)"
      - "Function A: Updates short position list (position removed)"
      - "Function A: Calls call{value: gasRefund}(attacker_contract) for refund"
      - "Attacker's receive() fallback executes before state settlement"
      - "Within callback, attacker calls other position management functions"
      - "Attacker's calls read global short price (NOT updated yet, still stale)"
      - "Attacker manipulates positions while price is stale"
      - "Stale price feeds into AUM calculation (circular dependency)"
      - "Inflated AUM causes GLP tokens to be overvalued"
      - "Attacker redeems overvalued GLP tokens to drain protocol"
    impact: "Complete protocol fund drainage - attacker steals $40M+ through coordinated re-entries"

  - name: "Circular Dependency Exploitation"
    description: |
      Attacker exploits the gap between interdependent state updates in accounting.
    preconditions:
      - "Multiple functions update related state (positions, prices, AUM, token value)"
      - "These updates are not atomic - gaps exist between them"
      - "Price feeds depend on position state"
      - "Token valuation depends on price feeds"
    steps:
      - "Attacker identifies circular dependency: positions → prices → AUM → tokens"
      - "Attacker triggers reentrancy window in position function"
      - "Attacker calls into price-dependent function during window"
      - "Price function reads stale position state"
      - "Stale price propagates through AUM calculation"
      - "Overvalued tokens enable attacker to drain underlying assets"
    impact: "Artificial price inflation enabling massive fund theft"

  - name: "Multi-Step Callback Chain"
    description: |
      Attacker chains multiple callback levels to manipulate state across many functions.
    preconditions:
      - "Multiple external calls with value transfers exist"
      - "Callbacks can trigger other external calls"
      - "Circular dependencies exist across 3+ functions"
    steps:
      - "Attacker triggers Function A with value transfer"
      - "Attacker's receive() callback calls Function B"
      - "Function B has another external call"
      - "Attacker's second callback calls Function C"
      - "By third-level callback, attacker has manipulated state in 3 functions"
      - "Circular dependencies now fully exploited"
    impact: "Compound manipulation across multiple protocol functions"

# =============================================================================
# SAFE PATTERNS - REFERENCE IMPLEMENTATIONS
# =============================================================================

safe_patterns:
  - name: "CEI Pattern with Multiple State Updates"
    description: |
      Checks-Effects-Interactions (CEI) pattern applied to cross-function reentrancy.
      All interdependent state is updated BEFORE external calls. Critical for protocols
      with circular dependencies (positions → prices → AUM → token value).
    code: |
      contract SafePositionManager {
          // State variables with interdependencies
          mapping(bytes32 => Position) public positions;
          uint256 public globalAveragePrice;
          uint256 public cachedAUM;

          function executeDecreaseOrder(
              bytes32 _positionKey,
              address payable _refundRecipient
          ) external {
              // CHECKS: Validate all preconditions
              require(_positionKey != bytes32(0), "Invalid position");
              require(_refundRecipient != address(0), "Invalid recipient");
              require(positions[_positionKey].exists, "Position not found");

              uint256 positionSize = positions[_positionKey].size;
              uint256 gasRefund = calculateGasRefund();

              // EFFECTS: Update ALL interdependent state ATOMICALLY
              // This is the critical part - MUST all happen before external call
              delete positions[_positionKey];  // Remove position
              globalAveragePrice = recalculateGlobalPrice();  // Update price
              cachedAUM = calculateAUM(globalAveragePrice);  // Update AUM using new price

              // INTERACTIONS: External call LAST, when all state is consistent
              // Callbacks cannot exploit stale state because everything is updated
              (bool success, ) = _refundRecipient.call{value: gasRefund}("");
              require(success, "Refund failed");
          }

          // Helper function to recalculate global price
          function recalculateGlobalPrice() internal view returns (uint256) {
              // Uses all current positions to calculate average price
              // Will return updated price if positions were modified above
              // ... calculation logic
          }

          function calculateAUM(uint256 _priceSnapshot) internal view returns (uint256) {
              // AUM based on CURRENT price, not stale price
              // Because price was updated in EFFECTS phase
              // ... calculation logic
          }
      }

    semantic_operations: |
      - WRITES_SHARED_STATE: globalAveragePrice update happens BEFORE external call
      - MODIFIES_CRITICAL_STATE: cachedAUM updated from current price
      - TRANSFERS_VALUE_OUT: External call happens AFTER all state updates
      - Behavioral signature: W:state->W:price->W:aum->X:call (SAFE)
      - NOT the vulnerable: X:call->W:state pattern

  - name: "Global Reentrancy Guard (OpenZeppelin ReentrancyGuard)"
    description: |
      Contract-level mutex preventing re-entry into ANY protected function.
      Essential when multiple functions share state and make external calls.
      Must be applied to ALL affected functions, not just the one with external call.
    code: |
      import "@openzeppelin/contracts/security/ReentrancyGuard.sol";

      contract SafePositionManager is ReentrancyGuard {
          mapping(bytes32 => Position) public positions;
          uint256 public globalPrice;

          // Apply nonReentrant to EVERY function that:
          // 1. Makes external calls with value
          // 2. Reads/writes shared state
          // 3. Could be called by attacker during callback

          function executeDecreaseOrder(bytes32 _positionKey, address payable _refund)
              external
              nonReentrant  // Prevents re-entry into ANY nonReentrant function
          {
              require(positions[_positionKey].exists, "Position not found");

              delete positions[_positionKey];
              globalPrice = recalculatePrice();

              // External call is safe - callbacks cannot re-enter ANY nonReentrant function
              (bool success, ) = _refund.call{value: msg.value}("");
              require(success, "Refund failed");
          }

          // This read-only function MUST ALSO be protected
          // Otherwise attacker can read stale price during executeDecreaseOrder
          function getGlobalPrice() external view nonReentrant returns (uint256) {
              return globalPrice;
          }

          // This modifying function MUST ALSO be protected
          // Otherwise attacker can modify state during executeDecreaseOrder
          function updatePrice(uint256 _newPrice) external nonReentrant {
              globalPrice = _newPrice;
          }

          // Private function (internal logic helper) doesn't need nonReentrant
          // It can only be called from other functions that are protected
          function recalculatePrice() private view returns (uint256) {
              // ... calculation
          }

          // Constructor and initializer don't need nonReentrant
          // They run once during setup, before any attacker interaction
          constructor() {
              globalPrice = 0;
          }
      }

    semantic_operations: |
      - ALL externally-callable functions with shared state access have nonReentrant
      - TRANSFERS_VALUE_OUT: External call inside nonReentrant modifier
      - WRITES_SHARED_STATE: All state writes inside nonReentrant
      - READS_SHARED_STATE: All state reads inside nonReentrant
      - Behavioral signature: Guard(X:call) + Guard(R:state) = Safe

  - name: "State Snapshot and Verification (Defense in Depth)"
    description: |
      Cache critical state before external calls and verify integrity after.
      Detects callback manipulation. Use alongside atomic updates or guards.
    code: |
      contract SafePositionManager {
          mapping(bytes32 => Position) public positions;
          uint256 public globalPrice;

          function executeDecreaseOrder(bytes32 _positionKey, address payable _refund)
              external
          {
              // SNAPSHOT: Capture critical state BEFORE external call
              uint256 priceBeforeCall = globalPrice;
              uint256 positionCountBefore = countPositions();

              // EFFECTS: Update state
              require(positions[_positionKey].exists, "Position not found");
              delete positions[_positionKey];

              // INTERACTIONS: External call
              uint256 refundAmount = calculateRefund();
              (bool success, ) = _refund.call{value: refundAmount}("");
              require(success, "Refund failed");

              // VERIFICATION: Check state integrity AFTER callback
              require(
                  globalPrice == priceBeforeCall,
                  "Price was manipulated during callback"
              );
              require(
                  countPositions() == positionCountBefore - 1,
                  "Position count inconsistent"
              );

              // If we reach here, callback didn't manipulate state
              // This is a detection mechanism, not primary prevention
          }

          function countPositions() internal view returns (uint256) {
              // Count current positions
          }
      }

    semantic_operations: |
      - Snapshots prevent but don't fix the vulnerability
      - Used as detection/reversion layer
      - Best combined with atomic updates or reentrancy guards
      - Behavioral signature: Snapshot(R:state)->X:call->Verify(R:state)

# =============================================================================
# VERIFICATION STEPS
# =============================================================================

verification_steps:
  - "Confirm function is externally callable (public/external)"
  - "Verify state_write_after_external_call = true (external call before state update)"
  - "Identify the shared state variables accessed by multiple functions"
  - "Trace which functions read/write these shared variables"
  - "Check if all these functions are protected by reentrancy guards"
  - "If protection is only on SOME functions, it's insufficient (need global guard)"
  - "Identify circular dependencies: does output of Function A feed into Function B?"
  - "Check for gaps in non-atomic state updates (position → price → AUM → tokens)"
  - "Verify this is not intentional multi-step pattern or legitimate callback"
  - "Assess exploitability: can attacker control the callback (msg.sender parameter)?"
  - "Evaluate impact: are circular dependencies being exploited for value inflation?"

# =============================================================================
# FIX RECOMMENDATIONS
# =============================================================================

fix_recommendations:
  - name: "Atomic State Updates (Recommended)"
    priority: critical
    description: |
      Ensure ALL interdependent state is updated atomically before ANY external calls.
      This closes the temporal gap that enables the attack. Implements the
      Checks-Effects-Interactions (CEI) pattern: validate, update ALL state, then external call.
    example: |
      // VULNERABLE: position list updated separately from global price
      function executeDecreaseOrder(address _account, ...) external {
          // Updates position list (but NOT global price yet)
          shortPositions.remove(_positionKey);

          // External call creates reentrancy window
          call{value: gasRefund}(_account);

          // Global price updated AFTER external call (too late!)
          globalAveragePriceTracker.update(...);
      }

      // FIXED: Both position AND price updated atomically before external call
      // This follows Checks-Effects-Interactions (CEI) pattern:
      function executeDecreaseOrder(address _account, ...) external {
          // CHECKS: Validate preconditions
          require(_account != address(0), "Invalid account");
          require(shortPositions.exists(_positionKey), "Position not found");

          // EFFECTS: Update ALL interdependent state BEFORE external call
          shortPositions.remove(_positionKey);
          globalAveragePriceTracker.update(...);  // CRITICAL: Must happen before external call
          cachedAUM.recalculate();  // Update AUM snapshot

          // INTERACTIONS: External call LAST, after all state settled
          call{value: gasRefund}(_account);
      }

    safe_pattern_explanation: |
      The fixed version implements the Checks-Effects-Interactions (CEI) pattern:
      - CHECKS: All preconditions validated first
      - EFFECTS: ALL state updates (position, price, AUM) happen atomically
      - INTERACTIONS: External call last, after state consistency guaranteed

      This prevents cross-function reentrancy because callbacks cannot observe
      stale state - all interdependent variables are already updated.

  - name: "Global Reentrancy Guard (Most Direct Fix)"
    priority: critical
    description: |
      Implement a contract-level mutex using OpenZeppelin's ReentrancyGuard that
      prevents reentrancy into ANY position-affecting function. The nonReentrant
      modifier blocks re-entry at the contract level, protecting against cross-
      function reentrancy when applied to ALL externally-callable functions that
      share state or make external calls.
    example: |
      import "@openzeppelin/contracts/security/ReentrancyGuard.sol";

      contract PositionManager is ReentrancyGuard {
          // VULNERABLE: nonReentrant only on one function leaves others accessible
          function executeDecreaseOrder(...) external nonReentrant {
              // This is protected...
              shortPositions.remove(_positionKey);
              call{value: gasRefund}(msg.sender);
          }

          // But this can STILL be re-entered while executeDecreaseOrder is executing!
          function getPositionPrice() external view returns (uint256) {
              return globalAveragePriceTracker.price;  // Stale!
          }

          // FIXED: Apply nonReentrant to ALL functions sharing state
          function executeDecreaseOrder(...) external nonReentrant {
              shortPositions.remove(_positionKey);
              call{value: gasRefund}(msg.sender);
          }

          function getPositionPrice() external nonReentrant view returns (uint256) {
              return globalAveragePriceTracker.price;  // Protected!
          }

          function updatePositionPrice(uint256 _newPrice) external nonReentrant {
              globalAveragePriceTracker.price = _newPrice;  // Protected!
          }

          // The KEY: nonReentrant on ALL position-affecting functions
          // This prevents callbacks from re-entering into ANY of them
      }

    how_it_works: |
      OpenZeppelin's ReentrancyGuard uses a reentrancy status flag that tracks
      whether execution is already inside a nonReentrant function. When a
      nonReentrant function is called:
      1. Check if reentrancy guard is already "entered"
      2. If yes, revert (reentrancy attempt detected)
      3. If no, set guard to "entered"
      4. Execute function logic
      5. Reset guard to "not entered"

      This prevents nested calls into any nonReentrant function, blocking
      cross-function reentrancy when applied consistently.

  - name: "Restrict Refund Address"
    priority: critical
    description: |
      Refund to trusted addresses only (msg.sender or whitelisted), not arbitrary
      parameters. This eliminates the callback trigger mechanism.
    example: |
      // VULNERABLE: arbitrary _account parameter can be attacker contract
      function executeDecreaseOrder(address _account, ...) external {
          call{value: gasRefund}(_account);  // Attacker passes their contract
      }

      // FIXED: Only refund to msg.sender (the order keeper, trusted)
      function executeDecreaseOrder(...) external {
          call{value: gasRefund}(msg.sender);  // Only refund caller, not arbitrary address
      }

  - name: "State Snapshot and Verification"
    priority: high
    description: |
      Cache critical state at function entry, verify consistency after external calls.
      Detects if state was manipulated by callback.
    example: |
      function executeDecreaseOrder(...) external {
          // Snapshot critical state BEFORE external call
          uint256 cachedGlobalPrice = globalAveragePriceTracker.price;
          uint256 cachedPositionCount = shortPositions.length;

          // Normal execution...
          shortPositions.remove(_positionKey);

          // External call
          call{value: gasRefund}(msg.sender);

          // Verify state integrity AFTER external call
          require(
              globalAveragePriceTracker.price == cachedGlobalPrice,
              "State was manipulated during callback"
          );

          // Update price only if unmanipulated
          globalAveragePriceTracker.update(...);
      }

  - name: "Break Circular Dependencies"
    priority: high
    description: |
      Decouple AUM/token valuation from real-time position price feeds. Use
      snapshot-based accounting updated only in protected functions.
    example: |
      // VULNERABLE: AUM calculation reads live price during external call window
      function getAUM() public view returns (uint256) {
          return shortPositions.length * globalAveragePriceTracker.price;  // Stale price!
      }

      // FIXED: AUM uses snapshot, updated only in protected functions
      uint256 private cachedAUM;  // Snapshot updated only in protected context

      function recalculateAUM() internal {  // Internal, protected
          cachedAUM = shortPositions.length * globalAveragePriceTracker.price;
      }

      function getAUM() public view returns (uint256) {
          return cachedAUM;  // Always returns consistent snapshot
      }

      function executeDecreaseOrder(...) external nonReentrant {
          shortPositions.remove(_positionKey);
          globalAveragePriceTracker.update(...);
          recalculateAUM();  // Update AUM in protected context
          call{value: gasRefund}(msg.sender);  // Now safe
      }

  - name: "Multi-Level Protection"
    priority: high
    description: |
      Combine multiple fixes: atomic updates + global guard + state verification.
      Defense-in-depth approach for critical protocols.
    example: |
      contract SecurePositionManager is ReentrancyGuard {
          function executeDecreaseOrder(...)
              external
              nonReentrant  // Global reentrancy guard
          {
              // 1. Snapshot state
              uint256 priceSnapshot = globalPrice;

              // 2. Atomic updates (both before external call)
              shortPositions.remove(_key);
              globalPrice.update(...);
              cachedAUM.recalculate();

              // 3. Verify before external call
              require(
                  globalPrice != priceSnapshot,
                  "Price should be updated"
              );

              // 4. Safe to make external call (state fully settled)
              call{value: gasRefund}(msg.sender);

              // 5. Final verification
              assert(shortPositions.isConsistent());
          }
      }

