# Safe pattern references from research
safe_pattern_references:
  - title: "Checks-Effects-Interactions (CEI) Pattern - Solidity Patterns"
    url: "https://fravoll.github.io/solidity-patterns/checks_effects_interactions.html"
    key_concept: |
      The CEI pattern is fundamental to preventing reentrancy:
      1. CHECKS: Validate preconditions
      2. EFFECTS: Modify all interdependent state
      3. INTERACTIONS: Make external calls last
      When applied to cross-function reentrancy, ALL interdependent state must
      be updated in the EFFECTS phase before any external call.

  - title: "ReentrancyGuard - OpenZeppelin Contracts Documentation"
    url: "https://docs.openzeppelin.com/contracts/4.x/api/security#ReentrancyGuard"
    key_concept: |
      OpenZeppelin's ReentrancyGuard uses a reentrancy status flag that tracks
      whether execution is already inside a nonReentrant function. Critical for
      cross-function reentrancy: must apply nonReentrant to ALL functions sharing
      state or making external calls, not just the function with the external call.

  - title: "Cross-Function Reentrancy - Medium by Phuwanai Thummavet"
    url: "https://medium.com/valixconsulting/solidity-smart-contract-security-by-example-04-cross-function-reentrancy-de9cbce0558e"
    key_concept: |
      Cross-function reentrancy occurs when external calls trigger callbacks that
      re-enter DIFFERENT functions sharing state. More subtle than classic reentrancy
      because the vulnerable state is accessed through different entry points. Multiple
      functions must be protected, and interdependent state updates must be atomic.

  - title: "The Ultimate Guide to Reentrancy - Immunefi"
    url: "https://medium.com/immunefi/the-ultimate-guide-to-reentrancy-19526f105ac"
    key_concept: |
      Comprehensive guide covering reentrancy attack patterns including cross-function
      scenarios. Emphasizes that reentrancy guards alone are insufficient if applied
      to only some functions. Defense-in-depth approach recommended: atomic updates +
      global guards + state verification.
