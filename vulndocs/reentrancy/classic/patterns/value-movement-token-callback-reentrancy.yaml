id: value-movement-token-callback-reentrancy
vulndoc: reentrancy/classic
name: Token Callback Reentrancy
description: Token callback surface with state writes after external call.
scope: Function
lens:
- ValueMovement
- ExternalInfluence
severity: high
match:
  all:
  - property: token_callback_surface
    op: eq
    value: true
  - property: state_write_after_external_call
    op: eq
    value: true
  none:
  - property: has_reentrancy_guard
    op: eq
    value: true
