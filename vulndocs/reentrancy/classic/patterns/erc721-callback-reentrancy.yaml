id: erc721-callback-reentrancy
vulndoc: reentrancy/classic
name: ERC721 Callback Reentrancy
description: ERC721 safe transfer/mint with post-call state writes.
scope: Function
lens:
- ValueMovement
severity: high
match:
  all:
  - property: state_write_after_external_call
    op: eq
    value: true
  any:
  - property: uses_erc721_safe_transfer
    op: eq
    value: true
  - property: uses_erc721_safe_mint
    op: eq
    value: true
  none:
  - property: has_reentrancy_guard
    op: eq
    value: true
