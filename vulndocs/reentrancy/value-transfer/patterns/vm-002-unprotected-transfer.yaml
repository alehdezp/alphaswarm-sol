# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Direct Fund Extraction"
    description: |
      Attacker discovers unprotected value transfer function and drains contract
    preconditions:
      - "Function is publicly callable (public/external visibility)"
      - "No access control present (no modifiers, no require checks)"
      - "Function transfers value OR modifies balance state"
    steps:
      - "Attacker scans contract for public/external functions"
      - "Identifies function that transfers value (even with obfuscated name)"
      - "Calls function directly (e.g., extract(), removeFunds(), fn_0x123())"
      - "Contract transfers funds without authorization check"
      - "Attacker repeats until contract is drained"
    impact: "Complete fund drainage - attacker steals all contract holdings"

  - name: "Balance Manipulation"
    description: |
      Attacker manipulates user balance state to steal funds
    preconditions:
      - "Function modifies balance/shares/deposits state variables"
      - "No access control on balance modification"
      - "Balance state used in other withdrawal functions"
    steps:
      - "Attacker finds unprotected balance modification function"
      - "Calls function to inflate their balance"
      - "Uses inflated balance in legitimate withdrawal function"
      - "Extracts more funds than entitled to"
    impact: "Theft via accounting manipulation - attacker steals other users' funds"

  - name: "Obfuscated Function Exploitation"
    description: |
      Attacker exploits poorly-named or obfuscated value transfer functions
    preconditions:
      - "Function has non-standard name (not 'withdraw' or 'transfer')"
      - "Function transfers value without access control"
      - "Developer assumed obscurity = security"
    steps:
      - "Attacker analyzes contract bytecode or source"
      - "Identifies function signatures and behavior"
      - "Discovers value transfer function with unexpected name"
      - "Calls obfuscated function directly"
      - "Contract transfers funds without checking authorization"
    impact: "Fund loss despite attempted security through obscurity"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function is externally callable (public/external, not internal/private)"
  - "Verify no access control present (check modifiers, require statements, if conditions)"
  - "Identify which operation triggers detection:"
  - "  - TRANSFERS_VALUE_OUT: Check for transfer(), send(), call{value:}, token transfers"
  - "  - WRITES_USER_BALANCE: Check for balance/shares/deposits state modifications"
  - "Validate this is not intentional public distribution (e.g., airdrop, claim)"
  - "Check if function is part of pull-payment pattern (may be intentional)"
  - "Review business logic: should this function be restricted?"

# Recommended fixes
fix_recommendations:
  - name: "Add Access Control Modifier"
    description: |
      Restrict function to authorized users with modifier-based access control
    example: |
      // VULNERABLE CODE
      function extract(uint256 amount) external {
          payable(msg.sender).transfer(amount);
      }

      // FIXED CODE - Access Control
      function extract(uint256 amount) external onlyOwner {
          payable(msg.sender).transfer(amount);
      }

  - name: "Add require() Check"
    description: |
      Validate caller authorization with require statement
    example: |
      // VULNERABLE CODE
      function removeFunds(uint256 amount) external {
          funds[msg.sender] -= amount;
          payable(msg.sender).transfer(amount);
      }

      // FIXED CODE - require() Check
      function removeFunds(uint256 amount) external {
          require(msg.sender == owner, "Only owner can remove funds");
          funds[msg.sender] -= amount;
          payable(msg.sender).transfer(amount);
      }

  - name: "Use Pull Payment Pattern"
    description: |
      Let users withdraw their own allocated funds (self-authorization)
    example: |
      // VULNERABLE CODE
      function fn_0x123abc(uint256 amount) external {
          payable(msg.sender).transfer(amount);
      }

      // FIXED CODE - Pull Payment Pattern
      mapping(address => uint256) public withdrawable;

      function withdraw() external {
          uint256 amount = withdrawable[msg.sender];  // User can only withdraw their allocation
          require(amount > 0, "Nothing to withdraw");
          withdrawable[msg.sender] = 0;
          payable(msg.sender).transfer(amount);
      }

  - name: "Implement Role-Based Access Control"
    description: |
      Use OpenZeppelin AccessControl for fine-grained permissions
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyContract is AccessControl {
          bytes32 public constant WITHDRAWER_ROLE = keccak256("WITHDRAWER_ROLE");

          function claimTokens(uint256 amount) external onlyRole(WITHDRAWER_ROLE) {
              payable(msg.sender).transfer(amount);
          }
      }

