# =============================================================================
# PATTERN: vm-002-unprotected-transfer
# Unprotected Value Transfer Function (Semantic, Name-Agnostic)
# =============================================================================

id: vm-002-unprotected-transfer
vulndoc: reentrancy/value-transfer
name: "Unprotected Value Transfer Function"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Public/external functions that transfer value or modify user balances without
  access control, **regardless of function naming**. This pattern detects what
  the function DOES (transfers value, modifies balances), not what it's NAMED
  (withdraw, transfer, redeem, etc.).

  Unlike name-based patterns that match "withdraw|transfer|redeem", this semantic
  pattern detects ANY function that:
  - Transfers ETH/tokens out of the contract (TRANSFERS_VALUE_OUT operation)
  - OR modifies user balance state (WRITES_USER_BALANCE operation)

  This catches obfuscated functions like `extract()`, `removeFunds()`,
  `claimTokens()`, or even `fn_0x123abc()`.

  ## Why It's Dangerous

  Attackers can exploit unprotected value transfer functions to:
  - Drain contract funds by calling withdrawal-like functions
  - Manipulate user balances to steal funds
  - Bypass intended access controls by finding alternative function names
  - Exploit obfuscated or poorly-named functions

  The impact is direct fund loss - attackers can extract all contract holdings
  or manipulate accounting to their advantage.

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function has NO access control (no modifiers, no require checks)
  3. Function performs value movement OR balance manipulation:
     - TRANSFERS_VALUE_OUT: Sends ETH/tokens via transfer(), send(), call{value:}
     - OR WRITES_USER_BALANCE: Modifies balance/shares/deposits state variables
  4. NOT a view/pure/constructor/initializer (safe contexts)

  **Implementation-Agnostic**: This pattern works regardless of:
  - Function names (withdraw, extract, removeFunds, fn_0x123, etc.)
  - Variable names (balances, funds, shares, deposits, etc.)
  - Coding conventions or obfuscation

  ## Real-World Examples

  - **Parity Wallet Hack (2017)**: $150M frozen due to unprotected `kill()` function
  - **Poly Network (2021)**: $611M stolen via unprotected keeper modification
  - **Numerous DeFi hacks**: Unprotected withdrawal functions with non-standard names

scope: Function

lens:
  - ValueMovement
  - Authority

severity: high

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Core vulnerability: NO access control
      - property: has_access_gate
        op: eq
        value: false

      # Semantic detection: Function performs value movement OR balance modification
      # This is the KEY difference from name-based patterns
      - has_any_operation:
          - TRANSFERS_VALUE_OUT
          - WRITES_USER_BALANCE

    # At least ONE must match (OR logic) - not used
    any: []

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Not applicable to view/pure functions (no state changes)
      - property: state_mutability
        op: in
        value: [view, pure]

      # Constructors are initialization-only (one-time execution)
      - property: is_constructor
        op: eq
        value: true

      # Initializers are one-time setup (protected by initializer modifier)
      - property: is_initializer_function
        op: eq
        value: true

# =============================================================================
# AGGREGATION MODE
# =============================================================================

aggregation:
  mode: tier_a_only  # Only Tier A (deterministic) matching

# =============================================================================
# TESTING METADATA (populated by vrs-test-conductor agent)
# =============================================================================

test_coverage:
  projects: [token-vault]
  true_positives: 11
  true_negatives: 9
  false_positives: 4
  false_negatives: 1
  edge_cases: 6
  precision: 0.73
  recall: 0.92
  variation_score: 0.80
  last_tested: "2025-12-31"
  notes: |
    READY status achieved (precision 73%, recall 92%, variation 80%).

    Strengths:
    - Excellent recall (92%) - catches most unprotected value transfers
    - Name-agnostic detection works across naming variations (extract, removeFunds, fn_0x123abc)
    - Detects both TRANSFERS_VALUE_OUT and WRITES_USER_BALANCE operations
    - Correctly excludes view/pure/internal/private/constructor functions

    Known Limitations (False Positives):
    - Does not recognize if-statement access checks (e.g., if (msg.sender != owner) revert())
    - Does not detect pull payment pattern (self-authorization via balances[msg.sender])
    - Custom initializer modifiers not recognized (only built-in initializer detection)
    - Intentionally public functions (airdrops, rewards) flagged (expected - needs Tier B)

    Known Gaps (False Negatives):
    - Struct field writes not detected (e.g., accounts[user].balance = amount)
    - Requires WRITES_USER_BALANCE operation enhancement in builder.py

    Recommended Improvements:
    1. Enhance has_access_gate to detect if-statement checks
    2. Add pull payment pattern detection (self-authorization)
    3. Extend WRITES_USER_BALANCE to detect struct field writes
    4. Consider Tier B for intentional public distribution validation

status: ready

