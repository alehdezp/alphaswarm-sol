id: value-movement-unchecked-erc20-transfer
vulndoc: reentrancy/value-transfer
name: Unchecked ERC20 Transfer
description: ERC20 transfer/transferFrom without return guard.
scope: Function
lens:
- ValueMovement
severity: high
match:
  all:
  - property: token_return_guarded
    op: eq
    value: false
  any:
  - property: uses_erc20_transfer
    op: eq
    value: true
  - property: uses_erc20_transfer_from
    op: eq
    value: true
