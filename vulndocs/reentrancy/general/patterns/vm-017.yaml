id: vm-017
vulndoc: reentrancy/general
name: Protocol Reentrancy Surface
description: External calls touching dependency state before commit.
scope: Function
lens:
- ValueMovement
severity: high
match:
  all:
  - property: reads_dependency_state
    op: eq
    value: true
  - property: has_external_calls
    op: eq
    value: true
  - property: state_write_after_external_call
    op: eq
    value: true
  none:
  - property: has_reentrancy_guard
    op: eq
    value: true
