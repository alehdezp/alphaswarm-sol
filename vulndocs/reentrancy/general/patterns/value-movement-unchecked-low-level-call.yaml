id: value-movement-unchecked-low-level-call
vulndoc: reentrancy/general
name: Unchecked Low-Level Call
description: Low-level call without checking success.
scope: Function
lens:
- ValueMovement
- ExternalInfluence
severity: high
match:
  all:
  - property: uses_call
    op: eq
    value: true
  - property: checks_low_level_call_success
    op: eq
    value: false
