# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Mempool Front-Running Attack"
    description: |
      Attacker monitors mempool for initialization transactions and front-runs
      with higher gas to initialize the contract first, gaining ownership.
    preconditions:
      - "Contract is deployed but not yet initialized"
      - "Initializer function is publicly callable"
      - "No protection against repeated initialization"
      - "Deployer's initialize transaction is in mempool"
    steps:
      - "Deployer deploys upgradeable proxy + implementation contract"
      - "Deployer submits initialize(legitimateOwner) transaction"
      - "Attacker detects transaction in mempool"
      - "Attacker submits initialize(attackerAddress) with higher gas"
      - "Attacker's transaction executes first due to higher gas price"
      - "Attacker becomes owner/admin of the protocol"
      - "Deployer's transaction reverts (already initialized)"
    impact: |
      Complete protocol takeover. Attacker gains:
      - Full ownership privileges
      - Control over all funds
      - Ability to modify protocol parameters
      - Ability to upgrade implementation (in UUPS)
      - Permanent control (cannot re-initialize)

  - name: "Flashbots Bundle Attack"
    description: |
      Sophisticated attacker uses MEV services like Flashbots to guarantee
      their initialization transaction executes before the deployer's, even
      without relying on gas price competition.
    preconditions:
      - "Contract is deployed but not yet initialized"
      - "Initializer function is publicly callable"
      - "No protection against repeated initialization"
    steps:
      - "Deployer deploys upgradeable proxy + implementation"
      - "Attacker submits initialization bundle via Flashbots"
      - "Bundle guarantees execution before deployer's transaction"
      - "Attacker becomes owner atomically"
    impact: |
      Complete protocol takeover with 100% success rate (no reliance on gas wars).

  - name: "Post-Upgrade Re-initialization"
    description: |
      After an upgrade that accidentally reverts initialization state or introduces
      a new unprotected initializer, attacker can re-initialize and take control.
    preconditions:
      - "Upgrade introduces new initializer or resets initialization state"
      - "New initializer lacks protection"
    steps:
      - "Protocol upgrades implementation contract"
      - "New implementation has unprotected initializer"
      - "Attacker calls new initializer before protocol team"
      - "Attacker becomes owner"
    impact: |
      Protocol takeover of already-deployed, potentially funded contract.
      Wormhole's $10M bounty case falls into this category.

# How to further verify this is not a false positive
verification_steps:
  - "Verify the function is truly an initializer (sets up initial state, ownership, roles)"
  - "Confirm the contract is upgradeable (proxy/UUPS/beacon pattern)"
  - "Check that the function is externally callable (public/external)"
  - "Verify no OpenZeppelin initializer modifier is present"
  - "Verify no manual initialized flag check exists (e.g., require(!initialized))"
  - "Check if this is intentional for a test/mock contract (test contracts may skip protection)"
  - "Confirm the function can only be called once (has protection mechanism elsewhere)"
  - "Check deployment scripts to see if initialization is done atomically in constructor"

# Recommended fixes
fix_recommendations:
  - name: "Use OpenZeppelin Initializer Modifier (BEST PRACTICE)"
    description: |
      Add the `initializer` modifier from OpenZeppelin's Initializable contract.
      This ensures the function can only be called once and provides reentrancy
      protection.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/Initializable.sol";

      contract MyUpgradeableContract is Initializable {
          address public owner;

          // SAFE: Uses initializer modifier
          function initialize(address _owner) public initializer {
              owner = _owner;
              // Additional initialization logic...
          }
      }

  - name: "Manual Initialized Flag Check"
    description: |
      If not using OpenZeppelin, implement a manual initialized flag with a check.
      This is less robust but provides basic protection.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract MyUpgradeableContract {
          address public owner;
          bool private initialized;

          // SAFE: Manual initialized flag check
          function initialize(address _owner) public {
              require(!initialized, "Already initialized");
              initialized = true;
              owner = _owner;
              // Additional initialization logic...
          }
      }

  - name: "Initialize in Constructor (Transparent Proxy)"
    description: |
      For transparent proxies, initialize the implementation contract in its
      constructor to prevent direct initialization attacks.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract MyImplementation {
          address public owner;

          // SAFE: Constructor prevents direct initialization
          /// @custom:oz-upgrades-unsafe-allow constructor
          constructor() {
              _disableInitializers();
          }

          function initialize(address _owner) public initializer {
              owner = _owner;
          }
      }

  - name: "Atomic Deployment + Initialization (Factory Pattern)"
    description: |
      Use a factory contract that deploys and initializes the proxy in a single
      transaction, eliminating the front-running window.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts/proxy/ERC1967/ERC1967Proxy.sol";

      contract MyFactory {
          // SAFE: Deployment + initialization in one transaction
          function deployAndInitialize(
              address implementation,
              address owner
          ) external returns (address) {
              bytes memory initData = abi.encodeWithSignature(
                  "initialize(address)",
                  owner
              );

              // Atomic: deploy + initialize
              ERC1967Proxy proxy = new ERC1967Proxy(
                  implementation,
                  initData
              );

              return address(proxy);
          }
      }

  - name: "Two-Step Initialization with Access Control"
    description: |
      Implement a two-step initialization where step 1 is done atomically at
      deployment, and step 2 requires authorization from step 1 owner.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/Initializable.sol";

      contract MyUpgradeableContract is Initializable {
          address public owner;
          bool private fullyInitialized;

          // Step 1: Called atomically during deployment
          function initializeStep1(address _owner) public initializer {
              owner = _owner;
          }

          // Step 2: Only owner can complete initialization
          function initializeStep2() public {
              require(msg.sender == owner, "Only owner");
              require(!fullyInitialized, "Already initialized");
              fullyInitialized = true;
              // Additional setup...
          }
      }

