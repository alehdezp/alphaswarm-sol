# =============================================================================
# PATTERN: upgrade-005-unprotected-initializer
# =============================================================================

id: upgrade-005-unprotected-initializer
vulndoc: upgrade/proxy
name: "Unprotected Initializer Function"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  This pattern detects initializer functions in upgradeable contracts that lack proper
  initialization protection, making them vulnerable to front-running attacks where an
  attacker can initialize the contract before the legitimate deployer and gain complete
  protocol control.

  **Semantic Detection**: This pattern uses BEHAVIORAL detection, not name matching.
  It identifies functions that exhibit initializer-like patterns (state setup, ownership
  assignment, role configuration) regardless of function naming conventions.

  ## Why It's Critical

  Unprotected initializers are CRITICAL severity because:

  1. **Complete Protocol Takeover**: Attacker can front-run the deployment transaction
     and call the initializer first, setting themselves as owner/admin

  2. **Irreversible**: Most initializers can only be called once. Once an attacker
     initializes, the legitimate owner is permanently locked out

  3. **Fund Loss**: The attacker gains full control over protocol funds, parameters,
     and critical logic

  4. **Deployment-Time Race**: Vulnerable during the critical deployment window when
     contracts are public but not yet initialized

  ## Attack Scenario

  **FRONT-RUNNING ATTACK**:
  ```
  Step 1: Deployer deploys upgradeable proxy pointing to implementation
  Step 2: Deployer submits transaction to call initialize(owner)
  Step 3: Attacker sees mempool transaction, front-runs with higher gas
  Step 4: Attacker's initialize() executes first, setting attacker as owner
  Step 5: Legitimate initialize() reverts (already initialized)
  Step 6: Attacker now controls the protocol
  ```

  ## Detection Logic

  This pattern triggers when ALL conditions are met:

  1. **Contract Context**: Contract is upgradeable (proxy/UUPS/beacon pattern)
  2. **Function Behavior**: Function exhibits initializer-like behavior (semantic detection)
  3. **Visibility**: Function is public/external (can be called by anyone)
  4. **Missing Protection**: Function lacks BOTH:
     - OpenZeppelin `initializer` modifier (prevents re-initialization)
     - Manual `initialized` flag check (custom protection)

  **SEMANTIC DETECTION**: The `is_initializer_function` property detects initializer
  behavior through:
  - First-time state variable setup
  - Ownership/role assignment patterns
  - Configuration parameter initialization
  - No reliance on function names like "initialize", "init", "setup"

  ## Real-World Examples

  ### Audius ($6M - July 2022)

  **Vulnerability**: Unprotected `initialize()` function allowed repeated invocations

  **Attack**: Hacker called `initialize()` on deployed contracts to assign themselves
  as the sole guardian, then transferred 18M AUDIO tokens ($6M) from the community
  treasury to their wallet.

  **Impact**: $6 million stolen. Despite security audits by OpenZeppelin (2020) and
  Kudelski (2021), the vulnerability was not caught.

  **Reference**: [Audius Governance Takeover Post-Mortem](https://blog.audius.co/article/audius-governance-takeover-post-mortem-7-23-22)

  ### Wormhole ($10M Bug Bounty - 2024)

  **Vulnerability**: Uninitialized UUPS proxy after a previous bugfix had reverted
  the original initialization

  **Attack Potential**: Attacker could have passed their own Guardian set and proceeded
  with the upgrade as a Guardian they controlled

  **Impact**: $736M at risk. Ethical hacker received record $10M bounty for disclosure.
  Protocol could have been held ransom with threat of permanently bricking the Ethereum
  Wormhole bridge.

  **Reference**: [Wormhole Uninitialized Proxy Bugfix Review](https://medium.com/immunefi/wormhole-uninitialized-proxy-bugfix-review-90250c41a43a)

  ### General DeFi Pattern (2021-2022)

  Multiple DeFi protocols suffered initialize front-running vulnerabilities in 2021-2022,
  including:
  - Perennial
  - QuickSwap
  - Livepeer
  - SushiMISO
  - Rubicon
  - Malt
  - NFTX

  **Common Pattern**: Deployer would deploy proxy + implementation, then attempt to
  initialize. Attackers would monitor mempool and front-run initialization with higher
  gas, gaining ownership before the legitimate deployer.

  ## Difference from upgrade-004-unprotected-reinitializer

  - **upgrade-004**: Detects RE-initializers for version upgrades (called after initial setup)
  - **upgrade-005**: Detects FIRST-TIME initializers (called during deployment)

  Both are critical but serve different upgrade lifecycle phases.

scope: Function

lens:
  - OrderingUpgradability

severity: critical

# Pattern quality status (set by vrs-test-conductor agent)
status: draft

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Contract must be upgradeable
    - property: contract_is_upgradeable
      op: eq
      value: true

    # Function exhibits initializer-like behavior (SEMANTIC, not name-based)
    - property: is_initializer_function
      op: eq
      value: true

    # Function is callable by anyone
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE must match (OR logic) - use for alternatives
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Safe: Has OpenZeppelin initializer modifier
    - property: has_initializer_modifier
      op: eq
      value: true

    # Safe: Manually checks initialized flag
    - property: checks_initialized_flag
      op: eq
      value: true

