# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Direct Malicious Upgrade"
    description: |
      Attacker directly calls unprotected upgrade function to replace implementation
      with malicious contract that steals all funds.
    preconditions:
      - "Upgrade function is public/external"
      - "No access control on upgrade function"
      - "Contract is upgradeable (proxy pattern)"
      - "Proxy holds user funds or valuable state"
    steps:
      - "Attacker identifies unprotected upgrade function (upgradeTo, setImplementation, etc.)"
      - "Attacker deploys malicious implementation with fund drainage logic"
      - "Attacker calls upgrade function with malicious implementation address"
      - "Proxy now delegates all calls to malicious implementation"
      - "Attacker calls malicious function to drain all funds"
      - "Or malicious implementation auto-drains in constructor/fallback"
    impact: |
      Complete protocol takeover. All funds drained. Protocol permanently compromised.
      Example: Wormhole ($325M), Audius ($6M).
    cvss: 10.0

  - name: "Governance Bypass via Direct Upgrade"
    description: |
      Attacker bypasses governance/timelock by directly calling unprotected upgrade,
      avoiding normal proposal and voting process.
    preconditions:
      - "Protocol has governance/timelock for normal operations"
      - "Upgrade function exists outside governance (convenience or mistake)"
      - "Upgrade function lacks access control"
    steps:
      - "Protocol intends upgrades to go through governance (multi-day timelock)"
      - "Developer adds convenience upgrade function for testing"
      - "Developer forgets to remove or protect upgrade function"
      - "Attacker finds unprotected upgrade function"
      - "Attacker calls upgrade function, bypassing governance entirely"
      - "Malicious implementation is installed immediately (no timelock)"
    impact: |
      Governance security model completely bypassed. Instant upgrade without
      community oversight or exit window.
    cvss: 9.5

  - name: "Implementation Replacement with Self-Destruct"
    description: |
      Attacker upgrades to implementation with self-destruct, permanently
      bricking the protocol (denial of service).
    preconditions:
      - "Upgrade function is unprotected"
      - "Attacker wants to destroy protocol (competitor, griefer, extortionist)"
    steps:
      - "Attacker deploys implementation with selfdestruct in fallback"
      - "Attacker calls upgrade function with malicious implementation"
      - "Attacker calls any function on proxy"
      - "Delegatecall to malicious implementation triggers selfdestruct"
      - "Implementation is destroyed"
      - "Proxy is now permanently broken (delegatecall fails)"
      - "All funds are locked forever"
    impact: |
      Protocol permanently bricked. All funds locked forever. No recovery possible.
      Can be used for extortion ("pay ransom or we brick protocol").
    cvss: 9.0

  - name: "Front-Running Legitimate Upgrade"
    description: |
      Attacker monitors mempool for legitimate upgrade transaction and front-runs
      with malicious upgrade before protocol team's upgrade executes.
    preconditions:
      - "Protocol team submits upgrade transaction"
      - "Upgrade function lacks access control (or broken access control)"
      - "Attacker monitors mempool"
    steps:
      - "Protocol team prepares upgrade to new implementation version"
      - "Team submits upgrade transaction to mempool"
      - "Attacker sees pending upgrade in mempool"
      - "Attacker submits competing upgrade with malicious implementation + higher gas"
      - "Attacker's upgrade executes first"
      - "Protocol team's upgrade reverts or is ineffective"
      - "Attacker's malicious implementation is now active"
    impact: |
      Protocol upgrade hijacked. Team thinks they upgraded to v2, but actually
      running attacker's malicious implementation.
    cvss: 9.8

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function name/signature indicates upgrade operation (upgradeTo, setImplementation, etc.)"
  - "Verify function is externally callable (public/external visibility)"
  - "Check function body performs actual upgrade (sets implementation address, beacon, etc.)"
  - "Confirm NO access control modifiers (onlyOwner, onlyAdmin, onlyRole, onlyGovernance)"
  - "Confirm NO manual permission checks (require msg.sender == owner, etc.)"
  - "Verify contract is using proxy pattern (UUPS, Transparent, Beacon, Diamond)"
  - "Check if this is intentional for testing (test/mock contracts may skip protection)"
  - "Review deployment scripts to see if upgrade is protected elsewhere (unlikely but possible)"
  - "Test: Try calling upgrade function as non-owner - if succeeds, vulnerability confirmed"
  - "Check if function is actually used (dead code vs active upgrade mechanism)"

# Recommended fixes
fix_recommendations:
  - name: "Add onlyOwner Modifier (Simple Ownership)"
    description: |
      For simple single-owner proxies, protect upgrade function with onlyOwner modifier
      from OpenZeppelin Ownable.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol";
      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";

      contract MyContract is UUPSUpgradeable, OwnableUpgradeable {
          // SAFE: Only owner can upgrade
          function _authorizeUpgrade(address newImplementation) internal override onlyOwner {}
      }

  - name: "Add Role-Based Access Control (Complex Governance)"
    description: |
      For protocols with role-based governance, use OpenZeppelin AccessControl
      with a dedicated upgrader role.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/access/AccessControlUpgradeable.sol";
      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";

      contract MyContract is UUPSUpgradeable, AccessControlUpgradeable {
          bytes32 public constant UPGRADER_ROLE = keccak256("UPGRADER_ROLE");

          // SAFE: Only upgrader role can upgrade
          function _authorizeUpgrade(address newImplementation)
              internal
              override
              onlyRole(UPGRADER_ROLE)
          {}
      }

  - name: "Add Timelock for Upgrade Delay (Best Practice)"
    description: |
      Require upgrades to go through a timelock contract, giving users time
      to exit if they disagree with the upgrade.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";

      contract MyContract is UUPSUpgradeable {
          address public timelock;

          modifier onlyTimelock() {
              require(msg.sender == timelock, "Only timelock");
              _;
          }

          // SAFE: Only timelock can upgrade (gives users exit window)
          function _authorizeUpgrade(address newImplementation)
              internal
              override
              onlyTimelock
          {}
      }

  - name: "Add Multi-Sig Requirement (High Security)"
    description: |
      Require multiple signers to approve upgrades using a multi-sig wallet
      like Gnosis Safe.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";

      contract MyContract is UUPSUpgradeable {
          address public multiSig;

          modifier onlyMultiSig() {
              require(msg.sender == multiSig, "Only multi-sig");
              _;
          }

          // SAFE: Only multi-sig can upgrade (requires M-of-N signatures)
          function _authorizeUpgrade(address newImplementation)
              internal
              override
              onlyMultiSig
          {}
      }

  - name: "Use Transparent Proxy Pattern (Admin Separation)"
    description: |
      Use OpenZeppelin TransparentUpgradeableProxy pattern where admin functions
      (like upgrades) are automatically restricted to the proxy admin address.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts/proxy/transparent/TransparentUpgradeableProxy.sol";

      // Deploy with:
      // new TransparentUpgradeableProxy(
      //     implementation,
      //     proxyAdmin,  // Only this address can upgrade
      //     initData
      // )

      // SAFE: Transparent proxy automatically restricts upgrades to admin
      // Users cannot call upgrade functions, only admin can

  - name: "Add On-Chain Governance (Full Decentralization)"
    description: |
      Require upgrades to go through on-chain governance with token voting,
      ensuring community approval before any upgrade.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";

      contract MyContract is UUPSUpgradeable {
          address public governor;

          modifier onlyGovernor() {
              require(msg.sender == governor, "Only governor");
              _;
          }

          // SAFE: Only governor can upgrade (requires proposal + voting)
          function _authorizeUpgrade(address newImplementation)
              internal
              override
              onlyGovernor
          {}
      }

  - name: "Immutable Implementation (No Upgrades)"
    description: |
      For maximum security and user confidence, remove upgradeability entirely
      by not implementing upgrade functions at all.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      // SAFE: Not upgradeable at all
      // No proxy pattern, no upgrade functions
      // Users have 100% confidence code cannot change
      contract MyContract {
          // Regular contract implementation
          // Cannot be upgraded
      }

