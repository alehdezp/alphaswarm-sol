# =============================================================================
# PATTERN: upgrade-007-unprotected-upgrade
# =============================================================================

id: upgrade-007
vulndoc: upgrade/proxy
name: "Unprotected Upgrade Function"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  This pattern detects upgrade functions in upgradeable proxy contracts (UUPS, Transparent,
  Beacon) that lack proper access control protection, allowing any attacker to replace the
  implementation contract and steal all protocol funds.

  **Semantic Detection**: Uses BEHAVIORAL detection (not name matching) to identify upgrade
  functions regardless of naming conventions like:
  - `upgradeTo()`, `upgradeToAndCall()`, `_authorizeUpgrade()`
  - `setImplementation()`, `setBeacon()`, `upgradeBeacon()`
  - Custom upgrade function names or obfuscated names

  ## Why It's Critical

  Unprotected upgrade functions are **CRITICAL** severity because:

  1. **Complete Protocol Takeover**: Attacker can replace implementation with malicious contract
     containing backdoors, fund drainage logic, or self-destruct

  2. **Instant Fund Loss**: All funds held by the proxy become immediately accessible to the
     attacker through the malicious implementation

  3. **Irreversible**: Once upgraded, the original implementation cannot be restored unless
     the attacker's implementation allows it

  4. **No Timelock Protection**: Unlike governance changes, direct upgrade access bypasses
     any timelock or multi-sig requirements

  5. **Total Control**: Attacker gains complete control over all state, funds, and protocol logic

  ## Real-World Exploits

  ### Wormhole Bridge ($325M - February 2022)

  **Vulnerability**: Unprotected signature verification allowed upgrade bypass

  **Attack**: Attacker exploited an unverified signature check to call the upgrade function
  with a malicious implementation that minted 120,000 ETH worth of Wrapped Ethereum (wETH)
  without depositing actual ETH.

  **Impact**: $325 million stolen. One of the largest DeFi exploits in history.

  **Reference**: [Wormhole Rekt](https://rekt.news/wormhole-rekt/)

  ### Audius ($6M - July 2022)

  **Vulnerability**: Governance contract upgrade with insufficient validation

  **Attack**: Attacker manipulated governance voting to pass a malicious proposal that upgraded
  the governance contract implementation, granting themselves massive voting power (10 trillion
  vs 725M supply). Used this power to transfer 18M AUDIO tokens from treasury.

  **Impact**: $6 million stolen from community treasury.

  **Reference**: [Audius Governance Takeover](https://blog.audius.co/article/audius-governance-takeover-post-mortem-7-23-22)

  ### General Pattern (2021-2024)

  Hundreds of audit findings at CRITICAL severity for unprotected upgrade functions:
  - Trail of Bits audits: Multiple findings per year
  - OpenZeppelin audits: Common pattern in proxy implementations
  - Code4rena: Frequent high/critical severity finding

  ## Attack Scenario

  **MALICIOUS UPGRADE ATTACK**:
  ```
  Step 1: Attacker identifies unprotected upgrade function (e.g., upgradeTo())
  Step 2: Attacker deploys malicious implementation contract with:
          - transferAllFunds(address attacker) function
          - Or simply drains funds in constructor
          - Or self-destruct to brick protocol
  Step 3: Attacker calls upgradeTo(maliciousImplementation)
  Step 4: Proxy now delegates all calls to malicious implementation
  Step 5: Attacker calls transferAllFunds() or directly extracts value
  Step 6: Protocol is drained, users lose all funds
  ```

  ## Detection Logic

  This pattern triggers when ALL conditions are met:

  1. **Upgrade Function Detected**: Function semantically performs upgrade operation
     - Detected via `is_upgrade_function: true`
     - Checks for upgrade-related operations in name/signature/behavior
     - Implementation-agnostic (works with any naming)

  2. **Externally Callable**: Function is public/external
     - `visibility` in [public, external]
     - Must be callable to be exploitable

  3. **Contract is Upgradeable**: Contract uses proxy pattern
     - `contract_is_upgradeable: true` OR
     - `contract_is_uups_proxy: true` OR
     - `contract_is_beacon_proxy: true`

  4. **Missing Access Control**: Function has NO protection
     - `has_access_gate: false` (no access control modifiers/logic)
     - `has_access_control: false` (no access control at all)

  5. **Missing Permission Check**: No semantic permission check
     - Does NOT have `CHECKS_PERMISSION` semantic operation

  ## Safe Patterns (Excluded by 'none' conditions)

  This pattern will NOT flag:
  - Functions with `onlyOwner`, `onlyAdmin`, `onlyRole` modifiers
  - Functions with manual permission checks (require msg.sender == owner)
  - Functions with governance/timelock authorization
  - Internal/private upgrade helpers (not externally callable)
  - View/pure functions (cannot modify state)

  ## Difference from Other Upgrade Patterns

  - **upgrade-004**: Detects unprotected RE-initializers (version upgrades)
  - **upgrade-005**: Detects unprotected FIRST-TIME initializers (deployment)
  - **upgrade-007**: Detects unprotected UPGRADE FUNCTIONS (implementation changes)

  All are critical but target different upgrade mechanisms.

scope: Function

lens:
  - OrderingUpgradability
  - Authority

severity: critical

# Pattern quality status (set by vrs-test-conductor agent)
status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # CORE SIGNAL: Function performs upgrade operation
    - property: is_upgrade_function
      op: eq
      value: true

    # DISCRIMINATOR 1: Must be externally callable to be exploitable
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE must match (OR logic) - use for context validation
  any:
    # Contract must be in an upgradeable context
    - property: contract_is_upgradeable
      op: eq
      value: true
    - property: contract_is_uups_proxy
      op: eq
      value: true
    - property: contract_is_beacon_proxy
      op: eq
      value: true

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # SAFE: Has access control gate (modifiers or manual checks)
    - property: has_access_gate
      op: eq
      value: true

    # SAFE: Has any form of access control
    - property: has_access_control
      op: eq
      value: true

    # SAFE: upgrade_guarded combines is_upgrade_function AND has_access_gate
    - property: upgrade_guarded
      op: eq
      value: true

    # SAFE: View/pure functions cannot modify state
    - property: is_view
      op: eq
      value: true
    - property: is_pure
      op: eq
      value: true

