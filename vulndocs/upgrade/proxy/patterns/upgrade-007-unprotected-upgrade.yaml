# =============================================================================
# ROADMAP FIELDS (Future Capabilities)
# =============================================================================

# Semantic Operations (Phase 1-3)
semantic_ops:
  # Upgrade functions should check permission before modifying implementation
  none_of_operations:
    - CHECKS_PERMISSION  # Should have this but doesn't (vulnerability!)
  # Upgrade functions modify critical state (implementation address)
  has_any_operation:
    - MODIFIES_CRITICAL_STATE

# Behavioral Signature (Phase 2)
behavioral_signature:
  # Vulnerable: Modifies critical state without checking permission
  pattern: "M:crit"
  # Safe: Checks permission before modifying critical state
  safe_pattern: "C:auth→M:crit"
  matches_exploits: [wormhole-2022, audius-2022]

# Tier A/B Matching (Phase 12-14)
tier_match:
  tier_a:
    all:
      - property: is_upgrade_function
        op: eq
        value: true
      - property: visibility
        op: in
        value: [public, external]
    none:
      - property: has_access_control
        op: eq
        value: true
  tier_b:
    # LLM can add context about upgrade mechanism and risk
    any:
      - has_risk_tag: upgrade
      - has_risk_tag: access_control
  aggregation:
    mode: tier_a_required  # Tier A must match; Tier B adds context

# Exploit Database Similarity (Phase 10)
exploit_similarity:
  matches:
    - wormhole-2022
    - audius-2022
    - general-unprotected-upgrade-pattern
  signature: "unprotected_upgrade_function"
  similarity_threshold: 0.95
  total_funds_at_risk: "$331M+ (Wormhole $325M + Audius $6M)"

