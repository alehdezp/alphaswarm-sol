test_coverage:
  projects: [upgrade-proxy]
  true_positives: 8
  true_negatives: 13
  false_positives: 1
  false_negatives: 4
  edge_cases: 5
  variations_tested: 7
  precision: 0.8889
  recall: 0.6667
  variation_score: 1.00
  last_tested: "2025-12-31"
  notes: |
    READY STATUS - Production-ready with known builder limitations.

    Test Summary (DelegatecallTest.sol - 26 functions, 22 with delegatecall):
    - TP: 8 vulnerable functions correctly detected
    - FP: 1 (SafeWithWhitelist - builder bug in validates_delegatecall_target)
    - FN: 4 missed due to builder limitations (storage, external calls, computed, assembly)
    - TN: 13 safe functions correctly excluded
    - Variations: 7/7 (function naming, parameter naming, access control styles)

    Key Strengths:
    - Detects parameter-based delegatecall to user-controlled targets
    - Works across naming variations (execute/proxy/invoke/call)
    - Works across parameter naming (target/impl/to/logic/contract)
    - Correctly excludes access-controlled delegatecall
    - Correctly excludes proxy upgrade context

    Known Builder Limitations:
    1. delegatecall_target_user_controlled only detects direct parameters
       - Misses: storage variables, external call results, computed addresses
    2. Assembly delegatecall NOT detected by builder
    3. validates_delegatecall_target has false negatives (mapping whitelists)

    Real-World Coverage:
    - Detects Parity Wallet #1 style ($30M) - user-controlled delegatecall
    - Detects Parity Wallet #2 style ($300M) - delegatecall to destroyable library
    - Production-ready for parameter-based delegatecall vulnerabilities

    Recommended Improvements (requires builder changes):
    - Taint tracking for storage-based targets (would fix 3 FN)
    - Assembly delegatecall detection (would fix 1 FN)
    - Improved whitelist validation detection (would fix 1 FP)
    - Estimated improvement: Precision 92%, Recall 100%

