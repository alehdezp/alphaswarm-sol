# =============================================================================
# PATTERN: upgrade-008-delegatecall-untrusted
# =============================================================================

id: upgrade-008
vulndoc: upgrade/proxy
name: "Delegatecall to Untrusted Target"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  This pattern detects functions that use `delegatecall` with user-controlled or untrusted
  target addresses, allowing attackers to execute arbitrary code in the contract's storage
  context. This is one of the most dangerous vulnerabilities in Solidity.

  **Semantic Detection**: Uses BEHAVIORAL detection (not name matching) to identify
  delegatecall usage with untrusted targets regardless of:
  - Function names: `execute()`, `proxy()`, `call()`, `invoke()`, custom names
  - Parameter names: `target`, `impl`, `to`, `address`, `contract`, etc.
  - Implementation patterns: direct parameters, storage variables, computed addresses

  ## Why It's Critical

  Delegatecall to untrusted targets is **CRITICAL** severity because:

  1. **Complete Storage Access**: Delegatecall executes external contract code with FULL
     access to the caller's storage, allowing arbitrary state modifications

  2. **Storage Collision**: Attacker can overwrite critical state variables by matching
     storage slots (owner, balances, roles, configuration)

  3. **Context Preservation**: The malicious code executes with `msg.sender` and `msg.value`
     of the original caller, enabling privilege escalation

  4. **Irreversible Damage**: Once executed, storage modifications are permanent unless
     explicitly reversed

  5. **No Sandboxing**: Unlike regular `call`, there are NO security boundaries - the
     external code has identical permissions to the calling contract

  ## Real-World Exploits

  ### Parity Multisig Wallet Hack #1 ($30M - July 2017)

  **Vulnerability**: Delegatecall to user-controlled library address

  **Attack**: The Parity wallet allowed any user to call `delegatecall` with an arbitrary
  library address. Attackers provided a malicious library that changed the wallet's owner
  to themselves when executed via delegatecall.

  **Impact**: $30 million stolen from multiple wallets.

  **Reference**: [Parity Wallet Hack 1](https://blog.openzeppelin.com/on-the-parity-wallet-multisig-hack-405a8c12e8f7)

  ### Parity Multisig Wallet Hack #2 ($300M - November 2017)

  **Vulnerability**: Delegatecall to library that could be killed

  **Attack**: The wallet library used via delegatecall was itself a contract that could be
  initialized. An attacker initialized the library, became its owner, and called `selfdestruct`,
  destroying the library code. All wallets delegating to this library became permanently frozen.

  **Impact**: $300 million permanently locked (not stolen, but lost forever).

  **Reference**: [Parity Wallet Hack 2](https://blog.openzeppelin.com/on-the-parity-wallet-multisig-hack-405a8c12e8f7)

  ### General Pattern (2017-2024)

  Delegatecall vulnerabilities are consistently rated CRITICAL in security audits:
  - SWC-112: Delegatecall to Untrusted Callee (SWCID standard)
  - Trail of Bits: Multiple critical findings annually
  - Consensys Diligence: Common pattern in proxy audits
  - OpenZeppelin: Flagged in 90%+ of proxy implementations reviewed

  ## Attack Scenario

  **STORAGE OVERWRITE ATTACK**:
  ```
  Step 1: Attacker identifies function with delegatecall(userAddress, data)
  Step 2: Attacker deploys malicious contract:
          contract Exploit {
              address public owner;  // Storage slot 0 - matches victim's owner

              function pwn() external {
                  owner = msg.sender;  // Overwrites victim's owner!
              }
          }
  Step 3: Attacker calls victim.execute(exploitAddress, "pwn()")
  Step 4: Delegatecall executes Exploit.pwn() in victim's storage context
  Step 5: Victim's storage slot 0 (owner) now points to attacker
  Step 6: Attacker has owner privileges, drains funds
  ```

  **SELFDESTRUCT ATTACK**:
  ```
  Step 1: Attacker creates contract with selfdestruct
  Step 2: Calls victim.execute(attackContract, "destroy()")
  Step 3: Selfdestruct executes in victim's context
  Step 4: Victim contract is destroyed, all funds sent to attacker
  Step 5: Protocol is permanently bricked
  ```

  ## Detection Logic

  This pattern triggers when ALL conditions are met:

  1. **Delegatecall Usage**: Function uses delegatecall operation
     - Detected via `uses_delegatecall: true`
     - Includes low-level assembly delegatecall

  2. **Externally Callable**: Function is public/external
     - `visibility` in [public, external]
     - Internal/private functions are not directly exploitable

  3. **User-Controlled Target**: Delegatecall target comes from user input
     - Detected via `delegatecall_target_user_controlled: true`
     - Includes: function parameters, msg.data, user-controlled storage

  This pattern is SAFE (does NOT trigger) when ANY of these protections exist:

  1. **Access Control**: Only authorized callers can specify target
     - `has_access_gate: true`
     - Modifiers like onlyOwner, onlyRole, onlyGovernance

  2. **Target Validation**: Target address is validated against whitelist
     - `validates_delegatecall_target: true`
     - Checks like: require(approvedTargets[target])

  3. **Proxy Context**: Function is part of proper UUPS/Transparent proxy upgrade
     - `delegatecall_in_proxy_upgrade_context: true`
     - Upgrade functions with proper authorization

scope: Function

lens:
  - OrderingUpgradability
  - ExternalInfluence

severity: critical

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    - property: uses_delegatecall
      op: eq
      value: true
    - property: visibility
      op: in
      value: [public, external]
    - property: delegatecall_target_user_controlled
      op: eq
      value: true

  # At least ONE must match (OR logic) - use for alternatives
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Safe if access control protects who can call the function
    - property: has_access_gate
      op: eq
      value: true
    # Safe if the target is validated against a whitelist
    - property: validates_delegatecall_target
      op: eq
      value: true
    # Safe if this is a proper UUPS/Transparent proxy upgrade function
    - property: delegatecall_in_proxy_upgrade_context
      op: eq
      value: true

