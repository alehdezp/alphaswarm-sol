# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Storage Slot Collision Attack"
    description: |
      Attacker deploys malicious contract with storage layout that matches victim's
      critical state variables (owner, balances, roles). When executed via delegatecall,
      the malicious code overwrites victim's storage.
    preconditions:
      - "Function allows user to specify delegatecall target address"
      - "No validation of target address"
      - "No access control on the function"
    steps:
      - "Deploy malicious contract with storage variables matching victim's layout"
      - "Call victim function with malicious contract address as parameter"
      - "Delegatecall executes malicious code in victim's storage context"
      - "Malicious code overwrites critical state (e.g., owner = attacker)"
      - "Attacker now has privileged access to victim contract"
    impact: "Complete protocol takeover, fund theft, privilege escalation"

  - name: "Selfdestruct via Delegatecall"
    description: |
      Attacker provides contract containing selfdestruct. When executed via delegatecall,
      the selfdestruct operates in the victim's context, destroying the contract and
      sending all ETH to attacker.
    preconditions:
      - "Function allows user to specify delegatecall target"
      - "Contract holds ETH or valuable tokens"
    steps:
      - "Deploy malicious contract with selfdestruct(attackerAddress)"
      - "Call victim function with malicious contract address"
      - "Selfdestruct executes in victim's context"
      - "Victim contract is destroyed"
      - "All ETH sent to attacker"
    impact: "Protocol destruction, total fund loss, permanent bricking"

  - name: "State Variable Manipulation"
    description: |
      Even without matching storage slots exactly, attacker can manipulate any storage
      slot by using inline assembly in the malicious contract to write to specific slots.
    preconditions:
      - "User-controlled delegatecall target"
      - "Victim has valuable state (balances, shares, configurations)"
    steps:
      - "Identify victim's critical storage slots (owner at slot 0, balances mapping at slot 1, etc.)"
      - "Deploy malicious contract with assembly code: sstore(slot, attackerValue)"
      - "Call victim function with malicious address"
      - "Arbitrary storage writes occur in victim's storage"
      - "Critical state is corrupted or controlled by attacker"
    impact: "Arbitrary state manipulation, balance inflation, role assignment"

# How to further verify this is not a false positive
verification_steps:
  - "Verify the function is truly externally callable (public/external visibility)"
  - "Confirm the delegatecall target comes from user input (parameter, msg.data, or user-controlled storage)"
  - "Check if there's ANY validation of the target address (whitelisting, specific address checks)"
  - "Verify there's NO access control preventing arbitrary users from calling this function"
  - "Examine if this is part of a proper proxy upgrade mechanism with authorization"
  - "If in proxy context, verify the authorization is properly implemented and cannot be bypassed"
  - "Check if the contract holds valuable assets (ETH, tokens) or has privileged state"
  - "Review if there are any off-chain or governance controls not visible in the code"

# Recommended fixes
fix_recommendations:
  - name: "Add Access Control"
    description: |
      Restrict the function to authorized callers only (owner, admin, governance).
      This is the MINIMUM required protection for delegatecall.
    example: |
      // Before (VULNERABLE)
      function execute(address target, bytes memory data) external {
          (bool success,) = target.delegatecall(data);
          require(success, "Delegatecall failed");
      }

      // After (SAFE with access control)
      function execute(address target, bytes memory data) external onlyOwner {
          (bool success,) = target.delegatecall(data);
          require(success, "Delegatecall failed");
      }

  - name: "Whitelist Target Addresses"
    description: |
      Maintain a whitelist of approved target addresses and validate against it.
      Combine with access control for defense-in-depth.
    example: |
      mapping(address => bool) public approvedTargets;

      function addApprovedTarget(address target) external onlyOwner {
          approvedTargets[target] = true;
      }

      function execute(address target, bytes memory data) external {
          require(approvedTargets[target], "Target not approved");
          (bool success,) = target.delegatecall(data);
          require(success, "Delegatecall failed");
      }

  - name: "Use Immutable/Hardcoded Target"
    description: |
      If the target address is known at deployment, make it immutable or constant.
      This completely eliminates the attack surface.
    example: |
      // Hardcoded target (safest)
      address private constant LIBRARY = 0x1234...;

      function execute(bytes memory data) external {
          (bool success,) = LIBRARY.delegatecall(data);
          require(success, "Delegatecall failed");
      }

      // Or immutable (set in constructor)
      address private immutable LIBRARY;

      constructor(address _library) {
          require(_library != address(0), "Invalid library");
          LIBRARY = _library;
      }

  - name: "Avoid Delegatecall if Possible"
    description: |
      Consider if regular `call` or direct function calls can achieve the same result.
      Delegatecall should ONLY be used when storage context preservation is essential
      (e.g., proxy patterns, diamond pattern).
    example: |
      // If you don't need storage access, use regular call
      function execute(address target, bytes memory data) external onlyOwner {
          (bool success,) = target.call(data);  // NOT delegatecall
          require(success, "Call failed");
      }

  - name: "Implement Proper UUPS Pattern"
    description: |
      If building an upgradeable contract, use established patterns like OpenZeppelin's
      UUPSUpgradeable with proper authorization checks.
    example: |
      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";

      contract MyContract is UUPSUpgradeable {
          function _authorizeUpgrade(address newImplementation)
              internal
              override
              onlyOwner
          {}
      }

