match:
  # ALL must match (AND logic)
  all:
    # Must be an implementation/upgradeable contract
    - property: is_implementation_contract
      op: eq
      value: true

    # Must have a constructor
    - property: has_constructor
      op: eq
      value: true

    # Constructor must NOT have disabled initializers properly
    # If initializers_disabled == false, constructor has initialization logic
    - property: initializers_disabled
      op: eq
      value: false

  # At least ONE must match (OR logic) - use for alternatives
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none: []

