# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Storage Context Mismatch Exploitation"
    description: |
      Implementation contract uses constructor to initialize critical state variables.
      When proxy delegates to implementation, the constructor has already executed in
      the IMPLEMENTATION's storage context, leaving the PROXY's storage uninitialized.
      Attacker exploits this by calling the initializer function to take ownership.
    preconditions:
      - "Implementation contract uses constructor for state initialization"
      - "Proxy delegates to this implementation"
      - "Proxy's storage is uninitialized"
      - "Initializer function exists and is callable"
    steps:
      - "Protocol deploys implementation contract (constructor executes in implementation storage)"
      - "Protocol deploys proxy pointing to implementation"
      - "Proxy's storage shows owner = address(0), initialized = false"
      - "Attacker calls initialize() function on proxy"
      - "Initialize() sets attacker as owner in PROXY storage"
      - "Attacker now controls the protocol"
    impact: |
      Complete protocol takeover through storage context confusion. Attacker gains:
      - Full ownership privileges in proxy context
      - Control over all funds managed by proxy
      - Ability to upgrade implementation (in UUPS)
      - Ability to modify critical parameters
      - Permanent control (initializer can only be called once)

  - name: "Post-Upgrade Uninitialized State"
    description: |
      After an upgrade to a new implementation that uses constructor for initialization,
      the new implementation's state variables are not initialized in the proxy's storage.
    preconditions:
      - "Upgraded implementation uses constructor"
      - "New state variables introduced"
      - "No initializer called after upgrade"
    steps:
      - "Protocol upgrades to new implementation with constructor-based init"
      - "New implementation's constructor has already executed during deployment"
      - "Proxy's storage does not have new state variables initialized"
      - "Attacker identifies uninitialized state"
      - "Attacker exploits uninitialized state to gain control"
    impact: |
      Partial or complete protocol compromise depending on which state variables
      are uninitialized.

# How to further verify this is not a false positive
verification_steps:
  - "Confirm the contract is an implementation contract (used with a proxy)"
  - "Verify the constructor contains state variable initialization logic"
  - "Check that constructor does NOT call _disableInitializers()"
  - "Verify constructor does NOT only set immutable variables"
  - "Confirm an initializer function exists for proper initialization"
  - "Check deployment scripts - is there atomic deployment + initialization?"
  - "Review if this is intentional for a non-proxy implementation"
  - "Verify the constructor is not empty or contains only events"

# Recommended fixes
fix_recommendations:
  - name: "Use _disableInitializers() in Constructor (BEST PRACTICE)"
    description: |
      Add _disableInitializers() call in the constructor to prevent the implementation
      contract itself from being initialized. All initialization should happen via
      the initializer function which executes in the proxy's storage context.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/Initializable.sol";

      contract SafeImplementation is Initializable {
          address public owner;

          // SAFE: Constructor disables initializers
          /// @custom:oz-upgrades-unsafe-allow constructor
          constructor() {
              _disableInitializers();  // ✓ Prevents implementation initialization
          }

          // Proper initialization via initializer
          function initialize(address _owner) public initializer {
              owner = _owner;  // ✓ Executes in PROXY storage context
          }
      }

  - name: "Move All Initialization to Initializer Function"
    description: |
      Remove all state variable initialization from constructor and move it to
      an initializer function that will execute in the proxy's storage context.
    example: |
      // VULNERABLE
      contract VulnerableImplementation {
          address public owner;

          constructor() {
              owner = msg.sender;  // ❌ Wrong storage context
          }
      }

      // SAFE
      contract SafeImplementation is Initializable {
          address public owner;

          constructor() {
              _disableInitializers();
          }

          function initialize() public initializer {
              owner = msg.sender;  // ✓ Correct storage context
          }
      }

  - name: "Use Immutables for Constructor-Set Values"
    description: |
      If certain values truly need to be set at deployment time and never change,
      use immutable variables. Immutables are stored in the contract bytecode,
      not in storage, so they work correctly with proxies.
    example: |
      // SAFE: Immutables are stored in bytecode, not storage
      contract SafeImplementation is Initializable {
          address public immutable WETH;
          address public immutable FACTORY;
          address public owner;  // Regular state variable

          /// @custom:oz-upgrades-unsafe-allow constructor
          constructor(address _weth, address _factory) {
              WETH = _weth;        // ✓ Immutable - stored in bytecode
              FACTORY = _factory;  // ✓ Immutable - stored in bytecode
              _disableInitializers();
          }

          function initialize(address _owner) public initializer {
              owner = _owner;  // ✓ Regular state - initialized in proxy storage
          }
      }

  - name: "Remove Constructor Entirely"
    description: |
      If the constructor serves no purpose other than state initialization,
      remove it entirely and use only an initializer function.
    example: |
      // SAFE: No constructor, only initializer
      contract SafeImplementation is Initializable {
          address public owner;
          uint256 public fee;

          function initialize(address _owner, uint256 _fee) public initializer {
              owner = _owner;
              fee = _fee;
          }
      }

  - name: "Use OpenZeppelin Upgradeable Contracts"
    description: |
      Use OpenZeppelin's upgradeable contract variants which handle the
      constructor vs initializer pattern correctly by default.
    example: |
      // SAFE: Using OpenZeppelin upgradeable pattern
      import "@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol";
      import "@openzeppelin/contracts-upgradeable/proxy/utils/Initializable.sol";

      contract SafeImplementation is Initializable, OwnableUpgradeable {
          /// @custom:oz-upgrades-unsafe-allow constructor
          constructor() {
              _disableInitializers();
          }

          function initialize() public initializer {
              __Ownable_init();  // OpenZeppelin's proper initialization
          }
      }

