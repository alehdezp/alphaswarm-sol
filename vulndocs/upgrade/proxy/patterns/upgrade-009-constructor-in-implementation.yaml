# =============================================================================
# PATTERN: upgrade-009-constructor-in-implementation
# =============================================================================

id: upgrade-009
vulndoc: upgrade/proxy
name: "Constructor in Proxy Implementation"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  This pattern detects implementation contracts (logic contracts) that use constructors
  to initialize state variables. In the proxy pattern, constructors execute ONLY in the
  implementation contract's own storage context during deployment, NOT in the proxy's
  storage context when delegatecalled.

  **The Core Issue**: When a proxy delegates calls to an implementation contract,
  the implementation's constructor has already executed during the implementation's
  deployment. The constructor's state variable assignments are stored in the
  IMPLEMENTATION's storage, not the PROXY's storage. This leaves the proxy's storage
  uninitialized, creating a critical vulnerability.

  **SEMANTIC DETECTION**: This pattern uses behavioral detection, identifying:
  1. Contracts that ARE implementation contracts (via proxy/upgrade patterns)
  2. Functions that ARE constructors (via Slither's is_constructor property)
  3. Constructors that WRITE state variables (semantic property, not name-based)
  4. Safe patterns excluded: empty constructors, immutable-only constructors

  ## Why It's Dangerous

  When implementation contracts use constructors for initialization:

  1. **Uninitialized Proxy Storage**: Critical variables (owner, admin, initialized flags)
     are NOT set in the proxy's storage

  2. **Takeover Risk**: Attackers can call the initializer function to become owner
     since the proxy's storage shows no initialization occurred

  3. **Complete Control**: Once attacker initializes, they gain full ownership and
     control over protocol funds and logic

  4. **Permanent Impact**: Most initializers have one-time-only protection, so once
     an attacker initializes, the legitimate owner is locked out

  ## Real-World Examples

  ### Storage Context Confusion Pattern

  **Multiple DeFi protocols (2020-2022)** have suffered from this pattern:
  - Implementation uses constructor to set `owner = msg.sender`
  - Constructor executes in implementation's storage during deployment
  - Proxy storage remains uninitialized (owner = address(0))
  - Attacker calls initialize() and becomes owner

  **Note on Audius ($6M, 2022)**: The Audius exploit was a DIFFERENT vulnerability
  (unprotected initializer allowing repeated invocations - see upgrade-005). However,
  the root cause was confusion about constructor vs initializer usage in upgradeable
  contracts, making this pattern critically important to detect.

  ### The Pattern in Practice

  ```solidity
  // VULNERABLE: Constructor in implementation
  contract VulnerableImplementation {
      address public owner;
      bool private initialized;

      constructor() {
          owner = msg.sender;      // ❌ Sets in IMPLEMENTATION storage!
          initialized = true;       // ❌ Sets in IMPLEMENTATION storage!
      }
  }

  contract Proxy {
      // Delegates to VulnerableImplementation
      // owner = address(0) in PROXY storage!
      // initialized = false in PROXY storage!
  }

  // Attack: Anyone can call initialize() because proxy storage shows not initialized
  ```

  ## Detection Logic

  This pattern triggers when ALL conditions are met:

  **Scope: Contract** (we detect at contract level, not function level)

  1. **Implementation Contract**: Contract is an implementation contract OR upgradeable
     - `is_implementation_contract == true` OR `is_upgradeable == true`

  2. **Has Constructor**: Contract source code contains constructor
     - Detected via source code analysis (not via Function nodes)

  3. **Constructor Initializes State**: Constructor is NOT empty/safe
     - `initializers_disabled == false` (no `_disableInitializers()` call)

  **Safe Patterns (NONE conditions)**:
  - Constructor calls `_disableInitializers()` (OpenZeppelin pattern)
  - Constructor only sets immutable variables (immutables are in bytecode, not storage)
  - Constructor is completely empty

  ## Important Distinction

  **This pattern (upgrade-009)** vs **upgrade-005 (unprotected initializer)**:

  | Pattern | Issue | Attack Vector |
  |---------|-------|---------------|
  | upgrade-009 | Using constructor instead of initializer | Storage context mismatch |
  | upgrade-005 | Unprotected initialize() function | Front-running initialization |

  Both can lead to takeover, but through different mechanisms. This pattern focuses
  on the ARCHITECTURAL mistake of using constructors in proxy implementations.

