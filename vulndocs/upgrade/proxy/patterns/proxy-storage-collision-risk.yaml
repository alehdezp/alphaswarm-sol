id: proxy-storage-collision-risk
vulndoc: upgrade/proxy
name: Proxy Storage Collision Risk
description: Upgradeable contract without storage gap may have storage collisions with proxy (CWE-1321)
scope: Contract
lens:
  - Upgradeability
severity: high
match:
  all:
    - property: is_upgradeable
      op: eq
      value: true
    - property: upgradeable_without_storage_gap
      op: eq
      value: true
