# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Storage Collision via Parent Upgrade"
    description: |
      Base contract is upgraded to add new state variables without using storage
      gap slots, causing child contract variables to shift to new storage positions
      and become corrupted.
    preconditions:
      - "Contract is upgradeable (uses proxy pattern)"
      - "Contract inherits from upgradeable base contract(s)"
      - "Base contract lacks storage gap"
      - "Child contract has its own state variables"
    steps:
      - "Protocol deploys Version 1: Base + Child contracts with correct storage"
      - "Users interact, balances/state are written to storage"
      - "Protocol upgrades Base contract to Version 2 with new state variables"
      - "New base variables occupy slots previously used by child variables"
      - "Child contract reads corrupted data from shifted storage slots"
      - "User balances become incorrect, funds are lost or stolen"
    impact: |
      Complete storage corruption leading to:
      - User fund loss (balance mappings corrupted)
      - Broken access control (owner/role variables corrupted)
      - Incorrect protocol logic (parameter variables corrupted)
      - Unrecoverable state (cannot migrate corrupted storage)

  - name: "Multi-Level Inheritance Collision"
    description: |
      Complex inheritance hierarchies (A -> B -> C) where middle contract B is
      upgraded without storage gap, corrupting both B's and C's state variables.
    preconditions:
      - "Contract chain: Base (A) -> Intermediate (B) -> Final (C)"
      - "Intermediate contract B lacks storage gap"
      - "Intermediate B is upgraded to add variables"
    steps:
      - "Deploy A (2 vars) -> B (3 vars, slots 2-4) -> C (2 vars, slots 5-6)"
      - "Upgrade B to add 2 new variables (now 5 vars, slots 2-6)"
      - "C's variables shift from slots 5-6 to slots 7-8"
      - "Storage slots 5-6 now contain corrupted data"
    impact: |
      Cascading storage corruption affecting all child contracts in the chain.

  - name: "Silent Data Corruption in Production"
    description: |
      Storage collision occurs but goes undetected because contracts continue to
      function, reading corrupted data as if it were valid, leading to incorrect
      balances and state.
    preconditions:
      - "Production contract with user funds"
      - "Upgrade deployed without storage layout testing"
      - "No storage layout validation in CI/CD"
    steps:
      - "Upgrade deployed with storage collision"
      - "Users continue interacting with contract"
      - "Balances read from wrong storage slots"
      - "Some users see inflated balances, others see zero"
      - "Protocol operates on corrupted state until manually discovered"
    impact: |
      Silent data corruption leads to:
      - Users withdrawing more funds than they deposited (protocol insolvency)
      - Users unable to withdraw (funds locked in corrupted state)
      - Delayed discovery (corruption noticed days/weeks later)
      - Irreversible damage (cannot restore original state)

# How to further verify this is not a false positive
verification_steps:
  - "Verify the contract is truly upgradeable (has proxy or UUPS pattern)"
  - "Confirm the contract uses inheritance (inherits from base contracts)"
  - "Check if base contracts are also upgradeable (if not, gap may not be needed)"
  - "Verify state variables exist that could be affected by collision"
  - "Check if this is a test/mock contract (test contracts may skip gaps intentionally)"
  - "Look for storage gap in base contracts (sometimes defined in parent, not child)"
  - "Review upgrade history to see if variables were already added"
  - "Check if OpenZeppelin Upgrades plugin is used (automated gap validation)"
  - "Verify this isn't a leaf contract with no children (terminal contracts don't need gaps)"

# Recommended fixes
fix_recommendations:
  - name: "Add Standard 50-Slot Storage Gap (OpenZeppelin Convention)"
    description: |
      Add a uint256[50] private __gap array to reserve storage slots for future
      variable additions. This is the OpenZeppelin standard and provides room for
      ~25-50 future variables depending on their types.

      **Gap Naming Convention**: Use `__gap` (double underscore) to indicate
      private/internal use and avoid naming collisions.

      **Gap Size Calculation**: Start with 50 slots, reduce by 1 for each future
      variable added. Example: Add 3 variables → reduce gap from [50] to [47].
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/Initializable.sol";

      contract MyUpgradeableBase is Initializable {
          address public owner;
          mapping(address => uint256) public balances;

          // SAFE: Storage gap reserves slots for future variables
          // Current variables: 2 (owner, balances mapping slot)
          // Gap size: 50 slots for future expansion
          uint256[50] private __gap;

          function initialize(address _owner) public initializer {
              owner = _owner;
          }
      }

      contract MyUpgradeableChild is MyUpgradeableBase {
          uint256 public totalFees;       // Stored AFTER parent + gap
          address public feeCollector;

          // Child also needs gap if it will be inherited
          uint256[50] private __gap;
      }

  - name: "Calculate Gap Size Based on Current Variables"
    description: |
      For more precise gap sizing, calculate based on: 50 - (number of current variables).
      This maximizes future expansion room while maintaining the 50-slot standard.

      **Note**: Mappings and dynamic arrays only use 1 slot (for the keccak256 hash),
      so they count as 1 variable for gap calculation.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract MyBase {
          address public owner;            // 1 slot
          uint256 public totalSupply;      // 1 slot
          mapping(address => uint256) public balances;  // 1 slot
          // Total: 3 slots used

          // Gap size: 50 - 3 = 47 slots
          uint256[47] private __gap;
      }

  - name: "Reduce Gap When Adding Variables in Upgrades"
    description: |
      When upgrading a contract to add new state variables, reduce the gap size
      by the number of variables added to maintain consistent storage layout.

      **CRITICAL**: Always reduce gap size when adding variables. Never add
      variables without reducing gap.
    example: |
      // VERSION 1: Original contract
      contract BaseV1 {
          address public owner;            // slot 0
          uint256 public totalSupply;      // slot 1
          uint256[50] private __gap;       // slots 2-51
      }

      // VERSION 2: Add 2 variables, reduce gap by 2
      contract BaseV2 {
          address public owner;            // slot 0 (unchanged)
          uint256 public totalSupply;      // slot 1 (unchanged)
          uint256 public newFeature1;      // slot 2 (was gap[0])
          address public newFeature2;      // slot 3 (was gap[1])
          uint256[48] private __gap;       // slots 4-51 (reduced from 50 to 48)
      }

  - name: "Use OpenZeppelin Upgrades Plugin for Automated Validation"
    description: |
      Use the OpenZeppelin Upgrades Hardhat/Foundry plugin to automatically validate
      storage layout compatibility during upgrades. The plugin will detect storage
      collisions and warn you before deployment.

      **Plugin Features**:
      - Automatic storage layout validation
      - Detects missing storage gaps
      - Prevents incompatible upgrades
      - Generates storage layout reports
    example: |
      // hardhat.config.js
      require('@openzeppelin/hardhat-upgrades');

      // Deploy with validation
      const MyContract = await ethers.getContractFactory("MyContract");
      const proxy = await upgrades.deployProxy(MyContract, [initArgs]);

      // Upgrade with validation (will fail if storage layout incompatible)
      const MyContractV2 = await ethers.getContractFactory("MyContractV2");
      await upgrades.upgradeProxy(proxy.address, MyContractV2);

      // Validate upgrade without deploying
      await upgrades.validateUpgrade(proxy.address, MyContractV2);

  - name: "Add Storage Layout Tests to CI/CD"
    description: |
      Implement automated storage layout testing in your CI/CD pipeline to catch
      storage collisions before deployment.
    example: |
      // test/storage-layout.test.js
      const { expect } = require("chai");
      const { upgrades } = require("hardhat");

      describe("Storage Layout", function() {
          it("should have storage gaps in all upgradeable contracts", async function() {
              const MyContract = await ethers.getContractFactory("MyContract");

              // Validate storage layout
              await upgrades.validateImplementation(MyContract);

              // Check for storage gaps (custom validation)
              const storageLayout = await upgrades.erc1967.getImplementationAddress(
                  proxy.address
              );
              // Assert gap exists...
          });

          it("should maintain storage layout across upgrades", async function() {
              // Deploy V1
              const V1 = await ethers.getContractFactory("MyContractV1");
              const proxy = await upgrades.deployProxy(V1);

              // Validate V2 upgrade
              const V2 = await ethers.getContractFactory("MyContractV2");
              await expect(
                  upgrades.validateUpgrade(proxy.address, V2)
              ).to.not.be.reverted;
          });
      });

  - name: "Document Gap Usage in NatSpec Comments"
    description: |
      Document the storage gap and its usage in NatSpec comments to help future
      developers understand how to properly add variables.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract MyUpgradeableBase {
          address public owner;
          uint256 public totalSupply;

          /**
           * @dev Storage gap for future variable additions.
           *
           * Current usage: 2 slots (owner, totalSupply)
           * Gap size: 50 slots (slots 2-51)
           * Total reserved: 52 slots
           *
           * When adding new variables in upgrades:
           * 1. Add variables here (before __gap)
           * 2. Reduce __gap size by number of variables added
           * 3. Update this comment
           *
           * Example upgrade adding 2 variables:
           *   uint256 public newVar1;
           *   address public newVar2;
           *   uint256[48] private __gap;  // Reduced from 50 to 48
           */
          uint256[50] private __gap;
      }

