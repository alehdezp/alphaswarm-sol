id: upgrade-006-missing-storage-gap
vulndoc: upgrade/proxy
name: "Upgradeable Contract Missing Storage Gap"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  This pattern detects upgradeable contracts with inheritance that lack storage gaps,
  creating a critical risk of storage layout collisions during upgrades. When base
  contracts are upgraded to add new state variables without reserved storage slots,
  child contract variables can be overwritten, leading to:

  - **Data Corruption**: Child contract state variables shifted to wrong storage slots
  - **Fund Loss**: Balance mappings corrupted, user funds become inaccessible or stolen
  - **Broken Logic**: Critical state variables (owner, paused, roles) overwritten
  - **Security Bypass**: Access control state corrupted, unauthorized access granted

  **What is a Storage Gap?**

  A storage gap is an array of reserved storage slots (typically `uint256[50] private __gap;`)
  added to upgradeable base contracts to allow future variable additions without affecting
  child contract storage layouts.

  ## Why It's Critical

  Upgradeable contracts using inheritance are HIGHLY vulnerable without storage gaps because:

  1. **Storage Layout is Deterministic**: Solidity assigns storage slots sequentially
     across the inheritance chain (parent variables first, then child variables)

  2. **Upgrades Change Parent Layout**: When you upgrade a parent contract and add new
     state variables, all subsequent variables in child contracts shift to new slots

  3. **Collision = Data Corruption**: The child's first variable now occupies the slot
     of the parent's new variable, causing complete data corruption

  4. **Irreversible Damage**: Once storage is corrupted, data cannot be recovered without
     complex storage migration (if even possible)

  5. **Silent Failure**: The contract continues to function but with corrupted state,
     making the bug extremely dangerous and hard to detect

  ## Attack/Corruption Scenario

  **WITHOUT STORAGE GAP (VULNERABLE)**:
  ```solidity
  // VERSION 1: Parent contract
  contract BaseV1 {
      address public owner;           // slot 0
      mapping(address => uint256) public balances;  // slot 1
      // ❌ NO STORAGE GAP - Future variables will shift child storage!
  }

  contract ChildV1 is BaseV1 {
      uint256 public totalFees;       // slot 2
      address public feeCollector;    // slot 3
  }

  // VERSION 2: Upgrade parent to add new variable
  contract BaseV2 {
      address public owner;           // slot 0
      mapping(address => uint256) public balances;  // slot 1
      uint256 public newFeature;      // slot 2 ⚠️ COLLISION!
      // ❌ Still no storage gap
  }

  contract ChildV2 is BaseV2 {
      uint256 public totalFees;       // NOW AT slot 3 (was slot 2) ⚠️
      address public feeCollector;    // NOW AT slot 4 (was slot 3) ⚠️
  }

  // CORRUPTION:
  // - BaseV2.newFeature (slot 2) overwrites ChildV1.totalFees value
  // - ChildV2.totalFees (slot 3) reads old feeCollector address as uint256
  // - ChildV2.feeCollector (slot 4) reads uninitialized storage (address(0))
  // - Result: Complete state corruption, fund loss, broken logic
  ```

  **WITH STORAGE GAP (SAFE)**:
  ```solidity
  // VERSION 1: Parent contract with storage gap
  contract BaseSafe {
      address public owner;           // slot 0
      mapping(address => uint256) public balances;  // slot 1
      uint256[50] private __gap;      // slots 2-51 ✓ Reserved for future use
  }

  contract ChildSafe is BaseSafe {
      uint256 public totalFees;       // slot 52 (after gap)
      address public feeCollector;    // slot 53
  }

  // VERSION 2: Upgrade parent using gap slots
  contract BaseSafeV2 {
      address public owner;           // slot 0
      mapping(address => uint256) public balances;  // slot 1
      uint256 public newFeature;      // slot 2 (uses first gap slot) ✓
      uint256[49] private __gap;      // slots 3-51 (reduced by 1) ✓
  }

  contract ChildSafeV2 is BaseSafeV2 {
      uint256 public totalFees;       // slot 52 (UNCHANGED) ✓
      address public feeCollector;    // slot 53 (UNCHANGED) ✓
  }

  // SAFE:
  // - BaseSafeV2.newFeature uses gap slot 2
  // - ChildSafeV2 variables remain at slots 52-53
  // - No collision, no corruption
  ```

  ## Detection Logic

  This pattern triggers when ALL conditions are met:

  1. **Contract is Upgradeable**: Contract uses proxy pattern (UUPS/Transparent/Beacon)
     - Detected via: `is_upgradeable == true`

  2. **Contract Has Inheritance**: Contract inherits from base contracts
     - Detected via: `has_inheritance == true`

  3. **Contract Has State Variables**: Contract defines state variables
     - Detected via: `state_var_count > 0`

  4. **Missing Storage Gap**: Contract lacks storage gap array
     - Detected via: `has_storage_gap == false`

  **Alternative Detection**: The builder provides a derived property that combines these:
  - `upgradeable_without_storage_gap == true`

  ## Real-World Examples

  ### Audius Governance Takeover ($6M - July 2022)

  **Context**: While primarily an unprotected initializer vulnerability, the Audius hack
  also involved storage layout issues in their upgradeable governance contracts.

  **Impact**: $6 million in AUDIO tokens stolen from community treasury

  **Reference**: [Audius Post-Mortem](https://blog.audius.co/article/audius-governance-takeover-post-mortem-7-23-22)

  ### Common DeFi Pattern (2020-2024)

  Storage gap issues are among the **most common findings** in DeFi security audits:

  - **Trail of Bits**: Storage collision is a recurring critical finding in their audits
  - **Code4rena**: Hundreds of "Missing storage gap" findings across contests
  - **Sherlock**: Medium-High severity finding in most upgradeable protocol audits
  - **OpenZeppelin**: Documents this as CRITICAL requirement for all upgradeable contracts

  **Severity in Audits**: Typically rated HIGH or MEDIUM depending on:
  - HIGH: Base contracts with many state variables (high collision probability)
  - HIGH: Contracts handling user funds/balances (high impact)
  - MEDIUM: Contracts with few variables (lower collision probability)
  - MEDIUM: Contracts without fund handling (lower impact)

  ### Notable Audit Findings

  Multiple high-profile protocols have had this issue caught in audits before deployment:
  - Compound Finance governance contracts
  - Aave V3 upgrade contracts
  - Various Olympus DAO forks
  - Multiple DeFi lending/borrowing protocols

  **What Could Have Happened Without Audits**:
  - User balance corruption leading to fund theft
  - Ownership state corruption allowing unauthorized upgrades
  - Role assignment corruption bypassing access control
  - Critical parameter corruption (fee rates, collateral ratios, etc.)

  ## OpenZeppelin Best Practices

  OpenZeppelin's upgradeable contract library **requires** storage gaps in all base contracts:

  ```solidity
  // From @openzeppelin/contracts-upgradeable
  abstract contract OwnableUpgradeable is Initializable, ContextUpgradeable {
      address private _owner;

      // Storage gap to allow for future variable additions
      uint256[49] private __gap;  // 50 total slots (1 used + 49 gap)
  }

  abstract contract PausableUpgradeable is Initializable, ContextUpgradeable {
      bool private _paused;

      uint256[49] private __gap;  // 50 total slots (1 used + 49 gap)
  }
  ```

  **Gap Size Convention**: OpenZeppelin uses **50 slots** as the standard gap size,
  providing room for ~25-50 future state variables depending on their types.

