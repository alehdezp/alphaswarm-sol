# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Parity-Style Library Destruction"
    description: |
      Implementation library contains selfdestruct function (with or without access control).
      Attacker gains control or owner accidentally triggers selfdestruct, destroying the
      library and bricking all proxies that depend on it.
    preconditions:
      - "Library contract contains selfdestruct operation"
      - "Multiple proxy contracts delegatecall to this library"
      - "Proxies hold user funds or valuable state"
      - "Attacker can trigger selfdestruct (via exploit or key compromise)"
    steps:
      - "Attacker identifies library with selfdestruct function"
      - "Attacker gains control (exploit, front-run initialization, compromised key)"
      - "Attacker calls selfdestruct function on library"
      - "Library code is destroyed from blockchain"
      - "All proxies delegatecalling to library are now bricked"
      - "All funds in proxies are permanently locked"
      - "No recovery possible - selfdestruct is irreversible"
    impact: |
      CATASTROPHIC. Permanent fund loss for ALL users across ALL proxies.
      Parity incident: $300M+ frozen forever across 587 wallets.
    cvss: 10.0
    real_world_exploit: "Parity Multisig Library (November 2017, $300M+ frozen)"

  - name: "Implementation Contract Destruction"
    description: |
      Proxy implementation contract contains "emergency" selfdestruct intended for
      deprecation. Owner accidentally triggers or key is compromised, destroying
      implementation and bricking all proxies.
    preconditions:
      - "Implementation contract contains selfdestruct"
      - "Multiple proxies point to this implementation"
      - "Selfdestruct has access control (but still CRITICAL mistake)"
    steps:
      - "Implementation deployed with selfdestruct 'emergency' function"
      - "Multiple proxies deployed pointing to implementation"
      - "Owner key is compromised OR owner accidentally calls selfdestruct"
      - "Implementation destroyed"
      - "All proxies bricked, funds locked forever"
    impact: |
      CATASTROPHIC. Even with access control, selfdestruct in implementations
      is an architectural mistake. Compromised owner key = protocol destruction.
    cvss: 9.5
    common_mistake: "Developers add selfdestruct for 'emergency deprecation'"

  - name: "Malicious Upgrade to Selfdestruct Implementation"
    description: |
      If upgrade function is compromised, attacker can upgrade to malicious
      implementation containing selfdestruct in fallback/receive, then brick
      protocol by triggering any function call.
    preconditions:
      - "Attacker can control implementation address (compromised upgrade)"
      - "Attacker deploys malicious implementation with selfdestruct"
    steps:
      - "Attacker gains upgrade control (separate vulnerability)"
      - "Attacker deploys malicious implementation with selfdestruct in fallback"
      - "Attacker upgrades proxy to malicious implementation"
      - "Attacker calls any function on proxy"
      - "Delegatecall triggers malicious fallback → selfdestruct"
      - "Implementation destroyed, proxy bricked"
    impact: |
      CRITICAL. Combined with unprotected upgrade, enables permanent protocol
      destruction instead of just fund drainage.
    cvss: 9.0
    requires: "Separate upgrade vulnerability (upgrade-007)"

  - name: "Accidental Owner Destruction"
    description: |
      Even with proper access control, owner accidentally calls selfdestruct
      function (misunderstanding delegatecall context, testing in production,
      fat-finger error).
    preconditions:
      - "Implementation contains selfdestruct with onlyOwner protection"
      - "Owner has access to production keys"
      - "Owner makes operational mistake"
    steps:
      - "Owner intends to destroy implementation contract itself"
      - "Owner calls selfdestruct via proxy (thinking it's direct call)"
      - "OR owner calls selfdestruct on library thinking it's isolated"
      - "Implementation/library destroyed"
      - "All proxies bricked"
      - "Owner realizes mistake too late - irreversible"
    impact: |
      CATASTROPHIC. Even well-intentioned owners can make catastrophic mistakes.
      Selfdestruct should NEVER exist in implementations, regardless of protection.
    cvss: 9.0
    mitigation: "REMOVE selfdestruct entirely from implementations"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm contract source contains 'selfdestruct' or 'suicide' keyword"
  - "Verify contract is implementation (is_implementation_contract) OR upgradeable OR library"
  - "Check if selfdestruct is in function that can be delegatecalled"
  - "Confirm this is NOT a test/mock contract (check contract name)"
  - "Verify proxies exist or are intended to use this implementation"
  - "Check if selfdestruct is protected (still critical but affects likelihood)"
  - "Review architecture - is this implementation used with delegatecall?"
  - "Assess impact - how many proxies would be affected?"
  - "Confirm this is not dead code (function is callable)"

# Recommended fixes
fix_recommendations:
  - name: "REMOVE Selfdestruct Entirely (STRONGLY RECOMMENDED)"
    description: |
      The ONLY safe fix is to completely remove selfdestruct from implementation
      contracts and libraries. There is NO safe way to use selfdestruct in
      delegatecall contexts.

      For deprecation, use alternative patterns:
      - Upgrade to empty/paused implementation
      - Add pause functionality
      - Use upgrade mechanism to disable features
      - Set state flags to disable operations
    example: |
      // VULNERABLE
      contract VaultImplementation {
          function emergencyShutdown() external onlyOwner {
              selfdestruct(payable(owner));  // ❌ NEVER DO THIS
          }
      }

      // SAFE: Use pause pattern instead
      import "@openzeppelin/contracts-upgradeable/security/PausableUpgradeable.sol";

      contract VaultImplementation is PausableUpgradeable {
          function emergencyPause() external onlyOwner {
              _pause();  // ✓ Pause operations, don't destroy
          }

          function deposit() external whenNotPaused {
              // Operations disabled when paused
          }
      }

  - name: "Upgrade to Empty Implementation (Deprecation)"
    description: |
      If you need to deprecate a protocol, upgrade to an empty implementation
      that reverts all calls or upgrade to an implementation with only withdrawal
      functions enabled.
    example: |
      // SAFE: Empty implementation for deprecation
      contract DeprecatedImplementation {
          // Reverts all calls
          fallback() external {
              revert("Protocol deprecated - please withdraw funds");
          }

          // Or allow only withdrawals
          function withdraw() external {
              // Allow users to retrieve funds
          }
      }

      // Upgrade flow:
      // 1. Announce deprecation (timelock period)
      // 2. Upgrade all proxies to DeprecatedImplementation
      // 3. Users can still withdraw, but no new operations
      // 4. Implementation remains deployed (proxies still work)

  - name: "Use State-Based Deprecation"
    description: |
      Add a state variable to track protocol lifecycle. Use modifiers to
      disable operations when deprecated, but keep code intact.
    example: |
      // SAFE: State-based deprecation
      contract VaultImplementation {
          enum State { Active, Deprecated }
          State public protocolState;

          modifier whenActive() {
              require(protocolState == State.Active, "Protocol deprecated");
              _;
          }

          function deprecate() external onlyOwner {
              protocolState = State.Deprecated;  // ✓ Disable without destroying
          }

          function deposit() external whenActive {
              // Only works when Active
          }

          function withdraw() external {
              // Always works - users can exit
          }
      }

  - name: "Circuit Breaker Pattern"
    description: |
      Implement emergency pause with time-delayed resumption. Allows stopping
      operations without permanent destruction.
    example: |
      // SAFE: Circuit breaker
      import "@openzeppelin/contracts-upgradeable/security/PausableUpgradeable.sol";

      contract VaultImplementation is PausableUpgradeable {
          uint256 public pauseStartTime;
          uint256 public constant MAX_PAUSE_DURATION = 30 days;

          function emergencyPause() external onlyOwner {
              _pause();
              pauseStartTime = block.timestamp;
          }

          function unpause() external onlyOwner {
              require(
                  block.timestamp < pauseStartTime + MAX_PAUSE_DURATION,
                  "Pause expired - protocol enters safe mode"
              );
              _unpause();
          }

          // Operations disabled when paused, but code intact
      }

  - name: "Review All Inherited Contracts"
    description: |
      Selfdestruct can be inherited from base contracts. Review entire
      inheritance chain to ensure no inherited selfdestruct functions.
    example: |
      // Check inheritance for selfdestruct
      // Tools:
      // - Slither: slither contract.sol --print inheritance-graph
      // - Solidity: flatten contract and search for "selfdestruct"
      // - VKG: Query inheritance tree for selfdestruct

      // If found in parent:
      // - Override and remove selfdestruct
      // - OR remove that parent from inheritance
      // - OR fork parent without selfdestruct

  - name: "Audit Library Dependencies"
    description: |
      If using external libraries via delegatecall, audit them for selfdestruct.
      A selfdestruct in a delegatecalled library is just as dangerous.
    example: |
      // Audit checklist:
      // 1. List all libraries used via delegatecall
      // 2. Review library source for selfdestruct/suicide
      // 3. Check library upgrade mechanism (can it be changed to malicious version?)
      // 4. Consider forking and maintaining libraries yourself
      // 5. Use only well-audited, immutable libraries

