# =============================================================================
# PATTERN: upgrade-010-selfdestruct-in-implementation
# =============================================================================

id: upgrade-010
vulndoc: upgrade/proxy
name: "Selfdestruct in Proxy Implementation"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  This pattern detects implementation contracts (logic contracts) or libraries used by proxies
  that contain `selfdestruct` or `suicide` operations. When selfdestruct is executed via
  delegatecall from a proxy, it destroys the implementation contract's code, permanently
  bricking ALL proxies pointing to that implementation and locking funds forever.

  **CRITICAL SEVERITY**: This is one of the most devastating vulnerabilities in proxy patterns,
  as demonstrated by the Parity Multisig Library incident that froze $300M+ in Ether.

  **SEMANTIC DETECTION**: This pattern uses behavioral detection:
  1. Contracts that ARE implementation contracts OR upgradeable contracts OR libraries
  2. Contracts that CONTAIN selfdestruct/suicide operations (detected in source code)
  3. No false positives from regular contracts (non-proxy implementations can safely use selfdestruct)

  ## Why It's Catastrophic

  When selfdestruct is called via delegatecall from a proxy:

  1. **Implementation Code Destroyed**: The implementation contract's bytecode is deleted from
     the blockchain, leaving an empty address

  2. **All Proxies Bricked**: EVERY proxy pointing to this implementation stops working
     immediately. Delegatecalls fail because there's no code at the implementation address

  3. **Funds Locked Forever**: All funds in proxy contracts become permanently inaccessible.
     No functions work, no withdrawals possible, no upgrades possible

  4. **Irreversible**: Selfdestruct cannot be undone. Once executed, the damage is permanent
     and affects potentially hundreds of deployed proxies

  5. **No Recovery Path**: Unlike other vulnerabilities, there is NO recovery mechanism.
     The proxies cannot be upgraded because the upgrade function delegatecalls to destroyed code

  ## Real-World Catastrophe

  ### Parity Multisig Library Kill ($300M+ Frozen, November 2017)

  **The Setup**:
  - Parity deployed a library contract containing multisig wallet logic
  - 587 multisig wallet proxies delegatecalled to this library
  - Combined holdings: $300M+ in Ether
  - Library contained unprotected `kill()` function that called `selfdestruct`

  **The Attack**:
  - November 6, 2017: User "devops199" (possibly accidental) claimed ownership of the library
  - Called `kill()` function on the library contract
  - Library executed selfdestruct, destroying the implementation code
  - All 587 wallet proxies instantly bricked
  - $300M+ in Ether permanently frozen with no recovery path

  **The Aftermath**:
  - Affected projects: Polkadot ($90M+), Edgeless Casino, Swarm City, Aeternity, many more
  - Led to Ethereum hard fork proposal (rejected) to recover funds
  - Funds remain frozen to this day (2025)
  - Sparked major security review of proxy patterns across ecosystem

  **References**:
  - Parity Postmortem: https://www.parity.io/blog/a-postmortem-on-the-parity-multi-sig-library-self-destruct
  - CoinDesk Coverage: https://www.coindesk.com/tech/2017/11/08/parity-multi-sig-wallet-bug-freezes-300m-in-ether/
  - Affected Wallets List: https://github.com/paritytech/parity-ethereum/issues/6995

  ## Attack Scenarios

  ### Scenario 1: Unprotected Selfdestruct in Library

  ```solidity
  // VULNERABLE: Library with selfdestruct
  library WalletLibrary {
      address public owner;

      function initWallet(address _owner) public {
          owner = _owner;
      }

      function kill() public {
          require(msg.sender == owner);
          selfdestruct(payable(owner));  // ❌ CRITICAL: Destroys ALL proxies!
      }
  }

  // Proxy wallet delegatecalls to library
  contract Wallet {
      address public libraryAddress;

      fallback() external payable {
          (bool success,) = libraryAddress.delegatecall(msg.data);
          require(success);
      }
  }

  // Attack:
  // 1. Attacker becomes owner of library (via exploit or front-running)
  // 2. Calls kill() via library
  // 3. Library destroyed
  // 4. ALL wallet proxies bricked, funds locked forever
  ```

  ### Scenario 2: Implementation with Emergency Selfdestruct

  ```solidity
  // VULNERABLE: Implementation with "emergency" selfdestruct
  contract VaultImplementation is Ownable {
      mapping(address => uint256) public balances;

      function deposit() external payable {
          balances[msg.sender] += msg.value;
      }

      // "Emergency" function - CRITICAL MISTAKE
      function emergencyShutdown() external onlyOwner {
          selfdestruct(payable(owner));  // ❌ CRITICAL: Destroys ALL proxies!
      }
  }

  contract VaultProxy {
      address public implementation;

      fallback() external payable {
          (bool success,) = implementation.delegatecall(msg.data);
          require(success);
      }
  }

  // Even with access control, this is CRITICAL:
  // - Owner can accidentally destroy implementation
  // - Compromised owner key destroys all proxies
  // - No way to recover after selfdestruct
  ```

  ## Detection Logic

  This pattern triggers when ALL conditions are met:

  **Scope: Contract** (contract-level detection)

  1. **Implementation/Library Context**: Contract is used in proxy pattern
     - `is_implementation_contract == true` OR
     - `is_upgradeable == true` OR
     - `kind == "library"` (libraries used by proxies)

  2. **Contains Selfdestruct**: Contract source contains selfdestruct/suicide
     - `has_selfdestruct == true`
     - Detects both `selfdestruct` and deprecated `suicide` keyword

  **Safe Patterns (NOT flagged)**:
  - Regular contracts (not implementations, not libraries)
  - Contracts not used in proxy patterns
  - Test/mock contracts (filtered by name heuristics)

  **IMPORTANT DISTINCTION**: This pattern INTENTIONALLY flags ANY selfdestruct in
  implementation contracts, even with access control. While access control reduces
  immediate exploitability, the EXISTENCE of selfdestruct in implementations is
  an architectural mistake that should ALWAYS be flagged and removed.

scope: Contract

lens:
  - OrderingUpgradability

severity: critical

# Pattern quality status (set by vrs-test-conductor agent)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # CORE SIGNAL: Contract contains selfdestruct operation
    - property: has_selfdestruct
      op: eq
      value: true

  # At least ONE must match (OR logic) - proxy/implementation context
  any:
    # Implementation contract context
    - property: is_implementation_contract
      op: eq
      value: true

    # Upgradeable contract context
    - property: is_upgradeable
      op: eq
      value: true

    # Library context (libraries used by proxies via delegatecall)
    - property: kind
      op: eq
      value: library

  # NONE can match (NOT logic) - exclude test/mock contracts
  none: []

