    description: "Attacker calls unprotected reinitializer to reset contract state"
    preconditions:
      - "Contract is upgradeable (proxy pattern)"
      - "Reinitializer function exists for new implementation version"
      - "No `reinitializer(version)` modifier or access control"
      - "Function is externally callable"
    steps:
      - "Attacker identifies unprotected reinitializer function (e.g., `initializeV2()`)"
      - "Calls function after contract is already initialized"
      - "Function overwrites state variables to attacker-controlled values"
      - "Contract functionality disrupted or attacker gains privileged access"
    impact: "State reset, parameter manipulation, potential ownership takeover"
    cvss: 9.1

  - name: "Governance Takeover via Reinitialization"
    description: "Attacker uses reinitializer to manipulate governance parameters (Audius attack)"
    preconditions:
      - "Reinitializer modifies governance state (voting power, treasury, roles)"
      - "No protection against multiple calls (storage collision or missing guard)"
      - "Governance contract holds significant funds"
    steps:
      - "Contract is upgraded and new reinitializer is added"
      - "Storage collision or missing guard allows repeated initialization"
      - "Attacker calls reinitializer to gain massive voting power"
      - "Uses voting power to pass malicious proposal"
      - "Transfers treasury funds to attacker wallet"
    impact: "Complete governance takeover, treasury drainage ($6M in Audius case)"
    cvss: 9.8

  - name: "Front-Running Legitimate Reinitialization"
    description: "Attacker front-runs protocol's legitimate reinitializer call"
    preconditions:
      - "Protocol upgrades contract and plans to call reinitializer"
      - "Reinitializer lacks access control"
      - "Attacker monitors mempool for upgrade transaction"
    steps:
      - "Protocol submits upgrade transaction"
      - "Attacker sees pending upgrade in mempool"
      - "Attacker front-runs with higher gas, calling reinitializer first"
      - "Sets malicious parameters (owner = attacker, fees = 100%, etc.)"
      - "Protocol's legitimate call reverts (already initialized) or is ineffective"
    impact: "Protocol initialization hijacked, attacker controls parameters"
    cvss: 9.5

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function is externally callable (public/external visibility)"
  - "Verify function name contains 'initialize' or similar initialization pattern"
  - "Check function body writes to multiple state variables (initializer behavior)"
  - "Confirm NO `initializer` or `reinitializer(version)` modifier present"
  - "Confirm NO manual initialization flag check (e.g., `require(!initializedV2)`)"
  - "Confirm NO access control (no `onlyOwner`, `onlyAdmin`, role checks)"
  - "Verify contract is upgradeable (uses proxy pattern or has upgrade functions)"
  - "Test: Try calling function multiple times - if succeeds, vulnerability confirmed"
  - "Review upgrade history - was this function added in recent upgrade?"

# Recommended fixes
fix_recommendations:
  - name: "Use OpenZeppelin Reinitializer Modifier (RECOMMENDED)"
    description: "Protect with `reinitializer(version)` modifier from OpenZeppelin Initializable"
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/proxy/utils/Initializable.sol";

      contract MyContractV2 is Initializable {
          uint256 public newStateVariable;

          /// @custom:oz-upgrades-unsafe-allow constructor
          constructor() {
              _disableInitializers();
          }

          // SAFE: reinitializer(2) ensures this can only be called once for version 2
          function initializeV2(uint256 _newValue) external reinitializer(2) {
              newStateVariable = _newValue;
          }
      }

  - name: "Manual Version Check"
    description: "Implement version-based initialization guard manually"
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract MyContractV2 {
          uint256 public version;
          bool public initializedV2;

          // SAFE: Manual guard prevents multiple calls
          function initializeV2(uint256 _newValue) external {
              require(version < 2, "Already initialized to v2 or higher");
              require(!initializedV2, "V2 already initialized");

              version = 2;
              initializedV2 = true;

              // Initialization logic
              newStateVariable = _newValue;
          }
      }

  - name: "Add Access Control + Initialization Guard"
    description: "Require admin/owner authorization AND check initialization flag"
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol";

      contract MyContractV2 is OwnableUpgradeable {
          bool public initializedV2;

          // SAFE: Both access control AND initialization check
          function initializeV2(uint256 _newValue) external onlyOwner {
              require(!initializedV2, "Already initialized");
              initializedV2 = true;

              // Initialization logic
              newStateVariable = _newValue;
          }
      }

  - name: "Use Timelock for Reinitialization"
    description: "Add timelock delay for extra security"
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract MyContractV2 {
          address public timelock;
          bool public initializedV2;

          modifier onlyTimelock() {
              require(msg.sender == timelock, "Only timelock");
              _;
          }

          // SAFE: Timelock + guard ensures controlled reinitialization
          function initializeV2(uint256 _newValue) external onlyTimelock {
              require(!initializedV2, "Already initialized");
              initializedV2 = true;

              // Initialization logic
              newStateVariable = _newValue;
          }
      }

