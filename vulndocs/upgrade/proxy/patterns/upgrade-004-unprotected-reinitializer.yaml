# ROADMAP FIELDS (Future Capabilities)
# =============================================================================

# Semantic Operations (Phase 1-3)
semantic_ops:
  # Reinitializers typically modify critical state
  has_any_operation:
    - MODIFIES_OWNER
    - MODIFIES_ROLES
    - MODIFIES_CRITICAL_STATE

# Behavioral Signature (Phase 2)
behavioral_signature:
  # Reinitializer pattern: writes to multiple privileged/critical state vars
  pattern: "W:priv→W:priv→W:crit"
  matches_exploits: [audius-governance-2022]

# Tier A/B Matching (Phase 12-14)
tier_match:
  tier_a:
    all:
      - property: visibility
        op: in
        value: [public, external]
      - property: is_initializer_function
        op: eq
        value: true
      - property: has_initializer_modifier
        op: eq
        value: false
    none:
      - property: has_access_gate
        op: eq
        value: true
  tier_b:
    # LLM can add context about business logic
    any:
      - has_risk_tag: initialization
      - has_risk_tag: access_control
  aggregation:
    mode: tier_a_required  # Tier A must match; Tier B adds context

# Exploit Database Similarity (Phase 10)
exploit_similarity:
  matches: [audius-governance-2022, allianceblock-2024]
  signature: "unprotected_reinitializer"
  similarity_threshold: 0.90

# Multi-Agent Verification Hints (Phase 9)
verification_agents:
  # Pattern agent: Structural detection
  pattern:
    require_all_conditions: true

  # Explorer agent: Check if function can be reached externally
  explorer:
    entry_points: [EntryPoint]
    sinks: [MODIFIES_CRITICAL_STATE, MODIFIES_OWNER]
    max_depth: 3

  # Risk agent: Assess exploitability
  risk:
    assess_likelihood: true
    assess_impact: true
    min_exploitability_score: 8.0  # High severity

  # Consensus requirement
  consensus:
    min_agents_agree: 2
    mode: voting

