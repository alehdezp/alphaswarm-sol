id: ext-030
vulndoc: access-control/external-call
name: Oracle Update Missing Signature Check
description: Oracle update functions without signature validation.
scope: Function
lens:
- ExternalInfluence
severity: high
match:
  all:
  - property: oracle_update_function
    op: eq
    value: true
  - property: has_oracle_update_signature_check
    op: eq
    value: false
