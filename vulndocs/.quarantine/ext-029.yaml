id: ext-029
vulndoc: access-control/external-call
name: Oracle Update Missing Deviation Check
description: Oracle updates without bounds or deviation checks.
scope: Function
lens:
- ExternalInfluence
severity: high
match:
  all:
  - property: oracle_update_function
    op: eq
    value: true
  - property: has_oracle_update_deviation_check
    op: eq
    value: false
