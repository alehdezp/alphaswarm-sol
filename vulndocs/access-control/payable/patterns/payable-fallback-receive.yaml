id: payable-fallback-receive
vulndoc: access-control/payable
name: Payable Fallback/Receive Without Gate
description: Payable fallback/receive functions without access gates.
scope: Function
lens:
  - ValueMovement
severity: medium
match:
  all:
    - property: payable
      op: eq
      value: true
    - property: has_access_gate
      op: eq
      value: false
  any:
    - property: is_fallback
      op: eq
      value: true
    - property: is_receive
      op: eq
      value: true
