attack_scenarios:
  - name: "Malicious Allowlist Addition"
    description: |
      Attacker adds their address to allowlist to gain restricted privileges
      (minting, privileged operations, fee exemptions, etc.)
    preconditions:
      - Function writes to allowlist/whitelist mapping
      - No access control present (no onlyOwner/onlyRole modifier)
      - Allowlist grants meaningful privileges (mint, transfer, withdraw, etc.)
    steps:
      - Attacker identifies unprotected allowlist management function
      - Calls function to add their address to allowlist
      - Uses newly-granted allowlist privileges to exploit protocol
      - Example: mint unlimited tokens if allowlist controls minting
      - Example: bypass transfer restrictions if allowlist exempts from locks
    impact: "Privilege escalation via allowlist manipulation"
    cvss: 8.6

  - name: "DoS via Denylist Manipulation"
    description: |
      Attacker adds legitimate users to denylist to freeze their funds or
      prevent protocol participation.
    preconditions:
      - Function writes to denylist/blacklist mapping
      - No access control present
      - Denylist blocks critical operations (transfer, withdraw, vote, etc.)
    steps:
      - Attacker identifies unprotected denylist management function
      - Adds target addresses (competitors, large holders, DAO voters) to denylist
      - Victims can no longer transfer tokens, withdraw funds, or participate
      - In severe cases, user funds are permanently frozen
      - Attacker may also denylist contract addresses to break integrations
    impact: "Denial of Service, fund freezing, governance manipulation"
    cvss: 7.8

  - name: "Guardian Set Manipulation"
    description: |
      Attacker replaces legitimate guardians with malicious addresses to
      compromise emergency controls or consensus mechanisms.
    preconditions:
      - Function writes to guardian/validator list
      - No access control present
      - Guardians have privileged powers (pause, emergency withdraw, validation)
    steps:
      - Attacker identifies unprotected guardian management function
      - Removes legitimate guardians, adds attacker-controlled addresses
      - Uses compromised guardian powers for malicious actions
      - Example (Wormhole): inject fake guardian signatures to mint tokens
      - Example: trigger emergency pause to DoS protocol
      - Example: approve malicious transactions in multi-sig setup
    impact: "Consensus/emergency control compromise, potential fund theft"
    cvss: 9.2

  - name: "Front-Running List Updates"
    description: |
      Attacker monitors mempool for legitimate list management transactions
      and front-runs to manipulate privileges before/after official changes.
    preconditions:
      - Function writes to allowlist/denylist
      - No access control present (or weak access control)
      - List changes affect trading, liquidations, or other value-extractive operations
    steps:
      - Monitor mempool for list management transactions
      - Front-run to add attacker address before official allowlist addition
      - Exploit temporary privileged state
      - Back-run to remove attacker after exploiting privilege
      - Example: add self to liquidator allowlist, perform liquidation, remove self
    impact: "MEV extraction via privilege manipulation"
    cvss: 6.5

  - name: "Allowlist Removal Attack"
    description: |
      Attacker removes legitimate addresses from allowlist to disrupt
      protocol operations or partnerships.
    preconditions:
      - Function writes to allowlist (removal capability)
      - No access control present
      - Removed addresses lose critical privileges
    steps:
      - Identify critical addresses on allowlist (partners, integrations, keepers)
      - Call unprotected function to remove these addresses
      - Protocol operations fail due to missing allowlisted addresses
      - Example: remove DEX router from allowlist, breaking swap functionality
      - Example: remove keeper addresses, breaking automated operations
    impact: "Protocol disruption, broken integrations, operational DoS"
    cvss: 7.2

verification_steps:
  - "Verify function is externally callable (public or external visibility)"
  - "Confirm function writes to state variables tagged with 'allowlist' or 'denylist' (check state_write_targets in graph)"
  - "Check no access control modifier present (onlyOwner, onlyRole, onlyGuardian, etc.)"
  - "Check no inline require/if statements validating msg.sender against admin addresses"
  - "Verify this is NOT a constructor or initializer (intentional setup pattern)"
  - "Identify what privileges the list controls (minting, transfers, liquidations, etc.)"
  - "Test: attempt to call function from non-privileged address to confirm unauthorized access"
  - "Assess impact: what can attacker do by manipulating this list?"
  - "Review contract documentation to determine if public list management is intentional (rare but possible for community-managed lists)"

fix_recommendations:
  - name: "Add onlyOwner Modifier"
    description: |
      Restrict list management to contract owner only. Simplest fix for
      single-owner contracts.
    example: |
      // BEFORE (VULNERABLE)
      function addToWhitelist(address account) external {
          whitelist[account] = true;
      }

      // AFTER (FIXED)
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract MyContract is Ownable {
          function addToWhitelist(address account) external onlyOwner {
              require(account != address(0), "Zero address not allowed");
              whitelist[account] = true;
              emit AddedToWhitelist(account);
          }

          function removeFromWhitelist(address account) external onlyOwner {
              whitelist[account] = false;
              emit RemovedFromWhitelist(account);
          }
      }

  - name: "Implement Role-Based List Management"
    description: |
      Use dedicated roles for list management (LIST_MANAGER_ROLE) separate
      from owner. Allows delegation without full ownership transfer.
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyContract is AccessControl {
          bytes32 public constant LIST_MANAGER_ROLE = keccak256("LIST_MANAGER_ROLE");

          mapping(address => bool) public allowlist;
          mapping(address => bool) public denylist;

          constructor() {
              _grantRole(DEFAULT_ADMIN_ROLE, msg.sender);
              _grantRole(LIST_MANAGER_ROLE, msg.sender);
          }

          function addToAllowlist(address account)
              external
              onlyRole(LIST_MANAGER_ROLE)
          {
              require(account != address(0), "Zero address");
              require(!denylist[account], "Address is denylisted");
              allowlist[account] = true;
              emit AllowlistAdded(account);
          }

          function addToDenylist(address account)
              external
              onlyRole(LIST_MANAGER_ROLE)
          {
              require(account != address(0), "Zero address");
              denylist[account] = true;
              allowlist[account] = false; // Remove from allowlist
              emit DenylistAdded(account);
          }
      }

  - name: "Add Multi-Signature Requirement for Critical Lists"
    description: |
      For guardian/validator lists that control consensus or emergency powers,
      require multiple signatures to prevent single-point-of-failure.
    example: |
      import "@openzeppelin/contracts/governance/TimelockController.sol";

      contract MyContract {
          mapping(address => bool) public guardians;
          TimelockController public immutable timelock;

          modifier onlyTimelock() {
              require(msg.sender == address(timelock), "Only timelock");
              _;
          }

          constructor(address _timelock) {
              timelock = TimelockController(payable(_timelock));
          }

          // Guardian changes require timelock (multi-sig + delay)
          function addGuardian(address guardian) external onlyTimelock {
              require(guardian != address(0), "Zero address");
              guardians[guardian] = true;
              emit GuardianAdded(guardian);
          }

          function removeGuardian(address guardian) external onlyTimelock {
              guardians[guardian] = false;
              emit GuardianRemoved(guardian);
          }
      }

  - name: "Implement Allowlist with Expiration and Limits"
    description: |
      Add time-based expiration and operation limits to allowlist entries
      to reduce attack surface from compromised allowlist additions.
    example: |
      contract MyContract {
          struct AllowlistEntry {
              bool active;
              uint256 expiresAt;
              uint256 operationLimit;
              uint256 operationsUsed;
          }

          mapping(address => AllowlistEntry) public allowlist;

          function addToAllowlist(
              address account,
              uint256 duration,
              uint256 operationLimit
          ) external onlyOwner {
              require(account != address(0), "Zero address");
              allowlist[account] = AllowlistEntry({
                  active: true,
                  expiresAt: block.timestamp + duration,
                  operationLimit: operationLimit,
                  operationsUsed: 0
              });
              emit AllowlistAdded(account, duration, operationLimit);
          }

          modifier onlyAllowlisted() {
              AllowlistEntry storage entry = allowlist[msg.sender];
              require(entry.active, "Not allowlisted");
              require(block.timestamp < entry.expiresAt, "Allowlist expired");
              require(
                  entry.operationsUsed < entry.operationLimit,
                  "Operation limit exceeded"
              );
              entry.operationsUsed++;
              _;
          }

          function privilegedOperation() external onlyAllowlisted {
              // Privileged logic here
          }
      }

  - name: "Separate Addition and Removal Permissions"
    description: |
      Use separate roles for adding vs removing addresses to implement
      principle of least privilege and prevent accidental/malicious removals.
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyContract is AccessControl {
          bytes32 public constant LIST_ADDER_ROLE = keccak256("LIST_ADDER_ROLE");
          bytes32 public constant LIST_REMOVER_ROLE = keccak256("LIST_REMOVER_ROLE");

          mapping(address => bool) public allowlist;

          // Only adders can add to allowlist
          function addToAllowlist(address account)
              external
              onlyRole(LIST_ADDER_ROLE)
          {
              require(account != address(0), "Zero address");
              allowlist[account] = true;
              emit AllowlistAdded(account);
          }

          // Only removers can remove from allowlist
          function removeFromAllowlist(address account)
              external
              onlyRole(LIST_REMOVER_ROLE)
          {
              allowlist[account] = false;
              emit AllowlistRemoved(account);
          }
      }

