# =============================================================================
# PATTERN: auth-005-unprotected-list-management
# =============================================================================
#
# REPLACES: auth-109 (regex-based name matching on whitelist/blacklist/allowlist/denylist)
#
# This pattern detects BEHAVIOR (list management state writes) not NAMES.
# Uses semantic property: writes_privileged_state (detects writes to allowlist,
# denylist state variables as classified by heuristics.py lines 152-153).
#
# =============================================================================

id: auth-005
vulndoc: access-control/authorization
name: "Unprotected List Management"

description: |
  ## What This Detects
  Public/external functions that manage access control lists (whitelists, blacklists,
  allowlists, denylists, guardian lists, validator lists) without access control,
  regardless of naming conventions.

  **List management includes:**
  - Allowlists/whitelists (approved addresses for restricted operations)
  - Denylists/blacklists (blocked addresses)
  - Guardian lists (emergency response controllers)
  - Validator lists (authorized validators/signers)
  - Any address collection controlling access or privileges

  **Detection is semantic, not syntactic:**
  - Detects `writes_privileged_state=true` where state variables are tagged as
    "allowlist" or "denylist" (heuristics.py:152-153)
  - NOT function name matching (addToWhitelist*, setAllowlist*, etc.)
  - Works with obfuscated names, alternative conventions, custom list names

  ## Why It's Dangerous
  List management controls who can perform critical operations. Unprotected writes allow
  any caller to:
  - **Add malicious addresses to allowlists** → bypass restrictions, exploit privileges
  - **Add legitimate users to denylists** → DoS attacks, freeze user funds
  - **Remove legitimate addresses from allowlists** → disrupt protocol operations
  - **Manipulate guardian/validator sets** → compromise governance/consensus
  - **Front-run legitimate list updates** → MEV attacks, privilege manipulation

  ## Real-World Impact
  - **Wormhole Bridge Hack (2022)**: $324M - guardian signature validation bypass
    allowed attacker to insert fake guardian credentials and mint 120k wETH
  - **Sonne Finance (2024)**: $20M - access control flaw in validator management
  - **Multiple DeFi Protocols**: Unprotected whitelist functions allowing rug pulls
    via malicious address additions

  ## Detection Logic
  This pattern triggers when ALL of these conditions are met:
  1. Function is externally callable (public/external visibility)
  2. Function writes to privileged state tagged as "allowlist" or "denylist"
     (semantic detection via heuristics.py classification)
  3. Function has NO access control (no modifiers, no require checks)
  4. Function is NOT a constructor or initializer (intentional setup)
  5. Function is NOT view/pure (can't modify state anyway)

  ## Key Insight
  Unlike auth-003 (general privileged write), this pattern is SPECIFICALLY for
  list management vulnerabilities. The builder tags state variables with "allowlist"
  and "denylist" tags when they detect whitelist/blacklist/allowlist/denylist/
  guardian/validator patterns in variable names. These tags are part of the
  privileged set, so `writes_privileged_state` captures them semantically.

scope: Function

lens:
  - Authority

severity: high

status: draft

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Must write to privileged state (includes allowlist/denylist tags)
    # This is SEMANTIC - detects behavior, not names
    - property: writes_privileged_state
      op: eq
      value: true

    # Must NOT have access control
    - property: has_access_gate
      op: eq
      value: false

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude constructors (intentional setup)
    - property: is_constructor
      op: eq
      value: true

    # Exclude initializers (intentional setup in upgradeable contracts)
    - property: is_initializer_function
      op: eq
      value: true

    # Exclude view functions (can't modify state)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't access state)
    - property: is_pure
      op: eq
      value: true

