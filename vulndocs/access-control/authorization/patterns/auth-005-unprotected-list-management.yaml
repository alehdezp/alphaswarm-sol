  notes: |
    DRAFT status due to variation_score < 60% (fails threshold).

    Test Results:
    - ✓ Detects: whitelist, blacklist, allowlist, denylist, validator lists
    - ✗ Misses: operator, minter, burner, relayer, guardian lists (12 FN)
    - ✗ False alarms: inline if-revert, self-registration, multi-sig (5 FP)

    Critical Gaps:
    1. Builder heuristics incomplete - operators/minters/burners not tagged as privileged
    2. Access gate detection misses inline if-revert patterns
    3. Pattern doesn't distinguish self-registration from admin control
    4. Scope too broad - flags ALL privileged writes, not just list management

    Improvement Path to EXCELLENT:
    1. Priority 1: Fix heuristics.py to tag operators/minters/burners/guardians as "role"
    2. Priority 2: Improve access gate detection for inline checks
    3. Priority 3: Add self-registration detection (writes to msg.sender only)
    4. Priority 4: Narrow scope to list-specific tags (not all privileged state)

    With fixes: Projected 100% precision, 100% recall, EXCELLENT status.

