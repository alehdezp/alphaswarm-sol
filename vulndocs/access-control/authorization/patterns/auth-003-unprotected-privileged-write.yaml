# =============================================================================
# PATTERN: auth-003-unprotected-privileged-write
# =============================================================================
#
# REPLACES: auth-012 (regex-based name matching)
#
# This pattern detects BEHAVIOR (privileged state writes) not NAMES (set*, update*).
# Uses semantic property: writes_privileged_state (detects writes to owner, admin,
# roles, governance, upgrade, pause, allowlist, denylist, oracle, treasury state).
#
# =============================================================================

id: auth-003
vulndoc: access-control/authorization
name: "Unprotected Privileged State Write"

description: |
  ## What This Detects
  Public/external functions that write to privileged state variables without
  access control, regardless of function naming conventions.

  **Privileged state includes:**
  - Owner/admin addresses
  - Role mappings and permissions
  - Governance parameters
  - Upgrade/implementation addresses
  - Pause states
  - Allowlist/denylist mappings
  - Oracle addresses
  - Treasury/fee recipient addresses

  **Detection is semantic, not syntactic:**
  - Detects `writes_privileged_state=true` (behavior)
  - NOT function name matching (set*, update*, configure*, etc.)
  - Works with obfuscated names, alternative conventions, renamed functions

  ## Why It's Dangerous
  Privileged state controls critical contract behavior. Unprotected writes allow
  any caller to:
  - **Change ownership/admin** → complete contract takeover
  - **Modify roles** → escalate privileges, bypass access control
  - **Alter fee structures** → value extraction via fee manipulation
  - **Update treasury addresses** → redirect funds to attacker
  - **Change implementation contracts** → malicious logic injection (upgradeable contracts)
  - **Pause/unpause** → DoS or enable malicious operations
  - **Modify oracle addresses** → price manipulation

  ## Real-World Impact
  - **Poly Network Bridge Hack (2021)**: $611M - exposed `changeKeepers()` allowed
    attacker to replace contract keepers with malicious addresses
  - **Ronin Bridge Hack (2022)**: $625M - role manipulation enabled unauthorized
    validator changes
  - **Numerous rug pulls**: Unprotected `setOwner()`, `setFeeRecipient()` allowing
    contract draining

  ## Detection Logic
  This pattern triggers when ALL of these conditions are met:
  1. Function is externally callable (public/external visibility)
  2. Function writes to privileged state variables (owner, admin, roles, etc.)
  3. Function has NO access control (no modifiers, no require checks)
  4. Function is NOT a constructor or initializer (intentional setup)
  5. Function is NOT view/pure (can't modify state anyway)

scope: Function

lens:
  - Authority

severity: critical

status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Must write to privileged state (SEMANTIC DETECTION)
    # Detects writes to: owner, admin, role, governance, upgrade, pause,
    # allowlist, denylist, oracle, treasury state variables
    - property: writes_privileged_state
      op: eq
      value: true

    # Must NOT have access control
    - property: has_access_gate
      op: eq
      value: false

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude constructors (intentional setup)
    - property: is_constructor
      op: eq
      value: true

    # Exclude initializers (intentional setup in upgradeable contracts)
    - property: is_initializer_function
      op: eq
      value: true

    # Exclude view functions (can't modify state)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't access state)
    - property: is_pure
      op: eq
      value: true

