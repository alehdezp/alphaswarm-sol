attack_scenarios:
  - name: "Ownership Takeover"
    description: |
      Attacker calls unprotected function to change contract owner/admin,
      gaining complete control over the contract.
    preconditions:
      - Function writes to owner/admin state variable
      - No access control present (no onlyOwner modifier, no require checks)
      - Function is externally callable (public/external)
    steps:
      - Attacker identifies unprotected privileged state write function
      - Calls function with their address as new owner/admin
      - Becomes new owner with full contract privileges
      - Uses owner privileges to drain funds, modify critical parameters, etc.
    impact: "Complete contract takeover - attacker controls all privileged operations"
    cvss: 9.8

  - name: "Fee Manipulation Attack"
    description: |
      Attacker modifies fee rates/recipients to drain value from protocol users.
    preconditions:
      - Function writes to fee or treasury state variables
      - No access control present
      - Fee collection is active in the protocol
    steps:
      - Attacker calls unprotected fee-setting function
      - Sets fee to maximum value (e.g., 100% or protocol limit)
      - Sets fee recipient to attacker-controlled address
      - All user transactions pay excessive fees to attacker
      - Alternatively, sets fees to 0 to break protocol economics
    impact: "Value drainage via fee manipulation or protocol economic attack"
    cvss: 8.5

  - name: "Role Escalation Attack"
    description: |
      Attacker grants themselves privileged roles to bypass access controls.
    preconditions:
      - Function writes to role mappings
      - No access control on role grant function
      - Contract uses role-based access control (RBAC)
    steps:
      - Attacker identifies unprotected role-granting function
      - Grants themselves admin/minter/pauser/burner roles
      - Uses elevated privileges to execute privileged operations
      - Example: mint unlimited tokens, pause contract, upgrade logic
    impact: "Privilege escalation enabling multiple attack vectors"
    cvss: 9.1

  - name: "Implementation Replacement (Upgradeable Contracts)"
    description: |
      Attacker replaces implementation contract with malicious logic.
    preconditions:
      - Contract is upgradeable (UUPS, Transparent Proxy, etc.)
      - Function writes to implementation address
      - No access control on upgrade function
    steps:
      - Attacker deploys malicious implementation contract
      - Calls unprotected upgrade function
      - Points implementation to malicious contract
      - Malicious logic now controls all proxy state
      - Drains all funds, steals user assets, etc.
    impact: "Complete contract logic replacement - unlimited attack surface"
    cvss: 10.0

  - name: "Oracle Manipulation"
    description: |
      Attacker changes oracle address to malicious price feed.
    preconditions:
      - Function writes to oracle address state
      - No access control present
      - Contract uses oracle for pricing/collateral/liquidations
    steps:
      - Attacker deploys malicious oracle returning manipulated prices
      - Calls unprotected oracle-setting function
      - Points oracle to attacker's malicious contract
      - Exploits price manipulation for profit (liquidations, swaps, borrows)
    impact: "Price oracle manipulation enabling fund extraction"
    cvss: 9.3

verification_steps:
  - "Verify function is externally callable (public or external visibility)"
  - "Confirm function writes to privileged state variables (check state_write_targets for: owner, admin, role, governance, upgrade, pause, allowlist, denylist, oracle, treasury)"
  - "Check no access control modifier present (onlyOwner, onlyRole, etc.)"
  - "Check no inline require/if statements validating msg.sender against privileged addresses"
  - "Verify this is NOT a constructor or initializer (intentional setup pattern)"
  - "Test: attempt to call function from non-privileged address to confirm unauthorized access"
  - "Review contract documentation/NatSpec to determine if this is intentional or a bug"

fix_recommendations:
  - name: "Add onlyOwner Modifier"
    description: |
      Restrict function to current owner only using OpenZeppelin Ownable pattern.
      This is the simplest fix for single-owner contracts.
    example: |
      // BEFORE (VULNERABLE)
      function setOwner(address newOwner) external {
          owner = newOwner;
      }

      // AFTER (FIXED)
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract MyContract is Ownable {
          function setOwner(address newOwner) external onlyOwner {
              require(newOwner != address(0), "Zero address not allowed");
              _transferOwnership(newOwner);
          }
      }

  - name: "Use Two-Step Ownership Transfer"
    description: |
      Require new owner to accept ownership to prevent accidental transfer
      to wrong address or contract that can't manage ownership.
    example: |
      address public pendingOwner;

      function transferOwnership(address newOwner) external onlyOwner {
          require(newOwner != address(0), "Zero address not allowed");
          pendingOwner = newOwner;
          emit OwnershipTransferStarted(owner, newOwner);
      }

      function acceptOwnership() external {
          require(msg.sender == pendingOwner, "Not pending owner");
          address oldOwner = owner;
          owner = pendingOwner;
          pendingOwner = address(0);
          emit OwnershipTransferred(oldOwner, owner);
      }

  - name: "Implement Role-Based Access Control (RBAC)"
    description: |
      Use OpenZeppelin AccessControl for fine-grained permission management.
      Allows multiple roles (admin, pauser, minter, etc.) with separate privileges.
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyContract is AccessControl {
          bytes32 public constant ADMIN_ROLE = keccak256("ADMIN_ROLE");
          bytes32 public constant PAUSER_ROLE = keccak256("PAUSER_ROLE");

          constructor() {
              _grantRole(DEFAULT_ADMIN_ROLE, msg.sender);
              _grantRole(ADMIN_ROLE, msg.sender);
          }

          function setFee(uint256 newFee) external onlyRole(ADMIN_ROLE) {
              require(newFee <= MAX_FEE, "Fee too high");
              fee = newFee;
              emit FeeUpdated(newFee);
          }

          function pause() external onlyRole(PAUSER_ROLE) {
              _pause();
          }
      }

  - name: "Add Multi-Signature Requirement"
    description: |
      For critical operations, require multiple signatures (timelock, multisig).
      Prevents single compromised key from executing privileged operations.
    example: |
      import "@openzeppelin/contracts/governance/TimelockController.sol";

      contract MyContract {
          TimelockController public timelock;

          modifier onlyTimelock() {
              require(msg.sender == address(timelock), "Only timelock");
              _;
          }

          function setImplementation(address newImpl) external onlyTimelock {
              implementation = newImpl;
          }
      }

  - name: "Implement Upgradeability Protection"
    description: |
      For upgradeable contracts, use UUPSUpgradeable with _authorizeUpgrade.
    example: |
      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";
      import "@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol";

      contract MyContract is UUPSUpgradeable, OwnableUpgradeable {
          function initialize() public initializer {
              __Ownable_init();
              __UUPSUpgradeable_init();
          }

          // REQUIRED: Authorization check for upgrades
          function _authorizeUpgrade(address newImplementation)
              internal
              override
              onlyOwner
          {}
      }

