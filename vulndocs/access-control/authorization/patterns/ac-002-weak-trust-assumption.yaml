# =============================================================================
# PATTERN: ac-002-weak-trust-assumption
# =============================================================================
#
# CATEGORY: Access Control - Weak Trust Assumption
#
# This pattern detects BEHAVIOR (implicit permission without validation) not NAMES.
# Uses semantic properties: has_access_gate + writes_privileged_state +
# external_call_sites + missing parameter validation to identify functions that
# check WHO can call but don't validate WHAT operations they can perform.
#
# Real-world exploit: Arcadia Finance $3.5M loss (July 15, 2025)
#
# =============================================================================

id: ac-002
vulndoc: access-control/authorization
name: "Weak Trust Assumption in Privileged Operations"

description: |
  ## What This Detects
  Public/external functions that have access control (modifier or inline check)
  but execute arbitrary operations based on unvalidated parameters, allowing
  "trusted" addresses to perform unauthorized actions.

  **Vulnerable pattern:**
  - Function checks WHO can call (has_access_gate = true)
  - But doesn't validate WHAT operations can be performed
  - Makes external calls with parameter-derived data
  - Modifies critical state based on unvalidated parameters
  - No whitelist or operation scope restriction

  **Common scenarios:**
  - Asset manager functions that accept encoded operation data
  - Flashloan callbacks with unvalidated swap parameters
  - Delegated operations with arbitrary target/data from parameters
  - Keeper functions that execute operations from external data sources
  - Privileged operations receiving encoded call data with unvalidated router/target addresses

  **Detection is semantic, not syntactic:**
  - Detects access gate PLUS critical state modifications through unvalidated parameters
  - NOT function name matching (flashAction*, rebalance*, execute*, etc.)
  - Works with obfuscated names, alternative conventions, custom operation patterns

  ## Why It's Dangerous
  Trust assumption vulnerabilities create a false sense of security. The access
  control check gives developers confidence in safety, but the lack of input
  validation enables "trusted" addresses to become threat vectors:

  - **Parameter-Driven Execution**: Encoded parameters decoded without bounds checking
  - **Implicit Permissions**: Asset manager has "unlimited" implicit permissions
  - **No Operation Scope**: No enum or whitelist restricting what can be executed
  - **Unvalidated Targets**: Router/contract addresses from parameters without whitelist
  - **Health Check Bypasses**: Third parties can modify account state before health checks
  - **Delegatecall Risks**: Dynamic delegation based on parameter-derived addresses

  ## Real-World Impact
  - **Arcadia Finance (July 2025)**: $3.5M - Asset manager rebalance() executed
    arbitrary swaps via unvalidated swapData, allowing fund drains and collateral theft
  - **Similar patterns in**: dYdX flash loans, Balancer batch operations, Uniswap V4 hooks
  - **Attack surface**: Protocols with asset managers, flash loan providers, delegation systems

  ## Detection Logic
  This pattern triggers when ALL of these conditions are met:
  1. Function is externally callable (public/external visibility)
  2. Function HAS access control (has_access_gate = true) - differs from auth-003
  3. Function writes to critical state (writes_privileged_state = true)
  4. Function makes external calls (external_call_sites > 0)
  5. Function DOES NOT validate critical parameters before use
  6. Function is NOT a constructor or initializer
  7. Function is NOT view/pure

  **Key Distinction from auth-003:**
  - auth-003: NO access control + privileged write = unprotected (critical severity)
  - ac-002: HAS access control BUT unvalidated parameters + external calls = weak trust (high severity)

scope: Function

lens:
  - Authority

severity: high

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # CRITICAL: Must HAVE access control (distinguishes from auth-003)
    # Checks WHO can call, but not WHAT they can do
    - property: has_access_gate
      op: eq
      value: true

    # Must write to critical state
    # Indicates state will be modified based on parameters
    - property: writes_privileged_state
      op: eq
      value: true

    # Must make external calls
    # External calls with parameter-derived data are high-risk
    - property: external_call_sites
      op: gt
      value: 0

    # Must NOT have parameter validation
    # This is the core weakness: WHO is controlled, WHAT is not
    - property: parameter_validation
      op: eq
      value: false

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude constructors
    - property: is_constructor
      op: eq
      value: true

    # Exclude initializers
    - property: is_initializer_function
      op: eq
      value: true

    # Exclude view functions
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions
    - property: is_pure
      op: eq
      value: true

    # EXCLUDE: Strong access gates (indicates good access control discipline)
    # These patterns suggest developer awareness of access control
    - property: has_strong_access_gate
      op: eq
      value: true

    # EXCLUDE: OpenZeppelin access control (industry standard)
    # OZ patterns generally include parameter validation
    - property: uses_openzeppelin_access
      op: eq
      value: true

    # EXCLUDE: Multi-sig requirement (adds verification layer)
    # Reduces single-address risk even if parameters aren't validated
    - property: has_multi_sig_requirement
      op: eq
      value: true

# =============================================================================
# SEMANTIC OPERATIONS & BEHAVIORAL SIGNATURES
# =============================================================================

semantic_ops:
  vulnerable_pattern:
    sequence:
      - CHECKS_PERMISSION        # Access gate exists
      - READS_PARAMETER          # Reads encoded/external data
      - NOT_VALIDATES_INPUT      # Does NOT validate before use
      - CALLS_EXTERNAL           # External call with unvalidated data
      - MODIFIES_CRITICAL_STATE  # Modifies privileged state

  common_variants:
    - "CHECKS_PERMISSION(asset_manager) -> READS_ENCODED_PARAMETER -> CALLS_EXTERNAL(decoded_data) -> MODIFIES_CRITICAL_STATE"
    - "CHECKS_PERMISSION(keeper) -> READS_OPERATION_DATA -> DELEGATES_TO_TARGET(from_param) -> TRANSFERS_VALUE"
    - "CHECKS_PERMISSION(trusted_addr) -> READS_ENCODED_OPS -> NO_BOUNDS_CHECK -> CALLS_UNTRUSTED_ROUTER -> DRAINS_FUNDS"
    - "CHECKS_PERMISSION(delegated_user) -> READS_CALL_DATA -> DELEGATECALL(unvalidated) -> MODIFIES_BALANCE"

  safe_pattern:
    sequence:
      - CHECKS_PERMISSION                    # Access gate exists
      - VALIDATES_PARAMETER_AGAINST_WHITELIST # Router/target from whitelist
      - VALIDATES_OPERATION_SCOPE            # Only specific operations allowed
      - VALIDATES_PARAMETER_STRUCTURE        # Bounds checking on data
      - CALLS_EXTERNAL                       # Now safe to call external
      - MODIFIES_CRITICAL_STATE              # State modifications are scoped

  safe_pattern_variants:
    - "CHECKS_PERMISSION(role) -> VALIDATE_PARAM(whitelist) -> CALLS_EXTERNAL(validated) -> W:critical"
    - "CHECKS_PERMISSION(address_check) -> VALIDATE_ZERO_ADDRESS -> CALLS_EXTERNAL -> W:critical"
    - "CHECKS_PERMISSION(onlyWhitelisted) -> isAddressWhitelisted(check) -> CALLS_EXTERNAL"
    - "CHECKS_PERMISSION(onlyOwner) -> require(addr != address(0)) -> CALLS_EXTERNAL"

behavioral_signatures:
  vulnerable:
    - "G:perm{weak-trust}->CALLS_EXTERNAL(unvalidated-data)->W:critical"
    - "C:access-check->R:encoded-param->!VALIDATE->X:external(data)->MODIFIES_STATE"
    - "CHECKS_PERMISSION(trusted) -> READS_PARAM(router_or_target) -> DELEGATECALL/CALL(from_param)"

  safe:
    - "C:access-check->VALIDATE_PARAM(whitelist)->CALLS_EXTERNAL(validated)->W:critical"
    - "CHECKS_PERMISSION(trusted) -> VALIDATE_OPERATION_TYPE -> EXECUTE_SPECIFIC_OP"
    - "G:role->VALIDATE_INPUT(enum_type,amount,recipient)->MODIFIES_STATE"

