attack_scenarios:
  - name: "Unvalidated Router Delegation"
    description: |
      Attacker becomes trusted address (asset manager, keeper) and calls privileged
      function with unvalidated router address, redirecting operations to drain funds.
    preconditions:
      - Function has access control (role check, address check, etc.)
      - Function reads router/target address from parameters
      - Function makes external call to parameter-derived router
      - No whitelist or validation of router address
      - External call transfers value or modifies critical state
    steps:
      - "1. Attacker gains 'trusted' role (e.g., setAssetManager in Arcadia)"
      - "2. Prepare malicious data with attacker-controlled router address"
      - "3. Call privileged function (e.g., rebalance) with malicious encoded data"
      - "4. Function decodes data WITHOUT VALIDATING router address"
      - "5. Function calls unvalidated router with state-modifying operation"
      - "6. Attacker's router contract executes arbitrary operations"
      - "7. Drain collateral, steal positions, or modify state maliciously"
      - "8. Profit via direct value transfer or indirect state exploitation"
    impact: "Complete financial loss of funds routed through privileged operation"
    cvss: 8.8

  - name: "Encoded Operation Exploitation"
    description: |
      Attacker uses encoded operation parameters with unrestricted operation types
      to execute unintended operations through trusted address.
    preconditions:
      - Function accepts encoded operation data (bytes, struct array, etc.)
      - Function has role/address-based access control
      - No enum validation or operation type restrictions
      - Function decodes and executes arbitrary operations
      - No bounds checking on operation scope
    steps:
      - "1. Attacker gains trusted address status"
      - "2. Craft encoded operations array with unintended operation types"
      - "3. Example: encode TRANSFER when only SWAP is intended"
      - "4. Call flashAction or executeOperations with crafted data"
      - "5. Function decodes operations and executes ALL of them"
      - "6. Attacker operations execute with trusted context"
      - "7. Transfer funds, modify positions, or drain collateral"
    impact: "Privilege escalation enabling unauthorized state modifications"
    cvss: 8.5

  - name: "Health Check Bypass via Parameter Manipulation"
    description: |
      Attacker manipulates operation order in encoded parameters to bypass health
      checks by having trusted address execute compensating operations first.
    preconditions:
      - Function checks health/solvency AFTER executing operations
      - Function processes array of operations without per-operation health checks
      - Attacker is trusted address (asset manager, etc.)
      - Function can execute operations that improve health (debt repayment, collateral addition)
    steps:
      - "1. Victim account has low health score"
      - "2. Attacker (asset manager) calls flashAction with operation sequence:"
      - "   a. REPAY debt on behalf of victim (improves health)"
      - "   b. DRAIN collateral/positions from victim"
      - "   c. TRANSFER stolen assets to attacker"
      - "3. Health check runs AFTER all operations"
      - "4. Health is now acceptable (due to repayment in step a)"
      - "5. State modifications in steps b,c are allowed"
      - "6. Attacker drains victim funds with authorization"
    impact: "Fund theft enabled by check-effects interaction exploitation"
    cvss: 9.1

  - name: "Delegatecall with Unvalidated Target"
    description: |
      Function performs delegatecall to parameter-derived address without validating
      target, allowing attacker to execute arbitrary code in contract context.
    preconditions:
      - Function has access control (role/address check)
      - Function performs delegatecall to parameter-derived target
      - Target address NOT whitelisted or validated
      - Attacker can become trusted address
    steps:
      - "1. Attacker gains trusted status"
      - "2. Deploy malicious contract with function matching expected signature"
      - "3. Call delegatecall function with malicious contract address"
      - "4. delegatecall executes malicious code in contract context"
      - "5. Malicious code has access to all state variables"
      - "6. Steal owner, admin, token balances, etc."
    impact: "Complete contract takeover via delegatecall to malicious code"
    cvss: 10.0

  - name: "Keeper/Executor Privilege Abuse"
    description: |
      Automated keeper or executor function trusts data from external source (oracle,
      API, user callback) without validating parameters.
    preconditions:
      - Function is meant to be called by trusted keeper/executor address
      - Function accepts operation parameters (swaps, transfers, rebalances)
      - Parameters come from external data (oracle, API, user-provided callback)
      - Function doesn't validate parameter bounds or operation type
    steps:
      - "1. Attacker compromises parameter source (oracle, API, middleware)"
      - "2. Or: attacker becomes keeper and provides malicious parameters"
      - "3. Call keeper function with manipulated parameters"
      - "4. Function executes operations based on unvalidated parameters"
      - "5. Example: swap with infinite slippage, transfer to wrong recipient"
      - "6. Parameter-driven exploitation executes undetected"
    impact: "Parameter-driven financial losses, protocol economics manipulation"
    cvss: 8.2

verification_steps:
  - "Verify function is externally callable (public or external visibility)"
  - "CONFIRM function has access control (has_access_gate property must be true) - CRITICAL difference from auth-003"
  - "Verify function writes to critical state (check state_write_targets for privileged variables)"
  - "Check function makes external calls (to router, other contracts, or via delegatecall)"
  - "Identify where external call addresses/data come from (parameters? state? mix?)"
  - "Check if parameter-derived addresses/data are validated (router/target whitelisted, operation type restricted via enum, amounts/recipients validated, call data structure validated)"
  - "If no validation found, this is a weak trust assumption vulnerability"
  - "Assess impact: what can attacker do with trusted role but unvalidated parameters?"
  - "Check if health checks or other guards run AFTER state modifications (CEI pattern)"
  - "Look for behavioral signature: perm-check -> read-param -> NO-validation -> external-call -> state-write"

fix_recommendations:
  - name: "Whitelist Trusted Targets"
    description: |
      Maintain allowlist of pre-approved router/target contracts.
      Validate parameter-derived addresses against whitelist before use.
    example: |
      // BEFORE (VULNERABLE - Arcadia pattern)
      function rebalance(bytes calldata swapData) external onlyAssetManager {
          (address router, bytes memory data) = abi.decode(swapData, (address, bytes));
          // VULNERABLE: router comes from parameter, no validation
          (bool success,) = router.call(data);
          require(success, "Router call failed");
      }

      // AFTER (FIXED)
      mapping(address => bool) public approvedRouters;

      function rebalance(bytes calldata swapData) external onlyAssetManager {
          (address router, bytes memory data) = abi.decode(swapData, (address, bytes));

          // CRITICAL FIX: Validate router address
          require(approvedRouters[router], "Router not approved");

          (bool success,) = router.call(data);
          require(success, "Router call failed");
      }

  - name: "Restrict Operation Scope with Enum"
    description: |
      Define enum of allowed operations and validate operation type before execution.
      Prevents arbitrary operations even with trusted address.
    example: |
      // BEFORE (VULNERABLE)
      function flashAction(bytes[] calldata operations) external onlyAssetManager {
          for (uint i = 0; i < operations.length; i++) {
              // VULNERABLE: arbitrary operation decoding without type validation
              (bool success,) = address(this).delegatecall(operations[i]);
              require(success, "Operation failed");
          }
      }

      // AFTER (FIXED)
      enum OperationType { SWAP, DEPOSIT, WITHDRAW, REPAY }

      struct Operation {
          OperationType opType;
          bytes params;
      }

      function flashAction(Operation[] calldata operations) external onlyAssetManager {
          for (uint i = 0; i < operations.length; i++) {
              // SAFE: operation type is enumerated, scope is restricted
              if (operations[i].opType == OperationType.SWAP) {
                  _executeSwap(operations[i].params);
              } else if (operations[i].opType == OperationType.DEPOSIT) {
                  _executeDeposit(operations[i].params);
              } else if (operations[i].opType == OperationType.WITHDRAW) {
                  _executeWithdraw(operations[i].params);
              } else if (operations[i].opType == OperationType.REPAY) {
                  _executeRepay(operations[i].params);
              }
              // No catch-all, only allowed operations execute
          }
      }

  - name: "Validate Parameter Structure and Bounds"
    description: |
      Before decoding and using parameters, validate structure, array lengths,
      value ranges, and address zero checks.
    example: |
      // BEFORE (VULNERABLE)
      function rebalance(bytes calldata swapData) external onlyAssetManager {
          (address router, uint256 amount, bytes memory data) =
              abi.decode(swapData, (address, uint256, bytes));
          // VULNERABLE: no bounds checking
          require(router.call{value: amount}(data));
      }

      // AFTER (FIXED)
      function rebalance(bytes calldata swapData) external onlyAssetManager {
          // Validate structure before decoding
          require(swapData.length > 0, "Empty swap data");
          require(swapData.length <= MAX_SWAP_DATA_SIZE, "Swap data too large");

          (address router, uint256 amount, bytes memory data) =
              abi.decode(swapData, (address, uint256, bytes));

          // Validate decoded values
          require(router != address(0), "Invalid router address");
          require(amount > 0 && amount <= maxSwapAmount, "Invalid amount");
          require(data.length > 0 && data.length <= MAX_CALL_DATA_SIZE, "Invalid data");

          require(router.call{value: amount}(data));
      }

  - name: "Separate Validation from Execution"
    description: |
      Create dedicated validation functions for parameter checking.
      Run validation BEFORE any state modifications or external calls.
    example: |
      // BEFORE (VULNERABLE)
      function flashAction(Operation[] calldata ops) external onlyAssetManager {
          for (uint i = 0; i < ops.length; i++) {
              // Mix validation and execution, hard to review
              if (ops[i].target != address(0)) {
                  (bool success,) = ops[i].target.call(ops[i].data);
              }
          }
      }

      // AFTER (FIXED)
      function flashAction(Operation[] calldata ops) external onlyAssetManager {
          // Step 1: Validate ALL operations before executing ANY
          _validateOperations(ops);

          // Step 2: Execute validated operations
          for (uint i = 0; i < ops.length; i++) {
              _executeValidatedOperation(ops[i]);
          }
      }

      function _validateOperations(Operation[] calldata ops) internal view {
          require(ops.length > 0 && ops.length <= MAX_OPS, "Invalid ops length");

          for (uint i = 0; i < ops.length; i++) {
              require(ops[i].target != address(0), "Invalid target");
              require(approvedTargets[ops[i].target], "Target not approved");
              require(ops[i].data.length > 0 && ops[i].data.length <= MAX_DATA, "Invalid data");
          }
      }

  - name: "Implement Health Check in Correct Position"
    description: |
      For financial operations, health checks must run AFTER all state modifications,
      not before. Prevent third-party modifications that bypass checks.
    example: |
      // BEFORE (VULNERABLE - Arcadia pattern)
      function flashAction(Operation[] calldata operations) external onlyAssetManager {
          require(getHealth(account) >= MIN_HEALTH, "Account unhealthy"); // Check first

          // VULNERABLE: health check before state modifications
          for (uint i = 0; i < operations.length; i++) {
              executeOperation(operations[i]); // Modifications happen here
          }
          // No second health check
      }

      // AFTER (FIXED)
      function flashAction(Operation[] calldata operations) external onlyAssetManager {
          // Remember initial state for invariant validation
          uint256 initialDebt = getDebt(account);

          // Execute operations
          for (uint i = 0; i < operations.length; i++) {
              // Validate operation targets THIS account only
              require(operations[i].account == account, "Cannot modify other accounts");
              executeOperation(operations[i]);
          }

          // CRITICAL FIX: Health check AFTER all modifications
          require(getHealth(account) >= MIN_HEALTH, "Account unhealthy after operations");

          // CRITICAL FIX: Debt didn't decrease below minimum (detect debt-repay bypass)
          require(getDebt(account) >= initialDebt - allowedRepayAmount, "Suspicious debt change");
      }

  - name: "Use Role-Based Access with Operation Restrictions"
    description: |
      Combine role-based access control with specific operation restrictions.
      Asset manager role should have LIMITED, enumerated capabilities.
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyContract is AccessControl {
          bytes32 public constant ASSET_MANAGER_ROLE = keccak256("ASSET_MANAGER_ROLE");

          enum AllowedAssetManagerOp {
              REBALANCE_SWAP,       // Only these specific operations
              DEPOSIT_COLLATERAL,
              WITHDRAW_EXCESS,
              REPAY_DEBT
          }

          function flashAction(
              AllowedAssetManagerOp op,
              bytes calldata params
          ) external onlyRole(ASSET_MANAGER_ROLE) {
              // Only pre-defined operations allowed
              // No arbitrary operation execution
              if (op == AllowedAssetManagerOp.REBALANCE_SWAP) {
                  _executeRebalanceSwap(params);
              } else if (op == AllowedAssetManagerOp.DEPOSIT_COLLATERAL) {
                  _executeDepositCollateral(params);
              }
              // If new operations needed, explicit code change required
          }
      }

  - name: "Add Multi-Layer Validation for Critical Operations"
    description: |
      For operations that drain funds or modify critical state, require multiple
      validation layers (router whitelist, amount limit, recipient check, health check).
    example: |
      function rebalance(
          address router,
          uint256 amount,
          bytes calldata data
      ) external onlyAssetManager {
          // Layer 1: Router validation
          require(approvedRouters[router], "Router not whitelisted");

          // Layer 2: Amount validation
          require(amount > 0 && amount <= balanceOf(account), "Invalid amount");

          // Layer 3: Data structure validation
          require(data.length > 0 && data.length <= MAX_DATA, "Invalid data");

          // Layer 4: Execute
          (bool success, bytes memory result) = router.call{value: amount}(data);
          require(success, "Router call failed");

          // Layer 5: Post-execution health check
          require(getHealth(account) >= MIN_HEALTH, "Health check failed");
      }

# =============================================================================
# REAL-WORLD SAFE IMPLEMENTATIONS (From Audits & Production Code)
# =============================================================================

safe_implementations:
  - name: "OnChain Whitelist Pattern (Pioneer ETH)"
    severity: safe
    description: |
      Production pattern from lbc-team/Pioneer. Demonstrates secure whitelist-based
      access control with separate add/remove functions and access gate on management.
    code: |
      contract OnChainWhitelistContract is Ownable {
          // Semantic: CHECKS_PERMISSION(onlyOwner) required for ALL state changes
          mapping(address => bool) public whitelist;

          function addToWhitelist(address[] calldata toAddAddresses)
          external onlyOwner {
              // SAFE: Access control on whitelist management
              for (uint i = 0; i < toAddAddresses.length; i++) {
                  whitelist[toAddAddresses[i]] = true;
              }
          }

          function removeFromWhitelist(address[] calldata toRemoveAddresses)
          external onlyOwner {
              // SAFE: Access control on whitelist removal
              for (uint i = 0; i < toRemoveAddresses.length; i++) {
                  delete whitelist[toRemoveAddresses[i]];
              }
          }

          function whitelistFunc() external {
              // SAFE: Semantic: CHECKS_PERMISSION(whitelist_check) before execution
              require(whitelist[msg.sender], "NOT_IN_WHITELIST");
              // Do some useful stuff
          }
      }
    semantic_signature: |
      CHECKS_PERMISSION(onlyOwner) -> MODIFIES_WHITELIST
      CHECKS_PERMISSION(whitelist[addr]) -> CALLS_EXTERNAL
    key_safety_features:
      - "Whitelist state changes gated by onlyOwner"
      - "Function execution validates caller against whitelist"
      - "Separation of concerns: management vs. execution"
      - "No unvalidated parameters in operation"

  - name: "Address Whitelist with Compliance Checker (Syntetika Fix)"
    severity: safe
    description: |
      From Cyfrin audit of Syntetika V2. Demonstrates safe modifier pattern
      that validates both sender and receiver addresses before operation.
    code: |
      contract SafeWhitelistPattern {
          mapping(address => bool) public manualWhitelist;
          bool public globalWhitelist;
          IComplianceChecker public complianceChecker;

          modifier onlyWhitelisted(address addr) {
              // SAFE: Semantic: CHECKS_PERMISSION(whitelist_validation)
              require(isAddressWhitelisted(addr), "AddressNotWhitelisted()");
              _;
          }

          function isAddressWhitelisted(address user) public view returns (bool) {
              // SAFE: Multiple validation sources, all checked
              if (manualWhitelist[user] || globalWhitelist) {
                  return true;
              }
              return complianceChecker.isCompliant(user);
          }

          function mint(
              uint256 shares,
              address receiver
          ) public override onlyWhitelisted(msg.sender) onlyWhitelisted(receiver) returns (uint256 assets) {
              // SAFE: Both msg.sender AND receiver validated before state change
              // Previous vulnerable pattern only checked msg.sender
              _mint(receiver, shares);
              return shares;
          }
      }
    semantic_signature: |
      CHECKS_PERMISSION(onlyWhitelisted(msg.sender))
      CHECKS_PERMISSION(onlyWhitelisted(receiver))
      MODIFIES_CRITICAL_STATE(_mint)
    key_safety_features:
      - "Dual validation: sender and receiver both whitelisted"
      - "Multiple whitelist sources (manual + compliance engine)"
      - "Fixes real Syntetika vulnerability by checking receiver"
      - "All parameters validated BEFORE state modification"

  - name: "Router Address Validation Pattern (Spectra/Nexus Audits)"
    severity: safe
    description: |
      Safe pattern for router-based operations from multiple audit reports
      (Spectra, Nexus, Omo security reviews). Validates router address against
      approved list before external calls.
    code: |
      contract SafeRouterPattern {
          mapping(address => bool) public approvedRouters;
          address public owner;

          modifier onlyOwner() {
              require(msg.sender == owner, "Not owner");
              _;
          }

          function setRouter(address _router) external onlyOwner {
              // SAFE: Router management gated by access control
              if (_router == address(0)) revert InvalidRouter();
              approvedRouters[_router] = true;
              emit SetRouter(_router);
          }

          function removeRouter(address _router) external onlyOwner {
              // SAFE: Router removal also gated
              approvedRouters[_router] = false;
              emit RouterRemoved(_router);
          }

          function executeWithRouter(
              address router,
              bytes calldata data
          ) external onlyOwner {
              // SAFE: Semantic: CHECKS_PERMISSION + VALIDATES_PARAM(router_whitelist)
              require(approvedRouters[router], "Router not approved");
              require(router != address(0), "Invalid router address");

              (bool success,) = router.call(data);
              require(success, "Router call failed");
          }
      }
    semantic_signature: |
      CHECKS_PERMISSION(onlyOwner) -> VALIDATES_PARAM(approvedRouters[router])
      CHECKS_PERMISSION(onlyOwner) -> !address(0) -> CALLS_EXTERNAL(validated_router)
    key_safety_features:
      - "Router whitelist management under access control"
      - "Router validation BEFORE external call"
      - "Zero address validation as additional safety layer"
      - "Separation: whitelist management vs. usage"

  - name: "Enum-Based Operation Scope Pattern (DeFi Best Practice)"
    severity: safe
    description: |
      Safe pattern for operation dispatch using enums to restrict scope.
      Prevents arbitrary operation execution even with trusted address.
    code: |
      contract SafeEnumOperationPattern {
          enum OperationType { SWAP, DEPOSIT, WITHDRAW, REPAY }

          bytes32 public constant ASSET_MANAGER_ROLE = keccak256("ASSET_MANAGER_ROLE");
          mapping(address => bool) public assetManagers;

          modifier onlyAssetManager() {
              require(assetManagers[msg.sender], "Not asset manager");
              _;
          }

          function flashAction(
              OperationType op,
              bytes calldata params
          ) external onlyAssetManager {
              // SAFE: Semantic: CHECKS_PERMISSION + VALIDATES_OPERATION_TYPE(enum)
              // Operation scope is restricted by enum - no arbitrary operations

              if (op == OperationType.SWAP) {
                  _executeSwap(params);
              } else if (op == OperationType.DEPOSIT) {
                  _executeDeposit(params);
              } else if (op == OperationType.WITHDRAW) {
                  _executeWithdraw(params);
              } else if (op == OperationType.REPAY) {
                  _executeRepay(params);
              }
              // No catch-all: only allowed operations execute
          }

          function _executeSwap(bytes calldata params) internal {
              // Implementation for swap
          }

          function _executeDeposit(bytes calldata params) internal {
              // Implementation for deposit
          }
          // ... other operations
      }
    semantic_signature: |
      CHECKS_PERMISSION(onlyAssetManager)
      VALIDATES_OPERATION_TYPE(enum OperationType)
      CALLS_EXTERNAL(scoped_by_enum)
      MODIFIES_CRITICAL_STATE(scoped)
    key_safety_features:
      - "Operation type is enumerated, not arbitrary"
      - "Each operation has dedicated function"
      - "No catch-all clause - bounds checking built-in"
      - "Limits damage even if attacker gains trusted role"

  - name: "Multi-Sig with Address Validation (Gnosis Safe Pattern)"
    severity: safe
    description: |
      Safe pattern for sensitive operations requiring multi-sig approval
      with address validation. Used in ParcelPayroll and other production systems.
    code: |
      contract SafeMultiSigPattern {
          address public constant SENTINEL_ADDRESS = address(1);
          mapping(address => mapping(address => bool)) public approvers;

          function addApprover(address _safeAddress, address _approver)
          external onlyOwner {
              // SAFE: Multiple validation layers
              require(_approver != address(0), "Invalid approver");
              require(_approver != SENTINEL_ADDRESS, "Invalid approver");

              approvers[_safeAddress][_approver] = true;
              emit ApproverAdded(_safeAddress, _approver);
          }

          function executeTransaction(
              address _safeAddress,
              bytes calldata _data
          ) external {
              // SAFE: Semantic: VALIDATES_PARAM(approvers_check)
              require(_safeAddress != address(0), "Invalid safe");
              require(approvers[_safeAddress][msg.sender], "Not approved");

              (bool success,) = _safeAddress.call(_data);
              require(success, "Execution failed");
          }
      }
    semantic_signature: |
      VALIDATES_PARAM(!address(0))
      VALIDATES_PARAM(approvers[safe][caller])
      CALLS_EXTERNAL(validated_safe)
    key_safety_features:
      - "Both zero address and sentinel checks"
      - "Approver validation before execution"
      - "Conservative sentinel pattern prevents edge cases"

  - name: "Type-Safe Delegation with Interface (Solidity Best Practice)"
    severity: safe
    description: |
      Type-safe delegation pattern from ConsenSys Diligence guidelines.
      Uses interfaces instead of raw address casts to prevent type confusion.
    code: |
      interface IValidator {
          function validate(uint256 _value) external returns (bool);
      }

      contract SafeTypeSafeDelegation {
          // SAFE: Type-safe - validator must implement IValidator interface
          // No arbitrary address casting to unknown interface

          function validateBet(IValidator _validator, uint256 _value)
          internal returns (bool) {
              // SAFE: Semantic: VALIDATES_PARAM(interface_check)
              // Type checking at compile time prevents address casting attacks

              bool valid = _validator.validate(_value);
              return valid;
          }

          function executeWithValidation(
              IValidator _validator,
              uint256 _amount
          ) external {
              // SAFE: Parameter is interface type, not raw address
              require(validateBet(_validator, _amount), "Invalid bet");
              // Execute operation
          }

          // VULNERABLE variant shown for contrast:
          // function validateBetUnsafe(address _addr, uint256 _value)
          // internal returns (bool) {
          //     // VULNERABLE: Any address can be cast to IValidator
          //     IValidator validator = IValidator(_addr);
          //     bool valid = validator.validate(_value);
          //     return valid;
          // }
      }
    semantic_signature: |
      PARAMETER_TYPE(IValidator interface)
      VALIDATES_PARAM(compile_time_type_check)
      CALLS_EXTERNAL(interface_dispatch)
    key_safety_features:
      - "Interface-based parameter prevents address casting"
      - "Type safety enforced at compile time"
      - "Prevents arbitrary interface type confusion"
      - "Forces correct implementation contract"

