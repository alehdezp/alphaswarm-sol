description: >
  Uniswap V4 introduces hooks - custom code execution at specific pool lifecycle points.
  Missing access control on hook callbacks allows attackers to manipulate pool state,
  bypass intended logic, or lock user funds. Hooks must restrict callers to PoolManager only.

