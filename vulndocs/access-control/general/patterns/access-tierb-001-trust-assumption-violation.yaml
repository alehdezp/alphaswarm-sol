# =============================================================================
# PATTERN: access-tierb-001-trust-assumption-violation
# Trust Assumption Violation Detection (Tier B - LLM Reasoning Required)
# =============================================================================

id: access-tierb-001-trust-assumption-violation
vulndoc: access-control/general
name: "Trust Assumption Violation (LLM-Verified)"

description: |
  ## What This Detects

  Functions that rely on implicit trust assumptions that aren't enforced:
  - Trusting external systems without verification
  - Assuming caller properties without checking
  - Relying on trust transitivity (A trusts B, B trusts C, so A trusts C)
  - Composability risks from integrating trusted components

  **Why Tier B (LLM) is Required:**
  - Trust models are implicit, not in code
  - Requires understanding system architecture
  - Must reason about trust boundaries
  - Needs context about what "should" be trusted

  ## Real-World Exploits

  **BadgerDAO (Dec 2021) - $120M**
  - Trust Assumption: "Cloudflare CDN is secure"
  - Violation: CDN compromised, injected malicious approval TX
  - Missing: On-chain verification of off-chain actions

  **Ronin Bridge (Mar 2022) - $600M**
  - Trust Assumption: "Validators are independent and secure"
  - Violation: 5/9 validators controlled by same entity
  - Missing: Distributed trust verification

  **Wormhole Bridge (Feb 2022) - $320M**
  - Trust Assumption: "Guardian signatures are valid"
  - Violation: Signature verification bypassed via upgrade
  - Missing: Robust multi-sig with timelock

  **Harmony Bridge (Jun 2022) - $100M**
  - Trust Assumption: "2/5 multisig is secure"
  - Violation: Keys compromised, threshold too low
  - Missing: Higher threshold + time delay

  **Nomad Bridge (Aug 2022) - $190M**
  - Trust Assumption: "Merkle root verification ensures message validity"
  - Violation: Zero-initialized root treated as valid
  - Missing: Proper initialization check

  ## Trust Categories

  1. **Infrastructure Trust**: CDN, DNS, cloud providers
  2. **Validator Trust**: Bridges, oracles, sequencers
  3. **Key Trust**: Multisig thresholds, key security
  4. **Integration Trust**: Composability with other protocols
  5. **Upgrade Trust**: Admin keys, timelocks

scope: Function

lens:
  - Authority
  - ExternalInfluence

severity: high

status: draft

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  tier_a:
    all:
      - property: visibility
        op: in
        value: [public, external]
    any:
      - property: has_external_calls
        op: eq
        value: true
      - property: writes_privileged_state
        op: eq
        value: true
      - property: reads_external_value
        op: eq
        value: true
      - property: uses_signature_verification
        op: eq
        value: true
    none:
      - property: state_mutability
        op: in
        value: [view, pure]
      - property: is_constructor
        op: eq
        value: true
      - property: has_access_gate
        op: eq
        value: true
      # Plan 01 fix: exclude standard deposit/mint operations (ERC4626 vault
      # functions that are public by design and not trust-assumption violations).
      # Note: is_withdraw_like NOT added because withdraw() is a TP on
      # SideEntranceLenderPool and NaiveReceiverPool.
      # Builder gap: state_mutability reports 'nonpayable' for view/pure
      # functions (see property-diagnostic.md) -- routed to Plan 03/04.
      - property: is_deposit_like
        op: eq
        value: true

  tier_b:
    any:
      - has_risk_tag: implicit_trust_boundary
      - has_risk_tag: unverified_caller_assumption
      - has_risk_tag: trust_transitivity_risk
      - has_risk_tag: composability_vulnerability
      - has_risk_tag: external_system_dependency
      - has_risk_tag: low_threshold_multisig

aggregation:
  mode: tier_a_required

