# =============================================================================
# ATTACK SCENARIOS
# =============================================================================

attack_scenarios:
  - name: "External System Compromise"
    description: "Trusted external system is compromised"
    preconditions:
      - "Protocol trusts external system (oracle, bridge, CDN)"
      - "External system security not verified on-chain"
    steps:
      - "Compromise external system"
      - "Inject malicious data/transactions"
      - "Protocol accepts malicious input as trusted"
    impact: "Fund theft via trusted channel"

  - name: "Validator/Guardian Compromise"
    description: "Validator keys compromised below threshold"
    preconditions:
      - "Multi-sig with low threshold (e.g., 2/5)"
      - "Keys not sufficiently distributed/secured"
    steps:
      - "Compromise threshold number of keys"
      - "Sign malicious transactions"
      - "Execute unauthorized operations"
    impact: "Complete protocol takeover"

  - name: "Trust Transitivity Attack"
    description: "Chain of trust leads to unintended trust"
    preconditions:
      - "Protocol A trusts Protocol B"
      - "Protocol B trusts external source C"
      - "A doesn't verify C directly"
    steps:
      - "Compromise source C"
      - "C poisons B's data"
      - "A trusts B's poisoned data"
    impact: "Indirect attack via trust chain"

  - name: "Composability Risk"
    description: "Integration with other protocol creates vulnerability"
    preconditions:
      - "Protocol integrates with external DeFi protocol"
      - "Assumes external protocol behaves correctly"
      - "No validation of external results"
    steps:
      - "Manipulate external protocol state"
      - "Call target protocol"
      - "Target trusts manipulated external state"
    impact: "Exploitation via composability"

# =============================================================================
# VERIFICATION & RECOMMENDATIONS
# =============================================================================

verification_steps:
  - "Map all external dependencies (oracles, bridges, protocols)"
  - "Identify trust assumptions for each dependency"
  - "Check if trust assumptions are verified on-chain"
  - "Evaluate multisig thresholds and key distribution"
  - "Check for timelocks on privileged operations"
  - "Assess composability risks with integrated protocols"
  - "Verify signature/proof verification is robust"
  - "Check for trust transitivity chains"

fix_recommendations:
  - name: "On-Chain Verification"
    description: |
      Verify external data on-chain rather than trusting source
    example: |
      // Instead of trusting oracle directly:
      function getPrice() external view returns (uint256) {
          uint256 price = oracle.latestPrice();
          require(price > 0 && price < MAX_PRICE, "Invalid price");
          require(block.timestamp - oracle.lastUpdate() < MAX_STALENESS);
          return price;
      }

  - name: "Higher Thresholds"
    description: |
      Use higher multisig thresholds (e.g., 5/7 instead of 2/5)

  - name: "Time Delays"
    description: |
      Add timelock delays for privileged operations
    example: |
      function queueUpgrade(address newImpl) external onlyOwner {
          pendingUpgrade = newImpl;
          upgradeTimestamp = block.timestamp + 2 days;
      }
      
      function executeUpgrade() external {
          require(block.timestamp >= upgradeTimestamp);
          _upgradeTo(pendingUpgrade);
      }

  - name: "Trust Minimization"
    description: "Minimize trust surface by verifying more on-chain"

related_patterns:
  - ac-002-weak-trust-assumption
  - cc-001-bridge-message-validation
  - oracle-003-missing-staleness-check

owasp_mapping:
  - SC01
  - SC05

cwe_mapping:
  - CWE-287
  - CWE-862
  - CWE-863

llm_guidance: |
  When evaluating for trust assumption violations:
  
  1. **Map Trust Boundaries**
     - What external systems does this function trust?
     - What assumptions does it make about callers?
     - What data sources are assumed reliable?
  
  2. **Check Verification**
     - Are trust assumptions verified on-chain?
     - Are external inputs validated?
     - Are signatures/proofs properly checked?
  
  3. **Evaluate Multi-Sig**
     - What's the threshold (M of N)?
     - Are keys properly distributed?
     - Is there a timelock?
  
  4. **Assess Composability**
     - What protocols does this integrate with?
     - Can external protocols be manipulated?
     - Is there validation of external state?
  
  5. **Tag Assignment**
     - implicit_trust_boundary: Undocumented trust assumption
     - unverified_caller_assumption: Assumes caller properties
     - trust_transitivity_risk: Chain of trust creates risk
     - composability_vulnerability: Integration creates vulnerability
     - external_system_dependency: Trusts external system
     - low_threshold_multisig: Low threshold for privileged ops
