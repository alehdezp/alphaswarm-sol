id: auth-096
vulndoc: access-control/general
name: Multisig Threshold Change Without Multisig Approval
description: Multisig threshold change guarded by single-owner gate.
scope: Function
lens:
- Authority
severity: high
match:
  all:
  - property: contract_has_multisig
    op: eq
    value: true
  - property: is_multisig_threshold_change
    op: eq
    value: true
  - property: has_access_gate
    op: eq
    value: true
  - property: uses_ecrecover
    op: eq
    value: false
