id: auth-086
vulndoc: access-control/general
name: Access Gate Uses Block Timestamp
description: Access control relies on block.timestamp.
scope: Function
lens:
- Authority
severity: medium
match:
  all:
  - property: access_gate_sources
    op: contains_any
    value:
    - block.timestamp
  - property: has_access_gate
    op: eq
    value: true
