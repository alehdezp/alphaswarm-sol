id: auth-067
vulndoc: access-control/general
name: Access Gate Uses tx.origin
description: Access control gates that rely on tx.origin.
scope: Function
lens:
- Authority
severity: high
match:
  all:
  - property: has_access_gate
    op: eq
    value: true
  - property: access_gate_sources
    op: contains_any
    value:
    - tx.origin
