id: auth-051
vulndoc: access-control/general
name: Timelock Admin Without Access Control
description: Timelock admin functions missing access control.
scope: Function
lens:
- Authority
severity: high
match:
  all:
  - property: is_timelock_admin_function
    op: eq
    value: true
  - property: has_access_gate
    op: eq
    value: false
