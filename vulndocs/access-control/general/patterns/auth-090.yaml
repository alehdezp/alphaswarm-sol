id: auth-090
vulndoc: access-control/general
name: Access Gate Uses Msg.value
description: Access control relies on msg.value.
scope: Function
lens:
- Authority
severity: medium
match:
  all:
  - property: access_gate_sources
    op: contains_any
    value:
    - msg.value
  - property: has_access_gate
    op: eq
    value: true
