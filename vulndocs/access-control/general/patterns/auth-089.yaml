id: auth-089
vulndoc: access-control/general
name: Access Gate Uses ChainId
description: Access control relies on block.chainid.
scope: Function
lens:
- Authority
severity: medium
match:
  all:
  - property: access_gate_sources
    op: contains_any
    value:
    - block.chainid
  - property: has_access_gate
    op: eq
    value: true
