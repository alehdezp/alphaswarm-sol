id: auth-087
vulndoc: access-control/general
name: Access Gate Uses Block Number
description: Access control relies on block.number.
scope: Function
lens:
- Authority
severity: medium
match:
  all:
  - property: access_gate_sources
    op: contains_any
    value:
    - block.number
  - property: has_access_gate
    op: eq
    value: true
