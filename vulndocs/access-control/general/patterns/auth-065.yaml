id: auth-065
vulndoc: access-control/general
name: External Call Without Access Control
description: External calls in public/external functions without access control.
scope: Function
lens:
- Authority
severity: high
match:
  all:
  - property: visibility
    op: in
    value:
    - public
    - external
  - property: has_external_calls
    op: eq
    value: true
  - property: has_access_gate
    op: eq
    value: false
