id: auth-017
vulndoc: access-control/general
name: Missing Authentication
description: Privileged operation without authentication checks.
scope: Function
lens:
- Authority
severity: high
match:
  all:
  - property: is_privileged_operation
    op: eq
    value: true
  - property: has_access_gate
    op: eq
    value: false
  - property: has_require_msg_sender
    op: eq
    value: false
