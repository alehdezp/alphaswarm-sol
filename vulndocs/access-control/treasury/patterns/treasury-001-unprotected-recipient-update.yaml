tier_match:
  tier_a:
    # Deterministic structural detection
    all:
      - property: visibility
        op: in
        value: [public, external]
      - property: has_access_gate
        op: eq
        value: false
    any:
      - property: writes_sensitive_config
        op: eq
        value: true
      - property: writes_privileged_state
        op: eq
        value: true
  tier_b:
    # LLM-enhanced detection for business context
    semantic_analysis:
      - "Does this function modify addresses that receive protocol revenue?"
      - "Are there economic incentives for an attacker to call this function?"
      - "What is the potential financial impact of unauthorized modification?"
  aggregation:
    mode: tier_a_required  # Tier A must match; Tier B adds risk scoring

