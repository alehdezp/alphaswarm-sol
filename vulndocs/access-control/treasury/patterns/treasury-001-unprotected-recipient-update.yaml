# =============================================================================
# PATTERN: treasury-001-unprotected-recipient-update
# =============================================================================
#
# REPLACES: auth-118 (regex-based name matching)
#
# This pattern detects BEHAVIOR (sensitive config writes including treasury/fee
# recipients) not NAMES (setTreasury*, setRecipient*, setFeeReceiver*, etc.).
# Uses semantic property: writes_sensitive_config (detects writes to fee,
# treasury, config, reward, collateral, debt, liquidity, reserve, cap, oracle,
# governance, pause, allowlist, denylist, signer, dependency state).
#
# ALSO uses writes_privileged_state which includes treasury (heuristics.py:155).
#
# =============================================================================

id: treasury-001
vulndoc: access-control/treasury
name: "Unprotected Treasury/Fee Recipient Update"

description: |
  ## What This Detects
  Public/external functions that update treasury, fee recipient, or other sensitive
  configuration state without access control, regardless of function or variable
  naming conventions.

  **Sensitive configuration state includes:**
  - **Treasury addresses** - Protocol revenue collection addresses
  - **Fee recipient addresses** - Where trading/protocol fees are sent
  - **Fee rate parameters** - Percentage fees charged to users
  - **Reward distributors** - Where yield/staking rewards are sent
  - **Collateral/debt parameters** - Lending protocol risk settings
  - **Oracle addresses** - Price feed configurations
  - **Reserve addresses** - Protocol-owned value storage
  - **Cap/limit parameters** - Maximum borrowing, minting, withdrawal limits
  - **Governance parameters** - Voting thresholds, timelock delays

  **Detection is semantic, not syntactic:**
  - Detects `writes_sensitive_config=true` OR `writes_privileged_state=true`
  - NOT variable name matching (treasury, feeRecipient, beneficiary, etc.)
  - Works with obfuscated names, alternative conventions, renamed variables

  ## Why It's Dangerous
  Treasury and fee recipient addresses receive protocol revenue, which can total
  millions of dollars in high-volume protocols. Unprotected writes allow any caller to:

  - **Redirect all future revenue** → Attacker sets their address as treasury/fee recipient,
    stealing all subsequent protocol fees permanently
  - **Fee manipulation** → Set fees to 100% (drain user funds) or 0% (break protocol economics)
  - **Governance parameter attacks** → Lower quorum to 1 vote for easy proposal passage
  - **Collateral attacks** → Modify lending parameters to liquidate all positions
  - **Oracle redirection** → Point to malicious price feeds for manipulation

  **Economic Impact Magnitude:**
  - High-volume DEXs: $100K-$1M+ daily revenue redirection
  - Lending protocols: Risk parameter changes enabling mass liquidations
  - Yield aggregators: Reward stream redirection affecting all depositors

  ## Real-World Impact
  - **Yam Finance Governance Attack (2022)**: $3.1M treasury - Attempted governance
    proposal to transfer treasury control to attacker's wallet (thwarted before execution)
  - **Compound Golden Boys Attack (2023)**: $24M COMP tokens - Governance attack
    redirected treasury funds to attacker-controlled yield protocol
  - **Numerous rug pulls**: Unprotected `setTreasury()`, `setFeeRecipient()` allowing
    permanent revenue stream redirection without needing to drain contract directly
  - **Fee manipulation attacks**: Unprotected fee setters used to extract maximum
    value from every user transaction (100% fees to attacker address)

  ## Detection Logic
  This pattern triggers when ALL of these conditions are met:
  1. Function is externally callable (public/external visibility)
  2. Function writes to sensitive config state (treasury, fee, config, reward, etc.)
     OR writes to privileged state (includes treasury per heuristics.py:155)
  3. Function has NO access control (no modifiers, no require checks)
  4. Function is NOT a constructor or initializer (intentional setup)
  5. Function is NOT view/pure (can't modify state anyway)

  **Why both writes_sensitive_config AND writes_privileged_state?**
  - `writes_privileged_state` includes: owner, admin, role, governance, upgrade,
    pause, allowlist, denylist, oracle, **treasury**, signer (heuristics.py:146-157)
  - `writes_sensitive_config` includes: fee, config, reward, collateral, debt,
    liquidity, reserve, cap, oracle, **treasury**, governance, pause, allowlist,
    denylist, signer, dependency (builder.py:597-619)
  - Using ANY match ensures comprehensive coverage of treasury/fee/config writes

scope: Function

lens:
  - Authority
  - ValueMovement

severity: high

# Updated 2026-01-02: Documented as EXCELLENT in mega-task (~100%/~100%/~100%)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Must NOT have access control
    - property: has_access_gate
      op: eq
      value: false

  # At least ONE must match (OR logic) - SEMANTIC DETECTION
  # Detects writes to treasury, fee recipients, config parameters
  any:
    # Detects writes to: fee, config, reward, collateral, debt, liquidity,
    # reserve, cap, oracle, treasury, governance, pause, allowlist, denylist,
    # signer, dependency state variables (builder.py:597-619)
    - property: writes_sensitive_config
      op: eq
      value: true

    # Detects writes to: owner, admin, role, governance, upgrade, pause,
    # allowlist, denylist, oracle, treasury, signer (heuristics.py:146-157)
    # Included for redundancy/comprehensive treasury coverage
    - property: writes_privileged_state
      op: eq
      value: true

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude constructors (intentional setup)
    - property: is_constructor
      op: eq
      value: true

    # Exclude initializers (intentional setup in upgradeable contracts)
    - property: is_initializer_function
      op: eq
      value: true

    # Exclude view functions (can't modify state)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't access state)
    - property: is_pure
      op: eq
      value: true

