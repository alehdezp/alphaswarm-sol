# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Unauthorized Transaction Execution"
    description: |
      Attacker calls the execution function directly without providing valid signatures,
      bypassing the multisig security model entirely.
    preconditions:
      - "Function is externally callable"
      - "No ecrecover signature validation present"
      - "Function performs external calls or value transfers"
    steps:
      - "Attacker identifies execution function without signature validation"
      - "Attacker crafts malicious transaction data (drain funds, change ownership, etc.)"
      - "Attacker calls execution function directly with malicious payload"
      - "Contract executes transaction without verifying signatures"
      - "Attacker drains funds or takes control of contract"
    impact: |
      Complete bypass of multisig security model. Attacker gains full control
      equivalent to all signers approving the transaction. CVSS 9.8 (Critical).
      Potential loss: All contract funds and ownership.

  - name: "Zero-Address Signature Bypass"
    description: |
      ecrecover returns address(0) on invalid signatures. If address(0) is an owner
      or if zero-address checks are missing, anyone can execute transactions.
    preconditions:
      - "ecrecover used but return value not validated"
      - "Zero-address not excluded from owners"
      - "No require(signer != address(0)) check"
    steps:
      - "Attacker provides invalid signature that causes ecrecover to return 0x00"
      - "Contract doesn't check for address(0) result"
      - "Transaction executes as if signed by address(0)"
      - "If 0x00 is implicitly valid, transaction succeeds"
    impact: |
      Signature validation bypass through malformed signatures. CVSS 8.1 (High).

  - name: "Signature Replay Across Wallets"
    description: |
      Without proper domain separation (chainID, nonce), signatures can be replayed
      across different multisig wallets with shared ownership.
    preconditions:
      - "Signature validation lacks chainID"
      - "No nonce or sequential validation"
      - "Multiple wallets share same owners"
    steps:
      - "Attacker captures valid signature from Wallet A"
      - "Attacker replays signature to Wallet B with same owners"
      - "Wallet B executes transaction without detecting replay"
    impact: |
      Cross-wallet signature replay enabling unauthorized execution. CVSS 7.5 (High).

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function is intended for transaction execution (not just view/helper)"
  - "Verify no signature validation in modifiers or internal calls"
  - "Check if function should require multiple approvals per multisig design"
  - "Look for alternative authentication mechanisms (timelock, governance vote)"
  - "Verify this isn't an emergency recovery function intentionally unrestricted"
  - "Check audit documentation for intentional design vs. oversight"

# Recommended fixes
fix_recommendations:
  - name: "Add ecrecover Signature Validation"
    description: |
      Implement proper signature validation with ecrecover, including zero-address
      checks and signature malleability prevention.
    example: |
      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          bytes[] memory signatures
      ) external {
          require(signatures.length >= threshold, "Insufficient signatures");

          bytes32 txHash = keccak256(abi.encodePacked(
              address(this),  // Domain separation
              block.chainid,   // Prevent cross-chain replay
              nonce++,         // Prevent signature replay
              to,
              value,
              data
          ));

          bytes32 ethSignedHash = keccak256(abi.encodePacked(
              "\x19Ethereum Signed Message:\n32",
              txHash
          ));

          address[] memory signers = new address[](signatures.length);
          for (uint i = 0; i < signatures.length; i++) {
              (uint8 v, bytes32 r, bytes32 s) = splitSignature(signatures[i]);

              // Prevent signature malleability (EIP-2)
              require(uint256(s) <= 0x7FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF5D576E7357A4501DDFE92F46681B20A0,
                  "Invalid signature 's' value");

              address signer = ecrecover(ethSignedHash, v, r, s);

              // CRITICAL: Check for zero-address
              require(signer != address(0), "Invalid signature");
              require(isOwner[signer], "Not an owner");

              // Prevent duplicate signers
              for (uint j = 0; j < i; j++) {
                  require(signers[j] != signer, "Duplicate signer");
              }
              signers[i] = signer;
          }

          // Execute transaction
          (bool success, ) = to.call{value: value}(data);
          require(success, "Transaction failed");
      }

  - name: "Use EIP-1271 for Contract Signatures"
    description: |
      Implement EIP-1271 standard for signature validation, supporting both EOA
      and smart contract signers.
    example: |
      // IERC1271.sol
      interface IERC1271 {
          function isValidSignature(bytes32 hash, bytes memory signature)
              external view returns (bytes4 magicValue);
      }

      function validateSignature(
          address signer,
          bytes32 hash,
          bytes memory signature
      ) internal view returns (bool) {
          // Check if signer is a contract
          if (signer.code.length > 0) {
              // EIP-1271 contract signature
              try IERC1271(signer).isValidSignature(hash, signature) returns (bytes4 magicValue) {
                  return magicValue == 0x1626ba7e;
              } catch {
                  return false;
              }
          } else {
              // EOA signature (ecrecover)
              (uint8 v, bytes32 r, bytes32 s) = splitSignature(signature);
              address recovered = ecrecover(hash, v, r, s);
              return recovered != address(0) && recovered == signer;
          }
      }

  - name: "Implement Two-Phase Commit Pattern"
    description: |
      Separate transaction submission (propose) from execution (confirm) with
      explicit signature validation at both stages.
    example: |
      mapping(bytes32 => Transaction) public pendingTransactions;
      mapping(bytes32 => mapping(address => bool)) public confirmations;

      function submitTransaction(
          address to,
          uint256 value,
          bytes memory data
      ) external onlyOwner returns (bytes32 txHash) {
          txHash = keccak256(abi.encodePacked(to, value, data, nonce++));
          pendingTransactions[txHash] = Transaction(to, value, data, false);
          emit TransactionSubmitted(txHash, msg.sender);
      }

      function confirmTransaction(bytes32 txHash, bytes memory signature)
          external
      {
          require(pendingTransactions[txHash].to != address(0), "Transaction not found");

          bytes32 ethSignedHash = keccak256(abi.encodePacked(
              "\x19Ethereum Signed Message:\n32",
              txHash
          ));

          (uint8 v, bytes32 r, bytes32 s) = splitSignature(signature);
          address signer = ecrecover(ethSignedHash, v, r, s);

          require(signer != address(0), "Invalid signature");
          require(isOwner[signer], "Not an owner");
          require(!confirmations[txHash][signer], "Already confirmed");

          confirmations[txHash][signer] = true;
          emit TransactionConfirmed(txHash, signer);
      }

      function executeTransaction(bytes32 txHash) external {
          Transaction storage txn = pendingTransactions[txHash];
          require(txn.to != address(0), "Transaction not found");
          require(!txn.executed, "Already executed");

          uint256 confirmCount = 0;
          for (uint i = 0; i < owners.length; i++) {
              if (confirmations[txHash][owners[i]]) {
                  confirmCount++;
              }
          }
          require(confirmCount >= threshold, "Insufficient confirmations");

          txn.executed = true;
          (bool success, ) = txn.to.call{value: txn.value}(txn.data);
          require(success, "Transaction failed");
      }

  - name: "Use OpenZeppelin Multisig Pattern"
    description: |
      Adopt battle-tested OpenZeppelin multisig implementation with built-in
      signature validation and security best practices.
    example: |
      import "@openzeppelin/contracts/governance/TimelockController.sol";
      import "@openzeppelin/contracts/utils/cryptography/ECDSA.sol";

      contract SafeMultisig {
          using ECDSA for bytes32;

          uint256 public threshold;
          mapping(address => bool) public isOwner;

          function executeWithSignatures(
              address to,
              uint256 value,
              bytes calldata data,
              bytes[] calldata signatures
          ) external {
              bytes32 txHash = keccak256(abi.encodePacked(
                  address(this),
                  block.chainid,
                  to,
                  value,
                  data
              ));

              bytes32 ethHash = txHash.toEthSignedMessageHash();

              address[] memory signers = new address[](signatures.length);
              for (uint i = 0; i < signatures.length; i++) {
                  address signer = ethHash.recover(signatures[i]);
                  require(isOwner[signer], "Invalid signer");
                  signers[i] = signer;
              }

              require(signers.length >= threshold, "Insufficient signatures");

              (bool success, ) = to.call{value: value}(data);
              require(success, "Execution failed");
          }
      }

