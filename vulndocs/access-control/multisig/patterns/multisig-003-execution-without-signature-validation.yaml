# =============================================================================
# PATTERN: multisig-003-execution-without-signature-validation
# =============================================================================

id: multisig-003
vulndoc: access-control/multisig
name: "Multisig Execute Without Signature Validation"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Functions in multisig contracts that perform external calls or critical operations
  without signature validation using ecrecover. This allows unauthorized execution
  of transactions if signature verification is missing.

  ## Why It's Dangerous
  Multisig wallets rely on cryptographic signature validation to ensure multiple
  authorized parties have approved a transaction. Without signature verification:
  - Any caller can execute transactions without proper authorization
  - The security model of requiring N-of-M signatures is completely bypassed
  - Attackers can drain funds or execute arbitrary calls without permission
  - ecrecover returns address(0) on invalid signatures - if not checked, this
    becomes a critical vulnerability

  ## Detection Logic
  This pattern triggers when:
  1. Function is in a multisig contract (has multisig-related state/functions)
  2. Function is externally callable (public/external)
  3. Function performs external calls or untrusted operations (CALLS_EXTERNAL or CALLS_UNTRUSTED)
  4. Function does NOT use ecrecover for signature validation
  5. Function is NOT a constructor or initializer (which don't need signatures)

  ## Real-World Examples
  - GitHub Consensus Multisig Audit: ecrecover returns 0x00 on failure, allowing
    anyone to confirm if 0x00 is an owner
  - Radiant Capital (2024, $53M): Compromised 3-of-11 multisig through malware,
    exploiting insufficient signature validation in transaction execution
  - WazirX (2024, $235M): Multisig wallet breach affecting 6 signatories
  - Bybit (2025, $1.5B): Delegatecall exploit in cold wallet multisig infrastructure
  - Parity Wallet Hack: Drained 153,037 ETH from multisig contracts due to
    signature validation flaws

scope: Function

lens:
  - Authority

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be in a multisig contract
    - property: contract_has_multisig
      op: eq
      value: true

    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Must perform external calls (semantic operation detection)
    # This captures the BEHAVIOR of execution, not the name
    - property: semantic_ops
      op: contains_any
      value: [CALLS_EXTERNAL, CALLS_UNTRUSTED]

    # Must NOT use signature validation
    - property: uses_ecrecover
      op: eq
      value: false

  # At least ONE must match (OR logic) - use for alternatives
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Exclude constructors and initializers (don't need signatures)
    - property: is_constructor
      op: eq
      value: true

    - property: is_initializer_function
      op: eq
      value: true

# =============================================================================
# ADVANCED MATCHING (Optional)
# =============================================================================

# Edge requirements for graph-based detection
edges: []

# Path requirements for multi-hop detection
paths: []

# =============================================================================
# SEMANTIC OPERATIONS (Phase 1-3)
# =============================================================================

semantic_ops:
  # Requires external call operations (execution behavior)
  has_any_operation:
    - CALLS_EXTERNAL
    - CALLS_UNTRUSTED

# Behavioral signature showing execution without validation
behavioral_signature:
  # Vulnerable: External call without permission check
  # Pattern: X:call (or X:unk) without C:auth
  pattern: "X:(call|unk)"
  description: "External call execution without signature validation"

