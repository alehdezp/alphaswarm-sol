# =============================================================================
# PATTERN: multisig-002-nonce-not-updated
# =============================================================================
#
# REPLACES: auth-092 (partial regex-based name matching + semantic properties)
#
# This pattern detects FALSE SECURITY - function has nonce parameter but doesn't
# update nonce state, which is WORSE than having no nonce at all because it appears
# secure to auditors/developers while providing zero replay protection.
#
# =============================================================================

id: multisig-002
vulndoc: access-control/multisig
name: "Multisig Nonce Parameter Not Updated"

description: |
  ## What This Detects
  Multisig execution functions that accept a nonce parameter but fail to update
  nonce state, providing **FALSE SECURITY** and allowing unlimited replay attacks.

  This vulnerability is **MORE DANGEROUS** than having no nonce at all because:
  - Code appears to have replay protection (nonce parameter exists)
  - Auditors may miss the missing state update
  - Tests that execute once won't catch replay vulnerability
  - Developers have false confidence in security

  **Detects regardless of naming convention:**
  - executeTransaction(nonce) ✓
  - performAction(txNonce) ✓
  - runOperation(executionNonce) ✓
  - fn_0x123abc(uint256) (obfuscated) ✓
  - Any function with nonce parameter but no state write ✓

  **Detection is semantic, not syntactic:**
  - Uses `contract_has_multisig` to identify multisig context
  - Detects execution behavior via `CALLS_EXTERNAL` or `CALLS_UNTRUSTED` operations
  - Checks for nonce parameter presence (`has_nonce_parameter`)
  - Verifies absence of nonce state updates (`writes_nonce_state == false`)
  - Works with ANY function/parameter naming

  ## Why It's Dangerous
  Having nonce parameter without state update creates **false security**:
  - **Illusory Protection**: Function signature suggests replay protection exists
  - **Audit Blind Spot**: Code reviews may see nonce parameter and assume protection
  - **Test Gap**: Tests executing once will pass despite replay vulnerability
  - **Unlimited Replay**: Same nonce can be reused infinitely
  - **Signature Reuse**: Valid signatures authorize unlimited executions
  - **Fund Drainage**: Withdrawal transactions replayed until empty

  This is **worse than no nonce** because:
  - Missing nonce entirely is obvious vulnerability
  - Nonce parameter without update is subtle and easily missed
  - Creates false sense of security across development lifecycle

  ## Real-World Impact
  - Common copy-paste error in custom multisig implementations
  - Affects contracts that partially implement replay protection
  - Found in production contracts during audits
  - Higher risk than obvious vulnerabilities due to false confidence

  ## Detection Logic
  This pattern triggers when ALL of these conditions are met:
  1. Contract has multisig characteristics (`contract_has_multisig`)
  2. Function is externally callable (public/external visibility)
  3. Function executes external calls (execution behavior)
  4. Function **HAS** nonce parameter (the deceptive part)
  5. Function does **NOT** write to nonce state (the vulnerability)
  6. Function is not view/pure/constructor

scope: Function

lens:
  - Authority
  - ValueMovement  # External calls often move value

severity: critical  # Upgraded from high - false security is MORE dangerous

status: excellent  # FIXED: Enhanced nonce parameter detection (2025-12-31)

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Contract-level multisig detection
    - property: contract_has_multisig
      op: eq
      value: true

    # Function must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # THE DECEPTIVE PART: HAS nonce parameter (appears secure)
    - property: has_nonce_parameter
      op: eq
      value: true

    # THE VULNERABILITY: Does NOT write nonce state (not actually secure)
    - property: writes_nonce_state
      op: eq
      value: false

  # At least ONE must match - execution behavior (semantic operation)
  any:
    # Detects execution behavior via semantic operations (NAME-AGNOSTIC)
    - has_any_operation:
        - CALLS_EXTERNAL
        - CALLS_UNTRUSTED

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude view functions (can't execute transactions)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't execute transactions)
    - property: is_pure
      op: eq
      value: true

    # Exclude constructors (initialization only)
    - property: is_constructor
      op: eq
      value: true

