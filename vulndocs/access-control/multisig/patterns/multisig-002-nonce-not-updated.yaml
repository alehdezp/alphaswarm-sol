attack_scenarios:
  - name: "False Security Replay Attack"
    description: |
      Developer implements nonce parameter but forgets state update. Code review
      sees nonce parameter and incorrectly assumes replay protection exists.
      Attacker discovers nonce isn't enforced and replays transactions.
    preconditions:
      - Function has nonce parameter in signature
      - Function does not update nonce state (usedNonces[nonce] = true missing)
      - Code review missed the missing state write
      - Tests only execute transactions once (don't test replay)
    steps:
      - Developer adds nonce parameter to function signature
      - Developer includes nonce in transaction hash for signing
      - Developer forgets to add: usedNonces[nonce] = true
      - Code review sees nonce parameter, assumes it's protected
      - Tests execute transaction once and pass
      - Contract deployed to production
      - Transaction is signed and executed legitimately
      - Attacker notices nonce isn't checked or updated in state
      - Attacker replays same transaction with same nonce and signatures
      - Transaction executes again (nonce not enforced)
      - Attacker repeats replay attack to drain funds
    impact: "Complete fund drainage despite apparent nonce protection - false security"
    cvss: 9.3
    real_world: "Multiple custom multisig implementations found with this exact vulnerability during audits"

  - name: "Test Coverage Gap Exploitation"
    description: |
      Unit tests verify function executes correctly but don't test replay protection.
      Tests pass, giving false confidence, but replay vulnerability exists in production.
    preconditions:
      - Tests verify function executes successfully (once)
      - Tests don't verify nonce enforcement (no replay test)
      - Nonce parameter exists but not enforced in implementation
      - Production deployment occurs with passing test suite
    steps:
      - Test suite includes: "test_executeTransaction_succeeds()"
      - Test creates transaction with nonce=1, executes once, verifies success
      - Test does NOT include: "test_executeTransaction_cannotReplayNonce()"
      - All tests pass, CI/CD approves deployment
      - Contract deployed to production with false confidence
      - Attacker discovers nonce isn't enforced by calling twice
      - Attacker replays legitimate transactions to exploit contract
    impact: "Production vulnerability despite comprehensive test coverage - testing blind spot"
    cvss: 9.1
    mitigation: "Always test negative cases - attempt to replay transaction with same nonce"

  - name: "Audit Bypass via Apparent Protection"
    description: |
      Auditor sees nonce parameter in function signature and assumes replay
      protection is implemented. Missing state update goes unnoticed.
    preconditions:
      - Function signature includes nonce parameter
      - Auditor reviews signature but not full implementation
      - State update missing from function body
      - Time-constrained audit focuses on other issues
    steps:
      - Auditor reviews function signature: executeTransaction(..., uint256 nonce, ...)
      - Auditor sees nonce parameter and checks off "replay protection: ✓"
      - Auditor moves to next vulnerability class
      - State update logic never reviewed in detail
      - Audit report incorrectly states replay protection exists
      - Contract approved for production deployment
      - Vulnerability discovered post-deployment (potentially after exploit)
    impact: "Audit failure leading to exploitable production contract - false audit pass"
    cvss: 9.0
    prevention: "Always verify nonce state update, not just parameter presence"

verification_steps:
  - "Confirm function has nonce parameter in signature (has_nonce_parameter == true)"
  - "Verify function body does NOT update nonce state (writes_nonce_state == false)"
  - "Search for missing patterns:"
  - "  - usedNonces[nonce] = true (mapping-based tracking)"
  - "  - nonce++ or nonce = nonce + 1 (counter-based tracking)"
  - "  - executedTxs[txHash] = true (hash-based tracking)"
  - "Confirm function executes external calls (execution behavior present)"
  - "Check if nonce is included in transaction hash (if not, vulnerability is even worse)"
  - "Manual test: Call function twice with same nonce - both should succeed (proves vulnerability)"
  - "Check for alternative replay protection:"
  - "  - Timestamp-based validation (weak, not equivalent to nonce)"
  - "  - Transaction hash mapping (if present, may be false positive)"
  - "Verify this is critical path (moves funds, changes ownership, etc.)"

fix_recommendations:
  - name: "Add Nonce State Update (Mapping-Based)"
    description: |
      Add nonce state tracking using mapping to mark used nonces.
      This is the standard solution for arbitrary nonce ordering.
    example: |
      // BEFORE (VULNERABLE - nonce parameter but no state update)
      mapping(uint256 => bool) public usedNonces;  // Declared but never written!

      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          uint256 nonce,  // ✓ Parameter exists (DECEPTIVE)
          bytes[] memory signatures
      ) external {
          // ✗ Missing: require(!usedNonces[nonce], "Nonce already used");

          bytes32 txHash = keccak256(abi.encodePacked(to, value, data, nonce));
          require(verifySignatures(txHash, signatures), "Invalid sigs");

          // ✗ VULNERABILITY: Missing usedNonces[nonce] = true

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");
      }

      // AFTER (FIXED - nonce parameter WITH state update)
      mapping(uint256 => bool) public usedNonces;

      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          uint256 nonce,  // ✓ Parameter exists
          bytes[] memory signatures
      ) external {
          require(!usedNonces[nonce], "Nonce already used");  // ✓ Check before use

          bytes32 txHash = keccak256(abi.encodePacked(to, value, data, nonce));
          require(verifySignatures(txHash, signatures), "Invalid sigs");

          usedNonces[nonce] = true;  // ✓ CRITICAL: Mark nonce as used

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");

          emit TransactionExecuted(to, value, data, nonce);
      }

  - name: "Use Incremental Nonce Counter"
    description: |
      If nonce parameter is meant to be sequential, use auto-increment counter.
      Validate expected nonce matches current counter before incrementing.
    example: |
      // BEFORE (VULNERABLE - nonce parameter but no validation/increment)
      uint256 public nonce;  // Declared but never used!

      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          uint256 expectedNonce,  // User provides expected nonce
          bytes[] memory signatures
      ) external {
          // ✗ Missing: require(nonce == expectedNonce, "Nonce mismatch");

          bytes32 txHash = keccak256(
              abi.encodePacked(to, value, data, expectedNonce)
          );
          require(verifySignatures(txHash, signatures), "Invalid sigs");

          // ✗ VULNERABILITY: Missing nonce++

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");
      }

      // AFTER (FIXED - nonce validation and increment)
      uint256 public nonce;

      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          uint256 expectedNonce,
          bytes[] memory signatures
      ) external {
          require(nonce == expectedNonce, "Nonce mismatch");  // ✓ Validate

          bytes32 txHash = keccak256(
              abi.encodePacked(to, value, data, nonce)
          );
          require(verifySignatures(txHash, signatures), "Invalid sigs");

          nonce++;  // ✓ CRITICAL: Increment after validation

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");

          emit TransactionExecuted(to, value, data, expectedNonce);
      }

  - name: "Add Static Analysis Check"
    description: |
      Implement Slither detector or custom linter to catch this specific vulnerability.
      Detect functions with nonce parameter but no nonce state write.
    example: |
      # Slither custom detector pseudocode:

      for function in contract.functions:
          has_nonce_param = any("nonce" in param.name.lower() for param in function.parameters)
          writes_nonce_state = any("nonce" in var.name.lower() for var in function.state_variables_written)

          if has_nonce_param and not writes_nonce_state:
              report_high_severity(
                  f"Function {function.name} has nonce parameter but doesn't update nonce state",
                  f"Add: usedNonces[nonce] = true or nonce++"
              )

  - name: "Add Replay Protection Test"
    description: |
      Always include negative test case to verify replay protection.
      Test should attempt to execute same transaction twice.
    example: |
      // Foundry test example
      function test_CannotReplayTransaction() public {
          // Setup transaction
          address to = address(0x123);
          uint256 value = 1 ether;
          bytes memory data = "";
          uint256 nonce = 1;
          bytes[] memory signatures = getValidSignatures();

          // Execute transaction first time (should succeed)
          multisig.executeTransaction(to, value, data, nonce, signatures);

          // Attempt to replay with same nonce (should FAIL)
          vm.expectRevert("Nonce already used");
          multisig.executeTransaction(to, value, data, nonce, signatures);
      }

      // If this test PASSES (second call succeeds), replay vulnerability exists!

