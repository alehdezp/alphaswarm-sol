# Semantic Operations (Phase 1-3)
semantic_ops:
  has_any_operation:
    - CALLS_EXTERNAL       # Executes external transactions
    - CALLS_UNTRUSTED      # Calls to arbitrary addresses
  # Note: Pattern requires ANY external call operation to detect execution behavior

# Behavioral Signature (Phase 2)
behavioral_signature:
  pattern: ".*X:(call|unk).*"  # Any external call operation
  description: "Multisig execution with nonce parameter but no state update - false security"

# Tier A/B Matching (Phase 12-14)
tier_match:
  tier_a:
    all:
      - property: contract_has_multisig
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - has_any_operation:
          - CALLS_EXTERNAL
          - CALLS_UNTRUSTED
      - property: has_nonce_parameter
        value: true
      - property: writes_nonce_state
        value: false
  tier_b:
    # LLM can verify:
    # - Is nonce included in transaction hash? (if not, even worse)
    # - Are there alternative replay protections? (hash mapping, etc.)
    # - Is this intentional (some designs use nonce differently)?
    verification_hints:
      - "Verify nonce is included in signed transaction hash"
      - "Check for alternative replay protection (executedTxs mapping, etc.)"
      - "Assess if this is false positive (some designs use nonce for ordering only)"
      - "Verify this is critical execution path requiring replay protection"
  aggregation:
    mode: tier_a_required  # Tier A must match; Tier B adds verification context

# Multi-Agent Verification Hints (Phase 9)
verification_agents:
  explorer:
    entry_points: [EntryPoint]
    sinks: [CALLS_EXTERNAL, CALLS_UNTRUSTED]
    max_depth: 3
  pattern:
    require_all_conditions: true
  risk:
    assess_likelihood: true
    assess_impact: true
    min_exploitability_score: 7.0  # Critical severity requires high exploitability
  consensus:
    min_agents_agree: 2
    mode: voting

