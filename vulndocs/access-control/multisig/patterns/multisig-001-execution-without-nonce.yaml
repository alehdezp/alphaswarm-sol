# =============================================================================
# ROADMAP FIELDS (Future Enhancements)
# =============================================================================

# Semantic Operations (Phase 1-3)
semantic_ops:
  has_any_operation:
    - CALLS_EXTERNAL       # Executes external transactions
    - CALLS_UNTRUSTED      # Calls to arbitrary addresses
  # Note: Pattern requires ANY external call operation to detect execution behavior

# Behavioral Signature (Phase 2)
behavioral_signature:
  pattern: ".*X:(call|unk).*"  # Any external call operation
  description: "Multisig execution function pattern - external calls without nonce tracking"

# Tier A/B Matching (Phase 12-14)
tier_match:
  tier_a:
    all:
      - property: contract_has_multisig
        value: true
      - property: visibility
        op: in
        value: [public, external]
      - has_any_operation:
          - CALLS_EXTERNAL
          - CALLS_UNTRUSTED
      - property: has_nonce_parameter
        value: false
      - property: reads_nonce_state
        value: false
      - property: writes_nonce_state
        value: false
  tier_b:
    # LLM can verify:
    # - Is this truly a multisig execution function?
    # - Are there alternative replay protections (timestamp, hash mapping)?
    # - Is this a critical path requiring nonce protection?
    verification_hints:
      - "Verify function executes transactions on behalf of multiple signers"
      - "Check for alternative replay protection mechanisms"
      - "Assess criticality - does this function move funds or change state?"
  aggregation:
    mode: tier_a_required  # Tier A must match; Tier B adds verification context

# Multi-Agent Verification Hints (Phase 9)
verification_agents:
  explorer:
    entry_points: [EntryPoint]
    sinks: [CALLS_EXTERNAL, CALLS_UNTRUSTED]
    max_depth: 3
  pattern:
    require_all_conditions: true
  risk:
    assess_likelihood: true
    assess_impact: true
    min_exploitability_score: 6.0  # High severity requires medium exploitability
  consensus:
    min_agents_agree: 2
    mode: voting

# Exploit Database Similarity
exploit_similarity:
  matches: []
  description: "Multisig replay vulnerability - common in custom multisig implementations"
  similarity_threshold: 0.80
