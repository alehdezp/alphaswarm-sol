attack_scenarios:
  - name: "Transaction Replay Attack"
    description: |
      Attacker replays previously signed transaction multiple times to drain funds
      or execute unauthorized actions repeatedly.
    preconditions:
      - Multisig contract lacks nonce tracking
      - Transaction was legitimately signed by required signers
      - No other replay protection mechanism (timestamp, used tx hash mapping)
    steps:
      - Legitimate signers authorize transaction (e.g., withdraw 100 ETH to treasury)
      - Transaction executes successfully via multisig
      - Attacker observes transaction calldata and signatures (on-chain or mempool)
      - Attacker replays same transaction with identical signatures
      - Transaction executes again, withdrawing another 100 ETH
      - Attacker repeats until funds exhausted or replay detected
    impact: "Complete fund drainage via replay - attacker can execute same withdrawal indefinitely"
    cvss: 8.8

  - name: "Cross-Chain Replay"
    description: |
      Attacker replays transaction on different blockchain where same contract
      is deployed, causing unintended execution on multiple chains.
    preconditions:
      - Contract deployed on multiple chains (e.g., Ethereum + Polygon)
      - No chain ID in signature hash
      - No nonce tracking
      - Same signers on all chains
    steps:
      - Signers authorize transaction on Chain A (e.g., Ethereum)
      - Attacker observes transaction and signatures
      - Attacker submits same transaction with same signatures to Chain B (e.g., Polygon)
      - Transaction executes on both chains with single approval
      - Funds drained or actions executed on unintended chain
    impact: "Unintended execution on multiple chains - double spending or duplicate actions"
    cvss: 7.5

  - name: "Signature Reuse Attack"
    description: |
      Attacker reuses valid signatures for different transactions by exploiting
      lack of nonce binding in signature hash.
    preconditions:
      - Transaction hash does not include nonce
      - No nonce tracking in contract
      - Signatures are not bound to specific transaction execution order
    steps:
      - Signers approve multiple similar transactions
      - Attacker collects signatures from different transactions
      - Attacker mixes and matches signatures to create unauthorized transaction
      - Executes transaction with reused signatures
    impact: "Unauthorized transaction execution via signature reuse"
    cvss: 8.2

verification_steps:
  - "Verify contract has multisig characteristics (check contract_has_multisig property)"
  - "Identify transaction execution function (public/external with external calls)"
  - "Check function signature for nonce parameter - should be absent for this vulnerability"
  - "Check function body for nonce state variable reads (nonce, txNonce, executedNonce, etc.) - should be absent"
  - "Check function body for nonce state writes (nonce++, nonce = x, etc.) - should be absent"
  - "Look for alternative replay protection mechanisms:"
  - "  - Timestamp-based validation (weaker, can be manipulated)"
  - "  - Transaction hash mapping (mapping(bytes32 => bool) executed)"
  - "  - EIP-712 with nonce in domain separator"
  - "Review contract for any used/executed transaction tracking"
  - "Test: attempt to execute same transaction twice with same signatures to confirm replay vulnerability"

fix_recommendations:
  - name: "Add Nonce Parameter and Tracking"
    description: |
      Include nonce in transaction hash and track used nonces to prevent replay.
      This is the standard and most robust solution.
    example: |
      // BEFORE (VULNERABLE)
      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          bytes[] memory signatures
      ) external {
          bytes32 txHash = keccak256(abi.encodePacked(to, value, data));
          require(verifySignatures(txHash, signatures), "Invalid signatures");

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");
      }

      // AFTER (FIXED)
      mapping(uint256 => bool) public usedNonces;

      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          uint256 nonce,  // Added nonce parameter
          bytes[] memory signatures
      ) external {
          require(!usedNonces[nonce], "Nonce already used");  // Replay check

          // Include nonce in transaction hash
          bytes32 txHash = keccak256(abi.encodePacked(to, value, data, nonce));
          require(verifySignatures(txHash, signatures), "Invalid signatures");

          usedNonces[nonce] = true;  // Mark nonce as used

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");

          emit TransactionExecuted(to, value, data, nonce);
      }

  - name: "Use Incremental Nonce Counter"
    description: |
      Use auto-incrementing nonce instead of arbitrary nonces. This ensures
      sequential execution and simpler nonce management.
    example: |
      uint256 public nonce;  // Auto-incrementing counter

      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          bytes[] memory signatures
      ) external {
          uint256 currentNonce = nonce++;  // Increment on each execution

          bytes32 txHash = keccak256(
              abi.encodePacked(to, value, data, currentNonce)
          );
          require(verifySignatures(txHash, signatures), "Invalid signatures");

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");

          emit TransactionExecuted(to, value, data, currentNonce);
      }

  - name: "Include Chain ID in Signature (EIP-712)"
    description: |
      Prevent cross-chain replay by including chain ID in signature hash.
      Use EIP-712 for standardized structured data hashing.
    example: |
      import "@openzeppelin/contracts/utils/cryptography/EIP712.sol";

      contract MultiSig is EIP712 {
          mapping(uint256 => bool) public usedNonces;

          bytes32 public constant TRANSACTION_TYPEHASH = keccak256(
              "Transaction(address to,uint256 value,bytes data,uint256 nonce)"
          );

          constructor() EIP712("MyMultiSig", "1") {}

          function executeTransaction(
              address to,
              uint256 value,
              bytes memory data,
              uint256 nonce,
              bytes[] memory signatures
          ) external {
              require(!usedNonces[nonce], "Nonce already used");

              // EIP-712 hash includes chain ID automatically
              bytes32 structHash = keccak256(
                  abi.encode(TRANSACTION_TYPEHASH, to, value, keccak256(data), nonce)
              );
              bytes32 txHash = _hashTypedDataV4(structHash);

              require(verifySignatures(txHash, signatures), "Invalid signatures");

              usedNonces[nonce] = true;

              (bool success,) = to.call{value: value}(data);
              require(success, "Transaction failed");
          }
      }

  - name: "Transaction Hash Mapping (Alternative)"
    description: |
      Track executed transaction hashes instead of nonces. Allows any execution
      order but requires more storage.
    example: |
      mapping(bytes32 => bool) public executedTransactions;

      function executeTransaction(
          address to,
          uint256 value,
          bytes memory data,
          bytes[] memory signatures
      ) external {
          bytes32 txHash = keccak256(
              abi.encodePacked(to, value, data, block.chainid)
          );

          require(!executedTransactions[txHash], "Transaction already executed");
          require(verifySignatures(txHash, signatures), "Invalid signatures");

          executedTransactions[txHash] = true;

          (bool success,) = to.call{value: value}(data);
          require(success, "Transaction failed");
      }

