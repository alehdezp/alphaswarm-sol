# =============================================================================
# PATTERN: multisig-001-execution-without-nonce
# =============================================================================
#
# REPLACES: auth-078 (regex-based name matching on execute|submit|confirm)
#
# This pattern detects BEHAVIOR (multisig execution functions) not NAMES.
# Uses semantic operations to identify transaction execution, not function naming.
#
# =============================================================================

id: multisig-001
vulndoc: access-control/multisig
name: "Multisig Execution Without Replay Protection"

description: |
  ## What This Detects
  Multisig transaction execution functions that lack nonce-based replay protection,
  allowing the same transaction to be executed multiple times. Detection is based
  on multisig BEHAVIOR, not function naming conventions.

  **Detects execution functions regardless of naming:**
  - executeTransaction() ✓
  - performTx() ✓
  - runMultisig() ✓
  - fn_0x123abc() (obfuscated) ✓
  - Any function executing external calls in multisig context ✓

  **Detection is semantic, not syntactic:**
  - Identifies multisig contract context (`contract_has_multisig`)
  - Detects external call execution behavior (`CALLS_EXTERNAL` or `CALLS_UNTRUSTED`)
  - Checks for missing nonce tracking (parameters, state reads/writes)
  - Works with ANY function name or implementation style

  ## Why It's Dangerous
  Without nonce-based replay protection, multisig transactions can be replayed:
  - **Transaction Replay**: Same signatures authorize multiple identical executions
  - **Fund Drainage**: Withdraw transactions can be replayed until funds exhausted
  - **Cross-Chain Replay**: Same transaction replayed on different chains
  - **No Execution Tracking**: Cannot determine which transactions have executed

  ## Real-World Impact
  - Multiple DeFi protocols vulnerable to replay attacks in custom multisig implementations
  - Common vulnerability in non-standard multisig contracts
  - Affects multisigs without proper nonce counter or transaction hash tracking

  ## Detection Logic
  This pattern triggers when ALL of these conditions are met:
  1. Contract has multisig characteristics (name/signatures/verification)
  2. Function is externally callable (public/external visibility)
  3. Function executes external calls (CALLS_EXTERNAL or CALLS_UNTRUSTED operations)
  4. Function lacks nonce parameter
  5. Function does not read nonce state
  6. Function does not write nonce state
  7. Function is NOT view/pure/constructor

scope: Function

lens:
  - Authority
  - ValueMovement  # External calls often move value

severity: high

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Contract-level multisig detection
    - property: contract_has_multisig
      op: eq
      value: true

    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Missing nonce parameter
    - property: has_nonce_parameter
      op: eq
      value: false

    # Missing nonce state tracking
    - property: reads_nonce_state
      op: eq
      value: false

    - property: writes_nonce_state
      op: eq
      value: false

  # At least ONE must match - execution behavior
  any:
    # Detects execution behavior via semantic operations
    - has_any_operation:
        - CALLS_EXTERNAL
        - CALLS_UNTRUSTED

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude view functions (can't execute transactions)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't execute transactions)
    - property: is_pure
      op: eq
      value: true

    # Exclude constructors (initialization only)
    - property: is_constructor
      op: eq
      value: true

