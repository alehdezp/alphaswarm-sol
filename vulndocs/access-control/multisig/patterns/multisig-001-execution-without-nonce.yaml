  contracts: [ExecutionNonceTest.sol]
  true_positives: 14
  false_positives: 5
  false_negatives: 1
  true_negatives: 5
  edge_cases: 7
  variations: 6
  precision: 0.7368
  recall: 0.9333
  f1_score: 0.8235
  variation_score: 0.8000
  last_tested: "2025-12-31"
  notes: |
    Pattern achieves READY status with 73.7% precision and 93.3% recall.

    Strengths:
    - Excellent recall (93.3%) - catches most vulnerabilities
    - Name-agnostic detection works across all tested variations
    - Correctly detects edge cases (timelock, deadline, chainId, EIP-712 without nonce)
    - Detects alternative multisig patterns (Gnosis Safe, Governor, Timelock+multisig)

    False Positives (5/19 = 26.3% FP rate):
    All FPs are due to VKG builder property gaps, NOT pattern design issues:
    1. Builder does not detect executed/used flag patterns (mapping(bytes32 => bool) executed)
    2. Builder does not detect nonce increment (nonces[msg.sender]++)
    3. Builder incorrectly sets contract_has_multisig=True for ALL functions in file

    False Negatives (1/15):
    - executeGuardianAction (VariationGuardianNaming) - investigation needed

    Builder Enhancement Requests:
    - HIGH: Expand reads_nonce_state/writes_nonce_state to detect executed/used/consumed flags
    - HIGH: Fix contract_has_multisig property isolation (per contract, not per file)
    - MEDIUM: Pattern detection for require(!executed[key]) + executed[key]=true

    Pattern will achieve EXCELLENT status after builder improvements.

