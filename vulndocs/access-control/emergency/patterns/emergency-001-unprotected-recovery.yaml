# Semantic Operations (when fully implemented)
semantic_ops:
  has_any_operation:
    - TRANSFERS_VALUE_OUT      # Sends ETH/tokens out
    - WRITES_USER_BALANCE      # Modifies user balance state
    - MODIFIES_CRITICAL_STATE  # Changes critical state variables

# Behavioral Signature
behavioral_signature:
  pattern: "X:out|W:bal"
  description: "Emergency value extraction or balance modification without authorization"

# Exploit Database Similarity
exploit_similarity:
  matches:
    - poly-network-2021
    - cetus-protocol-2025
  description: "Unprotected emergency/rescue functions leading to fund drainage"
  attack_type: "Emergency function exploitation"

# Multi-Agent Verification Hints
verification_agents:
  # Explorer agent: Trace value movement from entry to exit
  explorer:
    entry_points: [EntryPoint]
    sinks: [TRANSFERS_VALUE_OUT, WRITES_USER_BALANCE]
    max_depth: 5

  # Pattern agent: Structural motif matching
  pattern:
    require_all_conditions: true

  # Risk agent: Assess exploitability and impact
  risk:
    assess_likelihood: true
    assess_impact: true
    min_exploitability_score: 7.5  # High severity for fund extraction

  # Consensus requirement
  consensus:
    min_agents_agree: 3
    mode: voting
