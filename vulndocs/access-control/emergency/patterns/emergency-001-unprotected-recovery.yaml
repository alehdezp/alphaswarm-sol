attack_scenarios:
  - name: "Emergency Function Exploitation"
    description: |
      Attacker discovers unprotected emergency/rescue function and drains
      all contract funds by calling what should be admin-only recovery function.
    preconditions:
      - Function can transfer ETH or tokens (can_affect_user_funds=true)
      - Function modifies contract state (writes_state=true)
      - No access control present (no onlyOwner, no require checks)
      - Function is externally callable (public/external)
    steps:
      - Attacker scans contract for public/external functions
      - Identifies emergency/recovery function without access control
      - Calls function to extract contract funds (e.g., emergencyWithdraw(), rescueTokens(), sweep())
      - Contract transfers all holdings to attacker without authorization check
      - Attacker repeats or extracts all assets in single transaction
    impact: "Complete fund drainage - attacker steals all contract ETH and token holdings"
    cvss: 9.1
    severity: critical

  - name: "Stuck Token Theft"
    description: |
      Attacker exploits unprotected token sweep/rescue function to steal
      tokens that were accidentally sent to contract or are meant to be recovered.
    preconditions:
      - Contract holds accidentally-sent tokens or has rescue mechanism
      - Rescue function has no access control
      - Function can transfer arbitrary tokens
    steps:
      - User or protocol accidentally sends tokens to contract
      - Attacker monitors contract for token balance increases
      - Calls unprotected rescue/sweep function
      - Specifies token address and recipient (attacker address)
      - Contract sends all tokens to attacker
    impact: "Theft of stuck/trapped tokens meant for recovery or refund"
    cvss: 8.2
    severity: high

  - name: "Forced Withdrawal Attack"
    description: |
      Attacker uses unprotected force-withdraw function to extract user
      deposits or bypass withdrawal restrictions.
    preconditions:
      - Contract has force-withdraw or emergency-exit functionality
      - Function modifies balance state and transfers value
      - No authorization check on who can trigger forced withdrawals
    steps:
      - Attacker identifies unprotected force-withdraw function
      - Calls function targeting other users' deposits
      - Modifies balance tracking state to debit victim's account
      - Transfers victim's funds to attacker address
      - Victim loses funds, attacker gains unauthorized access to deposits
    impact: "Theft of user deposits via forced unauthorized withdrawals"
    cvss: 9.3
    severity: critical

  - name: "Emergency Fee Bypass"
    description: |
      Attacker exploits emergency withdrawal to bypass normal withdrawal
      fees or restrictions that apply to regular withdrawal functions.
    preconditions:
      - Regular withdrawal charges fees or has limits
      - Emergency withdrawal bypasses normal restrictions
      - Emergency function lacks access control
    steps:
      - Attacker deposits funds via normal deposit function
      - Instead of using regular withdrawal (with fees/limits)
      - Calls unprotected emergency withdrawal function
      - Extracts full deposit amount without fees
      - Repeats to drain protocol revenue or bypass rate limits
    impact: "Revenue loss via fee bypass, potential economic attack on protocol"
    cvss: 6.5
    severity: medium

verification_steps:
  - "Verify function is externally callable (public or external visibility)"
  - "Confirm function can affect user funds (check for: transfers_eth, uses_erc20_transfer, uses_erc20_transfer_from, uses_call, uses_transfer, uses_send, or balance state modifications)"
  - "Confirm function writes to state (writes_state=true)"
  - "Check no access control modifier present (onlyOwner, onlyRole, onlyAdmin, etc.)"
  - "Check no inline require/if statements validating msg.sender against privileged addresses"
  - "Verify this is NOT a constructor or initializer (intentional setup pattern)"
  - "Review function behavior: does it move value? modify balances? rescue tokens?"
  - "Assess business logic: SHOULD this function be restricted to admins?"
  - "Test: attempt to call function from non-privileged address to confirm unauthorized access"
  - "Check if this is part of intended public withdrawal (pull-payment pattern may be legitimate)"

fix_recommendations:
  - name: "Add onlyOwner Modifier"
    description: |
      Restrict emergency/recovery functions to contract owner only.
      This is appropriate for single-admin emergency operations.
    example: |
      // BEFORE (VULNERABLE)
      function emergencyWithdraw() external {
          payable(msg.sender).transfer(address(this).balance);
      }

      // AFTER (FIXED)
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract MyContract is Ownable {
          function emergencyWithdraw() external onlyOwner {
              require(address(this).balance > 0, "No funds to withdraw");
              payable(owner()).transfer(address(this).balance);
              emit EmergencyWithdrawal(owner(), address(this).balance);
          }
      }

  - name: "Implement Multi-Signature Requirement"
    description: |
      For high-value emergency operations, require multiple authorized
      signatures to prevent single compromised admin from draining funds.
    example: |
      import "@gnosis.pm/safe-contracts/contracts/GnosisSafe.sol";

      contract MyContract {
          GnosisSafe public multiSig;

          modifier onlyMultiSig() {
              require(msg.sender == address(multiSig), "Only multisig");
              _;
          }

          function rescueTokens(address token, uint256 amount)
              external
              onlyMultiSig
          {
              IERC20(token).transfer(address(multiSig), amount);
              emit TokensRescued(token, amount);
          }
      }

  - name: "Add Timelock for Emergency Functions"
    description: |
      Require time delay before emergency operations take effect, allowing
      users to react to potential malicious calls.
    example: |
      import "@openzeppelin/contracts/governance/TimelockController.sol";

      contract MyContract {
          TimelockController public timelock;

          modifier onlyTimelock() {
              require(msg.sender == address(timelock), "Only timelock");
              _;
          }

          // Emergency withdrawal requires 48-hour timelock
          function emergencyDrain() external onlyTimelock {
              uint256 balance = address(this).balance;
              payable(msg.sender).transfer(balance);
              emit EmergencyDrain(msg.sender, balance);
          }
      }

  - name: "Use Role-Based Access Control"
    description: |
      Assign emergency operations to specific EMERGENCY_ADMIN_ROLE,
      separate from regular admin roles for least-privilege security.
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyContract is AccessControl {
          bytes32 public constant EMERGENCY_ADMIN_ROLE = keccak256("EMERGENCY_ADMIN_ROLE");

          constructor() {
              _grantRole(DEFAULT_ADMIN_ROLE, msg.sender);
              _grantRole(EMERGENCY_ADMIN_ROLE, msg.sender);
          }

          function sweep(address token, address to, uint256 amount)
              external
              onlyRole(EMERGENCY_ADMIN_ROLE)
          {
              require(to != address(0), "Invalid recipient");
              require(amount > 0, "Invalid amount");
              IERC20(token).transfer(to, amount);
              emit TokensSwept(token, to, amount);
          }
      }

  - name: "Implement Emergency Pause + Pull Pattern"
    description: |
      Allow users to withdraw their own funds during emergencies (pull pattern)
      rather than having admin push funds, reducing trust requirements.
    example: |
      import "@openzeppelin/contracts/security/Pausable.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract MyContract is Pausable, Ownable {
          mapping(address => uint256) public deposits;

          // Admin can pause in emergency (stops new deposits)
          function emergencyPause() external onlyOwner {
              _pause();
              emit EmergencyPauseActivated();
          }

          // Users can always withdraw their own funds (pull pattern)
          // This works even during pause, allowing safe exit
          function withdraw() external {
              uint256 amount = deposits[msg.sender];
              require(amount > 0, "No funds to withdraw");

              deposits[msg.sender] = 0;
              payable(msg.sender).transfer(amount);
              emit Withdrawal(msg.sender, amount);
          }
      }

  - name: "Add Recipient Validation for Rescue Functions"
    description: |
      If rescue function must be public, at least validate recipient
      to prevent arbitrary fund extraction.
    example: |
      // BEFORE (VULNERABLE)
      function rescueTokens(address token, address recipient) external {
          uint256 balance = IERC20(token).balanceOf(address(this));
          IERC20(token).transfer(recipient, balance);
      }

      // AFTER (IMPROVED - still needs access control!)
      address public immutable treasury;  // Set in constructor

      function rescueTokens(address token) external {
          require(msg.sender == owner(), "Only owner");
          require(token != address(0), "Invalid token");

          uint256 balance = IERC20(token).balanceOf(address(this));
          require(balance > 0, "No tokens to rescue");

          // Always send to known safe address, not arbitrary recipient
          IERC20(token).transfer(treasury, balance);
          emit TokensRescued(token, treasury, balance);
      }

