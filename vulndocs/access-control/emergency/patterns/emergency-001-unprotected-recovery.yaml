# =============================================================================
# PATTERN: emergency-001-unprotected-recovery
# =============================================================================
#
# REPLACES: auth-115 (regex-based name matching)
#
# This pattern detects BEHAVIOR (recovery/emergency value movement) not NAMES
# (emergency*, rescue*, recover*, etc.). Uses semantic properties:
# - can_affect_user_funds: true (transfers ETH/tokens, modifies balances)
# - writes_state: true (modifies contract state)
# - has_access_gate: false (no access control)
#
# Emergency/rescue functions are designed to recover stuck or trapped funds.
# Without access control, attackers can drain all contract holdings.
#
# =============================================================================

id: emergency-001
vulndoc: access-control/emergency
name: "Unprotected Emergency/Recovery Operation"

description: |
  ## What This Detects

  Public/external functions that can affect user funds and modify state without
  access control, **regardless of function naming conventions**.

  **Emergency/Recovery operations typically:**
  - Transfer trapped/stuck ETH or tokens out of the contract
  - Modify user balance tracking to correct accounting errors
  - Sweep accidentally-sent tokens to designated addresses
  - Drain contract holdings in emergency situations
  - Force-withdraw funds from external protocols

  **Detection is semantic, not syntactic:**
  - Detects `can_affect_user_funds=true` + `writes_state=true` (behavior)
  - NOT function name matching (emergency*, rescue*, recover*, sweep*, drain*, force*)
  - Works with obfuscated names, alternative conventions, renamed functions

  ## Why It's Dangerous

  Emergency/rescue functions are high-privilege operations designed to move value
  in exceptional circumstances. Without proper access control, any caller can:

  - **Drain all contract funds** → complete fund extraction via "emergency" functions
  - **Steal stuck tokens** → extract accidentally-sent tokens meant for recovery
  - **Manipulate accounting** → modify balance state to create fund imbalances
  - **Force unwanted withdrawals** → extract user funds without authorization
  - **Bypass withdrawal limits** → circumvent normal withdrawal restrictions

  The impact is **direct fund loss** - attackers can extract all holdings by
  calling what should be admin-only recovery functions.

  ## Real-World Impact

  **2024 DeFi Exploits:**
  - **Access control vulnerabilities**: 17 incidents in 2024, with unprotected
    `emergencyWithdraw()` and `setFeeRecipient()` functions allowing fund drainage
  - **$1.4B+ lost in 2024**: 75% from vulnerabilities that should have been caught
    before deployment, including unprotected emergency functions
  - **Cetus Protocol (2025)**: $223M breach from smart contract vulnerability
    involving unprotected critical functions

  **Historical Exploits:**
  - **Poly Network (2021)**: $611M stolen via unprotected keeper modification
    function that should have required multi-sig authorization
  - **Numerous DeFi hacks**: Unprotected sweep/rescue/drain functions with
    non-standard names exploited for fund extraction

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function is externally callable (public/external visibility)
  2. Function can affect user funds (transfers ETH/tokens OR modifies balances)
  3. Function writes to contract state (not pure read-only)
  4. Function has NO access control (no modifiers, no require checks)
  5. Function is NOT a constructor/initializer (intentional setup)
  6. Function is NOT view/pure (can't modify state anyway)

  **Why this combination is dangerous:**
  Emergency/recovery functions are **intended** to move value in exceptional
  circumstances, but they must be restricted to trusted administrators. The
  combination of `can_affect_user_funds=true` + `writes_state=true` +
  `has_access_gate=false` indicates a function with the **power** to move funds
  but **no authorization check** to prevent abuse.

scope: Function

lens:
  - Authority
  - ValueMovement

severity: high

status: draft

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Must be able to affect user funds (SEMANTIC DETECTION)
    # Detects: ETH transfers, token transfers, balance modifications
    - property: can_affect_user_funds
      op: eq
      value: true

    # Must write state (recovery operations modify state)
    - property: writes_state
      op: eq
      value: true

    # Must NOT have access control - this is the vulnerability
    - property: has_access_gate
      op: eq
      value: false

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude constructors (one-time initialization)
    - property: is_constructor
      op: eq
      value: true

    # Exclude initializers (one-time setup in upgradeable contracts)
    - property: is_initializer_function
      op: eq
      value: true

    # Exclude view functions (can't modify state or transfer value)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't access state at all)
    - property: is_pure
      op: eq
      value: true

