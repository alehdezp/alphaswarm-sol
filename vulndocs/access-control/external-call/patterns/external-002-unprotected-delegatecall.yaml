# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Storage Overwrite via Unprotected Delegatecall"
    description: |
      Attacker exploits public delegatecall function without access control to execute
      malicious code that overwrites critical storage variables (owner, balances, roles).
    preconditions:
      - "Function with delegatecall is public/external"
      - "Function lacks access control (no onlyOwner, no role checks)"
      - "Contract has valuable state or holds funds"
    steps:
      - "Attacker identifies unprotected delegatecall function"
      - "Attacker deploys malicious contract with storage layout matching victim"
      - "Malicious contract's function modifies storage variables"
      - "Attacker calls victim's delegatecall function with malicious address"
      - "Malicious code executes in victim's storage context"
      - "Critical state variables (owner, balances) are overwritten"
      - "Attacker gains privileged access and drains funds"
    impact: "Complete protocol takeover, fund theft, privilege escalation to owner"

  - name: "Selfdestruct via Public Delegatecall"
    description: |
      Attacker uses unprotected delegatecall to execute selfdestruct in the contract's
      context, destroying the contract and sending all ETH to attacker.
    preconditions:
      - "Public delegatecall function without access control"
      - "Contract holds ETH or valuable tokens"
    steps:
      - "Attacker deploys malicious contract with selfdestruct(attackerAddress)"
      - "Attacker calls victim's delegatecall function with malicious address"
      - "Selfdestruct executes in victim's storage context"
      - "Victim contract is destroyed"
      - "All ETH sent to attacker, contract permanently bricked"
    impact: "Protocol destruction, total fund loss, permanent bricking of contract"

  - name: "Unintended Function Execution"
    description: |
      Even with a trusted/validated target address, missing access control allows
      attackers to call unintended functions via malicious calldata, potentially
      triggering selfdestruct or other dangerous operations in the target.
    preconditions:
      - "Delegatecall target is trusted/validated"
      - "Function lacks access control"
      - "Target library has dangerous functions (destroy, emergency, admin operations)"
    steps:
      - "Attacker analyzes trusted target library for dangerous functions"
      - "Attacker identifies function that can harm the calling contract (e.g., selfdestruct)"
      - "Attacker calls victim's delegatecall with malicious calldata"
      - "Dangerous function executes in victim's context via delegatecall"
      - "Contract is destroyed or critically compromised"
    impact: "Contract destruction, state corruption, loss of funds"

# How to further verify this is not a false positive
verification_steps:
  - "Verify the function is truly externally callable (public/external visibility, not internal/private)"
  - "Confirm there is NO access control on the function (no modifiers, no require checks on msg.sender)"
  - "Check if this is an intentional public API design (unlikely for delegatecall)"
  - "Verify the contract holds valuable assets (ETH, tokens) or has privileged state"
  - "Examine if there are any off-chain or governance controls not visible in the code"
  - "Check if this is part of a proper proxy upgrade pattern with authorization (would be filtered by none conditions)"
  - "Review contract documentation to see if public delegatecall is intentional (rare and dangerous)"

# Recommended fixes
fix_recommendations:
  - name: "Add Access Control Modifier"
    description: |
      Add access control to restrict the function to authorized callers only.
      This is the MINIMUM required protection for delegatecall functions.
    example: |
      // Before (VULNERABLE)
      function execute(address target, bytes memory data) external {
          (bool success,) = target.delegatecall(data);
          require(success, "Delegatecall failed");
      }

      // After (SAFE with access control)
      function execute(address target, bytes memory data) external onlyOwner {
          (bool success,) = target.delegatecall(data);
          require(success, "Delegatecall failed");
      }

  - name: "Use Role-Based Access Control"
    description: |
      For multi-admin scenarios, use OpenZeppelin's AccessControl or custom roles.
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyContract is AccessControl {
          bytes32 public constant EXECUTOR_ROLE = keccak256("EXECUTOR_ROLE");

          function execute(address target, bytes memory data)
              external
              onlyRole(EXECUTOR_ROLE)
          {
              (bool success,) = target.delegatecall(data);
              require(success, "Delegatecall failed");
          }
      }

  - name: "Add Multi-Signature Requirement"
    description: |
      For critical delegatecall operations, require multiple signatures/approvals.
    example: |
      contract SafeExecutor {
          mapping(bytes32 => uint256) public approvals;
          uint256 public constant REQUIRED_APPROVALS = 3;

          function approveDelegatecall(address target, bytes memory data)
              external
              onlyOwner
          {
              bytes32 callHash = keccak256(abi.encodePacked(target, data));
              approvals[callHash]++;
          }

          function execute(address target, bytes memory data) external {
              bytes32 callHash = keccak256(abi.encodePacked(target, data));
              require(approvals[callHash] >= REQUIRED_APPROVALS, "Insufficient approvals");

              (bool success,) = target.delegatecall(data);
              require(success, "Delegatecall failed");

              delete approvals[callHash];  // One-time use
          }
      }

  - name: "Use Timelock for Critical Operations"
    description: |
      Add a timelock delay for delegatecall operations to allow monitoring and intervention.
    example: |
      contract TimelockExecutor {
          mapping(bytes32 => uint256) public scheduledCalls;
          uint256 public constant TIMELOCK_DELAY = 2 days;

          function scheduleDelegatecall(address target, bytes memory data)
              external
              onlyOwner
          {
              bytes32 callHash = keccak256(abi.encodePacked(target, data));
              scheduledCalls[callHash] = block.timestamp + TIMELOCK_DELAY;
          }

          function execute(address target, bytes memory data) external {
              bytes32 callHash = keccak256(abi.encodePacked(target, data));
              require(scheduledCalls[callHash] != 0, "Not scheduled");
              require(block.timestamp >= scheduledCalls[callHash], "Timelock not expired");

              (bool success,) = target.delegatecall(data);
              require(success, "Delegatecall failed");

              delete scheduledCalls[callHash];
          }
      }

  - name: "Remove Public Delegatecall if Not Essential"
    description: |
      If delegatecall is not essential for the contract's core functionality, remove it.
      Consider alternatives like regular call() or direct function calls.
    example: |
      // If you don't need storage context preservation, use regular call
      function execute(address target, bytes memory data) external onlyOwner {
          (bool success,) = target.call(data);  // NOT delegatecall
          require(success, "Call failed");
      }

  - name: "Implement Proper UUPS Pattern with Authorization"
    description: |
      If building an upgradeable contract, use established patterns like OpenZeppelin's
      UUPSUpgradeable which includes proper access control by design.
    example: |
      import "@openzeppelin/contracts-upgradeable/proxy/utils/UUPSUpgradeable.sol";
      import "@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol";

      contract MyContract is UUPSUpgradeable, OwnableUpgradeable {
          function _authorizeUpgrade(address newImplementation)
              internal
              override
              onlyOwner
          {}
      }

