# =============================================================================
# PATTERN: external-002-unprotected-delegatecall
# =============================================================================

id: external-002
vulndoc: access-control/external-call
name: "Unprotected Public Delegatecall"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  This pattern detects public/external functions that use `delegatecall` **WITHOUT access control**,
  allowing any caller to execute arbitrary code in the contract's storage context. This focuses on
  the **MISSING ACCESS CONTROL** aspect of delegatecall vulnerabilities.

  **Key Distinction from upgrade-008**:
  - **upgrade-008**: Focuses on **USER-CONTROLLED TARGET** in delegatecall (who controls the address)
  - **external-002** (this pattern): Focuses on **MISSING ACCESS CONTROL** (who can call the function)
  - Both patterns are complementary and may flag the same function (intentional overlap)

  **Semantic Detection**: Uses BEHAVIORAL detection to identify delegatecall functions without
  access control regardless of:
  - Function names: `execute()`, `proxy()`, `delegateCall()`, `invoke()`, custom names
  - Parameter names: `target`, `impl`, `to`, `destination`, custom names
  - Implementation patterns: direct delegatecall, assembly delegatecall, wrapper functions

  ## Why It's Critical

  Unprotected delegatecall is **CRITICAL** severity because:

  1. **Universal Attack Surface**: ANY caller (including attackers) can trigger delegatecall,
     even if the target address is validated or hardcoded

  2. **Complete Storage Access**: Delegatecall executes external code with FULL access to
     the caller's storage, enabling arbitrary state modifications

  3. **Storage Collision Risk**: Even with a trusted target, malicious calldata can trigger
     unintended storage overwrites through storage slot collisions

  4. **Context Preservation**: Code executes with original `msg.sender` and `msg.value`,
     enabling privilege escalation and authentication bypass

  5. **No Sandboxing**: Unlike regular `call`, there are NO security boundaries between
     the calling contract and delegated code

  ## Real-World Exploits

  ### Parity Multisig Wallet Hack ($30M - July 2017)

  **Vulnerability**: Public delegatecall function without access control

  **Attack**: The Parity wallet had a public function allowing anyone to delegatecall to
  a library address. Attackers called this function with a malicious library that changed
  the wallet's owner to themselves when executed via delegatecall.

  **Impact**: $30 million stolen from multiple wallets.

  **Root Cause**: Missing access control on delegatecall function (this pattern would detect it)

  **Reference**: [Parity Wallet Hack Analysis](https://blog.openzeppelin.com/on-the-parity-wallet-multisig-hack-405a8c12e8f7)

  ### Multiple DeFi Protocols (2017-2024)

  **Pattern**: Public "execute" or "delegateCall" functions intended for admin use but
  lacking access control modifiers.

  **Impact**: Critical severity findings in Trail of Bits, OpenZeppelin, and Consensys audits.

  **Common Mistake**: Developers implement delegatecall for flexibility (multi-sig, governance)
  but forget to add `onlyOwner` or equivalent modifier.

  ## Attack Scenario

  **ATTACK: Public Delegatecall to Malicious Contract**

  ```solidity
  // VULNERABLE: Public delegatecall without access control
  contract VulnerableVault {
      address public owner;
      mapping(address => uint256) public balances;

      // ❌ CRITICAL: Anyone can call this!
      function execute(address target, bytes memory data) external {
          (bool success,) = target.delegatecall(data);
          require(success, "Delegatecall failed");
      }

      function deposit() external payable {
          balances[msg.sender] += msg.value;
      }
  }

  // Attacker's exploit contract
  contract Exploit {
      address public owner;  // Storage slot 0 - matches VulnerableVault

      function pwn() external {
          owner = msg.sender;  // Overwrites victim's owner in their storage!
      }
  }

  // Attack execution:
  // 1. Deploy Exploit contract
  // 2. Call VulnerableVault.execute(exploitAddress, abi.encodeCall(Exploit.pwn, ()))
  // 3. Delegatecall executes Exploit.pwn() in VulnerableVault's storage context
  // 4. VulnerableVault's owner is now the attacker
  // 5. Attacker drains all funds
  ```

  **ATTACK: Selfdestruct via Public Delegatecall**

  ```solidity
  // Even with VALIDATED target, missing access control is dangerous
  contract SemiSafeVault {
      address public trustedLibrary;

      // ❌ STILL VULNERABLE: Target is trusted, but anyone can call!
      function executeOnLibrary(bytes memory data) external {
          (bool success,) = trustedLibrary.delegatecall(data);
          require(success);
      }
  }

  // If trustedLibrary has a selfdestruct function (even if benign):
  // 1. Attacker calls executeOnLibrary(abi.encodeCall(Library.destroy, ()))
  // 2. Selfdestruct executes in SemiSafeVault's context
  // 3. Contract is destroyed, funds lost
  ```

  ## Detection Logic

  This pattern triggers when ALL conditions are met:

  1. **Delegatecall Usage**: Function uses delegatecall operation
     - Detected via `uses_delegatecall: true`
     - Includes low-level assembly delegatecall

  2. **Externally Callable**: Function is public/external
     - `visibility` in [public, external]
     - Internal/private functions are not directly exploitable

  3. **NO Access Control**: Function lacks access control checks
     - Both `has_access_gate: false` AND `has_access_control: false`
     - No modifiers like onlyOwner, no require(msg.sender == owner) checks

  This pattern is SAFE (does NOT trigger) when ANY of these protections exist:

  1. **Access Control Gate**: Function has access control logic
     - `has_access_gate: true` OR `has_access_control: true`
     - Includes: onlyOwner, onlyRole, require checks, custom modifiers

  2. **Proper Proxy Pattern**: Function is part of authorized proxy upgrade
     - `delegatecall_in_proxy_upgrade_context: true`
     - UUPS/Transparent proxy with proper authorization

scope: Function

lens:
  - ExternalInfluence
  - Authority

severity: critical

status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    - property: visibility
      op: in
      value: [public, external]
    - property: uses_delegatecall
      op: eq
      value: true

  # At least ONE must match (OR logic) - use for alternatives
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Safe if function has access control gate
    - property: has_access_gate
      op: eq
      value: true
    # Safe if function has access control
    - property: has_access_control
      op: eq
      value: true
    # Safe if this is a proper UUPS/Transparent proxy upgrade function with authorization
    - property: delegatecall_in_proxy_upgrade_context
      op: eq
      value: true

