id: ext-046
vulndoc: access-control/external-call
name: Flash Loan Governance Without Snapshot
description: Governance voting without snapshots or flash loan protection.
scope: Function
lens:
- ExternalInfluence
severity: critical
match:
  all:
  - property: governance_vote_without_snapshot
    op: eq
    value: true
  none:
  - property: flash_loan_guard
    op: eq
    value: true
  - property: uses_historical_snapshot
    op: eq
    value: true
