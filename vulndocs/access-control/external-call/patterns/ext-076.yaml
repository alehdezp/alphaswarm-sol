id: ext-076
vulndoc: access-control/external-call
name: Deadline Min Buffer Missing
description: Deadlines without minimum buffer from current time.
scope: Function
lens:
- ExternalInfluence
severity: low
match:
  all:
  - property: has_deadline_parameter
    op: eq
    value: true
  - property: has_deadline_min_buffer
    op: eq
    value: false
