id: ext-004
vulndoc: access-control/external-call
name: Flash Loan Price Attack
description: Balance or reserve based pricing without flash loan or snapshot protection.
scope: Function
lens:
- ExternalInfluence
severity: critical
match:
  all:
  - property: reads_pool_reserves
    op: eq
    value: true
  - property: balance_used_for_pricing_or_voting
    op: eq
    value: true
  none:
  - property: flash_loan_guard
    op: eq
    value: true
  - property: uses_historical_snapshot
    op: eq
    value: true
