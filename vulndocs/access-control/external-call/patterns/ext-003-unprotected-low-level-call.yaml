# =============================================================================
# PATTERN: ext-003
# Unprotected Low-Level Call
# =============================================================================

id: ext-003
vulndoc: access-control/external-call
name: "Unprotected Low-Level Call"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Public/external functions that use low-level `call()` without proper access control,
  enabling multiple attack vectors including arbitrary external interaction, value transfer
  to attacker addresses, reentrancy via callbacks, and gas griefing.

  **Key Distinction from Related Patterns**:
  - **ext-001 (Unprotected External Call)**: General external calls including high-level calls
  - **ext-002 (Unprotected Delegatecall)**: Delegatecall specifically (critical - storage context)
  - **ext-003 (this pattern)**: Low-level call() specifically (high - no storage context but still dangerous)

  While less critical than delegatecall (doesn't share storage context), unprotected `call()`
  is still **HIGH** severity because:

  1. **Arbitrary External Interaction**: Attacker causes contract to interact with unexpected addresses
  2. **Value Transfer to Arbitrary Address**: If call includes value, attacker can drain contract funds
  3. **Reentrancy via Callback**: External contract receives control and can callback before state finalized
  4. **Gas Griefing**: Expensive calls make function economically unusable
  5. **DoS via Revert**: Always-reverting external call bricks the function

  **Semantic Detection**: Uses BEHAVIORAL detection to identify low-level call usage without
  access control regardless of:
  - Function names: `execute()`, `forwardCall()`, `proxy()`, `relay()`, custom names
  - Parameter names: `target`, `to`, `destination`, `recipient`, custom names
  - Implementation patterns: direct call, assembly call, wrapper functions

  ## Why It's Dangerous

  Low-level `call()` bypasses Solidity's type safety and requires manual handling:

  - **Manual Return Value Checking**: Developer must check success manually
  - **No Function Signature Validation**: Can call any function with any data
  - **Arbitrary Calldata**: Attacker controls what function is called on target
  - **Value Transfer**: Can send ETH if payable, enabling fund drainage
  - **Callback Risk**: External contract receives control, can reenter

  When combined with missing access control, ANY attacker can trigger these operations.

  ## Real-World Examples

  - **Multiple DeFi Protocols**: Unprotected call with value enabling fund drainage
  - **Proxy Patterns Gone Wrong**: Public call functions intended for admin use
  - **Audit Findings**: Common high/medium severity in Trail of Bits, OpenZeppelin reports
  - **SWC-105**: Unprotected Ether Withdrawal (often via unprotected call with value)

scope: Function

lens:
  - ExternalInfluence
  - ValueMovement

severity: high

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Core vulnerability signal: Uses low-level call
    - property: uses_call
      op: eq
      value: true

  # At least ONE must match (OR logic) - increased severity signals
  any:
    # Higher risk: Call transfers value (fund drainage possible)
    - property: has_call_with_value
      op: eq
      value: true

    # Higher risk: Call target is user-controlled
    - property: call_target_user_controlled
      op: eq
      value: true

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Safe pattern: Has access control gate (require checks)
    - property: has_access_gate
      op: eq
      value: true

    # Safe pattern: Has access control modifier (onlyOwner, onlyRole)
    - property: has_access_control
      op: eq
      value: true

    # Safe pattern: Call target is validated/whitelisted
    - property: call_target_validated
      op: eq
      value: true

    # Constructors are initialization-only
    - property: is_constructor
      op: eq
      value: true

    # Initializers are one-time setup
    - property: is_initializer_function
      op: eq
      value: true

