id: ext-013
vulndoc: access-control/external-call
name: TWAP Window Missing
description: TWAP usage without a defined window or interval parameter.
scope: Function
lens:
- ExternalInfluence
severity: medium
match:
  all:
  - property: reads_twap
    op: eq
    value: true
  - property: has_twap_window_parameter
    op: eq
    value: false
