# =============================================================================
# PATTERN: ext-001
# Unprotected Public Function with External Call
# =============================================================================

id: ext-001
vulndoc: access-control/external-call
name: "Unprotected External Call"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Public/external functions that make external calls without proper access control
  or reentrancy protection, creating multiple attack vectors including reentrancy,
  DoS via revert, gas griefing, and arbitrary state manipulation via callbacks.

  ## Why It's Dangerous

  Unprotected external calls enable several attack classes:

  1. **Reentrancy Setup**: External call to attacker-controlled contract can
     callback into the same or different functions, potentially exploiting
     inconsistent state.

  2. **DoS via Revert**: Attacker provides external call target that always
     reverts, permanently bricking the function.

  3. **Gas Griefing**: Attacker supplies expensive external call target,
     causing excessive gas consumption and making function unusable.

  4. **Arbitrary Callback**: Attacker-controlled contract receives callback,
     can manipulate protocol state before original function completes.

  This is particularly dangerous when:
  - External call occurs before critical state updates (reentrancy)
  - External call target is user-controlled
  - Function has privileged effects (token transfers, state changes)
  - Multiple functions share state that can be manipulated via reentrancy

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function makes external calls (CALLS_EXTERNAL operation)
  3. Function modifies state (writes_state = true)
  4. NO reentrancy guard protection
  5. NO access control restricting who can trigger external calls
  6. NOT a view/pure function (state changes possible)

  **Implementation-Agnostic**: Detects vulnerable external calls regardless of
  function names, variable names, or coding style. Uses semantic operations and
  boolean properties.

  ## Real-World Examples

  - **The DAO (2016)**: $60M - Unprotected external call enabled reentrancy
  - **Lendf.Me (2020)**: $25M - ERC777 callback via unprotected external call
  - **Cream Finance (2021)**: $18M - AMP token callback reentrancy
  - Common high/medium finding in audits by Trail of Bits, OpenZeppelin, Consensys

scope: Function

lens:
  - ExternalInfluence
  - ValueMovement

severity: high

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Core vulnerability signal: Makes external calls
      - has_operation: CALLS_EXTERNAL

      # Has state-changing effects (makes it exploitable)
      - property: writes_state
        op: eq
        value: true

    # At least ONE must match (OR logic) - not used
    any: []

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Safe pattern: Has reentrancy guard (nonReentrant modifier)
      - property: has_reentrancy_guard
        op: eq
        value: true

      # Safe pattern: Has access control restricting calls
      - property: has_access_control
        op: eq
        value: true

      # Not applicable to view/pure functions (no state changes)
      - property: state_mutability
        op: in
        value: [view, pure]

      # Constructors are initialization-only
      - property: is_constructor
        op: eq
        value: true

      # Initializers are one-time setup
      - property: is_initializer_function
        op: eq
        value: true

# =============================================================================
# ADVANCED MATCHING (Optional)
# =============================================================================

