# =============================================================================
# ROADMAP FIELDS (Future Capabilities)
# =============================================================================

# Semantic Operations (Phase 1-3)
semantic_ops:
  has_operation: CALLS_EXTERNAL

# Behavioral Signature (Phase 2)
# Multiple vulnerable signatures possible:
# - X:call→W:* (external call before state write - reentrancy)
# - R:*→X:call→W:* (read, call, write - classic reentrancy pattern)
behavioral_signature:
  pattern: "X:call.*W:.*"
  description: "External call before or with state writes"

# Multi-Agent Verification Hints (Phase 9)
verification_agents:
  # Explorer agent: Trace from entry point to external call
  explorer:
    entry_points: [EntryPoint]
    sinks: [CALLS_EXTERNAL]
    max_depth: 5

  # Pattern agent: Structural motif matching
  pattern:
    require_all_conditions: true

  # Risk agent: Exploitability assessment
  risk:
    assess_likelihood: true
    assess_impact: true
    min_exploitability_score: 6.0  # High severity

  # Consensus requirement
  consensus:
    min_agents_agree: 3
    mode: voting
