# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Reentrancy via External Call"
    description: |
      Attacker provides callback contract that re-enters the function or
      related functions before state is finalized
    preconditions:
      - "Function makes external call to user-controlled or user-influenced address"
      - "External call occurs before critical state updates"
      - "No reentrancy guard present"
    steps:
      - "Attacker calls vulnerable function with crafted callback address"
      - "Function executes logic and makes external call"
      - "Attacker's callback contract receives control"
      - "Callback re-enters same function or related functions"
      - "State is inconsistent, allowing unauthorized actions"
    impact: "Fund drainage, privilege escalation, state corruption"

  - name: "DoS via Reverting External Call"
    description: |
      Attacker provides external call target that always reverts, permanently
      bricking the function
    preconditions:
      - "Function makes external call to user-controlled address"
      - "Function does not catch/handle external call failures"
      - "Function has critical protocol effects"
    steps:
      - "Attacker calls function with address of always-reverting contract"
      - "Function executes and reaches external call"
      - "External call reverts unconditionally"
      - "Entire function transaction reverts"
      - "Function becomes permanently unusable"
    impact: "Protocol DoS, frozen funds, governance deadlock"

  - name: "Gas Griefing via Expensive Call"
    description: |
      Attacker provides external call target that consumes excessive gas,
      making function too expensive to use
    preconditions:
      - "Function makes external call to user-controlled address"
      - "No gas limits on external call"
      - "Caller pays for external call gas"
    steps:
      - "Attacker provides address of gas-expensive contract"
      - "Function executes external call"
      - "External call consumes large amount of gas (loops, storage writes)"
      - "Function becomes economically infeasible to call"
    impact: "Economic DoS, unusable protocol functions"

  - name: "State Manipulation via Callback"
    description: |
      Attacker's callback manipulates protocol state in unexpected ways
      before original function completes
    preconditions:
      - "Function makes external call before all state updates"
      - "Callback can call other protocol functions"
      - "No reentrancy guard on related functions"
    steps:
      - "Attacker calls function A with callback address"
      - "Function A makes external call before completing state updates"
      - "Attacker's callback calls function B"
      - "Function B operates on inconsistent state from function A"
      - "Attacker exploits state inconsistency"
    impact: "Cross-function reentrancy, accounting errors, fund theft"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function is externally callable (public/external, not internal/private)"
  - "Identify the external call target - is it user-controlled or user-influenced?"
  - "Check if external call occurs BEFORE critical state updates (reentrancy window)"
  - "Verify no reentrancy guard is present (nonReentrant modifier)"
  - "Verify no access control restricts who can trigger external calls"
  - "Check if function has privileged effects (token transfers, state changes)"
  - "Trace call graph: what other functions can be called during callback?"
  - "Consider DoS risk: what happens if external call always reverts?"
  - "Check for ERC777 (has hooks), ERC721 safeTransfer, or custom callbacks"
  - "Validate this is not intentional callback pattern (flash loans, oracles)"

# Recommended fixes
fix_recommendations:
  - name: "Add ReentrancyGuard"
    description: |
      Add OpenZeppelin's ReentrancyGuard with nonReentrant modifier to prevent
      reentrancy attacks via external calls.
    example: |
      import "@openzeppelin/contracts/security/ReentrancyGuard.sol";

      contract VulnerableVault is ReentrancyGuard {
          mapping(address => uint256) public balances;

          // FIXED: nonReentrant prevents callback reentrancy
          function withdraw(uint256 amount, address callback) external nonReentrant {
              require(balances[msg.sender] >= amount, "Insufficient balance");
              balances[msg.sender] -= amount;  // State update first

              payable(msg.sender).transfer(amount);
              ICallback(callback).onWithdraw(msg.sender, amount);  // Safe callback
          }
      }

  - name: "Apply Checks-Effects-Interactions (CEI) Pattern"
    description: |
      Update all state variables BEFORE making external calls. This is the
      most reliable defense against reentrancy.
    example: |
      // VULNERABLE CODE
      function withdraw(uint256 amount, address callback) external {
          require(balances[msg.sender] >= amount);
          ICallback(callback).onWithdraw(msg.sender, amount);  // EXTERNAL CALL FIRST (WRONG!)
          balances[msg.sender] -= amount;  // STATE UPDATE AFTER (WRONG!)
          payable(msg.sender).transfer(amount);
      }

      // FIXED CODE - CEI Pattern
      function withdraw(uint256 amount, address callback) external {
          require(balances[msg.sender] >= amount);
          balances[msg.sender] -= amount;  // STATE UPDATE FIRST
          payable(msg.sender).transfer(amount);
          ICallback(callback).onWithdraw(msg.sender, amount);  // EXTERNAL CALL AFTER
      }

  - name: "Add Access Control"
    description: |
      Restrict who can trigger external calls to trusted roles. If external
      calls should only be made by admin/owner, add access control.
    example: |
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract SafeVault is Ownable {
          // FIXED: Only owner can trigger external calls
          function adminCallback(address target, bytes memory data) external onlyOwner {
              (bool success,) = target.call(data);
              require(success, "External call failed");
          }
      }

  - name: "Validate/Whitelist External Call Targets"
    description: |
      If external calls are necessary, validate targets against a whitelist
      of known safe contracts.
    example: |
      contract SafeVault {
          mapping(address => bool) public trustedCallbacks;

          function addTrustedCallback(address callback) external onlyOwner {
              trustedCallbacks[callback] = true;
          }

          function withdraw(uint256 amount, address callback) external {
              require(trustedCallbacks[callback], "Untrusted callback");
              balances[msg.sender] -= amount;
              payable(msg.sender).transfer(amount);
              ICallback(callback).onWithdraw(msg.sender, amount);
          }
      }

  - name: "Use Pull-Over-Push Pattern"
    description: |
      Instead of making external calls during critical operations, let users
      withdraw/pull their own funds. Eliminates callback risk.
    example: |
      contract PullPayment {
          mapping(address => uint256) public withdrawable;

          function recordPayment(address user, uint256 amount) internal {
              withdrawable[user] += amount;  // No external call
          }

          function withdraw() external nonReentrant {
              uint256 amount = withdrawable[msg.sender];
              require(amount > 0, "Nothing to withdraw");
              withdrawable[msg.sender] = 0;  // State first
              payable(msg.sender).transfer(amount);  // No callback
          }
      }

  - name: "Handle External Call Failures Gracefully"
    description: |
      Use try/catch or low-level call with return value checking to handle
      external call failures without reverting entire transaction.
    example: |
      function withdraw(uint256 amount, address callback) external nonReentrant {
          require(balances[msg.sender] >= amount);
          balances[msg.sender] -= amount;
          payable(msg.sender).transfer(amount);

          // FIXED: Don't revert if callback fails
          try ICallback(callback).onWithdraw(msg.sender, amount) {
              // Callback succeeded
          } catch {
              // Callback failed, but withdrawal still succeeds
              emit CallbackFailed(callback);
          }
      }

