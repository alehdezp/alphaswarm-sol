id: ext-054
vulndoc: access-control/external-call
name: TWAP Price Bounds Missing
description: TWAP usage without price bounds checks.
scope: Function
lens:
- ExternalInfluence
severity: medium
match:
  all:
  - property: reads_twap
    op: eq
    value: true
  - property: has_twap_price_bounds
    op: eq
    value: false
