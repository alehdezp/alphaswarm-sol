id: ext-047
vulndoc: access-control/external-call
name: Balance-Based Rewards Without Snapshot
description: Rewards based on current balances without snapshots or flash loan guards.
scope: Function
lens:
- ExternalInfluence
severity: high
match:
  all:
  - property: balance_used_for_rewards
    op: eq
    value: true
  none:
  - property: uses_historical_snapshot
    op: eq
    value: true
  - property: flash_loan_guard
    op: eq
    value: true
