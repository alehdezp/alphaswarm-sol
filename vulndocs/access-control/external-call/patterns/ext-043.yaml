id: ext-043
vulndoc: access-control/external-call
name: Chainlink Round Completeness Missing
description: latestRoundData used without answeredInRound == roundId validation.
scope: Function
lens:
- ExternalInfluence
severity: high
match:
  all:
  - property: calls_chainlink_latest_round_data
    op: eq
    value: true
  - property: validates_answered_in_round_matches_round_id
    op: eq
    value: false
