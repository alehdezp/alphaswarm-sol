id: ext-032
vulndoc: access-control/external-call
name: Chainlink StartedAt Not Validated
description: Chainlink latestRoundData used without startedAt validation.
scope: Function
lens:
- ExternalInfluence
severity: medium
match:
  all:
  - property: calls_chainlink_latest_round_data
    op: eq
    value: true
  - property: validates_started_at_recent
    op: eq
    value: false
