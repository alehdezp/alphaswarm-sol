# Remediation recommendations
fixes:
  recommended:
    - id: "validate-router-address"
      priority: critical
      description: |
        Whitelist allowed swap routers/target contracts. Never allow arbitrary
        router addresses to be passed via parameters.
      implementation: |
        Store a whitelist of approved routers/targets and validate the router
        address from decoded swapData against this whitelist before calling.

        ```solidity
        mapping(address => bool) public approvedRouters;

        function rebalance(bytes calldata swapData) external {
            require(msg.sender == assetManager, "Only asset manager");

            // Decode swapData
            (address router, bytes memory data) = abi.decode(swapData, (address, bytes));

            // CRITICAL: Validate router before using
            require(approvedRouters[router], "Router not approved");

            // Safe to call router now
            (bool success,) = router.call(data);
            require(success, "Router call failed");
        }
        ```

    - id: "restrict-operation-scope"
      priority: critical
      description: |
        Define an enum of allowed operations and validate the operation type
        before execution. Do not allow arbitrary external calls within flashAction.
      implementation: |
        Create an enum for allowed operations and enforce strict operation types
        to prevent the asset manager from executing arbitrary code.

        ```solidity
        enum Operation {
            SWAP,
            DEPOSIT,
            WITHDRAW,
            REPAY
        }

        function flashAction(
            Operation op,
            bytes calldata params
        ) external {
            require(msg.sender == assetManager, "Only asset manager");

            if (op == Operation.SWAP) {
                // Execute only swap-specific logic
            } else if (op == Operation.DEPOSIT) {
                // Execute only deposit-specific logic
            }
            // No catch-all for arbitrary operations
        }
        ```

    - id: "validate-parameter-structure"
      priority: high
      description: |
        Before decoding and using parameters, validate the structure and bounds.
        Check array lengths, parameter types, and value ranges.
      implementation: |
        Implement strict parameter validation with explicit checks before usage.

        ```solidity
        function rebalance(bytes calldata swapData) external {
            require(swapData.length > 0, "Empty swapData");
            require(swapData.length <= MAX_SWAP_DATA_SIZE, "SwapData too large");

            // Decode with safety checks
            (address router, uint256 amount, bytes memory data) =
                abi.decode(swapData, (address, uint256, bytes));

            require(router != address(0), "Invalid router");
            require(amount <= balanceOf(msg.sender), "Insufficient balance");
            require(data.length > 0 && data.length <= MAX_DATA_SIZE, "Invalid data");
        }
        ```

    - id: "implement-health-check-correctly"
      priority: critical
      description: |
        Ensure health checks cannot be bypassed by third-party payments or debt
        repayment. State modifications (debt repayment) should not occur before
        the operation that requires solvency verification.
      implementation: |
        Execute health check AFTER all state modifications and before allowing
        external assets to be withdrawn. Prevent third parties from modifying
        account state.

        ```solidity
        function flashAction(Operation[] calldata operations) external {
            require(msg.sender == assetManager, "Only asset manager");

            // Execute operations in controlled sequence
            uint256 initialDebt = userDebt[account];

            for (Operation op : operations) {
                // Only allow THIS account's operations, not third-party modifications
                require(op.targetAccount == msg.sender, "Cannot modify other accounts");
                executeOperation(op);
            }

            // Health check AFTER all modifications
            require(getHealth(account) >= MIN_HEALTH, "Account unhealthy");
        }
        ```

    - id: "separate-validation-from-execution"
      priority: high
      description: |
        Separate parameter validation from operation execution. Validate all
        inputs in a dedicated function before entering the execution phase.
      implementation: |
        Create a separate validation function that checks all parameters before
        they are used in privileged operations.

        ```solidity
        function _validateSwapData(
            bytes calldata swapData
        ) internal view returns (address router, bytes memory data) {
            require(swapData.length > 0, "Empty swap data");
            (router, data) = abi.decode(swapData, (address, bytes));

            require(router != address(0), "Invalid router");
            require(approvedRouters[router], "Router not approved");
            require(data.length > 0, "Empty router data");

            return (router, data);
        }

        function rebalance(bytes calldata swapData) external {
            (address router, bytes memory data) = _validateSwapData(swapData);
            // Now safely execute
            router.call(data);
        }
        ```

    - id: "audit-asset-manager-permissions"
      priority: high
      description: |
        Review all functions accessible to the asset manager role. Minimize
        implicit capabilities. Make permissions explicit and documented.
      implementation: |
        Create a clear permission matrix and enforce it in all functions.

        ```solidity
        /// @dev Asset managers can only call approved functions
        /// with validated parameters
        modifier onlyAssetManager(address account) {
            require(assetManager[account] == true, "Not asset manager");
            _;
        }

        /// @dev Asset managers CANNOT directly transfer user funds
        /// They can only execute pre-defined operations
        function withdraw(...) external onlyAssetManager(msg.sender) {
            // Must validate withdrawal parameters
            require(/* ... */);
        }
        ```

# Detection guidance for VKG
detection_notes:
  graph_signals: |
    This vulnerability manifests as: access gate exists (has_access_gate=true)
    but writes privileged state (writes_privileged_state=true) based on
    unvalidated parameters. Look for functions that have permission checks
    but then make external calls with parameter-derived data.

  semantic_operations: |
    Pattern: CHECKS_PERMISSION(asset_manager) -> READS_PARAMETER(encoded_data)
    -> NO_VALIDATION -> CALLS_EXTERNAL(decoded_router) -> MODIFIES_CRITICAL_STATE

    The critical gap is: CHECKS_PERMISSION and MODIFIES_CRITICAL_STATE are
    separated by unvalidated parameter usage in external calls.

  behavioral_signature: |
    Match pattern: "G:asset-manager->READS_PARAM->CALLS_EXTERNAL(unvalidated)->W:critical"
    This indicates permission on entry, but state modification through
    unvalidated external operations.

  key_properties: |
    - has_access_gate = true (asset manager check exists)
    - writes_privileged_state = true (modifies collateral, positions, or funds)
    - external_call_sites > 0 (makes external calls)
    - parameter_validation = false (does NOT validate critical parameters)
    - uses_delegatecall OR router_address_from_parameter = true (key signal)

