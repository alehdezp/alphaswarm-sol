# Arcadia Finance Trust Assumption Vulnerability
# Access Control: Weak Modifier - Trust Assumption Exploitation
#
# Real-world exploit: Arcadia Finance $3.5M loss (July 15, 2025)
# Root Cause: Insufficient validation of trusted asset manager capabilities
# Category: access-control/weak-modifier
# Date: 2025-07-15

id: arcadia-trust-assumption
name: Trust Assumption in Asset Manager Authority
parent_category: access-control
subcategory: weak-modifier

description: |
  Arcadia Finance was exploited through a trust assumption vulnerability where
  the asset manager role had excessive implicit permissions without proper input
  validation. The vulnerability lies in the implicit trust placed in the asset
  manager to execute arbitrary operations via flashAction() without validating
  the parameters passed to this operation. An attacker could become the asset
  manager (a normal user operation via setAssetManager) and then exploit the
  unchecked flashAction() to execute unauthorized fund transfers and collateral
  drains. The core issue is that privileged operations assume well-formed input
  from "trusted" addresses without validating the actual operations being
  performed.

severity: high

# Severity range
severity_range:
  - high
  - critical

# Associated VKG patterns
patterns:
  - auth-003  # Weak/Bypassable modifier
  - auth-004  # Insufficient access control validation

# VKG properties for detection
relevant_properties:
  - has_access_gate
  - writes_privileged_state
  - visibility
  - modifies_critical_state
  - external_call_sites
  - uses_delegatecall
  - parameter_validation

# Graph signals for this vulnerability
graph_signals:
  - property: has_access_gate
    expected: true
    critical: false
    confidence: 0.8
    description: |
      Asset manager check exists but doesn't validate operation parameters.
      Access gate controls WHO can call the function, not WHAT they can do.

  - property: writes_privileged_state
    expected: true
    critical: true
    confidence: 0.95
    description: |
      Function transfers collateral, modifies user positions, or drains funds.
      State modifications occur based on unvalidated encoded parameters.

  - property: visibility
    expected:
      - public
      - external
    critical: true
    confidence: 0.95
    description: Asset manager functions must be externally callable.

  - property: external_call_sites
    expected: true
    critical: true
    confidence: 0.9
    description: |
      Function makes external calls to swap routers or other contracts
      with decoded/unparsed data from parameters.

  - property: parameter_validation
    expected: false
    critical: true
    confidence: 0.95
    description: |
      Function accepts encoded operation data (swapData, params) without
      validating structure, router address, or operation type before execution.

  - property: uses_delegatecall
    expected: false
    critical: false
    confidence: 0.7
    description: |
      If present, indicates dynamic delegation of functionality based on
      untrusted parameter (e.g., router address from swapData).

# Behavioral signatures
behavioral_signatures:
  - "G:role-check->MODIFIES_CRITICAL_STATE->!VALIDATES_INPUT"
  - "CHECKS_PERMISSION->CALLS_EXTERNAL(unvalidated-data)->W:critical"
  - "R:encoded-param->X:external(data)[:W:funds]->no-validation"
  - "G:asset-manager->flashAction->arbitrary-operations"

# Operation sequences
operation_sequences:
  vulnerable:
    - "CHECKS_PERMISSION(asset_manager) -> READS_ENCODED_PARAMETER -> CALLS_EXTERNAL(decoded_data) -> MODIFIES_CRITICAL_STATE"
    - "CHECKS_PERMISSION(asset_manager) -> MODIFIES_USER_POSITION -> CALLS_EXTERNAL(unvalidated_router) -> TRANSFERS_VALUE"
    - "READS_PARAMETER(swapData) -> NO_VALIDATION -> DELEGATES_TO_ROUTER(from_param) -> DRAINS_COLLATERAL"
  safe:
    - "CHECKS_PERMISSION(asset_manager) -> VALIDATES_PARAMETER(router_whitelist) -> CALLS_EXTERNAL -> MODIFIES_STATE"
    - "CHECKS_PERMISSION(asset_manager) -> VALIDATES_PARAMETER_STRUCTURE -> VALIDATES_OPERATION_SCOPE -> EXECUTES"
    - "CHECKS_PERMISSION(asset_manager) -> VALIDATES_INPUT(operation_type, amount, recipient) -> EXECUTES"

# False positive indicators
false_positive_indicators:
  - "Parameter validation happens before external call (inline checks)"
  - "Router/target address is hardcoded or from whitelisted mapping"
  - "Operation scope is restricted (e.g., only specific operations allowed)"
  - "Amount/recipient validation occurs before state modification"
  - "External call uses safe wrapper with bounds checking"
  - "Asset manager role requires multi-sig approval"
  - "Privileged operations are behind timelock"

# Real-world exploits
exploits:
  - id: arcadia-2025-07-15
    name: "Arcadia Finance Trust Assumption Exploit"
    date: "2025-07-15"
    loss_usd: "3500000"
    protocol: "Arcadia Finance"
    chain: "base"
    severity: critical
    description: |
      Arcadia Finance was exploited through insufficient input validation in
      the asset manager's flashAction capability. The attacker became the asset
      manager and called rebalance() with malicious swapData parameters. These
      parameters were not validated before being decoded and passed to external
      swap routers, allowing the attacker to redirect operations to drain
      collateral and steal NFT liquidity positions. The protocol had a health
      check mechanism, but the attacker repaid debt on behalf of the victim
      contract to bypass this check, enabling fund transfers.

    attack_steps:
      - "1. Flash loan 5623 WETH and 9968 cbBTC"
      - "2. Call setAssetManager() to designate attacker as asset manager"
      - "3. Mint LP NFT with 1773 USDC and 0.123 cbBTC"
      - "4. Repay 14.4 cbBTC debt on behalf of victim to bypass health check"
      - "5. Call rebalance() with malicious swapData parameter"
      - "6. flashAction() decodes swapData without validation"
      - "7. Swap router address from unvalidated parameter directs to victim contract"
      - "8. Unauthorized flashAction transfers NFT positions to attacker"
      - "9. Drain all collateral through unvalidated operation chain"

    vulnerable_functions:
      - "rebalance(swapData)"
      - "flashAction(operations)"
      - "setAssetManager()"

    postmortem_url: "https://www.quillaudits.com/blog/hack-analysis/arcadia-finance-hack-analysis"
    source: "Quill Audits, SolidityScan, Guardrail"
    tags:
      - "unvalidated-parameter"
      - "trust-assumption"
      - "asset-manager"
      - "flashloan"
      - "health-check-bypass"

