# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Denial of Service via Malicious Pause"
    description: "Attacker permanently pauses contract to prevent all operations"
    preconditions:
      - "Function is public/external without access control"
      - "Contract implements pausable pattern (OpenZeppelin Pausable, etc.)"
      - "Paused state blocks critical user operations"
    steps:
      - "Attacker identifies unprotected pause function"
      - "Attacker calls pause() to halt all contract operations"
      - "Users cannot withdraw funds, claim rewards, or execute trades"
      - "Attacker may demand ransom to unpause or maintain DoS indefinitely"
    impact: "Complete protocol shutdown, frozen user funds, reputational damage"

  - name: "Front-Running Profitable Operations"
    description: "Attacker pauses contract to prevent competitor transactions"
    preconditions:
      - "Unprotected pause AND unpause functions exist"
      - "Contract has time-sensitive profitable operations (liquidations, MEV)"
    steps:
      - "Attacker monitors mempool for profitable transactions"
      - "Attacker front-runs with pause() to block competitor"
      - "Attacker executes own profitable transaction"
      - "Attacker calls unpause() to restore normal operations"
    impact: "MEV extraction, unfair competition, value extraction from protocol"

  - name: "Premature Unpause During Security Incident"
    description: "Attacker unpauses during active exploit or investigation"
    preconditions:
      - "Protocol team has paused contract during security incident"
      - "Unpause function lacks access control"
    steps:
      - "Security team pauses contract after detecting exploit"
      - "Attacker calls unpause() before patch is deployed"
      - "Original exploit or new attack vectors remain exposed"
      - "Attacker drains vulnerable contract"
    impact: "Extended security breach, loss of funds, bypass of emergency measures"

  - name: "Governance Attack on Emergency Functions"
    description: "Manipulation of pause state during critical governance decisions"
    preconditions:
      - "Protocol uses pause state for governance processes"
      - "Circuit breaker affects quorum or voting calculations"
    steps:
      - "Attacker pauses contract during active governance vote"
      - "Paused state affects voter participation or quorum"
      - "Malicious proposal passes due to manipulated state"
    impact: "Governance takeover, unauthorized protocol changes"

# How to further verify this is not a false positive
verification_steps:
  - "Verify the function truly modifies pause/halt/emergency state variables"
  - "Check if pause state affects critical protocol operations (transfers, withdrawals)"
  - "Confirm no internal access control logic in function body (require checks)"
  - "Determine if this is intentional public design (rare but possible)"
  - "Review if contract inherits from OpenZeppelin Pausable or similar standards"
  - "Assess blast radius: what operations are blocked when paused?"
  - "Check for circuit breaker documentation in NatSpec comments"

# Recommended fixes
fix_recommendations:
  - name: "Add onlyOwner Modifier (OpenZeppelin Ownable)"
    description: "Restrict pause/unpause to contract owner only"
    example: |
      import "@openzeppelin/contracts/access/Ownable.sol";
      import "@openzeppelin/contracts/security/Pausable.sol";

      contract SafeCircuitBreaker is Ownable, Pausable {
          // Only owner can pause
          function pause() external onlyOwner {
              _pause();
          }

          // Only owner can unpause
          function unpause() external onlyOwner {
              _unpause();
          }
      }

  - name: "Add Role-Based Access Control (OpenZeppelin AccessControl)"
    description: "Use role-based system for multi-admin circuit breaker management"
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";
      import "@openzeppelin/contracts/security/Pausable.sol";

      contract RoleBasedCircuitBreaker is AccessControl, Pausable {
          bytes32 public constant PAUSER_ROLE = keccak256("PAUSER_ROLE");
          bytes32 public constant UNPAUSER_ROLE = keccak256("UNPAUSER_ROLE");

          constructor() {
              _grantRole(DEFAULT_ADMIN_ROLE, msg.sender);
              _grantRole(PAUSER_ROLE, msg.sender);
              _grantRole(UNPAUSER_ROLE, msg.sender);
          }

          // Only pausers can pause
          function pause() external onlyRole(PAUSER_ROLE) {
              _pause();
          }

          // Only unpausers can unpause
          function unpause() external onlyRole(UNPAUSER_ROLE) {
              _unpause();
          }
      }

  - name: "Add Guardian System with Timelock"
    description: "Implement guardian-based emergency system with unpause delay"
    example: |
      import "@openzeppelin/contracts/access/Ownable.sol";
      import "@openzeppelin/contracts/security/Pausable.sol";

      contract GuardianCircuitBreaker is Ownable, Pausable {
          address public guardian;
          uint256 public unpauseETA;
          uint256 public constant UNPAUSE_DELAY = 2 days;

          modifier onlyGuardian() {
              require(msg.sender == guardian, "Not guardian");
              _;
          }

          // Guardian can immediately pause in emergency
          function pause() external onlyGuardian {
              _pause();
              unpauseETA = 0; // Reset unpause timer
          }

          // Owner schedules unpause with timelock
          function scheduleUnpause() external onlyOwner {
              require(paused(), "Not paused");
              unpauseETA = block.timestamp + UNPAUSE_DELAY;
          }

          // Anyone can execute unpause after timelock
          function executeUnpause() external {
              require(unpauseETA != 0, "Unpause not scheduled");
              require(block.timestamp >= unpauseETA, "Timelock not expired");
              _unpause();
              unpauseETA = 0;
          }

          // Owner can set guardian
          function setGuardian(address _guardian) external onlyOwner {
              require(_guardian != address(0), "Invalid guardian");
              guardian = _guardian;
          }
      }

  - name: "Add Multi-Signature Requirement"
    description: "Require multiple signatures for circuit breaker operations"
    example: |
      // Use Gnosis Safe or similar multisig as owner
      // Combined with OpenZeppelin Pausable

      contract MultisigCircuitBreaker is Pausable {
          address public multisig; // Gnosis Safe address

          modifier onlyMultisig() {
              require(msg.sender == multisig, "Only multisig");
              _;
          }

          function pause() external onlyMultisig {
              _pause();
          }

          function unpause() external onlyMultisig {
              _unpause();
          }
      }

