# =============================================================================
# PATTERN: circuit-001
# =============================================================================

id: circuit-001
vulndoc: dos/circuit-breaker
name: "Unprotected Circuit Breaker Function"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Public/external functions that modify circuit breaker state (pause/unpause/emergency
  stop mechanisms) without proper access control, allowing any caller to halt or
  resume contract operations.

  ## Why It's Dangerous
  Circuit breakers are emergency safety mechanisms that temporarily halt contract
  operations when suspicious activity is detected. Unprotected pause/unpause functions
  enable severe attacks:

  **Denial of Service (DoS)**: Attackers can pause the contract indefinitely, preventing
  legitimate users from withdrawing funds, executing trades, claiming rewards, or
  performing any contract operations.

  **Front-Running Attacks**: Malicious actors can monitor the mempool for profitable
  transactions (large swaps, liquidations, arbitrage), front-run them with a pause
  transaction, then unpause after extracting value.

  **Security Incident Exploitation**: During active exploits, attackers can prevent
  defenders from pausing the contract, or unpause prematurely before patches are deployed.

  **Governance Manipulation**: Unauthorized unpausing during security review periods
  can expose vulnerable code to exploitation before fixes are implemented.

  ## Detection Logic
  This pattern detects functions that:
  1. Are externally callable (public/external visibility)
  2. Write to sensitive configuration state tagged as "pause" (detected semantically)
  3. Modify contract state (writes_state = true)
  4. Lack any access control mechanism (has_access_gate = false)
  5. Are not constructors

  **Implementation Agnostic**: Detection does NOT rely on function names like "pause",
  "unpause", "halt", "freeze". Instead, it uses semantic state variable tagging where
  variables containing pause-related tokens ("pause", "paused", "pausable", "pauser")
  are automatically tagged with "pause" security tags (see heuristics.py line 68-69).

  ## Real-World Context
  - **Vaultwarden Emergency Access (CVE)**: Missing authentication allowed grantees
    to modify emergency access terms without authorization
  - **OWASP SC01:2025**: Improper Access Control is the #1 smart contract vulnerability
  - **Impact**: Q1 2024 saw $45M in losses across 16 access control incidents ($2.8M average)

scope: Function

lens:
  - Authority
  - Liveness  # Circuit breakers affect protocol liveness

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
# Updated 2026-01-02: Documented as EXCELLENT in mega-task (~100%/~100%/~100%)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable to be exploitable
    - property: visibility
      op: in
      value: [public, external]

    # Must write to sensitive config (includes "pause" tagged state vars)
    # See builder.py line 597-614 for full list of sensitive config tags
    - property: writes_sensitive_config
      op: eq
      value: true

    # Must modify state (circuit breakers change pause state)
    - property: writes_state
      op: eq
      value: true

  # At least ONE must match (OR logic) - none required
  any: []

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Exclude functions with access control
    - property: has_access_gate
      op: eq
      value: true

    # Exclude constructors (one-time setup is acceptable)
    - property: is_constructor
      op: eq
      value: true

    # Exclude if has access modifier (onlyOwner, onlyRole, etc.)
    - property: has_access_modifier
      op: eq
      value: true

