# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Array Growth DoS Attack"
    description: "Attacker grows an unbounded array until iteration exceeds block gas limit"
    preconditions:
      - "Function loops over dynamic array without pagination"
      - "Public function allows adding to the array"
      - "No maximum iteration limit enforced"
    steps:
      - "Attacker identifies function that loops over users[] array"
      - "Attacker calls addUser() 10,000+ times (or front-runs legitimate adds)"
      - "Target function (e.g., distributeRewards()) now exceeds block gas limit"
      - "Function permanently reverts - rewards/withdrawals/governance locked forever"
    impact: "Permanent loss of function - funds trapped, governance frozen, protocol bricked"

  - name: "Governance Vote DoS"
    description: "Attacker prevents governance decisions by making vote counting too expensive"
    preconditions:
      - "Governance function loops over all voters"
      - "No vote delegation or off-chain aggregation"
    steps:
      - "Attacker creates thousands of voter addresses"
      - "Each address casts a minimal vote"
      - "Vote counting function exceeds block gas limit"
      - "Governance decisions cannot be finalized"
    impact: "Protocol upgrades blocked, security fixes delayed, governance paralyzed"

  - name: "Withdrawal Queue DoS"
    description: "Attacker blocks all withdrawals by flooding withdrawal queue"
    preconditions:
      - "Withdrawal function processes entire queue in one transaction"
      - "Users can queue unlimited withdrawals"
    steps:
      - "Attacker queues 100,000 micro-withdrawals (1 wei each)"
      - "Legitimate processWithdrawals() function now exceeds gas limit"
      - "All user funds trapped indefinitely"
    impact: "Total protocol insolvency - all funds permanently locked"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm the loop bound depends on unbounded storage (array.length, user count, etc.)"
  - "Verify there is NO explicit max iteration check (e.g., require(end - start <= 100))"
  - "Check if the loop can exit early with 'break' statement based on iteration count"
  - "Assess the criticality: Does this function affect withdrawals, governance, or core protocol logic?"
  - "Calculate worst-case gas cost: What happens if array has 10,000 elements?"
  - "Check if there's an off-chain mechanism to prevent array growth (admin controls, economic barriers)"

# Recommended fixes
fix_recommendations:
  - name: "Pull-Over-Push Pattern"
    description: "Replace push-based iteration with pull-based claims where users call the function themselves"
    example: |
      // VULNERABLE: Push pattern with unbounded loop
      function distributeRewards(uint256 amount) external {
          for (uint256 i = 0; i < users.length; i++) {
              balances[users[i]] += amount;
          }
      }

      // SAFE: Pull pattern - users claim their own rewards
      uint256 public rewardPerUser;
      mapping(address => uint256) public lastClaimedReward;

      function claimReward() external {
          uint256 pending = rewardPerUser - lastClaimedReward[msg.sender];
          lastClaimedReward[msg.sender] = rewardPerUser;
          payable(msg.sender).transfer(pending);
      }

  - name: "Pagination with Max Iteration Limit"
    description: "Add start/end parameters and enforce maximum batch size"
    example: |
      // VULNERABLE: Unbounded loop
      function distributeRewards(uint256 amount) external {
          for (uint256 i = 0; i < users.length; i++) {
              balances[users[i]] += amount;
          }
      }

      // SAFE: Pagination with max 100 iterations
      function distributeRewards(uint256 amount, uint256 start, uint256 end) external {
          require(end <= users.length, "Invalid range");
          require(end - start <= 100, "Batch too large"); // Max 100 iterations

          for (uint256 i = start; i < end; i++) {
              balances[users[i]] += amount;
          }
      }

  - name: "Mapping-Based Lookups"
    description: "Replace array iteration with direct mapping lookups"
    example: |
      // VULNERABLE: Iterate to find user
      function getUserIndex(address user) public view returns (uint256) {
          for (uint256 i = 0; i < users.length; i++) {
              if (users[i] == user) return i;
          }
          revert("User not found");
      }

      // SAFE: Direct mapping lookup
      mapping(address => uint256) public userIndex;

      function getUserIndex(address user) public view returns (uint256) {
          require(userIndex[user] != 0, "User not found");
          return userIndex[user];
      }

  - name: "Off-Chain Computation with Merkle Proofs"
    description: "Compute results off-chain, submit merkle root on-chain, users verify with proofs"
    example: |
      // VULNERABLE: On-chain iteration
      function distributeRewards(uint256 amount) external {
          for (uint256 i = 0; i < users.length; i++) {
              balances[users[i]] += amount;
          }
      }

      // SAFE: Off-chain computation, on-chain verification
      bytes32 public rewardMerkleRoot;

      function claimReward(uint256 amount, bytes32[] calldata proof) external {
          bytes32 leaf = keccak256(abi.encodePacked(msg.sender, amount));
          require(MerkleProof.verify(proof, rewardMerkleRoot, leaf), "Invalid proof");

          // Transfer reward
          payable(msg.sender).transfer(amount);
      }

  - name: "Circuit Breaker Pattern"
    description: "Add emergency stop for functions with unbounded operations"
    example: |
      // Add emergency pause capability
      bool public paused;

      function distributeRewards(uint256 amount, uint256 start, uint256 end) external {
          require(!paused, "Function paused");
          require(end - start <= 100, "Batch too large");

          for (uint256 i = start; i < end; i++) {
              balances[users[i]] += amount;
          }
      }

      function pause() external onlyOwner {
          paused = true;
      }

