# =============================================================================
# PATTERN: dos-001-unbounded-loop
# =============================================================================

id: dos-001
vulndoc: dos/general
name: "Unbounded Loop DoS"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Functions with loops whose iteration count depends on unbounded storage (dynamic arrays,
  mappings) or user input. As the collection grows, the function can become unexecutable due
  to exceeding the block gas limit, causing permanent denial of service.

  ## Why It's Dangerous
  Unbounded loops create three critical risks:

  1. **Gas Limit DoS**: Function exceeds block gas limit and always reverts
  2. **Permanent Function Locking**: Critical functions (withdrawals, governance votes, reward
     distribution) become permanently unusable
  3. **Protocol Bricking**: If the loop affects core functionality, the entire protocol can fail

  An attacker can deliberately grow the collection (by adding users, deposits, votes, etc.) until
  the gas cost exceeds the block limit, permanently disabling the function.

  ## Detection Logic
  This pattern triggers when ALL of the following are true:

  1. Function has an unbounded loop (loop bound depends on dynamic storage or user input)
  2. Function is callable (public, external, or internal)

  The pattern excludes safe patterns:

  1. View/pure functions (read-only, less critical but still can DoS off-chain queries)
  2. Functions with explicit max iteration checks
  3. Loops with early exit conditions (break statements)

  ## Real-World Examples
  - **GovernMental (2016)**: Unbounded loop bricked payout function, $1100+ trapped forever
  - Common **medium/high** finding in professional audits (Trail of Bits, OpenZeppelin, ConsenSys Diligence)
  - Multiple DeFi protocols with unbounded array iterations causing user fund lockup

scope: Function

lens:
  - Liveness

severity: medium

# Pattern quality status (set by vrs-test-conductor agent)
# FIXED: Builder bug at line 2650 resolved - storage_length now correctly unbounded
status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    - property: has_unbounded_loop
      op: eq
      value: true
    - property: visibility
      op: in
      value: [public, external, internal]

  # At least ONE must match (OR logic) - not used
  any: []

  # NONE can match (NOT logic) - excludes safe patterns
  # Note: has_require_bounds is already checked in builder.py to set has_unbounded_loop
  # So we don't need additional discriminators here - the semantic property handles it
  #
  # Optional: Uncomment to exclude view functions (less critical DoS):
  # none:
  #   - property: state_mutability
  #     op: in
  #     value: [view, pure]
  none: []

# =============================================================================
# ADVANCED MATCHING (Optional)
# =============================================================================

