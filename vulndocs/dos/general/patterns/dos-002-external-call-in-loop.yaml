# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Malicious Recipient Bricks Airdrop"
    description: "Attacker deploys contract that always reverts on token receive, permanently blocking airdrop"
    preconditions:
      - "Airdrop function loops over recipients with external token transfer calls"
      - "No try-catch or failure handling present"
      - "Recipients list includes user-controllable addresses"
    steps:
      - "Attacker identifies airdrop function: `for (i < recipients.length) { token.transfer(recipients[i], amount) }`"
      - "Attacker adds malicious contract to recipients list that reverts on `transfer()`"
      - "Protocol calls `airdrop()` - transaction reverts when reaching malicious recipient"
      - "Airdrop function permanently bricked - no tokens can be distributed to ANY user"
    impact: "Complete protocol paralysis - airdrop funds locked forever, legitimate users cannot receive tokens"

  - name: "Akutars Pattern - Refund Loop DoS"
    description: "Refund loop with ETH transfers bricked by contract rejecting receive() calls"
    preconditions:
      - "Refund function loops over contributors with ETH transfer() calls"
      - "Contributors include smart contracts (wallets, multisigs, etc.)"
      - "No fallback to pull-based claims"
    steps:
      - "Protocol raises funds from users including smart contract wallets"
      - "Protocol attempts refund: `for (i < contributors.length) { payable(contributors[i]).transfer(amount) }`"
      - "One contributor contract has no payable receive()/fallback or deliberately rejects"
      - "Refund transaction reverts on the rejecting contract"
      - "ALL funds permanently locked in contract - no refunds possible for ANY user"
    impact: "$34M+ locked permanently (Akutars incident) - total loss of user funds"

  - name: "Gas Griefing via Expensive External Calls"
    description: "Attacker makes external calls consume excessive gas, causing DoS via gas limit"
    preconditions:
      - "Function loops with external calls to user-controllable addresses"
      - "No gas limits on external calls"
      - "Array can grow or is user-influenced"
    steps:
      - "Attacker identifies function: `for (i < users.length) { IContract(users[i]).callback() }`"
      - "Attacker adds contracts to users[] that perform expensive operations in callback"
      - "Each external call consumes 1M+ gas (max allowed)"
      - "After ~30 users, function exceeds block gas limit and always reverts"
      - "Function permanently unusable - protocol bricked"
    impact: "Permanent DoS - critical functionality disabled, funds potentially trapped"

  - name: "Batch Transfer DoS"
    description: "Attacker ensures one transfer always fails, bricking batch transfer function"
    preconditions:
      - "Batch transfer function loops over recipients"
      - "Uses standard ERC20 transfer() that reverts on failure"
      - "No per-transfer failure handling"
    steps:
      - "Function: `for (i < recipients.length) { token.transfer(recipients[i], amounts[i]) }`"
      - "Attacker includes address where transfer will fail (e.g., token blacklist, paused contract)"
      - "Any call to batch transfer reverts when reaching failing address"
      - "Entire batch system unusable - must remove attacker from all batches"
    impact: "Griefing attack - protocol operational paralysis, manual intervention required"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm external calls are inside loop body (not after loop completion)"
  - "Verify no try-catch blocks wrap the external call to handle failures gracefully"
  - "Check if low-level calls (call/delegatecall) validate return values - if not, vulnerability confirmed"
  - "Assess criticality: Does this function handle refunds, withdrawals, airdrops, or governance?"
  - "Test: Can attacker add malicious address to iteration array? (recipients, users, voters, etc.)"
  - "Verify: Is there a pull-based alternative or can function be called with pagination?"
  - "Calculate worst-case: With N recipients and each call costing X gas, when does it exceed block limit?"

# Recommended fixes
fix_recommendations:
  - name: "Pull-Over-Push Pattern"
    description: "Replace push-based loop with pull-based claims where users withdraw individually"
    example: |
      // VULNERABLE: Push pattern with external calls in loop
      contract VulnerableAirdrop {
          address[] public recipients;

          function airdrop(uint256 amount) external {
              // ❌ One revert bricks entire function
              for (uint256 i = 0; i < recipients.length; i++) {
                  IERC20(token).transfer(recipients[i], amount);
              }
          }
      }

      // SAFE: Pull pattern - users claim their own tokens
      contract SafeAirdrop {
          mapping(address => uint256) public claimable;

          function setClaimable(address[] calldata users, uint256[] calldata amounts) external onlyOwner {
              for (uint256 i = 0; i < users.length; i++) {
                  claimable[users[i]] = amounts[i];
              }
          }

          function claim() external {
              // ✓ Each user pulls their own tokens - one failure doesn't affect others
              uint256 amount = claimable[msg.sender];
              require(amount > 0, "Nothing to claim");
              claimable[msg.sender] = 0;
              IERC20(token).transfer(msg.sender, amount);
          }
      }

  - name: "Try-Catch for Graceful Failure Handling"
    description: "Wrap external calls in try-catch to continue on individual failures"
    example: |
      // VULNERABLE: No failure handling
      function airdrop(uint256 amount) external {
          for (uint256 i = 0; i < recipients.length; i++) {
              IERC20(token).transfer(recipients[i], amount);  // ❌ Reverts entire tx
          }
      }

      // SAFE: Try-catch allows function to continue despite individual failures
      function airdrop(uint256 amount) external {
          for (uint256 i = 0; i < recipients.length; i++) {
              try IERC20(token).transfer(recipients[i], amount) {
                  emit TransferSuccess(recipients[i], amount);
              } catch {
                  // ✓ Log failure but continue processing others
                  emit TransferFailed(recipients[i], amount);
              }
          }
      }

  - name: "Low-Level Call with Return Check"
    description: "Use low-level call() and check success boolean instead of reverting"
    example: |
      // VULNERABLE: transfer() reverts entire loop
      function refundAll() external {
          for (uint256 i = 0; i < contributors.length; i++) {
              payable(contributors[i]).transfer(contributions[contributors[i]]);  // ❌
          }
      }

      // SAFE: Low-level call with success check
      function refundAll() external {
          for (uint256 i = 0; i < contributors.length; i++) {
              (bool success, ) = contributors[i].call{value: contributions[contributors[i]]}("");
              if (!success) {
                  // ✓ Store failed refund for later retry instead of reverting
                  failedRefunds[contributors[i]] = contributions[contributors[i]];
                  emit RefundFailed(contributors[i]);
              }
          }
      }

      // Users can manually claim failed refunds
      function claimFailedRefund() external {
          uint256 amount = failedRefunds[msg.sender];
          require(amount > 0, "No failed refund");
          failedRefunds[msg.sender] = 0;
          payable(msg.sender).transfer(amount);
      }

  - name: "Pagination with Maximum Batch Size"
    description: "Add start/end parameters and enforce max iterations to prevent gas DoS"
    example: |
      // VULNERABLE: Unbounded loop with external calls
      function distributeRewards(uint256 amount) external {
          for (uint256 i = 0; i < users.length; i++) {
              IRewardContract(users[i]).notifyReward(amount);
          }
      }

      // SAFE: Pagination with max 50 iterations
      function distributeRewards(uint256 amount, uint256 start, uint256 end) external {
          require(end <= users.length, "Invalid range");
          require(end - start <= 50, "Batch too large");  // ✓ Gas limit protection

          for (uint256 i = start; i < end; i++) {
              try IRewardContract(users[i]).notifyReward(amount) {
                  emit RewardDistributed(users[i], amount);
              } catch {
                  emit RewardFailed(users[i], amount);  // ✓ Continue on failure
              }
          }
      }

  - name: "Use SafeERC20 for Token Transfers"
    description: "SafeERC20 handles non-standard tokens and provides better error handling"
    example: |
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

      contract SafeAirdrop {
          using SafeERC20 for IERC20;

          function airdrop(uint256 amount, uint256 start, uint256 end) external {
              require(end - start <= 100, "Batch too large");

              for (uint256 i = start; i < end; i++) {
                  // ✓ SafeERC20 handles various token implementations
                  // Still should use try-catch or pull pattern for DoS protection
                  try IERC20(token).safeTransfer(recipients[i], amount) {
                      emit AirdropSuccess(recipients[i]);
                  } catch {
                      emit AirdropFailed(recipients[i]);
                  }
              }
          }
      }

  - name: "Circuit Breaker for Emergency Stop"
    description: "Add pause capability for functions with risky loop operations"
    example: |
      import "@openzeppelin/contracts/security/Pausable.sol";

      contract CircuitBreakerAirdrop is Pausable {
          function airdrop(uint256 amount, uint256 start, uint256 end) external whenNotPaused {
              require(end - start <= 100, "Batch too large");

              for (uint256 i = start; i < end; i++) {
                  try IERC20(token).transfer(recipients[i], amount) {
                      emit AirdropSuccess(recipients[i]);
                  } catch {
                      emit AirdropFailed(recipients[i]);
                  }
              }
          }

          // ✓ Can pause if DoS attack detected
          function emergencyPause() external onlyOwner {
              _pause();
          }
      }

