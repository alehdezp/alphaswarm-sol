# =============================================================================
# PATTERN: dos-002-external-call-in-loop
# =============================================================================

id: dos-002
vulndoc: dos/general
name: "External Call in Loop"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Functions that make external calls inside loops, creating Denial of Service (DoS) risks where
  a single failing call can brick the entire function permanently. This is more severe than
  unbounded loops alone because external calls add unpredictability - attackers can make calls
  fail, consume all gas, or revert to prevent function execution.

  ## Why It's Dangerous
  External calls in loops create four critical DoS vectors:

  1. **Single Revert Bricks Function**: One failing external call reverts entire transaction,
     making the function permanently unusable
  2. **Gas Limit DoS**: Multiple external calls can exceed block gas limit as array grows
  3. **Malicious Call Target**: Attacker-controlled contracts can consume all gas or always revert
  4. **Griefing Attack**: Attacker ensures one call always fails, permanently bricking function
     (common in refund loops, airdrops, batch transfers)

  This pattern was responsible for the **Akutars NFT incident ($34M locked, 2022)** where a
  refund loop with external ETH transfers became unbrickable when one recipient contract
  rejected transfers.

  ## Detection Logic
  This pattern triggers when ALL of the following are true:

  1. Function has external calls inside loops (`external_calls_in_loop: true`)
  2. Function is callable by users (`visibility: public` or `external`)

  Severity is increased when ANY of:
  3. Loop is unbounded (`has_unbounded_loop: true`)
  4. Loop has nested depth >= 2 (external calls in nested loops)

  The pattern excludes safe patterns where NONE of:
  1. Function is read-only (`state_mutability: view` or `pure`)
  2. Function has try-catch blocks to handle failures gracefully (`has_try_catch: true`)
  3. Low-level calls check return values (`checks_low_level_call_success: true`)

  ## Real-World Examples
  - **Akutars NFT ($34M locked, 2022)**: Refund loop with ETH transfers bricked by rejecting recipient
  - **Multiple DeFi Protocols**: Airdrop/reward distribution functions bricked by malicious recipients
  - **Common High Severity Finding**: Trail of Bits, OpenZeppelin, ConsenSys audits frequently flag this

scope: Function

lens:
  - Liveness
  - ExternalInfluence

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    - property: external_calls_in_loop
      op: eq
      value: true
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE must match (OR logic) - increased severity conditions
  any: []

  # NONE can match (NOT logic) - excludes safe patterns
  none:
    - property: state_mutability
      op: in
      value: [view, pure]
    - property: has_try_catch
      op: eq
      value: true
    - property: checks_low_level_call_success
      op: eq
      value: true

# =============================================================================
# ADVANCED MATCHING (Optional)
# =============================================================================

edges: []
paths: []

