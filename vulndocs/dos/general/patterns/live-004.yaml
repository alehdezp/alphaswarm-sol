id: live-004
vulndoc: dos/general
name: Auction Griefing
description: Auction bids that refund prior bidders via push payments.
scope: Function
lens:
- Liveness
severity: medium
match:
  all:
  - property: is_auction_like
    op: eq
    value: true
  - property: has_push_payment
    op: eq
    value: true
  any:
  - property: handles_transfer_failure
    op: eq
    value: false
  - property: contract_has_withdraw
    op: eq
    value: false
