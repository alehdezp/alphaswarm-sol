id: live-030
vulndoc: dos/general
name: State Transition Blocking
description: External calls can block state transitions.
scope: Function
lens:
- Liveness
severity: medium
match:
  all:
  - property: has_low_level_calls
    op: eq
    value: true
  - property: state_write_after_external_call
    op: eq
    value: true
  - property: checks_low_level_call_success
    op: eq
    value: false
  - property: has_try_catch
    op: eq
    value: false
