      expected: ">1"
      critical: false
      description: "Multiple oracle sources (median of 11)"
      confidence: 0.80

    - property: dex_price_dependency
      expected: true
      critical: true
      description: "Price derived from DEX pool state"
      confidence: 0.95

    - property: flash_loan_exposure
      expected: true
      critical: true
      description: "Price can be manipulated within single transaction"
      confidence: 0.90

  semantic_operations:
    - READS_ORACLE
    - READS_EXTERNAL_VALUE
    - MODIFIES_CRITICAL_STATE
    - PERFORMS_LIQUIDATION
    - CALLS_EXTERNAL

  behavioral_signatures:
    - vulnerable: "X:dex{get_p}->C:price->W:collateral"
      description: "Read DEX spot price, calculate, write collateral state"

    - vulnerable: "X:curve{spot}->C:median->W:borrow"
      description: "Curve spot price to median calculation to borrow operation"

  operation_sequences:
    vulnerable:
      - "X:curve.get_p() -> C:price{no_twap} -> W:liquidation_threshold"
      - "L:sources(5_manipulable) -> C:median -> W:state"

    safe:
      - "X:chainlink.latestRoundData() -> V:stale -> C:price -> W:state"
      - "X:curve.get_ema() -> V:manipulation_bounds -> C:price -> W:state"
      - "X:twap{30min} -> C:price -> W:state"

  false_positive_indicators:
    - "Uses Chainlink or equivalent tamper-resistant oracle"
    - "Implements TWAP with sufficient window (>= 30 minutes)"
    - "Has manipulation bounds checking (deviation limits)"
    - "Uses EMA price instead of instantaneous spot"
    - "Multiple independent oracle sources (not same DEX)"
    - "Circuit breaker on large price deviations"

# Attack Mechanism Details
attack_mechanism:
  preconditions:
    - "Access to large flash loans (~$4B available)"
    - "Target protocol uses DEX-based price oracle"
    - "Ability to manipulate 5+ of 11 median price sources"
    - "Knowledge of Curve pool mechanics and get_p() behavior"

  attack_steps:
    - step: 1
      phase: "Flash Loan Acquisition"
      description: |
        Obtain massive flash loans from multiple protocols.
        Total capital: approximately $3.8-4 billion in assets.
      operations:
        - "Flash loan from Aave, Compound, Balancer"
        - "Aggregate ETH, stablecoins, liquid staking tokens"
        - "Prepare for coordinated manipulation"

    - step: 2
      phase: "Price Suppression"
      description: |
        Execute large swaps in Curve pools to suppress sUSDe price.
        The get_p() function returns spot price based on pool ratios.
        Large sells decrease the price significantly.
      operations:
        - "Swap large amounts in FRAXUSDe pool"
        - "Swap large amounts in USDeUSDC pool"
        - "Swap large amounts in USDeDAI pool"
        - "Swap large amounts in USDecrvUSD pool"
        - "Swap large amounts in GHOUSDe pool"
        - "Result: 5/11 oracle sources now report suppressed price"
        - "Median price drops ~4% below true value"

    - step: 3
      phase: "Borrow at Suppressed Price"
      description: |
        With sUSDe price artificially low, borrow sUSDe at
        favorable rates. The protocol thinks collateral is worth
        less than it is, allowing over-borrowing.
      operations:
        - "Deposit collateral to UwU Lend"
        - "Borrow sUSDe at suppressed price (~$0.99)"
        - "Acquire more sUSDe than fair value allows"

    - step: 4
      phase: "Price Inflation and Liquidation"
      description: |
        Reverse the swap positions to restore sUSDe price.
        Now the borrowed sUSDe appears more valuable.
        Liquidate positions profitably.
      operations:
        - "Reverse swaps in all 5 Curve pools"
        - "sUSDe price returns to ~$1.03 (above starting)"
        - "Liquidate own positions at inflated prices"
        - "Extract profit from price differential"

    - step: 5
      phase: "Repay and Extract Profit"
      description: |
        Repay flash loans and keep extracted value.
      operations:
        - "Repay flash loan principal + fees"
        - "Net profit: ~$19-23M"

  exploitation_difficulty: "medium"
  exploitation_notes: |
    The attack was straightforward once the oracle weakness was identified:
    1. Curve's get_p() is NOT designed as a secure oracle
    2. UwU Lend used it anyway as a fallback price source
    3. 5 of 11 sources could be manipulated through same DEX
    4. Median calculation doesn't protect against coordinated manipulation

    Michael Egorov (Curve founder) explicitly warned against using get_p()
    as a price oracle. TWAP or EMA should be used instead.

