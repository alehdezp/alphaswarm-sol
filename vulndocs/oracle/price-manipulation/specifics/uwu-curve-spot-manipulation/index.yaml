# UwU Lend Curve Spot Price Manipulation - Specific Vulnerability
# Discovered via Task 17.3a: Solodit/Exploit DB Crawl (2024-2026)

id: uwu-curve-spot-manipulation
name: UwU Lend Oracle Manipulation via Curve get_p()
parent_category: oracle
parent_subcategory: price-manipulation

description: |
  Price oracle manipulation vulnerability where UwU Lend's sUSDe price oracle
  used Curve Finance pool's get_p() function as a price source. The get_p()
  function returns an instantaneous spot price that is easily manipulated
  through large flash loan trades. The attacker suppressed the sUSDe price,
  borrowed at artificially low rates, then reversed the manipulation to
  liquidate positions at inflated prices.

  Key insight: Median oracles with 11 sources are vulnerable when 5+ sources
  can be manipulated via the same DEX (Curve pools in this case).

severity: critical
exploit_severity: critical
confidence_score: 0.96

