# Remediation Guidance
fixes:
  root_cause:
    description: |
      UwU Lend used Curve's get_p() function as a price source in their
      fallback oracle. This function returns instantaneous spot price
      that can be manipulated within a single transaction via large swaps.

      The median oracle (11 sources) provided false confidence because
      5 sources (46%) could be manipulated through the same DEX.

  recommended:
    - fix_id: "use-twap-oracle"
      name: "Use Time-Weighted Average Price (TWAP)"
      priority: critical
      description: |
        Replace spot price oracles with TWAP oracles that average prices
        over a time window (30 minutes to 24 hours). Flash loan attacks
        cannot manipulate historical averages.
      code_pattern: |
        // VULNERABLE - Instantaneous spot price
        uint price = curvePool.get_p();

        // SAFE - TWAP with 30-minute window
        uint price = twapOracle.consult(token, 1800);  // 30 min window
      effectiveness: "Very High - Eliminates flash loan manipulation"

    - fix_id: "use-ema-price"
      name: "Use Exponential Moving Average (EMA)"
      priority: critical
      description: |
        Curve provides get_price_oracle() which returns EMA price.
        This is more manipulation-resistant than get_p().
      code_pattern: |
        // VULNERABLE - get_p() is spot price
        uint price = curvePool.get_p();

        // SAFE - get_price_oracle() is EMA
        uint price = curvePool.get_price_oracle();
      effectiveness: "High - EMA smooths manipulation spikes"

    - fix_id: "diversify-oracle-sources"
      name: "Use Independent Oracle Sources"
      priority: critical
      description: |
        Ensure median oracle sources are truly independent. Multiple
        Curve pools are NOT independent - they can all be manipulated
        via the same DEX mechanics.
      code_pattern: |
        // VULNERABLE - 5 Curve pools (same DEX = not independent)
        sources = [curveA.get_p(), curveB.get_p(), curveC.get_p(), curveD.get_p(), curveE.get_p(), ...]

        // SAFE - Independent sources
        sources = [chainlink.price(), uniswapTWAP.price(), curveEMA.price(), ...]
      effectiveness: "High - True diversity prevents coordinated manipulation"

    - fix_id: "manipulation-bounds"
      name: "Implement Price Deviation Bounds"
      priority: high
      description: |
        Reject prices that deviate significantly from a reference price
        (e.g., previous block, Chainlink). Large deviations indicate
        potential manipulation.
      code_pattern: |
        // SAFE - Reject large deviations
        uint refPrice = chainlink.latestAnswer();
        uint dexPrice = curvePool.get_p();

        require(
            dexPrice >= refPrice * 99 / 100 &&
            dexPrice <= refPrice * 101 / 100,
            "Price deviation too large"
        );
      effectiveness: "High - Detects manipulation in progress"

    - fix_id: "circuit-breaker"
      name: "Implement Circuit Breaker"
      priority: high
      description: |
        Pause lending/borrowing when price volatility exceeds thresholds.
        This prevents exploitation during manipulation windows.
      code_pattern: |
        // SAFE - Circuit breaker on volatility
        uint currentPrice = getPrice();
        uint lastPrice = lastRecordedPrice;

        if (volatility(currentPrice, lastPrice) > MAX_VOLATILITY) {
            _pause();
            emit CircuitBreakerTriggered(currentPrice, lastPrice);
        }
      effectiveness: "Medium - Limits damage during attacks"

