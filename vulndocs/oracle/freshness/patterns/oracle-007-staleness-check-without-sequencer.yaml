test_coverage:
  projects: [oracle-price]
  true_positives: 8
  true_negatives: 4
  edge_cases: 4
  precision: 0.89
  recall: 1.00
  variation_score: 1.00
  last_tested: "2025-12-31"
  notes: |
    Rating: READY (precision=0.89, recall=1.00, variation=1.00)

    This is a PARTIAL PROTECTION PATTERN (medium severity).
    True positives = functions WITH staleness check BUT WITHOUT sequencer uptime check on L2.
    True negatives = functions WITH both staleness AND sequencer checks (oracle-006) OR missing both checks (oracle-003).

    Known Limitations:
    1. Helper delegation: has_sequencer_uptime_check only detects INLINE checks, not checks
       delegated to internal helper functions. Functions calling _checkSequencerUptime() are
       flagged as vulnerable (false positives). This affects 1/9 findings (liquidateUserSafe).

    2. Age variable pattern: has_staleness_check doesn't detect intermediate age variables:
       uint256 age = block.timestamp - updatedAt; require(age <= threshold)
       Only direct comparisons are detected. Encourages standard patterns.

    3. Private functions: Excluded from pattern (visibility: [public, external, internal]).
       Private functions have reduced attack surface as they're only callable within the contract.

    4. View helpers: Internal/private view functions excluded (is_view condition).
       View functions don't execute exploitable state changes in transactions.

    Production Use:
    - Pattern is ready for production audits with manual review
    - Review flagged functions to identify helper delegation patterns
    - Confirm deployment target is L2 (Arbitrum, Optimism, Base, etc.)
    - L1 deployments don't need sequencer checks (expected false positives)

    Test Coverage:
    - 8 true positives: Various staleness check patterns without sequencer validation
    - 4 true negatives: Complete L2 checks, no checks, inline both checks
    - 1 false positive: liquidateUserSafe (helper delegation limitation)
    - 4 variations: Hardcoded thresholds, alternative operators, double checks, compact checks
    - 4 edge cases: View functions, pure functions, private functions, conditional checks

