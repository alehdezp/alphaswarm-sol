# =============================================================================
# PATTERN: oracle-007-staleness-check-without-sequencer
# =============================================================================
#
# PARTIAL PROTECTION PATTERN - L2 Oracle With Staleness But Missing Sequencer Check
#
# This pattern identifies L2 oracle reads that implement staleness checks (good!)
# but FAIL to validate sequencer uptime (bad on L2!), creating a vulnerability
# window during sequencer restart events.
#
# This is PARTIAL PROTECTION - better than oracle-003 (no checks), but incomplete
# for L2 deployment. Not as good as oracle-006 (complete L2 protection).
#
# =============================================================================

id: oracle-007
vulndoc: oracle/freshness
name: "L2 Oracle With Staleness Check But Missing Sequencer Validation"

description: |
  ## What This Detects
  Functions that read oracle prices AND implement staleness checks via `updatedAt`
  validation, BUT fail to validate L2 sequencer uptime status, creating a
  vulnerability window immediately after sequencer restart on Layer 2 networks.

  **This is a PARTIAL PROTECTION pattern - incomplete L2 oracle security.**

  ## Why Staleness Check Alone Is NOT Enough on L2

  On Layer 1 (Ethereum mainnet), staleness checks alone are sufficient because:
  - No single point of failure for chain liveness
  - Oracle updates continue even if individual nodes fail
  - Network congestion is the primary oracle delay risk

  On Layer 2 (Arbitrum, Optimism, Base, zkSync, etc.), staleness checks alone
  create a critical vulnerability window because:
  - **Centralized sequencers** can experience complete downtime
  - During sequencer downtime, ALL oracles **FREEZE** (not just stale, but frozen)
  - After sequencer restart, oracle takes time to catch up to real market prices
  - **ATTACK WINDOW**: Staleness check can PASS but price is STALE relative to market

  ## The L2 Sequencer Restart Vulnerability Window

  Consider this attack scenario on Arbitrum:

  ```
  T=0:   Sequencer is up, oracle shows ETH = $2000, last updated 10 minutes ago
  T=10m: Sequencer GOES DOWN (maintenance, outage, congestion)
  T=10m: Oracle FREEZES at $2000 (no new updates possible - sequencer is down)
  T=45m: Real market price crashes to $1500 during downtime
  T=45m: Sequencer RESTARTS (answer: 1 → 0, startedAt = now)
  T=46m: First blocks after restart begin processing
         ┌─────────────────────────────────────────────────────────┐
         │ VULNERABILITY WINDOW: Staleness check PASSES           │
         │                                                         │
         │ Oracle data:                                            │
         │   - price: $2000 (frozen at pre-downtime value)        │
         │   - updatedAt: 46 minutes ago                          │
         │   - Staleness threshold: 1 hour                        │
         │   - Check: 46 minutes < 1 hour → PASSES ✅             │
         │                                                         │
         │ Real market: $1500 (crashed during downtime)           │
         │                                                         │
         │ Attacker action:                                        │
         │   - Deposits collateral worth $1500                    │
         │   - Oracle values it at stale $2000 price              │
         │   - Borrows maximum against inflated valuation         │
         │   - Over-borrows by 33% ($500 per unit)                │
         │                                                         │
         │ WHY staleness check failed to protect:                 │
         │   - Sequencer downtime = oracle freeze                 │
         │   - updatedAt timestamp was WITHIN staleness threshold │
         │   - But price was STALE relative to REAL MARKET        │
         │   - Missing sequencer check = missing critical context │
         └─────────────────────────────────────────────────────────┘
  T=47m: Oracle FINALLY updates to real market price $1500
  T=47m: Protocol realizes positions are under-collateralized
  T=47m: Protocol has $500/unit bad debt; attacker keeps borrowed funds
  ```

  **The staleness check passed because `updatedAt` was within the 1-hour threshold,
  but the price was stale relative to the REAL MARKET due to sequencer downtime.**

  ## Why This Is a MEDIUM Severity (Not HIGH)

  This pattern is rated **MEDIUM** (not HIGH like oracle-003) because:

  **PROTECTION PROVIDED:**
  - ✅ Staleness check protects against network congestion delays
  - ✅ Staleness check protects against oracle node downtime
  - ✅ Staleness check catches most oracle lag scenarios
  - ✅ Better than NO checks at all (oracle-003 = HIGH severity)

  **MISSING PROTECTION:**
  - ❌ No sequencer uptime validation (sequencer could be down)
  - ❌ No grace period after sequencer restart (oracle stabilization window)
  - ❌ Vulnerable to post-restart stale price exploitation
  - ❌ L2-specific risk not addressed

  **ATTACK REQUIREMENTS:**
  - L2 sequencer must experience downtime (less frequent than network congestion)
  - Market price must move significantly during downtime
  - Attacker must execute transaction within oracle catch-up window (minutes)
  - Timing must be precise (first blocks after restart)

  **COMPARISON:**
  - **oracle-003** (missing staleness check): HIGH severity
    - Vulnerable to ALL oracle lag scenarios (network congestion, sequencer downtime, etc.)
    - No protection against stale prices
    - Easy to exploit (always vulnerable)

  - **oracle-007** (THIS PATTERN): MEDIUM severity
    - Vulnerable ONLY to L2 sequencer downtime scenarios
    - Partial protection from staleness check
    - Harder to exploit (requires sequencer downtime timing)

  - **oracle-006** (complete L2 protection): SAFE (info severity)
    - Both staleness AND sequencer checks
    - Full protection on L2 networks

  ## Real-World Sequencer Downtime Events

  ### Arbitrum Sequencer Downtime (December 2021): 45 Minutes
  - **Duration**: 45 minutes of complete chain halt
  - **Oracle Impact**: All Chainlink oracles frozen at pre-downtime prices
  - **Market Movement**: ETH moved $200 during downtime
  - **Exploitation Window**: ~10 blocks after restart before oracle caught up
  - **Protocols affected**: Those with staleness check but no sequencer validation
  - **Reference**: https://offchain.medium.com/arbitrum-sequencer-downtime

  ### Optimism Sequencer Downtime (February 2023): ~2 Hours
  - **Duration**: ~2 hours without new blocks
  - **Oracle Impact**: Complete oracle freeze for entire downtime
  - **Market Movement**: Significant volatility during 2-hour window
  - **Exploitation Window**: First 20-30 blocks post-restart had stale prices
  - **Attack Vector**: Protocols without sequencer checks vulnerable to stale arbitrage
  - **Reference**: https://status.optimism.io/

  ### Base Sequencer Issues (August 2023): Multiple Brief Outages
  - **Duration**: Several 5-15 minute outages
  - **Oracle Impact**: Frequent brief oracle freezes
  - **Attack Vector**: Automated monitoring of sequencer restart for exploitation
  - **Lesson**: Even brief outages create exploitation opportunities
  - **Reference**: https://status.base.org/

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function performs oracle read operation (`has_operation: READS_ORACLE`)
  2. Function implements staleness check (`has_staleness_check: true`)
  3. Function is externally callable or internal state-changing
  4. Function LACKS sequencer uptime check (`has_sequencer_uptime_check: false`)
  5. Function is NOT a view function (view functions don't execute critical transactions)

  **Rationale for detection:**
  - Identifies PARTIAL PROTECTION: staleness check present but sequencer check missing
  - Highlights incomplete L2 oracle integration
  - Guides upgrade path: add sequencer check to achieve oracle-006 (gold standard)
  - View functions excluded (informational queries, not exploitable)

  **Improvement Path:**
  ```
  oracle-003 (no checks)              → HIGH severity
        ↓ Add staleness check
  oracle-007 (staleness only)         → MEDIUM severity (this pattern)
        ↓ Add sequencer check + grace period
  oracle-006 (complete L2 protection) → SAFE (info severity)
  ```

scope: Function

lens:
  - Oracle
  - ExternalInfluence

severity: medium

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must read from oracle (semantic operation detection)
    - has_operation: READS_ORACLE

    # Must have staleness check (good - provides partial protection)
    - property: has_staleness_check
      op: eq
      value: true

    # Must be callable (public, external, or internal state-changing functions)
    - property: visibility
      op: in
      value: [public, external, internal]

  # NONE can match (NOT logic) - exclude complete/safe patterns
  none:
    # Must NOT have sequencer uptime check (this is the missing piece)
    - property: has_sequencer_uptime_check
      op: eq
      value: true

    # Exclude view functions (they don't execute exploitable transactions)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't read oracle anyway)
    - property: is_pure
      op: eq
      value: true

