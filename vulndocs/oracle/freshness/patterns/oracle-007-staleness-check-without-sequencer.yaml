attack_scenarios:
  - name: "Post-Sequencer-Restart Stale Price Exploitation"
    description: |
      Attacker monitors L2 sequencer uptime feed, waits for sequencer restart,
      and executes transactions in first blocks with stale oracle prices that
      pass staleness check but don't reflect real market prices.
    preconditions:
      - Protocol deployed on L2 (Arbitrum, Optimism, Base, zkSync, etc.)
      - Staleness check implemented (provides partial protection)
      - L2 sequencer experiences downtime event
      - No sequencer uptime check or grace period validation
      - Market price moves during sequencer downtime
    steps:
      - Monitor Chainlink L2 Sequencer Uptime Feed for downtime events
      - L2 sequencer goes down (answer = 1); oracle freezes at pre-downtime price
      - Real market price moves significantly during downtime (e.g., $2000 → $1500)
      - Oracle frozen at $2000; last updated before downtime started
      - Sequencer restarts (answer = 0); blocks resume processing
      - Attacker executes transaction in FIRST blocks after restart
      - Oracle data: price=$2000, updatedAt=46min ago, threshold=1h
      - Staleness check: 46min < 1h → PASSES ✅ (within threshold)
      - Real market price is $1500; oracle shows stale $2000
      - Attacker borrows max against inflated $2000 collateral valuation
      - Over-borrows by 33% ($500 per unit) relative to real $1500 value
      - Oracle updates to $1500 after several blocks; attacker keeps borrowed funds
      - Protocol has $500/unit bad debt
    impact: "Stale price exploitation during L2 sequencer restart window; protocol bad debt"
    cvss: 6.5
    l2_specific: true
    why_staleness_check_failed: "Sequencer downtime freezes oracle; updatedAt within threshold but price stale relative to market"

  - name: "Liquidation Avoidance During Sequencer Downtime"
    description: |
      User exploits sequencer downtime to avoid liquidation by depositing when
      oracle shows stale high prices that pass staleness check.
    preconditions:
      - User position is near liquidation threshold
      - L2 sequencer experiences downtime
      - Real market price drops during downtime
      - Oracle frozen at higher pre-downtime price
      - Staleness check present but no sequencer validation
    steps:
      - User position approaching liquidation at real market price
      - Sequencer goes down; oracle freezes at high pre-downtime price
      - Real market crashes during downtime; position should be liquidated
      - Sequencer restarts; user deposits additional collateral
      - Oracle shows stale high price (within staleness threshold)
      - Staleness check passes; position appears healthy at stale price
      - User avoids liquidation that should have occurred
      - Oracle updates to real low price; position already saved
      - Protocol loses liquidation penalty and faces bad debt risk
    impact: "Liquidation avoidance using stale prices during sequencer restart"
    cvss: 5.8
    l2_specific: true

  - name: "Arbitrage Between Stale Oracle and Real Market (L2 Restart)"
    description: |
      Attacker arbitrages price difference between stale L2 oracle (passing
      staleness check) and real market prices on DEXes immediately after restart.
    preconditions:
      - L2 sequencer downtime causes oracle freeze
      - Market price moves during downtime
      - Staleness check present (updatedAt within threshold)
      - No sequencer uptime validation
      - Real-time DEX prices available (Uniswap, etc.)
    steps:
      - Monitor sequencer uptime feed for restart events
      - Sequencer down; oracle frozen at $2000 (pre-downtime)
      - Real market moves to $1800 during downtime
      - Sequencer restarts; DEX prices immediately reflect $1800
      - Oracle shows stale $2000 (updatedAt within staleness threshold)
      - Staleness check passes (46min < 1h threshold)
      - Attacker mints/borrows at protocol using $2000 oracle price
      - Immediately sells on DEX at real $1800 market price
      - Repeats arbitrage until oracle updates to $1800
      - Profit: $200 per unit arbitrage during catch-up window
    impact: "Protocol value extraction via oracle-DEX arbitrage during L2 restart"
    cvss: 6.2
    l2_specific: true

verification_steps:
  - "Identify oracle read operation in function (Chainlink latestRoundData, getPrice, etc.)"
  - "VERIFY: Staleness check is present (this pattern requires it):"
  - "  - Look for: require(block.timestamp - updatedAt <= THRESHOLD)"
  - "  - Look for: require(updatedAt != 0)"
  - "  - Look for: staleness validation in internal helper functions"
  - "If NO staleness check found, this pattern should NOT match (use oracle-003 instead)"
  - "VERIFY: Sequencer uptime check is MISSING (this is the vulnerability):"
  - "  - Look for: AggregatorV3Interface sequencerUptimeFeed"
  - "  - Look for: require(answer == 0) // sequencer up check"
  - "  - Look for: block.timestamp - startedAt > GRACE_PERIOD"
  - "  - Check internal helper functions for delegated sequencer validation"
  - "If sequencer check IS present, this pattern should NOT match (use oracle-006 instead)"
  - "Determine deployment context:"
  - "  - L2 deployment (Arbitrum, Optimism, Base, etc.) → TRUE POSITIVE (medium severity)"
  - "  - L1 deployment (Ethereum mainnet) → FALSE POSITIVE (sequencer check not needed)"
  - "  - Multi-chain deployment → Review L2-specific deployment paths"
  - "Assess oracle usage criticality:"
  - "  - CRITICAL: Liquidations, borrowing, collateral valuation → Upgrade to HIGH severity"
  - "  - MEDIUM: Swap pricing, minting, redemptions → Keep MEDIUM severity"
  - "  - LOW: Fee calculations, rewards → Downgrade to LOW severity"
  - "Check deployment documentation:"
  - "  - Does protocol mention L2 deployment?"
  - "  - Are there L2-specific deployment scripts?"
  - "  - Does audit report address L2 sequencer risks?"
  - "Recommend upgrade path:"
  - "  - Add sequencer uptime check with 1-hour grace period"
  - "  - Reference Chainlink L2 Sequencer Uptime Feed for target network"
  - "  - Achieve oracle-006 (gold standard L2 oracle integration)"

fix_recommendations:
  - name: "Add L2 Sequencer Uptime Check (Upgrade to oracle-006)"
    description: |
      You already have staleness check (good!). Now add L2 sequencer uptime
      validation with grace period to achieve production-grade L2 oracle security.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";

      contract UpgradeToCompleteL2Protection {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed; // ADD THIS

          uint256 public constant GRACE_PERIOD_TIME = 1 hours; // ADD THIS
          uint256 public stalenessThreshold = 1 hours; // ALREADY HAVE

          // Chainlink L2 Sequencer Uptime Feed addresses:
          // Arbitrum One: 0xFdB631F5EE196F0ed6FAa767959853A9F217697D
          // Optimism:     0x371EAD81c9102C9BF4874A9075FFFf170F2Ee389
          // Base:         0xBCF85224fc0756B9Fa45aA7892530B47e10b6433

          constructor(
              address _priceFeed,
              address _sequencerUptimeFeed // ADD THIS PARAMETER
          ) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed); // ADD THIS
          }

          function getPrice() public view returns (uint256) {
              // ─────────────────────────────────────────────────────────
              // ADD THIS: L2 Sequencer Uptime Check (THE FIX)
              // ─────────────────────────────────────────────────────────
              (
                  /*uint80 roundId*/,
                  int256 answer,
                  uint256 startedAt,
                  /*uint256 updatedAt*/,
                  /*uint80 answeredInRound*/
              ) = sequencerUptimeFeed.latestRoundData();

              // Check sequencer is up (0 = up, 1 = down)
              require(answer == 0, "Sequencer: down");

              // Grace period: Wait 1 hour after restart before accepting prices
              require(
                  block.timestamp - startedAt > GRACE_PERIOD_TIME,
                  "Sequencer: grace period"
              );

              // ─────────────────────────────────────────────────────────
              // EXISTING: Staleness check (already implemented - good!)
              // ─────────────────────────────────────────────────────────
              (
                  uint80 roundId,
                  int256 price,
                  /*uint256 startedAt*/,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              require(updatedAt != 0, "Oracle: incomplete round");
              require(answer > 0, "Oracle: invalid price");
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Oracle: stale price"
              );
              require(answeredInRound >= roundId, "Oracle: stale round");

              return uint256(price);
          }
      }

      // RESULT: Now matches oracle-006 (production-grade L2 oracle integration)
      // ✅ Staleness check (protects against network congestion)
      // ✅ Sequencer check (protects against sequencer downtime)
      // ✅ Grace period (protects against post-restart stale prices)
      // ✅ Complete L2 protection

  - name: "Conditional Sequencer Check for Multi-Chain Deployment"
    description: |
      If deploying on both L1 and L2, use conditional sequencer check that
      activates only on L2 networks.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";

      contract MultiChainOracleWithConditionalSequencer {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed; // address(0) for L1

          uint256 public constant GRACE_PERIOD_TIME = 1 hours;
          uint256 public stalenessThreshold = 1 hours;

          constructor(
              address _priceFeed,
              address _sequencerUptimeFeed // Pass address(0) for L1 deployments
          ) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              if (_sequencerUptimeFeed != address(0)) {
                  sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
              }
          }

          function getPrice() public view returns (uint256) {
              // L2 DEPLOYMENT: Check sequencer uptime
              if (address(sequencerUptimeFeed) != address(0)) {
                  _checkSequencerUptime();
              }
              // L1 DEPLOYMENT: Skip sequencer check (not applicable)

              // BOTH L1 + L2: Staleness check (already implemented)
              (
                  uint80 roundId,
                  int256 answer,
                  ,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              require(updatedAt != 0, "Incomplete round");
              require(answer > 0, "Invalid price");
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Stale price"
              );
              require(answeredInRound >= roundId, "Stale round");

              return uint256(answer);
          }

          function _checkSequencerUptime() internal view {
              (
                  ,
                  int256 answer,
                  uint256 startedAt,
                  ,
              ) = sequencerUptimeFeed.latestRoundData();

              require(answer == 0, "Sequencer: down");
              require(
                  block.timestamp - startedAt > GRACE_PERIOD_TIME,
                  "Sequencer: grace period"
              );
          }
      }

  - name: "Why Grace Period Matters (Don't Skip This!)"
    description: |
      Just checking sequencer.answer == 0 is NOT enough. You MUST implement
      grace period validation to prevent exploitation during oracle stabilization.
    example: |
      # ❌ INSUFFICIENT - Sequencer check without grace period
      function getPrice() public view returns (uint256) {
          (, int256 answer, , , ) = sequencerUptimeFeed.latestRoundData();
          require(answer == 0, "Sequencer: down"); // NOT ENOUGH!

          // Oracle could still be stale even if sequencer is up
          // Need grace period to allow oracle to catch up to market
      }

      # ✅ CORRECT - Sequencer check WITH grace period
      function getPrice() public view returns (uint256) {
          (
              ,
              int256 answer,
              uint256 startedAt,
              ,
          ) = sequencerUptimeFeed.latestRoundData();

          require(answer == 0, "Sequencer: down");

          // CRITICAL: Grace period validation
          require(
              block.timestamp - startedAt > GRACE_PERIOD_TIME,
              "Sequencer: grace period"
          );

          // Now safe to fetch oracle data
      }

      # Why Grace Period Is Critical:
      # - Sequencer restart (answer: 1 → 0) happens INSTANTLY
      # - Oracle updates to real market prices take TIME (minutes to blocks)
      # - Without grace period: Accept stale prices immediately after restart
      # - With grace period: Wait 1 hour for oracle to stabilize
      # - Chainlink recommends 1-hour grace period
      # - GMX V2, Gains Network, Perp Protocol all use grace period

  - name: "Upgrade Path Summary"
    description: |
      Current state vs. target state and improvement path.
    example: |
      # CURRENT STATE (oracle-007 - PARTIAL PROTECTION):
