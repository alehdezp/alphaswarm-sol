# Pattern Classification
pattern_type: partial_protection
quality_indicator: false  # Incomplete L2 security validation
l2_specific: true  # Only relevant for L2 deployments
improvement_target: oracle-006  # Upgrade path to gold standard

# Auditor Guidance
auditor_notes: |
  This pattern identifies PARTIAL PROTECTION for L2 oracle integration. When this pattern matches:

  ⚠️ PARTIAL PROTECTION DETECTED: Function has staleness check but missing sequencer validation
  ✅ GOOD: Staleness check protects against network congestion oracle lag
  ❌ MISSING: L2 sequencer uptime check and grace period validation
  🎯 UPGRADE PATH: Add sequencer check to achieve oracle-006 (production-grade)

  IMMEDIATE FOLLOW-UP ACTIONS:
  1. Verify deployment target:
     - L2 (Arbitrum, Optimism, Base, etc.) → TRUE POSITIVE (medium severity)
     - L1 (Ethereum mainnet) → FALSE POSITIVE (sequencer check not needed)
  2. Confirm staleness check is present and correct
  3. Identify why sequencer check is missing (oversight vs. intentional)
  4. Assess oracle usage criticality (liquidations, borrowing, collateral)
  5. Recommend adding sequencer uptime check with 1-hour grace period
  6. Provide upgrade path to oracle-006 (gold standard)

  SEVERITY ASSESSMENT:
  - MEDIUM (base): Partial protection, L2-specific vulnerability window
  - Upgrade to HIGH: If oracle used for liquidations or critical collateral valuation
  - Downgrade to LOW: If oracle used only for informational/display purposes
  - N/A: L1 deployments (not vulnerable to sequencer issues)

  COMPARISON WITH OTHER PATTERNS:
  - oracle-003 (no checks): HIGH severity - worse than this
  - oracle-007 (this pattern): MEDIUM severity - partial protection
  - oracle-006 (complete): SAFE - target upgrade path

# Partial Protection Analysis
partial_protection_analysis:
  has_staleness_check: true
  has_sequencer_uptime_check: false
  has_grace_period: false
  protection_level: "partial"
  vulnerable_to:
    - L2 sequencer downtime events
    - Post-sequencer-restart stale price window
    - Oracle freeze during sequencer outage
  protected_from:
    - Network congestion oracle lag (staleness check catches this)
    - Oracle node downtime (staleness check catches this)
    - Heartbeat interval exploitation (staleness check catches this)

# L2 Sequencer Downtime Risk
l2_sequencer_risk:
  frequency: "Rare (hours to days between events)"
  impact: "High (large price divergence during multi-hour downtime)"
  exploitability: "Medium (requires precise timing at sequencer restart)"
  detection: "Easy (Chainlink sequencer uptime feed publicly monitors events)"
  mitigation: "Add sequencer uptime check with grace period"

# Improvement Metrics
improvement_metrics:
  current_protection: 60%  # Staleness check provides partial protection
  target_protection: 95%   # Add sequencer check to reach oracle-006
  effort_to_fix: "Low - Add sequencer check function and constructor parameter"
  risk_to_fix: "Low - Pure additive change, no logic removal"
  testing_required: "Medium - Test sequencer downtime + restart scenarios"
