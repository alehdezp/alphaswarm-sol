    # Must have staleness check (validates updatedAt timestamp)
    - property: has_staleness_check
      op: eq
      value: true

    # Must have sequencer uptime check (validates L2 sequencer status + grace period)
    - property: has_sequencer_uptime_check
      op: eq
      value: true

  # Any (OR logic) - not used for this pattern
  any: []

  # None (NOT logic) - not used for this pattern
  none: []

