fix_recommendations:
  - name: "This Pattern IS the Fix (Production-Grade Implementation)"
    description: |
      This pattern represents the GOLD STANDARD for L2 oracle integration.
      If your function matches this pattern, it demonstrates production-grade
      oracle security. Below is the complete reference implementation.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      /**
       * @title ProductionGradeL2Oracle
       * @notice Gold standard L2 oracle integration with defense in depth
       * @dev Implements BOTH sequencer uptime check AND staleness validation
       *
       * Security Layers:
       *   1. L2 Sequencer Uptime Check (protects against sequencer downtime)
       *   2. Grace Period Validation (allows oracle stabilization after restart)
       *   3. Staleness Check (protects against network congestion oracle lag)
       *   4. Oracle Data Validation (completeness, positivity, round consistency)
       *
       * Recommended for: GMX-style perpetual protocols, lending protocols,
       * collateral valuation, liquidation pricing, swap pricing on L2 networks.
       */
      contract ProductionGradeL2Oracle is Ownable {
          // ═══════════════════════════════════════════════════════════
          // IMMUTABLE STATE
          // ═══════════════════════════════════════════════════════════

          /// @notice Chainlink price feed (e.g., ETH/USD)
          AggregatorV3Interface public immutable priceFeed;

          /// @notice Chainlink L2 sequencer uptime feed
          /// @dev Addresses by network:
          ///      Arbitrum One: 0xFdB631F5EE196F0ed6FAa767959853A9F217697D
          ///      Optimism:     0x371EAD81c9102C9BF4874A9075FFFf170F2Ee389
          ///      Base:         0xBCF85224fc0756B9Fa45aA7892530B47e10b6433
          AggregatorV3Interface public immutable sequencerUptimeFeed;

          /// @notice Grace period after sequencer restart (1 hour recommended)
          /// @dev Allows oracle to stabilize to real market prices after restart
          uint256 public constant GRACE_PERIOD_TIME = 1 hours;

          // ═══════════════════════════════════════════════════════════
          // MUTABLE STATE
          // ═══════════════════════════════════════════════════════════

          /// @notice Staleness threshold (configurable per asset volatility)
          /// @dev 1 hour for volatile assets, 24 hours for stablecoins
          uint256 public stalenessThreshold;

          // ═══════════════════════════════════════════════════════════
          // EVENTS
          // ═══════════════════════════════════════════════════════════

          event SequencerDown();
          event SequencerGracePeriod(uint256 timeRemaining);
          event StalePrice(uint256 updatedAt, uint256 threshold);

          // ═══════════════════════════════════════════════════════════
          // CONSTRUCTOR
          // ═══════════════════════════════════════════════════════════

          constructor(
              address _priceFeed,
              address _sequencerUptimeFeed,
              uint256 _stalenessThreshold
          ) {
              require(_priceFeed != address(0), "Invalid price feed");
              require(_sequencerUptimeFeed != address(0), "Invalid sequencer feed");
              require(_stalenessThreshold > 0, "Invalid staleness threshold");

              priceFeed = AggregatorV3Interface(_priceFeed);
              sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
              stalenessThreshold = _stalenessThreshold;
          }

          // ═══════════════════════════════════════════════════════════
          // ADMIN FUNCTIONS
          // ═══════════════════════════════════════════════════════════

          /// @notice Update staleness threshold (governance-controlled)
          /// @param _threshold New staleness threshold in seconds
          function setStalenessThreshold(uint256 _threshold) external onlyOwner {
              require(_threshold > 0, "Invalid threshold");
              stalenessThreshold = _threshold;
          }

          // ═══════════════════════════════════════════════════════════
          // ORACLE PRICE FETCHING (PRODUCTION-GRADE)
          // ═══════════════════════════════════════════════════════════

          /// @notice Get current oracle price with full L2 validation
          /// @return price Latest validated oracle price
          /// @dev This is the GOLD STANDARD implementation:
          ///      1. Check L2 sequencer is up
          ///      2. Validate grace period after sequencer restart
          ///      3. Fetch oracle data
          ///      4. Validate oracle staleness
          ///      5. Validate oracle data quality
          function getPrice() public view returns (uint256 price) {
              // ─────────────────────────────────────────────────────────
              // LAYER 1: L2 Sequencer Uptime Validation
              // ─────────────────────────────────────────────────────────
              // Protects against: Sequencer downtime → oracle freeze
              // Validates:
              //   - Sequencer is currently up (answer == 0)
              //   - Sequencer has been up for grace period (1 hour)
              //   - Oracle has had time to stabilize after restart
              _checkSequencerUptime();

              // ─────────────────────────────────────────────────────────
              // LAYER 2: Oracle Data Fetching
              // ─────────────────────────────────────────────────────────
              (
                  uint80 roundId,
                  int256 answer,
                  /*uint256 startedAt*/,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              // ─────────────────────────────────────────────────────────
              // LAYER 3: Oracle Staleness Validation
              // ─────────────────────────────────────────────────────────
              // Protects against: Network congestion → oracle lag
              // Validates:
              //   - Oracle data is complete (updatedAt != 0)
              //   - Oracle data is recent (block.timestamp - updatedAt < threshold)
              //   - Oracle round is not stale (answeredInRound >= roundId)

              // Completeness check
              if (updatedAt == 0) {
                  revert("Oracle: incomplete round");
              }

              // Staleness check
              if (block.timestamp - updatedAt > stalenessThreshold) {
                  emit StalePrice(updatedAt, stalenessThreshold);
                  revert("Oracle: stale price");
              }

              // Round consistency check (Chainlink-specific)
              if (answeredInRound < roundId) {
                  revert("Oracle: stale round");
              }

              // ─────────────────────────────────────────────────────────
              // LAYER 4: Oracle Data Quality Validation
              // ─────────────────────────────────────────────────────────
              // Validates price is positive and valid
              if (answer <= 0) {
                  revert("Oracle: invalid price");
              }

              price = uint256(answer);
          }

          /// @notice Internal sequencer uptime validation
          /// @dev Checks sequencer is up AND grace period has elapsed
          function _checkSequencerUptime() internal view {
              (
                  /*uint80 roundId*/,
                  int256 answer,
                  uint256 startedAt,
                  /*uint256 updatedAt*/,
                  /*uint80 answeredInRound*/
              ) = sequencerUptimeFeed.latestRoundData();

              // ─────────────────────────────────────────────────────────
              // CHECK 1: Sequencer Status
              // ─────────────────────────────────────────────────────────
              // answer == 0: Sequencer is up ✅
              // answer == 1: Sequencer is down 🚨
              if (answer != 0) {
                  emit SequencerDown();
                  revert("Sequencer: down");
              }

              // ─────────────────────────────────────────────────────────
              // CHECK 2: Grace Period (THE CRITICAL SAFEGUARD)
              // ─────────────────────────────────────────────────────────
              // Don't accept prices immediately after sequencer restart
              // Oracle needs time to stabilize to real market prices
              // Recommended: 1 hour (GRACE_PERIOD_TIME)
              uint256 timeSinceUp = block.timestamp - startedAt;
              if (timeSinceUp <= GRACE_PERIOD_TIME) {
                  uint256 timeRemaining = GRACE_PERIOD_TIME - timeSinceUp;
                  emit SequencerGracePeriod(timeRemaining);
                  revert("Sequencer: grace period");
              }
          }
      }

  - name: "Multi-Chain Deployment (L1 + L2 Compatible)"
    description: |
      For protocols deploying on both L1 (Ethereum mainnet) and L2 (Arbitrum,
      Optimism, Base), use conditional sequencer checks.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";

      contract MultiChainOracle {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed; // address(0) for L1

          uint256 public constant GRACE_PERIOD_TIME = 1 hours;
          uint256 public stalenessThreshold;

          constructor(
              address _priceFeed,
              address _sequencerUptimeFeed, // Pass address(0) for L1 deployments
              uint256 _stalenessThreshold
          ) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              stalenessThreshold = _stalenessThreshold;

              // L2 DEPLOYMENT: Set sequencer uptime feed
              if (_sequencerUptimeFeed != address(0)) {
                  sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
              }
              // L1 DEPLOYMENT: sequencerUptimeFeed remains address(0)
          }

          function getPrice() public view returns (uint256) {
              // L2 DEPLOYMENT: Check sequencer uptime
              if (address(sequencerUptimeFeed) != address(0)) {
                  _checkSequencerUptime();
              }
              // L1 DEPLOYMENT: Skip sequencer check (not applicable)

              // BOTH L1 + L2: Staleness check
              (
                  uint80 roundId,
                  int256 answer,
                  ,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              require(updatedAt != 0, "Incomplete round");
              require(answer > 0, "Invalid price");
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Stale price"
              );
              require(answeredInRound >= roundId, "Stale round");

              return uint256(answer);
          }

          function _checkSequencerUptime() internal view {
              (
                  ,
                  int256 answer,
                  uint256 startedAt,
                  ,
              ) = sequencerUptimeFeed.latestRoundData();

              require(answer == 0, "Sequencer: down");
              require(
                  block.timestamp - startedAt > GRACE_PERIOD_TIME,
                  "Sequencer: grace period"
              );
          }
      }

