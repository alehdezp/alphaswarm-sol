attack_scenarios:
  - name: "What This Pattern PREVENTS: Post-Sequencer-Restart Stale Price Exploitation"
    description: |
      Without BOTH sequencer uptime check AND staleness check, attackers exploit
      stale oracle prices immediately after L2 sequencer restart, before oracle
      stabilizes to real market prices.
    preconditions:
      - Protocol deployed on L2 (Arbitrum, Optimism, Base, zkSync, etc.)
      - L2 sequencer experiences downtime
      - Market price moves significantly during downtime
      - Oracle freezes during sequencer downtime
    steps:
      - Monitor Chainlink L2 Sequencer Uptime Feed for restart events
      - L2 sequencer goes down; oracle freezes at pre-downtime price
      - Real market price diverges from frozen oracle price during downtime
      - Sequencer restarts; blocks resume processing
      - WITHOUT sequencer check: Accept stale price immediately after restart
      - WITHOUT staleness check: Accept price even if congestion delayed oracle
      - WITH BOTH CHECKS: Reject prices until sequencer stabilizes AND oracle updates
      - Attacker cannot exploit gap between sequencer restart and oracle stabilization
    impact: "PREVENTED: Stale price exploitation, bad debt, unfair liquidations"
    prevented_by: "Implementing BOTH has_staleness_check AND has_sequencer_uptime_check"
    cvss_without_pattern: 8.3
    cvss_with_pattern: 0.0

  - name: "What This Pattern PREVENTS: Network Congestion Oracle Lag Exploitation"
    description: |
      Without staleness check (even with sequencer check), attackers exploit oracle
      lag caused by network congestion independent of sequencer status.
    preconditions:
      - L2 network experiences high congestion (not sequencer downtime)
      - Oracle updates delayed due to network conditions
      - Sequencer is UP but oracle lags real market
      - Only sequencer check present (missing staleness check)
    steps:
      - L2 network congestion delays oracle updates
      - Sequencer is up (answer == 0) ✅
      - Oracle shows $2000; real market at $2200 (lag not sequencer-related)
      - WITH sequencer check only: Accept stale $2000 price (sequencer is up)
      - WITHOUT staleness check: No detection of oracle lag
      - WITH BOTH CHECKS: Staleness check detects oracle lag, rejects stale price
      - Attacker cannot exploit $200 price gap
    impact: "PREVENTED: Price gap exploitation during network congestion"
    prevented_by: "Staleness check catches oracle lag even when sequencer is up"
    cvss_without_staleness: 7.8
    cvss_with_pattern: 0.0

  - name: "What This Pattern PREVENTS: Grace Period Bypass Attack"
    description: |
      Without grace period validation in sequencer check, attackers exploit the
      immediate post-restart window before oracle stabilizes.
    preconditions:
      - Sequencer uptime check exists BUT no grace period validation
      - Sequencer restarts after downtime
      - Oracle takes time to propagate real market prices
    steps:
      - Sequencer restarts (answer = 0, startedAt = block.timestamp)
      - Attacker checks: sequencer is up (answer == 0) ✓
      - WITHOUT grace period: Transaction proceeds immediately
      - Oracle still has stale price from pre-downtime
      - Attacker executes favorable transaction with stale price
      - WITH grace period: Block.timestamp - startedAt <= GRACE_PERIOD → revert
      - After grace period (1h), oracle stabilizes to real market
      - Attacker cannot exploit stabilization window
    impact: "PREVENTED: Exploitation of oracle stabilization window"
    prevented_by: "Grace period in has_sequencer_uptime_check implementation"
    cvss_without_grace_period: 7.8
    cvss_with_pattern: 0.0

