# PATTERN: oracle-006-l2-freshness-complete
# =============================================================================
#
# SAFE PATTERN - Production-Grade L2 Oracle Best Practice
#
# This pattern identifies the GOLD STANDARD for oracle integration on Layer 2
# networks: Oracle reads that implement BOTH staleness checks AND sequencer
# uptime validation with grace period.
#
# This is a BEST PRACTICE VALIDATOR showing production-ready L2 oracle security.
#
# =============================================================================

id: oracle-006
vulndoc: oracle/freshness
name: "L2 Oracle With Complete Freshness Validation (Safe Pattern)"

description: |
  ## What This Detects
  Functions that read oracle prices on Layer 2 networks (Arbitrum, Optimism, Base,
  zkSync, etc.) AND properly implement BOTH critical security validations:
  1. **Staleness check**: Validates price freshness via `updatedAt` timestamp
  2. **Sequencer uptime check**: Validates L2 sequencer is up with grace period

  **This is a SAFE PATTERN showing production-grade L2 oracle integration.**

  ## Why BOTH Checks Are Necessary on L2

  Layer 2 rollups introduce unique oracle security challenges that L1 networks don't face:

  ### The L2 Oracle Security Problem

  **L1 (Ethereum Mainnet):**
  - Oracle staleness check alone is sufficient
  - No single point of failure for chain liveness
  - Oracle updates continue even if individual nodes fail

  **L2 (Arbitrum, Optimism, Base, etc.):**
  - **PROBLEM 1**: Centralized sequencers can experience downtime
  - **PROBLEM 2**: During sequencer downtime, ALL oracles freeze (not just stale, but FROZEN)
  - **PROBLEM 3**: After sequencer restart, oracle takes time to catch up to real market
  - **RESULT**: Staleness check alone is NOT SUFFICIENT on L2

  ### Why Staleness Check Alone Fails on L2

  Consider this scenario on Arbitrum:

  ```
  T=0:   Sequencer is up, oracle shows ETH = $2000
  T=10m: Sequencer GOES DOWN (maintenance, outage, congestion)
  T=10m: Oracle FREEZES at $2000 (no new updates possible)
  T=45m: Real market price crashes to $1500 (oracle still frozen at $2000)
  T=45m: Sequencer RESTARTS (answer: 1 → 0)
  T=46m: First blocks after restart process
         ┌─────────────────────────────────────────────────┐
         │ ATTACK WINDOW: Oracle still shows $2000        │
         │ - updatedAt was 45 minutes ago                  │
         │ - Staleness check (45m < 1h threshold) PASSES ✅│
         │ - But price is STALE relative to market ($1500)│
         │ - Attacker borrows max against $2000 collateral│
         │ - Real value is only $1500 → 33% over-borrowed  │
         └─────────────────────────────────────────────────┘
  T=47m: Oracle FINALLY updates to real market price $1500
  T=47m: Protocol realizes positions are under-collateralized
  T=47m: Protocol has $500/unit bad debt; attacker keeps borrowed funds
  ```

  **The staleness check passed because `updatedAt` was within threshold, but the
  price was stale relative to the REAL MARKET due to sequencer downtime.**

  ### Why Sequencer Check Alone Also Fails

  Conversely, checking ONLY sequencer uptime without staleness creates risks:

  ```
  T=0:   Oracle shows ETH = $2000, last updated 30 minutes ago
  T=0:   Network congestion delays oracle updates (sequencer is up, but oracle lags)
  T=0:   Real market price is $2200 (oracle stale at $2000)
  T=0:   Sequencer uptime check: answer == 0 ✅ (up)
         ┌─────────────────────────────────────────────────┐
         │ ATTACK WINDOW: Sequencer check passes          │
         │ - Sequencer is up ✅                            │
         │ - But oracle is stale due to network congestion│
         │ - Missing staleness check                       │
         │ - Attacker exploits $200 price gap              │
         └─────────────────────────────────────────────────┘
  ```

  **The sequencer check passed, but network congestion caused oracle lag independent
  of sequencer status. Staleness check would have caught this.**

  ### The Gold Standard: Defense in Depth

  **Production-grade L2 oracle integration requires BOTH checks:**

  ```solidity
  function getPrice() public view returns (uint256) {
      // LAYER 1: L2 Sequencer Uptime Check
      // ────────────────────────────────────────────────────
      // Protects against: Sequencer downtime → oracle freeze
      // Validates:
      //   1. Sequencer is currently up (answer == 0)
      //   2. Sequencer has been up for grace period (1 hour)
      //   3. Oracle has had time to stabilize after restart
      (
          /*uint80 roundId*/,
          int256 answer,
          uint256 startedAt,
          /*uint256 updatedAt*/,
          /*uint80 answeredInRound*/
      ) = sequencerUptimeFeed.latestRoundData();

      require(answer == 0, "Sequencer: down");
      require(
          block.timestamp - startedAt > GRACE_PERIOD_TIME,
          "Sequencer: grace period"
      );

      // LAYER 2: Staleness Check
      // ────────────────────────────────────────────────────
      // Protects against: Network congestion → oracle lag
      // Validates:
      //   1. Oracle data is complete (updatedAt != 0)
      //   2. Oracle data is recent (block.timestamp - updatedAt < threshold)
      //   3. Oracle round is not stale (answeredInRound >= roundId)
      (
          uint80 roundId,
          int256 price,
          /*uint256 startedAt*/,
          uint256 updatedAt,
          uint80 answeredInRound
      ) = priceFeed.latestRoundData();

      require(updatedAt != 0, "Oracle: incomplete round");
      require(
          block.timestamp - updatedAt <= STALENESS_THRESHOLD,
          "Oracle: stale price"
      );
      require(answeredInRound >= roundId, "Oracle: stale round");

      // BOTH layers passed → Safe to use oracle price
      return uint256(price);
  }
  ```

  ## Real-World Examples of Production-Grade L2 Oracle Integration

  ### GMX V2 (Arbitrum): The Reference Implementation

  **What GMX V2 does right:**
  - ✅ Chainlink sequencer uptime feed integration
  - ✅ 1-hour grace period after sequencer restart
  - ✅ Staleness validation on all oracle reads
  - ✅ Multi-source oracle aggregation (Chainlink + Arbitrum sequencer feed)
  - ✅ Price deviation circuit breakers
  - ✅ Configurable staleness thresholds per asset class

  **Code Reference:**
  ```
  https://github.com/gmx-io/gmx-synthetics/blob/main/contracts/oracle/Oracle.sol
  ```

  **Key features:**
  - Sequencer uptime check with grace period
  - Staleness validation with asset-specific thresholds
  - Fallback oracle mechanisms
  - Comprehensive event logging for monitoring

  ### Gains Network (Arbitrum/Polygon): Multi-Oracle Defense

  **What Gains Network does right:**
  - ✅ Primary oracle with sequencer uptime validation
  - ✅ Fallback oracle with independent staleness checks
  - ✅ Price deviation detection across sources
  - ✅ Emergency pause mechanism on oracle failures

  **Code Reference:**
  ```
  https://github.com/GainsNetwork/gTrade-contracts
  ```

  **Key features:**
  - Redundant oracle sources with cross-validation
  - Sequencer-aware price fetching
  - Circuit breakers on extreme deviations

  ### Perp Protocol (Optimism): Comprehensive Validation

  **What Perp Protocol does right:**
  - ✅ Sequencer uptime check mandatory for all oracle reads
  - ✅ Staleness validation with configurable thresholds
  - ✅ Oracle price caching with invalidation on staleness
  - ✅ Admin controls for emergency oracle overrides

  **Code Reference:**
  ```
  https://github.com/perpetual-protocol/perp-oracle-contract
  ```

  **Key features:**
  - Layered validation (sequencer → staleness → deviation)
  - Grace period enforcement
  - Monitoring and alerting integration

  ## Why This Pattern Represents Best Practice

  **Security Properties:**
  1. **Defense in Depth**: Multiple layers of validation catch different failure modes
  2. **L2-Aware**: Explicitly handles L2 sequencer risks that don't exist on L1
  3. **Grace Period**: Prevents exploitation during oracle stabilization window
  4. **Staleness Check**: Catches oracle lag independent of sequencer status
  5. **Future-Proof**: Handles both current and future L2 sequencer failure modes

  **Production Readiness:**
  1. **Battle-Tested**: Pattern used by GMX V2 ($1B+ TVL), Gains Network, Perp Protocol
  2. **Chainlink Recommended**: Follows official Chainlink L2 integration guidelines
  3. **Audit-Approved**: Pattern validated by Trail of Bits, OpenZeppelin, Consensys Diligence
  4. **Incident-Proven**: Would have prevented all historical L2 sequencer exploitation attempts

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function performs oracle read operation (`has_operation: READS_ORACLE`)
  2. Function implements staleness check (`has_staleness_check: true`)
  3. Function implements sequencer uptime check (`has_sequencer_uptime_check: true`)

  **This pattern identifies PRODUCTION-GRADE L2 ORACLE INTEGRATION.**

  When this pattern matches, auditors should:
  - ✅ **VALIDATE**: Confirm grace period is adequate (1 hour recommended)
  - ✅ **VALIDATE**: Confirm staleness threshold is reasonable for asset volatility
  - ✅ **VALIDATE**: Check for additional safeguards (multi-oracle, circuit breakers)
  - ✅ **VERIFY**: Sequencer uptime feed address is correct for target L2 network
  - ✅ **VERIFY**: Both checks are present in critical code paths (liquidations, borrowing, etc.)

