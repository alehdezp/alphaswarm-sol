    STATUS: READY (precision 0.91 >= 0.70, recall 0.91 >= 0.50, variation 0.80 >= 0.60)

    This is a VULNERABILITY PATTERN (high severity).
    True positives = TWAP oracle reads WITHOUT configurable window parameter.
    True negatives = TWAP reads WITH window parameter (secondsAgo, period, interval, window, etc.).

    Test Results:
    - True Positives (10): All hardcoded TWAP windows correctly detected
    - True Negatives (11): All configurable window parameters correctly excluded
    - Edge Cases (4): View/pure functions excluded, no TWAP reads excluded
    - Variations (4/5 = 80%): Different naming conventions tested

    Known Limitations:
    1. Storage-based windows (1 FP): getTWAPFromStorageWindow() flagged despite being
       governance-controlled. Pattern cannot distinguish storage variables from constants.
