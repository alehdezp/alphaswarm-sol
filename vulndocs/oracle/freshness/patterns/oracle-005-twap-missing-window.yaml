# =============================================================================
# PATTERN: oracle-005-twap-missing-window
# =============================================================================
#
# VULNERABILITY PATTERN - TWAP Oracle Without Configurable Time Window
#
# This pattern identifies VULNERABLE TWAP oracle usage where contracts read
# Time-Weighted Average Price data but LACK configurable time window parameters,
# making them susceptible to manipulation attacks and market responsiveness issues.
#
# =============================================================================

id: oracle-005
vulndoc: oracle/freshness
name: "TWAP Oracle Without Time Window Parameter"

description: |
  ## What This Detects
  Functions that read Time-Weighted Average Price (TWAP) oracle data but FAIL
  to implement configurable time window parameters, using hardcoded or fixed
  time periods that cannot adapt to changing market conditions or security needs.

  **This is a VULNERABILITY PATTERN - missing critical oracle configuration.**

  ## Why It's Dangerous

  TWAP oracles calculate average prices over time periods to resist flash loan
  manipulation. However, without configurable window parameters:

  **1. Fixed Short Windows → Flash Loan Manipulation**
  - Window too short (< 10 minutes): Vulnerable to multi-block MEV attacks
  - Attacker can manipulate price across consecutive blocks
  - Cost of manipulation decreases linearly with shorter windows
  - Flash loan + selfish mining = oracle manipulation at scale

  **2. Fixed Long Windows → Market Unresponsiveness**
  - Window too long (> 1 hour): Prices lag real market by significant margin
  - Legitimate users get unfair pricing during volatility
  - Protocol becomes arbitrage target (stale TWAP vs real market)
  - Unable to respond quickly to black swan events

  **3. Asset-Specific Requirements Ignored**
  - Volatile assets (ETH, BTC) need shorter windows (10-30 min)
  - Stable assets (USDC, DAI) can use longer windows (1-24 hours)
  - Low liquidity assets need longer windows to prevent manipulation
  - High liquidity assets can use shorter windows for responsiveness

  **4. Security vs Usability Trade-off Frozen**
  - Hardcoded window = permanent security/usability balance choice
  - Market conditions change; fixed parameters don't adapt
  - No ability to increase security during high volatility periods
  - No governance-controlled risk adjustment capability

  ## Real-World Exploits

  ### Indexed Finance Exploit (October 2021): $16M Stolen
  - **Issue**: TWAP oracle with insufficient window period (30 minutes)
  - **Attack**: Attacker executed multi-block price manipulation over 30 blocks
  - **Method**: Borrowed flash loan → manipulated pool reserves → held manipulation
    across multiple blocks → TWAP average shifted → minted tokens at manipulated price
  - **Impact**: $16M drained via TWAP manipulation; 30-min window was too short
  - **Root cause**: Fixed TWAP window couldn't be increased for low-liquidity pools
  - **Reference**: https://ndxfi.medium.com/indexed-attack-post-mortem-b006094f0bdc
  - **Cost analysis**: ~$20K to manipulate 30-min TWAP on low-liquidity pair

  ### Rari Capital Fuse Pool Exploit (May 2022): $80M Stolen
  - **Issue**: TWAP oracle reading from manipulatable pool without sufficient window
  - **Attack**: Flash loan → price manipulation → exploit lending protocol using TWAP
  - **Method**: Massive swap in low-liquidity pool → TWAP shifted → over-borrowed
  - **Impact**: $80M exploited across multiple Fuse pools using manipulated TWAP
  - **Root cause**: TWAP window parameter not configurable per asset risk profile
  - **Reference**: https://blocksec.com/blog/price-manipulation-attack-rari-capital

  ### Hundred Finance Exploit (April 2023): $7M Stolen
  - **Issue**: Compound fork using TWAP oracle with fixed window on Optimism L2
  - **Attack**: Empty pool attack + TWAP manipulation on L2 with lower manipulation cost
  - **Method**: Created new market → manipulated initial TWAP → borrowed against
    inflated collateral valuation
  - **Impact**: $7M stolen via TWAP manipulation on L2 (cheaper than mainnet)
  - **Root cause**: Fixed TWAP window; no per-chain cost adjustment (L2 vs L1)
  - **Reference**: https://blog.hundred.finance/15-04-23-hundred-finance-hack-post-mortem

  ### Warp Finance Exploit (December 2020): $8M Stolen (First Major TWAP Attack)
  - **Issue**: Uniswap V2 TWAP with insufficient observation window
  - **Attack**: Flash loan → manipulate LP token pricing via TWAP
  - **Method**: Borrowed $330M flash loan → manipulated reserves → TWAP shifted →
    minted stablecoin against inflated collateral → repaid flash loan → kept profit
  - **Impact**: $8M profit from TWAP manipulation (first publicized TWAP exploit)
  - **Root cause**: TWAP window too short for flash loan resistance
  - **Reference**: https://www.mdpi.com/2227-9709/10/1/3

  ### Pattern Across Incidents
  All four attacks succeeded because:
  1. **Fixed TWAP windows**: No configurability based on asset risk/liquidity
  2. **Insufficient window periods**: Too short to resist multi-block attacks
  3. **No governance adjustment**: Unable to increase security post-deployment
  4. **Asset-agnostic parameters**: Same window for volatile and stable assets

  ## Academic Research: Cost of TWAP Manipulation

  **Euler Finance & Others (2021-2023)**
  - Research: "TWAP Oracle Attacks: Easier Done than Said?" (2022)
  - Finding: Multi-block MEV (MMEV) makes TWAP manipulation orders of magnitude cheaper
  - Cost: Manipulating 30-min TWAP on Uniswap V3 can cost $10K-$50K (not millions)
  - Method: Selfish mining + MEV allows 2+ consecutive blocks at low hashpower
  - Conclusion: **TWAP windows < 30 minutes are vulnerable at practical attack costs**
  - Reference: https://eprint.iacr.org/2022/445.pdf
  - Impact: Demonstrated that TWAP is NOT flash-loan resistant without sufficient windows

  **Chaos Labs Analysis (2023)**
  - Assessment: Comprehensive TWAP market risk modeling
  - Finding: 30-minute TWAP on mainnet provides moderate security
  - **L2 Risk Factor**: Optimism/Arbitrum TWAP manipulation ~10x cheaper than mainnet
  - Recommendation: Configurable windows based on chain, liquidity, and volatility
  - Reference: https://chaoslabs.xyz/posts/chaos-labs-uniswap-v3-twap-market-risk

  ## What Constitutes Proper TWAP Window Implementation

  **Minimum requirements (Tier 1 - Basic Protection):**
  - ✅ Window parameter passed as function argument (secondsAgo, window, period)
  - ✅ Window value controllable by caller or protocol governance
  - ✅ Minimum window enforcement (e.g., >= 10 minutes for volatile assets)

  **Recommended requirements (Tier 2 - Enhanced Protection):**
  - ✅ Asset-specific window configuration (mapping: asset → minimum window)
  - ✅ Dynamic window adjustment based on liquidity (low liquidity → longer window)
  - ✅ Multi-window queries (get TWAP for 10min, 30min, 1hr; use most conservative)
  - ✅ Maximum window cap to prevent excessive staleness

  **Best practice requirements (Tier 3 - Production-Grade):**
  - ✅ Governance-controlled window parameters with timelock
  - ✅ L1 vs L2 chain-specific windows (L2 needs longer due to lower manipulation cost)
  - ✅ Liquidity-aware window sizing (query pool liquidity → adjust window dynamically)
  - ✅ Observation cardinality checks (ensure sufficient TWAP data points)
  - ✅ Emergency circuit breaker if price deviation exceeds threshold
  - ✅ Event emission on TWAP query with window parameter for monitoring

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function performs TWAP oracle read (`reads_twap: true`)
  2. Function performs oracle read operation (`has_operation: READS_ORACLE`)
  3. Function LACKS window parameter (`has_twap_window_parameter: false`)
  4. Function is NOT a view function (view functions don't execute exploitable operations)

  **Rationale for conditions:**
  - `reads_twap: true` - Detects TWAP-specific oracle calls (consult, observe, etc.)
  - `has_twap_window_parameter: false` - Missing secondsAgo/window/period parameter
  - `has_operation: READS_ORACLE` - Semantic operation detection (implementation-agnostic)
  - Exclude view functions - They don't execute state-changing exploitable transactions

  **Why this matters:**
  Without configurable windows, protocols cannot:
  - Adapt to changing market conditions
  - Increase security for low-liquidity assets
  - Respond to manipulation attempts
  - Balance security vs responsiveness per asset

