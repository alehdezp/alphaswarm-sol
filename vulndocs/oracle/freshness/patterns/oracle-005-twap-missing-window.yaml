       Builder sets reads_twap=True but missing READS_ORACLE operation for V2 patterns.
       Pattern requires both conditions. This is a builder limitation, not pattern issue.
       Decision: Acceptable FN - V3 observe() patterns work correctly, V2 is legacy.

    Pattern excels at:
    - Detecting hardcoded Uniswap V3 TWAP windows (observe() calls)
    - Multiple parameter name variants (secondsAgo, window, period, interval, duration)
    - Different function naming conventions (getPrice, getCollateral, etc.)
    - Excluding view/pure functions correctly
    - Critical operations (liquidations, borrows, swaps)

