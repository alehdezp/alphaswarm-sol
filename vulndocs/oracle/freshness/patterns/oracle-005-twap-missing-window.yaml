attack_scenarios:
  - name: "Multi-Block TWAP Manipulation (MMEV Attack)"
    description: |
      Attacker uses Multi-block MEV (MMEV) or selfish mining to control consecutive
      blocks, manipulating TWAP price across multiple blocks at fraction of assumed cost.
    preconditions:
      - TWAP oracle with fixed window parameter (< 30 minutes typically vulnerable)
      - Low liquidity pool (manipulation cost inversely proportional to liquidity)
      - No configurable window to increase security for at-risk assets
      - Attacker can mine/propose 2+ consecutive blocks (via selfish mining or MEV)
    steps:
      - Identify TWAP oracle with short fixed window (e.g., 10-20 minutes)
      - Calculate manipulation cost: (target_price_shift × liquidity) / window_blocks
      - Borrow flash loan for liquidity manipulation capital
      - Mine/propose Block N: Execute massive swap to shift pool price
      - Mine/propose Block N+1: Hold manipulated price (don't revert)
      - Continue for required blocks to shift TWAP average
      - TWAP now reflects manipulated average over window period
      - Execute exploit: Borrow/mint against inflated TWAP valuation
      - Unwind manipulation: Reverse swap or let arbitrageurs restore price
      - Profit: Keep over-borrowed funds; protocol left with bad debt
    impact: |
      Protocol loss proportional to TWAP manipulation magnitude.
      Indexed Finance: $16M loss with 30-min window manipulation.
      Cost to attacker: $10K-$50K via MMEV (research-proven, not theoretical).
    cvss: 8.5

  - name: "Flash Loan + Low Liquidity Pool Manipulation"
    description: |
      Attacker exploits low-liquidity pools with insufficient TWAP windows to
      manipulate price with flash loan capital at economically viable cost.
    preconditions:
      - TWAP oracle reading from low-liquidity pool (< $10M TVL)
      - Fixed short TWAP window (cannot be increased for risky assets)
      - Protocol uses TWAP for critical operations (lending, collateral valuation)
      - No liquidity-aware minimum window enforcement
    steps:
      - Identify low-liquidity pool with TWAP oracle (easier to manipulate)
      - Calculate required manipulation: window × blocks × price_impact
      - Borrow flash loan (Aave, dYdX, Balancer) for manipulation capital
      - Execute massive swap to skew pool reserves
      - Hold position across multiple blocks (via selfish mining or MEV bribes)
      - TWAP shifts due to sustained price manipulation over window period
      - Interact with protocol using manipulated TWAP price
      - If borrowing: Over-borrow against inflated TWAP collateral value
      - If minting: Mint assets at favorable manipulated TWAP rate
      - Unwind manipulation: Close position, repay flash loan
      - Net profit: Exploited value minus manipulation cost
    impact: |
      Rari Capital Fuse: $80M exploited via low-liquidity pool TWAP manipulation.
      Warp Finance: $8M via flash loan + TWAP manipulation (first major case).
    cvss: 8.3

  - name: "L2 TWAP Manipulation (Lower Cost Attack)"
    description: |
      On L2 rollups (Optimism, Arbitrum, Base), TWAP manipulation costs are ~10x
      lower than mainnet due to centralized sequencing and lower block time variance.
    preconditions:
      - Protocol deployed on L2 (Optimism, Arbitrum, Base, Polygon PoS, etc.)
      - TWAP oracle with fixed mainnet-calibrated window (not adjusted for L2)
      - L2 sequencer control allows easier consecutive block manipulation
      - No chain-specific window adjustment (same parameters as mainnet)
    steps:
      - Identify TWAP oracle on L2 with mainnet-equivalent window settings
      - Note: L2 block times more predictable; sequencer centralization
      - Calculate reduced manipulation cost on L2 (~10x cheaper than mainnet)
      - Execute manipulation attack with lower capital requirements
      - L2 sequencer processes consecutive transactions more predictably
      - TWAP manipulation succeeds at fraction of mainnet cost
      - Exploit protocol using manipulated L2 TWAP oracle
    impact: |
      Hundred Finance on Optimism: $7M stolen via L2 TWAP manipulation.
      L2 manipulation cost research: 10x cheaper than mainnet (Chaos Labs).
      Fixed windows designed for mainnet security are insufficient on L2.
    cvss: 8.2

  - name: "Asset Volatility Mismatch Exploitation"
    description: |
      Attacker exploits hardcoded TWAP windows that don't match asset volatility
      characteristics, using either too-short windows (volatile assets) or
      too-long windows (creating arbitrage opportunities).
    preconditions:
      - Single fixed TWAP window used for all assets (volatile and stable)
      - Volatile asset (ETH, BTC) with window too short (< 30 min)
      - OR stable asset (USDC) with window too long (> 1 hour)
      - No asset-specific window configuration capability
    steps:
      - For volatile assets with short windows:
        - Execute multi-block manipulation during normal volatility
        - Manipulated TWAP appears as "normal" price movement
        - Over-borrow against inflated volatile asset collateral
      - For stable assets with long windows:
        - Wait for real market price deviation from stale TWAP
        - Execute arbitrage between stale TWAP and real market price
        - Protocol leaks value via stale pricing arbitrage
    impact: |
      Volatile assets need 30-60 min windows; stable assets can use 1-24 hours.
      Fixed windows create vulnerability on one end of the spectrum.
      Either security vulnerability (too short) or value leakage (too long).
    cvss: 7.8

  - name: "Empty Pool Initialization Attack"
    description: |
      Attacker creates new low-liquidity pool, manipulates initial TWAP with
      minimal capital, then exploits protocol using manipulated oracle data.
    preconditions:
      - Protocol allows adding new oracle sources (permissionless or governance)
      - TWAP oracle reads from newly created pools
      - Fixed short TWAP window cannot be increased for new untrusted pools
      - No minimum liquidity threshold for oracle source validity
    steps:
      - Deploy new token pair with minimal initial liquidity ($1K-$10K)
      - Execute trades to establish manipulated TWAP at favorable price
      - Wait for TWAP window period (e.g., 30 minutes) with manipulated price
      - TWAP now reflects attacker-controlled price with minimal cost
      - Add manipulated pool as oracle source to protocol (if permissionless)
      - OR wait for governance to add pool as oracle source
      - Exploit protocol using manipulated TWAP from low-liquidity pool
      - Borrow/mint against inflated TWAP valuation
    impact: |
      Hundred Finance component: Empty pool attack enabled by fixed TWAP windows.
      Manipulation cost for new pool: $1K-$10K vs $50K+ for established pools.
      Demonstrates need for liquidity-aware minimum window requirements.
    cvss: 8.0

verification_steps:
  - "Identify TWAP oracle read in function (Uniswap consult, observe, price0CumulativeLast, etc.)"
  - "Verify function is externally callable or internal state-changing (not view/pure)"
  - "Check function parameters for window/period configuration:"
  - "  - Look for: secondsAgo, window, period, interval, twapWindow parameters"
  - "  - Look for: uint32[] calldata secondsAgos (Uniswap V3 multi-period)"
  - "  - Look for: mapping-based asset-specific window configuration"
  - "If NO window parameter found, check if hardcoded in function body:"
  - "  - Search for: oracle.consult(token, HARDCODED_VALUE)"
  - "  - Search for: uint32[] memory secondsAgos = new uint32[](2); secondsAgos[0] = HARDCODED"
  - "  - If hardcoded constant found, this is a TRUE POSITIVE vulnerability"
  - "Assess window value if hardcoded:"
  - "  - < 10 minutes: CRITICAL - Vulnerable to flash loan + multi-block manipulation"
  - "  - 10-30 minutes: HIGH - Vulnerable to MMEV attacks ($10K-$50K cost)"
  - "  - 30-60 minutes: MEDIUM - Requires significant capital but still feasible"
  - "  - > 60 minutes: May cause staleness/arbitrage issues (different vulnerability)"
  - "Check deployment environment:"
  - "  - L2 deployment? Needs longer windows (~2-3x mainnet) or liquidity threshold"
  - "  - Mainnet? Standard windows apply (30+ min for security)"
  - "Assess asset characteristics:"
  - "  - Volatile asset (ETH, BTC, major tokens): Needs 30-60 min window minimum"
  - "  - Stable asset (USDC, DAI, USDT): Can use 1-24 hour window"
  - "  - Low liquidity asset: Needs longer window (inversely proportional to liquidity)"
  - "Check pool liquidity from TWAP source:"
  - "  - < $1M TVL: Needs 60+ min window minimum (easily manipulated)"
  - "  - $1M-$10M TVL: Needs 30-60 min window"
  - "  - $10M-$100M TVL: Can use 20-30 min window"
  - "  - > $100M TVL: Can use 10-20 min window (high manipulation cost)"
  - "Verify no governance/admin function to update window parameter"
  - "If all checks confirm missing configurable window, this is CONFIRMED VULNERABILITY"

fix_recommendations:
  - name: "Add Window Parameter to Function (Minimum Viable Fix)"
    description: |
      Make TWAP window configurable by adding parameter to function signature.
      This is the MINIMUM fix to enable proper TWAP security.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      interface IUniswapV3Pool {
          function observe(uint32[] calldata secondsAgos)
              external
              view
              returns (int56[] memory tickCumulatives, uint160[] memory secondsPerLiquidityCumulativeX128s);
      }

      contract VulnerableTWAPConsumer {
          IUniswapV3Pool public pool;

          // BEFORE (VULNERABLE) - Hardcoded 30-minute window
          // function getTWAPPrice() public view returns (uint256) {
          //     uint32[] memory secondsAgos = new uint32[](2);
          //     secondsAgos[0] = 1800; // 30 minutes - HARDCODED!
          //     secondsAgos[1] = 0;
          //     (int56[] memory tickCumulatives, ) = pool.observe(secondsAgos);
          //     int56 tickCumulativeDelta = tickCumulatives[1] - tickCumulatives[0];
          //     int24 avgTick = int24(tickCumulativeDelta / 1800);
          //     return _getQuoteAtTick(avgTick);
          // }

          // AFTER (FIXED) - Configurable window parameter
          function getTWAPPrice(uint32 twapWindow) public view returns (uint256) {
              require(twapWindow >= 600, "TWAP: window too short"); // Min 10 minutes

              uint32[] memory secondsAgos = new uint32[](2);
              secondsAgos[0] = twapWindow; // CONFIGURABLE!
              secondsAgos[1] = 0;

              (int56[] memory tickCumulatives, ) = pool.observe(secondsAgos);
              int56 tickCumulativeDelta = tickCumulatives[1] - tickCumulatives[0];
              int24 avgTick = int24(tickCumulativeDelta / int56(uint56(twapWindow)));

              return _getQuoteAtTick(avgTick);
          }

          function _getQuoteAtTick(int24 tick) internal pure returns (uint256) {
              // Price calculation from tick (simplified)
              return uint256(1.0001 ** tick);
          }
      }

  - name: "Asset-Specific Window Configuration (Recommended)"
    description: |
      Implement governance-controlled per-asset minimum TWAP windows based on
      liquidity, volatility, and risk profile. Production-grade approach.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts/access/Ownable.sol";

      contract ProductionTWAPOracle is Ownable {
          IUniswapV3Pool public pool;

          // Asset-specific minimum windows (governance-controlled)
          mapping(address => uint32) public assetMinimumWindows;

          // Default minimum window for unconfigured assets
          uint32 public defaultMinimumWindow = 1800; // 30 minutes

          // Maximum window to prevent staleness
          uint32 public constant MAX_WINDOW = 24 hours;

          event MinimumWindowUpdated(address indexed asset, uint32 newWindow);
          event DefaultWindowUpdated(uint32 newWindow);

          constructor(address _pool) {
              pool = IUniswapV3Pool(_pool);
          }

          /**
           * @notice Set minimum TWAP window for specific asset
           * @dev Governance-controlled; allows per-asset risk calibration
           */
          function setAssetMinimumWindow(address asset, uint32 minimumWindow) external onlyOwner {
              require(minimumWindow >= 600, "Window < 10 min");
              require(minimumWindow <= MAX_WINDOW, "Window too long");
              assetMinimumWindows[asset] = minimumWindow;
              emit MinimumWindowUpdated(asset, minimumWindow);
          }

          /**
           * @notice Set default minimum window for unconfigured assets
           */
          function setDefaultMinimumWindow(uint32 minimumWindow) external onlyOwner {
              require(minimumWindow >= 600, "Window < 10 min");
              require(minimumWindow <= MAX_WINDOW, "Window too long");
              defaultMinimumWindow = minimumWindow;
              emit DefaultWindowUpdated(minimumWindow);
          }

          /**
           * @notice Get TWAP price with asset-specific minimum window enforcement
           * @param asset The asset to price
           * @param requestedWindow The requested TWAP window
           */
          function getTWAPPrice(address asset, uint32 requestedWindow) public view returns (uint256) {
              // Get asset-specific minimum or default
              uint32 minimumWindow = assetMinimumWindows[asset];
              if (minimumWindow == 0) {
                  minimumWindow = defaultMinimumWindow;
              }

              // Enforce minimum window (security requirement)
              require(requestedWindow >= minimumWindow, "TWAP: window below minimum");
              require(requestedWindow <= MAX_WINDOW, "TWAP: window too long");

              // Query TWAP with validated window
              uint32[] memory secondsAgos = new uint32[](2);
              secondsAgos[0] = requestedWindow;
              secondsAgos[1] = 0;

              (int56[] memory tickCumulatives, ) = pool.observe(secondsAgos);
              int56 tickCumulativeDelta = tickCumulatives[1] - tickCumulatives[0];
              int24 avgTick = int24(tickCumulativeDelta / int56(uint56(requestedWindow)));

              return _getQuoteAtTick(avgTick);
          }

          function _getQuoteAtTick(int24 tick) internal pure returns (uint256) {
              // Simplified for example
              return uint256(uint24(tick));
          }
      }

  - name: "Multi-Window TWAP with Deviation Check (Best Practice)"
    description: |
      Query multiple TWAP windows (10min, 30min, 1hr) and use circuit breaker
      if deviation exceeds threshold. Detects manipulation attempts in real-time.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@openzeppelin/contracts/access/Ownable.sol";

      contract MultiWindowTWAPOracle is Ownable {
          IUniswapV3Pool public pool;

          // Multiple window periods for cross-validation
          uint32 public constant SHORT_WINDOW = 600;   // 10 minutes
          uint32 public constant MEDIUM_WINDOW = 1800; // 30 minutes
          uint32 public constant LONG_WINDOW = 3600;   // 1 hour

          // Maximum allowed deviation between windows (basis points)
          uint256 public maxDeviationBps = 500; // 5%

          event PriceDeviationDetected(uint256 shortPrice, uint256 mediumPrice, uint256 longPrice);
          event MaxDeviationUpdated(uint256 newMaxBps);

          constructor(address _pool) {
              pool = IUniswapV3Pool(_pool);
          }

          function setMaxDeviation(uint256 newMaxBps) external onlyOwner {
              require(newMaxBps > 0 && newMaxBps <= 2000, "Invalid deviation"); // Max 20%
              maxDeviationBps = newMaxBps;
              emit MaxDeviationUpdated(newMaxBps);
          }

          /**
           * @notice Get TWAP price with multi-window validation
           * @dev Queries 3 windows; reverts if deviation exceeds threshold
           * @return Most conservative (lowest) price among validated windows
           */
          function getValidatedTWAPPrice() public view returns (uint256) {
              // Query all three windows
              uint256 shortPrice = _getTWAPForWindow(SHORT_WINDOW);
              uint256 mediumPrice = _getTWAPForWindow(MEDIUM_WINDOW);
              uint256 longPrice = _getTWAPForWindow(LONG_WINDOW);

              // Calculate max deviation among windows
              uint256 maxPrice = _max3(shortPrice, mediumPrice, longPrice);
              uint256 minPrice = _min3(shortPrice, mediumPrice, longPrice);
              uint256 deviationBps = ((maxPrice - minPrice) * 10000) / maxPrice;

              // CIRCUIT BREAKER: Revert if deviation too high (manipulation suspected)
              if (deviationBps > maxDeviationBps) {
                  emit PriceDeviationDetected(shortPrice, mediumPrice, longPrice);
                  revert("TWAP: price deviation exceeded");
              }

              // Return most conservative (lowest) price
              // Protects against manipulation in shorter windows
              return minPrice;
          }

          function _getTWAPForWindow(uint32 window) internal view returns (uint256) {
              uint32[] memory secondsAgos = new uint32[](2);
              secondsAgos[0] = window;
              secondsAgos[1] = 0;

              (int56[] memory tickCumulatives, ) = pool.observe(secondsAgos);
              int56 tickCumulativeDelta = tickCumulatives[1] - tickCumulatives[0];
              int24 avgTick = int24(tickCumulativeDelta / int56(uint56(window)));

              return _getQuoteAtTick(avgTick);
          }

          function _getQuoteAtTick(int24 tick) internal pure returns (uint256) {
              // Simplified
              return uint256(uint24(tick));
          }

          function _max3(uint256 a, uint256 b, uint256 c) internal pure returns (uint256) {
              return a > b ? (a > c ? a : c) : (b > c ? b : c);
          }

          function _min3(uint256 a, uint256 b, uint256 c) internal pure returns (uint256) {
              return a < b ? (a < c ? a : c) : (b < c ? b : c);
          }
      }

  - name: "Liquidity-Aware Dynamic Window Sizing (Advanced)"
    description: |
      Dynamically adjust TWAP window based on pool liquidity. Low liquidity pools
      require longer windows to resist manipulation. Advanced security feature.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract LiquidityAwareTWAPOracle {
          IUniswapV3Pool public pool;

          // Liquidity tiers and corresponding minimum windows
          struct LiquidityTier {
              uint256 minLiquidity; // Minimum liquidity for this tier
              uint32 minimumWindow; // Required TWAP window
          }

          LiquidityTier[] public liquidityTiers;

          constructor(address _pool) {
              pool = IUniswapV3Pool(_pool);

              // Configure liquidity-based window requirements
              // Lower liquidity = longer window to resist manipulation
              liquidityTiers.push(LiquidityTier({
                  minLiquidity: 100_000_000e18, // $100M+
                  minimumWindow: 600            // 10 min
              }));
              liquidityTiers.push(LiquidityTier({
                  minLiquidity: 10_000_000e18,  // $10M-$100M
                  minimumWindow: 1800           // 30 min
              }));
              liquidityTiers.push(LiquidityTier({
                  minLiquidity: 1_000_000e18,   // $1M-$10M
                  minimumWindow: 3600           // 1 hour
              }));
              liquidityTiers.push(LiquidityTier({
                  minLiquidity: 0,              // < $1M
                  minimumWindow: 7200           // 2 hours
              }));
          }

          /**
           * @notice Get TWAP with liquidity-aware window enforcement
           * @dev Queries pool liquidity; enforces longer windows for low liquidity
           */
          function getTWAPPrice(uint32 requestedWindow) public view returns (uint256) {
              // Get current pool liquidity
              uint128 liquidity = pool.liquidity();

              // Determine required minimum window based on liquidity
              uint32 requiredMinimum = _getRequiredWindowForLiquidity(liquidity);

              // Enforce minimum window based on liquidity risk
              require(
                  requestedWindow >= requiredMinimum,
                  "TWAP: window insufficient for liquidity"
              );

              // Query TWAP with validated window
              return _getTWAPForWindow(requestedWindow);
          }

          function _getRequiredWindowForLiquidity(uint128 liquidity) internal view returns (uint32) {
              // Find appropriate tier based on current liquidity
              for (uint256 i = 0; i < liquidityTiers.length; i++) {
                  if (liquidity >= liquidityTiers[i].minLiquidity) {
                      return liquidityTiers[i].minimumWindow;
                  }
              }
              // Fallback: lowest tier (longest window)
              return liquidityTiers[liquidityTiers.length - 1].minimumWindow;
          }

          function _getTWAPForWindow(uint32 window) internal view returns (uint256) {
              uint32[] memory secondsAgos = new uint32[](2);
              secondsAgos[0] = window;
              secondsAgos[1] = 0;

              (int56[] memory tickCumulatives, ) = pool.observe(secondsAgos);
              int56 tickCumulativeDelta = tickCumulatives[1] - tickCumulatives[0];
              int24 avgTick = int24(tickCumulativeDelta / int56(uint56(window)));

              return _getQuoteAtTick(avgTick);
          }

          function _getQuoteAtTick(int24 tick) internal pure returns (uint256) {
              return uint256(uint24(tick));
          }
      }

  - name: "Recommended TWAP Window Guidelines"
    description: |
      Industry best practices for TWAP window configuration based on research,
      exploits, and academic analysis (2020-2025).
    example: |
      # TWAP Window Configuration Guidelines (2025)
      # Based on: Academic research, real exploits, Chaos Labs analysis

      ## By Asset Volatility

      Volatile Assets (ETH, BTC, major DeFi tokens):
        - Minimum window: 30 minutes (mainnet) / 60 minutes (L2)
        - Recommended: 45-60 minutes
        - Maximum: 2 hours (avoid excessive staleness)
        - Rationale: Resist MMEV attacks ($10K-$50K cost proven)

      Stable Assets (USDC, USDT, DAI):
        - Minimum window: 30 minutes (safety floor)
        - Recommended: 1-4 hours
        - Maximum: 24 hours
        - Rationale: Less volatile; can tolerate longer windows

      Exotic/Low Volume Assets:
        - Minimum window: 1-2 hours
        - Recommended: 2-4 hours
        - Must consider liquidity-aware sizing
        - Rationale: More susceptible to manipulation

      ## By Pool Liquidity (TVL)

      < $1M TVL:   Minimum 60-120 minutes (highly vulnerable)
      $1M-$10M:    Minimum 30-60 minutes
      $10M-$100M:  Minimum 20-30 minutes
      > $100M:     Minimum 10-20 minutes (high manipulation cost)

      ## By Deployment Chain

      Ethereum Mainnet:
        - Base windows apply (30+ min for security)
        - MEV infrastructure mature; MMEV attacks proven feasible

      L2 Rollups (Optimism, Arbitrum, Base):
        - Multiply mainnet windows by 2-3x
        - Centralized sequencing = easier consecutive block control
        - Research: ~10x cheaper manipulation than mainnet
        - Minimum: 60 minutes even for high-liquidity pools

      Alternative L1s (Binance Smart Chain, Polygon PoS):
        - Assess block time and validator centralization
        - More centralized = longer windows required
        - Minimum: 45-60 minutes

      ## Implementation Checklist

      ✅ Configurable window parameter (not hardcoded)
      ✅ Per-asset minimum window mapping
      ✅ Governance-controlled with timelock
      ✅ Liquidity-aware dynamic sizing (optional but recommended)
      ✅ Multi-window deviation check (10min, 30min, 1hr)
      ✅ Circuit breaker if windows disagree > 5%
      ✅ Observation cardinality check (Uniswap V3)
      ✅ Chain-specific calibration (L1 vs L2)
      ✅ Event emission for monitoring
      ✅ Emergency pause if manipulation suspected

      ## Academic References

      "TWAP Oracle Attacks: Easier Done than Said?" (2022)
      - Proves MMEV makes 30-min TWAP manipulation cost $10K-$50K
      - Recommendation: 30+ minute windows minimum
      - https://eprint.iacr.org/2022/445.pdf

      Euler Finance TWAP Research (2021)
      - Cost analysis for Uniswap V3 manipulation
      - https://github.com/euler-xyz/uni-v3-twap-manipulation

      Chaos Labs Market Risk Assessment (2023)
      - L2 manipulation ~10x cheaper than mainnet
      - https://chaoslabs.xyz/posts/chaos-labs-uniswap-v3-twap-market-risk

