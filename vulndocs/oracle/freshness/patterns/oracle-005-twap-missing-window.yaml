# Auditor Guidance
auditor_notes: |
  This pattern identifies VULNERABLE TWAP oracle usage. When this pattern matches:

  🚨 VULNERABILITY DETECTED: TWAP oracle read WITHOUT configurable window parameter
  ⚠️ EXPLOITATION RISK: Multi-block manipulation proven at $10K-$50K cost (MMEV attacks)
  🔍 VERIFY: Check if window is truly hardcoded or passed from caller
  📊 ASSESS IMPACT: Determine pool liquidity, asset volatility, deployment chain

  IMMEDIATE FOLLOW-UP ACTIONS:
  1. Verify window is hardcoded (not configurable via parameter or governance)
  2. Identify TWAP source (Uniswap V2, V3, other) and pool liquidity
  3. Assess hardcoded window value (< 30 min = CRITICAL; 30-60 min = HIGH)
  4. Check deployment chain (L2 = higher risk; needs 2-3x longer windows)
  5. Calculate manipulation cost based on liquidity and window
  6. Recommend asset-specific configurable windows with governance control

  COMMON FALSE POSITIVES:
  - Internal helper that receives window from external caller
  - View functions used only for display (excluded by pattern)
  - Test contracts or mock oracles (check contract context)

  SEVERITY ESCALATION:
  - CRITICAL: Hardcoded window < 30 min on low-liquidity pool (< $10M TVL)
  - HIGH: Hardcoded window < 60 min on L2 or < $100M liquidity pool
  - MEDIUM: Hardcoded window 30-60 min on high-liquidity mainnet pool (> $100M)

  L2 DEPLOYMENT ALERT:
  - Optimism/Arbitrum/Base: Manipulation ~10x cheaper than mainnet
  - Require 2-3x longer windows than equivalent mainnet deployment
  - Missing window parameter on L2 = automatic severity upgrade

