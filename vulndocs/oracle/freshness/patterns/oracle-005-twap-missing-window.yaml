# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must read TWAP oracle data
    - property: reads_twap
      op: eq
      value: true

    # Must perform oracle read operation (semantic detection)
    - has_operation: READS_ORACLE

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Must NOT have window parameter (this is the vulnerability)
    - property: has_twap_window_parameter
      op: eq
      value: true

    # Exclude view functions (they don't execute exploitable transactions)
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't read oracle anyway)
    - property: is_pure
      op: eq
      value: true

