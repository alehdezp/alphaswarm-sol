attack_scenarios:
  - name: "Stale Price Exploitation During Market Crash"
    description: |
      Attacker monitors oracle update delays and exploits stale high prices
      during rapid market crashes to borrow maximum funds before price updates.
    preconditions:
      - Oracle price feed experiences delayed updates (network congestion, node downtime)
      - Protocol accepts oracle data without `updatedAt` timestamp validation
      - Market price crashes significantly while oracle shows stale high price
    steps:
      - Monitor oracle update frequency; identify assets with delayed updates
      - Wait for market crash event (e.g., LUNA, FTX collapse, flash crash)
      - Oracle price remains high ($100) while real market crashes to $10
      - Attacker deposits collateral; oracle values it at stale $100 price
      - Borrow maximum against inflated collateral valuation
      - Oracle finally updates to $10; attacker's position now massively underwater
      - Protocol left with bad debt; attacker keeps borrowed funds
    impact: "Bad debt creation, protocol insolvency, unfair over-borrowing"
    cvss: 8.1

  - name: "Liquidation Exploitation via Stale Low Prices"
    description: |
      Attacker exploits stale low oracle prices to liquidate healthy positions
      at unfair valuations, acquiring collateral at fraction of market value.
    preconditions:
      - Oracle update delay causes stale low price
      - Protocol uses oracle for liquidation price checks
      - No staleness validation before liquidation execution
    steps:
      - Identify oracle with delayed updates showing stale low price
      - Real market price is $100, oracle shows stale $80
      - Target user has healthy collateral at real $100 price
      - Trigger liquidation using stale $80 oracle price
      - Acquire user's collateral at $80 valuation (20% discount)
      - Sell collateral at real $100 market price for instant profit
    impact: "Unfair liquidations, user fund loss, liquidator profit from staleness"
    cvss: 7.8

  - name: "L2 Sequencer Downtime Exploitation"
    description: |
      On L2 rollups (Arbitrum, Optimism), sequencer downtime freezes oracle updates.
      Attackers exploit first blocks after restart with stale pre-downtime prices.
    preconditions:
      - Protocol deployed on L2 (Arbitrum, Optimism, Base, zkSync, etc.)
      - L2 sequencer experiences downtime (maintenance, outage, congestion)
      - No sequencer uptime check or grace period validation
      - No staleness check to detect multi-hour delays
    steps:
      - L2 sequencer goes down; oracle stops updating (frozen at pre-downtime price)
      - Market price moves significantly during downtime (e.g., 6 hours)
      - Sequencer restarts; blocks resume processing
      - Attacker executes transaction in first blocks with stale oracle price
      - If market went up: Over-borrow against undervalued stale collateral price
      - If market went down: Liquidate positions using inflated stale price
      - Oracle updates after several blocks; attacker has already extracted value
    impact: "Stale price exploitation during L2 sequencer restart window"
    cvss: 8.3

  - name: "Arbitrage Between Stale Oracle and Real Market"
    description: |
      Attacker executes arbitrage trades exploiting price gap between stale
      oracle and real-time market prices on DEXes.
    preconditions:
      - Protocol uses oracle for swap pricing or collateral valuation
      - Oracle update frequency is low (1h+ for Chainlink, 24h+ for some feeds)
      - No staleness validation allows acceptance of outdated prices
      - Real market has moved significantly from last oracle update
    steps:
      - Monitor oracle update timestamps; identify stale feeds
      - Detect price divergence: Oracle shows $1000, market shows $950
      - Use protocol swap/mint at stale $1000 oracle price
      - Immediately sell output on DEX at real $950 market price
      - Repeat arbitrage until oracle updates or profit maximized
      - Protocol loses value to arbitrageur due to stale pricing
    impact: "Protocol value extraction via oracle-market arbitrage"
    cvss: 7.5

  - name: "Oracle Heartbeat Exploitation"
    description: |
      Chainlink oracles update only when price moves >threshold OR heartbeat
      interval expires (e.g., 1h ETH, 24h stablecoins). Attackers exploit
      heartbeat gaps during sideways markets.
    preconditions:
      - Oracle has long heartbeat interval (24h for stable assets)
      - Market price moves slowly, not triggering deviation threshold
      - Protocol accepts stale price from hours/days ago
      - No staleness check enforces maximum age limit
    steps:
      - Identify oracle with 24h heartbeat (e.g., stablecoin feed)
      - Monitor for 23h59m without update (within heartbeat)
      - Real market price drifts from $1.00 → $0.98 (below deviation threshold)
      - Oracle still shows stale $1.00 from 23h ago
      - Execute operation using favorable stale $1.00 price
      - Profit from 2% price gap exploited via staleness
    impact: "Exploitation of oracle heartbeat intervals for price arbitrage"
    cvss: 7.2

