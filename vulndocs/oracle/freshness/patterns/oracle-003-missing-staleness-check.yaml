test_coverage:
  projects: [oracle-price]
  true_positives: 7
  true_negatives: 11
  edge_cases: 5
  precision: 1.0
  recall: 1.0
  variation_score: 1.0
  last_tested: "2025-12-31"
  notes: |
    EXCELLENT rating achieved - perfect precision, recall, and variation scores.

    True Positives (7):
      - liquidateUser(address): Liquidation without staleness check
      - borrow(uint256): Borrow limit calculation without staleness check
      - updateStoredPrice(): Internal price storage without staleness check
      - swapAtOraclePrice(uint256): Swap with only answer check, no staleness
      - calculateFees(uint256): Fee calculation with unrelated checks, no staleness
      - getPriceEmitsEvent(): Emits updatedAt but doesn't validate it
      - getPriceStoresTimestamp(): Stores updatedAt but doesn't validate it

    True Negatives (11):
      - All functions with staleness checks correctly NOT flagged
      - liquidateUserSafe(address), borrowSafe(uint256): State-changing with checks
      - All oracle-001 safe patterns (getPriceWithStalenessCheck, etc.)

    Edge Cases (5):
      - View functions correctly excluded by design (display-only, not exploitable)
      - Pure functions correctly excluded (no oracle access)
      - Helper functions without direct oracle read correctly excluded

    Variations (3/3):
      - Different comparison operators (<=, <, >) ✓
      - Hardcoded vs constant thresholds ✓
      - Multiple redundant staleness checks ✓

    Design Decision: Pattern intentionally excludes view functions because they don't
    execute state-changing transactions that could be exploited. The vulnerability
    exists in non-view functions that USE stale oracle data for critical operations
    (liquidations, borrows, swaps, fee calculations).

    Known Limitations:
      - if-revert patterns (not detected by require_exprs) may be flagged as vulnerable
      - Custom error patterns may be flagged as vulnerable
      - These are acceptable as require() is the standard Solidity pattern

