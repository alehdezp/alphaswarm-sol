fix_recommendations:
  - name: "Add Basic Staleness Check (Minimum Viable Fix)"
    description: |
      Implement minimum staleness validation using Chainlink latestRoundData
      return values. This is the MINIMUM fix for this vulnerability.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";

      contract VulnerableContract {
          AggregatorV3Interface public priceFeed;

          // BEFORE (VULNERABLE) - Missing staleness check
          // function getPrice() public view returns (uint256) {
          //     (, int256 answer, , , ) = priceFeed.latestRoundData();
          //     return uint256(answer);
          // }

          // AFTER (FIXED) - With staleness check
          uint256 public constant STALENESS_THRESHOLD = 1 hours;

          function getPrice() public view returns (uint256) {
              (
                  uint80 roundId,
                  int256 answer,
                  uint256 startedAt,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              // CRITICAL STALENESS CHECKS:
              require(updatedAt != 0, "Oracle: incomplete round");
              require(answer > 0, "Oracle: invalid price");
              require(
                  block.timestamp - updatedAt <= STALENESS_THRESHOLD,
                  "Oracle: stale price"
              );
              require(answeredInRound >= roundId, "Oracle: stale round");

              return uint256(answer);
          }
      }

  - name: "Enhanced Staleness Check with L2 Sequencer Support"
    description: |
      Production-grade fix with L2 sequencer uptime validation and configurable
      staleness thresholds. Required for L2 deployments (Arbitrum, Optimism, Base).
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract EnhancedOracleConsumer is Ownable {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed; // L2 only

          uint256 public stalenessThreshold = 1 hours;
          uint256 public constant GRACE_PERIOD_TIME = 1 hours; // L2 restart grace

          event StaleDataDetected(uint256 updatedAt, uint256 threshold);
          event SequencerDown();

          constructor(
              address _priceFeed,
              address _sequencerUptimeFeed // address(0) for L1
          ) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              if (_sequencerUptimeFeed != address(0)) {
                  sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
              }
          }

          function setStalenessThreshold(uint256 _threshold) external onlyOwner {
              require(_threshold > 0, "Invalid threshold");
              stalenessThreshold = _threshold;
          }

          function getPrice() public view returns (uint256) {
              // L2 SEQUENCER CHECK (Arbitrum, Optimism, Base, etc.)
              if (address(sequencerUptimeFeed) != address(0)) {
                  _checkSequencerUptime();
              }

              // FETCH ORACLE DATA
              (
                  uint80 roundId,
                  int256 answer,
                  uint256 startedAt,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              // VALIDATION 1: Completeness
              require(updatedAt != 0, "Oracle: incomplete round");

              // VALIDATION 2: Positive price
              require(answer > 0, "Oracle: invalid price");

              // VALIDATION 3: Staleness check (THE FIX FOR THIS VULNERABILITY)
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Oracle: stale price"
              );

              // VALIDATION 4: Round consistency (Chainlink-specific)
              require(answeredInRound >= roundId, "Oracle: stale round");

              return uint256(answer);
          }

          function _checkSequencerUptime() internal view {
              (
                  ,
                  int256 answer,
                  uint256 startedAt,
                  ,
              ) = sequencerUptimeFeed.latestRoundData();

              // Check if sequencer is up (answer == 0 means up)
              require(answer == 0, "Sequencer: down");

              // Check if enough time has passed since restart
              require(
                  block.timestamp - startedAt > GRACE_PERIOD_TIME,
                  "Sequencer: grace period"
              );
          }
      }

  - name: "Multi-Source Oracle with Circuit Breaker"
    description: |
      Production-grade oracle with primary/fallback sources and deviation
      circuit breaker. Best practice for high-value protocols.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract ProductionOracle is Ownable {
          AggregatorV3Interface public primaryFeed;
          AggregatorV3Interface public fallbackFeed;

          uint256 public stalenessThreshold = 1 hours;
          uint256 public maxDeviationBps = 500; // 5% in basis points

          event FallbackUsed(string reason);
          event PriceDeviationDetected(uint256 primary, uint256 fallback);
          event StaleDataRejected(uint256 updatedAt);

          constructor(address _primary, address _fallback) {
              primaryFeed = AggregatorV3Interface(_primary);
              fallbackFeed = AggregatorV3Interface(_fallback);
          }

          function getPrice() public view returns (uint256) {
              uint256 primaryPrice = _getPriceFromFeed(primaryFeed);
              uint256 fallbackPrice = _getPriceFromFeed(fallbackFeed);

              // CIRCUIT BREAKER: Deviation check
              uint256 deviation = _calculateDeviation(primaryPrice, fallbackPrice);
              if (deviation > maxDeviationBps) {
                  emit PriceDeviationDetected(primaryPrice, fallbackPrice);
                  // Use more conservative price (lower)
                  return primaryPrice < fallbackPrice ? primaryPrice : fallbackPrice;
              }

              return primaryPrice;
          }

          function _getPriceFromFeed(
              AggregatorV3Interface feed
          ) internal view returns (uint256) {
              (
                  uint80 roundId,
                  int256 answer,
                  ,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = feed.latestRoundData();

              require(updatedAt != 0, "Incomplete round");
              require(answer > 0, "Invalid price");

              // STALENESS CHECK (CRITICAL FIX)
              if (block.timestamp - updatedAt > stalenessThreshold) {
                  emit StaleDataRejected(updatedAt);
                  revert("Stale price");
              }

              require(answeredInRound >= roundId, "Stale round");

              return uint256(answer);
          }

          function _calculateDeviation(
              uint256 price1,
              uint256 price2
          ) internal pure returns (uint256) {
              uint256 diff = price1 > price2 ? price1 - price2 : price2 - price1;
              return (diff * 10000) / (price1 > price2 ? price1 : price2);
          }
      }

  - name: "Staleness Thresholds by Asset Class"
    description: |
      Recommended staleness thresholds based on asset volatility and oracle
      update frequency. Use these as guidelines for appropriate STALENESS_THRESHOLD values.
    example: |
      # Chainlink Oracle Update Frequencies (2025)
      # Deviation threshold OR heartbeat interval (whichever comes first)

      # Volatile Assets (ETH, BTC, major tokens)
      ETH/USD:  0.5% deviation OR 1 hour heartbeat  → Use 1.5 hours staleness threshold
      BTC/USD:  0.5% deviation OR 1 hour heartbeat  → Use 1.5 hours staleness threshold
      LINK/USD: 1% deviation OR 1 hour heartbeat    → Use 1.5 hours staleness threshold

      # Stablecoins
      USDC/USD: 0.25% deviation OR 24 hours heartbeat → Use 25 hours staleness threshold
      USDT/USD: 0.25% deviation OR 24 hours heartbeat → Use 25 hours staleness threshold
      DAI/USD:  0.5% deviation OR 1 hour heartbeat    → Use 1.5 hours staleness threshold

      # Exotic/Low Volume Assets
      Custom:   Variable → Use 2x heartbeat as threshold

      # L2 Networks
      Arbitrum/Optimism: Add sequencer uptime check + grace period (1 hour)

      # Uniswap V3 TWAP
      TWAP window: Use window parameter as staleness threshold (e.g., 30 min TWAP → 30 min threshold)

      # Implementation Example:
      uint256 public constant STALENESS_ETH = 1.5 hours;
      uint256 public constant STALENESS_USDC = 25 hours;
      uint256 public constant STALENESS_EXOTIC = 3 hours;

      // Asset-specific staleness check
      mapping(address => uint256) public assetStalenessThresholds;

      function setStalenessThreshold(address asset, uint256 threshold) external onlyOwner {
          require(threshold > 0 && threshold <= 7 days, "Invalid threshold");
          assetStalenessThresholds[asset] = threshold;
      }

  - name: "Code References & Industry Standards"
    description: |
      Official documentation and best practices for oracle staleness validation.
    example: |
      # Chainlink Official Best Practices (2025):
      https://docs.chain.link/data-feeds/api-reference
      https://docs.chain.link/data-feeds/l2-sequencer-feeds
      https://docs.chain.link/data-feeds/historical-data

      # OWASP Smart Contract Security:
      SCWE-086: Missing Validation of Oracle Response Fields
      https://scs.owasp.org/SCWE/SCSVS-ORACLE/SCWE-086/

      # Audit Firm Recommendations:
      - Trail of Bits: "Use of Incorrect Block Number" (Stale oracle data)
      - OpenZeppelin: "Oracle Price Manipulation" (Missing staleness checks)
      - Consensys Diligence: "Stale Oracle Data" (updatedAt validation)

      # Key Validation Checklist:
      ✅ 1. updatedAt != 0           (complete data returned)
      ✅ 2. answer > 0               (valid price, not zero/negative)
      ✅ 3. block.timestamp - updatedAt < THRESHOLD (freshness check - THE FIX)
      ✅ 4. answeredInRound >= roundId (not stale round - Chainlink specific)
      ✅ 5. Sequencer uptime check   (L2 only - Arbitrum, Optimism, Base)
      ✅ 6. Deviation circuit breaker (multi-source validation)

      # Severity Justification:
      HIGH - Missing staleness checks have caused $200K+ (Venus), $888K (Rodeo),
      and $197M (Euler) in real-world exploits. Enables direct value extraction
      via stale price arbitrage, over-borrowing, and unfair liquidations.

