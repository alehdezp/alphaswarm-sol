# Pattern Classification
pattern_type: vulnerability
quality_indicator: false  # Indicates missing security validation
inverse_pattern: oracle-001  # Safe practice counterpart

# Auditor Guidance
auditor_notes: |
  This pattern identifies VULNERABLE oracle usage. When this pattern matches:

  🚨 VULNERABILITY DETECTED: Function reads oracle WITHOUT staleness check
  ⚠️ EXPLOITATION RISK: Stale prices can be exploited for arbitrage, over-borrowing, unfair liquidations
  🔍 VERIFY: Check if staleness validation exists in internal helper functions
  📊 ASSESS IMPACT: Determine if oracle is used for critical operations (pricing, liquidations, collateral)

  IMMEDIATE FOLLOW-UP ACTIONS:
  1. Verify no staleness check in current function or helper functions
  2. Identify oracle type (Chainlink, Uniswap TWAP, custom)
  3. Determine oracle update frequency and heartbeat interval
  4. Assess impact: What operations use this oracle data?
  5. Recommend appropriate staleness threshold based on asset volatility
  6. For L2 deployments, also require sequencer uptime check

  COMMON FALSE POSITIVES:
  - Internal helper functions that delegate staleness checking to caller
  - View functions used only for display (excluded by pattern)
  - Test contracts or mock oracles (check contract context)

  SEVERITY ESCALATION:
