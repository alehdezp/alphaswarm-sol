# =============================================================================
# PATTERN: oracle-003-missing-staleness-check
# =============================================================================
#
# VULNERABILITY PATTERN - Oracle Read Without Staleness Check
#
# This pattern identifies VULNERABLE oracle usage where contracts read oracle
# prices but FAIL to validate data freshness, allowing stale price exploitation.
#
# This is the VULNERABILITY counterpart to oracle-001 (safe pattern).
#
# =============================================================================

id: oracle-003
vulndoc: oracle/freshness
name: "Oracle Read Without Staleness Check"

description: |
  ## What This Detects
  Functions that read oracle prices but FAIL to implement staleness/freshness
  checks, allowing attackers to exploit stale (outdated) price data for profit.

  **This is a VULNERABILITY PATTERN - missing critical security validation.**

  ## Why It's Dangerous

  Oracle price feeds can become stale (outdated) due to:
  - Network congestion delaying oracle updates
  - Oracle node downtime or degraded performance
  - L2 sequencer downtime (Arbitrum, Optimism, etc.)
  - Oracle contract paused or deprecated
  - Market volatility exceeding update frequency
  - Chainlink oracle heartbeat intervals (1h for ETH, 24h for stable assets)

  **Without staleness checks, attackers can exploit the gap between real market
  prices and outdated oracle prices to:**
  - Borrow maximum against collateral at inflated stale valuations
  - Trigger unfair liquidations using stale low prices
  - Execute arbitrage between stale oracle price and real market price
  - Drain protocol funds via manipulated pricing
  - Create bad debt by over-borrowing before oracle updates

  ## Real-World Exploits

  ### Venus Protocol (May 2023): $200K Bad Debt
  - **Issue**: Protocol accepted stale LUNA oracle price during market crash
  - **Attack**: Market price crashed from $100 → $1; oracle showed stale $100
  - **Exploitation**: Users borrowed max against inflated stale collateral value
  - **Impact**: Oracle finally updated to crashed price; protocol left with $200K bad debt
  - **Missing safeguard**: No `block.timestamp - updatedAt < THRESHOLD` check
  - **Reference**: https://cointelegraph.com/news/venus-protocol-bad-debt-200k

  ### Rodeo Finance Exploit (July 2023): $888K Stolen
  - **Issue**: Oracle price accepted without `updatedAt` timestamp validation
  - **Attack**: Attacker monitored oracle staleness window; exploited price gap
  - **Exploitation**: Stale oracle showed $2000 while market was $1800; borrowed
    against inflated valuations
  - **Impact**: $888K drained via stale price arbitrage before oracle update
  - **Missing safeguard**: No staleness check on Chainlink `updatedAt` field
  - **Reference**: https://medium.com/@Rodeo_Finance/rodeo-post-mortem-overview

  ### Euler Finance (March 2023): $197M (Donation Attack)
  - **Issue**: ERC-4626 vault exchange rate used as price without freshness validation
  - **Attack**: Donation attack inflated exchange rate; protocol accepted stale rate
  - **Exploitation**: Attacker deposited directly to vault, spiked rate; borrowed max
  - **Impact**: $197M exploited via manipulated vault share pricing
  - **Missing safeguard**: No staleness check on vault rate; no rate-of-change limits
  - **Reference**: https://www.halborn.com/blog/post/explained-the-euler-finance-hack-march-2023

  ### Pattern Across Incidents
  All three attacks succeeded because:
  1. **No timestamp validation**: Missing `updatedAt` check
  2. **No staleness threshold**: No maximum age limit enforced
  3. **Silent acceptance**: Protocol used stale price without revert
  4. **Single point of failure**: No fallback oracle or circuit breaker

  ## What Constitutes a Proper Staleness Check

  **Minimum requirements (Tier 1 - Basic Protection):**
  - ✅ Check `updatedAt != 0` (oracle returned complete data)
  - ✅ Check `block.timestamp - updatedAt < STALENESS_THRESHOLD`
  - ✅ Revert or use fallback if stale

  **Recommended requirements (Tier 2 - Enhanced Protection):**
  - ✅ Validate `answeredInRound >= roundId` (Chainlink-specific)
  - ✅ Check `answer > 0` (price is positive and valid)
  - ✅ Use asset-appropriate thresholds (1h volatile, 24h stable)
  - ✅ L2 sequencer uptime check (Arbitrum/Optimism grace period)

  **Best practice requirements (Tier 3 - Production-Grade):**
  - ✅ Multi-source oracle aggregation (Chainlink + fallback)
  - ✅ Circuit breaker on price deviation (reject if sources disagree > X%)
  - ✅ Emit events on stale price detection for monitoring
  - ✅ Configurable staleness thresholds per asset class

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function performs oracle read operation (`has_operation: READS_ORACLE`)
  2. Function is externally callable (public/external/internal state-changing)
  3. Function LACKS staleness check (`has_staleness_check: false`)
  4. Function is NOT a view function (view functions don't execute transactions)

  **Rationale for exclusions:**
  - View functions are excluded because they don't execute state-changing transactions
    that could be exploited (e.g., liquidations, borrows, swaps)
  - View functions may read oracle data for display purposes only
  - The vulnerability exists in non-view functions that USE stale oracle data
    for critical operations (pricing, collateral valuation, liquidations)

scope: Function

lens:
  - Oracle
  - ExternalInfluence

severity: high

status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must read from oracle (semantic operation detection)
    - has_operation: READS_ORACLE

    # Must be callable (public, external, or internal state-changing functions)
    - property: visibility
      op: in
      value: [public, external, internal]

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Must NOT have staleness check (this is the vulnerability)
    - property: has_staleness_check
      op: eq
      value: true

    # Exclude view functions (they don't execute exploitable transactions)
    # View functions may read oracle for display/query purposes only
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't read oracle anyway)
    - property: is_pure
      op: eq
      value: true

