  notes: |
    This is a SAFE PATTERN (info severity) - identifies secure oracle usage.

    Tested Functions:
    - True Positives (8): Functions with staleness checks correctly identified
      * Standard updatedAt check with block.timestamp
      * answeredInRound >= roundId check (Chainlink-specific)
      * Combined checks (updatedAt + answeredInRound)
      * Different naming (maxAge, configurable threshold)
      * Internal helper functions
      * L2 sequencer uptime checks
      * Multiple oracle aggregation

    - True Negatives (7): Functions without staleness correctly NOT flagged
      * Oracle reads without any checks
      * Only answer validation (no staleness)
      * Unrelated require statements
      * No oracle reads
      * Pure functions
      * Event emission (not validation)
      * Storage assignment (not validation)

    - False Positives (1): getPriceOnlyRoundIdCheck
      * Flags roundId validation as staleness check
      * Debatable - roundId IS a staleness indicator per Chainlink docs
