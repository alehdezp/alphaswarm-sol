# Auditor Guidance
auditor_notes: |
  This pattern identifies SECURE oracle usage. When this pattern matches:

  ✅ POSITIVE SIGNAL: Function implements staleness checks
  ✅ Verify staleness threshold is reasonable for asset volatility
  ✅ Check for additional validations (answer > 0, answeredInRound check)
  ✅ Confirm proper error handling (revert vs. fallback)
  ✅ For L2 deployments, verify sequencer uptime check exists

  RECOMMENDED FOLLOW-UP CHECKS:
  1. Is staleness threshold configurable? (Governance control)
  2. Are staleness events emitted for monitoring?
  3. Does protocol have fallback oracle for redundancy?
  4. Is there circuit breaker for price deviation?
  5. Are oracle addresses immutable or properly access-controlled?

