attack_scenarios:
  - name: "Stale Price Attack (What this pattern PREVENTS)"
    description: |
      Without staleness checks, attackers exploit outdated oracle prices during
      market volatility or oracle downtime.
    preconditions:
      - Oracle price feed experiences delayed updates
      - Protocol accepts stale prices without timestamp validation
      - Market price deviates significantly from stale oracle price
    steps:
      - Market price crashes or spikes rapidly
      - Oracle update delayed (network congestion, node downtime, etc.)
      - Attacker detects price discrepancy (on-chain oracle vs. real market)
      - Attacker borrows/liquidates/swaps using favorable stale price
      - Oracle eventually updates; protocol realizes mispriced transactions
      - Protocol left with bad debt or arbitrage losses
    impact: "Bad debt, unfair liquidations, arbitrage extraction, protocol insolvency"
    prevented_by: "Implementing has_staleness_check to reject outdated prices"

  - name: "L2 Sequencer Downtime Attack (Prevented by enhanced checks)"
    description: |
      On L2s (Arbitrum, Optimism), sequencer downtime freezes oracle updates.
      Attackers exploit first blocks after restart before oracle catches up.
    preconditions:
      - Protocol deployed on L2 (Arbitrum, Optimism, Base, etc.)
      - L2 sequencer experiences downtime
      - No sequencer uptime check or grace period
    steps:
      - L2 sequencer goes down; oracle stops updating
      - Market price moves significantly during downtime
      - Sequencer restarts; blocks resume
      - Attacker executes transactions in first blocks with stale oracle price
      - Oracle updates after several blocks; attacker has already exploited gap
    impact: "Stale price exploitation during sequencer restart window"
    prevented_by: "Sequencer uptime checks with grace period (has_sequencer_uptime_check)"

verification_steps:
  - "Identify oracle read operation (Chainlink latestRoundData, getPrice, etc.)"
  - "Locate staleness validation logic (typically after oracle call)"
  - "Verify staleness check validates updatedAt timestamp:"
  - "  - Check: block.timestamp - updatedAt < THRESHOLD"
  - "  - Threshold is reasonable (1 hour for volatile, 24h for stable)"
  - "  - Reverts or uses fallback if stale (doesn't silently accept)"
  - "Check for additional validations (answer > 0, answeredInRound >= roundId)"
  - "Confirm staleness threshold is configurable or documented"
  - "Verify L2 sequencer uptime check if deployed on L2"
  - "Check if circuit breaker exists for extreme price deviations"

fix_recommendations:
  - name: "Basic Staleness Check (Minimum Viable)"
    description: |
      Implement minimum staleness validation using Chainlink latestRoundData
      return values.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";

      contract BasicOracleConsumer {
          AggregatorV3Interface public priceFeed;
          uint256 public constant STALENESS_THRESHOLD = 1 hours;

          constructor(address _priceFeed) {
              priceFeed = AggregatorV3Interface(_priceFeed);
          }

          function getPrice() public view returns (uint256) {
              (
                  uint80 roundId,
                  int256 answer,
                  uint256 startedAt,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              // CRITICAL CHECKS:
              require(updatedAt != 0, "Oracle: incomplete round");
              require(answer > 0, "Oracle: invalid price");
              require(
                  block.timestamp - updatedAt <= STALENESS_THRESHOLD,
                  "Oracle: stale price"
              );
              require(answeredInRound >= roundId, "Oracle: stale round");

              return uint256(answer);
          }
      }

  - name: "Enhanced Staleness Check with L2 Sequencer Support"
    description: |
      Production-grade oracle consumer with L2 sequencer uptime validation
      and configurable staleness thresholds.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract EnhancedOracleConsumer is Ownable {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed; // L2 only

          uint256 public stalenessThreshold = 1 hours;
          uint256 public constant GRACE_PERIOD_TIME = 1 hours; // L2 restart grace

          event StaleDataDetected(uint256 updatedAt, uint256 threshold);
          event SequencerDown();

          constructor(
              address _priceFeed,
              address _sequencerUptimeFeed // address(0) for L1
          ) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              if (_sequencerUptimeFeed != address(0)) {
                  sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
              }
          }

          function setStalenessThreshold(uint256 _threshold) external onlyOwner {
              require(_threshold > 0, "Invalid threshold");
              stalenessThreshold = _threshold;
          }

          function getPrice() public view returns (uint256) {
              // L2 SEQUENCER CHECK (Arbitrum, Optimism, Base, etc.)
              if (address(sequencerUptimeFeed) != address(0)) {
                  _checkSequencerUptime();
              }

              // FETCH ORACLE DATA
              (
                  uint80 roundId,
                  int256 answer,
                  uint256 startedAt,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              // VALIDATION 1: Completeness
              require(updatedAt != 0, "Oracle: incomplete round");

              // VALIDATION 2: Positive price
              require(answer > 0, "Oracle: invalid price");

              // VALIDATION 3: Staleness check
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Oracle: stale price"
              );

              // VALIDATION 4: Round consistency (Chainlink-specific)
              require(answeredInRound >= roundId, "Oracle: stale round");

              return uint256(answer);
          }

          function _checkSequencerUptime() internal view {
              (
                  ,
                  int256 answer,
                  uint256 startedAt,
                  ,
              ) = sequencerUptimeFeed.latestRoundData();

              // Check if sequencer is up (answer == 0 means up)
              require(answer == 0, "Sequencer: down");

              // Check if enough time has passed since restart
              require(
                  block.timestamp - startedAt > GRACE_PERIOD_TIME,
                  "Sequencer: grace period"
              );
          }
      }

  - name: "Multi-Source Oracle with Circuit Breaker"
    description: |
      Production-grade oracle with primary/fallback sources and deviation circuit breaker.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract ProductionOracle is Ownable {
          AggregatorV3Interface public primaryFeed;
          AggregatorV3Interface public fallbackFeed;

          uint256 public stalenessThreshold = 1 hours;
          uint256 public maxDeviationBps = 500; // 5% in basis points

          event FallbackUsed(string reason);
          event PriceDeviationDetected(uint256 primary, uint256 fallback);

          constructor(address _primary, address _fallback) {
              primaryFeed = AggregatorV3Interface(_primary);
              fallbackFeed = AggregatorV3Interface(_fallback);
          }

          function getPrice() public view returns (uint256) {
              uint256 primaryPrice = _getPriceFromFeed(primaryFeed);
              uint256 fallbackPrice = _getPriceFromFeed(fallbackFeed);

              // CIRCUIT BREAKER: Deviation check
              uint256 deviation = _calculateDeviation(primaryPrice, fallbackPrice);
              if (deviation > maxDeviationBps) {
                  // Sources disagree significantly - use more conservative price
                  return primaryPrice < fallbackPrice ? primaryPrice : fallbackPrice;
              }

              return primaryPrice;
          }

          function _getPriceFromFeed(
              AggregatorV3Interface feed
          ) internal view returns (uint256) {
              (
                  uint80 roundId,
                  int256 answer,
                  ,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = feed.latestRoundData();

              require(updatedAt != 0, "Incomplete round");
              require(answer > 0, "Invalid price");
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Stale price"
              );
              require(answeredInRound >= roundId, "Stale round");

              return uint256(answer);
          }

          function _calculateDeviation(
              uint256 price1,
              uint256 price2
          ) internal pure returns (uint256) {
              uint256 diff = price1 > price2 ? price1 - price2 : price2 - price1;
              return (diff * 10000) / (price1 > price2 ? price1 : price2);
          }
      }

