# =============================================================================
# PATTERN: oracle-001-freshness-complete
# =============================================================================
#
# SAFE PATTERN - Best Practice Validator
#
# This pattern identifies GOOD SECURITY PRACTICE: Oracle price reads that
# properly implement staleness/freshness checks to prevent stale price exploitation.
#
# This is the OPPOSITE of a vulnerability pattern - it highlights secure oracle
# usage for auditors to recognize and validate.
#
# =============================================================================

id: oracle-001
vulndoc: oracle/freshness
name: "Oracle Read With Staleness Check (Safe Pattern)"

description: |
  ## What This Detects
  Functions that read oracle prices AND properly implement staleness/freshness
  validation to ensure price data is recent and trustworthy.

  **This is a SAFE PATTERN showing best practice oracle integration.**

  ## Why Staleness Checks Matter

  Oracle price feeds can become stale (outdated) due to:
  - Network congestion delaying oracle updates
  - Oracle node downtime or degraded performance
  - L2 sequencer downtime (Arbitrum, Optimism, etc.)
  - Oracle contract paused or deprecated
  - Market volatility exceeding update frequency

  **Attack scenario without staleness checks:**
  1. Market price crashes from $100 → $50 in minutes
  2. Oracle update delayed; still shows stale $100 price
  3. Attacker borrows maximum against collateral at inflated $100 valuation
  4. Oracle finally updates to $50; attacker's position now underwater
  5. Protocol incurs bad debt; attacker keeps borrowed funds

  **Real-World Exploits from Stale Prices:**

  ### Venus Protocol (May 2023): $200K Bad Debt
  - **Issue**: Oracle staleness allowed acceptance of outdated LUNA price during crash
  - **Impact**: Users borrowed against stale high valuations; oracle updated to crashed
    price; protocol left with bad debt
  - **Missing safeguard**: No staleness check on oracle `updatedAt` timestamp
  - **Reference**: https://cointelegraph.com/news/venus-protocol-bad-debt-200k

  ### Rodeo Finance Exploit (July 2023): $888K Stolen
  - **Issue**: Protocol accepted stale oracle prices without `updatedAt` validation
  - **Attack**: Price manipulation during oracle staleness window
  - **Impact**: $888K drained via stale price arbitrage
  - **Missing safeguard**: No `block.timestamp - updatedAt` check
  - **Reference**: https://medium.com/@Rodeo_Finance/rodeo-post-mortem-overview

  ### Euler Finance (March 2023): $197M (Stale donation attack)
  - **Issue**: ERC-4626 vault exchange rate used as price without staleness validation
  - **Attack**: Donation attack inflated exchange rate; no check on rate-of-change
  - **Impact**: $197M exploited via manipulated vault share pricing
  - **Missing safeguard**: No staleness or deviation checks on vault rate
  - **Reference**: https://www.halborn.com/blog/post/explained-the-euler-finance-hack-march-2023

  ## What Constitutes a Good Staleness Check

  **Minimum requirements (Tier 1 - Basic Protection):**
  - ✅ Check `updatedAt != 0` (oracle returned complete data)
  - ✅ Check `block.timestamp - updatedAt < STALENESS_THRESHOLD`
  - ✅ Revert or use fallback if stale

  **Recommended requirements (Tier 2 - Enhanced Protection):**
  - ✅ Validate `answeredInRound >= roundId` (Chainlink-specific; ensures not stale round)
  - ✅ Check `answer > 0` (price is positive and valid)
  - ✅ Use reasonable staleness threshold (e.g., 1 hour for volatile assets, 24h for stable)
  - ✅ L2 sequencer uptime check (Arbitrum/Optimism grace period after restart)

  **Best practice requirements (Tier 3 - Production-Grade):**
  - ✅ Multi-source oracle aggregation (Chainlink + fallback)
  - ✅ Circuit breaker on price deviation (reject if sources disagree > X%)
  - ✅ Emit events on stale price detection for monitoring
  - ✅ Configurable staleness thresholds per asset class

  ## Detection Logic
  This pattern triggers when ALL of these conditions are met:
  1. Function performs oracle read operation (`has_operation: READS_ORACLE`)
  2. Function implements staleness check (`has_staleness_check: true`)

  **This pattern identifies SAFE CODE to validate secure oracle integration.**

scope: Function

lens:
  - ExternalInfluence
  - Security

severity: info

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must read from oracle (semantic operation detection)
    - has_operation: READS_ORACLE

    # Must have staleness check (validates updatedAt or answeredInRound)
    - property: has_staleness_check
      op: eq
      value: true

  # Any (OR logic) - not used for this pattern
  any: []

  # None (NOT logic) - not used for this pattern
  none: []

