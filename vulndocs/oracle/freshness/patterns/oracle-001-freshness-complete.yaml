    Variations Tested:
    - Different naming conventions (maxAge, threshold, configurable)
    - Different operators (<=, <)
    - Hardcoded vs constant thresholds
    - Multiple redundant checks
    - View vs external functions

    Limitations:
    1. Only detects require() statements, not if-revert patterns
    2. Does not detect custom error patterns
    3. Flags roundId checks as staleness (debatable if false positive)
    4. May not track intermediate variables in complex logic

