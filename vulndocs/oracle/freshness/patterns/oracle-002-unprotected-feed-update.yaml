attack_scenarios:
  - name: "Malicious Oracle Replacement"
    description: |
      Attacker replaces legitimate oracle address with malicious contract
      returning manipulated prices to exploit price-dependent operations.
    preconditions:
      - Function writes to oracle address state variable
      - No access control present (no onlyOwner/onlyRole modifier)
      - Contract uses oracle for pricing (liquidations, swaps, collateral valuation)
    steps:
      - Attacker deploys malicious oracle contract with manipulable price feed
      - Calls unprotected oracle-setting function with malicious oracle address
      - Malicious oracle returns artificially low prices for target assets
      - Attacker triggers liquidations of healthy positions at manipulated prices
      - Acquires collateral at fraction of true value
      - "Alternatively: Returns artificially high prices for attacker's collateral to maximize borrowing capacity"
    impact: "Price oracle manipulation enabling unfair liquidations, over-borrowing, arbitrage extraction, protocol insolvency"
    cvss: 9.1

  - name: "Price Multiplier Manipulation"
    description: |
      Attacker modifies oracle price multipliers or decimal conversion factors
      to amplify/reduce asset valuations.
    preconditions:
      - Function writes to price multiplier, decimals, or conversion state
      - No access control on parameter update
      - Oracle applies multipliers/conversions to raw price feeds
    steps:
      - Identify unprotected oracle parameter update function
      - Set price multiplier to extreme value (e.g., 1000x or 0.001x)
      - Protocol now values assets at manipulated prices
      - Exploit mispriced assets for liquidation profit or over-borrowing
    impact: "Systemic price distortion across all oracle-dependent operations"
    cvss: 8.9

  - name: "Staleness Check Bypass"
    description: |
      Attacker disables or weakens oracle staleness checks to force acceptance
      of outdated prices favorable to exploitation.
    preconditions:
      - Function writes to staleness threshold or check configuration
      - No access control on staleness parameter updates
      - Protocol uses staleness checks to reject old prices
    steps:
      - Call unprotected function to disable staleness checks or set threshold to max
      - Wait for market price movement in attacker's favor
      - Use stale oracle price (not reflecting current market) for exploitation
      - "Example: Market crashes but stale oracle shows old high price; attacker borrows max against now-devalued collateral"
    impact: "Acceptance of stale prices enabling exploitation during market volatility"
    cvss: 8.3

  - name: "TWAP Window Manipulation"
    description: |
      Attacker reduces TWAP (Time-Weighted Average Price) window to near-zero,
      enabling flash loan price manipulation attacks.
    preconditions:
      - Function writes to TWAP window duration parameter
      - No access control or minimum window validation
      - Protocol relies on TWAP for flash loan resistance
    steps:
      - Call unprotected function to set TWAP window to 0 or 1 block
      - Execute flash loan attack in single transaction
      - Manipulate spot price on DEX (e.g., Uniswap pool swap)
      - TWAP with tiny window reflects manipulated spot price
      - Exploit manipulated TWAP for liquidations, borrows, or swaps
      - Repay flash loan in same transaction
    impact: "TWAP manipulation enabling single-transaction flash loan exploits"
    cvss: 9.3

  - name: "Oracle Source Downgrade Attack"
    description: |
      Attacker changes oracle from secure multi-source aggregator (e.g., Chainlink)
      to manipulable single on-chain source (e.g., Uniswap V2 spot price).
    preconditions:
      - Function writes to oracle source configuration
      - No access control on oracle source updates
      - Contract accepts multiple oracle implementations
    steps:
      - Identify protocol using secure oracle (Chainlink, API3, etc.)
      - Deploy or identify manipulable on-chain price source (low-liquidity DEX pool)
      - Call unprotected oracle update to switch to manipulable source
      - Execute flash loan to manipulate new oracle source price
      - Exploit manipulated price for profit
    impact: "Oracle security downgrade from tamper-resistant to easily manipulable"
    cvss: 9.5

verification_steps:
  - "Verify function is externally callable (public or external visibility)"
  - "Confirm function writes to oracle-related state variables. Check state_write_targets for 'oracle' tag OR related tags: 'config', 'fee' (if used for oracle fees), 'treasury' (if oracle payments)"
  - "IMPORTANT: writes_sensitive_config includes ALL sensitive tags (fee, oracle, treasury, governance, etc.). Verify the specific state variable written is oracle-related to avoid false positives"
  - "Check state variable name/purpose: oracle address, price feed, TWAP params, staleness threshold, price multiplier, decimals, feed source"
  - "Confirm no access control modifier present (onlyOwner, onlyRole, onlyGovernance, etc.)"
  - "Check no inline require/if statements validating msg.sender against privileged addresses or multisig"
  - "Verify this is NOT a constructor or initializer (one-time setup pattern)"
  - "Test: Attempt to call function from non-privileged address; confirm unauthorized caller can modify oracle state"
  - "Review contract documentation/NatSpec for intended access control; determine if missing access control is bug or (rarely) intentional"
  - "Assess impact: Determine if oracle manipulation would enable liquidation attacks, price-based exploits, or protocol insolvency"

fix_recommendations:
  - name: "Add Role-Based Access Control"
    description: |
      Restrict oracle updates to dedicated ORACLE_MANAGER_ROLE or similar.
      Use OpenZeppelin AccessControl for granular permission management.
    example: |
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyProtocol is AccessControl {
          bytes32 public constant ORACLE_MANAGER_ROLE = keccak256("ORACLE_MANAGER_ROLE");
          address public priceOracle;

          constructor() {
              _grantRole(DEFAULT_ADMIN_ROLE, msg.sender);
              _grantRole(ORACLE_MANAGER_ROLE, msg.sender);
          }

          // BEFORE (VULNERABLE)
          // function setOracle(address newOracle) external {
          //     priceOracle = newOracle;
          // }

          // AFTER (FIXED)
          function setOracle(address newOracle) external onlyRole(ORACLE_MANAGER_ROLE) {
              require(newOracle != address(0), "Zero address");
              require(newOracle.code.length > 0, "Not a contract");

              address oldOracle = priceOracle;
              priceOracle = newOracle;

              emit OracleUpdated(oldOracle, newOracle, msg.sender);
          }
      }

  - name: "Use Two-Step Oracle Updates with Timelock"
    description: |
      Implement timelock delay for oracle changes to allow governance review
      and emergency intervention before changes take effect.
    example: |
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract MyProtocol is Ownable {
          address public currentOracle;
          address public pendingOracle;
          uint256 public oracleUpdateTime;
          uint256 public constant ORACLE_DELAY = 2 days;

          // Step 1: Propose new oracle (owner only)
          function proposeOracleUpdate(address newOracle) external onlyOwner {
              require(newOracle != address(0), "Zero address");
              require(newOracle != currentOracle, "Same oracle");

              pendingOracle = newOracle;
              oracleUpdateTime = block.timestamp + ORACLE_DELAY;

              emit OracleUpdateProposed(currentOracle, newOracle, oracleUpdateTime);
          }

          // Step 2: Execute after delay (anyone can call once delay passed)
          function executeOracleUpdate() external {
              require(pendingOracle != address(0), "No pending update");
              require(block.timestamp >= oracleUpdateTime, "Delay not passed");

              address oldOracle = currentOracle;
              currentOracle = pendingOracle;
              pendingOracle = address(0);
              oracleUpdateTime = 0;

              emit OracleUpdated(oldOracle, currentOracle);
          }

          // Emergency cancel (owner only, e.g., if proposed oracle is malicious)
          function cancelOracleUpdate() external onlyOwner {
              require(pendingOracle != address(0), "No pending update");

              address cancelled = pendingOracle;
              pendingOracle = address(0);
              oracleUpdateTime = 0;

              emit OracleUpdateCancelled(cancelled);
          }
      }

  - name: "Implement Oracle Validation & Sanity Checks"
    description: |
      Add validation logic to verify oracle updates meet security requirements
      before accepting changes.
    example: |
      import "@openzeppelin/contracts/access/Ownable.sol";

      interface IOracle {
          function latestAnswer() external view returns (int256);
          function decimals() external view returns (uint8);
          function latestRoundData() external view returns (
              uint80 roundId,
              int256 answer,
              uint256 startedAt,
              uint256 updatedAt,
              uint80 answeredInRound
          );
      }

      contract MyProtocol is Ownable {
          address public oracle;

          function setOracle(address newOracle) external onlyOwner {
              require(newOracle != address(0), "Zero address");

              // Validation 1: Must be a contract
              require(newOracle.code.length > 0, "Not a contract");

              // Validation 2: Must implement required interface
              IOracle oracleContract = IOracle(newOracle);

              // Validation 3: Must return valid price data
              try oracleContract.latestAnswer() returns (int256 price) {
                  require(price > 0, "Invalid price");
              } catch {
                  revert("Oracle call failed");
              }

              // Validation 4: Must have expected decimals (e.g., 8 for Chainlink)
              try oracleContract.decimals() returns (uint8 decimals) {
                  require(decimals == 8, "Invalid decimals");
              } catch {
                  revert("Decimals call failed");
              }

              // Validation 5: Price must be fresh (updated recently)
              try oracleContract.latestRoundData() returns (
                  uint80, int256, uint256, uint256 updatedAt, uint80
              ) {
                  require(block.timestamp - updatedAt < 1 hours, "Stale oracle");
              } catch {
                  revert("Round data call failed");
              }

              oracle = newOracle;
              emit OracleUpdated(newOracle);
          }
      }

  - name: "Use Multi-Source Oracle with Governance"
    description: |
      Implement multi-signature or DAO governance requirement for oracle updates.
      Combine with circuit breakers for price deviation detection.
    example: |
      import "@openzeppelin/contracts/governance/TimelockController.sol";
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract MyProtocol is AccessControl {
          bytes32 public constant GOVERNANCE_ROLE = keccak256("GOVERNANCE_ROLE");

          address public primaryOracle;
          address public fallbackOracle;
          uint256 public maxPriceDeviation = 10_00; // 10% in basis points

          TimelockController public governanceTimelock;

          constructor(address timelock) {
              governanceTimelock = TimelockController(payable(timelock));
              _grantRole(GOVERNANCE_ROLE, address(governanceTimelock));
          }

          // Requires governance timelock (multi-sig + delay)
          function setOracle(
              address newPrimary,
              address newFallback
          ) external onlyRole(GOVERNANCE_ROLE) {
              require(newPrimary != address(0), "Zero primary");
              require(newFallback != address(0), "Zero fallback");
              require(newPrimary != newFallback, "Same oracles");

              primaryOracle = newPrimary;
              fallbackOracle = newFallback;

              emit OraclesUpdated(newPrimary, newFallback);
          }

          // Circuit breaker: Use fallback if primary deviates too much
          function getPrice() public view returns (uint256) {
              uint256 primaryPrice = IOracle(primaryOracle).latestAnswer();
              uint256 fallbackPrice = IOracle(fallbackOracle).latestAnswer();

              uint256 deviation = primaryPrice > fallbackPrice
                  ? ((primaryPrice - fallbackPrice) * 10000) / fallbackPrice
                  : ((fallbackPrice - primaryPrice) * 10000) / primaryPrice;

              // If deviation exceeds threshold, use fallback
              if (deviation > maxPriceDeviation) {
                  emit PriceDeviationDetected(primaryPrice, fallbackPrice, deviation);
                  return fallbackPrice;
              }

              return primaryPrice;
          }
      }

  - name: "Immutable Oracle (Ultimate Protection)"
    description: |
      For maximum security, make oracle address immutable (set once in constructor).
      Use upgradeable proxy pattern if oracle updates are required.
    example: |
      contract MyProtocol {
          // Immutable oracle - cannot be changed after deployment
          address public immutable PRICE_ORACLE;

          constructor(address oracle) {
              require(oracle != address(0), "Zero oracle");
              require(oracle.code.length > 0, "Not a contract");

              PRICE_ORACLE = oracle;
          }

          // No setOracle function exists - oracle cannot be changed
          // If oracle needs update, deploy new protocol version via governance
      }

