  notes: |
    This is an L2-SPECIFIC VULNERABILITY PATTERN (high severity).

    RATING: READY (precision=0.70, recall=0.88, variation=0.75)

    Test Results:
    - True Positives: 7/7 correctly flagged (liquidateUser, borrow, swap, collateral,
      mint with staleness only, internal update, loan calculation)
    - True Negatives: 2/5 correctly NOT flagged (inline checks work correctly)
    - Edge Cases: 3/3 passed (view excluded, pure excluded, conditional L2 check)
    - Variations: 3/5 passed (different naming, grace period only, status check only)

    Known Limitations:
    1. FALSE POSITIVES (3): Functions that delegate sequencer checking to internal
       helpers are flagged because has_sequencer_uptime_check only detects INLINE
       checks, not cross-function validation via helpers like _checkSequencerUptime().
       - liquidateUserSafe: calls _checkSequencerUptime()
       - borrowSafe: calls _checkSequencerUptime()
       - mintWithL2Validation: calls _validateL2SequencerStatus()
       - borrowWithReorderedChecks: calls _ensureSequencerHealthy()

    2. FALSE NEGATIVES (1): updatePositionValue doesn't read oracle directly, calls
       wrapper _getOraclePrice(), so READS_ORACLE operation not detected.

    3. CONTEXT-DEPENDENT: Pattern flags ALL oracle reads without sequencer checks.
       Whether it's a true positive depends on deployment target:
       - L2 (Arbitrum, Optimism, Base, zkSync, Metis) → TRUE POSITIVE
       - L1 (Ethereum mainnet) → FALSE POSITIVE (sequencer check not needed)
       This limitation cannot be resolved without deployment context metadata.

    Improvement Path to EXCELLENT:
    - Enhance has_sequencer_uptime_check to track function calls to helpers
    - Add L1/L2 deployment context detection (chain ID or deployment metadata)
    - With helper tracking: precision would improve from 0.70 → ~1.00

    Production Use:
    Pattern is READY for production use with manual review to filter out:
    - False positives from helper function delegation (check if function calls
      internal helpers with "sequencer", "uptime", "grace", "l2" in name)
    - False positives from L1 deployments (verify deployment target network)

