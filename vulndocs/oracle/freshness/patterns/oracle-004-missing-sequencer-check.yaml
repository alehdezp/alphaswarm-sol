attack_scenarios:
  - name: "Post-Sequencer-Restart Stale Price Exploitation"
    description: |
      Attacker monitors L2 sequencer uptime feed, waits for sequencer restart,
      and immediately executes transactions in first blocks with stale oracle
      prices before oracle updates catch up to real market.
    preconditions:
      - Protocol deployed on L2 (Arbitrum, Optimism, Base, zkSync, etc.)
      - L2 sequencer experiences downtime (maintenance, outage, congestion)
      - No sequencer uptime check or grace period validation
      - Oracle reads accepted without validating sequencer status
    steps:
      - Monitor Chainlink L2 Sequencer Uptime Feed (answer transitions 1 → 0)
      - L2 sequencer goes down (answer = 1); oracle stops updating
      - Real market price moves significantly during downtime (e.g., ETH $2000 → $2200)
      - Oracle frozen at pre-downtime price ($2000)
      - Sequencer restarts (answer = 0); blocks resume
      - Attacker executes transaction in FIRST blocks after restart
      - Oracle still shows stale $2000 (real market at $2200)
      - Attacker borrows max against undervalued $2000 collateral
      - Oracle updates to $2200 after several blocks; attacker extracted $200 value
      - Protocol left with under-collateralized loan at stale valuation
    impact: "Stale price exploitation during L2 sequencer restart window; protocol bad debt"
    cvss: 8.3
    l2_specific: true

  - name: "Grace Period Bypass Attack"
    description: |
      Without grace period validation, attackers exploit the immediate post-restart
      window before oracle stabilizes, even if sequencer uptime is checked.
    preconditions:
      - Sequencer uptime check exists BUT no grace period validation
      - Sequencer restarts after downtime
      - Oracle takes time to propagate real market prices
    steps:
      - Sequencer restarts (answer = 0, startedAt = block.timestamp)
      - Attacker checks: sequencer is up (answer == 0) ✓
      - No grace period check → transaction proceeds immediately
      - Oracle still has stale price from pre-downtime
      - Attacker executes favorable transaction with stale price
      - After grace period (1h), oracle stabilizes to real market
      - Attacker has already extracted value during stabilization window
    impact: "Exploitation of oracle stabilization window after sequencer restart"
    cvss: 7.8
    l2_specific: true

  - name: "Multi-Hour Sequencer Downtime Exploitation"
    description: |
      Long sequencer outages (2+ hours) create large price divergence between
      frozen oracle and real market, enabling high-value exploitation.
    preconditions:
      - Sequencer experiences extended downtime (2+ hours like Optimism Feb 2023)
      - Volatile market conditions during downtime
      - No sequencer uptime or grace period checks
    steps:
      - Optimism sequencer down for 2 hours (Feb 2023 incident)
      - Market price crashes from $2000 → $1500 during downtime
      - Oracle frozen at pre-downtime $2000
      - Sequencer restarts after 2 hours
      - Attacker immediately borrows max against stale $2000 collateral valuation
      - Real market price is $1500; attacker over-borrowed by 33%
      - Oracle updates to $1500 after several blocks
      - Protocol has $500 per unit bad debt; attacker keeps borrowed funds
    impact: "Massive over-borrowing enabled by multi-hour oracle freeze; protocol insolvency risk"
    cvss: 8.5
    l2_specific: true
    real_incident: "Optimism Feb 2023 sequencer outage"

  - name: "Liquidation Attack During Sequencer Downtime"
    description: |
      Attacker exploits stale high prices after restart to liquidate positions
      that are healthy at real market prices.
    preconditions:
      - Sequencer downtime during market pump
      - Oracle frozen at low pre-downtime price
      - Real market price significantly higher
      - No sequencer uptime validation
    steps:
      - Sequencer down; market pumps from $1000 → $1200
      - Oracle frozen at $1000
      - Sequencer restarts
      - User's collateral worth $1200 at real market (healthy position)
      - Oracle shows stale $1000; position appears underwater
      - Attacker triggers liquidation using stale $1000 oracle price
      - Acquires user's collateral at $1000 valuation
      - Sells immediately at real $1200 market price
      - Attacker profits $200 per unit; user unfairly liquidated
    impact: "Unfair liquidations using stale post-restart oracle prices"
    cvss: 7.9
    l2_specific: true

  - name: "Repeated Brief Outage Exploitation (Base Pattern)"
    description: |
      Attackers exploit frequent brief sequencer outages (5-15 minutes) on
      networks with unstable sequencers, accumulating small arbitrage profits.
    preconditions:
      - L2 network with frequent brief outages (Base Aug 2023 pattern)
      - No sequencer uptime or grace period checks
      - Automated monitoring of sequencer status
    steps:
      - Set up automated monitoring of Chainlink sequencer uptime feed
      - Detect sequencer restart event (answer: 1 → 0)
      - Execute pre-programmed transaction within first block after restart
      - Exploit stale price for arbitrage (typically 0.5-2% price gap)
      - Repeat for each brief outage (dozens per week)
      - Accumulate arbitrage profits over time
    impact: "Systematic exploitation of frequent brief sequencer outages"
    cvss: 7.5
    l2_specific: true
    real_incident: "Base network Aug 2023 frequent outages"

