# Auditor Guidance
auditor_notes: |
  This pattern identifies L2-SPECIFIC VULNERABLE oracle usage. When this pattern matches:

  🚨 L2 VULNERABILITY DETECTED: Function reads oracle WITHOUT sequencer uptime check
  ⚠️ EXPLOITATION RISK: Stale prices exploitable after sequencer restart on L2 networks
  🔍 VERIFY: Check deployment target - L1 or L2?
  📊 ASSESS IMPACT: L2 deployments REQUIRE sequencer validation

  IMMEDIATE FOLLOW-UP ACTIONS:
  1. Verify deployment target network:
     - L2 (Arbitrum, Optimism, Base, etc.) → TRUE POSITIVE
     - L1 (Ethereum mainnet) → FALSE POSITIVE
  2. Check if sequencer uptime validation exists in helper functions
  3. Verify grace period implementation (1 hour recommended)
  4. Assess oracle usage criticality (liquidations, borrowing, collateral)
  5. Recommend Chainlink L2 Sequencer Uptime Feed integration
  6. Suggest combining with staleness check (defense in depth)

  COMMON FALSE POSITIVES:
  - L1 deployments (sequencer check not applicable)
  - Internal helper functions delegating sequencer checking to caller
  - View functions for display only (excluded by pattern)
  - Test contracts or mock oracles (check contract context)

  SEVERITY ASSESSMENT:
  - CRITICAL: Liquidations, borrowing, collateral valuation on L2
  - HIGH: Swap pricing, minting, redemptions on L2
  - MEDIUM: Fee calculations, rewards on L2
  - N/A: L1 deployments (not vulnerable to sequencer issues)

  DEPLOYMENT CONTEXT MATTERS:
  - Same code: VULNERABLE on L2, SAFE on L1
  - Always verify deployment target before flagging
  - Multi-chain deployments need conditional sequencer checks

