fix_recommendations:
  - name: "Add Basic Sequencer Uptime Check (Minimum Viable Fix)"
    description: |
      Implement minimum sequencer uptime validation using Chainlink's official
      L2 Sequencer Uptime Feed. This is the MINIMUM fix for L2 deployments.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";

      contract BasicL2OracleConsumer {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed;

          // Chainlink L2 Sequencer Uptime Feed addresses:
          // Arbitrum One: 0xFdB631F5EE196F0ed6FAa767959853A9F217697D
          // Optimism:     0x371EAD81c9102C9BF4874A9075FFFf170F2Ee389
          // Base:         0xBCF85224fc0756B9Fa45aA7892530B47e10b6433

          constructor(address _priceFeed, address _sequencerUptimeFeed) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
          }

          function getPrice() public view returns (uint256) {
              // CRITICAL L2 CHECK: Sequencer uptime validation
              (
                  /*uint80 roundId*/,
                  int256 answer,
                  /*uint256 startedAt*/,
                  /*uint256 updatedAt*/,
                  /*uint80 answeredInRound*/
              ) = sequencerUptimeFeed.latestRoundData();

              // Check sequencer is up (0 = up, 1 = down)
              require(answer == 0, "Sequencer: down");

              // Fetch oracle price (now safe to use)
              (
                  /*uint80 roundId*/,
                  int256 price,
                  /*uint256 startedAt*/,
                  /*uint256 updatedAt*/,
                  /*uint80 answeredInRound*/
              ) = priceFeed.latestRoundData();

              require(price > 0, "Invalid price");

              return uint256(price);
          }
      }

  - name: "Enhanced Sequencer Check with Grace Period (Recommended)"
    description: |
      Production-grade sequencer uptime validation with grace period to allow
      oracle stabilization after sequencer restart. This is the RECOMMENDED
      pattern for all L2 deployments.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract EnhancedL2OracleConsumer is Ownable {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed;

          uint256 public constant GRACE_PERIOD_TIME = 1 hours; // Chainlink recommended
          uint256 public stalenessThreshold = 1 hours;

          event SequencerDown();
          event SequencerGracePeriod(uint256 timeRemaining);

          constructor(address _priceFeed, address _sequencerUptimeFeed) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
          }

          function getPrice() public view returns (uint256) {
              // STEP 1: Check L2 sequencer uptime
              _checkSequencerUptime();

              // STEP 2: Fetch oracle price
              (
                  uint80 roundId,
                  int256 answer,
                  uint256 startedAt,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              // STEP 3: Validate oracle data (staleness check)
              require(updatedAt != 0, "Oracle: incomplete round");
              require(answer > 0, "Oracle: invalid price");
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Oracle: stale price"
              );
              require(answeredInRound >= roundId, "Oracle: stale round");

              return uint256(answer);
          }

          function _checkSequencerUptime() internal view {
              (
                  /*uint80 roundId*/,
                  int256 answer,
                  uint256 startedAt,
                  /*uint256 updatedAt*/,
                  /*uint80 answeredInRound*/
              ) = sequencerUptimeFeed.latestRoundData();

              // VALIDATION 1: Sequencer is up (0 = up, 1 = down)
              if (answer != 0) {
                  emit SequencerDown();
                  revert("Sequencer: down");
              }

              // VALIDATION 2: Grace period after restart (THE CRITICAL FIX)
              // Don't accept prices immediately after sequencer restart
              // Wait for oracle to stabilize to real market prices
              uint256 timeSinceUp = block.timestamp - startedAt;
              if (timeSinceUp <= GRACE_PERIOD_TIME) {
                  emit SequencerGracePeriod(GRACE_PERIOD_TIME - timeSinceUp);
                  revert("Sequencer: grace period");
              }
          }
      }

  - name: "Production-Grade L2 Oracle with Fallback"
    description: |
      Enterprise-grade L2 oracle consumer with sequencer checks, grace period,
      staleness validation, and fallback oracle for maximum resilience.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract ProductionL2Oracle is Ownable {
          AggregatorV3Interface public primaryFeed;
          AggregatorV3Interface public fallbackFeed;
          AggregatorV3Interface public sequencerUptimeFeed;

          uint256 public constant GRACE_PERIOD_TIME = 1 hours;
          uint256 public stalenessThreshold = 1 hours;
          uint256 public maxDeviationBps = 500; // 5% in basis points

          event SequencerDown();
          event SequencerGracePeriod(uint256 timeRemaining);
          event FallbackUsed(string reason);
          event PriceDeviationDetected(uint256 primary, uint256 fallback);

          constructor(
              address _primaryFeed,
              address _fallbackFeed,
              address _sequencerUptimeFeed
          ) {
              primaryFeed = AggregatorV3Interface(_primaryFeed);
              fallbackFeed = AggregatorV3Interface(_fallbackFeed);
              sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
          }

          function getPrice() public view returns (uint256) {
              // DEFENSE LAYER 1: L2 Sequencer uptime check
              _checkSequencerUptime();

              // DEFENSE LAYER 2: Multi-source oracle validation
              uint256 primaryPrice = _getPriceFromFeed(primaryFeed);
              uint256 fallbackPrice = _getPriceFromFeed(fallbackFeed);

              // DEFENSE LAYER 3: Deviation circuit breaker
              uint256 deviation = _calculateDeviation(primaryPrice, fallbackPrice);
              if (deviation > maxDeviationBps) {
                  emit PriceDeviationDetected(primaryPrice, fallbackPrice);
                  // Use more conservative price
                  return primaryPrice < fallbackPrice ? primaryPrice : fallbackPrice;
              }

              return primaryPrice;
          }

          function _checkSequencerUptime() internal view {
              (
                  /*uint80 roundId*/,
                  int256 answer,
                  uint256 startedAt,
                  /*uint256 updatedAt*/,
                  /*uint80 answeredInRound*/
              ) = sequencerUptimeFeed.latestRoundData();

              // Check sequencer is up
              if (answer != 0) {
                  emit SequencerDown();
                  revert("Sequencer: down");
              }

              // Grace period validation
              uint256 timeSinceUp = block.timestamp - startedAt;
              if (timeSinceUp <= GRACE_PERIOD_TIME) {
                  emit SequencerGracePeriod(GRACE_PERIOD_TIME - timeSinceUp);
                  revert("Sequencer: grace period");
              }
          }

          function _getPriceFromFeed(
              AggregatorV3Interface feed
          ) internal view returns (uint256) {
              (
                  uint80 roundId,
                  int256 answer,
                  ,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = feed.latestRoundData();

              require(updatedAt != 0, "Incomplete round");
              require(answer > 0, "Invalid price");
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Stale price"
              );
              require(answeredInRound >= roundId, "Stale round");

              return uint256(answer);
          }

          function _calculateDeviation(
              uint256 price1,
              uint256 price2
          ) internal pure returns (uint256) {
              uint256 diff = price1 > price2 ? price1 - price2 : price2 - price1;
              return (diff * 10000) / (price1 > price2 ? price1 : price2);
          }
      }

  - name: "Conditional L2 Check (Multi-Chain Deployment)"
    description: |
      Pattern for contracts deployed on both L1 and L2 networks, with conditional
      sequencer checks only on L2 deployments.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@chainlink/contracts/src/v0.8/interfaces/AggregatorV3Interface.sol";

      contract MultiChainOracleConsumer {
          AggregatorV3Interface public priceFeed;
          AggregatorV3Interface public sequencerUptimeFeed; // address(0) for L1

          uint256 public constant GRACE_PERIOD_TIME = 1 hours;
          uint256 public stalenessThreshold = 1 hours;

          constructor(
              address _priceFeed,
              address _sequencerUptimeFeed // Pass address(0) for L1 deployments
          ) {
              priceFeed = AggregatorV3Interface(_priceFeed);
              if (_sequencerUptimeFeed != address(0)) {
                  sequencerUptimeFeed = AggregatorV3Interface(_sequencerUptimeFeed);
              }
          }

          function getPrice() public view returns (uint256) {
              // L2 DEPLOYMENT: Check sequencer uptime
              if (address(sequencerUptimeFeed) != address(0)) {
                  _checkSequencerUptime();
              }
              // L1 DEPLOYMENT: Skip sequencer check

              (
                  uint80 roundId,
                  int256 answer,
                  ,
                  uint256 updatedAt,
                  uint80 answeredInRound
              ) = priceFeed.latestRoundData();

              require(updatedAt != 0, "Incomplete round");
              require(answer > 0, "Invalid price");
              require(
                  block.timestamp - updatedAt <= stalenessThreshold,
                  "Stale price"
              );
              require(answeredInRound >= roundId, "Stale round");

              return uint256(answer);
          }

          function _checkSequencerUptime() internal view {
              (
                  ,
                  int256 answer,
                  uint256 startedAt,
                  ,
              ) = sequencerUptimeFeed.latestRoundData();

              require(answer == 0, "Sequencer: down");
              require(
                  block.timestamp - startedAt > GRACE_PERIOD_TIME,
                  "Sequencer: grace period"
              );
          }
      }

  - name: "Chainlink Official L2 Sequencer Feed Documentation"
    description: |
      Official Chainlink documentation and best practices for L2 sequencer
      uptime validation.
    example: |
      # Chainlink L2 Sequencer Uptime Feeds (Official Docs):
      https://docs.chain.link/data-feeds/l2-sequencer-feeds

      # Feed Addresses (2025):
      Arbitrum One: 0xFdB631F5EE196F0ed6FAa767959853A9F217697D
      Optimism:     0x371EAD81c9102C9BF4874A9075FFFf170F2Ee389
      Base:         0xBCF85224fc0756B9Fa45aA7892530B47e10b6433
      Metis:        0x8484Ef722627bf18ca5Ae6BcF031c23E6e922B30

      # Feed Schema:
      - answer: 0 = sequencer up, 1 = sequencer down
      - startedAt: timestamp when sequencer came back up
      - Grace period: Wait 1 hour after startedAt before accepting prices

      # Key Validation Points:
      1. require(answer == 0)                           (sequencer is up)
      2. block.timestamp - startedAt > GRACE_PERIOD     (stabilization complete)
      3. GRACE_PERIOD = 1 hour                          (Chainlink recommended)
      4. Combine with staleness check                   (defense in depth)

      # Why Grace Period Matters:
      - Sequencer restart doesn't mean oracle is current
      - Oracle needs time to propagate real market prices
      - First blocks after restart may still have stale data
      - Grace period allows oracle stabilization

      # Real-World Incidents:
      - Arbitrum Dec 2021: 45 min downtime → 10 blocks stale after restart
      - Optimism Feb 2023: 2 hour downtime → 30 blocks stale after restart
      - Base Aug 2023: Frequent brief outages → systematic exploitation

      # Severity Justification:
      HIGH - L2 sequencer downtime events create predictable stale price windows.
      Attackers can monitor sequencer uptime feeds and exploit restart events.
      Missing sequencer checks enable systematic value extraction on L2 networks.

