# =============================================================================
# PATTERN: oracle-004-missing-sequencer-check
# =============================================================================
#
# VULNERABILITY PATTERN - L2 Oracle Read Without Sequencer Uptime Check
#
# This pattern identifies VULNERABLE oracle usage on Layer 2 networks (Arbitrum,
# Optimism, Base, zkSync, etc.) where contracts read oracle prices but FAIL to
# validate L2 sequencer uptime, allowing stale price exploitation after sequencer
# downtime events.
#
# This is an L2-SPECIFIC vulnerability complementing oracle-003 (missing staleness).
#
# =============================================================================

id: oracle-004
vulndoc: oracle/freshness
name: "L2 Oracle Read Without Sequencer Uptime Check"

description: |
  ## What This Detects
  Functions that read oracle prices on Layer 2 networks (Arbitrum, Optimism, Base,
  zkSync, etc.) but FAIL to validate sequencer uptime status, allowing attackers
  to exploit stale prices immediately after sequencer restart.

  **This is an L2-SPECIFIC VULNERABILITY PATTERN - critical for rollup deployments.**

  ## Why It's Dangerous

  Layer 2 rollup networks rely on centralized sequencers that can experience downtime:
  - **Arbitrum sequencer downtime (Dec 2021)**: 45 minutes
  - **Optimism sequencer downtime (Feb 2023)**: ~2 hours
  - **Base sequencer issues (Aug 2023)**: Multiple brief outages

  **What happens during L2 sequencer downtime:**
  1. Sequencer stops producing blocks → L2 chain halts
  2. Oracle price feeds STOP updating (frozen at pre-downtime prices)
  3. Real market prices continue moving on L1 and other chains
  4. Sequencer restarts → Blocks resume processing
  5. **ATTACK WINDOW**: First blocks after restart still have stale oracle prices
  6. Oracle updates after several blocks, but damage already done

  **Without sequencer uptime checks, attackers can:**
  - Execute transactions in first blocks after sequencer restart with stale prices
  - Borrow maximum against collateral at stale valuations
  - Trigger unfair liquidations using stale prices
  - Arbitrage between stale L2 oracle price and real market price
  - Exploit the gap between sequencer restart and oracle update

  ## Real-World Sequencer Downtime Events

  ### Arbitrum Sequencer Downtime (December 2021): 45 Minutes
  - **Cause**: Hardware failure in Offchain Labs infrastructure
  - **Duration**: 45 minutes of complete chain halt
  - **Oracle Impact**: All Chainlink oracles frozen for 45 minutes
  - **Market Movement**: ETH moved $200 during downtime
  - **Attack Window**: ~10 blocks after restart before oracle caught up
  - **Lesson**: Need grace period to allow oracle stabilization
  - **Reference**: https://offchain.medium.com/arbitrum-sequencer-downtime

  ### Optimism Sequencer Downtime (February 2023): ~2 Hours
  - **Cause**: Infrastructure issue during network upgrade
  - **Duration**: ~2 hours without new blocks
  - **Oracle Impact**: Complete oracle freeze for 2 hours
  - **Market Movement**: Significant volatility during downtime
  - **Attack Window**: First 20-30 blocks post-restart had stale prices
  - **Exploitation**: Protocols without sequencer checks vulnerable to stale arbitrage
  - **Reference**: https://status.optimism.io/

  ### Base Sequencer Issues (August 2023): Multiple Brief Outages
  - **Cause**: Network congestion and scaling issues
  - **Duration**: Several 5-15 minute outages
  - **Oracle Impact**: Frequent brief oracle freezes
  - **Attack Vector**: Attackers monitored uptime feed to exploit restart windows
  - **Lesson**: Even brief outages create exploitation opportunities
  - **Reference**: https://status.base.org/

  ### Pattern Across L2 Incidents
  All incidents share common exploitation vectors:
  1. **Sequencer down** → Oracles freeze at last pre-downtime price
  2. **Market moves** → Real price diverges from frozen oracle price
  3. **Sequencer restarts** → First blocks have stale oracle data
  4. **Oracle lags** → Takes several blocks to catch up to real market
  5. **Attack window** → Exploit stale prices before oracle updates

  ## What Constitutes Proper Sequencer Uptime Validation

  **Minimum requirements (Tier 1 - Basic Protection):**
  - ✅ Check Chainlink L2 Sequencer Uptime Feed exists
  - ✅ Verify sequencer status: `answer == 0` (0 = up, 1 = down)
  - ✅ Revert if sequencer is down

  **Recommended requirements (Tier 2 - Enhanced Protection):**
  - ✅ Grace period after restart: `block.timestamp - startedAt > GRACE_PERIOD`
  - ✅ Grace period threshold: 1 hour recommended (Chainlink standard)
  - ✅ Combine with staleness check (defense in depth)
  - ✅ Emit events for sequencer status monitoring

  **Best practice requirements (Tier 3 - Production-Grade):**
  - ✅ Configurable grace period per asset class
  - ✅ Fallback mechanism during sequencer downtime
  - ✅ Circuit breaker to prevent operations during grace period
  - ✅ Multi-oracle validation (primary + fallback)

  ## Chainlink L2 Sequencer Uptime Feed Addresses (2025)

  **Arbitrum One:**
  - Sequencer Uptime Feed: `0xFdB631F5EE196F0ed6FAa767959853A9F217697D`

  **Optimism:**
  - Sequencer Uptime Feed: `0x371EAD81c9102C9BF4874A9075FFFf170F2Ee389`

  **Base:**
  - Sequencer Uptime Feed: `0xBCF85224fc0756B9Fa45aA7892530B47e10b6433`

  **Metis:**
  - Sequencer Uptime Feed: `0x8484Ef722627bf18ca5Ae6BcF031c23E6e922B30`

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function performs oracle read operation (`has_operation: READS_ORACLE`)
  2. Function is externally callable or internal state-changing
  3. Function LACKS sequencer uptime check (`has_sequencer_uptime_check: false`)
  4. Function is NOT a view function (view functions don't execute critical transactions)

  **Rationale for detection:**
  - L2 deployments MUST validate sequencer uptime before trusting oracle data
  - Missing sequencer check creates time window for stale price exploitation
  - Grace period is critical: don't accept prices immediately after restart
  - View functions excluded (informational queries, not exploitable transactions)

  **Complementary to oracle-003 (missing staleness check):**
  - oracle-003: Detects missing `updatedAt` staleness validation
  - oracle-004: Detects missing L2 sequencer uptime validation
  - Best practice: Implement BOTH checks for defense in depth

scope: Function

lens:
  - Oracle
  - ExternalInfluence

severity: high

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must read from oracle (semantic operation detection)
    - has_operation: READS_ORACLE

    # Must be callable (public, external, or internal state-changing functions)
    - property: visibility
      op: in
      value: [public, external, internal]

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # Must NOT have sequencer uptime check (this is the vulnerability)
    - property: has_sequencer_uptime_check
      op: eq
      value: true

    # Exclude view functions (they don't execute exploitable transactions)
    # View functions may read oracle for display/query purposes only
    - property: is_view
      op: eq
      value: true

    # Exclude pure functions (can't read oracle anyway)
    - property: is_pure
      op: eq
      value: true

