# =============================================================================
# ATTACK SCENARIOS
# =============================================================================

attack_scenarios:
  - name: "Immediate Post-Restart Exploitation"
    description: |
      Attacker monitors sequencer uptime feed and executes transactions in the
      first blocks after sequencer restart when oracle still has stale prices.
    preconditions:
      - L2 deployment with sequencer uptime check
      - NO grace period validation after restart
      - Oracle reads accepted immediately when answer == 0
    steps:
      - Monitor Chainlink sequencer uptime feed for restart (answer: 1 -> 0)
      - Sequencer restarts; startedAt = current block.timestamp
      - No grace period check: block.timestamp - startedAt == 0 is accepted
      - Oracle still shows pre-downtime stale price
      - Execute transaction with favorable stale price
      - Profit from stale price vs real market divergence
    impact: "Stale price exploitation during immediate post-restart window"
    cvss: 7.8
    l2_specific: true

  - name: "Flash Loan Amplified Grace Period Bypass"
    description: |
      Attacker uses flash loan to amplify exploitation during the brief
      window between sequencer restart and oracle stabilization.
    preconditions:
      - Protocol accepts oracle prices immediately after restart
      - Flash loan available on the L2 network
      - Collateral/lending operations use stale oracle price
    steps:
      - Wait for sequencer restart event
      - Take flash loan in first available block
      - Use stale oracle price for over-borrowing
      - Oracle updates to real market price
      - Position is now under-collateralized
      - Repay flash loan, keep extracted value
    impact: "Flash loan amplified bad debt creation"
    cvss: 8.5
    l2_specific: true

  - name: "Multi-Protocol Stale Price Arbitrage"
    description: |
      Exploit stale prices across multiple protocols on the same L2 that
      all lack grace period validation.
    preconditions:
      - Multiple protocols without grace period checks
      - Different oracle update frequencies
      - Sequencer restart creates price divergence
    steps:
      - Sequencer restarts after downtime
      - Protocol A: Borrow at stale low collateral valuation
      - Protocol B: Liquidate position at stale high valuation
      - Protocol C: Swap at stale favorable rate
      - Aggregate profits from multi-protocol arbitrage
    impact: "Systemic exploitation across L2 ecosystem"
    cvss: 8.0
    l2_specific: true

# =============================================================================
# FIX RECOMMENDATIONS
# =============================================================================

fix_recommendations:
  - name: "Add Grace Period Validation (Minimum Fix)"
    description: |
      Add a grace period check after sequencer uptime validation to ensure
      oracle data has had time to stabilize.
    example: |
      uint256 constant GRACE_PERIOD_TIME = 1 hours; // Chainlink recommended

      function _checkSequencerUptime() internal view {
          (
              ,
              int256 answer,
              uint256 startedAt,
              ,
          ) = sequencerUptimeFeed.latestRoundData();

          // Check sequencer is up (0 = up, 1 = down)
          require(answer == 0, "Sequencer: down");

          // CRITICAL FIX: Grace period after restart
          require(
              block.timestamp - startedAt > GRACE_PERIOD_TIME,
              "Sequencer: grace period not elapsed"
          );
      }

  - name: "Configurable Grace Period (Recommended)"
    description: |
      Make grace period configurable per asset class for flexibility.
    example: |
      mapping(address => uint256) public assetGracePeriods;
      uint256 public constant DEFAULT_GRACE_PERIOD = 1 hours;

      function getGracePeriod(address asset) public view returns (uint256) {
          uint256 period = assetGracePeriods[asset];
          return period > 0 ? period : DEFAULT_GRACE_PERIOD;
      }

      function _validateOracleReadiness(address asset) internal view {
          (, int256 answer, uint256 startedAt, ,) = sequencerUptimeFeed.latestRoundData();
          require(answer == 0, "Sequencer down");
          require(
              block.timestamp - startedAt > getGracePeriod(asset),
              "Grace period not elapsed"
          );
      }

  - name: "Defense in Depth (Best Practice)"
    description: |
      Combine grace period with staleness check and circuit breaker.
    example: |
      function getValidatedPrice() external view returns (uint256) {
          // Layer 1: Sequencer uptime check
          _checkSequencerUp();

          // Layer 2: Grace period validation
          _checkGracePeriodElapsed();

          // Layer 3: Oracle freshness check
          (, int256 price, , uint256 updatedAt, ) = priceFeed.latestRoundData();
          require(block.timestamp - updatedAt < STALENESS_THRESHOLD, "Stale price");

          // Layer 4: Sanity bounds
          require(price > 0 && price < MAX_REASONABLE_PRICE, "Invalid price");

          return uint256(price);
      }

