pattern_type: vulnerability
quality_indicator: false
l2_specific: true
complementary_to: oracle-004-missing-sequencer-check
distinguishes_from: oracle-004  # This pattern requires sequencer check to exist

auditor_notes: |
  This pattern identifies a SPECIFIC L2 vulnerability:

  - Sequencer uptime check EXISTS (answer == 0)
  - Grace period validation MISSING (no startedAt comparison)

  **Key distinction from oracle-004:**
  - oracle-004: No sequencer check at all (more severe)
  - oracle-l2-sequencer-grace-missing: Has sequencer check, lacks grace period

  **False positive risk:**
  - L1 deployments (sequencer check not needed)
  - Helper function delegation (grace period in called function)
  - Test/mock contracts

  **Grace period recommendations:**
  - Chainlink official: 1 hour (3600 seconds)
  - High volatility assets: Consider 2 hours
  - Stablecoins: 30 minutes may be acceptable

