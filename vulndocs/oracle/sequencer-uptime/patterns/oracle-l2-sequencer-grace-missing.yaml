# =============================================================================
# PATTERN: oracle-l2-sequencer-grace-missing
# =============================================================================
#
# EXEMPLAR VULNERABILITY PATTERN - L2 Oracle Read Missing Grace Period
#
# This pattern identifies VULNERABLE oracle usage on Layer 2 networks where
# contracts check sequencer uptime but FAIL to enforce a grace period after
# sequencer restart, allowing stale price exploitation in the immediate
# post-restart window.
#
# Distinction from oracle-004 (missing sequencer check):
# - oracle-004: No sequencer uptime check at all
# - oracle-l2-sequencer-grace-missing: Sequencer check exists BUT no grace period
#
# This is a Phase 7.2 EXEMPLAR pattern with comprehensive PCP v2 + 50+ test cases.
#
# =============================================================================

id: oracle-l2-sequencer-grace-missing
vulndoc: oracle/sequencer-uptime
name: "L2 Oracle Read Missing Grace Period After Sequencer Restart"

description: |
  ## What This Detects

  Functions that read oracle prices on Layer 2 networks and check sequencer
  uptime status but FAIL to enforce a grace period after sequencer restart.
  This allows attackers to exploit stale oracle prices in the immediate
  window after the sequencer comes back online before oracle data stabilizes.

  **This pattern specifically targets the GRACE PERIOD OMISSION, not missing
  sequencer checks entirely (which is oracle-004).**

  ## Why It's Dangerous

  When an L2 sequencer restarts after downtime:
  1. Sequencer status changes from DOWN (1) to UP (0)
  2. Transactions can now be processed again
  3. **BUT** oracle data is still stale from pre-downtime prices
  4. Oracle feeds need time to propagate current market prices
  5. **ATTACK WINDOW**: The period between sequencer restart and oracle update

  A sequencer uptime check (answer == 0) is INSUFFICIENT because:
  - It only confirms the sequencer is currently running
  - It does NOT confirm oracle data has been refreshed
  - Attackers can exploit the first blocks after restart

  The grace period (typically 1 hour) allows oracle nodes to:
  - Reconnect to price sources
  - Validate and aggregate prices
  - Publish updated prices on-chain

  ## Real-World Incidents

  ### Arbitrum Sequencer Downtime (December 2021)
  - **Duration**: 45 minutes
  - **Post-restart stale window**: ~10 blocks
  - **Oracle lag**: Several minutes before prices updated
  - **Attack vector**: Immediate post-restart transactions with stale prices

  ### Optimism Sequencer Downtime (February 2023)
  - **Duration**: ~2 hours
  - **Market movement during downtime**: Significant volatility
  - **Post-restart stale window**: 20-30 blocks
  - **Attack vector**: Over-borrowing using stale collateral valuations

  ### Base Sequencer Issues (August 2023)
  - **Pattern**: Multiple brief 5-15 minute outages
  - **Attack pattern**: Systematic monitoring and exploitation
  - **Risk**: Even brief outages create exploitation opportunities

  ## Chainlink Recommended Grace Period

  Chainlink officially recommends a **1 hour grace period** after sequencer restart.

  From Chainlink docs: "Make sure to check if the Arbitrum Sequencer is active
  and wait for a GRACE_PERIOD (e.g., 1 hour) after the sequencer comes back
  up to avoid answering requests with stale data."

  Source: https://docs.chain.link/data-feeds/l2-sequencer-feeds

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function reads oracle price (`READS_ORACLE` operation)
  2. Function checks sequencer uptime status (`has_sequencer_uptime_check: true`)
  3. Function is NOT view/pure (modifies state or transfers value)
  4. **NO grace period check** (`has_grace_period_check: false`)

  The key distinction: sequencer check EXISTS but grace period is MISSING.

scope: Function

lens:
  - Oracle
  - ExternalInfluence
  - L2Security

severity: high

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  tier_a:
    all:
      # Must read from oracle
      - has_operation: READS_ORACLE

      # Must be externally callable or state-modifying
      - property: visibility
        op: in
        value: [public, external, internal]

      # Must have sequencer uptime check (distinguishes from oracle-004)
      - property: has_sequencer_uptime_check
        op: eq
        value: true

    none:
      # Must NOT have grace period check (this is the vulnerability)
      - property: has_grace_period_check
        op: eq
        value: true

      # Exclude view functions
      - property: is_view
        op: eq
        value: true

      # Exclude pure functions
      - property: is_pure
        op: eq
        value: true

  tier_c:
    # Label-dependent refinement for higher confidence
    any:
      - has_label: oracle.price_read
      - has_label: oracle.chainlink_feed
      - has_label: l2.sequencer_dependent

    missing_label_required:
      - oracle.grace_period_enforced
      - oracle.post_restart_protection

# =============================================================================
# SEMANTIC OPERATIONS
# =============================================================================

semantic_ops:
  has_operation: READS_ORACLE
  required_ops:
    - READS_ORACLE
    - CHECKS_SEQUENCER_UPTIME

behavioral_signature:
  # Sequencer check followed by oracle read, but no grace period validation
  pattern: "U:seq→R:orc(?!.*G:grace)"
  description: "Sequencer uptime check followed by oracle read without grace period validation"
  matches_exploits:
    - arbitrum-sequencer-grace-bypass-2021
    - optimism-immediate-restart-exploitation-2023

