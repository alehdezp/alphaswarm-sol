id: mev-missing-deadline-parameter
vulndoc: mev/protection
name: MEV Risk (Missing Deadline Parameter)
description: |
  ⚠️ DEPRECATED: This pattern has been replaced by mev-002.

  Swap-like functions without a deadline parameter allow transactions to be
  executed at stale prices during network congestion.

  Please use: patterns/semantic/mev/mev-002-missing-deadline-protection.yaml

scope: Function
lens:
  - Ordering
severity: medium
status: deprecated

match:
  all:
    - property: swap_like
      op: eq
      value: true
    - property: risk_missing_deadline_parameter
      op: eq
      value: true

