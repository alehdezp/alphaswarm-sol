attack_scenarios:
  - name: "Stale Transaction Execution During Congestion"
    description: |
      Network congestion causes transaction to sit in mempool for extended period.
      Price moves significantly, but transaction still executes at stale price.
    preconditions:
      - User submits swap without deadline protection
      - Network experiences congestion (high gas prices, block full)
      - Market price changes significantly during delay
      - Transaction eventually included when congestion clears
    steps:
      - User broadcasts swap: 1000 USDC → WETH (no deadline)
      - Network congestion: gas price spikes to 500+ gwei
      - User's transaction sits in mempool (insufficient gas price)
      - Market moves: ETH price drops 25% over 3 days
      - Congestion clears: gas price normalizes
      - Validator includes user's stale transaction
      - Swap executes at significantly worse price than current market
      - User receives unfavorable exchange rate
    impact: |
      User loses opportunity cost due to stale execution. While slippage
      protection prevents sandwich attacks, lack of deadline allows execution
      at outdated prices. Loss magnitude depends on market movement during
      delay period (often 2-10% in volatile markets).

  - name: "Unenforced Parameter Attack"
    description: |
      Function signature includes deadline parameter but doesn't enforce it,
      giving false sense of security to users and frontends.
    preconditions:
      - Function signature includes deadline parameter
      - Frontend/SDK passes reasonable deadline value (e.g., +15 minutes)
      - Contract does NOT validate deadline in code
      - Users assume protection exists based on parameter name
    steps:
      - User calls swap(tokenIn, tokenOut, amountIn, minOut, deadline=now+15min)
      - User expects transaction to expire after 15 minutes
      - Contract IGNORES deadline parameter (no require check)
      - Network congestion delays transaction for 2 days
      - Market moves significantly during delay
      - Transaction executes after deadline has passed
      - User discovers stale execution post-transaction
    impact: |
      False sense of security leads to unexpected losses. Users and frontends
      trust the parameter naming convention, but contract doesn't enforce it.
      More insidious than missing parameter because it's harder to detect.
      Users believe they have protection when they don't.

  - name: "Gas Price War Delay"
    description: |
      During popular events (NFT mints, token launches), users submit swaps
      that get delayed for hours/days due to gas price competition.
    preconditions:
      - Popular event causes gas price war (e.g., NFT mint)
      - Users submit swap transactions with normal gas prices
      - Market is volatile due to event-related trading
      - Transactions delayed until event concludes
    steps:
      - NFT mint announced: gas price spikes to 1000+ gwei
      - User submits swap at 100 gwei (standard price)
      - Transaction sits unconfirmed for 6+ hours
      - NFT mint completes: gas price drops to normal
      - User's swap executes at post-event prices
      - Market has moved significantly during mint frenzy
    impact: |
      Event-driven gas spikes can delay swaps for hours. Without deadline
      protection, swaps execute after event concludes at significantly
      different prices. Common during DeFi launches, NFT mints, airdrops.

  - name: "MEV Bundle Delay Attack"
    description: |
      MEV searchers can intentionally delay transactions to profit from
      stale execution when market moves favorably.
    preconditions:
      - Swap lacks deadline protection
      - MEV searcher has block-building influence
      - Market price movement creates opportunity
    steps:
      - User submits swap at current price
      - MEV searcher identifies swap transaction
      - Searcher monitors market for favorable price movement
      - Market moves in direction that benefits delayed execution
      - Searcher includes transaction in block at optimal time
      - User executes at stale price; searcher profits from timing
    impact: |
      Advanced MEV attack where searchers profit by controlling transaction
      inclusion timing. Deadline protection prevents this by enforcing
      expiration. Less common than sandwich attacks but growing concern
      with MEV-Boost and block builder centralization.

verification_steps:
  - "Identify swap-like operation (function name, token transfers, AMM calls)"
  - "Check function visibility (must be public/external for stale execution risk)"
  - "Locate deadline parameter in function signature:"
  - "  - Common names: deadline, expiry, expiration"
  - "  - Type: Usually uint256 representing Unix timestamp"
  - "  - NOT duration: deadline should be absolute timestamp, not relative seconds"
  - "If parameter EXISTS, verify enforcement:"
  - "  - Search for require(block.timestamp <= deadline) or equivalent"
  - "  - Check for require(deadline >= block.timestamp) (same logic, reversed)"
  - "  - Confirm revert on deadline expiration (not silent failure)"
  - "  - Verify deadline is checked BEFORE swap execution (not after)"
  - "If parameter MISSING, confirm vulnerability (no expiration at all)"
  - "Check for alternative time-based protections:"
  - "  - Nonce-based expiration (rare, usually insufficient)"
  - "  - Block number expiration (less reliable than timestamp)"
  - "  - Oracle timestamp validation (rare, not standard)"
  - "Assess stale execution risk based on volatility and gas patterns"
  - "Review frontend/SDK integration (does UI set reasonable deadline?)"
  - "Confirm deadline is user-controlled or has reasonable default (e.g., +15 min)"

fix_recommendations:
  - name: "Add Deadline Parameter and Enforcement (Recommended)"
    description: |
      Add deadline parameter and enforce it with require statement using
      block.timestamp. This is the industry-standard approach used by all
      major DEXs (Uniswap, SushiSwap, Curve, 1inch).
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      // ✅ SAFE: Deadline parameter AND enforcement
      contract SafeSwap {
          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline  // ← Add deadline parameter (Unix timestamp)
          ) external returns (uint256) {
              // ✅ CRITICAL: Enforce deadline BEFORE swap execution
              require(
                  block.timestamp <= deadline,
                  "Transaction expired"
              );

              uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              require(
                  amountOut >= minAmountOut,
                  "Slippage too high"
              );

              return amountOut;
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // AMM swap logic here
              // ...
          }
      }

      // Frontend usage example:
      // const deadline = Math.floor(Date.now() / 1000) + 900; // +15 minutes
      // await contract.swap(tokenIn, tokenOut, amountIn, minOut, deadline);

  - name: "Use Established Router Contracts"
    description: |
      Delegate swap execution to battle-tested routers like Uniswap V2/V3 Router
      which have built-in deadline protection (and slippage protection).
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@uniswap/v2-periphery/contracts/interfaces/IUniswapV2Router02.sol";

      contract RouterBasedSwap {
          IUniswapV2Router02 public immutable router;

          constructor(address _router) {
              router = IUniswapV2Router02(_router);
          }

          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline
          ) external {
              address[] memory path = new address[](2);
              path[0] = tokenIn;
              path[1] = tokenOut;

              // ✅ Uniswap Router enforces deadline protection
              router.swapExactTokensForTokens(
                  amountIn,
                  minAmountOut,
                  path,
                  msg.sender,
                  deadline  // Enforced by router
              );
          }
      }

  - name: "Comprehensive MEV Protection (Deadline + Slippage)"
    description: |
      Combine deadline protection with slippage protection for comprehensive
      MEV defense. Both mechanisms serve different purposes and should be used
      together.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract ComprehensiveMEVProtection {
          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline
          ) external returns (uint256) {
              // ✅ Deadline prevents STALE execution
              require(
                  block.timestamp <= deadline,
                  "Transaction expired"
              );

              uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              // ✅ Slippage prevents SANDWICH attacks
              require(
                  amountOut >= minAmountOut,
                  "Slippage too high"
              );

              return amountOut;
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // Swap logic
              // ...
          }
      }

      /*
      PROTECTION COMPARISON:

      Without both protections:
      ❌ Vulnerable to sandwich attacks (no slippage)
      ❌ Vulnerable to stale execution (no deadline)

      With slippage only:
      ✅ Protected from sandwich attacks
      ❌ Vulnerable to stale execution during congestion

      With deadline only:
      ❌ Vulnerable to sandwich attacks
      ✅ Protected from stale execution

      With both (RECOMMENDED):
      ✅ Protected from sandwich attacks
      ✅ Protected from stale execution
      ✅ Comprehensive MEV defense
      */

  - name: "Deadline with Reasonable Bounds"
    description: |
      Enforce reasonable deadline bounds to prevent excessively long expiration
      periods that defeat the purpose of deadline protection.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract BoundedDeadlineSwap {
          // Maximum deadline: 1 hour from now
          uint256 public constant MAX_DEADLINE_DURATION = 1 hours;

          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline
          ) external returns (uint256) {
              // ✅ Enforce deadline in future
              require(
                  block.timestamp <= deadline,
                  "Transaction expired"
              );

              // ✅ Prevent excessively long deadlines
              require(
                  deadline <= block.timestamp + MAX_DEADLINE_DURATION,
                  "Deadline too far in future"
              );

              uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              require(
                  amountOut >= minAmountOut,
                  "Slippage too high"
              );

              return amountOut;
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // Swap logic
              // ...
          }
      }

      /*
      RECOMMENDED DEADLINE DURATIONS:
      - Normal swaps: 15 minutes (900 seconds)
      - Time-sensitive: 5 minutes (300 seconds)
      - Limit orders: Longer acceptable (hours/days)
      - High volatility: Shorter deadlines (1-5 minutes)
      */

  - name: "Event-Based Deadline Tracking"
    description: |
      Emit events when swaps are rejected due to deadline expiration to help
      users and frontends track stale transactions.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract EventTrackedSwap {
          event SwapExecuted(
              address indexed user,
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 amountOut,
              uint256 deadline
          );

          event SwapExpired(
              address indexed user,
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 deadline,
              uint256 currentTimestamp
          );

          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline
          ) external returns (uint256) {
              if (block.timestamp > deadline) {
                  // ✅ Emit event for monitoring/analytics
                  emit SwapExpired(
                      msg.sender,
                      tokenIn,
                      tokenOut,
                      amountIn,
                      deadline,
                      block.timestamp
                  );

                  revert("Transaction expired");
              }

              uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              require(amountOut >= minAmountOut, "Slippage too high");

              emit SwapExecuted(
                  msg.sender,
                  tokenIn,
                  tokenOut,
                  amountIn,
                  amountOut,
                  deadline
              );

              return amountOut;
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // Swap logic
              // ...
          }
      }

  - name: "Documentation and Best Practices"
    description: |
      Document recommended deadline values and usage patterns for users
      and frontend developers.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      /// @title Safe Swap Contract
      /// @notice Swap tokens with comprehensive MEV protection
      /// @dev Implements deadline and slippage protection
      contract DocumentedSwap {
          /// @notice Swap exact input tokens for output tokens
          /// @param tokenIn Input token address
          /// @param tokenOut Output token address
          /// @param amountIn Exact amount of input tokens
          /// @param minAmountOut Minimum acceptable output (slippage protection)
          /// @param deadline Unix timestamp after which transaction expires
          /// @dev Recommended deadline: block.timestamp + 900 (15 minutes)
          /// @dev For volatile markets, use shorter deadline: + 300 (5 minutes)
          /// @dev For limit orders, longer deadlines acceptable
          /// @return amountOut Actual amount of output tokens received
          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline
          ) external returns (uint256 amountOut) {
              require(block.timestamp <= deadline, "Transaction expired");

              amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              require(amountOut >= minAmountOut, "Slippage too high");
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // Implementation
              // ...
          }
      }

      /*
      BEST PRACTICES FOR DEADLINE:

      1. Use absolute timestamps (not relative durations)
         ✅ deadline = block.timestamp + 900 (Unix timestamp)
         ❌ deadline = 900 (ambiguous - duration or timestamp?)

      2. Set reasonable defaults
         - 15 minutes for normal swaps
         - 5 minutes for high-frequency trading
         - 1 hour maximum for safety

      3. Check deadline BEFORE swap execution
         ✅ require(block.timestamp <= deadline);
         ❌ Don't check after swap (wastes gas)

      4. Use <= not < for deadline comparison
         ✅ block.timestamp <= deadline (includes exact deadline)
         ⚠️  block.timestamp < deadline (excludes exact deadline)

      5. Combine with slippage protection
         Both mechanisms serve different purposes

      6. Emit events for monitoring
         Track expired transactions for analytics

      7. Document recommended values
         Help users and frontends set appropriate deadlines
      */

