# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be swap-like function (semantic detection)
    - property: swap_like
      op: eq
      value: true

    # Must be externally callable (entry points for stale execution)
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE must match (OR logic) - Either vulnerability variant
  any:
    # Variant 1: No deadline parameter at all
    - property: risk_missing_deadline_parameter
      op: eq
      value: true

    # Variant 2: Deadline parameter exists but NOT enforced
    - property: risk_missing_deadline_check
      op: eq
      value: true

  # NONE can match (NOT logic) - Exclude safe patterns
  none:
    # Exclude view/pure functions (read-only, no execution risk)
    - property: is_view
      op: eq
      value: true

    - property: is_pure
      op: eq
      value: true

