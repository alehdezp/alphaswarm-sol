# =============================================================================
# PATTERN: mev-002-missing-deadline-protection
# =============================================================================
#
# COMPREHENSIVE MEV PROTECTION - Missing Deadline Protection
#
# This pattern detects swap/trade functions vulnerable to stale transaction
# execution due to either:
#   1. Missing deadline parameter entirely (no expiration timestamp)
#   2. Deadline parameter exists but is NOT enforced (no require check)
#
# Consolidates minimal patterns into a single comprehensive pattern.
#
# =============================================================================

id: mev-002
vulndoc: mev/protection
name: "Missing Deadline Protection"

description: |
  ## What This Detects

  Swap and trade functions without deadline protection that allow transactions
  to be executed at stale prices, enabling value loss through delayed execution
  during network congestion or volatile market conditions.

  This pattern detects BOTH vulnerability types:
  1. **No deadline parameter** - Function lacks expiration timestamp parameter
  2. **Unenforced deadline parameter** - Parameter exists but isn't validated

  ## Why It's Dangerous

  Without deadline protection, users are vulnerable to stale transaction execution:

  ### Stale Transaction Attack Mechanism:
  1. **Submission**: User submits swap at current market price (e.g., ETH = $2000)
  2. **Network Congestion**: Transaction sits in mempool for hours or days
  3. **Price Movement**: Market price changes significantly (e.g., ETH = $1500)
  4. **Delayed Execution**: Validators include transaction at stale price
  5. **User Loss**: User receives unfavorable exchange rate from outdated transaction

  ### Distinction from Slippage Protection:
  - **Slippage**: Protects against price impact DURING execution (MEV sandwich attacks)
  - **Deadline**: Protects against execution at STALE prices (time-based expiration)
  - **Both Required**: Comprehensive MEV protection needs BOTH mechanisms

  ### Real-World Impact:
  - **Gas Price Spikes (2020-2021)**: Transactions sat in mempool for days
  - **Network Congestion**: DeFi Summer, NFT mints, market crashes
  - **User Losses**: Transactions execute at significantly worse prices
  - **Standard Protection**: Uniswap, SushiSwap require deadline parameter
  - **Audit Finding**: Common medium severity finding in DeFi audits

  ### Vulnerability Variants:

  **Variant 1 - No Deadline Parameter:**
  ```solidity
  // ❌ VULNERABLE: No deadline parameter
  contract VulnerableSwap1 {
      function swap(
          address tokenIn,
          address tokenOut,
          uint256 amountIn,
          uint256 minAmountOut
      ) external {
          // ❌ No deadline parameter
          // Transaction can execute at ANY time, even weeks later at stale price
          uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);
          require(amountOut >= minAmountOut, "Slippage");
          // User has slippage protection but no time-based expiration
      }
  }
  ```

  **Variant 2 - Deadline Parameter but Not Enforced:**
  ```solidity
  // ❌ VULNERABLE: Parameter exists but NOT checked
  contract VulnerableSwap2 {
      function swap(
          address tokenIn,
          address tokenOut,
          uint256 amountIn,
          uint256 minAmountOut,
          uint256 deadline  // ✓ Parameter exists
      ) external {
          // ❌ Deadline is NEVER checked!
          uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);
          require(amountOut >= minAmountOut, "Slippage");
          // Should have: require(block.timestamp <= deadline, "Expired");
      }
  }
  ```

  **Real Attack Scenario:**
  ```
  Day 1, 10:00 AM: User submits swap(1000 USDC → ETH, minOut=0.5 ETH, deadline=?)
    - Current ETH price: $2000
    - Expected output: ~0.5 ETH
    - Slippage protection: minOut = 0.5 ETH
    - ❌ NO DEADLINE PROTECTION

  Day 1-3: Network congestion (gas price spike to 500+ gwei)
    - Transaction sits in mempool for 3 days
    - User's transaction is valid but unincluded

  Day 3, 2:00 PM: ETH price drops to $1500 (-25%)
    - Validator includes transaction (gas price normalizes)
    - Swap executes: 1000 USDC → 0.66 ETH
    - Transaction SUCCEEDS (meets minOut = 0.5 ETH)
    - But market rate should give: 1000 USDC / $1500 = 0.66 ETH

  User Loss Calculation:
    - Expected at original price: 0.5 ETH (worth $750 now)
    - Received: 0.66 ETH (worth $990 now)
    - ✓ Slippage protection prevented sandwich attack
    - ❌ But user LOST OPPORTUNITY: could have gotten 1000/1500 = 0.66 ETH if they
        cancelled and resubmitted, OR 0.66 ETH * (2000/1500) = 0.88 ETH in original terms
    - Effective loss: ~$330 due to stale execution

  With Deadline (e.g., block.timestamp + 15 minutes):
    - Transaction would revert after 15 minutes
    - User could cancel/resubmit at current market price
    - Protected from stale execution
  ```

  **Safe Implementation:**
  ```solidity
  // ✅ SAFE: Deadline parameter AND enforcement
  contract SafeSwap {
      function swap(
          address tokenIn,
          address tokenOut,
          uint256 amountIn,
          uint256 minAmountOut,
          uint256 deadline
      ) external {
          require(block.timestamp <= deadline, "Transaction expired"); // ✓ Enforced
          uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);
          require(amountOut >= minAmountOut, "Slippage too high");
      }
  }
  ```

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function is swap-like (`swap_like: true` - detects swaps semantically)
  2. Function is externally callable (`visibility: [public, external]`)
  3. Function is NOT read-only (`is_view: false`, `is_pure: false`)
  4. **EITHER**:
     - `risk_missing_deadline_parameter: true` (no parameter at all)
     - `risk_missing_deadline_check: true` (parameter exists but not validated)

  ## Builder Properties Used

  - `swap_like`: Semantic swap detection (name + token calls + parameters)
  - `risk_missing_deadline_parameter`: swap_like AND NOT has_deadline_parameter
  - `risk_missing_deadline_check`: has_deadline_parameter AND NOT has_deadline_check
  - `has_deadline_parameter`: Detects deadline, expiry, expiration params
  - `has_deadline_check`: Validates deadline with block.timestamp in require
  - `visibility`: Function accessibility
  - `is_view`, `is_pure`: State mutability

  ## Real-World Examples

  ### Historical Network Congestion Events:
  - **Ethereum Gas Crisis (2020-2021)**: 500+ gwei gas prices, multi-day delays
  - **DeFi Summer (2020)**: Yield farming launches caused mempool congestion
  - **NFT Mint Events**: CryptoPunks, Bored Apes caused gas spikes
  - **Black Thursday (March 2020)**: ETH crash + congestion = stale liquidations
  - **The Merge (Sept 2022)**: Network upgrades caused transaction delays

  ### Reference Implementations:
  - **Uniswap V2 Router**: Mandatory deadline parameter on all swaps
  - **Uniswap V3 Router**: Same deadline requirement
  - **SushiSwap**: Identical deadline enforcement
  - **1inch Aggregator**: Enforces deadline on all routes
  - **Curve Finance**: Deadline on token swaps

  ### Audit Findings:
  - Trail of Bits: "Missing deadline allows stale transaction execution"
  - OpenZeppelin: "Swap functions should include deadline parameter"
  - ConsenSys Diligence: "Transaction expiration missing"
  - Quantstamp: "No deadline protection on swap operations"

