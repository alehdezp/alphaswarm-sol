# Auditor Guidance
auditor_notes: |
  This pattern identifies swap functions vulnerable to stale transaction execution.

  ⚠️ VULNERABILITY INDICATORS:
  - Function performs token swaps (swap_like: true)
  - No deadline parameter (risk_missing_deadline_parameter: true)
  - OR parameter exists but not enforced (risk_missing_deadline_check: true)

  VERIFICATION CHECKLIST:
  1. Confirm function performs swaps (check token transfers, AMM calls)
  2. Check for deadline parameter (deadline, expiry, expiration)
  3. If parameter exists, verify enforcement:
     - Search for require(block.timestamp <= deadline)
     - Check if parameter is actually used in logic
     - Verify check happens BEFORE swap execution
  4. Assess stale execution risk:
     - Public/external functions are exposed to stale execution
     - Internal functions may be safe if callers are protected
  5. Review frontend integration:
     - Does UI calculate and pass deadline?
     - Are default deadline values reasonable (15 minutes)?
  6. Check for comprehensive MEV protection:
     - Should have BOTH deadline AND slippage protection

  FALSE POSITIVE SCENARIOS:
  - Internal helper functions (not externally callable)
  - View/pure functions (read-only, no state changes)
  - Swaps protected by alternative time mechanisms (rare)
  - Router-based swaps where router enforces deadline

  SEVERITY ASSESSMENT:
  - MEDIUM: Standard for swaps without deadline protection
  - HIGH: High-value swaps or volatile market conditions
  - LOW: Internal swaps or those with alternative protections

  COMMON MISUNDERSTANDINGS:
  - Deadline ≠ Slippage: They protect against different attack vectors
  - Both Required: Comprehensive MEV protection needs both
  - Absolute Timestamp: Deadline should be Unix timestamp, not duration

