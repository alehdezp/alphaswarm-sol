# =============================================================================
# PATTERN: mev-001-missing-slippage-protection
# =============================================================================
#
# COMPREHENSIVE MEV PROTECTION - Missing Slippage Protection
#
# This pattern detects swap/trade functions vulnerable to MEV sandwich attacks
# due to either:
#   1. Missing slippage parameter entirely (no minimum output amount)
#   2. Slippage parameter exists but is NOT enforced (no require check)
#
# Consolidates mev-missing-slippage-parameter + mev-missing-slippage-check
# into a single comprehensive pattern.
#
# =============================================================================

id: mev-001
vulndoc: mev/protection
name: "Missing Slippage Protection"

description: |
  ## What This Detects

  Swap and trade functions without slippage protection that allow MEV bots to
  sandwich attack users, extracting value through front-running and back-running.

  This pattern detects BOTH vulnerability types:
  1. **No slippage parameter** - Function lacks minimum output amount parameter
  2. **Unenforced slippage parameter** - Parameter exists but isn't validated

  ## Why It's Dangerous

  Without slippage protection, users are vulnerable to sandwich attacks:

  ### Sandwich Attack Mechanism:
  1. **Detection**: MEV bot monitors mempool, sees user's swap transaction
  2. **Front-run**: Bot submits higher-gas transaction to buy tokens BEFORE user
  3. **Price impact**: Bot's purchase increases token price
  4. **User execution**: User's swap executes at worse price (more slippage)
  5. **Back-run**: Bot sells tokens AFTER user at inflated price
  6. **Profit**: Bot captures price difference; user loses 2-5% to MEV

  ### Real-World Impact:
  - **Billions in MEV extracted** from Uniswap, SushiSwap, and other AMMs
  - Every unprotected swap is vulnerable to sandwich attacks
  - Common **medium/high severity** finding in DeFi audits
  - Flashbots research shows ~5% average extraction per vulnerable swap

  ### Vulnerability Variants:

  **Variant 1 - No Slippage Parameter:**
  ```solidity
  // ❌ VULNERABLE: No minimum output parameter
  function swap(address tokenIn, address tokenOut, uint256 amountIn) external {
      uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);
      // User accepts ANY output amount, no matter how unfavorable
  }
  ```

  **Variant 2 - Unenforced Slippage Parameter:**
  ```solidity
  // ❌ VULNERABLE: Parameter exists but NOT checked
  function swap(
      address tokenIn,
      address tokenOut,
      uint256 amountIn,
      uint256 minAmountOut  // ✓ Parameter exists
  ) external {
      uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);
      // ❌ NO VALIDATION! minAmountOut is ignored
      // Should have: require(amountOut >= minAmountOut, "Slippage too high");
  }
  ```

  **Safe Implementation:**
  ```solidity
  // ✅ SAFE: Slippage parameter AND enforcement
  function swap(
      address tokenIn,
      address tokenOut,
      uint256 amountIn,
      uint256 minAmountOut
  ) external {
      uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);
      require(amountOut >= minAmountOut, "Slippage too high"); // ✓ Enforced
  }
  ```

  ## Detection Logic

  This pattern triggers when ALL of these conditions are met:
  1. Function is swap-like (`swap_like: true` - detects swaps semantically)
  2. Function is externally callable (`visibility: [public, external]`)
  3. Function is NOT read-only (`is_view: false`, `is_pure: false`)
  4. **EITHER**:
     - `risk_missing_slippage_parameter: true` (no parameter at all)
     - `risk_missing_slippage_check: true` (parameter exists but not validated)

  ## Builder Properties Used

  - `swap_like`: Semantic swap detection (name + token calls + parameters)
  - `risk_missing_slippage_parameter`: swap_like AND NOT has_slippage_parameter
  - `risk_missing_slippage_check`: has_slippage_parameter AND NOT checks_slippage
  - `has_slippage_parameter`: Detects minOut, amountOutMin, slippage params
  - `checks_slippage`: Validates slippage parameter in require statements
  - `visibility`: Function accessibility
  - `is_view`, `is_pure`: State mutability

  ## Real-World Examples

  ### Historical MEV Extraction:
  - **Flashbots MEV-Explore**: $1.38B+ MEV extracted (2020-2024)
  - **Uniswap V2**: Sandwich attacks on unprotected swaps
  - **SushiSwap**: Similar MEV extraction patterns
  - **1inch**: Router aggregator implements mandatory slippage protection

  ### Academic Research:
  - "Flash Boys 2.0: Frontrunning in Decentralized Exchanges" (arXiv:1904.05234)
  - Flashbots research: ~5% average extraction per vulnerable transaction
  - Chainlink VRF research: MEV extraction mechanisms

  ### Audit Findings:
  - Trail of Bits: "Missing slippage protection allows sandwich attacks"
  - OpenZeppelin: "Swap functions should enforce minimum output"
  - ConsenSys Diligence: "Unprotected AMM interactions"

scope: Function

lens:
  - Ordering
  - ExternalInfluence

severity: medium

status: ready

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be swap-like function (semantic detection)
    - property: swap_like
      op: eq
      value: true

    # Must be externally callable (entry points for MEV)
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE must match (OR logic) - Either vulnerability variant
  any:
    # Variant 1: No slippage parameter at all
    - property: risk_missing_slippage_parameter
      op: eq
      value: true

    # Variant 2: Slippage parameter exists but NOT enforced
    - property: risk_missing_slippage_check
      op: eq
      value: true

  # NONE can match (NOT logic) - Exclude safe patterns
  none:
    # Exclude view/pure functions (read-only, no MEV risk)
    - property: is_view
      op: eq
      value: true

    - property: is_pure
      op: eq
      value: true

