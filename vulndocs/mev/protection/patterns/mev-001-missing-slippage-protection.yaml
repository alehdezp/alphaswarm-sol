attack_scenarios:
  - name: "Classic Sandwich Attack"
    description: |
      MEV bot sandwiches user's swap transaction to extract value through
      price manipulation.
    preconditions:
      - User submits swap transaction without slippage protection
      - MEV bot monitors mempool and detects profitable swap
      - AMM has sufficient liquidity for price impact
      - Gas prices allow profitable sandwich (profit > gas costs)
    steps:
      - User broadcasts swap transaction: 100 USDC → WETH (no minAmountOut)
      - MEV bot detects transaction in mempool
      - Bot calculates optimal sandwich size for maximum profit
      - Bot submits front-run transaction with higher gas: buy WETH
      - Bot's purchase increases WETH price by 2-5%
      - User's transaction executes at inflated price (receives less WETH)
      - Bot submits back-run transaction: sell WETH at profit
      - Bot captures price difference; user loses to slippage
    impact: |
      User receives 2-5% less tokens than expected. On large swaps, this can
      mean thousands of dollars lost to MEV. Bot profits without providing
      any value.

  - name: "Unenforced Parameter Attack"
    description: |
      Function has slippage parameter but doesn't enforce it, giving false
      sense of security to users and frontends.
    preconditions:
      - Function signature includes minAmountOut parameter
      - Frontend/SDK passes reasonable minAmountOut value
      - Contract does NOT validate minAmountOut in code
      - Users assume protection exists based on parameter name
    steps:
      - User calls swap(tokenIn, tokenOut, amountIn, minAmountOut=95)
      - User expects minimum 95 tokens output
      - Contract IGNORES minAmountOut parameter
      - MEV bot sandwiches transaction
      - User receives only 80 tokens (below minAmountOut)
      - Transaction succeeds despite violating slippage expectation
      - User discovers loss post-transaction
    impact: |
      False sense of security leads to unexpected losses. Users and frontends
      trust the parameter naming convention, but contract doesn't enforce it.
      More insidious than missing parameter because it's harder to detect.

  - name: "Multi-Hop Swap MEV"
    description: |
      Complex multi-hop swaps (A→B→C) amplify MEV extraction without slippage
      protection on each hop.
    preconditions:
      - Swap path involves multiple token pairs (e.g., USDC→WETH→DAI)
      - No slippage protection on intermediate or final outputs
      - Each hop has independent liquidity pools
    steps:
      - User initiates multi-hop swap without slippage protection
      - MEV bot identifies all hops in the path
      - Bot sandwiches EACH hop in the path for maximum extraction
      - Price impact compounds across multiple hops
      - User loses 5-15% across the entire path
    impact: |
      Multi-hop swaps without slippage protection experience compounded MEV
      extraction. Each hop can be sandwiched independently, multiplying losses.

verification_steps:
  - "Identify swap-like operation (function name, token transfers, AMM calls)"
  - "Check function visibility (must be public/external for MEV exposure)"
  - "Locate slippage parameter in function signature:"
  - "  - Common names: minAmountOut, amountOutMin, minOut, slippageBps"
  - "  - Type: Usually uint256 representing minimum acceptable output"
  - "If parameter EXISTS, verify enforcement:"
  - "  - Search for require(amountOut >= minAmountOut) or equivalent"
  - "  - Check if parameter is used in conditional logic"
  - "  - Confirm revert on slippage violation (not silent failure)"
  - "If parameter MISSING, confirm vulnerability (no protection at all)"
  - "Check for alternative protections:"
  - "  - Deadline parameter (prevents stale transactions, not direct slippage)"
  - "  - Oracle price checks (rare, usually not sufficient alone)"
  - "  - Router contract with built-in slippage (e.g., Uniswap Router)"
  - "Assess MEV exposure based on liquidity and transaction volume"
  - "Review frontend/SDK integration (does UI calculate slippage?)"

fix_recommendations:
  - name: "Add Slippage Parameter and Enforcement (Recommended)"
    description: |
      Add minAmountOut parameter and enforce it with require statement.
      This is the industry-standard approach used by Uniswap, SushiSwap, etc.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      // ✅ SAFE: Slippage parameter AND enforcement
      contract SafeSwap {
          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut  // ← Add slippage parameter
          ) external returns (uint256) {
              uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              // ✅ CRITICAL: Enforce slippage protection
              require(
                  amountOut >= minAmountOut,
                  "Insufficient output amount"
              );

              return amountOut;
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // AMM swap logic here
              // ...
          }
      }

  - name: "Use Established Router Contracts"
    description: |
      Delegate swap execution to battle-tested routers like Uniswap V2/V3 Router
      which have built-in slippage protection.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      import "@uniswap/v2-periphery/contracts/interfaces/IUniswapV2Router02.sol";

      contract RouterBasedSwap {
          IUniswapV2Router02 public immutable router;

          constructor(address _router) {
              router = IUniswapV2Router02(_router);
          }

          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline
          ) external {
              address[] memory path = new address[](2);
              path[0] = tokenIn;
              path[1] = tokenOut;

              // ✅ Uniswap Router enforces slippage protection
              router.swapExactTokensForTokens(
                  amountIn,
                  minAmountOut,  // Enforced by router
                  path,
                  msg.sender,
                  deadline
              );
          }
      }

  - name: "Percentage-Based Slippage Protection"
    description: |
      Alternative approach using slippage percentage (e.g., 1% = 100 bps).
      Useful for UI/UX where users specify acceptable slippage %.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract PercentageSlippageSwap {
          uint256 public constant MAX_SLIPPAGE_BPS = 500; // 5% max

          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 expectedAmountOut,
              uint256 slippageBps  // Basis points (100 = 1%)
          ) external returns (uint256) {
              require(slippageBps <= MAX_SLIPPAGE_BPS, "Slippage too high");

              uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              // Calculate minimum acceptable output
              uint256 minAmountOut = expectedAmountOut * (10000 - slippageBps) / 10000;

              // ✅ Enforce slippage protection
              require(
                  amountOut >= minAmountOut,
                  "Slippage exceeds tolerance"
              );

              return amountOut;
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // AMM swap logic
              // ...
          }
      }

  - name: "Multi-Hop Swap with Per-Hop Protection"
    description: |
      For complex multi-hop swaps, enforce slippage protection on each hop
      to prevent compounded MEV extraction.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract MultiHopSwap {
          function swapMultiHop(
              address[] calldata path,  // [tokenA, tokenB, tokenC]
              uint256 amountIn,
              uint256 minAmountOut,
              uint256[] calldata minIntermediateAmounts  // Per-hop minimums
          ) external returns (uint256) {
              require(path.length >= 2, "Invalid path");
              require(
                  minIntermediateAmounts.length == path.length - 2,
                  "Invalid intermediate minimums"
              );

              uint256 currentAmount = amountIn;

              // Perform each hop with slippage protection
              for (uint256 i = 0; i < path.length - 1; i++) {
                  uint256 outputAmount = _performSwap(
                      path[i],
                      path[i + 1],
                      currentAmount
                  );

                  // ✅ Enforce slippage on intermediate hops
                  if (i < path.length - 2) {
                      require(
                          outputAmount >= minIntermediateAmounts[i],
                          "Intermediate slippage too high"
                      );
                  }

                  currentAmount = outputAmount;
              }

              // ✅ Enforce final slippage protection
              require(
                  currentAmount >= minAmountOut,
                  "Final slippage too high"
              );

              return currentAmount;
          }

          function _performSwap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn
          ) internal returns (uint256) {
              // Swap logic
              // ...
          }
      }

  - name: "Additional Best Practices"
    description: |
      Combine slippage protection with other MEV mitigation strategies.
    example: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      contract ComprehensiveMEVProtection {
          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut,
              uint256 deadline  // ← Add deadline protection
          ) external returns (uint256) {
              // ✅ Deadline prevents stale transactions
              require(block.timestamp <= deadline, "Transaction expired");

              uint256 amountOut = _performSwap(tokenIn, tokenOut, amountIn);

              // ✅ Slippage protection
              require(amountOut >= minAmountOut, "Slippage too high");

              return amountOut;
          }

          // Additional recommendations:
          // 1. Emit events for MEV monitoring
          // 2. Consider Flashbots Protect integration for private transactions
          // 3. Document recommended slippage values in NatSpec
          // 4. Implement circuit breakers for extreme price movements
          // 5. Use off-chain price oracles to validate fair execution
      }

