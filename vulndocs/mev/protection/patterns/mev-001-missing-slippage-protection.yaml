# Pattern Classification
pattern_type: vulnerability
quality_indicator: false

# Auditor Guidance
auditor_notes: |
  This pattern identifies swap functions vulnerable to MEV sandwich attacks.

  ⚠️ VULNERABILITY INDICATORS:
  - Function performs token swaps (swap_like: true)
  - No slippage parameter (risk_missing_slippage_parameter: true)
  - OR parameter exists but not enforced (risk_missing_slippage_check: true)

  VERIFICATION CHECKLIST:
  1. Confirm function performs swaps (check token transfers, AMM calls)
  2. Check for slippage parameter (minAmountOut, amountOutMin, etc.)
  3. If parameter exists, verify enforcement:
     - Search for require(amountOut >= minAmountOut)
     - Check if parameter is actually used in logic
  4. Assess MEV exposure:
     - Public/external functions are MEV-exposed
     - Internal functions may be safe if callers are protected
  5. Review frontend integration:
     - Does UI calculate and pass slippage parameters?
     - Are default slippage values reasonable (0.5-2% for most assets)?

  FALSE POSITIVE SCENARIOS:
  - Internal helper functions (not externally callable)
  - View/pure functions (read-only, no state changes)
  - Swaps protected by alternative mechanisms (rare)
  - Router-based swaps where router enforces slippage

  SEVERITY ASSESSMENT:
  - HIGH: Large-volume public swap functions without any protection
  - MEDIUM: Moderate-volume swaps or those with partial protection
  - LOW: Internal swaps or those with alternative MEV mitigation

