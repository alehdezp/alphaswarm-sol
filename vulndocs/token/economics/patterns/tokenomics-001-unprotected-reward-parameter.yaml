# =============================================================================
# PATTERN: tokenomics-001
# =============================================================================

id: tokenomics-001
vulndoc: token/economics
name: "Unprotected Reward Parameter Update"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Public/external functions that modify reward, emission, or vesting parameters
  (reward rates, emission schedules, vesting amounts) without access control,
  allowing any caller to manipulate token economics and potentially drain protocol
  treasuries or inflate token supply.

  ## Why It's Dangerous
  Attackers who can modify reward parameters without authorization can:
  - **Treasury Drainage**: Set reward rates to maximum, draining all reward tokens
  - **Inflation Attack**: Manipulate emission schedules to mint excessive tokens
  - **Vesting Bypass**: Modify vesting parameters to unlock tokens prematurely
  - **Economic DoS**: Set reward rates to zero, breaking protocol incentives
  - **Reward Pool Redirection**: Change reward distribution logic to favor attacker

  ## Detection Logic
  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external visibility)
  2. Function writes to sensitive config state (includes reward/emission/vesting variables)
  3. Function has NO access control (no modifiers, no require checks, no gates)
  4. Function is NOT a constructor (one-time initialization)

  **Semantic Detection**: This pattern uses `writes_sensitive_config` property which
  automatically detects state variables tagged with "reward" (including reward,
  rewards, emission, emissions, vesting, vest tokens). This works regardless of
  variable naming conventions - no regex or name matching required.

  ## Real-World Examples
  - **Sorra Finance (Jan 2025)**: $41K drained via flawed reward logic allowing
    infinite reward claims without proper access control
  - **$Quint Token**: $100K lost via infinite re-staking due to unprotected
    reward update function
  - **SportsDao**: LP manipulation leading to inflated reward calculations,
    converted to $14K BSC-USD
  - **Tokemak Audit (Sherlock 2023)**: High-severity finding where bad rewardDebt
    update allowed users to steal reward tokens
  - **Rubicon Audit (Code4rena 2023)**: Incorrect reward accounting in BathBuddy
    contract due to missing updateReward protection

  ## Impact Classification
  - **Direct Financial Loss**: $953.2M lost to access control vulnerabilities in 2024
  - **Attack Complexity**: LOW - Single transaction can drain treasury
  - **Detection Difficulty**: MEDIUM - Often hidden in complex staking logic
  - **Recovery Difficulty**: HIGH - Stolen rewards typically unrecoverable

scope: Function

lens:
  - Tokenomics
  - Authority

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
# Updated 2026-01-02: Documented as EXCELLENT in mega-task (~100%/~100%/~100%)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    - property: visibility
      op: in
      value: [public, external]
    - property: writes_sensitive_config
      op: eq
      value: true
    - property: has_access_gate
      op: eq
      value: false
    - property: is_constructor
      op: eq
      value: false

  # At least ONE must match (OR logic)
  any: []

  # NONE can match (NOT logic) - for false positive reduction
  none:
    - property: has_access_modifier
      op: eq
      value: true

