# =============================================================================
# ROADMAP FIELDS (Future Capabilities)
# =============================================================================

# Semantic Operations (Phase 1-3)
# Note: Currently using property-based detection (uses_erc20_transfer_from, writes_balance_state)
# Future: Could use operation-based matching with RECEIVES_VALUE_IN + WRITES_USER_BALANCE
semantic_ops:
  has_all_operations:
    - RECEIVES_VALUE_IN
    - WRITES_USER_BALANCE
  # Pattern: Receive tokens and write balance without validation

# Behavioral Signature (Phase 2)
behavioral_signature:
  pattern: "R:in→W:bal"
  description: "Receive value in and write balance without validation"

# Exploit Database Similarity (Phase 10)
exploit_similarity:
  matches: [balancer-fot-2020, 88mph-rebase-2021, gitcoin-fot-2023]
  description: "Matches fee-on-transfer accounting patterns"

# Multi-Agent Verification Hints (Phase 9)
verification_agents:
  # Explorer agent: Trace token flow from sender to balance update
  explorer:
    entry_points: [EntryPoint]
    must_traverse:
      - operation: RECEIVES_VALUE_IN
      - operation: WRITES_USER_BALANCE
    max_depth: 3

  # Pattern agent: Structural motif matching
  pattern:
    require_all_conditions: true

  # Constraint agent: Verify accounting invariant can be violated
  constraint:
    enabled: true
    variables:
      - name: amount
        type: uint256
        source: function_parameter
      - name: received
        type: uint256
        source: derived
      - name: fee
        type: uint256
        value: "amount * 2 / 100"  # 2% fee example
    vulnerability_condition: "received < amount AND credited == amount"
    verdict:
      sat: vulnerable
      unsat: safe

  # Risk agent: Assess insolvency risk
  risk:
    assess_likelihood: true
    assess_impact: true
    min_exploitability_score: 6.0  # High severity

  # Consensus requirement
  consensus:
    min_agents_agree: 3
    mode: voting

