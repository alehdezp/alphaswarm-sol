# Why withdrawals are NOT affected
withdrawal_safety_note: |
  Withdrawal functions are NOT vulnerable to this issue because:
  1. Contract transfers OUT (not IN) - no received amount to validate
  2. User withdraws from their credited balance (already affected by deposit)
  3. The accounting error occurs at DEPOSIT time, not withdrawal time

  However, withdrawals EXPOSE the vulnerability:
  - First withdrawers can extract full credited amounts
  - Later withdrawers face insufficient balance
  - This creates a "bank run" scenario

# Testing recommendations
testing_recommendations:
  - "Test with actual fee-on-transfer token (or mock with fee)"
  - "Verify: deposit 100 tokens, check internal balance vs actual holdings"
  - "Test multiple deposits: total internal balances should NOT exceed holdings"
  - "Test withdrawals: last user should be able to withdraw full amount"
  - "Edge case: 100% fee token (all transferred amount is fee)"
  - "Edge case: Rebasing token with negative rebase"
