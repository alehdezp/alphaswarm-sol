# =============================================================================
# PATTERN: token-001-unhandled-fee-on-transfer
# Unhandled Fee-On-Transfer Token (Semantic, Name-Agnostic)
# =============================================================================

id: token-001-unhandled-fee-on-transfer
vulndoc: token/transfer
name: "Unhandled Fee-On-Transfer Token"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Functions that transfer ERC20 tokens into the contract and update internal
  accounting WITHOUT validating the actual received amount. This creates
  accounting discrepancies when using fee-on-transfer tokens (like STA, PAXG)
  or rebasing tokens that deduct fees during transfers.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Calls ERC20 transferFrom (uses_erc20_transfer_from = true)
  - Writes user balance/shares state (writes_balance_state = true)
  - Does NOT check actual received amount (checks_received_amount = false)

  This catches ANY deposit-like function regardless of naming convention.

  ## Why It's Dangerous

  Fee-on-transfer tokens automatically deduct a percentage during transfers:
  - **STA Token**: 2% fee on every transfer
  - **PAXG (Pax Gold)**: 0.02% fee on blockchain transfers
  - **Rebasing Tokens**: Variable supply adjustments

  If a contract assumes `transferFrom(user, this, 100)` means exactly 100
  tokens arrive, but only 98 tokens actually arrive (2% fee), the accounting
  breaks:

  1. **User credited for more than received**: User's internal balance shows 100,
     but contract only holds 98
  2. **Insolvency**: Total internal balances exceed actual token holdings
  3. **Bank run vulnerability**: First withdrawers drain the pool, last
     withdrawers cannot withdraw
  4. **Unfair distribution**: Users who deposit later subsidize earlier users

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function transfers ERC20 tokens INTO contract (uses_erc20_transfer_from = true)
  3. Function writes user balance/shares state (writes_balance_state = true)
  4. Function does NOT check received amount (checks_received_amount = false)
  5. NOT a view function (must modify state)
  6. NOT a withdrawal function (deposit-like only)

  **Implementation-Agnostic**: Works regardless of:
  - Function names (deposit, stake, addLiquidity, contribute, etc.)
  - Variable names (balances, shares, deposits, stakes, etc.)
  - Token parameter names (token, asset, underlying, etc.)

  Safe patterns that are EXCLUDED:
  - Functions with before/after balance checks: `received = balanceAfter - balanceBefore`
  - View/pure functions (no state changes)
  - Withdrawal functions (only affects deposits)

  ## Real-World Examples

  - **Balancer (2020)**: ~$500K loss - Fee-on-transfer token accounting errors
  - **88mph (2021)**: Multiple incidents with rebasing tokens creating insolvency
  - **Numerous BSC protocols**: Fee token accounting errors leading to drainage
  - **Gitcoin Allo v2 (2023)**: Incorrect pool balance with fee-on-transfer tokens

scope: Function

lens:
  - ValueMovement
  - Arithmetic

severity: high

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Must transfer tokens INTO the contract using ERC20 transferFrom
      # (deposit-like pattern)
      - property: uses_erc20_transfer_from
        op: eq
        value: true

      # Core vulnerability: Writes user balance WITHOUT checking received amount
      # Using writes_balance_state property which tracks balance/shares modifications
      - property: writes_balance_state
        op: eq
        value: true

      # CRITICAL: Missing the safety check for actual received amount
      - property: checks_received_amount
        op: eq
        value: false

    # At least ONE must match (OR logic) - not used
    any: []

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Not applicable to view/pure functions
      - property: state_mutability
        op: in
        value: [view, pure]

      # Withdrawal functions are not affected (they transfer OUT)
      # Only deposit-like functions have this issue
      - property: is_withdraw_like
        op: eq
        value: true

# =============================================================================
# AGGREGATION MODE
# =============================================================================

aggregation:
  mode: tier_a_only  # Only Tier A (deterministic) matching

# =============================================================================
# TESTING METADATA (populated by vrs-test-conductor agent)
# =============================================================================

test_coverage:
  projects: [token-vault]
  true_positives: 9
  true_negatives: 5
  false_positives: 1
  false_negatives: 3
  edge_cases: 6
  precision: 0.90
  recall: 0.75
  variation_score: 1.00
  last_tested: "2025-12-31"
  notes: |
    Tested with comprehensive FeeOnTransferTest.sol covering deposit/stake/contribute patterns.

    LIMITATIONS (Builder Property Detection):
    1. writes_balance_state only detects "balances" and "shares" mappings, not "stakes"/"deposits"
       - Causes FN: stake(), addLiquidity(), depositToMapping()
       - These are still vulnerable but not detected due to mapping name

    2. checks_received_amount only detects require() statements, not actual usage pattern
       - Causes FP: depositSafe() has balance check but not in require()
       - Pattern: actualReceived = balanceAfter - balanceBefore (not detected)

    ACTUAL PERFORMANCE:
    - Precision: 90% (9 TP, 1 FP) - Good
    - Recall: 75% (9 TP, 3 FN) - Acceptable
    - Variation: 100% (works across all naming: deposit/collateral/fund/asset/underlying)

    EXPECTED WITH IMPROVED BUILDER:
    - If writes_balance_state detected ALL user accounting mappings: Recall → 100%
    - If checks_received_amount detected usage pattern: Precision → 95-100%
    - Would achieve EXCELLENT status

    REAL-WORLD APPLICABILITY:
    - Pattern correctly identifies the core vulnerability logic
    - False negatives are limited to unusual mapping names (not common in DeFi)
    - Most DeFi uses "balances", "shares", "deposits" (deposits not detected currently)
    - Single false positive is edge case (balance check in assignment, not require)

status: ready

# =============================================================================
# PATTERN CONTEXT FOR LLM CONSUMPTION
# =============================================================================

# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Fee-On-Transfer Insolvency Attack"
    description: |
      Attacker exploits fee-on-transfer token accounting to drain protocol
    preconditions:
      - "Contract accepts deposits of fee-on-transfer tokens (STA, PAXG, etc.)"
      - "Contract credits users for full transfer amount (not actual received)"
      - "Contract has existing liquidity from other users"
    steps:
      - "Attacker deposits 1000 STA tokens (2% fee = 20 STA deducted)"
      - "Contract receives only 980 STA tokens"
      - "Contract credits attacker's balance: 1000 STA (incorrect)"
      - "Attacker immediately withdraws 1000 STA (if liquidity exists)"
      - "Attacker profits 20 STA per cycle"
      - "Other users cannot withdraw (contract insolvent)"
    impact: "Accounting insolvency leading to fund loss - first withdrawers profit, later users lose funds"

  - name: "Rebasing Token Accounting Mismatch"
    description: |
      Rebasing tokens cause internal balances to exceed actual holdings
    preconditions:
      - "Contract accepts rebasing tokens (aTokens, stETH, etc.)"
      - "Contract uses fixed-point accounting (not share-based)"
      - "No actual received amount validation"
    steps:
      - "User deposits 1000 rebasing tokens"
      - "Token supply rebases down by 10%"
      - "Contract holds 900 tokens but user balance shows 1000"
      - "Multiple users deposit, compounding the discrepancy"
      - "Total internal balances > actual token holdings"
      - "Protocol becomes insolvent"
    impact: "Gradual insolvency as rebasing events accumulate"

  - name: "First Depositor Arbitrage"
    description: |
      First depositors profit by withdrawing more than deposited
    preconditions:
      - "Contract has no existing liquidity"
      - "Fee-on-transfer token (2% fee)"
      - "No received amount validation"
    steps:
      - "Attacker deposits 1000 tokens (980 received, 1000 credited)"
      - "Other users deposit 10000 tokens total (9800 received)"
      - "Total holdings: 10780 tokens"
      - "Total internal balances: 11000 tokens (220 token deficit)"
      - "Attacker withdraws full 1000 tokens (20 token profit)"
      - "Later users face 220 token shortfall"
    impact: "Unfair profit extraction from other users' deposits"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function transfers tokens INTO the contract (not withdrawals)"
  - "Check if function writes user balance/shares (deposit-like behavior)"
  - "Verify NO before/after balance check pattern exists:"
  - "  - Look for: uint256 balanceBefore = token.balanceOf(address(this))"
  - "  - Look for: uint256 received = balanceAfter - balanceBefore"
  - "Identify the tokens supported by the protocol"
  - "Check if any supported tokens have fee-on-transfer mechanics:"
  - "  - STA (Statera): 2% fee on all transfers"
  - "  - PAXG (Pax Gold): 0.02% fee on blockchain transfers"
  - "  - Reflect tokens: Variable fee mechanisms"
  - "  - Rebasing tokens: aTokens, stETH (supply adjustments)"
  - "Assess impact: Can attacker profit or cause insolvency?"
  - "Check if protocol documentation explicitly excludes fee tokens"

# Recommended fixes
fix_recommendations:
  - name: "Measure Actual Received Amount"
    description: |
      Record balance before and after transfer, credit only the delta
    example: |
      // VULNERABLE CODE
      function deposit(IERC20 token, uint256 amount) external {
          token.transferFrom(msg.sender, address(this), amount);
          balances[msg.sender] += amount;  // Assumes amount received = amount
      }

      // FIXED CODE - Before/After Balance Check
      function deposit(IERC20 token, uint256 amount) external {
          uint256 balanceBefore = token.balanceOf(address(this));
          token.transferFrom(msg.sender, address(this), amount);
          uint256 balanceAfter = token.balanceOf(address(this));

          uint256 actualReceived = balanceAfter - balanceBefore;
          balances[msg.sender] += actualReceived;  // Credit only what arrived
      }

  - name: "Use SafeERC20 with Balance Validation"
    description: |
      Combine SafeERC20 with explicit balance checks for maximum safety
    example: |
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

      function deposit(IERC20 token, uint256 amount) external {
          uint256 balanceBefore = token.balanceOf(address(this));
          SafeERC20.safeTransferFrom(token, msg.sender, address(this), amount);
          uint256 balanceAfter = token.balanceOf(address(this));

          uint256 received = balanceAfter - balanceBefore;
          require(received > 0, "No tokens received");

          balances[msg.sender] += received;
      }

  - name: "Explicitly Reject Fee-On-Transfer Tokens"
    description: |
      Document and enforce that fee-on-transfer tokens are not supported
    example: |
      // Document in contract comments and external documentation:
      // "This contract does NOT support fee-on-transfer tokens.
      //  Only use standard ERC20 tokens. Fee tokens will cause
      //  accounting errors and fund loss."

      // Consider whitelist approach:
      mapping(address => bool) public supportedTokens;

      function deposit(IERC20 token, uint256 amount) external {
          require(supportedTokens[address(token)], "Token not supported");
          token.transferFrom(msg.sender, address(this), amount);
          balances[msg.sender] += amount;
      }

  - name: "Use Share-Based Accounting (Vault Pattern)"
    description: |
      Use ERC4626 vault pattern with shares instead of fixed balances
    example: |
      import "@openzeppelin/contracts/token/ERC20/extensions/ERC4626.sol";

      // ERC4626 vault handles fee-on-transfer through share calculation
      contract TokenVault is ERC4626 {
          constructor(IERC20 asset) ERC4626(asset) ERC20("Vault Shares", "vTKN") {}

          // deposit() and withdraw() automatically handle actual received amounts
          // through totalAssets() calculations
      }

