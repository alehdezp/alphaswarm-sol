# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: Silent Transfer Failure with Balance Corruption
    description: |
      Transfer returns false but function continues, crediting user for tokens
      never received, leading to insolvency and fund loss.
    preconditions:
      - "Contract uses direct ERC20 transfer/transferFrom without return check"
      - "Token returns false instead of reverting on failure"
      - "Function updates balances/state after transfer call"
    steps:
      - "Attacker calls deposit with insufficient token balance"
      - "Contract calls token.transferFrom(attacker, this, amount)"
      - "Token returns false (insufficient balance)"
      - "Contract ignores return value and continues"
      - "Contract credits attacker's internal balance: balances[attacker] += amount"
      - "Attacker now has credited balance without transferring tokens"
      - "Attacker withdraws tokens from contract (other users' funds)"
    impact: |
      Direct theft of funds. Attacker receives contract's tokens without
      depositing, draining protocol and causing insolvency.

  - name: Approval Failure Leading to Stuck Funds
    description: |
      Approve call fails but contract assumes success, leading to failed
      subsequent operations and stuck user funds.
    preconditions:
      - "Contract uses ERC20.approve() without checking return"
      - "Token returns false on approval failure"
    steps:
      - "User deposits tokens requiring contract to approve third party"
      - "Contract calls token.approve(thirdParty, amount)"
      - "Approve returns false (e.g., token paused, blacklist)"
      - "Contract assumes approval succeeded"
      - "Subsequent transferFrom fails (no allowance)"
      - "User's tokens stuck in contract"
    impact: |
      User funds become locked in contract, unable to be withdrawn or used.
      Loss of user trust and protocol reputation.

  - name: BadgerDAO-Style Vault Exploit
    description: |
      Vault credits shares for failed deposits, allowing attacker to withdraw
      more than deposited, draining vault reserves.
    preconditions:
      - "Vault contract accepts deposits with unchecked transferFrom"
      - "Token can return false without reverting"
      - "Vault mints shares based on deposit amount"
    steps:
      - "Attacker approves vault for 0 tokens (or revokes approval)"
      - "Attacker calls vault.deposit(largeAmount)"
      - "Vault calls token.transferFrom(attacker, vault, largeAmount)"
      - "TransferFrom returns false (no allowance)"
      - "Vault ignores return, mints shares: shares[attacker] += largeAmount"
      - "Attacker now holds shares worth largeAmount without depositing"
      - "Attacker withdraws, draining vault reserves"
    impact: |
      Complete vault drainage. $120M lost in BadgerDAO exploit using similar
      pattern. Protocol becomes insolvent.

  - name: Fee-on-Transfer Token Interaction
    description: |
      Combined with fee-on-transfer tokens, unchecked returns amplify balance
      corruption when transfer amounts don't match received amounts.
    preconditions:
      - "Contract accepts fee-on-transfer tokens"
      - "Transfer return values not checked"
      - "No balance-before/after comparison"
    steps:
      - "User deposits 100 tokens with 10% fee"
      - "Contract calls token.transferFrom(user, this, 100)"
      - "Token transfers 90 (10% fee), returns true"
      - "If transfer had failed and returned false, contract wouldn't know"
      - "Contract credits 100 tokens: balances[user] += 100"
      - "Already 10% discrepancy; unchecked return amplifies risk"
    impact: |
      Compounded accounting errors. Single vulnerability (unchecked return)
      combines with fee-on-transfer to create larger insolvency.

# How to further verify this is not a false positive
verification_steps:
  - "Verify function calls ERC20 transfer/transferFrom/approve directly (not SafeERC20)"
  - "Confirm function modifies state after token call (balances, shares, etc.)"
  - "Check if return value is captured: `bool success = token.transfer(...)`"
  - "Verify no require() or if-check on return value"
  - "Look for try-catch blocks around token calls (acceptable pattern)"
  - "Test with token that returns false on failure (not all tokens revert)"
  - "Verify this is NOT view/pure function (those don't modify state)"
  - "Check if this is a critical path (deposit/withdraw/claim) vs helper"

# Recommended fixes
fix_recommendations:
  - name: Use OpenZeppelin SafeERC20 (Strongly Recommended)
    description: |
      Replace all direct ERC20 calls with SafeERC20 wrappers. This handles
      both return value checking AND non-standard tokens (token-004).
    example: |
      // BEFORE (VULNERABLE):
      function deposit(IERC20 token, uint256 amount) external {
          token.transferFrom(msg.sender, address(this), amount); // ❌ No check
          balances[msg.sender] += amount;
      }

      // AFTER (SAFE):
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

      function deposit(IERC20 token, uint256 amount) external {
          SafeERC20.safeTransferFrom(token, msg.sender, address(this), amount); // ✓ Reverts on failure
          balances[msg.sender] += amount;
      }

      // Also applies to transfer and approve:
      // token.transfer(to, amount) → SafeERC20.safeTransfer(token, to, amount)
      // token.approve(spender, amount) → SafeERC20.safeApprove(token, spender, amount)

  - name: Explicit Return Value Check with require()
    description: |
      Capture return value and validate with require(). Simpler than SafeERC20
      but doesn't handle non-standard tokens that return void.
    example: |
      // Checks return value but may still revert on void-return tokens
      function deposit(IERC20 token, uint256 amount) external {
          require(
              token.transferFrom(msg.sender, address(this), amount),
              "Transfer failed"
          );
          balances[msg.sender] += amount;
      }

      // Alternative style:
      function deposit(IERC20 token, uint256 amount) external {
          bool success = token.transferFrom(msg.sender, address(this), amount);
          require(success, "Transfer failed");
          balances[msg.sender] += amount;
      }

  - name: Try-Catch with Revert
    description: |
      Use try-catch to handle both reverts and false returns. More verbose
      but provides fine-grained error handling.
    example: |
      function deposit(IERC20 token, uint256 amount) external {
          try token.transferFrom(msg.sender, address(this), amount) returns (bool success) {
              require(success, "Transfer returned false");
              balances[msg.sender] += amount;
          } catch {
              revert("Transfer failed");
          }
      }

  - name: Balance Before/After Pattern (Defense in Depth)
    description: |
      Combine return value check with balance verification. Provides maximum
      safety including fee-on-transfer protection.
    example: |
      function deposit(IERC20 token, uint256 amount) external {
          uint256 balanceBefore = token.balanceOf(address(this));

          require(
              token.transferFrom(msg.sender, address(this), amount),
              "Transfer failed"
          );

          uint256 balanceAfter = token.balanceOf(address(this));
          uint256 actualReceived = balanceAfter - balanceBefore;

          // Credit only what was actually received
          balances[msg.sender] += actualReceived;
      }

