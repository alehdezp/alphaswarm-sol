  notes: |
    READY status (84.6% precision, 100% recall, 100% variation).

    Pattern successfully detects unchecked ERC20 transfer/transferFrom/approve calls
    with state modifications across all naming variations.

    Known False Positives (4):
    - depositBoolCheck: bool + require on separate lines (not detected by builder)
    - withdrawBoolCheck: bool + require on separate lines (not detected by builder)
    - depositTryCatch: try-catch blocks not detected as guards
    - approveWithCheck: bool + require on separate lines (not detected by builder)

    Root Cause: builder.py _has_custom_return_guard() only detects inline if-checks,
    not multi-line bool variable + require patterns or try-catch blocks.

    Improvement: Enhance builder.py to detect:
    - Multi-line bool assignments with subsequent require()
    - try-catch blocks with return value validation
    - More sophisticated AST-based guard detection

    These false positives are acceptable for READY status as they're edge cases
    representing <16% of findings. Production usage should prioritize recall
    (catching all vulnerabilities) over precision in HIGH severity patterns.

# =============================================================================
# BUILDER PROPERTY DEPENDENCIES
# =============================================================================
#
# This pattern relies on the following builder.py properties:
#
# uses_erc20_transfer (line 687):
#   - Detects calls to ERC20 transfer() method
#   - Set when "transfer" found in token_call_kinds from _token_call_kinds()
#   - Identifies ERC20.transfer(address,uint256) pattern
#
# uses_erc20_transfer_from (line 688):
#   - Detects calls to ERC20 transferFrom() method
#   - Set when "transferfrom" found in token_call_kinds
#   - Identifies ERC20.transferFrom(address,address,uint256) pattern
#
# uses_erc20_approve (line 689):
#   - Detects calls to ERC20 approve() method
#   - Set when "approve" found in token_call_kinds
#   - Identifies ERC20.approve(address,uint256) pattern
#
# uses_safe_erc20 (line 703):
#   - Detects usage of OpenZeppelin SafeERC20 wrapper library
#   - Set when any token_call_kind starts with "safe"
#   - Identifies safeTransfer, safeTransferFrom, safeApprove patterns
#
# token_return_guarded (lines 705, 776-778):
#   - Comprehensive return value guard detection
#   - True if ANY of:
#     - checks_token_call_return (line 704): require() on token call
#     - uses_safe_erc20 (line 703): SafeERC20 library usage
#     - custom_return_guard (line 775): Custom if-checks on return value
#   - Method: _checks_token_call_return (lines 3540-3542)
#     - Searches require_exprs for token call patterns
#   - Method: _has_custom_return_guard (lines 3544-3553)
#     - Detects if-statements checking transfer/approve returns
#     - Looks for patterns like: if (!token.transfer(...))
#
# writes_state (standard Slither property):
#   - True when function modifies contract state variables
#   - Excludes pure/view functions
#   - Critical for ensuring unchecked transfer has real impact
#
# visibility (standard Slither property):
#   - Function visibility: public, external, internal, private
#   - We match on public/external (exploitable entry points)
#
# state_mutability (standard Slither property):
#   - Function state mutability: pure, view, nonpayable, payable
#   - We exclude view/pure (no state modification = no risk)
#
# =============================================================================
# KEY DIFFERENCES FROM token-004-non-standard-return
# =============================================================================
#
# token-004: Non-Standard ERC20 Return Value
#   - Focus: Tokens that return VOID instead of bool (USDT, BNB, OMG)
#   - Problem: Type mismatch causes revert (Solidity >=0.4.22)
#   - Detection: writes_balance_state (more specific)
#   - Severity: medium (compatibility issue, prevents usage)
#
# token-005: Unchecked ERC20 Return Value (THIS PATTERN)
#   - Focus: Tokens that return FALSE instead of reverting
#   - Problem: Silent failures allow theft and corruption
#   - Detection: writes_state (more general)
#   - Severity: high (direct fund loss, accounting corruption)
#
# Both patterns are complementary:
#   - token-004: Prevents integration with non-standard tokens
#   - token-005: Prevents silent failures with standard-compliant tokens
#   - Combined: Complete coverage of ERC20 return value issues
