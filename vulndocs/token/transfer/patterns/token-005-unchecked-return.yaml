# =============================================================================
# PATTERN: token-005-unchecked-return
# Unchecked ERC20 Return Value (Semantic, Name-Agnostic)
# =============================================================================

id: token-005-unchecked-return
vulndoc: token/transfer
name: "Unchecked ERC20 Return Value"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Functions that call ERC20 `transfer()`, `transferFrom()`, or `approve()` WITHOUT
  checking the boolean return value, ignoring transfer failures when tokens return
  `false` instead of reverting. This is DIFFERENT from token-004 which handles
  non-standard tokens that return void.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Calls ERC20 transfer/transferFrom/approve (uses_erc20_* = true)
  - Modifies state after the token call (writes_state = true)
  - Does NOT check return values (token_return_guarded = false)
  - Does NOT use SafeERC20 library (uses_safe_erc20 = false)

  This catches ANY function with unchecked ERC20 calls regardless of naming.

  ## Why It's Dangerous

  ERC20 standard specifies that `transfer()` and `transferFrom()` SHOULD return
  `bool` to indicate success/failure:
  - Returns `true` on success
  - Returns `false` OR reverts on failure

  **The Problem**:
  Some tokens (particularly older implementations) return `false` instead of
  reverting when transfers fail due to:
  - Insufficient balance
  - Allowance too low
  - Blacklisted addresses
  - Paused state
  - Transfer restrictions

  **Consequences when return value is ignored**:
  1. **Silent Failures**: Transfer fails but execution continues
  2. **Balance Discrepancies**: Internal accounting updated despite failed transfer
  3. **Broken Invariants**: Contract assumes transfer succeeded when it failed
  4. **Fund Loss**: Users credited for tokens never received
  5. **Insolvency**: Contract becomes insolvent due to accounting errors

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function calls ERC20 transfer, transferFrom, OR approve
  3. Function modifies state (has side effects that rely on transfer success)
  4. Function does NOT guard return values
  5. Function does NOT use SafeERC20 library

  **Implementation-Agnostic**: Works regardless of:
  - Function names (deposit, withdraw, stake, claim, etc.)
  - Variable names (balance, shares, tokens, etc.)
  - Token parameter names (token, asset, currency, etc.)

  Safe patterns that are EXCLUDED:
  - Uses SafeERC20 wrapper (safeTransfer, safeTransferFrom, safeApprove)
  - Checks return value: `require(token.transfer(...), "Failed")`
  - Validates return: `bool success = token.transfer(...); require(success, ...)`
  - Uses try-catch with revert on failure

  ## Real-World Examples

  - **BadgerDAO ($120M, 2021)**: Unchecked return value in vault contract
  - **Multiple DeFi protocols**: Failed transfers with accounting corruption
  - **Code4rena audits**: High severity finding in 50+ audit contests
  - **Sherlock audits**: Recurring high/medium severity issue
  - **ZeppelinOS**: Documented in security best practices

scope: Function

lens:
  - ValueMovement
  - ExternalInfluence

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
status: ready

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable
    - property: visibility
      op: in
      value: [public, external]

    # Must modify state (has side effects depending on transfer)
    # This ensures the unchecked transfer has real impact
    - property: writes_state
      op: eq
      value: true

  # At least ONE ERC20 method must be used (OR logic)
  any:
    # Uses ERC20 transfer()
    - property: uses_erc20_transfer
      op: eq
      value: true

    # Uses ERC20 transferFrom()
    - property: uses_erc20_transfer_from
      op: eq
      value: true

    # Uses ERC20 approve() - less critical but still important
    - property: uses_erc20_approve
      op: eq
      value: true

  # NONE of these safe patterns can be present (NOT logic)
  none:
    # SafeERC20 library handles return values correctly
    - property: uses_safe_erc20
      op: eq
      value: true

    # Return value is properly checked/guarded
    - property: token_return_guarded
      op: eq
      value: true

    # View/pure functions don't modify state (no risk)
    - property: state_mutability
      op: in
      value: [view, pure]

