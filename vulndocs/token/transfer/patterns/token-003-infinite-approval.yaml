# Detection limitations
detection_notes: |
  **Current Limitation**: This pattern detects ANY use of approve(), not just
  infinite approvals. To detect ONLY infinite approvals, we would need:
  1. AST analysis to find literal type(uint256).max usage
  2. Data flow analysis to track approval amount parameter
  3. Constant propagation to identify max values

  **Future Enhancement**: Could be enhanced with:
  - Property: uses_max_uint_approval (checks for type(uint256).max literal)
  - Property: has_approval_amount_cap (validates amount < max)
  - Property: has_approval_expiry (time-based approval expiration)

  These properties would require builder.py modifications to track approval
  amount literals and validation patterns.

  **For Now**: This pattern flags all approve() usage as INFO/MEDIUM and
  expects auditors to manually verify:
  1. Is the approval amount type(uint256).max?
  2. Is there an alternative limited-approval function?
  3. Is the approved contract well-audited and immutable?

