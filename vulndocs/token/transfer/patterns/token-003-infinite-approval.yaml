# =============================================================================
# PATTERN: token-003-infinite-approval
# Infinite Token Approval Risk
# =============================================================================

id: token-003-infinite-approval
vulndoc: token/transfer
name: "Infinite Token Approval"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Functions that approve infinite/maximum token allowances (type(uint256).max)
  to external contracts without time-based expiry or amount caps. This pattern
  detects calls to ERC20 approve() that grant unlimited spending power.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Calls ERC20 approve() (uses_erc20_approve = true)
  - Approves infinite amounts (approves_infinite_amount = true)
  - Grants unlimited spending power via type(uint256).max or equivalent

  **Note**: While infinite approvals are industry standard for gas efficiency,
  they create permanent risk exposure. If the approved contract is exploited,
  attackers can drain ALL tokens, not just the intended amount.

  ## Why It's Dangerous

  Infinite approvals (type(uint256).max) create several security risks:

  1. **Contract Compromise Amplification**: If the approved contract has a
     vulnerability discovered later, attackers can drain unlimited tokens
     from all users who granted infinite approval

  2. **Permanent Permission**: Unlike limited approvals that expire after use,
     infinite approvals remain active indefinitely, creating ongoing risk

  3. **No Amount Control**: Users cannot limit exposure to specific amounts,
     making every vulnerability a total-loss scenario

  4. **Hidden Risk**: Users often don't realize they've granted permanent
     unlimited access to their token balances

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function calls ERC20 approve() (uses_erc20_approve = true)
  3. Function approves infinite amount (approves_infinite_amount = true)
  4. Function is NOT view/pure (must actually grant approval)

  **Implementation-Agnostic**: Works regardless of:
  - Function names (approve, approveToken, grantAllowance, etc.)
  - Variable names (spender, contract, target, etc.)
  - Infinite amount syntax (type(uint256).max, 2**256-1, 0xfff...fff, ~uint(0))

  **Severity Note**: This is marked as MEDIUM because infinite approvals are
  industry standard and widely used. The risk is CONDITIONAL on the approved
  contract having vulnerabilities. For many well-audited protocols, infinite
  approval is acceptable. However, users should be informed of the risk.

  This pattern is INFO-level when:
  - Approving well-audited, immutable contracts (Uniswap Router, etc.)
  - Protocol documentation clearly warns users
  - Alternative limited-approval functions exist

  This pattern is MEDIUM-HIGH when:
  - Approving upgradeable contracts (implementation can change)
  - No alternative limited-approval option provided
  - Users not informed of risk

  ## Real-World Examples

  **Major Exploits Due to Infinite Approvals:**
  - **SHOPX Protocol (2022)**: $7M - Unlimited approval exploit drained wallets
  - **Li.Fi Protocol (2024)**: $9.7M - Contract vulnerability + infinite approvals
  - **SocketDotTech/Bungee (2024)**: $3.3M - Input validation flaw exploited via
    existing infinite approvals

  **Important**: The vulnerability is NOT in the approval itself, but in the
  COMBINATION of infinite approval + later contract compromise. However, limited
  approvals would have reduced the blast radius significantly.

scope: Function

lens:
  - ValueMovement
  - ExternalInfluence

severity: medium

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Must call ERC20 approve() function
      # This detects any call to approve() on token contracts
      - property: uses_erc20_approve
        op: eq
        value: true

      # Must approve infinite amount (NEW - eliminates limited approval FPs)
      # Detects type(uint256).max, 2**256-1, 0xfff...fff, ~uint(0), etc.
      - property: approves_infinite_amount
        op: eq
        value: true

    # At least ONE must match (OR logic) - not used
    any: []

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Not applicable to view/pure functions
      - property: state_mutability
        op: in
        value: [view, pure]

# =============================================================================
# AGGREGATION MODE
# =============================================================================

aggregation:
  mode: tier_a_only  # Only Tier A (deterministic) matching

