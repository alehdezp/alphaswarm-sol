# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Post-Approval Contract Compromise"
    description: |
      Attacker exploits vulnerability in approved contract to drain all tokens
    preconditions:
      - "User granted infinite approval (type(uint256).max) to a contract"
      - "Approved contract has a vulnerability discovered later"
      - "User has not revoked the approval"
    steps:
      - "User calls approve(spender, type(uint256).max) on token contract"
      - "Approval stored permanently on-chain"
      - "Time passes (days/months/years)"
      - "Attacker discovers vulnerability in spender contract"
      - "Attacker exploits vulnerability to call transferFrom(victim, attacker, balance)"
      - "ALL victim's tokens drained using existing infinite approval"
      - "User has no time to react or revoke approval"
    impact: "Complete token loss for all users who granted infinite approval"

  - name: "Upgradeable Contract Risk"
    description: |
      Approved contract is upgraded to malicious implementation
    preconditions:
      - "Users granted infinite approval to upgradeable proxy"
      - "Proxy admin is compromised or malicious"
      - "No timelock or multisig protection on upgrades"
    steps:
      - "Users grant infinite approval to proxy contract"
      - "Attacker compromises proxy admin key OR admin is malicious"
      - "Admin upgrades proxy to malicious implementation"
      - "Malicious implementation calls transferFrom on all approving users"
      - "All tokens drained from users with infinite approvals"
    impact: "Total loss for all users who granted infinite approval"

  - name: "Flash Loan Attack on Approved Contract"
    description: |
      Attacker uses flash loan to exploit approved contract logic
    preconditions:
      - "Users granted infinite approval to DeFi protocol"
      - "Protocol has flash loan or oracle manipulation vulnerability"
      - "Protocol uses transferFrom to move user tokens"
    steps:
