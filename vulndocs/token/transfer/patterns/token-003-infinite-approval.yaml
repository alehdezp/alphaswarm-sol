# How to further verify this is not a false positive
verification_steps:
  - "Identify WHAT contract is being approved (the spender parameter)"
  - "Check if approval amount is type(uint256).max or similar max value"
  - "Assess approved contract's security posture:"
  - "  - Is it audited? By whom? How recently?"
  - "  - Is it upgradeable? Who controls upgrades? Timelock?"
  - "  - Is it immutable? Can code never change?"
  - "Evaluate alternative approaches:"
  - "  - Does protocol offer limited-approval option?"
  - "  - Can users use ERC20Permit for just-in-time approval?"
  - "  - Can users revoke approval easily?"
  - "Check documentation:"
  - "  - Are users warned about infinite approval risk?"
  - "  - Is there guidance on revoking approvals?"
  - "Assess severity based on context:"
  - "  - INFO: Well-audited immutable contract (Uniswap Router v2)"
  - "  - MEDIUM: Audited upgradeable contract with timelock"
  - "  - HIGH: Upgradeable contract with single admin key"
  - "  - CRITICAL: Unaudited or recently exploited contract"

# Recommended fixes
fix_recommendations:
  - name: "Implement Limited Approval with Auto-Refresh"
    description: |
      Use exact amount approvals and refresh when needed
    example: |
      // RISKY CODE - Infinite Approval
      function stake(IERC20 token, uint256 amount) external {
          token.approve(address(stakingContract), type(uint256).max);
          stakingContract.deposit(token, amount);
      }

      // SAFER CODE - Limited Approval
      function stake(IERC20 token, uint256 amount) external {
          // Approve only the exact amount needed
          token.approve(address(stakingContract), amount);
          stakingContract.deposit(token, amount);

          // Reset approval to zero after use (optional but safer)
          token.approve(address(stakingContract), 0);
      }

      // BEST CODE - Check existing allowance and top up if needed
      function stake(IERC20 token, uint256 amount) external {
          uint256 currentAllowance = token.allowance(msg.sender, address(stakingContract));

          if (currentAllowance < amount) {
              // Only request additional approval if needed
              uint256 additionalAllowance = amount - currentAllowance;
              token.approve(address(stakingContract), currentAllowance + additionalAllowance);
          }

          stakingContract.deposit(token, amount);
      }

  - name: "Use ERC20Permit for Just-In-Time Approval"
    description: |
      Use ERC2612 permit() for gasless, just-in-time approvals
    example: |
      import "@openzeppelin/contracts/token/ERC20/extensions/IERC20Permit.sol";

      // User signs permit off-chain (no gas cost)
      // Contract uses permit for just-in-time approval
      function stakeWithPermit(
          IERC20Permit token,
          uint256 amount,
          uint256 deadline,
          uint8 v,
          bytes32 r,
          bytes32 s
      ) external {
          // Permit grants exact approval amount and expires at deadline
          token.permit(msg.sender, address(this), amount, deadline, v, r, s);

          // Transfer tokens (uses the just-granted approval)
          token.transferFrom(msg.sender, address(this), amount);

          // Process stake
          _processStake(msg.sender, amount);

          // Approval automatically consumed, no infinite permission remains
      }

  - name: "Offer Both Options with Clear Warning"
    description: |
      Provide both infinite and limited approval options with clear risk disclosure
    example: |
      /**
       * @notice Approve tokens for staking with LIMITED approval (recommended)
       * @dev Approves only the exact amount needed. Safer but requires approval
       *      for each stake transaction (higher gas cost).
       * @param token Token to approve
       * @param amount Amount to approve and stake
       */
      function stakeSafe(IERC20 token, uint256 amount) external {
          token.approve(address(stakingContract), amount);
          stakingContract.deposit(token, amount);
      }

      /**
       * @notice Approve tokens for staking with INFINITE approval (gas efficient)
       * @dev Approves type(uint256).max for one-time gas cost, but creates
       *      permanent risk. If staking contract is exploited, attacker can
       *      drain ALL your tokens. Only use if you trust the staking contract.
       * @param token Token to approve
       * @param amount Amount to stake (approval is infinite)
       */
      function stakeWithInfiniteApproval(IERC20 token, uint256 amount) external {
          // First time: infinite approval (saves gas on future stakes)
          uint256 currentAllowance = token.allowance(msg.sender, address(stakingContract));
          if (currentAllowance < amount) {
              token.approve(address(stakingContract), type(uint256).max);
          }

          stakingContract.deposit(token, amount);
      }

      /**
       * @notice Revoke approval for a token
       * @dev Sets allowance back to zero. Call this if you want to remove
       *      the infinite approval granted by stakeWithInfiniteApproval()
       * @param token Token to revoke approval for
       */
      function revokeApproval(IERC20 token) external {
          token.approve(address(stakingContract), 0);
      }

  - name: "Implement Approval Expiry Mechanism"
    description: |
      Create custom approval system with time-based expiry
    example: |
      // Custom approval system with expiry
      contract TokenVaultWithExpiry {
          struct Approval {
              uint256 amount;
              uint256 expiry;
          }

          // user => token => spender => approval
          mapping(address => mapping(address => mapping(address => Approval))) public approvals;

          /**
           * @notice Approve with expiry timestamp
           * @param token Token to approve
           * @param spender Who can spend
           * @param amount Amount to approve
           * @param duration Approval valid for this many seconds
           */
          function approveWithExpiry(
              IERC20 token,
              address spender,
              uint256 amount,
              uint256 duration
          ) external {
              require(duration <= 30 days, "Max 30 day approval");

              approvals[msg.sender][address(token)][spender] = Approval({
                  amount: amount,
                  expiry: block.timestamp + duration
              });

              emit ApprovalWithExpiry(msg.sender, address(token), spender, amount, duration);
          }

          /**
           * @notice Use approval to transfer tokens
           * @dev Checks expiry before allowing transfer
           */
          function transferFromWithExpiry(
              IERC20 token,
              address from,
              uint256 amount
          ) external {
              Approval storage approval = approvals[from][address(token)][msg.sender];

              require(block.timestamp <= approval.expiry, "Approval expired");
              require(approval.amount >= amount, "Insufficient approval");

              // Decrease approval
              approval.amount -= amount;

              // Transfer tokens
              token.transferFrom(from, address(this), amount);
          }
      }

