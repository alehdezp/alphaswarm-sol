# ADDITIONAL CONTEXT
# =============================================================================

# Industry standards and best practices
industry_context: |
  **Current Practice**: Infinite approvals (type(uint256).max) are WIDESPREAD
  and considered standard in DeFi for gas efficiency. Major protocols use them:
  - Uniswap: Infinite approval to router for swaps
  - Aave: Infinite approval for deposit tokens
  - Curve: Infinite approval for pool tokens

  **Gas Trade-off**:
  - Infinite approval: ~46,000 gas once, then free transfers
  - Limited approval: ~46,000 gas EVERY transaction

  **Risk vs Convenience**:
  For IMMUTABLE, AUDITED contracts (Uniswap Router v2), infinite approval
  risk is minimal. For UPGRADEABLE or UNAUDITED contracts, risk is significant.

  **User Education Gap**:
  Most users don't understand they've granted permanent unlimited access.
  Tools like Revoke.cash exist specifically to help users discover and
  revoke dangerous approvals.

  **Emerging Alternatives**:
  - ERC20Permit (EIP-2612): Gasless approvals via signatures
  - EIP-4494: Permit for NFTs
  - Account Abstraction (ERC-4337): Session keys with limits

