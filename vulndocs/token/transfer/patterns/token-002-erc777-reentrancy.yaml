# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Classic ERC-777 Reentrancy via tokensReceived"
    description: |
      Attacker exploits tokensReceived() callback to re-enter withdraw function
      before balance is updated, draining contract funds
    preconditions:
      - "Contract accepts/handles ERC-777 tokens (imBTC, ERC-777 implementation)"
      - "Withdraw/transfer function sends tokens BEFORE updating balance"
      - "No reentrancy guard (nonReentrant modifier) present"
      - "Attacker has deposited/staked tokens in the contract"
    steps:
      - "Attacker deploys malicious contract implementing IERC777Recipient"
      - "Attacker deposits 100 ERC-777 tokens to build legitimate balance"
      - "Attacker calls withdraw(100) on vulnerable contract"
      - "Contract sends 100 ERC-777 tokens to attacker (via token.send())"
      - "ERC-777 token calls attacker's tokensReceived() hook **BEFORE completing**"
      - "Inside tokensReceived(), attacker calls withdraw(100) AGAIN"
      - "Balance still shows 100 (not updated yet), second withdraw succeeds"
      - "Attacker receives 200 tokens total from 100 deposited"
      - "Repeat until contract is drained"
    impact: "Complete drainage of contract's ERC-777 token holdings - $25M+ in historical attacks"

  - name: "Cross-Function ERC-777 Reentrancy"
    description: |
      Attacker uses tokensReceived() callback to re-enter a DIFFERENT function
      that relies on the same state (cross-function reentrancy)
    preconditions:
      - "Contract has multiple functions operating on same state"
      - "Function A sends ERC-777 tokens (triggers callback)"
      - "Function B reads/modifies same balance state"
      - "No reentrancy guard protecting the shared state"
    steps:
      - "Attacker calls functionA() which sends ERC-777 tokens"
      - "Inside tokensReceived() callback, attacker calls functionB()"
      - "FunctionB() operates on stale state (not yet updated by functionA)"
      - "State inconsistency allows exploitation"
      - "Example: withdraw() sends tokens, claim() reads same balance"
    impact: "Cross-function state inconsistency leading to fund loss or privilege escalation"

  - name: "ERC-777 Operator Reentrancy"
    description: |
      Attacker exploits operatorSend() callback via tokensToSend hook
      to manipulate state before operator transfer completes
    preconditions:
      - "Contract uses ERC-777 operatorSend() for third-party transfers"
      - "tokensToSend() hook triggered on sender before transfer"
      - "State update happens after operatorSend() call"
    steps:
      - "Attacker registers as ERC-777 token holder"
      - "Contract calls token.operatorSend(attacker, recipient, amount)"
      - "Token calls attacker's tokensToSend() hook BEFORE transfer"
      - "Attacker re-enters contract during callback"
      - "Stale state allows double-spend or other exploits"
    impact: "Operator-based reentrancy attack vector, less common but equally dangerous"

  - name: "Read-Only ERC-777 Reentrancy"
    description: |
      Attacker exploits view functions during ERC-777 callback to manipulate
      oracle prices, share calculations, or other derived values
    preconditions:
      - "Contract has view functions reading balance/state"
      - "Other protocols rely on these view functions (oracles, price feeds)"
      - "ERC-777 transfer happens before state update"
    steps:
      - "Victim protocol calls vulnerable contract's getPrice() or similar"
      - "Price depends on balance/state that can be manipulated"
      - "Attacker initiates ERC-777 transfer to trigger callback"
      - "During tokensReceived(), state is inconsistent (mid-transfer)"
      - "Victim protocol reads manipulated price/value"
      - "Attacker profits from price manipulation (e.g., flash loan attack)"
    impact: "Price oracle manipulation, flash loan attacks, cross-protocol exploitation"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function uses ERC-777 token operations (send, operatorSend, burn, mint)"
  - "Verify the token being used IS actually ERC-777 compatible:"
  - "  - Check if token implements ERC-1820 registry (IERC777 interface)"
  - "  - Common ERC-777 tokens: imBTC, some wrapped tokens"
  - "  - Note: Most modern tokens are ERC-20, not ERC-777"
  - "Trace execution order using CFG:"
  - "  1. Identify where ERC-777 token.send() is called"
  - "  2. Identify where balance/state is updated"
  - "  3. Confirm external call happens BEFORE state update (CEI violation)"
  - "Check for reentrancy guards:"
  - "  - Look for: nonReentrant modifier (OpenZeppelin ReentrancyGuard)"
  - "  - Look for: manual reentrancy lock (bool locked pattern)"
  - "Assess attack feasibility:"
  - "  - Can attacker control the recipient address? (receive callback)"
  - "  - Does contract hold significant ERC-777 token balances?"
  - "  - Are there other users' funds at risk?"
  - "Check if ERC-777 support is intentional or accidental"
  - "Verify if safe alternatives exist (ERC-20 instead of ERC-777)"

# Recommended fixes
fix_recommendations:
  - name: "Add Reentrancy Guard (Recommended)"
    description: |
      Use OpenZeppelin's ReentrancyGuard to prevent reentrancy attacks
    example: |
      import "@openzeppelin/contracts/security/ReentrancyGuard.sol";

      contract TokenVault is ReentrancyGuard {
          mapping(address => uint256) public balances;
          IERC777 public token;

          // VULNERABLE CODE
          function withdraw(uint256 amount) external {
              require(balances[msg.sender] >= amount, "Insufficient balance");
              token.send(msg.sender, amount, "");  // ERC-777 callback HERE
              balances[msg.sender] -= amount;      // State update AFTER call
          }

          // FIXED CODE - Reentrancy Guard
          function withdraw(uint256 amount) external nonReentrant {
              require(balances[msg.sender] >= amount, "Insufficient balance");
              token.send(msg.sender, amount, "");  // Protected by guard
              balances[msg.sender] -= amount;      // Safe even after call
          }
      }

  - name: "Follow CEI Pattern (Checks-Effects-Interactions)"
    description: |
      Update state BEFORE external calls to prevent reentrancy exploitation
    example: |
      // VULNERABLE CODE - CEI Violation
      function withdraw(uint256 amount) external {
          require(balances[msg.sender] >= amount, "Insufficient balance");  // Check
          token.send(msg.sender, amount, "");  // Interaction BEFORE Effect
          balances[msg.sender] -= amount;      // Effect AFTER Interaction (WRONG)
      }

      // FIXED CODE - Proper CEI Pattern
      function withdraw(uint256 amount) external {
          require(balances[msg.sender] >= amount, "Insufficient balance");  // Check
          balances[msg.sender] -= amount;      // Effect BEFORE Interaction
          token.send(msg.sender, amount, "");  // Interaction AFTER Effect
      }

      // NOTE: For ERC-777, CEI alone may not be sufficient if there are
      // cross-function reentrancy risks. Use both CEI + ReentrancyGuard.

  - name: "Use ERC-20 Instead of ERC-777 (Most Secure)"
    description: |
      Avoid ERC-777 entirely and use standard ERC-20 tokens with SafeERC20
    example: |
      import "@openzeppelin/contracts/token/ERC20/IERC20.sol";
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

      contract TokenVault {
          using SafeERC20 for IERC20;
          mapping(address => uint256) public balances;
          IERC20 public token;  // Use ERC-20, NOT ERC-777

          function withdraw(uint256 amount) external {
              require(balances[msg.sender] >= amount, "Insufficient balance");
              balances[msg.sender] -= amount;
              token.safeTransfer(msg.sender, amount);  // No callback hooks
          }

          // IMPORTANT: Explicitly reject ERC-777 tokens in deposit
          function deposit(IERC20 _token, uint256 amount) external {
              // Check token is NOT ERC-777 (no ERC-1820 support)
              require(
                  !supportsInterface(_token, type(IERC777).interfaceId),
                  "ERC-777 not supported"
              );
              _token.safeTransferFrom(msg.sender, address(this), amount);
              balances[msg.sender] += amount;
          }
      }

  - name: "Implement Pull Payment Pattern"
    description: |
      Instead of sending tokens directly, let users pull their tokens
    example: |
      contract TokenVault {
          mapping(address => uint256) public balances;
          mapping(address => uint256) public pendingWithdrawals;
          IERC777 public token;

          // Step 1: Mark tokens available for withdrawal (no external call)
          function requestWithdraw(uint256 amount) external {
              require(balances[msg.sender] >= amount, "Insufficient balance");
              balances[msg.sender] -= amount;  // Update state first
              pendingWithdrawals[msg.sender] += amount;  // Mark available
          }

          // Step 2: User pulls their tokens (separate transaction)
          function claimWithdrawal() external nonReentrant {
              uint256 amount = pendingWithdrawals[msg.sender];
              require(amount > 0, "Nothing to claim");
              pendingWithdrawals[msg.sender] = 0;  // Clear pending
              token.send(msg.sender, amount, "");  // Transfer
          }

          // Two-step process prevents reentrancy:
          // - requestWithdraw() updates state, no external call
          // - claimWithdrawal() has external call but uses separate state
      }

  - name: "Use Mutex Lock Pattern (Manual Reentrancy Guard)"
    description: |
      Implement manual reentrancy lock if ReentrancyGuard is not available
    example: |
      contract TokenVault {
          mapping(address => uint256) public balances;
          IERC777 public token;
          bool private locked;  // Mutex lock

          modifier noReentrancy() {
              require(!locked, "Reentrancy detected");
              locked = true;
              _;
              locked = false;
          }

          function withdraw(uint256 amount) external noReentrancy {
              require(balances[msg.sender] >= amount, "Insufficient balance");
              token.send(msg.sender, amount, "");
              balances[msg.sender] -= amount;
          }
      }

