# =============================================================================
# PATTERN: token-002-erc777-reentrancy
# ERC-777 Token Callback Reentrancy (Semantic, Name-Agnostic)
# =============================================================================

id: token-002-erc777-reentrancy
vulndoc: token/transfer
name: "ERC-777 Token Callback Reentrancy"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Functions that perform ERC-777 token operations (send, operatorSend, burn, mint)
  and write state AFTER the external call, creating a reentrancy vulnerability
  through the tokensReceived() or tokensToSend() callback hooks.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Uses ERC-777 token operations (uses_erc777_send = true)
  - Writes user balance/critical state (writes_balance_state or writes_state)
  - Violates CEI pattern: external call happens BEFORE state update

  ERC-777 is FUNDAMENTALLY different from ERC-20 because it calls recipient
  hooks (tokensReceived/tokensToSend) DURING the token transfer, BEFORE the
  transfer completes. This creates a reentrancy surface similar to ETH transfers.

  ## Why It's Dangerous

  ERC-777 tokens implement ERC-1820 registry hooks that execute callbacks:
  - **tokensToSend()**: Called on sender BEFORE balance update
  - **tokensReceived()**: Called on recipient BEFORE transfer completes

  These hooks allow the recipient/sender to call back into the contract DURING
  the token operation, while state is inconsistent:

  **Attack Flow:**
  1. User calls vulnerable withdraw/transfer function
  2. Contract calls ERC-777 token.send(user, amount)
  3. Token calls user's tokensReceived() hook **BEFORE updating state**
  4. User's malicious contract re-enters withdraw() function
  5. Old state still shows full balance (not yet updated)
  6. Re-entered call succeeds, transferring tokens again
  7. User drains contract by repeating steps 4-6

  This is the classic DAO-style reentrancy but triggered by TOKEN operations
  instead of ETH transfers.

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function uses ERC-777 operations (send, operatorSend, burn, mint)
  3. Function writes user balance/critical state (accounting updates)
  4. Function violates CEI: external call happens BEFORE state write
  5. Function has NO reentrancy guard (nonReentrant modifier)

  **Implementation-Agnostic**: Works regardless of:
  - Function names (withdraw, redeem, unstake, claim, etc.)
  - Variable names (balances, shares, stakes, deposits, etc.)
  - Token parameter names (token, asset, erc777, etc.)

  Safe patterns that are EXCLUDED:
  - Functions with nonReentrant modifier
  - Functions following CEI pattern (state update BEFORE external call)
  - View/pure functions (no state changes)
  - Internal/private functions (not externally callable)

  ## Real-World Examples

  - **Uniswap V1 + imBTC (2020)**: $300K loss - ERC-777 reentrancy attack
  - **Lendf.Me (April 2020)**: $25M drained - ERC-777 callback reentrancy via imBTC token
  - **dForce (April 2020)**: $25M loss - Same attack vector as Lendf.Me
  - **Various BSC DeFi**: Multiple ERC-777 reentrancy incidents

  **Critical Note**: The Lendf.Me hack demonstrated that even well-audited
  protocols can be vulnerable if they don't account for ERC-777 callback hooks.

scope: Function

lens:
  - Reentrancy
  - ValueMovement
  - Token

severity: critical

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Must use ERC-777 token operations (send, operatorSend, burn, mint)
      # These operations trigger tokensReceived/tokensToSend hooks
      - property: uses_erc777_send
        op: eq
        value: true

      # Must write user balance or critical state (accounting updates)
      # This creates the reentrancy race condition
      - property: writes_balance_state
        op: eq
        value: true

      # Core vulnerability: CEI violation - external call BEFORE state write
      # In safe code, state updates happen BEFORE external calls
      - property: state_write_after_external_call
        op: eq
        value: true

    # At least ONE must match (OR logic) - not used
    any: []

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Safe: Has reentrancy guard (nonReentrant modifier)
      - property: has_reentrancy_guard
        op: eq
        value: true

      # Not applicable to view/pure functions
      - property: state_mutability
        op: in
        value: [view, pure]

      # Internal/private functions are not externally exploitable
      - property: visibility
        op: in
        value: [internal, private]

# =============================================================================
# AGGREGATION MODE
# =============================================================================

aggregation:
  mode: tier_a_only  # Only Tier A (deterministic) matching

