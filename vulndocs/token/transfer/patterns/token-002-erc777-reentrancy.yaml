# ERC-777 vs ERC-20 Comparison
erc777_vs_erc20:
  description: |
    ERC-777 is an ADVANCED token standard with HOOKS that create reentrancy risks.

    **ERC-20** (Standard, Safe):
    - transfer() and transferFrom() are simple balance updates
    - NO callbacks or hooks
    - Reentrancy risk is LOW (only via custom logic)

    **ERC-777** (Advanced, Dangerous):
    - send() and operatorSend() trigger CALLBACK HOOKS
    - tokensReceived() called on recipient BEFORE transfer completes
    - tokensToSend() called on sender BEFORE transfer completes
    - Implements ERC-1820 registry for hook discovery
    - Reentrancy risk is HIGH (hooks create attack surface)

    **Why ERC-777 is Rarely Used:**
    - Lendf.Me and dForce hacks ($50M+ total) scared ecosystem
    - Most protocols explicitly block ERC-777 tokens
    - ERC-20 with SafeERC20 is the de-facto standard
    - Uniswap, Aave, Compound, and others reject ERC-777

  erc20_flow: |
    ERC-20 transfer():
    1. Check sender balance
    2. Deduct from sender
    3. Add to recipient
    4. Return success
    (No callbacks, atomic operation)

  erc777_flow: |
    ERC-777 send():
    1. Check sender balance
    2. Call sender's tokensToSend() hook ← CALLBACK HERE (reentrancy risk)
    3. Deduct from sender
    4. Add to recipient
    5. Call recipient's tokensReceived() hook ← CALLBACK HERE (reentrancy risk)
    6. Return success
    (Two callback opportunities for reentrancy)

# Historical Context - Lendf.Me Hack
lendfme_hack_details:
  date: "April 19, 2020"
  amount: "$25,000,000 USD"
  token: "imBTC (ERC-777 wrapped Bitcoin)"
  root_cause: |
    Lendf.Me lending protocol used imBTC (ERC-777 token) without proper
    reentrancy protection. The supply() function transferred imBTC tokens
    BEFORE updating the user's balance, allowing reentrancy via tokensReceived().

  attack_sequence:
    - "Attacker called supply(imBTC, amount)"
    - "Contract called imBTC.send(contract, amount) ← ERC-777 transfer"
    - "imBTC called attacker's tokensReceived() hook ← CALLBACK"
    - "Inside callback, attacker called supply() AGAIN"
    - "Balance not yet updated, second supply() succeeded"
    - "Attacker repeated reentrancy to inflate balance"
    - "Attacker withdrew all funds using inflated balance"
    - "Total loss: $25M across imBTC and other assets"

  aftermath: |
    - Funds were eventually returned by attacker
    - dForce (Lendf.Me's parent company) nearly collapsed
    - Entire DeFi ecosystem became wary of ERC-777 tokens
    - Most protocols now explicitly reject ERC-777 or use reentrancy guards
    - This hack is THE textbook example of ERC-777 reentrancy

# Detection Notes
detection_notes:
  erc777_identification: |
    Identifying ERC-777 tokens:
    1. Check if contract implements IERC777 interface
    2. Look for ERC-1820 registry integration
    3. Check for tokensReceived/tokensToSend hook implementations
    4. Common ERC-777 tokens: imBTC, some wrapped/synthetic assets

  false_positive_risk: |
    Low false-positive risk when ALL conditions are met:
    - uses_erc777_send (definitive signal)
    - state_write_after_external_call (CEI violation)
    - writes_balance_state (accounting updates)
    - No reentrancy guard

    False positives may occur if:
    - Token is misidentified as ERC-777 (low risk, property is accurate)
    - State write is unrelated to token transfer (very rare)
    - Custom reentrancy protection exists (not detected by pattern)

  testing_priority: |
    HIGH PRIORITY pattern to test because:
    - Historical exploits: $50M+ in losses
    - Critical severity: Complete fund drainage
    - Common vulnerability: CEI violations are frequent
    - Clear fix: Add nonReentrant modifier

# Why This Pattern is Critical
pattern_importance:
  criticality_score: 10/10
  reason: |
    This pattern detects one of the MOST DANGEROUS vulnerability classes:
    1. Historical Impact: $50M+ in real losses (Lendf.Me, dForce)
    2. Exploitability: Easy to exploit (simple callback reentrancy)
    3. Impact: Complete drainage of contract funds
    4. Prevalence: CEI violations are common in DeFi code
    5. Token Risk: Any protocol accepting ERC-777 is at risk

  recommended_action: |
    For auditors:
    - ALWAYS check if protocol accepts ERC-777 tokens
    - ALWAYS verify reentrancy guards on token operations
    - ALWAYS check CEI pattern compliance
    - Recommend rejecting ERC-777 tokens entirely

    For developers:
    - Use ERC-20 instead of ERC-777 (simpler, safer)
    - If ERC-777 is required, use ReentrancyGuard on ALL functions
    - Follow CEI pattern religiously
    - Test with actual ERC-777 tokens (imBTC, etc.)
    - Consider pull payment pattern for withdrawals

