# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Front-Running Approval Change"
    description: |
      Malicious spender front-runs approval change to spend both old and new amounts
    preconditions:
      - "User has previously approved spender for amount A"
      - "User wants to change approval to amount B"
      - "Spender is malicious or compromised"
      - "Spender monitors mempool for approval changes"
    steps:
      - "Alice calls approve(bob, 100 tokens)"
      - "Transaction executes, Bob approved for 100"
      - "Time passes, Alice wants to reduce to 50"
      - "Alice calls approve(bob, 50 tokens) - transaction enters mempool"
      - "Bob's bot detects pending approval change in mempool"
      - "Bob submits transferFrom(alice, bob, 100) with higher gas price"
      - "Bob's transfer executes BEFORE Alice's approval change"
      - "Bob receives 100 tokens"
      - "Alice's approve(bob, 50) executes"
      - "Bob now approved for 50 tokens again"
      - "Bob calls transferFrom(alice, bob, 50)"
      - "Bob receives another 50 tokens"
      - "TOTAL: Bob extracted 150 tokens instead of intended 50"
    impact: "Double spending - attacker extracts both old and new approval amounts"

  - name: "MEV Bot Automated Extraction"
    description: |
      MEV bots automatically front-run all approval changes across protocols
    preconditions:
      - "MEV bots monitor mempool for approval transactions"
      - "User changes existing non-zero approval"
      - "Bot has automated arbitrage strategy"
    steps:
      - "User submits approval change transaction"
      - "MEV bot detects approval change in mempool"
      - "Bot calculates profitability of front-running"
      - "If profitable, bot submits transferFrom with higher gas + miner bribe"
      - "Bot's transaction executes first via priority gas auction"
      - "User's approval change executes second"
      - "Bot can potentially spend new approval again if profitable"
    impact: "Systematic extraction across all vulnerable approval changes"

  - name: "Compromised Spender Exploitation"
    description: |
      Previously trusted spender gets compromised and exploits pending approvals
    preconditions:
      - "User granted approval to contract/address previously"
      - "Spender address is compromised (key leaked, contract hacked)"
      - "User attempts to revoke or reduce approval"
    steps:
      - "User discovers spender is compromised"
      - "User quickly submits approve(spender, 0) to revoke"
      - "Attacker who compromised spender sees revocation in mempool"
      - "Attacker front-runs with transferFrom to drain current approval"
      - "User's revocation executes after tokens already drained"
    impact: "Emergency revocations can be front-run, making defense impossible"

# How to further verify this is not a false positive
verification_steps:
  - "Examine the function's approval logic:"
  - "  - Does it change existing approvals or only set new ones?"
  - "  - Is there a check for current allowance before approving?"
  - "Check for two-step approval pattern (requires manual review):"
  - "  - Does function call approve(spender, 0) before approve(spender, amount)?"
  - "  - This pattern is safe but current VKG cannot detect it automatically"
  - "Assess actual risk based on context:"
  - "  - Who are typical spenders? Trusted contracts or arbitrary addresses?"
  - "  - Is this a critical path (high-value tokens)?"
  - "  - Are users likely to change approvals frequently?"
  - "Check documentation:"
  - "  - Does it warn users about approval race conditions?"
  - "  - Does it recommend using increaseAllowance/decreaseAllowance?"
  - "Consider false positive scenarios:"
  - "  - If function implements two-step zero reset (VKG limitation)"
  - "  - If function only sets initial approvals (no changes)"
  - "  - If spenders are immutable, audited contracts (low risk)"

# Recommended fixes
fix_recommendations:
  - name: "Use increaseAllowance/decreaseAllowance (Best Practice)"
    description: |
      Replace approve() with OpenZeppelin's safe allowance adjustment functions
    example: |
      import "@openzeppelin/contracts/token/ERC20/IERC20.sol";

      // VULNERABLE CODE - Standard approve()
      function updateApproval(IERC20 token, address spender, uint256 newAmount) external {
          token.approve(spender, newAmount); // ❌ Race condition possible
      }

      // SAFE CODE - Use increaseAllowance/decreaseAllowance
      function increaseApproval(IERC20 token, address spender, uint256 addedAmount) external {
          token.increaseAllowance(spender, addedAmount); // ✓ No race condition
      }

      function decreaseApproval(IERC20 token, address spender, uint256 subtractedAmount) external {
          token.decreaseAllowance(spender, subtractedAmount); // ✓ No race condition
      }

      // How it works:
      // - increaseAllowance: current allowance + addedAmount
      // - decreaseAllowance: current allowance - subtractedAmount
      // - Both read current allowance atomically, preventing race conditions

  - name: "Implement Two-Step Approval Pattern"
    description: |
      Reset approval to zero before setting new amount
    example: |
      // VULNERABLE CODE - Direct approval change
      function changeApproval(IERC20 token, address spender, uint256 newAmount) external {
          token.approve(spender, newAmount); // ❌ Race condition
      }

      // SAFER CODE - Two-step reset pattern
      function changeApprovalSafe(IERC20 token, address spender, uint256 newAmount) external {
          // Step 1: Reset to zero (spender can front-run but gets 0 on second spend)
          token.approve(spender, 0);

          // Step 2: Set new amount
          token.approve(spender, newAmount);

          // Note: This requires TWO transactions, so still has MEV risk
          // Better to use increaseAllowance/decreaseAllowance
      }

      // BEST CODE - Single transaction two-step
      function changeApprovalBest(IERC20 token, address spender, uint256 newAmount) external {
          uint256 currentAllowance = token.allowance(msg.sender, spender);

          if (currentAllowance > 0) {
              // Reset to zero first
              token.approve(spender, 0);
          }

          // Set new amount
          token.approve(spender, newAmount);

          // Still has race condition, but limits exposure
          // Attacker can spend current allowance, but not double-spend
      }

  - name: "Use ERC20Permit (EIP-2612) for Gasless, Safer Approvals"
    description: |
      Use permit-based approvals with signatures instead of transactions
    example: |
      import "@openzeppelin/contracts/token/ERC20/extensions/IERC20Permit.sol";

      // User signs permit off-chain (no gas cost, no mempool exposure)
      // Contract uses permit for just-in-time approval
      function depositWithPermit(
          IERC20Permit token,
          uint256 amount,
          uint256 deadline,
          uint8 v,
          bytes32 r,
          bytes32 s
      ) external {
          // Permit grants exact approval atomically
          // No front-running possible because it's not in mempool
          token.permit(msg.sender, address(this), amount, deadline, v, r, s);

          // Transfer tokens immediately
          token.transferFrom(msg.sender, address(this), amount);

          // No leftover approval, no race condition window
      }

      // Benefits:
      // - Gasless approval (signed off-chain)
      // - No mempool exposure (no front-running)
      // - Exact amount, time-limited
      // - Single transaction (atomic)

  - name: "Require Expected Current Allowance (Custom Implementation)"
    description: |
      Add parameter to specify expected current allowance, reject if mismatch
    example: |
      // VULNERABLE CODE - No validation
      function updateApproval(IERC20 token, address spender, uint256 newAmount) external {
          token.approve(spender, newAmount); // ❌ No protection
      }

      // SAFE CODE - Require expected current allowance
      function updateApprovalWithExpected(
          IERC20 token,
          address spender,
          uint256 expectedCurrentAllowance,
          uint256 newAmount
      ) external {
          uint256 actualCurrent = token.allowance(msg.sender, spender);

          require(
              actualCurrent == expectedCurrentAllowance,
              "Allowance changed (possible front-run detected)"
          );

          // If we reach here, no front-running occurred
          token.approve(spender, newAmount);
      }

      // User workflow:
      // 1. Check current allowance: currentAllowance = token.allowance(user, spender)
      // 2. Call updateApprovalWithExpected(token, spender, currentAllowance, newAmount)
      // 3. If front-run happens, actual != expected, transaction reverts
      // 4. User is protected - transaction fails instead of double-spending

      // Note: This is similar to increaseAllowance/decreaseAllowance concept
      // Better to just use those standard functions

  - name: "Document Risk and Provide Safe Alternatives"
    description: |
      If approve() must be used, document risk and provide safer alternatives
    example: |
      /**
       * @notice Approve tokens (STANDARD - has race condition risk)
       * @dev WARNING: Standard approve() has a known front-running vulnerability.
       *      If you are CHANGING an existing approval, use increaseApprovalSafe()
       *      or decreaseApprovalSafe() instead to prevent race conditions.
       *
       *      Only use this for initial approvals (current allowance is 0).
       *
       *      See: https://docs.google.com/document/d/1YLPtQxZu1UAvO9cZ1O2RPXBbT0mooh4DYKjA_jp-RLM/
       */
      function approveTokens(IERC20 token, address spender, uint256 amount) external {
          // Check current allowance
          uint256 current = token.allowance(msg.sender, spender);

          // Warn if changing non-zero approval
          require(current == 0, "Use increaseApprovalSafe/decreaseApprovalSafe to change existing approvals");

          token.approve(spender, amount);
      }

      /**
       * @notice Increase approval safely (RECOMMENDED)
       * @dev No race condition risk - atomic increase of allowance
       */
      function increaseApprovalSafe(IERC20 token, address spender, uint256 addedAmount) external {
          token.increaseAllowance(spender, addedAmount);
      }

      /**
       * @notice Decrease approval safely (RECOMMENDED)
       * @dev No race condition risk - atomic decrease of allowance
       */
      function decreaseApprovalSafe(IERC20 token, address spender, uint256 subtractedAmount) external {
          token.decreaseAllowance(spender, subtractedAmount);
      }

