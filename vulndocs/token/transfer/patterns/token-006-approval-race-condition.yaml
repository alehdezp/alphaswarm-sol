# =============================================================================
# PATTERN: token-006-approval-race-condition
# ERC20 Approval Race Condition (SWC-114)
# =============================================================================

id: token-006-approval-race-condition
vulndoc: token/transfer
name: "ERC20 Approval Race Condition"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Functions that use the standard ERC20 `approve()` function to change existing
  allowances without implementing race condition protection. The ERC20 approve()
  design has a known front-running vulnerability (SWC-114) where malicious spenders
  can spend both old and new approval amounts by front-running the approval change.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Calls ERC20 approve() (uses_erc20_approve = true)
  - Does NOT use increaseAllowance/decreaseAllowance pattern (uses_allowance_adjust = false)
  - Is externally callable (can be invoked by users)

  This catches ANY function with vulnerable approval patterns regardless of naming.

  ## Why It's Dangerous

  The ERC20 `approve()` function has a fundamental race condition:

  **Attack Scenario:**
  1. Alice approves Bob for 100 tokens
  2. Alice decides to change approval to 50 tokens (transaction in mempool)
  3. Bob monitors mempool, sees Alice's new approval transaction
  4. Bob front-runs with higher gas price, calls transferFrom() to spend 100 tokens
  5. Alice's approval change executes (now Bob approved for 50)
  6. Bob spends another 50 tokens
  7. **Result**: Bob spent 150 tokens instead of intended 50

  **Why Standard approve() is Vulnerable:**
  - No way to specify "expected current allowance"
  - Approval can change while transaction is pending
  - Spender can monitor mempool for approval changes
  - MEV bots can front-run approval transactions

  **Consequences:**
  1. **Double Spending**: Spender extracts both old and new allowance amounts
  2. **Unexpected Token Loss**: User intended to reduce permission, loses more instead
  3. **Trust Exploitation**: Malicious or compromised spender can exploit timing
  4. **MEV Extraction**: Bots can automate front-running of approval changes

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function calls ERC20 approve() (uses_erc20_approve = true)
  3. Function does NOT use safe allowance adjustment (uses_allowance_adjust = false)
  4. Function is NOT view/pure (must actually execute approval)

  **Implementation-Agnostic**: Works regardless of:
  - Function names (approve, approveToken, grantAllowance, etc.)
  - Variable names (spender, contract, target, etc.)
  - Approval amount variable names (amount, value, allowance, etc.)

  Safe patterns that are EXCLUDED (none conditions):
  - Uses increaseAllowance() or decreaseAllowance() (uses_allowance_adjust = true)
  - View/pure functions that don't actually execute approvals
  - Internal/private functions (not externally exploitable)

  **Note**: This pattern does NOT detect if the function implements the two-step
  "reset to zero first" pattern, as that requires data flow analysis beyond current
  VKG capabilities. Functions using this pattern may be false positives.

  ## Real-World Examples

  **Known Vulnerability:**
  - **SWC-114**: ERC20 Approval Race Condition (Smart Contract Weakness Classification)
  - **First documented**: 2016 (Mikhail Vladimirov and Dmitry Khovratovich)
  - **Still prevalent**: Found in hundreds of DeFi protocols

  **Real Exploits:**
  - Multiple MEV bot exploits documented on-chain
  - Code4rena finding in numerous audit contests
  - Trail of Bits audit reports highlight this pattern

  **Why It Persists:**
  - ERC20 standard predates awareness of this issue
  - Many developers unaware of the vulnerability
  - Backward compatibility concerns prevent standard changes
  - Gas efficiency leads developers to skip safe patterns

scope: Function

lens:
  - ValueMovement
  - ExternalInfluence

severity: medium

# Pattern quality status (set by vrs-test-conductor agent)
status: ready

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable (race condition requires external invocation)
    - property: visibility
      op: in
      value: [public, external]

    # Must call ERC20 approve() function
    # This detects any call to approve() on token contracts
    - property: uses_erc20_approve
      op: eq
      value: true

    # Must NOT use safe allowance adjustment patterns
    # increaseAllowance/decreaseAllowance are immune to race condition
    - property: uses_allowance_adjust
      op: eq
      value: false

  # At least ONE must match (OR logic) - not used
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Not applicable to view/pure functions (don't execute approvals)
    - property: state_mutability
      op: in
      value: [view, pure]

    # Internal/private functions not exploitable externally
    - property: visibility
      op: in
      value: [internal, private]

