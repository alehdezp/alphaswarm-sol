# Detection limitations and future improvements
detection_notes: |
  **Current Limitations**:

  1. **Two-Step Zero Reset Pattern**: VKG cannot currently detect if a function
     implements the two-step pattern (approve(spender, 0) then approve(spender, amount))
     within the same function. This requires intra-function data flow analysis.

     Functions implementing this pattern will be FALSE POSITIVES.

  2. **Initial vs Change Approval**: VKG cannot distinguish between:
     - Setting initial approval (current = 0) - LOW RISK
     - Changing existing approval (current > 0) - HIGH RISK

     This requires tracking current allowance state.

  3. **Trusted vs Arbitrary Spender**: VKG cannot assess if the spender is:
     - Trusted, audited contract (lower risk)
     - Arbitrary user-provided address (higher risk)

  **Future Enhancements** (Phase 7-11):

  1. Execution Path Analysis (Phase 7):
     - Detect two-step zero reset pattern within function CFG
     - Track approval amount through execution paths

  2. Constraint Verification (Phase 11):
     - Z3 verification of currentAllowance vs newAmount
     - Prove if approval change is happening

  3. Tier B LLM (Phase 12-14):
     - Assess spender trust level
     - Evaluate if two-step pattern is present
     - Filter false positives (initial approvals)

  **For Now**:
  This pattern is intentionally BROAD (catches all approve() usage without safe
  patterns). Auditors must manually verify if the finding is a true positive by
  checking:
  - Does it change existing approvals?
  - Does it implement two-step zero reset?
  - Is the spender trusted?

