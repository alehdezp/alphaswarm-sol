# Industry standards and best practices
industry_context: |
  **Historical Context**:
  The ERC20 approval race condition was first documented by Mikhail Vladimirov
  and Dmitry Khovratovich in 2016, but remains prevalent in 2025 due to:
  - ERC20 standard predates awareness
  - Backward compatibility concerns
  - Developer unfamiliarity with the issue

  **Current Best Practice**:
  OpenZeppelin recommends using increaseAllowance/decreaseAllowance instead of
  approve() for changing existing approvals. All modern ERC20 implementations
  should include these functions.

  **Gas Efficiency Misconception**:
  Developers sometimes avoid increaseAllowance/decreaseAllowance thinking they
  cost more gas, but the difference is negligible (< 1000 gas) compared to the
  security risk.

  **EIP-2612 (Permit) Adoption**:
  Modern protocols increasingly use EIP-2612 permit() for gasless, race-free
  approvals. This is the preferred pattern for new implementations.

