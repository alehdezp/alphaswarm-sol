# =============================================================================
# TESTING METADATA (populated by vrs-test-conductor agent)
# =============================================================================

test_coverage:
  projects: [token-vault]
  true_positives: 9
  false_positives: 1
  false_negatives: 7
  true_negatives: 14
  edge_cases: 8
  precision: 0.90
  recall: 0.56
  variation_score: 0.67
  last_tested: "2025-12-31"
  notes: |
    STRENGTHS:
    - Excellent precision (90%): Very low false-positive rate
    - Detects most vulnerable patterns with transfer/transferFrom + balance writes
    - Correctly excludes SafeERC20 usage
    - Handles naming variations well (deposit/contribute/claim)

    LIMITATIONS:
    - Only detects when writing to "balance"-tagged state variables
    - Misses functions writing to deposits, stakes, or share mappings
    - False Positive: withdrawWithManualCheck() has manual return check but not detected by token_return_guarded
    - Recall limited by narrow scope of writes_balance_state property

    FALSE NEGATIVES (7):
    - addFunds, fund: write to deposits (not tagged as balance)
    - depositForShares, depositAssets, redeem: write to shares/userShares (tagged as shares, not balance)
    - stake: writes to stakes (not tagged)
    - withdrawDeposit: writes to deposits (not tagged)

    FALSE POSITIVE (1):
    - withdrawWithManualCheck: Has bool success = transfer(); require(success)
      but token_return_guarded property doesn't detect this pattern

    BUILDER DEPENDENCY:
    - Relies on writes_balance_state which only triggers for "balance"-tagged variables
    - token_return_guarded detection could be improved to catch more return check patterns

    RECOMMENDATION FOR IMPROVEMENT:
    - Consider using writes_state instead of writes_balance_state for broader coverage
    - OR: Expand state variable tagging to include deposits, stakes, shares
    - Improve token_return_guarded detection for bool + require patterns

