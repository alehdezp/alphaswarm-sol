# Semantic Operations (Phase 1-3)
semantic_ops:
  has_all_operations:
    - MODIFIES_CRITICAL_STATE
    - CHECKS_PERMISSION  # Should be present but isn't (vulnerability)

  # This is what SHOULD happen in safe code
  safe_pattern_operations:
    - CHECKS_PERMISSION
    - MODIFIES_CRITICAL_STATE

# Behavioral Signature (Phase 2)
behavioral_signature:
  # Vulnerable pattern: Write governance state without permission check
  pattern: "W:gov"  # Should be "C:auth→W:gov" for safe code
  matches_exploits:
    - beanstalk-2022
    - compound-golden-boys-2024

