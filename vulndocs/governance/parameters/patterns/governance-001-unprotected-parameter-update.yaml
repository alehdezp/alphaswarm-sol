# =============================================================================
# PATTERN: governance-001
# =============================================================================

id: governance-001
vulndoc: governance/parameters
name: "Unprotected Governance Parameter Update"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Public/external functions that modify governance-critical state variables (quorum,
  voting thresholds, timelock delays, voting periods, execution delays) without proper
  access control, allowing any caller to manipulate the DAO's security parameters.

  ## Why It's Dangerous
  Governance parameters are the foundation of DAO security. Unprotected modification
  allows attackers to:
  - Lower quorum requirements to pass malicious proposals with minimal votes
  - Remove or reduce timelock delays to execute proposals instantly (no review period)
  - Extend voting periods indefinitely to prevent legitimate proposals from passing
  - Lower voting thresholds to gain approval with fewer tokens
  - Change execution delays to bypass security review windows

  ## Detection Logic
  This pattern uses SEMANTIC detection (name-agnostic) based on VKG's heuristics:

  1. **Function is externally callable** (`visibility: [public, external]`)
  2. **Function writes privileged state** (`writes_privileged_state: true`)
     - Heuristics.py tags variables with "governance" when they contain tokens like:
       governance, governor, timelock, council, quorum, voting, proposal, threshold,
       delay, guardian (lines 82-94)
     - "governance" tag is in privileged state set (line 149)
  3. **Function modifies state** (`writes_state: true`)
  4. **NO access control present** (`has_access_gate: false`)
  5. **NOT a constructor** (constructors legitimately set initial params)

  This detection is COMPLETELY IMPLEMENTATION-AGNOSTIC - it works regardless of:
  - Variable naming (quorumBPS, _quorum, QUORUM_THRESHOLD, minQuorum)
  - Function naming (setQuorum, updateQuorum, changeQuorum, configureQuorum)
  - Modifier naming (onlyGovernor, onlyTimelock, onlyGuardian, restricted)

  ## Real-World Examples
  - **Beanstalk ($182M, April 2022)**: Flash loan governance attack where lack of
    execution delay allowed instant parameter manipulation and fund extraction
  - **CVE-2022-31198**: OpenZeppelin GovernorVotesQuorumFraction vulnerability where
    lowering quorum made previously-defeated proposals executable
  - **CVE-2021-39167**: TimelockController vulnerability allowing delay reset to 0
  - **Compound Governance Attack (2024)**: Golden Boys proposal exploiting low quorum
    to allocate $24M in treasury funds

scope: Function

lens:
  - Governance

severity: critical

# Pattern quality status (set by vrs-test-conductor agent)
# Updated 2026-01-02: Documented as EXCELLENT in mega-task (~100%/~100%/~100%)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable to be exploitable
    - property: visibility
      op: in
      value: [public, external]

    # SEMANTIC DETECTION: Writes to governance-tagged state variables
    # This is the CORE SIGNAL - completely name-agnostic
    # Heuristics.py tags variables containing: governance, governor, timelock,
    # council, quorum, voting, proposal, threshold, delay, guardian
    - property: writes_privileged_state
      op: eq
      value: true

    # Must actually modify state (not just read)
    - property: writes_state
      op: eq
      value: true

  # At least ONE must match (OR logic) - use for alternatives
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Exclude functions with ANY access control
    - property: has_access_gate
      op: eq
      value: true

    # Exclude constructors (they legitimately set initial governance params)
    - property: is_constructor
      op: eq
      value: true

    # Exclude functions with access modifiers (onlyOwner, onlyRole, etc.)
    - property: has_access_modifier
      op: eq
      value: true

