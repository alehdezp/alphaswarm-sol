# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Flash Loan Governance Takeover"
    description: |
      Attacker uses flash loan to acquire governance tokens, calls unprotected
      parameter update to lower quorum/threshold, passes malicious proposal,
      drains treasury, repays flash loan - all in one transaction.
    preconditions:
      - "Governance parameter update function is public/external"
      - "No access control on parameter update"
      - "No execution delay between parameter change and proposal execution"
    steps:
      - "Take flash loan to acquire governance tokens"
      - "Call unprotected setQuorum() to lower quorum requirement"
      - "Submit and immediately execute malicious proposal (now passes with lower quorum)"
      - "Drain protocol funds via malicious proposal"
      - "Repay flash loan, keep profit"
    impact: "Complete protocol takeover and fund extraction ($182M in Beanstalk case)"

  - name: "Timelock Delay Removal"
    description: |
      Attacker calls unprotected timelock delay update to set delay to 0,
      eliminating the security review window for proposals.
    preconditions:
      - "Timelock delay parameter is modifiable"
      - "No access control on delay update function"
    steps:
      - "Call unprotected setDelay(0) or updateTimelockDelay(0)"
      - "Submit malicious proposal"
      - "Execute immediately (no delay period for community review)"
      - "Extract funds or escalate privileges"
    impact: "Bypass security review period, instant malicious proposal execution"

  - name: "Quorum Threshold Manipulation"
    description: |
      Attacker lowers quorum requirement to make previously-defeated proposals
      executable or to pass new proposals with minimal voting participation.
    preconditions:
      - "Quorum parameter is modifiable"
      - "No access control on quorum update"
      - "Previously defeated proposals are not permanently invalidated"
    steps:
      - "Call unprotected setQuorum() to lower requirement"
      - "Resurrect previously-defeated proposal that now meets new quorum"
      - "Or submit new malicious proposal requiring fewer votes"
      - "Execute with minimal voting power"
    impact: "Governance capture with minority voting power"

  - name: "Voting Period Extension DoS"
    description: |
      Attacker extends voting period to indefinite duration, preventing
      legitimate proposals from ever reaching execution.
    preconditions:
      - "Voting period parameter is modifiable"
      - "No access control or sanity bounds on period update"
    steps:
      - "Call unprotected setVotingPeriod(type(uint256).max)"
      - "All proposals now require impossibly long voting periods"
      - "Governance is effectively frozen"
    impact: "Permanent governance denial-of-service"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm the function is public/external (not internal helper)"
  - "Verify the state variable being modified contains governance-related tokens (quorum, voting, threshold, timelock, delay, proposal, guardian, governor)"
  - "Check there is NO access control in modifiers or function body (no onlyOwner, onlyGovernor, onlyTimelock, require(msg.sender == X))"
  - "Ensure this is NOT a constructor or initializer (one-time setup is acceptable)"
  - "Look for missing timelock delays or multi-sig requirements"
  - "Check if the protocol has other governance protections (emergency pause, guardian veto)"
  - "Review if parameter bounds/sanity checks exist (min/max quorum, delay limits)"

# Recommended fixes
fix_recommendations:
  - name: "Add onlyGovernor/onlyTimelock Modifier"
    description: "Restrict parameter updates to governance contract or timelock"
    example: |
      // VULNERABLE
      function setQuorum(uint256 newQuorum) external {
          quorumThreshold = newQuorum;
      }

      // SAFE - Governance-only access
      function setQuorum(uint256 newQuorum) external onlyGovernor {
          quorumThreshold = newQuorum;
      }

      // SAFE - Timelock-only access (requires proposal + delay)
      function setQuorum(uint256 newQuorum) external onlyTimelock {
          quorumThreshold = newQuorum;
      }

  - name: "Require Multi-Sig Approval"
    description: "Use multi-signature wallet for critical parameter changes"
    example: |
      // SAFE - Multi-sig required
      function setQuorum(uint256 newQuorum) external {
          require(msg.sender == multiSigWallet, "Only multisig");
          quorumThreshold = newQuorum;
      }

  - name: "Add Parameter Bounds and Sanity Checks"
    description: "Enforce minimum/maximum bounds on governance parameters"
    example: |
      // SAFE - With bounds enforcement
      uint256 public constant MIN_QUORUM = 100; // 1%
      uint256 public constant MAX_QUORUM = 4000; // 40%
      uint256 public constant MIN_DELAY = 2 days;
      uint256 public constant MAX_DELAY = 30 days;

      function setQuorum(uint256 newQuorum) external onlyGovernor {
          require(newQuorum >= MIN_QUORUM, "Quorum too low");
          require(newQuorum <= MAX_QUORUM, "Quorum too high");
          quorumThreshold = newQuorum;
      }

      function setTimelockDelay(uint256 newDelay) external onlyGovernor {
          require(newDelay >= MIN_DELAY, "Delay too short");
          require(newDelay <= MAX_DELAY, "Delay too long");
          timelockDelay = newDelay;
      }

  - name: "Implement Two-Step Update Process"
    description: "Require proposal + execution delay for parameter changes"
    example: |
      // SAFE - Two-step process with delay
      struct PendingUpdate {
          uint256 newValue;
          uint256 executionTime;
      }

      PendingUpdate public pendingQuorum;
      uint256 public constant UPDATE_DELAY = 2 days;

      function proposeQuorumUpdate(uint256 newQuorum) external onlyGovernor {
          pendingQuorum = PendingUpdate({
              newValue: newQuorum,
              executionTime: block.timestamp + UPDATE_DELAY
          });
      }

      function executeQuorumUpdate() external {
          require(block.timestamp >= pendingQuorum.executionTime, "Too early");
          quorumThreshold = pendingQuorum.newValue;
          delete pendingQuorum;
      }

  - name: "Add Guardian Veto Capability"
    description: "Allow trusted guardian to veto dangerous parameter changes"
    example: |
      // SAFE - With guardian veto
      address public guardian;
      mapping(bytes32 => bool) public vetoedUpdates;

      function setQuorum(uint256 newQuorum) external onlyGovernor {
          bytes32 updateHash = keccak256(abi.encode("setQuorum", newQuorum));
          require(!vetoedUpdates[updateHash], "Update vetoed by guardian");
          quorumThreshold = newQuorum;
      }

      function vetoUpdate(bytes32 updateHash) external {
          require(msg.sender == guardian, "Only guardian");
          vetoedUpdates[updateHash] = true;
      }

