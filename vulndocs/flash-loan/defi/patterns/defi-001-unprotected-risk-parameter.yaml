# =============================================================================
# PATTERN: defi-001
# =============================================================================

id: defi-001
vulndoc: flash-loan/defi
name: "Unprotected DeFi Risk Parameter Update"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Public/external functions that modify DeFi risk parameters (fees, liquidation
  thresholds, collateral factors, interest rates, debt ceilings, caps, reserves)
  without access control. These parameters control the economic safety and
  stability of DeFi protocols.

  ## Why It's Dangerous
  DeFi risk parameters are the most sensitive configuration in lending, AMM, and
  derivative protocols. Unprotected modification allows attackers to:

  - **Protocol Drainage**: Manipulate fees to 100% to extract all protocol revenue
  - **Forced Liquidations**: Lower liquidation thresholds to liquidate healthy positions
  - **Over-Borrowing**: Increase collateral factors beyond safe limits, causing insolvency
  - **Economic Attacks**: Manipulate interest rates to make borrowing unprofitable
  - **Cap Bypass**: Increase debt ceilings or supply caps to break protocol limits
  - **Oracle Manipulation**: Change oracle dependencies to use malicious price feeds
  - **Reserve Drainage**: Modify reserve ratios to withdraw protocol reserves

  Unlike simple state variables, risk parameters have **multiplicative impact**:
  changing a fee from 0.3% to 30% affects every transaction in the protocol.

  ## Detection Logic
  This pattern triggers when a function:
  1. Is externally callable (public/external visibility)
  2. Writes to state variables tagged as sensitive config (fee, collateral, debt,
     liquidity, reserve, cap, oracle, treasury, governance, pause, allowlist,
     denylist, signer, dependency)
  3. Modifies state (not just a view function)
  4. Has NO access control (no modifiers, no require checks, no role validation)
  5. Is NOT a constructor (initialization is expected to be unprotected)

  ## Implementation-Agnostic Detection
  This pattern uses SEMANTIC property `writes_sensitive_config` which detects
  state variable security tags, NOT function/variable names. Works regardless of:
  - Variable naming: `protocolFee`, `swapFee`, `tradingFee`, `feeRate`
  - Function naming: `setFee`, `updateFee`, `configureFee`, `adjustFee`
  - Parameter naming: `_fee`, `newFee`, `fee_`, `feeValue`

  The builder's heuristics (builder.py:597-619) automatically classify state
  variables based on common patterns, making detection robust across all codebases.

  ## Real-World Context
  Major DeFi protocols protect risk parameters with strict access control:
  - **Aave**: Liquidation threshold changes require governance vote
  - **Compound**: Interest rate model updates require timelock
  - **MakerDAO**: Collateral factor changes require multi-sig + delay
  - **Uniswap V3**: Fee tier configuration is immutable or governance-only

  Audits from OpenZeppelin, Trail of Bits, and other firms consistently flag
  unprotected parameter updates as HIGH severity findings.

scope: Function

lens:
  - DeFi

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
# Updated 2026-01-02: Documented as EXCELLENT in mega-task (~100%/~100%/~100%)
status: excellent

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Must be externally callable to be exploitable
    - property: visibility
      op: in
      value: [public, external]

    # Must write to sensitive config state variables
    # This includes: fee, config, reward, collateral, debt, liquidity,
    # reserve, cap, oracle, treasury, governance, pause, allowlist,
    # denylist, signer, dependency (builder.py:597-619)
    - property: writes_sensitive_config
      op: eq
      value: true

    # Must actually modify state (not just read config)
    - property: writes_state
      op: eq
      value: true

  # At least ONE must match (OR logic) - none required
  any: []

  # NONE can match (NOT logic) - CRITICAL for false positive reduction
  none:
    # Exclude functions with ANY access control
    - property: has_access_gate
      op: eq
      value: true

    # Constructors are expected to initialize config without access control
    - property: is_constructor
      op: eq
      value: true

# =============================================================================
# ADVANCED MATCHING (Optional)
# =============================================================================

# Edge requirements for graph-based detection
edges: []

# Path requirements for multi-hop detection
paths: []

