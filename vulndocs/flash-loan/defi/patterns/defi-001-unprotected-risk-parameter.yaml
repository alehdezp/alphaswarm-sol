# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Protocol Fee Manipulation"
    description: |
      Attacker calls unprotected fee update function to set protocol fee to 100%,
      extracting all trading/lending revenue until intervention.
    preconditions:
      - "Function to update protocol fee is public/external"
      - "No access control on fee update function"
      - "Protocol actively processes transactions with fees"
    steps:
      - "Attacker identifies unprotected fee update function (e.g., setProtocolFee)"
      - "Attacker calls function with fee = 10000 basis points (100%)"
      - "All subsequent protocol transactions pay 100% fee to protocol treasury"
      - "Attacker (if they control withdrawal) drains accumulated fees"
      - "OR: Protocol becomes unusable due to excessive fees"
    impact: |
      Complete protocol revenue extraction or DoS. In AMMs, 100% fees make
      trading impossible. In lending, 100% borrow fees prevent new loans.

  - name: "Liquidation Threshold Manipulation"
    description: |
      Attacker lowers liquidation threshold on lending protocol to force liquidation
      of healthy collateralized positions, stealing liquidation bonuses.
    preconditions:
      - "Lending protocol with collateralized loans"
      - "Unprotected function to update liquidation threshold"
      - "Active borrowing positions exist"
    steps:
      - "Attacker identifies users with healthy positions (e.g., 150% collateralized)"
      - "Attacker calls unprotected setLiquidationThreshold with very high value (e.g., 200%)"
      - "Previously healthy positions now appear under-collateralized"
      - "Attacker liquidates these positions, claiming liquidation bonus (e.g., 10%)"
      - "Victims lose collateral despite being safely collateralized"
    impact: |
      Forced liquidations of healthy positions. In Aave/Compound-style protocols,
      liquidation bonuses range from 5-15%, providing direct profit to attacker.
      Users lose funds despite maintaining safe collateral ratios.

  - name: "Collateral Factor Over-Inflation"
    description: |
      Attacker increases collateral factor beyond safe limits to borrow more than
      collateral value, causing protocol insolvency.
    preconditions:
      - "Lending protocol with collateral factor configuration"
      - "Unprotected collateral factor update function"
      - "Sufficient liquidity in lending pool"
    steps:
      - "Attacker deposits minimal collateral (e.g., 1 ETH = $2000)"
      - "Attacker calls unprotected setCollateralFactor with inflated value (e.g., 150%)"
      - "Attacker borrows 150% of collateral value ($3000 against $2000 collateral)"
      - "Attacker withdraws borrowed funds"
      - "Attacker abandons collateral (or manipulates price to trigger liquidation immunity)"
      - "Protocol is left insolvent: $3000 debt against $2000 collateral"
    impact: |
      Protocol insolvency. If collateral factor > 100%, attackers can borrow more
      than they deposit. With flash loans, this can be amplified to drain entire
      lending pools. Compound Governance ensures collateral factors < 90% exactly
      to prevent this attack.

  - name: "Interest Rate Model Manipulation"
    description: |
      Attacker manipulates interest rate parameters to make borrowing unprofitable
      or to earn excessive interest as a lender.
    preconditions:
      - "Lending protocol with configurable interest rates"
      - "Unprotected interest rate parameter update"
    steps:
      - "Attacker supplies large amount of capital to lending pool"
      - "Attacker calls unprotected setInterestRate with inflated values (e.g., 1000% APY)"
      - "Borrowers are charged excessive interest on existing loans"
      - "New borrowing becomes impossible due to high rates"
      - "Attacker earns inflated interest on their supplied capital"
      - "Protocol experiences bank run as borrowers repay and flee"
    impact: |
      Economic attack causing protocol abandonment. Existing borrowers face
      liquidation due to unaffordable interest. New borrowing stops. Protocol
      reputation destroyed.

  - name: "Debt Ceiling Bypass"
    description: |
      Attacker raises debt ceiling or supply cap to bypass protocol safety limits,
      enabling over-leveraging or excessive minting.
    preconditions:
      - "Protocol has debt ceiling or supply cap configuration"
      - "Unprotected function to update caps/ceilings"
      - "Current utilization near limit"
    steps:
      - "Attacker identifies protocol near debt ceiling (e.g., $100M limit, $95M borrowed)"
      - "Attacker calls unprotected setDebtCeiling with unlimited value (type(uint256).max)"
      - "Attacker borrows massive amount beyond original safety limits"
      - "Protocol becomes over-leveraged and vulnerable to market shocks"
      - "If market downturn occurs, protocol becomes insolvent due to excessive debt"
    impact: |
      Protocol safety limits bypassed. Debt ceilings exist to limit exposure to
      specific assets (especially risky collateral). Removing limits can cause
      catastrophic losses during market volatility.

  - name: "Oracle Dependency Manipulation"
    description: |
      Attacker changes oracle address to malicious price feed, enabling price
      manipulation attacks on lending/derivative protocols.
    preconditions:
      - "Protocol uses configurable oracle address"
      - "Unprotected oracle address update function"
      - "Price-dependent operations (liquidations, minting, swaps)"
    steps:
      - "Attacker deploys malicious oracle contract returning manipulated prices"
      - "Attacker calls unprotected setOracle with malicious oracle address"
      - "Protocol now uses attacker-controlled prices"
      - "Attacker manipulates prices to trigger liquidations or over-borrow"
      - "Attacker profits from liquidation bonuses or stolen collateral"
    impact: |
      Complete protocol compromise. Oracle manipulation is one of the most
      devastating DeFi attacks (e.g., ~$200M in oracle-related exploits in 2021-2022).
      Attacker gains full control over protocol economics.

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function is truly externally callable (not called only by trusted contracts)"
  - "Verify the modified state variables are actual risk parameters (not metadata/display values)"
  - "Check if there's indirect access control (e.g., requires specific contract state)"
  - "Examine protocol documentation to confirm these parameters are meant to be governance-controlled"
  - "Look for emergency pause mechanisms that might protect against exploitation"
  - "Check if initialization pattern expects one-time unprotected setup (constructors excluded)"
  - "Verify the parameter has economic impact (affects fees, rates, limits, not just logging)"

# Recommended fixes
fix_recommendations:
  - name: "Add Ownable Access Control"
    description: |
      Use OpenZeppelin's Ownable pattern to restrict updates to contract owner.
      Suitable for centralized governance during early stages.
    example: |
      // SPDX-License-Identifier: MIT
      import "@openzeppelin/contracts/access/Ownable.sol";

      contract LendingProtocol is Ownable {
          uint256 public liquidationThreshold;

          // SAFE: Only owner can update critical parameter
          function setLiquidationThreshold(uint256 _threshold)
              external
              onlyOwner
          {
              require(_threshold < 10000, "Threshold too high");
              require(_threshold > 5000, "Threshold too low");
              liquidationThreshold = _threshold;
              emit LiquidationThresholdUpdated(_threshold);
          }
      }

  - name: "Add Role-Based Access Control"
    description: |
      Use OpenZeppelin's AccessControl for granular permissions. Allows
      separation of duties (e.g., PARAMETER_ADMIN role separate from owner).
    example: |
      // SPDX-License-Identifier: MIT
      import "@openzeppelin/contracts/access/AccessControl.sol";

      contract LendingProtocol is AccessControl {
          bytes32 public constant RISK_ADMIN_ROLE = keccak256("RISK_ADMIN_ROLE");
          uint256 public collateralFactor;

          constructor() {
              _grantRole(DEFAULT_ADMIN_ROLE, msg.sender);
              _grantRole(RISK_ADMIN_ROLE, msg.sender);
          }

          // SAFE: Only RISK_ADMIN_ROLE can update collateral factor
          function setCollateralFactor(address asset, uint256 _factor)
              external
              onlyRole(RISK_ADMIN_ROLE)
          {
              require(_factor <= 9000, "Factor cannot exceed 90%"); // Prevent insolvency
              require(_factor >= 1000, "Factor too low");
              collateralFactor = _factor;
              emit CollateralFactorUpdated(asset, _factor);
          }
      }

  - name: "Add Governance + Timelock"
    description: |
      Use governance voting + timelock delay for decentralized parameter updates.
      Prevents instant attacks and allows community response time. Industry best
      practice for production DeFi protocols (Compound, Aave, MakerDAO).
    example: |
      // SPDX-License-Identifier: MIT
      import "@openzeppelin/contracts/governance/TimelockController.sol";

      contract LendingProtocol {
          TimelockController public timelock;
          uint256 public protocolFee;

          modifier onlyGovernance() {
              require(msg.sender == address(timelock), "Only governance");
              _;
          }

          // SAFE: Requires governance vote + timelock delay (e.g., 2 days)
          function setProtocolFee(uint256 _fee)
              external
              onlyGovernance
          {
              require(_fee <= 1000, "Fee cannot exceed 10%"); // Reasonable limit
              protocolFee = _fee;
              emit ProtocolFeeUpdated(_fee);
          }
      }

      // Governance process:
      // 1. Submit proposal to change fee
      // 2. Community votes (e.g., 7-day voting period)
      // 3. If approved, queued in timelock (e.g., 2-day delay)
      // 4. After delay, anyone can execute the change
      // 5. Community has time to exit if they disagree

  - name: "Add Multi-Sig Requirement"
    description: |
      Require multiple trusted signers (e.g., 3-of-5 multi-sig) to approve
      parameter changes. Reduces single point of failure risk.
    example: |
      // SPDX-License-Identifier: MIT
      // Using Gnosis Safe or similar multi-sig as owner

      contract LendingProtocol is Ownable {
          // Owner is Gnosis Safe with 3-of-5 requirement
          uint256 public interestRateModel;

          // SAFE: Requires 3 out of 5 trusted signers to approve transaction
          function setInterestRateModel(uint256 _model)
              external
              onlyOwner  // Owner = Gnosis Safe multi-sig
          {
              require(_model < 5000, "Rate too high"); // Max 50% APY
              interestRateModel = _model;
              emit InterestRateModelUpdated(_model);
          }
      }

  - name: "Add Parameter Bounds Validation"
    description: |
      Even with access control, add sanity checks to prevent accidental
      misconfiguration. Defense in depth.
    example: |
      // SPDX-License-Identifier: MIT
      contract LendingProtocol is Ownable {
          uint256 public constant MAX_LIQUIDATION_BONUS = 2000; // 20%
          uint256 public constant MIN_LIQUIDATION_THRESHOLD = 10000; // 100%
          uint256 public constant MAX_LIQUIDATION_THRESHOLD = 20000; // 200%

          uint256 public liquidationThreshold;
          uint256 public liquidationBonus;

          // SAFE: Access control + bounds validation
          function setLiquidationParams(
              uint256 _threshold,
              uint256 _bonus
          ) external onlyOwner {
              require(
                  _threshold >= MIN_LIQUIDATION_THRESHOLD &&
                  _threshold <= MAX_LIQUIDATION_THRESHOLD,
                  "Invalid threshold"
              );
              require(_bonus <= MAX_LIQUIDATION_BONUS, "Bonus too high");

              liquidationThreshold = _threshold;
              liquidationBonus = _bonus;

              emit LiquidationParamsUpdated(_threshold, _bonus);
          }
      }

