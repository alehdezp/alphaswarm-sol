id: logic-012
vulndoc: logic/general
name: Collateral Invariant Violation
description: Collateral state modified without invariant checks.
scope: Function
lens:
- LogicState
severity: high
cwe:
- 682
match:
  all:
  - property: writes_collateral_state
    op: eq
    value: true
  none:
  - property: has_invariant_check
    op: eq
    value: true
