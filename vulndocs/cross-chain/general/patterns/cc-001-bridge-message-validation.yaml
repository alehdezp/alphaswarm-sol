# Tier A/B Matching (Phase 12-14)
tier_match:
  tier_a:
    all:
      - property: visibility
        op: in
        value: [public, external]
      - property: has_external_calls
        op: eq
        value: true
      - property: reads_external_value
        op: eq
        value: true
      - property: writes_privileged_state
        op: eq
        value: true
      - property: validates_input
        op: eq
        value: false
      - property: has_access_gate
        op: eq
        value: false
    none:
      - property: uses_signature_verification
        op: eq
        value: true
      - property: has_nonce_tracking
        op: eq
        value: true
      - property: validates_source_chain
        op: eq
        value: true
  tier_b:
    any:
      - has_risk_tag: message_validation_failure
      - has_risk_tag: cross_chain_security
      - has_risk_tag: replay_attack_risk
  aggregation:
    mode: tier_a_required

# Multi-Agent Verification Hints (Phase 9)
verification_agents:
  # Explorer agent: Find paths from external input to state writes
  explorer:
    entry_points: [public, external]
    sources: [external_input, external_call]
    sinks: [privileged_state_write, token_transfer]
    max_depth: 5

  # Pattern agent: Structural motif matching
  pattern:
    require_all_conditions: true
    key_operations: [CALLS_EXTERNAL, READS_EXTERNAL_VALUE, MODIFIES_CRITICAL_STATE]

  # Risk agent: Cross-chain attack assessment
  risk:
    assess_likelihood: true
    assess_impact: true
    assess_cross_chain_scope: true
    min_exploitability_score: 8.5

  # Consensus requirement
  consensus:
    min_agents_agree: 3
    mode: voting

# Exploit Database Similarity (Phase 10)
exploit_similarity:
  matches:
    - yala-layerzero-2025-09
    - wormhole-2022-02
    - stargate-2023-06
  signature: "R:ext->X:ext->W:crit"
  similarity_threshold: 0.85
  description: "Cross-chain message validation failure signature matches multiple major bridge exploits ($1.3B+ in losses)"
