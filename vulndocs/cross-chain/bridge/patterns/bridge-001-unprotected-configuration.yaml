# Semantic Operations (Phase 1-3)
# When implemented, this pattern could be enhanced with:
semantic_ops:
  has_all_operations:
    - MODIFIES_CRITICAL_STATE  # Configuration is critical state
  sequence_order: {}

# Behavioral Signature (Phase 2)
behavioral_signature:
  pattern: "W:dep"  # Writes dependency configuration
  matches_exploits:
    - poly-network-2021  # $611M keeper replacement
    - wormhole-2022      # $325M guardian bypass
    - ronin-2022         # $625M validator compromise
    - nomad-2022         # $190M configuration misconfiguration

# Tier A/B Matching (Phase 12-14)
tier_match:
  tier_a:
    all:
      - property: visibility
        op: in
        value: [public, external]
      - property: writes_sensitive_config
        op: eq
        value: true
      - property: has_cross_chain_context
        op: eq
        value: true
    none:
      - property: has_access_gate
        op: eq
        value: true
  tier_b:
    # LLM can assess business context, e.g., "Is this a legitimate admin function?"
    any:
      - has_risk_tag: privilege_escalation
      - has_risk_tag: bridge_configuration
  aggregation:
    mode: tier_a_required  # Tier A must match; Tier B adds context

# Z3/SMT Constraints (Phase 11)
# Not applicable for this pattern - access control is not arithmetic
constraints: {}

# Attack Path Templates (Phase 7)
attack_paths:
  - name: bridge_configuration_takeover
    description: "Configuration modification → validation bypass → fund extraction"
    entry_points:
      - role: EntryPoint
        operations: [MODIFIES_CRITICAL_STATE]
    intermediate_steps:
      - operations: [CHECKS_PERMISSION]
        expected: true
        actual: false  # Missing access control
    exit_points:
      - operations: [TRANSFERS_VALUE_OUT]
    preconditions:
      - "has_access_gate == false"
      - "writes_sensitive_config == true"
      - "has_cross_chain_context == true"
    impact: "Bridge compromise leading to unlimited fund extraction"

