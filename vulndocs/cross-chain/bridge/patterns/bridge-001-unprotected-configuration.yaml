# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Poly Network Keeper Replacement ($611M)"
    description: "Attacker replaces legitimate bridge keepers with malicious addresses"
    preconditions:
      - Function modifies keeper/validator/relayer configuration
      - Function is externally callable without access control
      - Cross-chain message execution trusts keeper signatures
    steps:
      - Attacker identifies unprotected keeper configuration function
      - Attacker calls function to replace legitimate keepers with attacker-controlled addresses
      - Attacker now controls cross-chain message validation
      - Attacker creates malicious cross-chain transactions to drain funds
    impact: "Complete bridge takeover, unlimited fund extraction across all chains"

  - name: "Wormhole Guardian Bypass ($325M)"
    description: "Attacker bypasses signature verification through configuration manipulation"
    preconditions:
      - Function modifies guardian/validator configuration
      - Signature verification relies on configured guardian set
      - No access control on configuration updates
    steps:
      - Attacker identifies guardian configuration function
      - Attacker modifies guardian set or validation parameters
      - Attacker forges signatures that pass manipulated validation
      - Attacker mints unbacked wrapped assets
    impact: "Minting of unbacked assets, protocol insolvency"

  - name: "Ronin Validator Whitelist Abuse ($625M)"
    description: "Attacker exploits unrevoked whitelist access to validator configuration"
    preconditions:
      - Temporary validator access granted for specific purpose
      - Access not revoked after purpose completed
      - Validator configuration lacks additional access control
    steps:
      - Attacker (or compromised party) retains unrevoked whitelist access
      - Attacker uses retained access to modify validator set
      - Attacker gains control over sufficient validators for consensus
      - Attacker approves malicious withdrawals
    impact: "Consensus takeover, unauthorized fund withdrawals"

  - name: "Nomad Trusted Root Misconfiguration ($190M)"
    description: "Configuration upgrade causes all messages to be automatically trusted"
    preconditions:
      - Bridge verification relies on trusted root configuration
      - Configuration update initializes trusted root to unsafe default
      - No additional validation on message acceptance
    steps:
      - Configuration upgrade sets trusted root to 0x00
      - Untrusted roots also evaluate to 0x00
      - All messages automatically marked as valid
      - Attacker (and copycats) submit arbitrary withdrawal messages
    impact: "Complete validation bypass, mob-style bridge draining"

  - name: "Bridge Endpoint Redirection"
    description: "Attacker redirects bridge endpoint to malicious contract"
    preconditions:
      - Function modifies bridge endpoint/router/adapter addresses
      - No access control on endpoint configuration
      - Cross-chain messages routed through configured endpoint
    steps:
      - Attacker identifies endpoint configuration function
      - Attacker changes endpoint to malicious contract
      - Legitimate users send cross-chain messages
      - Malicious endpoint intercepts and steals funds
    impact: "Fund interception, message manipulation, protocol compromise"

# How to further verify this is not a false positive
verification_steps:
  - "Confirm function modifies bridge/relayer/endpoint/validator/keeper configuration"
  - "Verify function is externally callable (public/external visibility)"
  - "Check for ANY access control: modifiers, require statements, internal calls to auth functions"
  - "Examine if this is intentional initialization (constructor, initializer, setup function)"
  - "Assess impact: What could attacker achieve by modifying this configuration?"
  - "Check if configuration is used in signature verification, message routing, or fund custody"
  - "Consider multi-sig or timelock: Is configuration protected by external governance?"
  - "Review recent configuration changes: Was temporary access properly revoked?"

# Recommended fixes
fix_recommendations:
  - name: "Add onlyOwner/onlyAdmin Access Control"
    description: "Restrict configuration changes to trusted admin addresses"
    example: |
      // VULNERABLE
      function setBridgeEndpoint(address newEndpoint) external {
          bridgeEndpoint = newEndpoint;
      }

      // SAFE - onlyOwner modifier
      function setBridgeEndpoint(address newEndpoint) external onlyOwner {
          bridgeEndpoint = newEndpoint;
          emit BridgeEndpointUpdated(newEndpoint);
      }

  - name: "Use Role-Based Access Control (RBAC)"
    description: "Implement OpenZeppelin AccessControl for granular permissions"
    example: |
      // VULNERABLE
      function updateRelayer(address newRelayer) external {
          relayer = newRelayer;
      }

      // SAFE - Role-based access control
      bytes32 public constant BRIDGE_ADMIN_ROLE = keccak256("BRIDGE_ADMIN_ROLE");

      function updateRelayer(address newRelayer) external onlyRole(BRIDGE_ADMIN_ROLE) {
          require(newRelayer != address(0), "Invalid relayer");
          address oldRelayer = relayer;
          relayer = newRelayer;
          emit RelayerUpdated(oldRelayer, newRelayer);
      }

  - name: "Add Multi-Signature Requirement"
    description: "Require multiple parties to approve critical configuration changes"
    example: |
      // VULNERABLE
      function setValidatorSet(address[] calldata validators) external {
          validatorSet = validators;
      }

      // SAFE - Multi-sig requirement
      function setValidatorSet(address[] calldata validators) external {
          require(msg.sender == multiSig, "Only multisig");
          require(validators.length >= MIN_VALIDATORS, "Insufficient validators");
          validatorSet = validators;
          emit ValidatorSetUpdated(validators);
      }

  - name: "Implement Timelock for Configuration Changes"
    description: "Add delay between configuration proposal and execution"
    example: |
      // VULNERABLE
      function changeKeeper(address newKeeper) external {
          keeper = newKeeper;
      }

      // SAFE - Timelock pattern
      mapping(bytes32 => uint256) public timelocks;
      uint256 public constant TIMELOCK_DELAY = 2 days;

      function proposeKeeperChange(address newKeeper) external onlyOwner {
          bytes32 proposalId = keccak256(abi.encode("keeper", newKeeper));
          timelocks[proposalId] = block.timestamp + TIMELOCK_DELAY;
          emit KeeperChangeProposed(newKeeper, timelocks[proposalId]);
      }

      function executeKeeperChange(address newKeeper) external onlyOwner {
          bytes32 proposalId = keccak256(abi.encode("keeper", newKeeper));
          require(timelocks[proposalId] > 0, "Not proposed");
          require(block.timestamp >= timelocks[proposalId], "Timelock active");
          delete timelocks[proposalId];
          keeper = newKeeper;
          emit KeeperChanged(newKeeper);
      }

  - name: "Add Configuration Validation"
    description: "Validate configuration changes before applying"
    example: |
      // VULNERABLE
      function setMessageEndpoint(address endpoint) external {
          messageEndpoint = endpoint;
      }

      // SAFE - Validation + access control
      function setMessageEndpoint(address endpoint) external onlyOwner {
          require(endpoint != address(0), "Invalid endpoint");
          require(endpoint.code.length > 0, "Not a contract");
          require(endpoint != address(this), "Cannot be self");

          // Optional: Verify endpoint implements expected interface
          require(
              IMessageEndpoint(endpoint).supportsInterface(type(IMessageEndpoint).interfaceId),
              "Invalid interface"
          );

          address oldEndpoint = messageEndpoint;
          messageEndpoint = endpoint;
          emit MessageEndpointUpdated(oldEndpoint, endpoint);
      }

