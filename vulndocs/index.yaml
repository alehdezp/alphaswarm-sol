# VulnDocs - Unified Vulnerability Knowledge Base
# Top-level manifest for LLM context engineering

schema_version: "1.0"
name: VulnDocs
description: |
  Unified vulnerability knowledge base for Solidity smart contract security.
  Provides structured documentation, detection patterns, and verification guidance
  for LLM-driven security analysis using BSKG graph queries.

# Navigation guide for LLM agents
navigation:
  structure: |
    vulndocs/
      index.yaml          <- You are here (start)
      .meta/              <- Templates and instructions
        templates/        <- YAML/MD templates for new content
        instructions/     <- How-to guides for writing vulndocs
      {category}/         <- Category folder (e.g., reentrancy/)
        index.yaml        <- Category metadata
        {subcategory}/    <- Vulnerability folder (e.g., classic/)
          index.yaml      <- Vulnerability metadata (REQUIRED)
          core-pattern.md <- Main documentation
          detection.md    <- Detection guidance
          verification.md <- Verification steps
          exploits.md     <- Real-world exploits
          patterns/       <- Detection patterns
            *.yaml        <- Individual pattern files
          provenance.yaml <- Source tracking (optional)

  how_to_use:
    - Start here (index.yaml) to discover categories
    - Navigate to category/index.yaml for subcategory list
    - Read subcategory/index.yaml for vulnerability overview
    - Use patterns/ for detection logic (Tier A/B/C)
    - Check .meta/instructions/ for authoring guidance

