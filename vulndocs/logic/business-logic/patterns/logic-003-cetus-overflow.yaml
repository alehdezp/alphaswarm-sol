# =============================================================================
# REAL-WORLD EXPLOITS
# =============================================================================

exploits:
  - name: "Cetus Protocol SUI Overflow"
    date: "2025-05-22"
    loss: "$260,000,000"
    chain: "Sui"
    description: |
      The Cetus Protocol on Sui suffered a critical arithmetic overflow
      vulnerability in liquidity position calculations. Attackers exploited
      unchecked multiplication operations on user input to cause overflow,
      resulting in incorrect position sizes written to state. These incorrect
      values were then used to drain the protocol of approximately $260M.

      While the Cetus exploit occurred on Move (Sui's language), the underlying
      arithmetic pattern applies to Solidity contracts performing similar
      calculations without proper overflow protection.
    attack_vector: |
      1. Attacker identifies liquidity calculation function
      2. Analyzes arithmetic: multiply(userAmount, pricePerUnit)
      3. Calculates input that causes overflow
      4. Submits transaction with crafted input
      5. Arithmetic overflows, wraps to small value
      6. Small value written to position state
      7. Attacker manipulates protocol using incorrect state
    source: "Cetus Protocol Official Announcement"
    cve: "CVE-TBD-2025-CETUS"
    reference: "knowledge/vulndocs/categories/logic/subcategories/arithmetic/specifics/cetus-sui-overflow"

