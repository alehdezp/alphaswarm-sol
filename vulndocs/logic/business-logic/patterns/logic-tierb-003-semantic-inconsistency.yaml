# =============================================================================
# PATTERN: logic-tierb-003-semantic-inconsistency
# Semantic Inconsistency Detection (Tier B - LLM Reasoning Required)
# =============================================================================

id: logic-tierb-003-semantic-inconsistency
vulndoc: logic/business-logic
name: "Semantic Inconsistency (LLM-Verified)"

description: |
  ## What This Detects

  Functions where naming, documentation, or interface semantics don't match
  actual implementation behavior. This creates confusion and potential exploits.

  **Categories:**
  - "safeTransfer" that isn't actually safe
  - "nonReentrant" modifier without actual protection
  - Error messages that don't match failure conditions
  - Return values with different semantics than expected
  - Interface implementations that deviate from standard

  **Why Tier B (LLM) is Required:**
  - Requires understanding naming conventions and expectations
  - Must compare semantic meaning of names vs code behavior
  - Needs context about standard patterns and their semantics
  - Human intuition about "what this should do"

  ## Why It's Dangerous

  Semantic inconsistency creates:
  - **False Security**: Developers/auditors skip review of "safe" functions
  - **Integration Bugs**: Other contracts rely on expected behavior
  - **Audit Failures**: Misleading names cause auditors to miss vulnerabilities
  - **User Confusion**: Users expect documented behavior

  ## Real-World Examples

  **Fake Safe Functions**: Functions named "safe*" without actual safety
  **Missing Guards**: "nonReentrant" in name but no actual lock
  **Wrong Errors**: require(x, "Insufficient balance") when checking allowance
  **Interface Deviation**: ERC20 transfer returning void instead of bool

scope: Function

lens:
  - Logic
  - Authority

severity: medium

status: draft

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  tier_a:
    all:
      - property: visibility
        op: in
        value: [public, external]
    any:
      - property: has_external_calls
        op: eq
        value: true
      - property: writes_state
        op: eq
        value: true
      - property: transfers_value
        op: eq
        value: true
    none:
      - property: is_constructor
        op: eq
        value: true

  tier_b:
    any:
      - has_risk_tag: naming_behavior_mismatch
      - has_risk_tag: natspec_contradiction
      - has_risk_tag: misleading_semantics
      - has_risk_tag: return_value_confusion
      - has_risk_tag: interface_deviation
      - has_risk_tag: fake_safety_label

aggregation:
  mode: tier_b_enhances  # Tier A is broad, Tier B is the real detection

