  - "Confirm function performs division on balance-related values (not just constants)"
  - "Identify scaling factors being applied (decimal conversion, fixed-point multipliers)"
  - "Check for rounding direction enforcement:"
  - "  - Look for: FixedPoint.divUp, ceilingDiv, upRound"
  - "  - Look for: Paired divUp/divDown usage patterns"
  - "  - Missing: Explicit rounding control = vulnerable signal"
  - "Verify state modification happens without invariant checks:"
  - "  - Check if function updates reserves, balances, or invariant D"
  - "  - Check if any D_before/D_after comparison exists"
  - "  - Check if price validation against oracle exists"
  - "Assess atomic operation batching:"
  - "  - Can caller execute 65+ division-triggering operations in single transaction?"
  - "  - Is there a per-transaction operation count limit?"
  - "  - What is the practical limit (if any)?"
  - "Identify token balance thresholds where rounding error is maximum:"
  - "  - Balances 1-10 wei with 1e6 or 1e12 scaling factors"
  - "  - Calculate relative precision loss for edge cases"
  - "Assess pool recovery mechanisms:"
  - "  - Does protocol have circuit breakers?"
  - "  - Does protocol monitor for unusual invariant changes?"
  - "  - Are there rate limits on swap frequency?"

# Recommended fixes
fix_recommendations:
  - name: "Implement Consistent Rounding Direction (divUp for Invariant Preservation)"
    description: |
      Use divUp (ceiling division) when scaling balances for invariant calculations
      to systematically overestimate rather than underestimate. This prevents artificial
      price suppression at the source.
    example: |
      // VULNERABLE CODE - mulDown causes systematic underestimation
      function _upscaleArray(uint256[] memory amounts, uint256[] memory scalingFactors)
          internal
          pure
          returns (uint256[] memory)
      {
          for (uint i = 0; i < amounts.length; i++) {
              amounts[i] = FixedPoint.mulDown(amounts[i], scalingFactors[i]);
              // Rounding DOWN systematically underestimates all amounts
          }
          return amounts;
      }

      // FIXED CODE - Use divUp for safety (overestimate, not underestimate)
      function _upscaleArray(uint256[] memory amounts, uint256[] memory scalingFactors)
          internal
          pure
          returns (uint256[] memory)
      {
          for (uint i = 0; i < amounts.length; i++) {
              amounts[i] = FixedPoint.mulUp(amounts[i], scalingFactors[i]);
              // Rounding UP prevents artificial suppression of invariant
          }
          return amounts;
      }

  - name: "Enforce Hard Limit on Atomic Operations"
    description: |
      Limit the number of swap operations per batchSwap transaction to prevent
      compounding of precision losses. The Balancer exploit required 65+ operations;
      limiting to <10-20 dramatically reduces exploitation window.
    example: |
      // VULNERABLE - No limit on operations per batch
      function batchSwap(
          SwapKind kind,
          BatchSwapStep[] calldata swaps,
          IAsset[] calldata assets,
          FundManagement calldata funds,
          int256[] calldata limits,
          uint256 deadline
      )
          external
          payable
          returns (int256[] memory deltas)
      {
          // Attacker can execute 65+ operations, compounding precision loss
          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);  // Each triggers division and rounding down
          }
          // No operation count limit
      }

      // FIXED - Enforce operation count limit
      function batchSwap(
          SwapKind kind,
          BatchSwapStep[] calldata swaps,
          IAsset[] calldata assets,
          FundManagement calldata funds,
          int256[] calldata limits,
          uint256 deadline
      )
          external
          payable
          returns (int256[] memory deltas)
      {
          // Hard limit prevents compounding of precision loss
          require(swaps.length <= 10, "Balancer: Too many operations per batch");

          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);
          }
      }

  - name: "Validate Invariant Stability Before and After Operations"
    description: |
      Implement checks verifying that the invariant D doesn't deviate unexpectedly
      between operations. Sudden drops indicate precision loss or manipulation.
    example: |
      // VULNERABLE - No invariant validation
      function batchSwap(...) external {
          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);
              // Precision loss compounds undetected
          }
      }

      // FIXED - Validate invariant stability
      function batchSwap(...) external {
          uint256 invariantBefore = _calculateInvariant(balances);

          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);

              uint256 invariantAfter = _calculateInvariant(balances);

              // Prevent dramatic invariant drops (indicates precision loss/manipulation)
              // Allow max 0.5% deviation per operation
              require(
                  invariantAfter >= invariantBefore * 995 / 1000,
                  "Invariant dropped unexpectedly - precision loss or manipulation detected"
              );

              invariantBefore = invariantAfter;  // Update for next iteration
          }
      }

  - name: "Implement BPT Price Validation Against External Oracle"
    description: |
      Validate BPT price against an external source to detect artificial price
      suppression. Prices deviating from expected ranges indicate manipulation.
    example: |
      // VULNERABLE - BPT price calculated without validation
      function batchSwap(...) external {
          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);
              // BPT price can become artificially suppressed
          }
      }

      // FIXED - Validate BPT price reasonableness
      function batchSwap(...) external {
          uint256 previousBPTPrice = _calculateBPTPrice();

          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);

              uint256 currentBPTPrice = _calculateBPTPrice();

              // BPT price shouldn't drop dramatically (indicates suppression)
              // Allow max 1% variance between operations
              require(
                  currentBPTPrice >= previousBPTPrice * 99 / 100,
                  "BPT price suppressed - possible precision loss exploitation"
              );

              previousBPTPrice = currentBPTPrice;
          }
      }

  - name: "Use Higher Precision for Invariant Calculations"
    description: |
      Increase precision for invariant calculations by upscaling intermediate
      values to 256-bit range before division, reducing relative rounding error.
      Production-ready implementations use mulDiv() for safe 512-bit arithmetic.
    example: |
      // VULNERABLE - Direct division on native precision
      function _calculateInvariant(uint256[] memory balances, uint256[] memory scalingFactors)
          internal
          pure
          returns (uint256)
      {
          // Balances: [8 wei, 1e18 wei]
          // Scaling: [1e12, 1e6]
          // Direct: 8 * 1e12 / scale = minimal precision
          uint256 invariant = (balances[0] * balances[1]) / (scale1 * scale2);
          return invariant;
      }

      // FIXED (Safe) - Use FullMath.mulDiv for 512-bit precision
      function _calculateInvariant(uint256[] memory balances, uint256[] memory scalingFactors)
          internal
          pure
          returns (uint256)
      {
          // Use 512-bit multiplication and division (handles overflow)
          // This prevents intermediate overflow while maintaining precision
          uint256 numerator = FullMath.mulDiv(balances[0], balances[1], 1);
          uint256 invariant = FullMath.mulDiv(numerator, 1e18, scalingFactors[0] * scalingFactors[1]);
          return invariant;
      }

      // FIXED (Alternative) - Use PRBMath for fixed-point arithmetic
      function _calculateInvariant(uint256[] memory balances, uint256[] memory scalingFactors)
          internal
          pure
          returns (uint256)
      {
          // Upscale intermediate values while preventing overflow
          uint256 scaled0 = (balances[0] * 1e18);
          uint256 scaled1 = (balances[1] * 1e18);

          // Perform multiplication with overflow protection
          uint256 product = FullMath.mulDiv(scaled0, scaled1, 1e36);

          // Apply scaling factors with rounding UP for safety
          uint256 invariant = FullMath.mulDiv(product, 1e18, scalingFactors[0] * scalingFactors[1]);
          return invariant;
      }

  - name: "Implement Rate Limiting on Precision-Loss-Inducing Patterns"
    description: |
      Rate limit swap operations that target specific balance boundaries or
      execute high-frequency micro-swaps. This prevents rapid compounding of
      precision losses.
    example: |
      // VULNERABLE - No rate limiting on swap frequency
      function batchSwap(...) external {
          // Attacker can execute unlimited micro-swaps per block
          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);
          }
      }

      // FIXED - Implement rate limiting
      mapping(address => uint256) public lastSwapTime;
      mapping(address => uint256) public swapCountInWindow;
      uint256 public constant SWAP_COOLDOWN = 10 minutes;
      uint256 public constant MAX_SWAPS_PER_WINDOW = 5;

      function batchSwap(...) external {
          address caller = msg.sender;

          // Enforce cooldown between swap batches
          require(
              block.timestamp >= lastSwapTime[caller] + SWAP_COOLDOWN,
              "Swap rate limit - cooldown required"
          );

          // Limit operations per window
          require(
              swaps.length <= MAX_SWAPS_PER_WINDOW,
              "Too many operations - rate limit exceeded"
          );

          for (uint i = 0; i < swaps.length; i++) {
              _swap(swaps[i]);
          }

          lastSwapTime[caller] = block.timestamp;
          swapCountInWindow[caller] += swaps.length;
      }

# =============================================================================
# PRODUCTION-READY SAFE IMPLEMENTATIONS
# =============================================================================

safe_implementations:
  - name: "FullMath Library - Safe 512-bit Multiplication and Division"
    description: |
      Industry-standard library (Uniswap V3, Compound) for safe multiplication
      and division with overflow protection. Handles "phantom overflow" by
      computing 512-bit products and dividing with full precision.
    source: "Uniswap V3 FullMath.sol"
    semantic_operations:
      - PERFORMS_MULTIPLICATION  # Safe: 512-bit multiplication
      - PERFORMS_DIVISION        # Safe: Full precision division
      - CHECKS_OVERFLOW          # Protection: Validates 512-bit result
    code: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      /// @title Contains 512-bit math functions
      /// @notice Facilitates multiplication and division that can have overflow
      /// of an intermediate value without any loss of precision
      /// @dev Handles "phantom overflow" i.e., allows multiplication and division
      /// where an intermediate value overflows 256 bits
      library FullMath {
          /// @notice Calculates floor(a×b÷denominator) with full precision.
          /// @param a The multiplicand
          /// @param b The multiplier
          /// @param denominator The divisor
          /// @return result The 256-bit result
          function mulDiv(
              uint256 a,
              uint256 b,
              uint256 denominator
          ) internal pure returns (uint256 result) {
              unchecked {
                  // 512-bit multiply [prod1 prod0] = a * b
                  uint256 prod0; // Least significant 256 bits
                  uint256 prod1; // Most significant 256 bits
                  assembly {
                      let mm := mulmod(a, b, not(0))
                      prod0 := mul(a, b)
                      prod1 := sub(sub(mm, prod0), lt(mm, prod0))
                  }

                  // Handle non-overflow cases, 256 by 256 division
                  if (prod1 == 0) {
                      require(denominator > 0);
                      assembly {
                          result := div(prod0, denominator)
                      }
                      return result;
                  }

                  // Make sure the result is less than 2**256
                  require(denominator > prod1);

                  // 512 by 256 division
                  uint256 remainder;
                  assembly {
                      remainder := mulmod(a, b, denominator)
                  }
                  assembly {
                      prod1 := sub(prod1, gt(remainder, prod0))
                      prod0 := sub(prod0, remainder)
                  }

                  // Factor powers of two out of denominator
                  uint256 twos = (~denominator + 1) & denominator;
                  assembly {
                      denominator := div(denominator, twos)
                  }

                  assembly {
                      prod0 := div(prod0, twos)
                  }

                  assembly {
                      twos := add(div(sub(0, twos), twos), 1)
                  }

                  prod0 |= prod1 * twos;

                  // Invert denominator mod 2**256
                  uint256 inv = (3 * denominator) ^ 2;
                  inv *= 2 - denominator * inv; // inverse mod 2**8
                  inv *= 2 - denominator * inv; // inverse mod 2**16
                  inv *= 2 - denominator * inv; // inverse mod 2**32
                  inv *= 2 - denominator * inv; // inverse mod 2**64
                  inv *= 2 - denominator * inv; // inverse mod 2**128
                  inv *= 2 - denominator * inv; // inverse mod 2**256

                  result = prod0 * inv;
                  return result;
              }
          }

          /// @notice Calculates ceil(a×b÷denominator) with full precision.
          function mulDivRoundingUp(
              uint256 a,
              uint256 b,
              uint256 denominator
          ) internal pure returns (uint256 result) {
              result = mulDiv(a, b, denominator);
              if (mulmod(a, b, denominator) > 0) {
                  require(result < type(uint256).max);
                  result++;
              }
          }
      }
    semantic_signature:
      vulnerable: "A:mul → A:div (native) → M:state"  # Native precision loss
      safe: "A:mulDiv(512-bit) → M:state"              # Safe: Full precision preserved
    key_properties:
      - performs_multiplication_with_overflow_protection: true
      - performs_division_with_full_precision: true
      - handles_phantom_overflow: true
      - uses_assembly_for_efficiency: true

  - name: "Safe Upscaling/Downscaling Pattern"
    description: |
      Production pattern for safely scaling token amounts across different
      decimal places. Uses consistent rounding UP for safety (prefer overestimate).
    semantic_operations:
      - READS_USER_BALANCE      # Input: Token balance
      - PERFORMS_MULTIPLICATION # Operation: Scale by factor
      - PERFORMS_DIVISION       # Operation: Divide with rounding UP
      - WRITES_USER_BALANCE     # Output: Scaled balance
    code: |
      // SPDX-License-Identifier: MIT
      pragma solidity ^0.8.0;

      library SafeScaling {
          /// @dev Safely upscale amount to canonical precision
          /// Uses mulDivRoundingUp to prevent systematic underestimation
          function upscale(
              uint256 amount,
              uint8 decimals,
              uint256 canonicalDecimals
          ) internal pure returns (uint256) {
              require(decimals <= canonicalDecimals, "Invalid decimal places");
              if (decimals == canonicalDecimals) return amount;

              uint256 scaleFactor = 10 ** (canonicalDecimals - decimals);
              return FullMath.mulDiv(amount, scaleFactor, 1);  // Exact (no loss)
          }

          /// @dev Safely downscale amount from canonical precision
          /// Uses mulDivRoundingUp to prevent artificial price suppression
          function downscale(
              uint256 amount,
              uint8 decimals,
              uint256 canonicalDecimals
          ) internal pure returns (uint256) {
              require(decimals <= canonicalDecimals, "Invalid decimal places");
              if (decimals == canonicalDecimals) return amount;

              uint256 scaleFactor = 10 ** (canonicalDecimals - decimals);
              return FullMath.mulDivRoundingUp(amount, 1, scaleFactor);  // ROUNDING UP
          }

          /// @dev Safely scale array of amounts
          function upscaleArray(
              uint256[] memory amounts,
              uint8[] memory decimals,
              uint256 canonicalDecimals
          ) internal pure returns (uint256[] memory scaled) {
              scaled = new uint256[](amounts.length);
              for (uint256 i = 0; i < amounts.length; i++) {
                  scaled[i] = upscale(amounts[i], decimals[i], canonicalDecimals);
              }
          }

          function downscaleArray(
              uint256[] memory amounts,
              uint8[] memory decimals,
              uint256 canonicalDecimals
          ) internal pure returns (uint256[] memory scaled) {
              scaled = new uint256[](amounts.length);
              for (uint256 i = 0; i < amounts.length; i++) {
                  scaled[i] = downscale(amounts[i], decimals[i], canonicalDecimals);
              }
          }
      }
    usage_example: |
      // Safe pool invariant calculation
      function _calculatePoolInvariant(
          uint256[] memory balances,
          uint8[] memory tokenDecimals
      ) internal pure returns (uint256) {
          // SAFE: Upscale all balances using consistent precision
          uint256[] memory scaledBalances = SafeScaling.upscaleArray(
              balances,
              tokenDecimals,
              18  // Canonical decimal place
          );

          // SAFE: Calculate invariant at uniform precision
          uint256 invariant = _invariantFormula(scaledBalances);

          return invariant;
      }
    key_properties:
      - consistent_rounding_direction: true
      - uses_safe_math_library: true
      - performs_dimension_check: true
      - no_precision_loss: true

  - name: "Solmate Fixed-Point Math Library"
    description: |
      Alternative: Solmate's mulWadUp/mulWadDown functions for WAD (18-decimal)
      arithmetic. Simpler than FullMath but suitable for homogeneous token
      decimal environments (all 18-decimal or all 8-decimal).
    semantic_operations:
      - PERFORMS_FIXED_POINT_MULTIPLICATION
      - PERFORMS_FIXED_POINT_DIVISION
    code: |
      // SPDX-License-Identifier: AGPL-3.0-only
      pragma solidity >=0.8.0;

      /// @notice Emitted when mulDiv reverts
      error MulWadFailed();

      library FixedPointMathLib {
          uint256 internal constant WAD = 1e18; // The scalar of ETH and most ERC20s

          function mulWadDown(uint256 x, uint256 y) internal pure returns (uint256 r) {
              assembly {
                  // Equivalent to (x * y) / WAD rounded down.
                  r := div(mul(x, y), WAD)
              }
          }

          function mulWadUp(uint256 x, uint256 y) internal pure returns (uint256 r) {
              assembly {
                  // Equivalent to (x * y) / WAD rounded up
                  r := add(div(mul(x, y), WAD), gt(mod(mul(x, y), WAD), 0))
              }
          }

          function divWadDown(uint256 x, uint256 y) internal pure returns (uint256 r) {
              assembly {
                  // Equivalent to (x / y) * WAD rounded down
                  r := div(mul(x, WAD), y)
              }
          }

          function divWadUp(uint256 x, uint256 y) internal pure returns (uint256 r) {
              assembly {
                  // Equivalent to (x / y) * WAD rounded up
                  r := add(div(mul(x, WAD), y), gt(mod(mul(x, WAD), y), 0))
              }
          }

          // Use for heterogeneous token decimals (more precision)
          function mulDivDown(
              uint256 x,
              uint256 y,
              uint256 denominator
          ) internal pure returns (uint256 result) {
              uint256 prod0;
              uint256 prod1;
              assembly {
                  let mm := mulmod(x, y, not(0))
                  prod0 := mul(x, y)
                  prod1 := sub(sub(mm, prod0), lt(mm, prod0))
              }

              if (prod1 == 0) {
                  unchecked {
                      return prod0 / denominator;
                  }
              }

              require(denominator > prod1);

              uint256 remainder;
              assembly {
                  remainder := mulmod(x, y, denominator)
                  prod1 := sub(prod1, gt(remainder, prod0))
                  prod0 := sub(prod0, remainder)
              }

              assembly {
                  let diff := sub(denominator, prod1)
                  let diff2 := sub(diff, 1)
                  let twos := and(diff2, denominator)

                  prod1 := div(prod1, twos)
                  prod0 := div(prod0, twos)
                  diff := div(diff, twos)

                  prod0 := div(prod0, diff)

                  result := prod0
              }
          }

          function mulDivUp(
              uint256 x,
              uint256 y,
              uint256 denominator
          ) internal pure returns (uint256 z) {
              z = mulDivDown(x, y, denominator);
              unchecked {
                  if (mulmod(x, y, denominator) != 0) ++z;
              }
          }
      }
    key_properties:
      - simple_and_gas_efficient: true
      - suitable_for_homogeneous_decimals: true
      - provides_both_rounding_directions: true

