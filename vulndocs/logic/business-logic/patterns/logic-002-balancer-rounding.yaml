# =============================================================================
# PATTERN: logic-002-balancer-rounding
# Balancer V2 Rounding Direction Bias (Semantic, Name-Agnostic)
# =============================================================================

id: logic-002-balancer-rounding
vulndoc: logic/business-logic
name: "Balancer V2 Rounding Direction Bias"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Functions that perform scaling/unscaling of token amounts using integer division
  (rounding DOWN) combined with subsequent state modifications, without employing
  explicit rounding protection (rounding UP, ceiling division, or invariant validation).

  This pattern specifically detects the vulnerability chain that enabled the $128.64M
  Balancer V2 exploit: precision loss through rounding down in balance scaling,
  compounded across multiple atomic operations, leading to artificial suppression of
  invariant values and pool pricing.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Performs division operations on balance-like values (performs_division = true)
  - Uses scaling factors to adjust token amounts (uses_scaling_factors = true)
  - Reads user/pool balance state (reads_user_balance = true)
  - Modifies critical state without prior invariant validation (modifies_critical_state = true)
  - Performs arithmetic operations in loops over arrays (loops_over_array = true)

  This catches ANY balance scaling/unscaling function regardless of naming convention
  (upscaleArray, downscaleArray, computeInvariant, etc.).

  ## Why It's Dangerous

  The Balancer V2 ComposableStablePool vulnerability demonstrates that subtle
  rounding direction asymmetries can have catastrophic consequences:

  ### Root Cause
  The _upscaleArray function performs `mulDown` (rounds down) when scaling amounts
  by decimal factors, but lacks a counterpart `mulUp` for safety. This asymmetry
  means:
  - Balances are systematically underestimated during scaling
  - The invariant D (StableSwap pricing formula) becomes underestimated
  - BPT price = D / totalSupply becomes artificially deflated

  ### Compounding Effect
  When 65+ micro-swaps execute atomically within a single batchSwap:
  - Each swap triggers _upscaleArray → rounding down
  - Precision losses accumulate within the atomic context
  - By swap #65, the invariant D can be underestimated by 10%+
  - BPT minting price becomes critically suppressed

  ### Attack Mechanics
  1. **Setup Phase**: Execute large swaps to position token balance at critical
     wei threshold (8-9 wei) where rounding errors reach 10% relative loss
  2. **Exploitation Phase**: Execute 65+ micro-swaps atomically
     - Each triggers division with rounding down
     - Precision losses compound (1% → 2% → 5% → 10%+)
     - State not committed between ops, losses accumulate
  3. **Extraction Phase**: Mint BPT at artificially deflated price
     - Cost 10%+ less than fair value
     - Redeem BPT for full underlying asset value
     - Profit entire 10%+ difference per pool

  ### Real-World Impact
  - **Ethereum**: $99M extracted
  - **Base**: $15M extracted
  - **Multi-chain**: $14.64M extracted (Polygon, Arbitrum, Avalanche, Berachain)
  - **Total Loss**: $128.64M (Nov 2025)
  - **Berachain**: Halted blockchain and coordinated emergency hard fork

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function performs division operations (performs_division = true)
  2. Function uses scaling factors (uses_scaling_factors = true)
  3. Function reads balance/reserve state (reads_user_balance = true)
  4. Function modifies critical state (modifies_critical_state = true)
  5. NOT a view/pure function (must modify state)
  6. Lacks explicit rounding protection safeguards

  Safe patterns that are EXCLUDED:
  - Functions using divUp or ceiling division for balance scaling
  - Functions with invariant validation checks (D before/after comparison)
  - Functions with hard limits on atomic operation counts (< 10 ops)
  - Functions with BPT price validation against external oracle
  - Functions with explicit rounding direction enforcement (divUp paired with divDown)

  **Implementation-Agnostic**: Works regardless of:
  - Function names (upscaleArray, scaleAmount, adjustBalance, computeInvariant, etc.)
  - Variable names (balances, amounts, reserves, invariant, etc.)
  - Specific library usage (FixedPoint, Math, custom implementations)
  - Comment/documentation presence or absence

scope: Function

lens:
  - Arithmetic
  - Logic

severity: critical

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Core vulnerability: Division operations on balance/amount values
      # Indicates scaling or unscaling with potential rounding loss
      - property: has_division
        op: eq
        value: true

      # Use of scaling factors (decimal adjustments, conversion factors)
      # Indicates balance transformation without guaranteed precision preservation
      - property: uses_scaling_factors
        op: eq
        value: true

      # Must read balance/reserve state being transformed
      # Indicates this is a balance-scaling function affecting pool accounting
      - property: reads_balance_state
        op: eq
        value: true

      # Critical: Modifies state without prior invariant validation
      # State modification without safety checks enables the compounding effect
      - property: modifies_critical_state
        op: eq
        value: true

    # At least ONE must match (OR logic) - optional detection enhancers
    any:
      # Looping over array of balances strengthens signal
      # Loop + division = compounding rounding errors
      - property: loops_over_array
        op: eq
        value: true

      # Arithmetic on balances strengthens vulnerability signal
      # Multiplication + division = precision loss amplification
      - property: arithmetic_operations_on_balances
        op: eq
        value: true

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # Not applicable to view/pure functions
      - property: state_mutability
        op: in
        value: [view, pure]

      # Rounding UP is a protective measure - excludes safe patterns
      - property: has_rounding_protection
        op: eq
        value: true

      # Explicit ceiling division safeguards against downward rounding
      - property: uses_floor_ceiling_explicitly
        op: eq
        value: true

      # Minimum output validation prevents price suppression exploitation
      - property: has_minimum_output_validation
        op: eq
        value: true

      # Invariant validation detects and prevents precision loss
      - property: validates_invariant_stability
        op: eq
        value: true

# =============================================================================
# AGGREGATION MODE
# =============================================================================

aggregation:
  mode: tier_a_only  # Only Tier A (deterministic) matching

