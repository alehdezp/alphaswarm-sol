# Attack scenarios that this pattern can detect
attack_scenarios:
  - name: "Atomic Precision Loss Compounding Attack"
    description: |
      Attacker exploits rounding direction bias to artificially suppress
      invariant calculations through compounding precision losses in atomic
      batch swap operations.
    preconditions:
      - "Function performs balance scaling with rounding down (mulDown, divDown)"
      - "Function lacks rounding protection (divUp, invariant validation)"
      - "Batch swap allows 65+ atomic operations within single transaction"
      - "Invariant D used for BPT pricing without validation checks"
      - "Token balance at critical wei threshold (8-9 wei per token)"
    steps:
      - "Attacker positions target token balance at rounding boundary via large swap"
      - "Token balance: 8 wei (multiplier 1e18, scaling factor 1e6 → rounding loss)"
      - "Attacker executes 65 micro-swaps within atomic batchSwap"
      - "Each swap triggers _upscaleArray:"
      - "  - Read balance: 8 wei"
      - "  - Multiply by scaling factor: 8 * 1e6"
      - "  - Divide by precision (rounding down): result < expected"
      - "  - Precision loss compounds across 65 ops"
      - "Accumulated rounding loss reaches 10% of invariant D"
      - "BPT price = D_underestimated / totalSupply becomes artificially low"
      - "Attacker mints BPT at suppressed price (costs 10% less)"
      - "Attacker redeems BPT for underlying assets at fair value"
      - "Attacker extracts 10%+ profit per pool (millions per large pool)"
    impact: |
      Critical financial loss. Attacker extracts millions per pool by minting
      BPT at artificially suppressed prices and redeeming at fair value.
      Multi-pool coordinated attacks extract $100M+ before detection/circuit breakers.

  - name: "Rounding Direction Exploitation Across Scaling Layers"
    description: |
      Attacker exploits asymmetry between upscaling (mulDown only) and
      downscaling (mixed divUp/divDown) to systematically underestimate
      all balance-dependent calculations.
    preconditions:
      - "upscaleArray uses only mulDown (rounding down)"
      - "downscaleArray uses both divUp and divDown inconsistently"
      - "Critical calculations depend on upscaled balances"
      - "No invariant recalculation after scaling operations"
    steps:
      - "Multiple token pools with different decimal places"
      - "Pool 1: Token A (6 decimals), Token B (18 decimals)"
      - "Scaling factors differ by 1e12"
      - "Balance A: 5 wei (critical threshold)"
      - "upscaleArray multiplies by 1e12: 5 * 1e12 / rounding down"
      - "Systematic underestimation of token A value"
      - "Invariant D calculation uses underestimated values"
      - "All subsequent swaps use underestimated D"
      - "Pricing becomes progressively more biased"
    impact: |
      Sustained value extraction through persistently underestimated invariants,
      enabling long-term arbitrage and MEV extraction.

  - name: "Precision Loss Accumulation in Loop Context"
    description: |
      Balances scaling within loops over array of token amounts compounds
      precision loss through iteration, especially with heterogeneous
      token decimal places.
    preconditions:
      - "Array of token amounts looped for scaling"
      - "Each token has different decimal place"
      - "Scaling factors differ by orders of magnitude"
      - "Critical thresholds only triggered for specific token combinations"
    steps:
      - "Loop processes array of 20 tokens with varying decimals"
      - "Token 1-10: 18 decimals (standard)"
      - "Token 11-15: 8 decimals (USDC-like)"
      - "Token 16-20: 6 decimals (stablecoin-like)"
      - "Balances of low-decimal tokens at critical thresholds"
      - "Loop upscales all balances using mulDown"
      - "Precision loss accumulates across loop iterations"
      - "By iteration 15, accumulated loss reaches detection threshold"
      - "Final invariant calculation uses significantly underestimated values"
    impact: |
      Systematic precision loss distributed across multiple iterations,
      making detection harder but enabling sustained value extraction.

# How to further verify this is not a false positive
