# Why Balancer V2 Exploit Was Sophisticated
sophistication_factors: |
  1. **Mathematical Insight**: Attacker understood that rounding DOWN in balance
     scaling systematically underestimates all subsequent calculations

  2. **Threshold Targeting**: Identified exact wei-level thresholds (8-9 wei)
     that maximize relative rounding error (10%+ loss)

  3. **Atomic Compounding**: Leveraged atomic transaction semantics to compound
     errors across 65+ operations within single block

  4. **Invariant Manipulation**: Deep understanding of StableSwap D calculation
     and how underestimated D directly suppresses BPT pricing

  5. **Multi-Chain Execution**: Coordinated attacks across Ethereum, Base,
     Polygon, Arbitrum, Avalanche within 30-minute window

  6. **MEV Resistance**: Executed complex transaction flows while maintaining
     resistance to sandwich attacks and frontrunning

# Lessons Learned for Pattern Design
lessons_learned: |
  1. Rounding direction bias can be catastrophic in pricing formulas
     → Patterns must detect asymmetric rounding (mulDown without mulUp)

  2. Compounding effects are critical in batch operations
     → Patterns must consider operation count and cumulative precision loss

  3. Invariant validations are essential safety checks
     → Patterns must flag missing before/after comparisons

  4. Atomic semantics enable sophisticated exploits
     → Patterns must consider execution context and atomic isolation

  5. External validation is necessary for critical prices
     → Patterns must encourage oracle validation and circuit breakers

