# =============================================================================
# PATTERN: logic-001-parameter-confusion
# Nested Mapping Parameter Swap (Semantic, Name-Agnostic)
# =============================================================================

id: logic-001-parameter-confusion
vulndoc: logic/business-logic
name: "Nested Mapping Parameter Confusion"

description: |
  ## What This Detects

  Functions that access nested mappings (mapping[X][Y]) where the parameter order
  may be swapped from the intended business logic. This is particularly dangerous
  in allowance/approval patterns, role-based access control, and delegation systems.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Accesses nested mapping structures (has_nested_mapping_access = true)
  - Uses function parameters as mapping keys
  - Lacks formal specification or assertion validating parameter order

  This catches ANY nested mapping access pattern regardless of naming convention
  (allowances, approvals, roles, permissions, delegations, etc.).

  ## Why It's Dangerous

  The DeusDao vulnerability ($6.5M, May 2023) demonstrates that parameter confusion
  in nested mappings can completely bypass access control:

  ### Root Cause
  In the burnFrom function, `_allowances[_msgSender()][account]` was used instead
  of `_allowances[account][_msgSender()]`. This swapped "who approved whom" with
  "who gets to spend".

  ### Attack Mechanics
  1. Attacker calls `approve(victim, N)` - granting victim N allowance on attacker's tokens
  2. Attacker calls `burnFrom(victim, 0)` - due to parameter swap, this:
     - Reads: `_allowances[attacker][victim]` = N (attacker's grant)
     - Writes: `_allowances[attacker][victim] = N` (preserved)
     - But the burning logic incorrectly affects: victim's approval to attacker
  3. Result: Attacker gains approval for victim's tokens without victim's consent

  ### Real-World Impact
  - **DeusDao**: $6.5M (May 2023)
  - **Applicability**: ERC20, access control, multi-sig, any nested mapping pattern

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function has nested mapping access (has_nested_mapping_access = true)
  2. Function is public/external (accessible to attackers)
  3. Function modifies state based on mapping read
  4. NOT a view/pure function
  5. Lacks formal specification validating parameter semantics

scope: Function

lens:
  - Logic
  - Authority

severity: high

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Core vulnerability: Nested mapping access
      - property: has_nested_mapping_access
        op: eq
        value: true

      # Must be accessible to external callers
      - property: visibility
        op: in
        value: [public, external]

      # Must modify state (not just read)
      - property: writes_state
        op: eq
        value: true

    # At least ONE must match (OR logic) - strengthens signal
    any:
      # Uses approval/allowance pattern
      - property: uses_approval_pattern
        op: eq
        value: true

      # Uses role-based access control
      - property: uses_role_based_access
        op: eq
        value: true

      # Modifies critical permissions
      - property: modifies_permissions
        op: eq
        value: true

    # NONE can match (NOT logic) - CRITICAL for false positive reduction
    none:
      # View/pure functions can't be exploited this way
      - property: state_mutability
        op: in
        value: [view, pure]

      # Formal specification validates parameter semantics
      - property: has_formal_specification
        op: eq
        value: true

      # Explicit parameter validation
      - property: has_parameter_validation
        op: eq
        value: true

# =============================================================================
# AGGREGATION MODE
# =============================================================================

aggregation:
  mode: tier_a_only  # Only Tier A (deterministic) matching

