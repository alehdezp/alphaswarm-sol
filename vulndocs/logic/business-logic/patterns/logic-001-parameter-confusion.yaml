# =============================================================================
# PATTERN CONTEXT FOR LLM CONSUMPTION
# =============================================================================

attack_scenarios:
  - name: "ERC20 Allowance Parameter Swap Attack"
    description: |
      Attacker exploits parameter confusion in burnFrom to gain unauthorized
      token allowance over victim's tokens.
    preconditions:
      - "Function reads _allowances[msgSender][account] instead of _allowances[account][msgSender]"
      - "Attacker can call approve() and burnFrom() on the contract"
      - "No formal specification validates parameter semantics"
    steps:
      - "Attacker: approve(victim, 1000000) - grants victim allowance on attacker's tokens"
      - "Attacker: burnFrom(victim, 0) - triggers swapped mapping access"
      - "Contract reads: _allowances[attacker][victim] = 1000000 (attacker's grant)"
      - "Contract logic interprets: 'attacker is allowed to spend victim's tokens'"
      - "Attacker gains ability to transfer victim's tokens"
    impact: |
      Complete token theft. Attacker can drain any victim's token balance by
      exploiting the parameter confusion to gain unauthorized allowance.

  - name: "Role-Based Access Control Parameter Swap"
    description: |
      Attacker exploits swapped parameters in hasRole(role, user) to gain
      unauthorized administrative privileges.
    preconditions:
      - "Function checks hasRole[user][role] instead of hasRole[role][user]"
      - "Attacker can manipulate user parameter position"
      - "Contract relies on role-based access control"
    steps:
      - "Attacker identifies swapped hasRole check"
      - "Attacker crafts transaction that satisfies incorrect parameter order"
      - "Access control check passes despite lacking actual role"
      - "Attacker gains administrative privileges"
    impact: |
      Access control bypass. Attacker gains privileges they shouldn't have,
      potentially enabling fund theft, protocol manipulation, or destruction.

verification_steps:
  - "Identify all nested mapping accesses in function"
  - "For each mapping[X][Y], verify X and Y correspond to correct business semantics"
  - "Compare parameter order with ERC20/ERC721 standard implementations"
  - "Check for formal specifications that validate parameter relationships"
  - "Verify _allowances[owner][spender] pattern is used correctly"
  - "Test with formal verification (Scribble, Certora) to catch semantic mismatches"

fix_recommendations:
  - name: "Correct Parameter Order"
    description: |
      Ensure nested mapping access follows standard patterns and business logic.
      For ERC20 allowances, always use _allowances[owner][spender].
    example: |
      // VULNERABLE - Parameters swapped
      function burnFrom(address account, uint256 amount) public {
          uint256 currentAllowance = _allowances[_msgSender()][account];  // WRONG ORDER
          require(currentAllowance >= amount, "ERC20: insufficient allowance");
          _burn(account, amount);
          _approve(account, _msgSender(), currentAllowance - amount);
      }

      // FIXED - Correct parameter order
      function burnFrom(address account, uint256 amount) public {
          uint256 currentAllowance = _allowances[account][_msgSender()];  // CORRECT: owner[spender]
          require(currentAllowance >= amount, "ERC20: insufficient allowance");
          _burn(account, amount);
          _approve(account, _msgSender(), currentAllowance - amount);
      }

  - name: "Add Formal Specification"
    description: |
      Use formal verification tools to validate parameter semantics match intent.
    example: |
      /// @custom:scribble
      /// #if_succeeds "Only owner may increase allowance"
      ///   old(_allowances[owner][spender]) < _allowances[owner][spender]
      ///   ==> msg.sender == owner
      function approve(address spender, uint256 amount) public returns (bool) {
          _approve(_msgSender(), spender, amount);
          return true;
      }

  - name: "Standardize Mapping Access Functions"
    description: |
      Create internal helper functions with clear parameter naming to prevent confusion.
    example: |
      // Internal helper with explicit naming
      function _getAllowance(address owner, address spender) internal view returns (uint256) {
          return _allowances[owner][spender];  // Standardized order
      }

      function _setAllowance(address owner, address spender, uint256 amount) internal {
          _allowances[owner][spender] = amount;  // Standardized order
      }

      // All external functions use helpers
      function burnFrom(address owner, uint256 amount) public {
          uint256 currentAllowance = _getAllowance(owner, _msgSender());  // Clear: owner's allowance to caller
          require(currentAllowance >= amount);
          _setAllowance(owner, _msgSender(), currentAllowance - amount);
          _burn(owner, amount);
      }

