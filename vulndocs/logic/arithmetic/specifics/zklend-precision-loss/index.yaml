      description: "No explicit rounding direction control"
      confidence: 0.88

    - property: small_value_handling
      expected: false
      critical: true
      description: "No minimum value checks preventing precision attacks"
      confidence: 0.85

  semantic_operations:
    - PERFORMS_DIVISION
    - READS_USER_BALANCE
    - WRITES_USER_BALANCE
    - MODIFIES_CRITICAL_STATE
    - HANDLES_DECIMALS

  behavioral_signatures:
    - vulnerable: "R:bal->C:div{round_down}->W:bal"
      description: "Read balance, divide with rounding down, write balance"

    - vulnerable: "C:div{precision_loss}->W:shares"
      description: "Division with precision loss affecting share calculation"

  operation_sequences:
    vulnerable:
      - "R:deposit -> C:shares = deposit / rate (round down) -> W:shares"
      - "R:shares -> C:withdraw = shares * rate (precision gained) -> W:balance"

    safe:
      - "R:deposit -> V:min_amount -> C:shares = deposit / rate (round up) -> W:shares"
      - "R:deposit -> C:shares = (deposit * PRECISION) / rate -> W:shares"

  false_positive_indicators:
    - "Explicit rounding direction (divUp, divDown) based on context"
    - "Minimum deposit/withdrawal amounts enforced"
    - "High precision internal accounting (18+ decimals)"
    - "Share inflation protection (initial deposit mechanism)"
    - "Dust amount checks preventing micro-deposits"

# Attack Mechanism Details
attack_mechanism:
  preconditions:
    - "Lending protocol with share-based accounting"
    - "Integer division in share calculation"
    - "Ability to make small, precision-targeting deposits"
    - "No minimum deposit/withdrawal thresholds"

  attack_steps:
    - step: 1
      phase: "Identify Precision Boundary"
      description: |
        Analyze the share calculation to identify values where
        integer division produces maximum rounding error relative
        to the input value.
      operations:
        - "Study: shares = deposit / exchangeRate"
        - "Identify: values where division rounds to zero or near-zero"
        - "Calculate: optimal attack amounts"

    - step: 2
      phase: "Deposit at Precision Boundary"
      description: |
        Make deposits at amounts carefully chosen to minimize
        shares received while maximizing the rounding error.
      operations:
        - "Deposit: amount just below precision threshold"
        - "Receive: shares = floor(amount / rate) = 0 or minimal"
        - "Protocol holds: actual deposited value"

    - step: 3
      phase: "Exploit Exchange Rate"
      description: |
        Manipulate or wait for exchange rate changes that amplify
        the precision difference. When withdrawing, the rounding
        works in the attacker's favor.
      operations:
        - "Exchange rate shifts or is manipulated"
        - "Withdraw: amount = shares * new_rate"
        - "Rounding in withdrawal favors attacker"

    - step: 4
      phase: "Repeat and Extract"
      description: |
        Repeat the process to accumulate profits from rounding
        differences. Each cycle extracts small amounts that
        compound significantly.
      operations:
        - "Repeat deposit/withdraw cycles"
        - "Accumulate rounding profits"
        - "Total extracted: ~$9.57M"

  exploitation_difficulty: "medium"
  exploitation_notes: |
    The attack exploited fundamental properties of integer arithmetic:
    1. Division always rounds down in integer math
    2. Small deposits can result in zero shares
    3. Exchange rate changes amplify precision errors
    4. No minimum thresholds allowed precision-targeting attacks

    This is a common vulnerability class in lending protocols
    that use share-based accounting without proper safeguards.

