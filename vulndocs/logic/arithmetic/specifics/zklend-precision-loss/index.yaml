# Remediation Guidance
fixes:
  root_cause:
    description: |
      The root cause was direct integer division without precision
      protection. The safeMath library performed division that always
      rounded down, which attackers exploited by choosing inputs that
      maximized relative rounding error.

  recommended:
    - fix_id: "round-against-user"
      name: "Round Against User in Favor of Protocol"
      priority: critical
      description: |
        Always round in the direction that favors the protocol:
        - Deposits: round DOWN shares (user gets fewer shares)
        - Withdrawals: round DOWN amount (user gets less)
        This ensures protocol is never at a loss from rounding.
      code_pattern: |
        // VULNERABLE - Consistent rounding direction
        function deposit(uint amount) external {
            uint shares = amount / exchangeRate;  // Rounds down
            // ...
        }

        function withdraw(uint shares) external {
            uint amount = shares * exchangeRate;  // Can round up due to prior ops
            // ...
        }

        // SAFE - Round against user
        function deposit(uint amount) external {
            // Round DOWN - user gets fewer shares (protocol favored)
            uint shares = amount / exchangeRate;
            require(shares > 0, "Deposit too small");
            // ...
        }

        function withdraw(uint shares) external {
            // Round DOWN - user gets less (protocol favored)
            uint amount = (shares * exchangeRate) / PRECISION;
            // ...
        }
      effectiveness: "Very High - Eliminates profitable precision attacks"

    - fix_id: "minimum-amounts"
      name: "Enforce Minimum Deposit/Withdrawal Amounts"
      priority: critical
      description: |
        Set minimum thresholds that prevent precision-targeting attacks.
        The minimum should be large enough that rounding errors are
        negligible relative to the amount.
      code_pattern: |
        // SAFE - Minimum amount check
        uint constant MIN_DEPOSIT = 1e15;  // 0.001 tokens minimum

        function deposit(uint amount) external {
            require(amount >= MIN_DEPOSIT, "Below minimum deposit");
            uint shares = amount / exchangeRate;
            require(shares >= MIN_SHARES, "Shares too small");
            // ...
        }
      effectiveness: "High - Prevents micro-deposit attacks"

    - fix_id: "high-precision-internal"
      name: "Use High Precision Internal Accounting"
      priority: high
      description: |
        Perform calculations with high internal precision (e.g., 27 or 36
        decimals) and only convert to lower precision at boundaries.
      code_pattern: |
        // SAFE - High precision internal
        uint constant PRECISION = 1e27;

        function deposit(uint amount) external {
            // Scale up for precision
            uint scaledAmount = amount * PRECISION;
            uint shares = scaledAmount / exchangeRate;
            // shares stored with high precision internally
            // ...
        }
      effectiveness: "High - Reduces relative rounding error"

    - fix_id: "share-inflation-protection"
      name: "Implement Share Inflation Protection"
      priority: high
      description: |
        Use the first-depositor pattern where initial shares are minted
        in a way that prevents manipulation of the exchange rate.
      code_pattern: |
        // SAFE - First deposit protection (virtual shares)
        uint constant VIRTUAL_SHARES = 1e18;
        uint constant VIRTUAL_ASSETS = 1e18;

        function convertToShares(uint assets) public view returns (uint) {
            return (assets * (totalShares + VIRTUAL_SHARES)) /
                   (totalAssets + VIRTUAL_ASSETS);
        }
      effectiveness: "High - Prevents share inflation attacks"

