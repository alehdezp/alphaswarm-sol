# zkLend Decimal Precision Exploit - Specific Vulnerability
# Discovered via Task 17.3a: Solodit/Exploit DB Crawl (2024-2026)

id: zklend-precision-loss
name: zkLend Integer Precision Loss Exploit
parent_category: logic
parent_subcategory: arithmetic

description: |
  Integer precision vulnerability in zkLend (Starknet-based lending protocol)
  where the attacker exploited how the safeMath library handled division.
  Direct integer division rounds down, and the attacker manipulated decimal
  precision to extract value through rounding errors in deposit/withdrawal
  calculations.

  Key insight: Integer division in DeFi calculations can be exploited when
  the attacker controls the precision of input values, especially in
  lending protocols with decimal-sensitive share calculations.

severity: critical
exploit_severity: critical
confidence_score: 0.93

