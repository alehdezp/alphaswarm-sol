# Cetus Protocol SUI Overflow - Specific Exploit Instance
# Phase 17.0: Real-World Exploit Documentation
#
# This document details the $260M Cetus Protocol vulnerability on Sui,
# which exploited arithmetic overflow in liquidity calculations.
#
# Key Points:
#   - Date: May 22, 2025
#   - Loss: $260M in SUI tokens
#   - Chain: Sui (Move-based, but applies to Solidity)
#   - Root Cause: Unchecked arithmetic without bounds validation
#   - Pattern: Multiplication overflow in position size calculations

id: cetus-sui-overflow
name: Cetus Protocol SUI Overflow (May 2025)
parent_category: arithmetic
parent_subcategory: arithmetic

description: |
  On May 22, 2025, the Cetus Protocol on Sui suffered a critical arithmetic
  overflow vulnerability that resulted in approximately $260M in losses. The
  vulnerability occurred in liquidity position calculations where multiplication
  operations were performed without proper overflow checking or bounds validation.

  The attack exploited the gap between calculating user-provided input values
  and persisting them to critical state. An attacker could craft inputs that
  caused intermediate calculations to overflow, resulting in incorrect position
  sizes being written to state variables that control fund distribution.

  While the Cetus exploit occurred on Sui/Move, the underlying arithmetic pattern
  applies to Solidity contracts performing similar calculations on unprotected
  integer types.

severity: critical

# Real-world exploit reference
exploit_reference:
  id: cetus-sui-overflow-may-2025
  name: Cetus Protocol SUI Overflow
  date: "2025-05-22"
  loss_usd: "260000000"
  protocol: Cetus
  chain: sui
  description: |
    Attacker exploited unchecked multiplication in liquidity position calculation
    to cause integer overflow. By providing specially crafted input values, the
    attacker caused intermediate arithmetic results to wrap around, resulting in
    incorrect position sizes. These incorrect values were then written to critical
    state variables controlling fund distribution, enabling complete fund drainage.
  attack_steps:
    - "1. Analyze liquidity calculation contract for arithmetic operations"
    - "2. Identify multiplication without bounds checking on user input"
    - "3. Calculate input values that cause intermediate overflow"
    - "4. Submit transaction with crafted inputs"
    - "5. Overflow causes incorrect position size calculation"
    - "6. Incorrect position size written to critical state variable"
    - "7. Attacker positions drained via subsequent interactions"
  postmortem_url: "https://cetus-protocol.gitbook.io/cetus-docs/"
  cve_id: "CVE-TBD-2025-CETUS"
  vulnerability_class: "integer-overflow"

