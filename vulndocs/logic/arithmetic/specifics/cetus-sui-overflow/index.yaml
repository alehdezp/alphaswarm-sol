      - "R:input -> C:mul{no_bounds} -> W:balance"
      - "P:user_value -> C:mul -> C:div{skip_check} -> W:critical"
    safe:
      - "R:input -> C:validate_bounds -> C:mul -> W:state"
      - "R:input -> C:mul{checked} -> W:state"
      - "R:input -> C:validate_range -> C:mul -> W:balance"

  # Operation ordering that distinguishes vulnerable from safe
  operation_sequences:
    vulnerable:
      - "R:input -> C:mul -> W:critical_state"
      - "R:user_value -> C:mul -> C:div{partial} -> W:balance"
      - "P:untrusted_input -> C:arithmetic{unchecked} -> W:state"
    safe:
      - "R:input -> C:validate -> C:mul -> W:state"
      - "R:user_value -> C:validate_bounds -> C:mul -> W:balance"
      - "P:input -> C:bounds_check -> C:safe_mul -> W:state"

