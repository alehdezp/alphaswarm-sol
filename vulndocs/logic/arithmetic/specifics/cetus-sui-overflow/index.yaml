# Remediation guidance
remediation:
  # Immediate fixes
  recommended_fixes:
    - id: use-checked-arithmetic
      title: Use Checked Arithmetic
      description: |
        Switch to SafeMath library or upgrade to Solidity 0.8.0+ which has
        built-in overflow checks enabled by default. For multiplication with
        user input, use checked multiplication with explicit bounds validation.
      priority: critical
      code_pattern: |
        // VULNERABLE (Solidity 0.7.x)
        uint256 result = userInput * multiplier;

        // SAFE (SafeMath)
        uint256 result = userInput.mul(multiplier);

        // SAFE (Solidity 0.8.0+)
        uint256 result = userInput * multiplier;  // Checked by default

    - id: validate-input-bounds
      title: Validate Input Bounds Before Use
      description: |
        Always validate user input against protocol limits before using in
        arithmetic operations. Calculate maximum safe input values based on
        the arithmetic operation that will follow.
      priority: critical
      code_pattern: |
        // VULNERABLE
        function calculatePosition(uint256 amount) public {
            uint256 position = amount * pricePerUnit;
            positions[msg.sender] = position;
        }

        // SAFE
        function calculatePosition(uint256 amount) public {
            // Validate input is within safe bounds
            require(amount <= MAX_POSITION_SIZE, "Amount too large");
            require(amount > 0, "Amount must be positive");

            // Additional check: prevent overflow in multiplication
            require(amount <= type(uint256).max / pricePerUnit, "Overflow risk");

            uint256 position = amount * pricePerUnit;
            positions[msg.sender] = position;
        }

    - id: use-safe-math-library
      title: Implement Safe Math Library
      description: |
        Create or use a well-tested safe arithmetic library that provides
        overflow-checked operations with clear error messages.
      priority: high

    - id: add-invariant-checks
      title: Add Invariant Checks
      description: |
        After critical state updates, verify that protocol invariants still hold.
        For position calculations, verify total positions haven't exceeded supply.
      priority: high
      code_pattern: |
        function updatePosition(uint256 newSize) public {
            uint256 oldSize = positions[msg.sender];
            positions[msg.sender] = newSize;

            // Invariant: total positions must not exceed supply
            assert(getTotalPositions() <= totalSupply);
        }

    - id: implement-maximum-values
      title: Define and Enforce Maximum Values
      description: |
        Define constants for maximum allowed values for each critical state
        variable. Check against these maximums before state updates.
      priority: high
      code_pattern: |
        // Define maximum safe values
        uint256 constant MAX_POSITION_SIZE = 10**18;  // 1 SUI in smallest units
        uint256 constant MAX_MULTIPLIER = 10**9;

        function safeMultiply(uint256 a, uint256 b) internal pure returns (uint256) {
            require(a <= MAX_POSITION_SIZE, "Value A exceeds maximum");
            require(b <= MAX_MULTIPLIER, "Value B exceeds maximum");
            return a * b;
        }

  # Testing and validation strategies
  testing_guidance:
    - "Unit test: Multiply MAX_INPUT by MAX_MULTIPLIER, verify no overflow"
    - "Fuzz testing: Generate random input combinations, check for overflow"
    - "Invariant testing: Verify protocol totals stay within bounds after operations"
    - "Edge case testing: Test with (2^256-1), (2^256-1)/divisor, etc."
    - "Integration testing: Multi-step operations that might accumulate precision loss"

  # Effectiveness matrix
  effectiveness:
    - fix: SafeMath library
      effectiveness: "Very High (99%)"
      cost: "Low (library import)"
      implementation_time: "Hours"

    - fix: Input validation
      effectiveness: "Very High (95%+)"
      cost: "Low (bounds checks)"
      implementation_time: "Hours"

    - fix: Upgrade Solidity 0.8.0+
      effectiveness: "Very High (99%)"
      cost: "Medium (contract redeployment)"
      implementation_time: "Days"

    - fix: Invariant checks
      effectiveness: "High (85%)"
      cost: "Medium (logic additions)"
      implementation_time: "Days"

