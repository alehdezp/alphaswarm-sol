# Remediation Guidance
fixes:
  root_cause:
    description: |
      The root cause is the asymmetry between upscaling (mulDown only) and
      downscaling (both divUp and divDown variants). This allows precision loss
      during scaling when balances are at critical wei thresholds, which compounds
      when multiple operations are chained atomically.

  recommended:
    - fix_id: "use-consistent-rounding"
      name: "Ensure Consistent Rounding Direction in Scaling"
      priority: critical
      description: |
        Implement both mulDown and mulUp variants for upscaling to provide
        consistent rounding control. For critical invariant calculations,
        prefer rounding up (divUp, mulUp) to overestimate rather than
        underestimate the invariant.
      code_pattern: |
        // VULNERABLE
        amounts[i] = FixedPoint.mulDown(amounts[i], scalingFactors[i]);

        // SAFE - Use mulUp for invariant preservation
        amounts[i] = FixedPoint.mulUp(amounts[i], scalingFactors[i]);
      effectiveness: "Very High - Eliminates precision loss direction"

    - fix_id: "prevent-compounding"
      name: "Limit Atomic Operations Count"
      priority: critical
      description: |
        Implement a hard limit on the number of swap operations per batchSwap
        transaction. The Balancer exploit required 65+ operations to compound
        precision losses sufficiently. Limiting to < 10-20 ops per transaction
        dramatically reduces exploitation window.
      code_pattern: |
        // VULNERABLE - No limit on operation count
        function batchSwap(...) external {
            for (uint i = 0; i < swaps.length; i++) {
                _swap(swaps[i]);
            }
        }

        // SAFE - Enforce operation count limit
        function batchSwap(...) external {
            require(swaps.length <= 20, "Too many operations per batch");
            for (uint i = 0; i < swaps.length; i++) {
                _swap(swaps[i]);
            }
        }
      effectiveness: "High - Prevents compounding effect"

    - fix_id: "validate-invariant-stability"
      name: "Validate Invariant Stability After Operations"
      priority: high
      description: |
        Implement checks that verify the invariant (D) doesn't change dramatically
        between operations. A sudden drop in D indicates precision loss or
        manipulation. Flag or revert operations that cause > 0.5% invariant change.
      code_pattern: |
        // SAFE - Validate invariant before and after
        uint256 D_before = _calculateInvariant(balances);
        _performSwap(swap);
        uint256 D_after = _calculateInvariant(balances);

        // Check for dramatic changes indicating precision issues
        require(
            D_after >= D_before * 995 / 1000,  // Allow 0.5% deviation maximum
            "Invariant dropped unexpectedly - possible precision loss"
        );
      effectiveness: "High - Detects and prevents precision manipulation"

    - fix_id: "price-oracle-validation"
      name: "Validate BPT Price Against External Oracle"
      priority: high
      description: |
        Implement BPT price validation against an external price source (e.g.,
        previous block price, external oracle). Artificially suppressed BPT
        prices will deviate from expected ranges, allowing detection.
      code_pattern: |
        // SAFE - Validate BPT price reasonableness
        uint256 current_bpt_price = D / totalBPTSupply;
        uint256 expected_bpt_price = _getExternalPrice();

        require(
            current_bpt_price > expected_bpt_price * 99 / 100,  // Allow 1% variance max
            "BPT price artificially suppressed"
        );
      effectiveness: "High - Detects artificial price manipulation"

    - fix_id: "use-higher-precision"
      name: "Increase Precision for Invariant Calculations"
      priority: medium
      description: |
        Use higher-precision arithmetic for invariant calculations to reduce
        relative rounding error. For example, use 256-bit values or external
        decimal upscaling before division.
      code_pattern: |
        // VULNERABLE - Low precision enables high relative error
        uint256 invariant = (balance_A * balance_B) / constant;

        // SAFE - Higher precision with proper scaling
        uint256 scaled = (balance_A * 1e18) * (balance_B * 1e18);
        uint256 invariant = scaled / (constant * 1e18);
      effectiveness: "Medium - Reduces but doesn't eliminate rounding error"

    - fix_id: "implement-rate-limiting"
      name: "Implement Rate Limiting on Swap Patterns"
      priority: medium
      description: |
        Implement rate limits that throttle repeated swap patterns targeting
        specific balance boundaries. This prevents rapid compounding of
        precision losses in short timeframes.
      code_pattern: |
        // SAFE - Rate limit swap patterns
        mapping(address => uint256) lastSwapTime;
        mapping(address => uint256) swapCountInPeriod;

        function batchSwap(...) external {
            address msgSender = msg.sender;

            require(
                block.timestamp >= lastSwapTime[msgSender] + cooldownPeriod,
                "Swap rate limit - cooldown required"
            );

            // ... perform swaps ...

            lastSwapTime[msgSender] = block.timestamp;
        }
      effectiveness: "Medium - Provides time-based protection"

