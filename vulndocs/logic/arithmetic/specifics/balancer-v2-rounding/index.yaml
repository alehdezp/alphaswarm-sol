# Balancer V2 Rounding Exploit - Specific Vulnerability

id: balancer-v2-rounding
name: Balancer V2 ComposableStablePool Rounding Error
parent_category: logic
parent_subcategory: arithmetic

description: |
  Arithmetic precision loss in ComposableStablePool invariant calculations
  combined with atomic batch swap operations enables attackers to artificially
  suppress BPT pricing and extract value through repeated arbitrage cycles.

  The vulnerability affects the _upscaleArray function which performs integer
  division rounding down. When token balances reach critical wei thresholds
  (8-9 wei), relative precision loss can reach 10% per operation. Since BPT
  price is calculated as invariant D / totalSupply, underestimated D values
  directly lead to artificial price suppression.

  When 65+ micro-swaps are executed atomically within a single batchSwap,
  precision losses compound catastrophically, enabling multi-million dollar
  value extraction per pool.

severity: critical
exploit_severity: critical
confidence_score: 0.98

# Related VKG Properties for Detection
detection:
  graph_signals:
    - property: has_division
      expected: true
      critical: true
      description: "Invariant calculation performs integer division with rounding"
      confidence: 0.95

    - property: uses_scaling_factors
      expected: true
      critical: true
      description: "Token amounts scaled by decimal-related scaling factors"
      confidence: 0.92

    - property: reads_balance_state
      expected: true
      critical: true
      description: "Reads token balances for invariant computation"
      confidence: 0.95

    - property: modifies_critical_state
      expected: true
      critical: true
      description: "Updates pool reserves and state after swaps"
      confidence: 0.93

    - property: loops_over_array
      expected: true
      critical: false
      description: "Iterates over token balances in scaling/unscaling"
      confidence: 0.85

    - property: arithmetic_operations_on_balances
      expected: true
      critical: true
      description: "Performs multiplication and division on balance values"
      confidence: 0.94

    - property: has_external_call_to_vault
      expected: true
      critical: false
      description: "Calls or is called by Vault contract for batchSwap"
      confidence: 0.88

  semantic_operations:
    - READS_USER_BALANCE
    - PERFORMS_DIVISION
    - PERFORMS_MULTIPLICATION
    - MODIFIES_CRITICAL_STATE
    - LOOPS_OVER_ARRAY

  behavioral_signatures:
    # Vulnerable: precision loss due to rounding during balance scaling
    - vulnerable: "R:bal -> A:div -> A:mul -> M:crit"
      description: "Read balance, divide (rounding down), multiply, modify critical state"

    - vulnerable: "A:div R:bal A:div A:div L:arr M:crit"
      description: "Division operations with looped balance reads and state modification"

    # Safe: explicit precision checks and rounding prevention
    - safe: "R:bal -> V:in -> A:div -> A:mul -> M:crit"
      description: "Input validation before precision-affecting arithmetic"

    - safe: "R:bal -> (roundUp for D or ceilingDiv) -> A:mul -> M:crit"
      description: "Use of ceiling division or upRound for safety"

  operation_sequences:
    vulnerable:
      # Compounding precision loss pattern
      - "R:bal[i] -> A:div (rounding down) -> R:bal[i+1] -> A:div -> ... -> M:crit"
      - "L:arr(R:bal) -> A:div (divDown) -> A:mul (mulDown) -> M:crit"
      - "A:div -> REPEAT(65x in atomic tx) -> M:crit (D underestimated)"

    safe:
      # Precision-safe operations with rounding control
      - "R:bal[i] -> V:in(check thresholds) -> A:div(divUp or explicit round) -> A:mul -> M:crit"
      - "R:bal -> Validate(no critical wei boundaries) -> A:div -> A:mul -> M:crit"
      - "R:bal -> RecalculateD(high precision) -> Compare(before/after) -> M:crit"

  false_positive_indicators:
    - "Division operations on large, well-separated balance values (> 10^12 wei)"
    - "Scaling factors that compensate for rounding (mulUp paired with divDown)"
    - "Explicit rounding direction checks or safeguards before state modification"
    - "Invariant validation that detects and prevents dramatic changes (delta checks)"
    - "Usage of FixedPoint.divUp or explicit ceiling division for invariant calculation"
    - "Atomic operation count limited to prevent compounding (< 10 ops per tx)"
    - "Price oracle validation that detects artificially suppressed prices"
    - "Rate limiting or cooldown on repeated swap patterns"

# Attack Mechanism Details
attack_mechanism:
  preconditions:
    - "Access to batchSwap functionality within the Vault"
    - "Ability to execute multiple swap operations atomically (65+ ops in single tx)"
    - "Sufficient capital to execute adjustment swaps and mint BPT"
    - "Knowledge of exact balance thresholds triggering maximum rounding errors"
    - "ComposableStablePool deployment with vulnerable _upscaleArray implementation"
    - "Multiple pools across different chains or assets to maximize extraction"

  attack_steps:
    - step: 1
      phase: "Adjustment Phase"
      description: |
        Execute large BPT-to-token swaps to push one asset balance to the critical
        rounding boundary. Position the balance at a threshold where integer division
        rounding produces maximum relative error (8-9 wei threshold).
      operations:
        - "Large swap: BPT -> underlying token (e.g., cbETH)"
        - "Precision: Push target balance to near rounding boundary"
        - "Effect: Set up conditions for maximum rounding error"

    - step: 2
      phase: "Precision Loss Trigger (Compounding)"
      description: |
        Execute 65+ small swaps involving the boundary-positioned token within
        a single atomic batchSwap transaction. Each swap triggers _upscaleArray
        which rounds down, underestimating the invariant D. Losses compound
        within the atomic context since state isn't committed between ops.
      operations:
        - "Small swap: token A <-> token B (involving boundary-positioned token)"
        - "Effect: _upscaleArray divides and rounds down"
        - "Result: D (invariant) is underestimated by accumulated error"
        - "Repeat: 65+ times, errors compound catastrophically"

    - step: 3
      phase: "Value Extraction"
      description: |
        After precision loss has suppressed the invariant D, mint BPT at the
        artificially deflated price. Then redeem the BPT for underlying assets.
        Since the price is artificially low during minting, the attacker receives
        more shares than fair value. Redemption extracts the difference.
      operations:
        - "Mint BPT: Cost suppressed due to underestimated D"
        - "Redeem BPT: Receive underlying assets at full value"
        - "Profit: Difference between deflated mint and fair redeem prices"

    - step: 4
      phase: "Scale Attack"
      description: |
        Repeat the three-phase pattern across multiple ComposableStablePools
        on multiple chains (Ethereum, Base, Polygon, Arbitrum, etc.) within
        a coordinated timeframe to extract maximum value before detection.
      operations:
        - "Attack Pool 1 (Ethereum, $99M extracted)"
        - "Attack Pool 2 (Base, $15M extracted)"
        - "Attack Pool 3-6 (Other chains, remaining $14M)"
        - "Coordinate extraction within 30-minute window before circuit breakers"

  exploitation_difficulty: "high"
  exploitation_notes: |
    While the root cause (rounding in _upscaleArray) seems simple, exploitation
    required sophisticated understanding of:

    1. Exact wei-level balance thresholds triggering maximum rounding errors
    2. Curve's StableSwap invariant (D) calculation and its relationship to BPT pricing
    3. How to craft 65+ operations to compound precision loss atomically
    4. MEV/sandwich resistance strategies to prevent frontrunning
    5. Multi-chain coordination to maximize extraction before detection

    The attacker demonstrated advanced understanding of DeFi mathematics and
    institutional-grade execution capabilities.

