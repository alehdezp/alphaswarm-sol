# 1inch Yul Calldata Corruption Vulnerability
# March 2025 Exploit - Low-level Assembly Calldata Handling

id: 1inch-calldata-corruption
name: 1inch Yul Calldata Corruption
severity: critical
exploit_date: 2025-03-05
loss_usd: 5000000
affected_protocol: 1inch
affected_version: Fusion V1

# Vulnerability Category
category: logic
subcategory: configuration
classification: low-level-assembly-corruption

# Overview and Technical Summary
overview: |
  A critical vulnerability in 1inch Fusion V1's order settlement function (settleOrder)
  allowed attackers to corrupt calldata buffers through unsafe pointer arithmetic in Yul.

  The vulnerability existed in the order suffix processing logic where an attacker could
  provide a manipulated interactionLength parameter (0xffff...fe00 = -512 in unsigned arithmetic)
  that would cause integer underflow when calculating the suffix pointer position. This underflow
  enabled writing arbitrary data to unintended memory locations, specifically overwriting the
  resolver address with an attacker-controlled value.

  By redirecting the resolver to their own contract, attackers could execute arbitrary swap logic,
  effectively converting order routing into arbitrary fund extraction with the victim's contract
  unknowingly approving transactions.

technical_root_cause: |
  The vulnerability originates from unsafe pointer arithmetic in Yul/assembly code:

  1. UNSAFE CALCULATION: suffix_ptr = ptr + interactionOffset + interactionLength

  2. ATTACKER INPUT: interactionLength = 0xffffffffffffffff fe00 (effectively -512)

  3. INTEGER UNDERFLOW: When interactionLength is added to the base pointer, instead of
     increasing the pointer (as expected for positive lengths), the large unsigned value
     causes the pointer to wrap around and decrease, pointing to a different memory location.

  4. MEMORY CORRUPTION: The suffix data (containing resolver address) is written to the
     corrupted pointer location, overwriting the original resolver address.

  5. PRIVILEGE ESCALATION: The attacker's contract becomes the resolver, gaining control
     over order execution logic.

# Attack Vector Details
attack_mechanism:
  type: low-level-assembly-buffer-corruption
  trigger_function: _settleOrder
  vulnerable_code_path: suffix-offset-calculation

  attack_steps:
    - step: 1
      description: Attacker crafts malicious order with interactionLength = 0xffffffff fe00
      operation: VALIDATES_INPUT
      note: No validation on interactionLength bounds

    - step: 2
      description: settleOrder function processes the order
      operation: CALLS_EXTERNAL
      detail: Makes external call to process order suffix

    - step: 3
      description: Suffix pointer calculation underflows
      operation: MODIFIES_CRITICAL_STATE
      detail: suffix_ptr wraps around, points to resolver address location

    - step: 4
      description: Attacker-controlled resolver address written to memory
      operation: WRITES_USER_BALANCE
      note: While semantically writes to resolver, enables arbitrary token routing

    - step: 5
      description: Subsequent order processing uses corrupted resolver
      operation: CALLS_UNTRUSTED
      detail: Calls attacker's resolver contract with full order execution rights

    - step: 6
      description: Attacker's resolver performs unauthorized token swap
      operation: TRANSFERS_VALUE_OUT
      detail: Victim's approval is used to extract funds to attacker

# VKG Detection Signals
detection:
  graph_signals:
    - property: uses_assembly
      expected: true
      critical: true
      description: Code contains low-level assembly/Yul blocks (potential unsafe operations)
      confidence: 0.95

    - property: has_external_call
      expected: true
      critical: true
      description: Makes external calls to handle orders (resolver pattern)
      confidence: 0.90

    - property: writes_privileged_state
      expected: true
      critical: true
      description: Writes to critical fields like resolver address or order state
      confidence: 0.88

    - property: lacks_input_validation
      expected: true
      critical: true
      description: No bounds checking on length/offset parameters in assembly
      confidence: 0.92

    - property: performs_arithmetic_operations
      expected: true
      critical: true
      description: Unsafe pointer arithmetic (addition of user-controlled values)
      confidence: 0.90

    - property: reads_external_value
      expected: false
      critical: false
      description: May read resolver from state or calldata
      confidence: 0.75

    - property: calls_untrusted
      expected: true
      critical: true
      description: Calls to resolver addresses (may be corrupted)
      confidence: 0.87

  # Semantic operations present in vulnerable code
  semantic_operations:
    - VALIDATES_INPUT        # Insufficient validation of length parameters
    - PERFORMS_ARITHMETIC    # Unsafe pointer arithmetic
    - CALLS_EXTERNAL         # External call to resolver
    - CALLS_UNTRUSTED        # Call to potentially corrupted resolver address
    - MODIFIES_CRITICAL_STATE # Writes to resolver state
    - TRANSFERS_VALUE_OUT    # Token transfer via corrupted resolver
    - READS_EXTERNAL_VALUE   # Reading order data from calldata
    - WRITES_USER_BALANCE    # Modifying user token allocations

  # Behavioral signature of the vulnerability
  behavioral_signatures:
    - "V:in{incomplete} -> A:add -> W:crit"       # Incomplete validation, unsafe arithmetic, write critical state
    - "R:calldata -> A:ptr_arithmetic -> W:resolver" # Read calldata, calculate pointer, write resolver
    - "X:resolver{corrupted} -> X:unk -> W:bal"   # Call corrupted resolver, untrusted behavior, write balance

  # CRITICAL: No function names - only semantic operations and properties
  detection_note: |
    Detection MUST use semantic operations (VALIDATES_INPUT, PERFORMS_ARITHMETIC, etc.)
    and graph properties, never function names like "_settleOrder" or "_decodeOrderSuffix".

    The vulnerability pattern is language-agnostic:
    1. User-controlled length/offset parameters
    2. Unsafe arithmetic (add/mul without overflow checks)
    3. No bounds validation
    4. Used to calculate memory/calldata pointers
    5. Pointer used to read/write critical state

# Real-World Exploits
exploits:
  - id: 1inch-fusion-v1-2025-03
    date: 2025-03-05T18:00:00Z
    loss_usd: 5000000
    affected_addresses:
      - '0xCRIPTED1'  # Fusion V1 settlement contract
      - '0xCRIPTED2'  # Resolver registry
    transaction_hash: "0x1inch_exploit_tx_hash_march_2025"
    attacker_address: "0xAttackerAddress"
    recovery_status: "Funds returned after on-chain negotiation"
    recovery_amount: "~4.95M USDC + WETH equivalent"
    recovery_date: 2025-03-06T04:12:00Z

    attack_timeline:
      - timestamp: 2025-03-05T18:00:00Z
        event: Exploit executed
        loss: "$5M in USDC/WETH stolen"

      - timestamp: 2025-03-05T18:34:00Z
        event: Attacker sends on-chain message requesting bounty

      - timestamp: 2025-03-05T23:59:00Z
        event: Negotiations conclude successfully

      - timestamp: 2025-03-06T04:12:00Z
        event: Nearly all funds returned to 1inch
        recovery_amount: "~$4.95M"

    technical_details: |
      The exploit targeted Fusion V1, which had been deprecated since mid-2023 but remained
      active for backward compatibility. The attacker manipulated order suffix data by:

      1. Creating an order with interactionLength = 0xffffffff fe00 (-512 in signed arithmetic)
      2. This caused the suffix pointer calculation to underflow
      3. The resolver address field was overwritten with attacker's contract address
      4. When the order was processed, it called the attacker's resolver
      5. The attacker's resolver executed arbitrary token swaps using approvals from victims

      Primary victim was TrustedVolumes (a major market maker), which lost ~$4.5M when the
      attacker swapped 6 wei USDT for 1,000,000 USDC using their contract's approvals.

    lessons_learned: |
      - Deprecated code remains a significant attack surface
      - Low-level assembly code is particularly vulnerable to pointer/memory corruption
      - Integer underflow in pointer arithmetic can be exploited for memory writes
      - Yul/assembly should have explicit bounds checking on all arithmetic
      - Regular audits should revisit low-level code even if high-level logic is unchanged

# False Positive Indicators (code that is SAFE)
false_positive_indicators:
  - "All length/offset parameters are bounds-checked before arithmetic"
  - "Pointer arithmetic explicitly checks for overflow/underflow (add with overflow check)"
  - "Calldata offsets are relative to fixed base addresses, not user-controlled additions"
  - "Resolver address is read from immutable or initialized-once storage, not calldata"
  - "All external calls use verified whitelisted addresses, never calldata-derived addresses"
  - "Assembly blocks are minimal and only used for gas optimization, not data processing"
  - "Strong input validation on all user-controlled length/size parameters"
  - "Code uses high-level Solidity for critical logic, assembly only for gas optimization"
  - "Memory layout is documented and pointer arithmetic is audited for bounds"
  - "Calldata decoding uses battle-tested libraries (e.g., Uniswap's calldata utilities)"

# Remediation Guidance
fixes:
  recommended:
    - title: Validate Length Parameters
      severity: critical
      description: |
        Add explicit bounds checking on all user-controlled length and offset parameters
        BEFORE performing any arithmetic with them.
      code_pattern: |
        // VULNERABLE
        assembly {
          let suffix_ptr := add(add(ptr, interactionOffset), interactionLength)
          // interactionLength is user-controlled, no validation!
        }

        // SAFE
        assembly {
          // Validate length before use
          if gt(interactionLength, MAX_INTERACTION_LENGTH) {
            revert(0, 0)  // Revert if length exceeds bounds
          }
          let suffix_ptr := add(add(ptr, interactionOffset), interactionLength)
        }

    - title: Use Safe Math for Pointer Arithmetic
      severity: critical
      description: |
        Use checked arithmetic operations that explicitly revert on overflow/underflow
        for all pointer and offset calculations.
      code_pattern: |
        // SAFE: Use explicit checks
        assembly {
          // Check for overflow when adding offsets
          if lt(add(ptr, interactionOffset), ptr) {
            revert(0, 0)  // Overflow detected
          }
          if lt(add(add(ptr, interactionOffset), interactionLength),
                add(ptr, interactionOffset)) {
            revert(0, 0)  // Overflow detected
          }
        }

    - title: Isolate Resolver Address
      severity: critical
      description: |
        Store the resolver address in immutable storage or ensure it cannot be
        modified by calldata-based operations. Never calculate resolver address
        from untrusted input.
      implementation: |
        - Use immutable resolver addresses for critical operations
        - If resolver can be updated, require explicit governance/owner approval
        - Maintain a whitelist of valid resolvers
        - Never derive resolver address from calldata or user input

    - title: Add Explicit Memory Boundaries
      severity: high
      description: |
        Document and enforce memory boundaries for all calldata reading operations.
        Use explicit length checks to ensure reading within allocated regions.
      code_pattern: |
        assembly {
          // Define safe memory region
          let safe_calldata_region := 0x200  // Start of free memory
          let safe_region_end := add(calldata_size(), safe_calldata_region)

          // Verify pointer is within bounds before read/write
          if or(lt(ptr, safe_calldata_region), gt(ptr, safe_region_end)) {
            revert(0, 0)
          }
        }

    - title: Refactor to High-Level Solidity
      severity: medium
      description: |
        Migrate critical business logic from Yul/assembly to high-level Solidity
        where compiler optimizations and safety checks are enabled.
      rationale: |
        The Solidity compiler provides:
        - Automatic overflow/underflow detection (in 0.8.0+)
        - Memory safety through automatic bounds checking
        - Type safety for addresses and values
        - Better auditability and maintainability

        Reserve assembly only for gas optimization of non-critical paths.

