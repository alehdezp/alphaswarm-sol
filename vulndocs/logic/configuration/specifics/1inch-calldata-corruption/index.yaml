# Audit Trail
audit_history:
  - firm: Decurity
    date: 2022-10-01
    status: "Code was clean, no vulnerability reported"
    finding: |
      Initial audit completed. No vulnerable _settleOrder implementation existed at this time.

  - firm: Multiple (9 audit companies total)
    date: 2022-11-01
    status: "Vulnerability introduced in November 2022 refactoring"
    finding: |
      During major code refactoring where implementation was rewritten from Solidity to Yul,
      the unsafe pointer arithmetic was introduced. This was not flagged by initial audits.

  - firm: Decurity
    date: 2023-03-27
    status: "Internal flag raised"
    finding: |
      Internally flagged the _settleOrder code as vulnerable to integer overflow while
      assessing audit scope.

  - firm: Decurity & Others
    date: 2023-03-28
    status: "Investigation discontinued"
    finding: |
      New implementation was discovered that was completely rewritten again. The internal
      flag was not pursued further and not reported. The vulnerability remained undetected
      until March 2025 exploitation.

  - firm: None
    date: 2025-03-05
    status: "Exploit discovered in production"
    finding: "Vulnerability exploited for $5M loss before detection"

