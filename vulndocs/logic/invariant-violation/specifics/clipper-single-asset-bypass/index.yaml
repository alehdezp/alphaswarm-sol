# Remediation Guidance
fixes:
  root_cause:
    description: |
      The root cause was inconsistent validation between operation modes:
      1. Regular swaps had invariant validation
      2. Single-asset deposit/withdrawal (bundled swap) skipped these checks
      3. Off-chain signature validation didn't account for state changes

  recommended:
    - fix_id: "consistent-invariant-checks"
      name: "Apply Invariant Checks to All Operations"
      priority: critical
      description: |
        Ensure invariant validation (k-value, constant product) is applied
        consistently across ALL operation modes, including bundled operations.
      code_pattern: |
        // VULNERABLE - Skip checks on single-asset operations
        function singleAssetWithdraw(...) external {
            _executeSwap(...);
            _executeWithdraw(...);
            // No invariant check!
        }

        // SAFE - Consistent validation
        function singleAssetWithdraw(...) external {
            uint k_before = _calculateK();
            _executeSwap(...);
            _executeWithdraw(...);
            uint k_after = _calculateK();
            require(k_after >= k_before * 99 / 100, "K value violation");
        }
      effectiveness: "Very High - Prevents invariant bypass"

    - fix_id: "on-chain-state-validation"
      name: "Validate State at Execution Time"
      priority: critical
      description: |
        Signatures should include state commitments that are validated
        at execution time. Reject signatures if state has changed.
      code_pattern: |
        // VULNERABLE - Signature doesn't commit to state
        struct DepositSig {
            uint amount;
            uint deadline;
            bytes signature;
        }

        // SAFE - Signature commits to current state
        struct DepositSig {
            uint amount;
            uint deadline;
            uint expectedPoolState;  // Hash of pool balances at sig time
            bytes signature;
        }

        function deposit(DepositSig calldata sig) external {
            require(
                keccak256(abi.encode(poolBalances)) == sig.expectedPoolState,
                "Pool state changed since signature"
            );
            // ... proceed
        }
      effectiveness: "High - Prevents state manipulation between sig and execution"

    - fix_id: "atomic-operations"
      name: "Require Atomic Signature Use"
      priority: high
      description: |
        Signatures should be used atomically - no collecting multiple
        signatures across state changes.
      code_pattern: |
        // SAFE - Nonce-based signature freshness
        mapping(address => uint) public sigNonces;

        function validateSig(bytes calldata sig, uint nonce) internal {
            require(nonce == sigNonces[msg.sender]++, "Invalid nonce");
            // ... validate signature
        }
      effectiveness: "High - Prevents signature collection attacks"

    - fix_id: "minimum-liquidity-threshold"
      name: "Enforce Minimum Liquidity Threshold"
      priority: medium
      description: |
        Disable vulnerable features on low-liquidity pools where
        manipulation is easier.
      code_pattern: |
        // SAFE - Minimum liquidity check
        function singleAssetWithdraw(...) external {
            require(totalLiquidity >= MIN_LIQUIDITY, "Pool too small");
            // ... proceed
        }
      effectiveness: "Medium - Reduces attack surface on vulnerable pools"

