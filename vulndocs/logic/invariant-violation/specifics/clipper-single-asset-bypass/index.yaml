    - TRANSFERS_VALUE_OUT
    - VALIDATES_SIGNATURE

  behavioral_signatures:
    - vulnerable: "R:pool->X:swap->W:pool{!invariant_check}"
      description: "Read pool, perform swap, write pool without invariant validation"

    - vulnerable: "V:sig->R:pool->W:pool{skip_checks}"
      description: "Validate signature, read pool, write pool skipping standard checks"

  operation_sequences:
    vulnerable:
      - "REQUEST_DEPOSIT_SIG -> EXECUTE_SWAP -> REQUEST_WITHDRAW_SIG -> BUNDLE_EXECUTE"
      - "W:pool{single_asset} -> !V:k_value -> profit"

    safe:
      - "R:pool -> X:swap -> V:invariant -> W:pool"
      - "W:pool{any_mode} -> V:k_value{before_after} -> COMMIT"

  false_positive_indicators:
    - "Consistent invariant validation across all operation modes"
    - "k-value or constant-product check before and after operations"
    - "Rate limiting on operation frequency"
    - "On-chain validation matching off-chain logic"
    - "Circuit breakers for abnormal pool balance changes"

# Attack Mechanism Details
attack_mechanism:
  preconditions:
    - "Single-asset deposit/withdrawal feature enabled"
    - "Low-liquidity pools (low TVL, low k-value)"
    - "Ability to request signatures without immediate execution"
    - "Access to pools on Optimism and Base networks"

  attack_steps:
    - step: 1
      phase: "Signature Collection - Deposits"
      description: |
        Request multiple deposit signatures without executing them.
        These signatures are based on current pool state.
      operations:
        - "Request deposit signature for Pool A"
        - "Request deposit signature for Pool B"
        - "Store signatures for later use"

    - step: 2
      phase: "Pool State Manipulation"
      description: |
        Execute a swap with extra ETH to artificially inflate
        the value of pool tokens. Low-TVL pools are especially
        susceptible to manipulation.
      operations:
        - "Execute swap with extra ETH input"
        - "Pool token value increases due to ETH injection"
        - "Pool imbalance created"

    - step: 3
      phase: "Signature Collection - Withdrawals"
      description: |
        Request withdrawal signatures based on the NEW pool state
        (inflated values). These signatures expect larger returns.
      operations:
        - "Request withdrawal signature (based on inflated value)"
        - "Expected return > original deposit value"

    - step: 4
      phase: "Bundle and Execute"
      description: |
        Bundle the deposit (old signature) and withdrawal (new signature)
        into a single transaction. Deposit at old rates, withdraw at
        inflated rates.
      operations:
        - "Bundle: deposit(old_sig) + withdraw(new_sig)"
        - "Execute in single transaction"
        - "Deposit: X tokens at pre-manipulation rates"
        - "Withdraw: X+ tokens at post-manipulation rates"
        - "Profit: difference in token values"

    - step: 5
      phase: "Repeat Across Pools"
      description: |
        Repeat attack on multiple low-liquidity pools on Optimism
        and Base networks.
      operations:
        - "Attack Pool 1 (Optimism)"
        - "Attack Pool 2 (Base)"
        - "Total extracted: ~$457,878"

  exploitation_difficulty: "medium"
  exploitation_notes: |
    The attack exploited a gap between off-chain validation (API signatures)
    and on-chain validation (invariant checks). Key factors:

    1. Single-asset operations bundled swap + deposit/withdraw
    2. Standard swap protections not applied to bundled operations
    3. Low-liquidity pools amplified manipulation effects
    4. Signatures could be collected and used across state changes

    A recent database upgrade introduced an unexpected interaction with
    circuit-breaker logic, further weakening protections.

