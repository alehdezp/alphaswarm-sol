# Clipper DEX Single-Asset Withdrawal Invariant Bypass - Specific Vulnerability
# Discovered via Task 17.3a: Solodit/Exploit DB Crawl (2024-2026)

id: clipper-single-asset-bypass
name: Clipper DEX Single-Asset Withdrawal Invariant Bypass
parent_category: logic
parent_subcategory: invariant-violation

description: |
  Invariant bypass vulnerability in Clipper DEX where the single-asset deposit
  and withdrawal feature (which bundles a swap with deposit/withdrawal) did not
  implement the same invariant validation checks as regular swap operations.

  The attacker exploited this by:
  1. Requesting deposit signatures without executing
  2. Performing a swap to artificially inflate pool token value
  3. Requesting withdrawal signatures based on inflated value
  4. Bundling deposit + withdrawal in single transaction for profit

  Key insight: Combined operations (swap + deposit/withdrawal) bypassed
  validations designed for individual operations.

severity: high
exploit_severity: high
confidence_score: 0.94

