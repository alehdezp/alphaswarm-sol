# Euler V2 LTV Gap Vulnerability - Specific Vulnerability
# Discovered via Task 17.3a: Solodit/Exploit DB Crawl (2024-2026)

id: euler-ltv-gap
name: Euler V2 Missing LTV Gap Between Borrow and Liquidation
parent_category: logic
parent_subcategory: liquidation-mechanics

description: |
  Configuration vulnerability in Euler V2 (EVK) where no gap existed between
  the Loan-to-Value (LTV) ratio for borrowing and the liquidation threshold.
  This allowed users to borrow at the very edge of liquidation, making them
  vulnerable to immediate liquidation upon slight price changes.

  Attackers could exploit this by:
  1. Borrowing at maximum LTV (edge of liquidation)
  2. Front-running price oracle updates
  3. Liquidating their own position profitably
  4. Leaving bad debt for the protocol

  This was identified in an OpenZeppelin audit and resolved before deployment.

severity: high
exploit_severity: high
confidence_score: 0.92

# Related VKG Properties for Detection
