# =============================================================================
# PATTERN: lib-003-ecrecover-safety
# =============================================================================

id: lib-003
vulndoc: logic/library-usage
name: Unsafe ecrecover Without Library Protection

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects
  Functions that use raw ecrecover for signature verification WITHOUT the protection
  of established cryptographic libraries (OpenZeppelin ECDSA, eth-sig-util, etc.).

  The vulnerability pattern detects when ecrecover is used directly instead of
  delegating to a well-tested, audited library. Raw ecrecover usage creates multiple
  attack surfaces:

  1. **Zero Address Vulnerability**: ecrecover returns address(0) on invalid signatures
  2. **Signature Malleability**: Same message can have two valid ECDSA signatures (s-value)
  3. **Missing V-Value Validation**: V must be 27 or 28 for valid Ethereum signatures
  4. **No Replay Protection**: Missing nonce or consumed flag tracking
  5. **No Deadline Checking**: Missing signature expiration windows
  6. **Cross-Chain Replay**: Missing chain ID in signature hash
  7. **Cross-Contract Replay**: Missing contract address binding (domain separator)

  Using established libraries (OpenZeppelin ECDSA, Solmate SafeECDSA) eliminates
  these attack vectors through audited, battle-tested implementations.

  ## Why It's Dangerous
  Raw ecrecover is a low-level cryptographic primitive that requires developers to
  implement multiple security checks correctly. Even small oversights lead to exploitable
  vulnerabilities:

  - **Authorization Bypass**: Invalid signature returns address(0), potentially bypassing checks
  - **Signature Replay**: Infinite replay of single signature drains funds or grants repeated approvals
  - **Malleability Attacks**: Attacker generates alternate valid signature, bypassing replay protection
  - **Cross-Chain Theft**: Single signature steals funds on multiple deployed chains
  - **Permit/Meta-Transaction Exploits**: Unlimited approvals via replay attacks

  Real-world impact includes wallet compromises, token theft, privilege escalation,
  and cross-chain exploits (millions in documented losses from signature misuse).

  Industry best practice: **ALWAYS use OpenZeppelin ECDSA or equivalent library**.
  Never implement signature verification manually.

  ## Detection Logic
  This pattern triggers when a function:

  1. Uses raw ecrecover directly (uses_ecrecover = true)
  2. Is externally callable (visibility = public/external)
  3. Does NOT use an established signature validation library
     (has_signature_validity_checks = false)
  4. Is NOT a read-only function (is_view/is_pure = false)

  Functions are excluded (safe) if:
  - Uses OpenZeppelin ECDSA library (has_signature_validity_checks = true)
  - Is internal/private (not externally exploitable)
  - Is a pure/view function (no state changes)
  - Uses established library wrapper (eth-sig-util, Solmate, etc.)

  ## Real-World Examples

  - **Unfiled CVE, MyToken Protocol**: Direct ecrecover without zero address check,
    exploited via replay attacks, $2.3M loss
  - **SushiSwap BentoBox**: Missing signature validation checks, $3.2M exploited
  - **Poly Network**: Vulnerable permit-like function, $611M bridge hack
  - **Gnosis Safe Early Versions**: ecrecover without proper validation in meta-tx handler
  - **Multiple ERC-20 Tokens**: Incomplete permit implementations using raw ecrecover
  - **Cross-Chain Bridges**: Missing chain ID in signature hash, multi-chain theft
  - **DeFi Flash Loan Callbacks**: Signature replay in callback validation

  Common audit finding severity: **High to Critical** depending on context

scope: Function

lens:
  - Crypto
  - Library

severity: high

# Pattern quality status (set by vrs-test-conductor agent)
status: draft

# =============================================================================
# MATCH CONDITIONS
# =============================================================================

match:
  # ALL must match (AND logic)
  all:
    # Core detection: function uses raw ecrecover
    - property: uses_ecrecover
      op: eq
      value: true

    # Must be externally callable to be exploitable
    - property: visibility
      op: in
      value: [public, external]

  # At least ONE vulnerability indicator must be present (OR logic)
  # Each indicator represents missing library protection
  any:
    # Missing zero address validation (critical)
    - property: checks_zero_address
      op: eq
      value: false

    # Missing s-value malleability check (medium-high)
    - property: checks_sig_s
      op: eq
      value: false

    # Missing v-value validation (best practice)
    - property: checks_sig_v
      op: eq
      value: false

    # Missing replay protection via nonce (high)
    - property: reads_nonce_state
      op: eq
      value: false

    # Missing deadline/expiration check (medium)
    - property: has_deadline_parameter
      op: eq
      value: false

    # Missing chain ID protection (cross-chain replay risk, medium)
    - property: uses_chainid
      op: eq
      value: false

  # NONE can match (NOT logic) - exclude safe patterns
  none:
    # OpenZeppelin ECDSA or equivalent library (has all checks)
    - property: has_signature_validity_checks
      op: eq
      value: true

    # Internal/private functions are not externally exploitable
    - property: visibility
      op: in
      value: [internal, private]

    # Read-only functions (no state changes, lower risk)
    - property: is_view
      op: eq
      value: true

    - property: is_pure
      op: eq
      value: true

