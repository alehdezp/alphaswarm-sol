# =============================================================================
# PATTERN: lib-001-safe-erc20
# SafeERC20 Library Usage Detection (Semantic, Name-Agnostic)
# =============================================================================

id: lib-001
vulndoc: logic/library-usage
name: "Direct ERC20 Transfer Without SafeERC20"

description: |
  ## What This Detects

  Functions that call ERC20 transfer/approve operations DIRECTLY WITHOUT using
  the OpenZeppelin SafeERC20 library wrapper. This pattern detects the absence
  of a protective library that handles non-standard ERC20 token behaviors and
  return value discrepancies.

  **Semantic Detection**: This pattern detects what the function DOES:
  - Calls ERC20 transfer/approve/transferFrom directly (uses_erc20_transfer = true OR
    uses_erc20_transfer_from = true OR uses_erc20_approve = true)
  - Does NOT use SafeERC20 wrapper (uses_safe_erc20 = false)
  - Does NOT guard return values (token_return_guarded = false)
  - Is externally callable (visibility = public/external)

  This catches ANY ERC20 call without SafeERC20 protection, regardless of naming.

  ## Why It's Dangerous

  OpenZeppelin's SafeERC20 library is the industry standard for safe token handling
  because many real-world tokens deviate from the ERC20 specification:

  **Standard ERC20 Behavior**:
  - `transfer()` and `transferFrom()` return `bool` (success/failure)
  - `approve()` returns `bool`
  - Failed calls are expected to return `false` or revert

  **Non-Standard Token Behaviors** (affecting billions in TVL):
  1. **Return Value Omission** (USDT, BNB, OMG):
     - Functions return nothing (void) instead of bool
     - Contract code like `require(token.transfer(...))` reverts immediately
     - Cost: USDT integration problems across multiple protocols

  2. **False Success Returns** (Tether Gold):
     - Returns bool but always returns `false` even on success
     - Causes contracts to reject legitimate transfers
     - Cost: Protocol incompatibility with legitimate tokens

  3. **Revert Instead of False** (Some wrapped tokens):
     - Reverts transaction instead of returning bool false
     - Breaks contract logic expecting bool return
     - Cost: Service outages and funds stuck in contracts

  4. **No Return Validation in Contract**:
     - Contract doesn't check return value
     - Silent failures silently corrupt accounting
     - Cost: Uniswap V1 BNB stuck ($500K+), countless DeFi insolvencies

  **SafeERC20 Solves This By**:
  - Using low-level call() instead of direct interface calls
  - Wrapping return values to handle void/false cases uniformly
  - Reverting on any failure (fail-fast semantics)
  - Handling `approve()` race conditions with increase/decrease helpers

  ## Real-World Exploits

  - **Uniswap V1 (2018)**: BNB tokens permanently stuck due to non-standard returns
  - **Compound (2020)**: USDT integration attempted without SafeERC20
  - **MakerDAO**: USDT circulation limitations due to return value handling
  - **Aave**: Multiple integrations required SafeERC20 fixes
  - **Sherlock/Code4rena audits**: "safeTransfer not used" appears in 50+ reports

  ## Detection Logic

  This pattern triggers when ALL conditions are met:
  1. Function is externally callable (public/external)
  2. Function calls ERC20 transfer OR transferFrom OR approve directly
  3. Function does NOT use SafeERC20 wrapper (uses_safe_erc20 = false)
  4. Function does NOT guard return values (token_return_guarded = false)
  5. Function is NOT a view/pure function (no state mutation = no risk)

  **Implementation-Agnostic**: Detects any ERC20 call without SafeERC20:
  - Works with any function name (deposit, withdraw, transfer, swap, execute, etc.)
  - Works with any variable name (token, asset, underlying, erc20Token, etc.)
  - Works with any parameter name or token source

  **Safe Patterns Excluded**:
  - Uses safeTransfer/safeTransferFrom/safeApprove from SafeERC20
  - Explicitly checks return value: `require(token.transfer(...), "Failed")`
  - Has custom return guards wrapping low-level calls
  - View/pure functions (don't modify state, no exploitation)

scope: Function

lens:
  - ValueMovement
  - ExternalInfluence
  - TokenHandling

severity: high

status: draft

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic)
# =============================================================================

match:
  tier_a:
    # ALL must match (AND logic)
    all:
      # Must be externally callable
      - property: visibility
        op: in
        value: [public, external]

      # Must NOT use SafeERC20 - this is the core pattern
      - property: uses_safe_erc20
        op: eq
        value: false

      # Return value must not be guarded (no manual checks)
      - property: token_return_guarded
        op: eq
        value: false

    # At least ONE direct ERC20 call must be used (OR logic)
    any:
      # Uses ERC20 transfer() directly
      - property: uses_erc20_transfer
        op: eq
        value: true

      # Uses ERC20 transferFrom() directly
      - property: uses_erc20_transfer_from
        op: eq
        value: true

      # Uses ERC20 approve() directly
      - property: uses_erc20_approve
        op: eq
        value: true

    # NONE of these safe patterns can be present (NOT logic)
    none:
      # View/pure functions don't modify state
      - property: state_mutability
        op: in
        value: [view, pure]

      # Constructor doesn't need SafeERC20 (one-time execution)
      - property: is_constructor
        op: eq
        value: true

# =============================================================================
# SEMANTIC OPERATIONS & BEHAVIORAL SIGNATURES
# =============================================================================

semantic_ops:
  vulnerable_pattern:
    operations:
      - CALLS_EXTERNAL        # Makes external call to token
      - transfers_value_out   # Transfers value (ERC20)
      - no_guard_on_return    # No return value checking
    sequence: "X:token_transfer -> !check_return -> continues"

  safe_pattern:
    operations:
      - CALLS_EXTERNAL
      - USES_SAFE_WRAPPER     # SafeERC20 wrapper used
      - implicit_guard        # SafeERC20 reverts on failure
    sequence: "X:safe_transfer -> implicit_guard -> continues"

  alternative_safe_pattern:
    operations:
      - CALLS_EXTERNAL
      - CHECKS_RETURN_VALUE   # Manual return value check
      - explicit_guard        # Requires successful return
    sequence: "X:token_transfer -> check_return -> continue_or_revert"

behavioral_signatures:
  vulnerable:
    - "X:erc20(transfer) -> !check_return"
    - "X:erc20(transferFrom) -> !check_return"
    - "X:erc20(approve) -> !check_return"
    - "token.transfer(...) -> W:state (no guard)"
    - "IERC20(token).transferFrom(...) -> W:state (no guard)"

  safe:
    - "X:safe_transfer (inherent guard)"
    - "X:erc20(transfer) -> check_return -> require"
    - "token.transfer(...) -> R:return -> require(success)"
    - "safeTransferFrom(...) (implicit guard)"

