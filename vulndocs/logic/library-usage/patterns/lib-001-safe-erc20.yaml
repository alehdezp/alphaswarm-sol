    patterns) over absolute precision, as the cost of false positives (extra
    safety) is lower than false negatives (exposed to token vulnerabilities).

    Key semantic properties used:
    - uses_safe_erc20: Detects presence of SafeERC20 wrapper (semantic, not name-based)
    - uses_erc20_transfer/transferFrom/approve: Detects direct token calls
    - token_return_guarded: Detects presence of return value checks
    - visibility: Ensures only externally callable functions are flagged

    Edge cases to handle:
    1. Custom return guards that mimic SafeERC20 behavior
    2. Wrapped tokens that are type-safe at compile time
    3. Internal helper functions that DO guard, called by unguarded public function

