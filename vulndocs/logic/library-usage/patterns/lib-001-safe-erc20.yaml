attack_scenarios:
  - name: "Non-Standard Token Silent Failure"
    description: |
      Function calls ERC20 transfer on a non-standard token (USDT, BNB, OMG) that
      returns void instead of bool. Contract code expects bool return, causing
      unexpected revert or continuing execution with failed transfer.
    preconditions:
      - "Function calls token.transfer/transferFrom directly"
      - "Token used is non-standard (USDT, BNB, OMG, etc.)"
      - "Contract doesn't use SafeERC20 wrapper"
      - "Contract doesn't check return value"
      - "Function is externally callable"
    steps:
      - "User calls external function that transfers ERC20 token"
      - "Token parameter is USDT (non-standard, returns void)"
      - "Contract calls USDT.transfer(recipient, amount)"
      - "USDT returns void (no return value)"
      - "One of two bad outcomes:"
      - "  Option A: Contract code reverts due to bool cast failure"
      - "  Option B: Contract continues with no transfer executed (silently fails)"
      - "User's state updated (e.g., balance reduced) but transfer never occurred"
      - "Protocol accounting corrupted"
    impact: |
      User funds become inaccessible or accounting is corrupted. Protocol may
      become insolvent if widespread. Service may be unavailable for certain
      token types.
    cvss: 7.5

  - name: "Return Value False Rejection"
    description: |
      Token returns false on success (like Tether Gold), causing contract to
      reject legitimate transfers and users lose access to funds.
    preconditions:
      - "Token has non-standard return semantics (returns false on success)"
      - "Contract calls transfer without SafeERC20"
      - "Contract doesn't check return value"
    steps:
      - "User deposits Tether Gold token"
      - "Contract calls tg.transfer(recipient, amount)"
      - "Transfer succeeds on chain but returns false"
      - "Contract continues execution (no return check)"
      - "If contract DID check: require(tg.transfer(...)), it would revert incorrectly"
      - "User funds transferred but transaction reverted"
    impact: "Funds stuck in contract or permanently lost"
    cvss: 8.2

  - name: "Uniswap V1 BNB Stuck Funds"
    description: |
      Real-world example: Uniswap V1 didn't use SafeERC20 for BNB integration.
      BNB's non-standard returns caused tokens to be permanently stuck in contract.
    preconditions:
      - "Contract integrates BNB token"
      - "Uses direct transfer without SafeERC20"
      - "No return value checking"
    steps:
      - "Uniswap V1 calls BNB.transfer(...)"
      - "BNB returns void (non-standard)"
      - "Contract expects bool return, gets void"
      - "Unexpected behavior leads to tokens stuck"
      - "Millions in BNB permanently inaccessible"
    impact: "Massive fund loss ($500K+ in Uniswap V1 case)"
    cvss: 9.8

verification_steps:
  - "Confirm function is externally callable (public or external visibility)"
  - "Identify token transfer/approve calls (IERC20 interface calls)"
  - "Check if function imports/uses OpenZeppelin SafeERC20"
  - "Verify that uses_safe_erc20 property is false"
  - "Check if token return value is manually checked with require/assert"
  - "Verify that token_return_guarded property is false"
  - "Identify which tokens could be used with this function"
  - "Research if any tokens might have non-standard return values"
  - "If manual return checking exists, verify it's comprehensive"
  - "Confirm no custom wrapper library (non-OZ) provides equivalent protection"

fix_recommendations:
  - name: "Use OpenZeppelin SafeERC20"
    description: |
      Import OpenZeppelin's SafeERC20 library and use safeTransfer,
      safeTransferFrom, or safeApprove methods instead of direct calls.
      This is the industry standard solution.
    example: |
      // BEFORE (VULNERABLE)
      import "@openzeppelin/contracts/token/ERC20/IERC20.sol";

      contract VulnerableToken {
          function deposit(IERC20 token, uint256 amount) external {
              // VULNERABLE: Direct transfer, no SafeERC20 wrapper
              require(token.transfer(address(this), amount), "Transfer failed");
              // ^ This require() doesn't work with non-standard tokens!
              // USDT would revert here (returns void, not bool)
          }
      }

      // AFTER (FIXED - Recommended)
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";
      import "@openzeppelin/contracts/token/ERC20/IERC20.sol";

      contract SafeToken {
          using SafeERC20 for IERC20;

          function deposit(IERC20 token, uint256 amount) external {
              // SAFE: SafeERC20 handles all token variations
              // Works with USDT, BNB, OMG, and all other tokens
              // Reverts on any failure (fail-fast semantics)
              token.safeTransferFrom(msg.sender, address(this), amount);
          }
      }

  - name: "Use SafeERC20 for Approvals"
    description: |
      When approving tokens, use SafeERC20's safeApprove helper to handle
      race conditions where changing approval requires resetting to 0 first.
    example: |
      // BEFORE (VULNERABLE - also has race condition)
      contract VulnerableApprove {
          function approveSpender(IERC20 token, address spender, uint256 amount)
          external {
              // VULNERABLE: Direct approve, no SafeERC20
              // Also: Race condition if changing non-zero -> non-zero approval
              token.approve(spender, amount);
          }
      }

      // AFTER (FIXED)
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

      contract SafeApprove {
          using SafeERC20 for IERC20;

          function approveSpender(IERC20 token, address spender, uint256 amount)
          external {
              // SAFE: SafeERC20.safeApprove handles race conditions
              // Automatically resets to 0 if changing non-zero approval
              token.safeApprove(spender, amount);

              // Alternative: use increaseAllowance/decreaseAllowance
              token.safeIncreaseAllowance(spender, amount);
          }
      }

  - name: "Manual Return Value Checking (Alternative, Less Preferred)"
    description: |
      If SafeERC20 cannot be used, manually check return values with custom
      guards. This is error-prone and NOT recommended - use SafeERC20 instead.
    example: |
      // ALTERNATIVE (Less recommended than SafeERC20)
      import "@openzeppelin/contracts/token/ERC20/IERC20.sol";

      contract ManualGuardToken {
          function transferWithGuard(IERC20 token, address to, uint256 amount)
          internal returns (bool success) {
              // Manual return value checking
              // NOTE: This still fails for USDT (returns void, not bool)
              //       Use SafeERC20 instead!

              // Option 1: Try-catch on low-level call (handles void returns)
              (bool ok, bytes memory result) = address(token).call(
                  abi.encodeWithSelector(IERC20.transfer.selector, to, amount)
              );
              require(ok, "Transfer call failed");

              // Decode return value if present
              if (result.length > 0) {
                  success = abi.decode(result, (bool));
              } else {
                  // Token returns void (like USDT, BNB)
                  // Assume success if call didn't revert
                  success = true;
              }

              require(success, "Transfer returned false");
              return success;
          }

          // STILL BETTER: Just use SafeERC20 instead of this complexity!
      }

  - name: "Verify Token Compatibility Before Integration"
    description: |
      For each token you integrate, explicitly test with SafeERC20 and document
      compatibility. Some tokens may require custom handling beyond SafeERC20.
    example: |
      contract TokenIntegration {
          // Document which tokens are tested and supported
          // USDT: ✓ Tested with SafeERC20 - works
          // BNB: ✓ Tested with SafeERC20 - works
          // OMG: ✓ Tested with SafeERC20 - works
          // Tether Gold: ✓ Tested with SafeERC20 - works

          mapping(address => bool) public supportedTokens;

          function addSupportedToken(address token) external onlyOwner {
              // SAFE: Only whitelist tokens that have been tested
              supportedTokens[token] = true;
          }

          function deposit(address token, uint256 amount) external {
              // Ensure token is supported (tested for compatibility)
              require(supportedTokens[token], "Token not supported");

              IERC20(token).safeTransferFrom(msg.sender, address(this), amount);
          }
      }

  - name: "Use Low-Level Call with Proper Return Handling (Advanced)"
    description: |
      For advanced use cases, use low-level call() with proper return value
      decoding. Still requires SafeERC20 mindset for production code.
    example: |
      contract LowLevelTransfer {
          function safeTransferLowLevel(
              address token,
              address to,
              uint256 amount
          ) internal {
              // Low-level call approach (what SafeERC20 does internally)
              (bool ok, bytes memory data) = token.call(
                  abi.encodeWithSelector(IERC20.transfer.selector, to, amount)
              );

              // Handle both void and bool returns
              require(ok && (data.length == 0 || abi.decode(data, (bool))),
                  "Token transfer failed");
          }
      }

safe_implementations:
  - name: "OpenZeppelin SafeERC20 Deposit Pattern"
    severity: safe
    description: |
      Standard safe deposit function using OpenZeppelin SafeERC20.
      This is the production-proven pattern used across all major protocols.
    code: |
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";
      import "@openzeppelin/contracts/token/ERC20/IERC20.sol";

      contract SafeDepositPattern {
          using SafeERC20 for IERC20;

          event Deposited(address indexed user, address indexed token, uint256 amount);

          function deposit(address token, uint256 amount) external {
              // SAFE: Semantic: X:safe_transfer (SafeERC20)
              // Works with ALL tokens: USDT, BNB, OMG, standard ERC20, etc.
              IERC20(token).safeTransferFrom(msg.sender, address(this), amount);

              // Update accounting
              _recordDeposit(msg.sender, token, amount);

              emit Deposited(msg.sender, token, amount);
          }

          function _recordDeposit(address user, address token, uint256 amount) internal {
              // Record deposit for accounting
          }
      }
    semantic_signature: |
      X:safe_transfer (IERC20.safeTransferFrom)
      W:balance (update accounting)
    key_safety_features:
      - "Uses SafeERC20 for all ERC20 operations"
      - "Handles void/bool/false return values uniformly"
      - "Reverts on any failure (fail-fast)"
      - "Works with all token types"

  - name: "SafeERC20 with Approval Race Condition Fix"
    severity: safe
    description: |
      Safe pattern for approving tokens using SafeERC20's safeApprove
      which handles the race condition of changing approvals.
    code: |
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

      contract SafeApprovalPattern {
          using SafeERC20 for IERC20;

          function approveRouter(address router, address token, uint256 amount) external {
              // SAFE: SafeERC20.safeApprove handles race conditions
              // If changing non-zero approval, automatically resets to 0 first
              IERC20(token).safeApprove(router, amount);
          }

          function increaseRouterAllowance(
              address router,
              address token,
              uint256 addedValue
          ) external {
              // SAFE: safeIncreaseAllowance is atomic
              // More composable than safeApprove for multiple approvals
              IERC20(token).safeIncreaseAllowance(router, addedValue);
          }
      }
    semantic_signature: |
      X:safe_approve (IERC20.safeApprove)
      X:safe_increase_allowance
    key_safety_features:
      - "Handles approval race condition"
      - "Atomic increase/decrease operations"
      - "Works with all token types"

  - name: "SafeERC20 in Swap Pattern (DEX/AMM)"
    severity: safe
    description: |
      Safe swap implementation using SafeERC20 for both input and output tokens.
      Critical for any protocol that swaps tokens.
    code: |
      import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";
      import "@openzeppelin/contracts/token/ERC20/IERC20.sol";

      contract SafeSwapPattern {
          using SafeERC20 for IERC20;

          function swap(
              address tokenIn,
              address tokenOut,
              uint256 amountIn,
              uint256 minAmountOut
          ) external returns (uint256 amountOut) {
              // SAFE: Input token uses SafeERC20
              IERC20(tokenIn).safeTransferFrom(msg.sender, address(this), amountIn);

              // Execute swap logic (internal)
              amountOut = _executeSwap(tokenIn, tokenOut, amountIn);

              // Verify minimum output
              require(amountOut >= minAmountOut, "Insufficient output");

              // SAFE: Output token uses SafeERC20
              IERC20(tokenOut).safeTransfer(msg.sender, amountOut);

              return amountOut;
          }

          function _executeSwap(
              address tokenIn,
              address tokenOut,
              uint256 amount
          ) internal returns (uint256) {
              // Swap implementation (e.g., AMM, exchange)
              // ...
              return 0; // placeholder
          }
      }
    semantic_signature: |
      X:safe_transfer_from (input token)
      X:swap_logic
      X:safe_transfer (output token)
    key_safety_features:
      - "Both input and output use SafeERC20"
      - "Handles non-standard tokens"
      - "Minimum output validation prevents MEV"

