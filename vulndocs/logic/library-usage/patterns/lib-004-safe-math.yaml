attack_scenarios:
  - name: "Balance Overflow via Deposit"
    description: |
      Attacker exploits uint256 overflow to reduce their balance debt.
    preconditions:
      - "Function uses arithmetic without SafeMath (pre-0.8.0)"
      - "User balance tracking uses addition"
      - "Total supply or individual balance can exceed uint256.max"
    steps:
      - "Identify balance tracking function"
      - "Calculate overflow trigger: type(uint256).max - currentBalance + 1"
      - "Call function with deposit amount = overflow amount"
      - "User's balance wraps to near-zero due to overflow"
      - "Attacker can now withdraw entire pool balance"
    impact: "Complete pool drainage via balance wrap-around"

  - name: "Fee Calculation Precision Loss"
    description: |
      Fee calculation in unchecked block loses precision, allowing fee theft.
    preconditions:
      - "Fee calculation: amount * feeRate / denominator in unchecked block"
      - "Unchecked block disables overflow checks"
      - "Calculation order allows intermediate overflow"
    steps:
      - "Calculate fee: x * rate / divisor where rate > 1"
      - "Intermediate multiplication overflows in unchecked block"
      - "Result wraps to small number or zero"
      - "Attacker pays no fees or minimal fees"
    impact: "Fee theft or protocol revenue loss"

  - name: "Share Supply Inflation"
    description: |
      Vault share calculations overflow in unchecked block.
    preconditions:
      - "Share minting: totalShares + mint amount in unchecked block"
      - "Can trigger overflow with large deposit"
    steps:
      - "Large deposit triggers share calculation"
      - "totalShares + newShares > uint256.max in unchecked block"
      - "Result wraps to small number"
      - "Share supply becomes inaccurate"
    impact: "Unfair share distribution or insolvency"

  - name: "SmartMesh (SMT) Style Overflow"
    description: |
      Historical example: batchTransfer allowed unlimited token generation.
    preconditions:
      - "Function transfers tokens using addition without overflow checks"
      - "Pre-0.8.0 Solidity"
      - "Amount parameter user-controlled"
    steps:
      - "Call batchTransfer with amount = type(uint256).max / recipients.length"
      - "Loop iteration: totalAmount += amount wraps around"
      - "Tokens created from nothing"
    impact: "Unlimited token minting, protocol collapse"

verification_steps:
  - "Confirm Solidity version from pragma statement"
  - "If pre-0.8.0, check if SafeMath library is imported and used"
  - "If 0.8.0+, identify the unchecked block and what arithmetic it contains"
  - |
    Determine if unchecked arithmetic operates on:
    - User-provided values (input parameters)
    - Balance/share state variables
    - Supply/total tracking variables
  - "Check if the arithmetic can realistically overflow given contract constraints"
  - "Verify no external validation prevents overflow (require checks, limits)"

fix_recommendations:
  - name: "Add SafeMath Library (Pre-0.8.0)"
    description: |
      Use OpenZeppelin SafeMath library to wrap arithmetic operations.
      SafeMath.add(a, b) throws on overflow instead of wrapping.
    example: |
      // ❌ VULNERABLE (pre-0.8.0, no SafeMath)
      pragma solidity 0.7.6;

      function deposit(uint256 amount) external {
          balances[msg.sender] += amount;  // Overflow possible
          totalSupply += amount;
      }

      // ✅ SAFE (pre-0.8.0, with SafeMath)
      pragma solidity 0.7.6;
      import "@openzeppelin/contracts/math/SafeMath.sol";

      using SafeMath for uint256;

      function deposit(uint256 amount) external {
          balances[msg.sender] = balances[msg.sender].add(amount);  // Reverts on overflow
          totalSupply = totalSupply.add(amount);
      }

  - name: "Remove unchecked Block or Add Guards"
    description: |
      For Solidity 0.8.0+, either remove the unchecked block (use native overflow checks)
      or manually validate the arithmetic cannot overflow.
    example: |
      // ❌ VULNERABLE (0.8.0+, unchecked arithmetic with user input)
      pragma solidity 0.8.0;

      function deposit(uint256 amount) external {
          unchecked {
              balances[msg.sender] += amount;  // No checks in unchecked block
          }
      }

      // ✅ SAFE OPTION 1: Remove unchecked (use native checks)
      pragma solidity 0.8.0;

      function deposit(uint256 amount) external {
          balances[msg.sender] += amount;  // Native overflow check
      }

      // ✅ SAFE OPTION 2: Keep unchecked but add guards
      pragma solidity 0.8.0;

      function deposit(uint256 amount) external {
          require(amount > 0 && amount < type(uint256).max - balances[msg.sender]);
          unchecked {
              balances[msg.sender] += amount;  // Guarded by require above
          }
      }

  - name: "Use FixedPoint Libraries for Complex Math"
    description: |
      For operations involving division, percentages, or ratios in unchecked blocks,
      use battle-tested libraries like PRBMath or solmate.
    example: |
      // ❌ VULNERABLE (0.8.0+, fee calculation in unchecked)
      pragma solidity 0.8.0;

      function calculateFee(uint256 amount, uint256 rate) external view returns (uint256) {
          unchecked {
              return amount * rate / 10000;  // Precision loss, potential overflow
          }
      }

      // ✅ SAFE (using PRBMath)
      pragma solidity 0.8.0;
      import "prb-math/contracts/PRBMath.sol";

      function calculateFee(uint256 amount, uint256 rate) external view returns (uint256) {
          // PRBMath handles overflow safely
          return PRBMath.mulDiv(amount, rate, 10000);
      }

  - name: "Audit Large Number Arithmetic"
    description: |
      Pre-0.8.0 functions multiplying large numbers must use SafeMath.
      Identify: x * y where x > 10^9 and y > 10^9.
    example: |
      // ❌ VULNERABLE (pre-0.8.0, large number multiplication)
      pragma solidity 0.7.0;

      function calculateReward(uint256 rate, uint256 blocks) external pure returns (uint256) {
          return rate * blocks;  // Overflow if rate > 10^9 and blocks > 10^9
      }

      // ✅ SAFE (pre-0.8.0, with SafeMath)
      pragma solidity 0.7.0;
      import "@openzeppelin/contracts/math/SafeMath.sol";
      using SafeMath for uint256;

      function calculateReward(uint256 rate, uint256 blocks) external pure returns (uint256) {
          return rate.mul(blocks);  // SafeMath reverts on overflow
      }

