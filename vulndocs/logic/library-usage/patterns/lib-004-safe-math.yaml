# =============================================================================
# PATTERN: lib-004-safe-math
# SafeMath Library Usage / Checked Arithmetic Protection
# =============================================================================

id: lib-004-safe-math
vulndoc: logic/library-usage
name: "Unsafe Arithmetic Without SafeMath/Checks"

# Detailed description for LLM and auditor consumption
description: |
  ## What This Detects

  Functions performing arithmetic operations without proper overflow/underflow protection:

  1. **Solidity < 0.8.0**: Arithmetic operations WITHOUT SafeMath library protection
     - Integer overflow/underflow occurs silently (wraps around)
     - Example: 2^256 + 1 = 1 (overflow without SafeMath protection)

  2. **Solidity >= 0.8.0**: Arithmetic in `unchecked` blocks without explicit guards
     - Native overflow checks are disabled in unchecked context
     - Must rely on application-level safeguards

  **Semantic Detection**: This pattern detects WHAT the function DOES:
  - Performs arithmetic (addition, multiplication, division, subtraction)
  - Either: compiler < 0.8.0 WITHOUT SafeMath, OR in unchecked block >= 0.8.0
  - Operates on sensitive values (user balances, token amounts, shares)

  This catches ANY arithmetic operation regardless of variable naming or context.

  ## Why It's Dangerous

  Integer overflow/underflow is a classic vulnerability class that has caused
  billions in losses across DeFi:

  **Pre-0.8.0 Arithmetic (Silent Overflow)**:
  - uint256(type(uint256).max) + 1 = 0 (wraps silently)
  - Balances become negative without errors
  - Users can drain entire pools by exploiting wrap-around

  **Unchecked Blocks (Disabled Checks)**:
  - In Solidity 0.8+, arithmetic reverts on overflow by default
  - `unchecked { ... }` disables these checks for performance
  - Must manually validate results or use SafeMath-like logic

  **Real-World Impact**:
  - **BeautyChain (BEC)**: $900M+ destroyed by overflow (2018)
  - **SmartMesh (SMT)**: $350M+ destroyed by overflow (2018)
  - **Balancer Labs**: Multiple millions in flash loan overflow attacks
  - **Synthetix**: snx overflow allowing unlimited token minting

  **Attack Scenarios**:
  1. Balance overflow: User balance + deposit > type(uint256).max → wraps to small number
  2. Share calculation: sqrt(x * y) in unchecked block without bounds validation
  3. Fee calculation: amount * rate / divisor with precision loss undetected
  4. Supply inflation: totalSupply + mint > max with no validation

  ## Detection Logic

  This pattern triggers when ANY of these scenarios occur:

  **Scenario A: Pre-0.8.0 Arithmetic Without SafeMath**
  - Compiler version < 0.8.0 (detected from pragma)
  - Has arithmetic operations (*, /, +, -)
  - Does NOT use SafeMath library
  - Operates on financial/state values

  **Scenario B: 0.8.0+ Unchecked Arithmetic**
  - Solidity version >= 0.8.0
  - Has unchecked block containing arithmetic
  - Either:
    - Unchecked arithmetic uses user input, OR
    - Unchecked arithmetic affects balance/share state

  **Scenario C: Large Number Multiplication Without SafeMath**
  - Multiplication of large numbers (> 10^9)
  - No SafeMath or muldiv library usage
  - Pre-0.8.0 compiler

  **Safe Patterns (EXCLUDED)**:
  - Functions using OpenZeppelin SafeMath library
  - Functions using SafeERC20 for token operations
  - Solidity 0.8.0+ with checks OUTSIDE unchecked block
  - Constant/view functions (no state changes)
  - Small arithmetic that cannot overflow (constants, < 2^128)

scope: Function

lens:
  - Arithmetic
  - ValueMovement

severity: high

status: draft

# =============================================================================
# MATCH CONDITIONS (Tier A - Deterministic, Multiple Scenarios)
# =============================================================================

match:
  tier_a:
    # Use 'any' to match MULTIPLE vulnerability scenarios
    # Each scenario is independent - one match = one finding
    any:
      # SCENARIO A: Pre-0.8.0 arithmetic without SafeMath
      - all:
          # Pre-0.8.0 compiler
          - property: compiler_version_lt_08
            op: eq
            value: true

          # Has arithmetic operations
          - property: has_arithmetic
            op: eq
            value: true

          # Core vulnerability: No SafeMath protection
          - property: pre_08_arithmetic
            op: eq
            value: true

      # SCENARIO B: 0.8.0+ unchecked arithmetic with risky patterns
      - all:
          # Solidity 0.8.0 or later (NOT pre-0.8)
          - property: compiler_version_lt_08
            op: eq
            value: false

          # Uses unchecked block
          - property: has_unchecked_block
            op: eq
            value: true

          # Unchecked block contains arithmetic
          - property: unchecked_contains_arithmetic
            op: eq
            value: true

          # Either uses user input or affects balance state
          - any:
              - property: unchecked_operand_from_user
                op: eq
                value: true

              - property: unchecked_affects_balance
                op: eq
                value: true

      # SCENARIO C: Large number multiplication overflow risk
      - all:
          # Pre-0.8.0 (0.8.0+ doesn't have this risk by default)
          - property: compiler_version_lt_08
            op: eq
            value: true

          # Large numbers being multiplied
          - property: large_number_multiplication
            op: eq
            value: true

          # No SafeMath or muldiv protection
          - property: multiplication_overflow_risk
            op: eq
            value: true

    # CRITICAL FOR FALSE POSITIVE REDUCTION: Safe patterns to exclude
    none:
      # Not applicable to view/pure functions (no state changes)
      - property: state_mutability
        op: in
        value: [view, pure]

      # Using SafeMath protection
      - property: uses_safemath
        op: eq
        value: true

      # Using SafeERC20 for token operations
      - property: uses_safe_erc20
        op: eq
        value: true

      # Constructor/initializer (often intentional setup code)
      - property: is_constructor
        op: eq
        value: true

      # Fallback/receive functions (limited arithmetic)
      - property: is_fallback
        op: eq
        value: true

      - property: is_receive
        op: eq
        value: true

