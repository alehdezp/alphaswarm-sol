# =============================================================================
# IMPLEMENTATION NOTES
# =============================================================================

implementation_notes: |
  ## Property Dependencies

  This pattern relies on VKG builder detecting:

  1. **compiler_version_lt_08**: Boolean flag set if pragma < 0.8.0
  2. **pre_08_arithmetic**: = (compiler_version_lt_08 AND has_arithmetic AND NOT uses_safemath)
  3. **has_unchecked_block**: Detects `unchecked { ... }` blocks
  4. **unchecked_contains_arithmetic**: Arithmetic operations inside unchecked
  5. **unchecked_operand_from_user**: Arithmetic uses function parameters
  6. **unchecked_affects_balance**: Arithmetic modifies balance/share state
  7. **large_number_multiplication**: Detects x*y where x,y > 10^9
  8. **multiplication_overflow_risk**: = (large_number_multiplication AND NOT uses_safemath)
  9. **uses_safemath**: Detects SafeMath import/usage
  10. **uses_safe_erc20**: Detects OpenZeppelin SafeERC20 usage

  ## Pattern Scenarios

  This pattern uses a disjunctive (OR) matching strategy:
  - Scenario A catches pre-0.8.0 without SafeMath
  - Scenario B catches 0.8.0+ unchecked with risky operations
  - Scenario C catches large multiplication overflow risk

  Any single scenario matching triggers a finding. This allows:
  - Fine-grained findings for different vulnerability types
  - Clear explanation of which scenario was detected
  - Different remediation paths per scenario

  ## False Positive Mitigation

  The 'none' section excludes:
  - View/pure functions (no actual state change risk)
  - Functions already using SafeMath/SafeERC20
  - Constructors (arithmetic during initialization is lower risk)
  - Fallback/receive (limited arithmetic capability)

  This should achieve ~85%+ precision while catching real vulnerabilities.

