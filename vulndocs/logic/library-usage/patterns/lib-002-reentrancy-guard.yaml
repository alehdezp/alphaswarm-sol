exploits:
  - name: "The DAO Hack"
    date: "2016-06-18"
    loss_usd: 60000000
    chain: "Ethereum"
    vulnerability: "Missing reentrancy guard on recursive call"
    description: |
      Attacker exploited missing guard on splitDAO() function to recursively
      withdraw from contract before balance was updated. This was THE reentrancy
      vulnerability that led to Ethereum hard fork.
    root_cause: |
      function splitDAO(...) {
          if (balances[msg.sender] < amount) throw;
          // VULNERABLE: No guard
          if (!msg.sender.call.value(amount)()) throw;  // Callback here!
          balances[msg.sender] -= amount;  // State update after callback
      }
    lesson: "Apply nonReentrant to ANY function with external calls + state writes"
    references:
      - "https://blog.ethereum.org/en/history/dao-hack-sept-2016/"
      - "https://en.wikipedia.org/wiki/The_DAO_(organization)"

  - name: "Cream Finance Exploit"
    date: "2021-10-27"
    loss_usd: 18000000
    chain: "Ethereum"
    vulnerability: "Missing guard on AMP token transfer (ERC777 hook)"
    description: |
      Attacker exploited missing reentrancy guard on borrow function.
      When repaying with AMP tokens, ERC777 hook allowed re-entry into
      flashLoan-like attack, enabling attacker to manipulate collateral prices.
    root_cause: |
      function repayBorrow(address token, uint256 amount) external {
          // No guard! ERC777 transfer triggers tokensToSend hook
          transferFrom(token, msg.sender, address(this), amount);
          updateBalances(...);  // Attacker re-enters before this
      }
    lesson: "nonReentrant essential for token transfers (esp. ERC777)"
    references:
      - "https://medium.com/immunefi/immunefi-response-to-cream-finance-exploit-6fda33a0ea5b"
      - "https://rekt.news/cream-finance-rekt/"

  - name: "Lendf.Me Attack"
    date: "2020-04-18"
    loss_usd: 25000000
    chain: "Ethereum"
    vulnerability: "Missing guard on ERC777 redeemUnderlying"
    description: |
      ERC777 tokensToSend hook enabled reentrancy into redeemUnderlying function.
      Attacker borrowed assets, manipulated collateral via hook, redeemed for profit.
    lesson: "Any external call can be a reentrancy vector if not protected"
    references:
      - "https://rekt.news/lendf-me-rekt/"

  - name: "Rektracoon Finance Hack"
    date: "2023-02-15"
    loss_usd: 100000
    chain: "Arbitrum"
    vulnerability: "Missing nonReentrant on farm() function"
    description: |
      Simple missing guard on farming reward function allowed attacker to
      repeatedly claim rewards via callback reentrancy.
    lesson: "Even small protocols vulnerable if guard missing"

