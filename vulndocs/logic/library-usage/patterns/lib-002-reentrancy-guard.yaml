related_patterns:
  - pattern_id: vm-001-classic
    linkage_type: sibling
    description: |
      Detects CEI violations (ordering of external calls vs state writes).
      lib-002 checks for LIBRARY PROTECTION (nonReentrant).
      vm-001 checks for ORDERING PROTECTION (CEI pattern).
      Both should be satisfied: apply nonReentrant AND follow CEI ordering.

  - pattern_id: reentrancy-002-gmx-cross-function
    linkage_type: sibling
    description: |
      Detects cross-function reentrancy where callbacks re-enter DIFFERENT functions.
      lib-002 focuses on single-function protection via nonReentrant.
      reentrancy-002 addresses multi-function scenarios with shared state.

  - pattern_id: token-002-erc777-reentrancy
    linkage_type: related
    description: |
      ERC777 token hooks enable reentrancy during token transfers.
      lib-002 detects missing guard protection.
      token-002 specifically addresses ERC777 hook vulnerabilities.

  - pattern_id: external-002-unprotected-delegatecall
    linkage_type: related
    description: |
      Delegatecall without guard can also enable reentrancy.
      lib-002 covers call() and value transfers.
      external-002 covers delegatecall() vulnerabilities.

