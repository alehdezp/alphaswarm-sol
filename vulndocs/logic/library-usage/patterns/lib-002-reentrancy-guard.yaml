# Implementation note for builders and tools
implementation_notes: |
  This pattern targets functions that:
  1. Are externally accessible (public/external)
  2. Call external contracts or transfer value
  3. Modify contract state
  4. Lack the nonReentrant modifier from ReentrancyGuard

  The pattern is semantic: it doesn't match on function/variable names,
  but on the presence/absence of the nonReentrant modifier and the semantic
  properties of having external calls + state writes.

  Configuration for different strictness levels:

  STRICT: Report any external call + state write without guard
  (Current setting: STRICT - most safe)

  MODERATE: Only report if call order indicates CEI violation
  (Requires integration with vm-001-classic pattern logic)

  LENIENT: Only report for high-risk functions like withdraw/transfer
  (Would lose generality - not recommended)
