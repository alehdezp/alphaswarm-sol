# Delegate Guard Configuration
# Config-driven delegation enforcement (P15-IMP-22)
#
# blocked_tools: Tool names that are blocked entirely (unless in allowed_reads)
# blocked_patterns: String patterns in tool_input that trigger blocking
# allowed_reads: Path patterns that override blocking (exceptions)

blocked_tools:
  - Read
  - Write

blocked_patterns:
  - ".sol"

allowed_reads:
  - ".vrs/"
  - ".planning/"
