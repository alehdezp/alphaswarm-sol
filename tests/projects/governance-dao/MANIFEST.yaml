notes: |
  Governance scenarios for testing:
  - Proposal creation and execution
  - Voting mechanisms (castVote, castVoteBySig)
  - Timelock operations (queue, execute, cancel)
  - Multi-sig patterns (addSigner, removeSigner, setThreshold)
  - Role management (grantRole, revokeRole)
  - Emergency operations (emergencyWithdraw, pause)

  Recommended test contract structure:
  - Governor.sol: Main governance with proposals and voting
  - GovernorSafe.sol: Properly protected governance
  - Timelock.sol: Timelock controller patterns
  - MultiSig.sol: Multi-signature wallet patterns
  - RoleManager.sol: RBAC patterns
