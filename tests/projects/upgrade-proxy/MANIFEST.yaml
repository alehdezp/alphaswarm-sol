project: upgrade-proxy
description: |
  Proxy and upgrade test scenarios for ordering/upgradability patterns.
  Contains transparent proxy, UUPS, storage collision, and initializer patterns.
max_files: 30
current_files: 7  # ReinitializerTest, InitializerTest, StorageGapTest, UnprotectedUpgradeTest, DelegatecallTest, ConstructorInImplementationTest, SelfdestructInImplementationTest

patterns:
  upgrade-004:
    files: [ReinitializerTest.sol]
    functions:
      vulnerable:
        - reinitialize(uint256)
        - reInitialize(uint256)
        - initializeV2(uint256,address)
        - initializePhase2(address)
        - reinitializeV3(address,uint256)
        - initializeGovernanceV2(address,uint256)
        - reinitializeAfterUpgrade(address)
        - executeReinitialize()
        - reinitializeWrongOrder(uint256)
        - emergencyReinitialize(uint256)
        - initializeFacetV2(uint256)
        - initializeV2Transparent(uint256)
        - initializeV2UUPS(uint256)
        - initializeV2Beacon(uint256)
      safe:
        - reinitialize(uint256) [with reinitializer modifier]
        - initializeV2(uint256) [with onlyInitializing modifier]
        - reinitializeCorrectOrder(uint256) [with version check]
        - emergencyReinitializeSafe(uint256)
        - initializeFacetV2Safe(uint256)
      false_negatives:
        - reinit(address)  # Too short for is_initializer_function
        - initV2(address,uint256)  # Abbreviated version
        - setupNewFeature(uint256)  # Alternative naming
        - setupV2(address)  # Alternative naming
        - configure(uint256)  # Semantic equivalent
        - setup(uint256)  # Semantic equivalent
        - config(uint256)  # Semantic equivalent
        - reset(uint256)  # Semantic equivalent
        - upgradeToAndInit(address,uint256)  # Upgrade pattern
      false_positives:
        - initialize(uint256) [in NonUpgradeableContract]  # contract_is_upgradeable wrong
        - reinitializeCorrectOrder(uint256)  # checks_initialized_flag missed require
    last_updated: "2025-12-31"

notes: |
  Upgrade scenarios for testing:
  - Transparent proxy patterns
  - UUPS upgrade patterns
  - Storage collision detection
  - Unprotected initializers
  - Implementation contract vulnerabilities
  - Diamond/multi-facet proxies

  Test coverage for upgrade-004:
  - 17 detected functions (15 TP, 2 FP)
  - 9 false negatives (is_initializer_function too restrictive)
  - 2 false positives (builder property issues)
  - Status: READY (precision 78.95%, recall 62.50%)

  upgrade-005:
    files: [InitializerTest.sol]
    functions:
      vulnerable:
        - initialize(address,uint256)  # VulnerableClassic
        - init(address)  # VulnerableInit
        - setup(address,uint256)  # VulnerableSetup
        - __init__(address)  # VulnerablePythonStyle
        - initializeContract(address,address,uint256)  # VulnerableComplex
        - setUp(address)  # VulnerableSetUp
        - initializeOwnable(address)  # VulnerableInitializeOwnable
        - initContract(address,bytes)  # VulnerableInitContract
        - initialize(address) [VulnerableUUPS]
        - initialize(address,address) [VulnerableBeacon]
      safe:
        - initialize(address) [with initializerModifier]
        - init(address) [with onlyInitializing]
        - setup(address) [with manual flag check]
        - initialize(address) [NonUpgradeableContract - not a proxy]
        - _initialize(address) [internal helper]
      edge_cases:
        - initializePhase1(address)  # Two-step initialization
        - initializePhase2(uint256)  # Second phase with access control
        - initialize(address) [called from constructor]
        - initialize(address,uint256) [version tracking without protection]
        - __Parent_init(address)  # Chained initializers
        - initializeFacet(address)  # Diamond proxy facet
        - initialize(address) [complex access control]
      detected:
        - initialize(address) [EdgeProxyImplementation] - TP
        - initialize(address) [VariationTransparentProxy] - TP
        - initialize(address) [VariationUUPSProxy] - TP
        - initialize(address,address) [VariationBeaconProxy] - TP
        - initialize(address) [NonUpgradeableContract] - FP
      missed_false_negatives:
        - init(address)  # Not detected - naming
        - setup(address,uint256)  # Not detected - naming
        - setUp(address)  # Not detected - naming
        - __init__(address)  # Not detected - naming
        - initializeContract(...)  # Not detected - naming
        - initializeOwnable(address)  # Not detected - naming
        - initContract(address,bytes)  # Not detected - naming
        - initializePhase1(address)  # Not detected - naming
        - initializeFacet(address)  # Not detected - naming
        - ... and 21 more naming variations
    last_updated: "2025-12-31"

  Builder improvements needed:
  1. CRITICAL: Expand is_initializer_function to include: init, setup, setUp, __init__, initializeX, initX, etc.
  2. HIGH: Fix contract_is_upgradeable to distinguish proxy usage from Initializable inheritance
  3. MEDIUM: Merge upgrade-004 and upgrade-005 (80% overlap, cannot distinguish first-time vs re-init)

