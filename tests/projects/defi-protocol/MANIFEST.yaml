project: defi-protocol
description: Comprehensive DeFi infrastructure parameter testing (circuit breakers, governance, tokenomics, bridges, risk params, emergency, merkle, oracle, treasury)
max_files: 30
current_files: 1

# Patterns tested in this project
patterns:
