# Project statistics
statistics:
  total_vulnerable_functions: 54
  total_safe_functions: 27
  total_variation_functions: 18
  coverage: "9 critical DeFi infrastructure patterns"

# Notes for maintainers
notes: |
  This project provides comprehensive testing for 9 structurally similar patterns that all
  detect unprotected writes to critical protocol parameters. All patterns use the same core
  detection logic:

  - writes_privileged_state OR writes_sensitive_config
  - has_access_gate: false
  - visibility: [public, external]

  The patterns differ primarily in the CATEGORY of state variables they target:
  - circuit-001: pause/paused/emergencyStop state
  - governance-001: governance-tagged state (quorum, voting, threshold, delay)
  - tokenomics-001: reward/emission/vesting state
  - bridge-001: dependency state (relayer, endpoint, validator) + cross-chain context
  - defi-001: fee/collateral/debt/liquidity/reserve state
  - emergency-001: can_affect_user_funds (value transfer operations)
  - merkle-001: config state (merkle roots)
  - oracle-002: oracle/price feed state
  - treasury-001: treasury/fee recipient state

  All patterns should achieve similar precision/recall metrics since they rely on the
  same underlying builder heuristics for state variable tagging.

  Expected metrics: precision >= 90%, recall >= 85% (excellent rating)

  CRITICAL BUILDER DEPENDENCIES:
  - heuristics.py: State variable security tagging
  - builder.py: writes_privileged_state, writes_sensitive_config properties
  - All patterns depend on correct heuristic classification of state variables
