  **ext-003 Testing Notes:**
  - Pattern achieves 94.4% precision, 100% recall, 100% variation score
  - Status: EXCELLENT (exceeds all thresholds for production use)
  - One known FP: execTransactionProtected (builder limitation: custom checkSignatures not detected)
  - Successfully detects unprotected low-level calls across:
    * Different naming conventions (forward, relay, proxy, execute)
    * Different call types (call, staticcall, call with value)
    * Various attack scenarios (fund drainage, gas griefing, DoS, reentrancy)
    * Real-world patterns (Gnosis Safe-style, multicall)
  - Zero false negatives: catches all vulnerable unprotected calls
  - HIGH severity: Low-level calls bypass Solidity safety checks

  crypto-001:
    files: [CryptoSignatureTest.sol]
    functions:
      vulnerable:
        - executeWithSignature(address,bytes,uint8,bytes32,bytes32)  # Missing zero address check
        - executeTransaction(address,bytes,uint8,bytes32,bytes32)  # Missing v-value check
        - transferWithSignature(address,uint256,uint8,bytes32,bytes32)  # Missing nonce protection
        - approveWithSignature(address,uint256,uint8,bytes32,bytes32)  # Missing deadline
        - executeMultiVuln(address,uint8,bytes32,bytes32)  # Missing all checks
        - executeUninitialized(address,uint8,bytes32,bytes32)  # Edge: zero address owner
        - executeWithHashTracking(address,bytes,uint8,bytes32,bytes32)  # Edge: hash tracking
        - permitEIP712Vulnerable(address,address,uint256,uint256,uint8,bytes32,bytes32)  # EIP-712 variation
        - executeCompact(address,bytes,bytes)  # Compact signature variation
        - executeEIP2098(address,bytes,bytes32,bytes32)  # EIP-2098 variation
        - executeMultiSig(address,bytes,uint8[],bytes32[],bytes32[])  # Multi-sig variation
        - executeMetaTx(address,address,uint256,bytes,uint8,bytes32,bytes32)  # Meta-tx variation
        - recoverSignerPure(bytes32,uint8,bytes32,bytes32)  # FP - builder: is_pure=False
      safe:
        - executeSafe(address,bytes,uint256,uint8,bytes32,bytes32)  # All checks present
        - executeWithECDSA(address,bytes,uint256,bytes)  # ECDSA library
        - verifySignatureView(bytes32,uint8,bytes32,bytes32)  # View function
        - _recoverInternal(bytes32,uint8,bytes32,bytes32)  # Internal function
      false_negatives:
        - permit(address,uint256,uint256,uint8,bytes32,bytes32)  # Builder: checks_sig_s=True
        - executeOnChain(address,bytes,uint256,uint8,bytes32,bytes32)  # Builder: checks_sig_s=True
        - executePartialChecks(address,bytes,uint256,uint8,bytes32,bytes32)  # Builder: checks_sig_s=True
        - authorizeAction(address,bytes,uint256,uint8,bytes32,bytes32)  # Builder: checks_sig_s=True, nonce naming
    last_updated: "2025-12-31"

  **crypto-001 Testing Notes:**
  - Pattern achieves 92.3% precision, 75% recall, 83.3% variation score
  - Status: READY (exceeds all thresholds for production with human review)
  - Known builder limitations affecting 5 tests:
    * checks_sig_s incorrectly detected as True → 4 FNs
    * is_pure incorrectly detected as False → 1 FP
    * Nonce detection only for "nonce" naming → 1 FN
  - With builder fixes, estimated metrics: precision ~100%, recall ~100%, variation ~100%
  - Successfully detects missing signature checks:
    * Zero address validation
    * V-value validation (27 or 28)
    * Nonce-based replay protection
    * Deadline/expiration
  - Tested variations: EIP-712, compact format, EIP-2098, multi-sig, different naming, meta-tx
  - HIGH severity: Signature validation flaws enable authorization bypass, replay attacks
