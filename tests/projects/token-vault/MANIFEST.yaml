        - viewPermitHash(address,address,uint256,uint256,uint8,bytes32,bytes32)  # View
        - _internalPermit(address,address,uint256,uint256,uint8,bytes32,bytes32)  # Internal
        - _privatePermitHelper(address,address,uint256)  # Private
      false_positives:
        - permit(address,address,uint256,uint256,uint8,bytes32,bytes32)  # PermitSafeManual - uses ECDSAHelper.recover()
        - permit(address,address,uint256,uint256,uint8,bytes32,bytes32)  # PermitSafeWithTryCatch - uses ECDSAHelper.recover()
        - permit(address,address,uint256,uint256,bool,uint8,bytes32,bytes32)  # PermitVariation4_DaiStyleSafe
      false_negatives:
        - grantApprovalWithSignature(address,address,uint256,uint256,uint8,bytes32,bytes32)  # Non-standard naming
        - approveViaSignature(address,address,uint256,uint256,uint8,bytes32,bytes32)  # Non-standard naming
