        - approveRouterSafe(IERC20,address,uint256)  # SafeERC20.safeApprove
        - depositWithCheck(IERC20,uint256)  # require(transferFrom())
        - withdrawWithCheck(IERC20,uint256)  # require(transfer())
        - depositBalanceCheck(IERC20,uint256)  # balance before/after check
        - depositLowLevel(IERC20,uint256)  # low-level call with check
        - depositRequireAmount(IERC20,uint256)  # inline require check
      edge_cases:
        - _depositInternal(IERC20,uint256)  # internal
        - _withdrawPrivate(IERC20,uint256)  # private
        - viewBalance(IERC20,address)  # view
        - calculateAmount(uint256,uint256)  # pure
        - transferNoStateWrite(IERC20,address,uint256)  # no state write
        - updateBalanceNoTransfer(address,uint256)  # no token call
        - depositLowLevel(IERC20,uint256)  # low-level with check
      false_positives:
        - depositBoolCheck(IERC20,uint256)  # bool + require on separate lines (not detected)
        - withdrawBoolCheck(IERC20,uint256)  # bool + require on separate lines (not detected)
        - depositTryCatch(IERC20,uint256)  # try-catch not detected as guard
        - approveWithCheck(IERC20,address,uint256)  # bool + require on separate lines (not detected)
      false_negatives: []  # NONE - 100% recall
    last_updated: "2025-12-31"
    status: ready
    metrics:
      precision: 0.846
      recall: 1.00
      variation_score: 1.00
    limitation: |
      Pattern has 4 false positives due to builder.py limitation in detecting:
      - Multi-line bool variable + require() patterns
      - try-catch blocks with return value validation

      These represent <16% of findings. Pattern prioritizes recall (100%) over
      precision for HIGH severity vulnerabilities. Acceptable for production use.

