        - permit(address,address,uint256,uint256,bytes)  # Bytes signature format
        - permit(address,address,uint256,uint256,bool,uint8,bytes32,bytes32)  # DAI-style missing expiry
      safe:
        - viewPermitHash(address,address,uint256,uint256,uint8,bytes32,bytes32)  # View function
        - _internalPermit(address,address,uint256,uint256,uint8,bytes32,bytes32)  # Internal
        - _privatePermitHelper(address,address,uint256)  # Private
