      variation_score: 0.6667
    limitation: |
      Builder limitation: ECDSAHelper.recover() not detected as having signature_validity_checks.
      Pattern limitation: is_permit_like requires "permit" in function name.

notes: |
  Value movement scenarios for testing:
  - Deposits and withdrawals with reentrancy vectors
  - Share inflation attacks (ERC-4626)
  - Token callback reentrancy (ERC-721, ERC-1155)
  - Unchecked ERC-20 transfers
  - Balance vs accounting manipulation
  - Fee-on-transfer token handling
  - Infinite vs limited token approvals

  Test contracts:
  - ValueTransferTest.sol: vm-002 unprotected transfers
  - FeeOnTransferTest.sol: token-001 fee-on-transfer token handling
  - ERC777ReentrancyTest.sol: token-002 ERC-777 reentrancy
  - InfiniteApprovalTest.sol: token-003 infinite approval detection
  - NonStandardReturnTest.sol: token-004 non-standard return value handling
  - UncheckedReturnTest.sol: token-005 unchecked ERC20 return values
  - ApprovalRaceTest.sol: token-006 ERC20 approval race condition (SWC-114)
  - ExternalCallTest.sol: ext-001 unprotected external calls
  - ExternalCallLoopTest.sol: dos-002 external calls in loops
  - PermitImplementationTest.sol: crypto-002 incomplete EIP-2612 permit implementation

  Recommended future additions:
  - Vault.sol: Basic vault with deposit/withdraw
  - VaultSafe.sol: CEI pattern and reentrancy guards
  - TokenTransfers.sol: ERC-20 transfer patterns
  - NFTVault.sol: ERC-721/1155 callback scenarios
  - ShareAccounting.sol: Share calculation patterns
