        - stakeSafe(IERC20,uint256)
        - depositWithCheck(IERC20,uint256)
        - depositSafeERC20(IERC20,uint256)
        - depositERC4626Style(IERC20,uint256)
      edge_cases:
        - _depositInternal(IERC20,uint256)  # internal
        - _depositPrivate(IERC20,uint256)  # private
        - viewDeposit(address)  # view
        - depositNoAccounting(IERC20,uint256)  # no balance write
        - unstake(uint256)  # withdrawal
        - collectFee(IERC20,uint256)  # no user accounting
      false_positives:
        - depositSafe(IERC20,uint256)  # balance check in assignment not require()
      false_negatives:
        - stake(IERC20,uint256)  # writes stakes mapping (not detected)
        - addLiquidity(IERC20,uint256)  # writes deposits mapping (not detected)
        - contribute(IERC20,uint256)  # writes shares (should detect)
        - depositForShares(IERC20,uint256)  # writes shares (should detect)
        - depositToMapping(IERC20,uint256)  # writes deposits mapping (not detected)
        - depositToStruct(IERC20,uint256)  # writes struct field (not detected)
    last_updated: "2025-12-31"
    status: ready
    metrics:
      precision: 0.90
      recall: 0.75
      variation_score: 1.00

  token-002-erc777-reentrancy:
    files: [ERC777ReentrancyTest.sol]
    functions:
      vulnerable:
        - withdraw(uint256)
        - withdrawMultiStep(uint256)
        - withdrawWithEvent(uint256)
        - withdrawFromVault(uint256)
        - withdrawDirect(uint256)
        - withdrawTwoStep(uint256)
        - withdrawWithOperator(uint256)
        - withdrawWithAssignment(uint256)
        - withdrawTo(address,uint256)
        - withdrawConditional(uint256)
      safe:
        - withdrawProtected(uint256)  # has reentrancy guard
        - withdrawCEI(uint256)  # proper CEI pattern
        - withdrawFullySafe(uint256)  # guard + CEI
        - getBalance(address)  # view
        - calculateAmount(uint256,uint256)  # pure
        - _withdrawInternal(address,uint256)  # internal
        - _withdrawPrivate(address,uint256)  # private
        - emergencyWithdraw(address,uint256)  # owner + guard
        - sendTokensNoAccounting(address,uint256)  # no balance write
        - updateBalanceNoTransfer(address,uint256)  # no ERC-777
        - requestWithdraw(uint256)  # pull payment step 1
        - claimWithdrawal()  # pull payment step 2
        - withdrawWithCustomLock(uint256)  # custom mutex
      edge_cases:
        - sendTokensNoAccounting(address,uint256)  # ERC-777 send but no accounting
        - updateBalanceNoTransfer(address,uint256)  # state write but no transfer
        - requestWithdraw(uint256)  # two-step withdrawal
        - claimWithdrawal()  # separate transaction
        - withdrawWithCustomLock(uint256)  # custom lock pattern
      false_positives: []  # NONE - 100% precision
      false_negatives:
        - redeem(uint256)  # writes shares (not detected as balance_state)
        - unstake(uint256)  # writes stakes (not detected as balance_state)
        - claim()  # writes deposits (not detected as balance_state)
        - withdrawViaOperator(address,uint256)  # operatorSend not detected
        - withdrawToShares(uint256)  # writes shares mapping
        - burnTokens(uint256)  # burn() not detected as erc777_send
        - operatorWithdraw(address,uint256,bytes)  # operatorSend not detected
    last_updated: "2025-12-31"
    status: ready
    metrics:
      precision: 1.00
      recall: 0.5882
      variation_score: 1.00

  token-003-infinite-approval:
    files: [InfiniteApprovalTest.sol]
    functions:
      vulnerable:
        - approveInfinite(IERC20,address)
        - approveMaxHex(IERC20,address)
        - approveMaxArithmetic(IERC20,address)
        - stakeWithInfiniteApproval(IERC20,uint256)
        - swapWithInfiniteApproval(IERC20,address,uint256)
        - approveMultipleTokens(IERC20[],address)
        - approveIfNeeded(IERC20,address,uint256)
        - constructor(IERC20,address)
      safe:
        - stakeWithPermit(IERC20Permit,uint256,uint256,uint8,bytes32,bytes32)  # uses permit not approve
        - depositDirect(IERC20,uint256)  # uses transferFrom not approve
        - getAllowance(IERC20,address,address)  # view
        - calculateAmount(uint256,uint256)  # pure
        - _approveInternal(IERC20,address,uint256)  # internal
        - _approvePrivate(IERC20,address,uint256)  # private
      edge_cases:
        - approveSelf(IERC20,uint256)  # self-approval
        - approveToZero(IERC20,uint256)  # zero address
        - approveConditional(IERC20,address,uint256,bool)  # conditional
        - emergencyRevokeAll(IERC20[],address)  # batch revoke
      false_positives:
        - approveLimited(IERC20,address,uint256)  # limited approval (pattern limitation)
        - stakeSafe(IERC20,uint256)  # limited approval
        - approveAndReset(IERC20,address,uint256)  # resets after use
        - topUpApproval(IERC20,address,uint256)  # incremental top-up
        - swapSafe(IERC20,address,uint256)  # exact amount
        - approveWithExpiry(IERC20,address,uint256,uint256)  # time-limited concept
        - revokeApproval(IERC20,address)  # sets to zero (safety function)
        - approveSmall(IERC20,address)  # small limited amount
      false_negatives: []  # NONE - catches all infinite approvals
    last_updated: "2025-12-31"
    status: draft
    metrics:
      precision: 0.50
      recall: 1.00
      variation_score: 1.00
    limitation: |
      Pattern detects ALL approve() calls, not just infinite approvals.
      Cannot distinguish between infinite (type(uint256).max) and limited approvals.
      Requires builder.py enhancement for 'approves_infinite_amount' property.

  token-004-non-standard-return:
    files: [NonStandardReturnTest.sol]
    functions:
      vulnerable:
        - deposit(IERC20,uint256)
        - withdraw(IERC20,uint256)
        - depositWithEvent(IERC20,uint256)
        - batchWithdraw(IERC20,address[],uint256[])
