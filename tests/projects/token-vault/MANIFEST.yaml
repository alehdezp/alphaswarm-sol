        - withdrawSafe(IERC20,uint256)  # SafeERC20
        - depositWithCheck(IERC20,uint256)  # require(transfer())
        - stakeSafe(IERC20,uint256)  # SafeERC20
        - batchWithdrawSafe(IERC20,address[],uint256[])  # SafeERC20
        - depositCollateralSafe(IERC20,uint256)  # SafeERC20
      edge_cases:
        - _depositInternal(IERC20,uint256)  # internal
        - _depositPrivate(IERC20,uint256)  # private
        - viewBalance(address)  # view
        - calculateAmount(uint256,uint256)  # pure
        - transferNoAccounting(IERC20,address,uint256)  # no balance write
        - updateBalanceNoTransfer(address,uint256)  # no ERC20 call
        - depositETH()  # ETH not ERC20
        - depositLowLevel(IERC20,uint256)  # low-level with check
      false_positives:
        - withdrawWithManualCheck(IERC20,uint256)  # Has bool + require but token_return_guarded=false
      false_negatives:
        - addFunds(IERC20,uint256)  # writes deposits (not tagged as balance)
        - depositForShares(IERC20,uint256)  # writes shares (tagged as shares)
        - stake(IERC20,uint256)  # writes stakes (not tagged)
        - depositAssets(IERC20,uint256)  # writes userShares (tagged as shares)
        - withdrawDeposit(IERC20,uint256)  # writes deposits (not tagged)
        - fund(IERC20,uint256)  # writes deposits (not tagged)
        - redeem(IERC20,uint256)  # writes shares (tagged as shares)
    last_updated: "2025-12-31"
    status: ready
    metrics:
      precision: 0.90
      recall: 0.56
      variation_score: 0.67
    limitation: |
      Pattern only detects when writing to "balance"-tagged state variables.
      Misses functions writing to deposits, stakes, or share mappings.
      Needs broader property (writes_state) or expanded tagging.

