patterns:
  vm-002-unprotected-transfer:
    files: [ValueTransferTest.sol]
    functions:
      vulnerable:
        - withdraw(uint256)
        - setBalance(address,uint256)
        - extract(uint256)
        - removeFunds(uint256)
        - fn_0x123abc(uint256)
        - updateShares(address,uint256)
        - modifyDeposit(address,uint256)
        - sendFunds(address,uint256)
        - sendEther(address,uint256)
        - batchWithdraw(address[],uint256[])
        - extractAsController(uint256)
      safe:
        - withdrawProtected(uint256)
        - withdrawWithRequire(uint256)
        - setBalanceProtected(address,uint256)
        - withdrawGuarded(uint256)
        - batchWithdrawProtected(address[],uint256[])
      edge_cases:
        - getBalance(address)
        - calculate(uint256,uint256)
        - _internalTransfer(address,uint256)
        - _privateSetBalance(address,uint256)
        - initialize(address)
        - constructor
      false_positives:
        - withdrawWithIf(uint256)  # if-statement access check not recognized
        - withdrawOwn()  # pull payment pattern not recognized
        - init(address)  # custom initializer modifier not recognized
        - claimReward()  # intentional public distribution (needs Tier B)
      false_negatives:
        - updateAccount(address,uint256)  # struct field writes not detected
    last_updated: "2025-12-31"
    status: ready
    metrics:
      precision: 0.73
      recall: 0.92
      variation_score: 0.80

  token-001-unhandled-fee-on-transfer:
    files: [FeeOnTransferTest.sol]
    functions:
      vulnerable:
        - deposit(IERC20,uint256)
        - depositCollateral(IERC20,uint256)
        - fundAccount(IERC20,uint256)
