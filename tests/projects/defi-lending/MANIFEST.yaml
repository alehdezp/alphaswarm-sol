# =============================================================================
# Test Project: DeFi Lending
# =============================================================================
#
# This project simulates a lending protocol (Aave/Compound-like) for testing
# vulnerability detection patterns across realistic DeFi scenarios.
#
# =============================================================================

project: defi-lending
description: |
  DeFi lending protocol test scenarios simulating:
  - Interest rate management
  - Collateral management
  - Liquidation logic
  - Flash loan functionality
  - Oracle integration
  - Access control patterns

max_files: 30
current_files: 1

# =============================================================================
# PATTERNS TESTED IN THIS PROJECT
# =============================================================================

patterns:
  dos-001:
    files: [RewardDistribution.sol]
    functions:
      vulnerable:
        - distributeStakingRewards()
        - processWithdrawals()
        - compoundRewards()
        - emergencyWithdrawAll()
        - sweepUnclaimedRewards(address)
        - snapshotBalances()
        - distributeUntilLimit(uint256)
        - distributeToBigStakers(uint256)
        - finalizeWithdrawals()
        - adminDistributeRewards()
        - distributeLPRewards(uint256)
        - harvestAll()
        - distributeFees(uint256)
      safe:
        - claimReward()
        - processWithdrawalsBatch(uint256,uint256)
        - updateRewardIndex()
        - stake()
        - unstake(uint256)
        - snapshotUser(address)
    metrics:
      precision: 0.0
      recall: 0.0
      variation_score: 0.0
      f1_score: 0.0
    status: draft
    last_updated: "2025-12-31"
    notes: |
      CRITICAL: Pattern is non-functional due to builder.py bug.
      See tests/projects/governance-dao/DOS-001-TEST-REPORT.md for details.
