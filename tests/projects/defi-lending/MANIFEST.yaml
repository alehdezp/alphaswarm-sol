# =============================================================================
# NOTES
# =============================================================================

notes: |
  Suitable patterns for this project:
  - Authority lens (auth-*): Access control on admin functions
  - Value Movement lens (vm-*): Reentrancy in withdraw/borrow, flash loan safety
  - External Influence lens (ext-*): Oracle manipulation, price feed validation
  - Arithmetic lens (arith-*): Interest calculations, collateral ratios
  - Logic State lens (logic-*): Accounting invariants, state consistency
