# ERC677 Reentrancy via transferAndCall callback
id: smartbugs-erc677-reentrancy
name: ERC677 transferAndCall Reentrancy
category: reentrancy
source: examples/semgrep-smart-contracts/solidity/security/erc677-reentrancy.sol
solidity_version: "0.8.x"

vulnerability:
  type: reentrancy-callback
  description: |
    ERC677 transferAndCall function invokes onTransferReceived() on the recipient,
    allowing reentrancy through the callback mechanism.
  severity: high
  cwe: CWE-841

expected_detections:
  - pattern: vm-001
    confidence: high
    description: State write after onTransferReceived callback

vkg_pattern_mapping:
  primary: vm-001
  secondary: [reentrancy-callback]

false_positives: []

status: pending
